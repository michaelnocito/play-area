<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #0d0d12;
    overflow: hidden;
    font-family: 'Georgia', serif;
    touch-action: none;

  canvas#game {

  }
  #hud {
    position: absolute; top: 10px; left: 0; right: 0;
    display: flex; justify-content: space-between; padding: 0 16px;

    text-shadow: 0 2px 6px rgba(0,0,0,0.8);
  }
  #hud .label { font-size: 10px; letter-spacing: 1.5px; opacity: 0.75; text-transform: uppercase; }
  #hud .value { font-size: 18px; font-weight: bold; }
  #overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: rgba(8,6,14,0.82);
    color: #f1e3c6; text-align: center; padding: 20px;
  }
  #overlay h1 {
    font-size: 30px; letter-spacing: 3px; margin-bottom: 8px;

  #overlay .key { color: #e8c878; font-weight: bold; }
  #overlay button {
    margin-top: 16px; padding: 12px 30px; font-size: 14px; letter-spacing: 2px;
    text-transform: uppercase; background: #c9913f; color: #1a1330;
    border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-family: inherit;
  }
  #overlay button:active { transform: scale(0.97); }
  #overlay.hidden { display: none; }

  .tbtn {

  #btnJump { border-right: 1px solid rgba(241,227,198,0.08); }

  #muteBtn {
    position: absolute; top: 44px; right: 12px;
    width: 36px; height: 26px; display: flex; align-items: center; justify-content: center;
    font-size: 14px; color: #f1e3c6; opacity: 0.55; cursor: pointer;

  }
  #muteBtn:active { opacity: 0.9; }
  #pauseBtn {
    position: absolute; top: 76px; right: 12px;
    width: 36px; height: 26px; display: flex; align-items: center; justify-content: center;
    font-size: 11px; color: #f1e3c6; opacity: 0.55; cursor: pointer;
    background: rgba(8,6,14,0.4); border-radius: 5px; z-index: 5;
  }
  #pauseBtn:active { opacity: 0.9; }
  #tally { margin-top: 10px; font-size: 13px; min-width: 250px; }
  #tally .trow { display: flex; justify-content: space-between; gap: 24px; padding: 1.5px 0; opacity: 0; }
  #tally .trow.show { opacity: 1; transition: opacity 0.12s; }
  #tally .trow .pts { color: #e8c878; font-weight: bold; }
  #tally .trow.total { border-top: 1px solid rgba(232,200,120,0.35); margin-top: 5px; padding-top: 5px; font-size: 16px; }
  #newBest { font-size: 14px; color: #ffe9b0; letter-spacing: 2px; margin-top: 6px; opacity: 0;
    text-shadow: 0 0 12px rgba(255,233,176,0.8); }
  #newBest.show { opacity: 1; transition: opacity 0.2s; }
  #statsLine { font-size: 10px; opacity: 0.6; margin-top: 6px; }
  #tallyJoke { font-size: 10px; opacity: 0.55; font-style: italic; margin-top: 3px; }
  #walletLine { font-size: 13px; margin-top: 8px; color: #ffe9b0; opacity: 0; }
  #walletLine.show { opacity: 1; transition: opacity 0.15s; }
  #shop { margin-top: 8px; min-width: 270px; }
  .shopRow {
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    padding: 5px 8px; margin-top: 4px; border: 1px solid rgba(232,200,120,0.25);

  }
  .shopRow.show { opacity: 1; transition: opacity 0.15s; }
  .shopRow .sname { font-size: 11px; letter-spacing: 1px; color: #e8c878; }
  .shopRow .sdesc { font-size: 9px; opacity: 0.7; }
  .shopRow .scost { font-size: 11px; white-space: nowrap; color: #ffe9b0; }
  .shopRow .pips { letter-spacing: 2px; font-size: 9px; color: #e8c878; }
  .shopRow.cant { opacity: 0.45; cursor: default; }

  @keyframes shopPulse { 50% { border-color: #ffe9b0; box-shadow: 0 0 10px rgba(255,233,176,0.4); } }
  #firstBuy { font-size: 10px; color: #ffe9b0; margin-top: 5px; opacity: 0; }
  #firstBuy.show { opacity: 0.9; animation: shopPulse 0.9s infinite; }
  #metaLine { font-size: 11px; opacity: 0.75; margin-top: 8px; color: #ffe9b0; }

  #nightBtn.hiddenBtn, #dailyBtn.hiddenBtn, #adReviveBtn.hiddenBtn, #adDoubleBtn.hiddenBtn { display: none; }

<body>
<div id="wrap">
  <canvas id="game" width="480" height="270"></canvas>
  <div id="hud">

    <div style="text-align:center"><div class="label">Points</div><div class="value" id="scoreVal">0</div></div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  // All world randomness flows through rnd() so the Daily Trial can seed it (mulberry32);
  // normal runs rebind it to Math.random. Audio noise keeps true randomness — its init timing
  // (first user gesture) must never desync a seeded layout.
  let rnd = Math.random;
  function mulberry32(a) {
    return function() {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      let t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  const W = canvas.width, H = canvas.height;
  const GROUND_Y = H - 48;

  const overlay = document.getElementById('overlay');
  const startBtn = document.getElementById('startBtn');
  const distVal = document.getElementById('distVal');
  const featherVal = document.getElementById('featherVal');
  const scoreLine = document.getElementById('scoreLine');
  const bestEl = document.getElementById('best');
  const btnJump = document.getElementById('btnJump');
  const btnStrike = document.getElementById('btnStrike');
  const muteBtn = document.getElementById('muteBtn');
  const scoreVal = document.getElementById('scoreVal');
  const tallyEl = document.getElementById('tally');
  const newBestEl = document.getElementById('newBest');
  const statsLine = document.getElementById('statsLine');
  const tallyJokeEl = document.getElementById('tallyJoke');
  const pauseBtn = document.getElementById('pauseBtn');
  const walletLine = document.getElementById('walletLine');
  const shopEl = document.getElementById('shop');
  const firstBuyEl = document.getElementById('firstBuy');
  const metaLine = document.getElementById('metaLine');
  const mapLine = document.getElementById('mapLine');
  const nightBtn = document.getElementById('nightBtn');
  const nextDist = document.getElementById('nextDist');
  const buffRow = document.getElementById('buffRow');
  const cloakRow = document.getElementById('cloakRow');
  const adReviveBtn = document.getElementById('adReviveBtn');
  const adDoubleBtn = document.getElementById('adDoubleBtn');

  /* ===== CrazyGames SDK (graceful no-op offline; verify call names vs current docs) ===== */
  // sdkLive = init() actually resolved (only true on the CrazyGames platform); every game/ad
  // call is gated on it — calling the SDK pre-init or off-platform just logs errors and is dropped.
  let sdkLive = false;
  const CG = {
    init(cb){ try{ if(window.CrazyGames?.SDK){ window.CrazyGames.SDK.init().then(()=>{ sdkLive = true; cb&&cb(); }).catch(()=>cb&&cb()); return; } }catch(e){} cb&&cb(); },
    loadingStart(){ try{ if(sdkLive) window.CrazyGames.SDK.game.loadingStart(); }catch(e){} },
    loadingStop(){ try{ if(sdkLive) window.CrazyGames.SDK.game.loadingStop(); }catch(e){} },
    gameplayStart(){ try{ if(sdkLive) window.CrazyGames.SDK.game.gameplayStart(); }catch(e){} },
    gameplayStop(){ try{ if(sdkLive) window.CrazyGames.SDK.game.gameplayStop(); }catch(e){} },
    happytime(){ try{ if(sdkLive) window.CrazyGames.SDK.game.happytime(); }catch(e){} },
    interstitial(){ try{ if(sdkLive) window.CrazyGames.SDK.ad.requestAd("midgame", {
      adStarted(){ try{ Snd.duck(true); }catch(e){} },
      adFinished(){ try{ Snd.duck(false); }catch(e){} },
      adError(){ try{ Snd.duck(false); }catch(e){} },
    }); }catch(e){} },
    rewarded(onReward){
      try{ if(sdkLive && window.CrazyGames?.SDK?.ad?.requestAd){
        window.CrazyGames.SDK.ad.requestAd("rewarded", {
          adStarted(){ try{ Snd.duck(true); }catch(e){} },
          adFinished(){ try{ Snd.duck(false); }catch(e){} onReward&&onReward(); },
          adError(){ try{ Snd.duck(false); }catch(e){} onReward&&onReward(); },
        }); return;
      } }catch(e){}
      onReward&&onReward();
    },
  };
  // SDK.data throws "not initialized" if touched before CG.init() resolves — only read/write it
  // after that point. Use localStorage directly for the initial read and as the always-safe fallback.
  const Save = {
    get(){ try{ return (sdkLive && window.CrazyGames?.SDK?.data) || localStorage; }catch(e){ return localStorage; } },
  };

  let best = parseInt(localStorage.getItem('rooftopSprintBest') || '0', 10) || 0;

  /* ===== Persistent progression (Batch 5.1, CG-research-grounded: acceptance is judged on
     depth/retention potential; localStorage IS the cloud save — CG's Automatic Progress Save
     backs it up, and the Data Module mirror syncs it for logged-in users) =====
     Guardrails (§4): upgrades compress the warm-up, never raise the ceiling; ×2 cost/tier;
     first purchase affordable in 1-2 runs; one-tap spend ON the tally screen. */
  const SAVE_KEY = 'rooftopSprintSave_v1';
  let save = { light: 0, oil: 0, arts: 0, wick: 0, kills: 0, lastDay: '', streak: 0, miles: {}, district: 0, campaignDone: false, seenStory: false,
    buffs: {}, buffEq: '', cloaks: { 0: 1 }, cloak: 0, dailyBest: 0, dailyDate: '' };
  try { const s = JSON.parse(localStorage.getItem(SAVE_KEY) || 'null'); if (s && typeof s === 'object') save = Object.assign(save, s); } catch(e){}
  function saveNow() {
    let str = '';
    try { str = JSON.stringify(save); localStorage.setItem(SAVE_KEY, str); } catch(e){}
    try { if (str) Save.get().setItem(SAVE_KEY, str); } catch(e){}
  }
  // Progression changes PLAY, not just stats (Law 3): each tier's description is what the
  // NEXT purchase actually does; tiers 2-3 add behaviors, not bigger numbers.
  const TRACKS = [
    { key: 'oil',  name: 'MORNING OIL',  max: 3, costs: [15, 30, 60],
      descs: ['Start with the lamp partly lit', 'Start brighter (a music layer up)', 'Start at a mid-run glow'] },
    { key: 'arts', name: 'LAMP ARTS',    max: 3, costs: [15, 30, 60],
      descs: ['Light is drawn to you from farther', 'PERFECT kills STUN nearby wardens', 'Dominoes chain farther'] },
    { key: 'wick', name: 'WICK & FLINT', max: 3, costs: [15, 30, 60],
      descs: ['Head start: begin 50m along', 'Head start: begin 100m along', 'SECOND FLAME: one free revive per run'] },
  ];
  // Light Burst (campaign-unlocked verb): the lamp absorbs one fatal mistake for half its light
  function burstUnlocked() { return save.district >= 2 || rankIdx(save.kills) >= 1; }
  // Buff consumables (§4): banked inventory, ONE equipped, consumed at run start
  const BUFFS = [
    { k: 'head', n: 'Head Start',    d: 'begin 200m along',      cost: 10 },
    { k: 'ward', n: 'Warding Charm', d: 'absorb one hit',        cost: 12 },
    { k: 'mag',  n: 'Mote Magnet',   d: 'strong pull this run',  cost: 8  },
    { k: 'dbl',  n: 'Double Light',  d: 'banked Light ×2',       cost: 15 },
  ];
  let runBuff = '', wardUsed = false;
  // Cosmetic cloaks — visible on the runner at all times, pure Light sink
  const CLOAKS = [
    { n: 'Ember Red',    col: '#7a2f3a', cost: 0   },
    { n: 'Moonlit Blue', col: '#2f4a7a', cost: 40  },
    { n: 'Jade',         col: '#2f6a4a', cost: 60  },
    { n: 'Gold Thread',  col: '#8a6a2f', cost: 90  },
    { n: 'Midnight',     col: '#22202e', cost: 120 },
  ];
  // Lantern ranks: lifetime wardens felled → visible rank (the player's sash renders in rank color)
  const RANKS = [
    { at: 0,    name: 'SPARK',        col: '#c9913f' },
    { at: 25,   name: 'EMBER',        col: '#e07840' },
    { at: 75,   name: 'FLAME',        col: '#e84a4a' },
    { at: 200,  name: 'BEACON',       col: '#e8c878' },
    { at: 500,  name: 'LUMINARY',     col: '#ffe9b0' },
    { at: 1200, name: 'LIGHTBRINGER', col: '#ffffff' },
  ];
  function rankIdx(kills) { let r = 0; for (let i = 0; i < RANKS.length; i++) if (kills >= RANKS[i].at) r = i; return r; }
  // One-time Light bounties — checked mid-run, banked with the run
  const MILESTONES = [
    { key: 'perfect1', light: 10, label: 'FIRST PERFECT',   hit: () => perfK > 0 },
    { key: 'chain3',   light: 20, label: 'TRIPLE DOMINO',   hit: () => bestChain >= 3 },
    { key: 'dist500',  light: 15, label: '500M LIT',        hit: () => distance >= 500 },
    { key: 'dist1000', light: 30, label: '1000M LIT',       hit: () => distance >= 1000 },
  ];
  let mileLight = 0;      // bounty Light earned this run
  let runRankShown = 0;   // rank at last check — promotion banner fires when it rises
  let dailyX2 = false;    // first run of the day = ×2 Light
  const AD_COOLDOWN_MS = 150000; // interstitial min-interval (CG policy: not every death)
  let lastAdT = Date.now(); // seeded at boot — no ad on the first death of a session

  // ---------- Silly seasoning (Law 12: broad appeal, art-first — flavor only, never a new
  // hitbox or a mismatched art style; every line here is a bonus, nothing gates on it) ----------
  const WARDEN_QUIPS = ["OI!", "MY LAMP!", "NOT THE FACE", "WORTH IT", "TELL MY LANTERN...", "OW", "RUDE", "I HAD PLANS"];
  const CAPTAIN_QUIPS = [
    ["OH COME ON", "THAT TICKLED", "IS THAT ALL?"],
    ["OKAY OW", "MY DIGNITY", "NOT MY HELMET"],
    ["WORTH EVERY LUMEN", "TELL THE OTHERS I—", "*dramatic gasp*"],
  ];
  const HYPE_LINES = {
    perfect: ["CHEF'S KISS", "LAMP-TASTIC", "OH THAT'S NICE", "CLEAN AS A WHISTLE"],
    domino: ["BOWLING NIGHT", "TIMBER!", "THAT'S A CHAIN REACTION", "DOMINO DELIGHT"],
    captain: ["LIGHTS OUT, PAL", "GATE'S OPEN", "THAT'S A WRAP", "BEACON APPROVES"],
  };
  const TALLY_JOKES = [
    "Style points: incalculable.",
    "Wardens felled while looking fabulous: most of them.",
    "The lamp forgives you. Eventually.",
    "Rooftops harmed in the making of this run: several.",
    "Your form has been noted by the pigeons.",
    "The Beacon is, at minimum, mildly impressed.",
    "Certified: 100% lamp, 0% chill.",
  ];
  const CAMEO_LINES = ["GET A LADDER!", "MIND THE LAUNDRY!", "IS THAT LEGAL?", "SHOW OFF.", "MY CABBAGES!"];
  const SILLY_QUIPS = ["WHY DID I WEAR THIS TO WORK", "THE HAT DID NOTHING WRONG", "AT LEAST I LOOKED GOOD", "TELL THE PARTY I'M SORRY"];
  let moonReactT = 0; // reactive moon: brief wide-eyed blink on big moments (STAGE 4 of the sweep — cosmetic only)

  /* ===== Procedural audio (Batch 3) — light-reactive score + layered SFX =====
     Speaker-scaling architecture (ROADMAP §7): every voice = parallel layers into one bus —
     transient click 2–5kHz (0–5ms attack) · mid body 200–500Hz · harmonic bass 150–500Hz
     (2nd–4th harmonics of the sub pitch — small speakers reconstruct the missing fundamental)
     · true sub sine 40–90Hz as a garnish only decent speakers reproduce. Exponential ramps
     only; the 4–5kHz handset-fatigue band is avoided. All voices are mono → mono-safe by
     construction (the phone test). Fully inert when AudioContext is absent (headless harness),
     and the context only spins up on the first user gesture (autoplay policy). */
  const Snd = (() => {
    const AC = window.AudioContext || window.webkitAudioContext;
    const noop = () => {};
    if (!AC) return { muted: true, resume: noop, tick: noop, setTs: noop, duck: noop, setMuted: noop,
      toggleMute(){ return true; }, qaHighpass: noop, jump: noop, land: noop, swing: noop, kill: noop,
      chime: noop, domino: noop, sparkle: noop, death: noop, slide: noop, bird: noop,
      uiTick: noop, newBest: noop };
    let ac = null, bus, qaHP, lpf, master, musicG, sfxG, padG, noiseBuf;
    let muted = false;
    try { muted = localStorage.getItem('rooftopSprintMuted') === '1'; } catch(e){}
    let ducked = false;
    function applyGain() {
      if (!ac) return;
      master.gain.setTargetAtTime(muted ? 0.0001 : ducked ? 0.02 : 0.8, ac.currentTime, 0.05);
    }
    function init() {
      if (ac) return;
      ac = new AC();
      // master chain: (music+sfx) bus → QA high-pass (10Hz = off) → slow-mo low-pass → master gain
      master = ac.createGain(); master.gain.value = muted ? 0.0001 : 0.8;
      lpf = ac.createBiquadFilter(); lpf.type = 'lowpass'; lpf.frequency.value = 18000;
      qaHP = ac.createBiquadFilter(); qaHP.type = 'highpass'; qaHP.frequency.value = 10;
      bus = ac.createGain();
      musicG = ac.createGain(); musicG.gain.value = 0.5;
      sfxG = ac.createGain(); sfxG.gain.value = 0.9;
      musicG.connect(bus); sfxG.connect(bus);
      bus.connect(qaHP); qaHP.connect(lpf); lpf.connect(master); master.connect(ac.destination);
      const len = ac.sampleRate * 0.5, nb = ac.createBuffer(1, len, ac.sampleRate), d = nb.getChannelData(0);
      for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
      noiseBuf = nb;
      // ember pad: detuned warm drones through a dark low-pass — the floor the whole score sits on
      padG = ac.createGain(); padG.gain.value = 0.0001; padG.connect(musicG);
      const padLP = ac.createBiquadFilter(); padLP.type = 'lowpass'; padLP.frequency.value = 320; padLP.connect(padG);
      for (const [f, det] of [[110, 0], [110, 5], [164.8, -4]]) {
        const o = ac.createOscillator(); o.type = 'triangle'; o.frequency.value = f; o.detune.value = det;
        const og = ac.createGain(); og.gain.value = 0.33; o.connect(og); og.connect(padLP); o.start();
      }
    }
    function envG(t, a, peak, d) { // exponential-ramp envelope (never a gain jump — no clicks)
      const g = ac.createGain();
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(Math.max(peak, 0.0002), t + a);
      g.gain.exponentialRampToValueAtTime(0.0001, t + a + d);

        Snd.kill(1);
        addShake(9);
        slowmoT = Math.max(slowmoT, 200);
      } else {                            // FAR — clean kill
        nearest.fly = 0;
        spawnBurst(nearest.x, nearest.y-16, 10, '#e8c878');
        killPts += PTS_CLEAN; cleanK += 1;
        spawnMessage(nearest.x, nearest.y-40, 'CLEAN +' + PTS_CLEAN);
        Snd.kill(0);
        addShake(6);
      }
    }
  }

  // Pause (CG QA checks this): P or ⏸ pauses; resume runs a 3-2-1 countdown so re-entry is fair.
  // Auto-pauses when the tab is hidden. SDK gameplayStart/Stop bracket the pause per CG guidelines.
  let resumeMs = 0, deathAtT = 0;
  function pauseGame() { if (state !== 'playing') return; state = 'paused'; CG.gameplayStop(); }
  function resumeGame() { if (state !== 'paused') return; state = 'resuming'; resumeMs = 2400; }
  function togglePause() { if (state === 'playing') pauseGame(); else if (state === 'paused') resumeGame(); }
  document.addEventListener('visibilitychange', () => { if (document.hidden) pauseGame(); });

  // Jump keys include Z/W for AZERTY keyboards (CG guideline)
  const JUMP_KEYS = ['Space', 'ArrowUp', 'KeyZ', 'KeyW'];
  window.addEventListener('keydown', (e) => {
    if (JUMP_KEYS.includes(e.code)) {
      e.preventDefault();
      if (e.repeat) return;
      // death → replay in ≤1 input: Space restarts (small delay so a held jump can't skip the tally)
      if (e.code === 'Space' && (state === 'dead' || state === 'won') && drawT - deathAtT > 45) { beginGame(); return; }
      jumpPress();
    }
    if (e.code === 'KeyX' || e.code === 'KeyF') { e.preventDefault(); if (!e.repeat) tryAction(); }
    if (e.code === 'KeyM' && !e.repeat) { Snd.resume(); Snd.toggleMute(); syncMuteBtn(); }
    if (e.code === 'KeyP' && !e.repeat) { togglePause(); }
    if ((state === 'dead' || state === 'won') && tallyDone && (e.code === 'Digit1' || e.code === 'Digit2' || e.code === 'Digit3')) { buyTrack(+e.code.slice(-1) - 1); return; }
    if (e.code === 'Enter' && state !== 'playing' && state !== 'paused' && state !== 'resuming' && state !== 'boon') { beginGame(); }
  });
  window.addEventListener('keyup', (e) => {
    if (JUMP_KEYS.includes(e.code)) jumpRelease();
  });
  btnJump.addEventListener('pointerdown', (e) => { e.preventDefault(); jumpPress(); });
  window.addEventListener('pointerup', () => jumpRelease());     // release anywhere ends the hold
  window.addEventListener('pointercancel', () => jumpRelease());
  btnStrike.addEventListener('pointerdown', (e) => { e.preventDefault(); tryAction(); });
  function syncMuteBtn() { muteBtn.textContent = Snd.muted ? '\u{1F507}' : '\u{1F50A}'; }
  muteBtn.addEventListener('pointerdown', (e) => { e.preventDefault(); e.stopPropagation(); Snd.resume(); Snd.toggleMute(); syncMuteBtn(); });
  syncMuteBtn();
  pauseBtn.addEventListener('pointerdown', (e) => { e.preventDefault(); e.stopPropagation(); togglePause(); });
  startBtn.addEventListener('click', () => { mode = 'campaign'; beginGame(); });
  nightBtn.addEventListener('click', () => { mode = 'endless'; startDistrict = 0; beginGame(); });
  const dailyBtn = document.getElementById('dailyBtn');
  dailyBtn.addEventListener('click', () => { mode = 'daily'; startDistrict = 0; beginGame(); });
  // Ad revive: resume THIS run where it ended (the banked Light/kills are un-banked first so
  // nothing double-counts when the continued run ends for real)
  function reviveRun() {
    if (state !== 'dead') return;
    save.light -= lastBank.light; save.kills -= lastBank.kills; saveNow();
    lastBank = { light: 0, kills: 0 };
    clearTally();
    player.dead = false;
    graceT = 60;
    if (deathCause === 'gap') placeOnNextRoof();
    spawnBurst(player.x + player.w/2, player.y - 16, 26, '#ffe9b0');
    spawnMessage(player.x + player.w/2, player.y - 56, 'RISEN', 70);
    overlay.classList.add('hidden');
    state = 'playing';
    CG.gameplayStart();
    Snd.newBest();
  }
  adReviveBtn.addEventListener('click', () => { if (adReviveUsed) return; adReviveUsed = true; adReviveBtn.classList.add('hiddenBtn'); CG.rewarded(reviveRun); });
  adDoubleBtn.addEventListener('click', () => {
    if (adDoubleUsed) return; adDoubleUsed = true; adDoubleBtn.classList.add('hiddenBtn');
    CG.rewarded(() => {
      save.light += lastBank.light; saveNow();
      walletLine.textContent = '◆ Light banked: ' + save.light + '  (doubled)';
      updateMenuMeta(); renderShop(); renderBuffs(); renderCloaks();
      Snd.newBest();
    });
  });
  canvas.addEventListener('pointerdown', () => {
    if (state === 'dead' || state === 'won') beginGame();
    else if (state === 'paused') resumeGame();
  });
  // device-adaptive: hide touch zones on desktop, show touch wording on touch devices
  const touchControls = document.getElementById('touchControls');
  if (!isTouch) touchControls.style.display = 'none';
  else {
    const cl = document.getElementById('controlsLine');
    if (cl) cl.innerHTML = '<span class="key">LEFT</span> hold to jump higher &nbsp;&middot;&nbsp; <span class="key">RIGHT</span> strike / slide';
  }

  function beginGame() {
    clearTally();
    tallyEl.innerHTML = ''; newBestEl.classList.remove('show'); statsLine.textContent = ''; tallyJokeEl.textContent = '';
    walletLine.textContent = ''; walletLine.classList.remove('show');
    shopEl.innerHTML = ''; firstBuyEl.classList.remove('show');
    adReviveBtn.classList.add('hiddenBtn'); adDoubleBtn.classList.add('hiddenBtn');
    adReviveUsed = false; adDoubleUsed = false; lastBank = { light: 0, kills: 0 };
    // mode setup: Daily Trial = seeded layout + date-pinned modifier (everyone runs the same
    // night); Night Shift = rotating daily modifier; campaign = clean
    if (mode === 'daily') {
      const ds = new Date();
      const dayKey = ds.getFullYear() * 10000 + (ds.getMonth() + 1) * 100 + ds.getDate();
      rnd = mulberry32(dayKey);
      modIdx = dayKey % NIGHT_MODS.length;
    } else {
      rnd = Math.random;
      modIdx = mode === 'endless' ? new Date().getDate() % NIGHT_MODS.length : -1;
    }
    // campaign checkpoint (chosen on the menu map) + Wick & Flint head start — seed BEFORE the
    // world spawns so district population and captain gates line up with the starting distance.
    // The Daily Trial ignores both: everyone runs the identical route.
    // consume the equipped buff (banked inventory; the Daily Trial allows none — same night for everyone)
    runBuff = ''; wardUsed = false;
    if (mode !== 'daily' && save.buffEq && (save.buffs[save.buffEq] || 0) > 0) {
      runBuff = save.buffEq;
      save.buffs[runBuff]--;
      if (save.buffs[runBuff] <= 0) save.buffEq = '';
      saveNow();
    }
    distanceSeed = mode === 'daily' ? 0
      : (mode === 'campaign' ? startDistrict * DISTRICT_LEN : 0) + Math.min(save.wick, 2) * 50 // wick T3 is the revive, not more meters
        + (runBuff === 'head' ? 200 : 0);
    resetWorld();
    distance = distanceSeed;
    curD = districtIdx(distance);
    nextCaptainD = (Math.floor(distance / DISTRICT_LEN) + 1) * DISTRICT_LEN;
    winAt = -1;
    if (!save.seenStory) { save.seenStory = true; saveNow(); }
    // permanent progression seeds (warm-up compression only — the ceiling is untouched):
    lampLight = Math.min(0.36, save.oil * 0.12);          // Morning Oil: lamp starts partly lit (music layers follow)
    runRankShown = rankIdx(save.kills); mileLight = 0;
    // daily return bonus: first run each day = ×2 Light; consecutive days build a streak
    const today = new Date().toDateString();
    dailyX2 = save.lastDay !== today;
    if (dailyX2) {
      const yest = new Date(Date.now() - 864e5).toDateString();
      save.streak = save.lastDay === yest ? (save.streak || 0) + 1 : 1;
      save.lastDay = today; saveNow();
    }
    while (nextSpawnX < W + 500 && spawnSegment(false));
    state = 'playing';
    if (modIdx >= 0) showBanner((mode === 'daily' ? 'DAILY TRIAL — ' : 'NIGHT SHIFT — ') + NIGHT_MODS[modIdx].n, 180);
    if (dailyX2) spawnMessage(player.x + 200, 78, 'FIRST RUN TODAY — ALL LIGHT ×2', 200);
    overlay.classList.add('hidden');
    CG.gameplayStart();
  }

  // ---------- Update ----------
  function update() {
    if (state !== 'playing') return;

    // RS-#042 pace tuning: a 30m runway holds base speed at the start (time to read the first
    // roofs before the climb begins), then a gentler coefficient ramps to a slightly lower
    // plateau (~2600m) — top-end speed was outrunning how fast the combat windows below stay
    // comfortably reactable.
    speed = Math.min(baseSpeed + Math.sqrt(Math.max(0, distance - 30)) * 0.082, 6.2);
    distance += speed / 10;
    player.x += speed;

    // district crossing: banner + the world's mood shifts (Law 2: named milestones)
    const dNow = districtIdx(distance);
    if (dNow !== curD) { curD = dNow; showBanner(DISTRICTS[curD].name, 140); Snd.sparkle(); }
    if (winAt > 0 && drawT >= winAt && state === 'playing') { win(); return; }

    while (nextSpawnX < player.x + W + 260 && spawnSegment(false)); // stops cleanly if the pool is momentarily full; retries next frame after culling
    for (const s of segments) if (s.active && s.x2 < player.x - 260) s.active = false;
    for (const g of guards) {
      if (g.active && g.x < player.x - 260) {
        g.active = false;
        // a skipped (jumped-over) Captain isn't a softlock: the wardens send another shortly
        if (g.cap && g.alive) nextCaptainD = distance + 60;
      }
    }
    for (const f of featherList) if (f.active && f.x < player.x - 260) f.active = false;
    for (const o of lowObs) if (o.active && o.x < player.x - 260) o.active = false;

    // first-gap teach: spot the first upcoming gap early, slow time, show the prompt
    if (!taughtGap) {
      const cx = player.x + player.w/2;
      const cur = segmentAt(cx);
      if (cur) {
        const next = segments.filter(s => s.active && s.x1 > cur.x2 - 6).sort((a,b)=>a.x1-b.x1)[0];
        if (next && next.x1 > cur.x2 + 4 && cur.x2 - cx < 170 && cur.x2 - cx > 0) {
          taughtGap = true;
          spawnMessage(cur.x2 + 8, cur.y - 46, 'HOLD JUMP TO CLEAR THE GAP', 150);
          tutSlowT = 2200;
        }
      }
    }

    const gY = groundYForPlayer();
    if (!player.jumpHeld && player.vy < JUMP_CUT) player.vy = JUMP_CUT; // variable height: release cuts the rise
    player.vy += GRAVITY;
    player.y += player.vy;
    if (gY !== null && player.y >= gY && player.vy >= 0) {
      player.y = gY; player.vy = 0;
      const justLanded = !player.onGround;
      player.onGround = true; player.coyoteT = COYOTE_FRAMES;
      if (justLanded) {
        spawnBurst(player.x+player.w/2, player.y, 2, '#cfd6e6');
        Snd.land();
        if (player.jumpBufT > 0) doJump(); // buffered press fires the moment we touch down
      }
    } else {
      player.onGround = false;
      if (player.coyoteT > 0) player.coyoteT--;
      if (player.sliding) { player.sliding = false; player.slideT = 0; } // slid off the edge
    }
    if (player.jumpBufT > 0) player.jumpBufT--;
    if (player.sliding) {
      player.slideT--;
      if (player.runT % 3 === 0) spawnParticle(player.x - 6, player.y - 2, -0.8 - speed*0.2, -0.4, 12, '#9a8f80');
      if (player.slideT <= 0) player.sliding = false;
    }
    if (player.y > H + 60) { die('gap'); return; }

    player.runT += 1;
    if (player.strikeFlash > 0) player.strikeFlash--;

    for (const g of guards) {
      if (!g.active) continue;
      if (!g.alive) {
        g.deathT += 1;
        if (g.fly > 0) { // launched corpse: tumble (mid) or flat missile (perfect)
          g.x += g.vx; g.y += g.vy;
          g.vy += g.fly === 2 ? 0.08 : 0.3;
          if (g.fly === 2) { // missile dominoes any guard it touches (Lamp Arts T3: wider chain)
            const dR = save.arts >= 3 ? 24 : 15;
            for (const o of guards) {
              if (!o.active || !o.alive || o === g || o.cap) continue; // Captains hold their gate — no domino skip past the 3-hit sequence
              if (Math.abs(o.x - g.x) < dR && Math.abs(o.y - g.y) < 24) {
                o.alive = false; o.deathT = 1; o.fly = 1; o.vx = g.vx * 0.6; o.vy = -2.2; o.spin = 0.35;
                feathers += 1;
                g.chain = (g.chain || 1) + 1; // chain position 2, 3, ... — the jackpot escalator
                const felledPts = 500 * g.chain;
                dominoBonus += felledPts; dominoK += 1;
                bestChain = Math.max(bestChain, g.chain);
                spawnStream(o.x, o.y - 40, 6);
                spawnBurst(o.x, o.y-16, 12, '#ffffff');
                spawnMessage(o.x, o.y-42, 'FELLED +' + felledPts, 32);
                if (g.chain >= 3) { // bowling-night beat: cartoon stars + a hype callout on a big chain
                  spawnBurst(o.x, o.y-16, 8, '#ffe97a');
                  spawnMessage(o.x, o.y-58, (g.chain >= 4 ? 'STRIKE! ' : '') + HYPE_LINES.domino[(rnd()*HYPE_LINES.domino.length)|0], 40);
                  moonReactT = Math.max(moonReactT, 90);
                }
                Snd.domino(); // the sub-garnish moment
                addShake(8);
                slowmoT = Math.max(slowmoT, SLOWMO_MS); // the money shot — let the domino land in slow motion
              }
            }
          }
          if (g.y > H + 50 || g.x > player.x + W + 80) g.active = false;
        }
        continue;
      }
      if (g.stunT > 0) { // stunned wardens stand dazed — free pass or free kill
        g.stunT--;
        if ((g.stunT & 7) === 0) spawnParticle(g.x, g.y - 40, (rnd()-0.5)*0.8, -0.5, 10, '#ffffff');
      } else {
        g.x += g.patrolDir * 0.55;
        if (g.x < g.patrolMin || g.x > g.patrolMax) g.patrolDir *= -1;
      }
      if (g.feint) g.shT++; // shield cycle: up 80 frames, open 70 — the read is patience
      if (g.archer) { // archer: holds his roof, looses a deflectable arrow when you close in
        const range = g.x - (player.x + player.w/2);
        if (range > 50 && range < 300) {
          g.bowT--;
          if (g.bowT <= 0) {
            const slot = arrows.find(a => !a.active);
            if (slot) { slot.active = true; slot.x = g.x - 10; slot.y = g.y - 22; slot.vx = -(speed + 2.6); Snd.swing(); }
            g.bowT = 150;
          }
        }
      }

      // No stealth here — guards never "see" you. The marker is player-facing: it lights up
      // the moment your strike can land, so the cue IS the attack window.
      const sdx = g.x - (player.x + player.w/2);
      g.alerted = sdx > -14 && sdx < strikeRangeX() && Math.abs(g.y - player.y) < STRIKE_RANGE_Y;
      if (!taughtGuard && sdx > 0 && sdx < alertRangeX() + 60) {
        taughtGuard = true;
        spawnMessage(g.x - 10, g.y - 58, 'STRIKE — OR LEAP OVER', 150);
        tutSlowT = 2400; // give the player time to orient, read, and get ready
      }
      const dx = Math.abs(sdx);
      if (graceT <= 0 && g.stunT <= 0 && dx < GUARD_HIT_DX && player.y > g.y - GUARD_CLEAR_DY) { die('guard'); return; }
    }
    if (graceT > 0) graceT--;
    if (strikeCd > 0) strikeCd--;

    // arrows: fly flat; slide under, leap over, or deflect with a timed strike
    for (const a of arrows) {
      if (!a.active) continue;
      a.x += a.vx;
      if (a.vx > 0) { // deflected — it kills what loosed it (or whoever's in the way)
        for (const g of guards) {
          if (!g.active || !g.alive || g.cap) continue;
          if (Math.abs(g.x - a.x) < 10 && Math.abs(g.y - 22 - a.y) < 26) {
            g.alive = false; g.deathT = 1; g.fly = 1; g.vx = 4; g.vy = -2.4; g.spin = 0.3;
            feathers += 1; killPts += PTS_CLEAN; cleanK += 1;
            spawnStream(g.x, g.y - 40, 6);
            spawnBurst(g.x, g.y - 16, 10, '#e8c878');
            spawnMessage(g.x, g.y - 40, 'RETURNED TO SENDER +' + PTS_CLEAN, 30);
            Snd.kill(0);
            a.active = false;
            break;
          }
        }
      } else if (graceT <= 0) {
        const pdx = Math.abs(a.x - (player.x + player.w/2));
        if (pdx < 7 && !player.sliding && Math.abs(a.y - (player.y - 18)) < 9) { die('arrow'); return; }
      }
      if (a.x < player.x - 220 || a.x > player.x + W + 120) a.active = false;
    }
    for (const bz of braziers) if (bz.active && bz.x < player.x - 260) bz.active = false;
    if (modIdx === 0) lampLight = Math.max(0, lampLight - 0.0004); // DARK NIGHT: the lamp burns down

    // Low hazards: the danger is the hanging band [y-46, y-17] — slide fits under it,
    // a full-hold leap from a neighboring roof sails clean over it.
    const pxc = player.x + player.w/2;
    for (const o of lowObs) {
      if (!o.active) continue;
      if (!taughtSlide && o.x - pxc > 0 && o.x - pxc < 150) { // first one ever: slow time, teach the button
        taughtSlide = true;
        spawnMessage(o.x + o.w/2, o.y - 58, 'TAP STRIKE TO SLIDE UNDER', 150);
        tutSlowT = 2400;
      }
      if (graceT <= 0 && pxc + 6 > o.x && pxc - 6 < o.x + o.w) { // graceT: Light Burst / revive carry through the hazard
        const top = player.y - (player.sliding ? SLIDE_H : player.h);
        if (top < o.y - LOWBAR_BOT && player.y > o.y - LOWBAR_TOP) { die('low'); return; }
      }
    }

    const magnetR = 12 * save.arts + (runBuff === 'mag' ? 30 : 0); // Lamp Arts + Mote Magnet buff
    for (const f of featherList) {
      if (!f.active || f.taken) continue;
      f.bob += 0.1;
      const dx = Math.abs(f.x - (player.x+player.w/2));
      const dy = Math.abs((f.y + Math.sin(f.bob)*4) - (player.y - 16));
      if (dx < 16 + magnetR && dy < 18 + magnetR) {
        f.taken = true; f.active = false;
        let gain = (boonFlags.motes2 || modIdx === 2) ? 2 : 1; // GLEAMING MOTES boon / BRIGHT MOTES night
        if (f.fancy) gain *= 2; // rare top-hat mote — doubly dapper, doubly generous
        feathers += gain;
        spawnBurst(f.x, f.y, 6, f.fancy ? '#ffe97a' : '#f1e3c6');
        spawnMessage(f.x, f.y-10, (f.fancy ? 'FANCY MOTE +' : '+') + PTS_LIGHT * gain, f.fancy ? 30 : 20);
        Snd.sparkle();
      }
    }

    // cloak: each point eases toward a spot behind/below the previous one; speed streams it back
    const ax = player.x - 3, ay = player.y - (player.sliding ? SLIDE_H + 2 : player.h) + 8;
    cloak[0].x = ax; cloak[0].y = ay;
    for (let i = 1; i < cloak.length; i++) {
      const flut = Math.sin(player.runT*0.31 + i*1.2) * (player.onGround ? 1.3 : 2.4);
      const tx = cloak[i-1].x - 4.4 - speed*1.05;
      const ty = cloak[i-1].y + (player.onGround ? 2.6 : -1.2) + i*0.5 + flut;
      cloak[i].x += (tx - cloak[i].x) * 0.42;
      cloak[i].y += (ty - cloak[i].y) * 0.42;
    }

    for (const b of birds) {
      if (!b.active) continue;
      if (b.perched) {
        if (b.x - player.x < 88) { b.perched = false; b.vx = 1.4 + rnd()*0.8; b.vy = -1.9; Snd.bird(); } // flee!
      } else {
        b.x += b.vx + speed*0.3; b.y += b.vy; b.vy -= 0.015; b.flap += 0.45;
        if (b.y < -30) b.active = false;
      }
      if (b.x < player.x - 260) b.active = false;
    }

    for (const c of cameos) { // background passerby: one silly reaction line as you draw near
      if (!c.active) continue;
      if (!c.shown && c.x - player.x < 70 && c.x - player.x > -20) {
        c.shown = true;
        spawnMessage(c.x, c.y - 40, CAMEO_LINES[(rnd()*CAMEO_LINES.length)|0], 60);
      }
      if (c.x < player.x - 260) c.active = false;
    }

    // light-streams home toward the lamp head; each arrival feeds lampLight (kills = power made visible)
    const lampX = player.x + 24, lampY = player.y - (player.sliding ? SLIDE_H : player.h) - 4;
    for (const st of streams) {
      if (!st.active) continue;
      const dx = lampX - st.x, dy = lampY - st.y;
      const d = Math.hypot(dx, dy) || 1;
      st.vx += (dx/d) * 0.9; st.vy += (dy/d) * 0.9;
      st.vx *= 0.86; st.vy *= 0.86;
      st.x += st.vx + speed; st.y += st.vy;
      if (d < 14) {
        st.active = false;
        lampLight = Math.min(1, lampLight + LAMP_PER_KILL / 6); // 6 motes per kill
        Snd.chime(Math.round(lampLight * 8)); // the lamp feeds in — pitch rises with the light
        spawnParticle(lampX, lampY, (rnd()-0.5)*1.2, -0.8, 12, '#ffe9b0');
      } else if (st.x < player.x - 200) st.active = false;
    }

    if (++emberT >= 9) { // ambient embers drifting up off the city
      emberT = 0;
      spawnParticle(player.x + rnd()*W, GROUND_Y + 10 - rnd()*90, -0.3 - rnd()*0.4, -0.25 - rnd()*0.3, 26, 'rgba(255,170,90,0.5)');
    }

    for (const p of particles) { if (!p.active) continue; p.x+=p.vx; p.y+=p.vy; p.vy+=0.12; p.life--; if (p.life<=0) p.active=false; }
    for (const m of messages) { if (!m.active) continue; m.t--; if (m.t<=0) m.active=false; }

    // Exponential decay (was linear -0.5/frame): big hits settle with a natural tail instead
    // of cutting off abruptly, and small hits clear fast instead of lingering at a flat rate.
    if (shake > 0.05) shake *= 0.86; else shake = 0;
    // Ease the rendered offset toward a new random target each step rather than snapping to a
    // fresh random value every frame — the old hard per-frame jump is what read as stutter.
    shakeX += ((rnd() - 0.5) * shake - shakeX) * 0.35;
    shakeY += ((rnd() - 0.5) * shake - shakeY) * 0.35;

    // one-time Light bounties + live rank promotion (goal-gradient beats, JF pattern)
    for (const m of MILESTONES) {
      if (!save.miles[m.key] && m.hit()) {
        save.miles[m.key] = 1; mileLight += m.light;
        spawnMessage(player.x + 200, 92, m.label + '  +' + m.light + ' LIGHT', 130);
        Snd.sparkle();
      }
    }
    const liveRank = rankIdx(save.kills + cleanK + heavyK + perfK + dominoK);
    if (liveRank > runRankShown) {
      runRankShown = liveRank;
      spawnMessage(player.x + 200, 64, 'RANK OF ' + RANKS[liveRank].name, 200);
      Snd.newBest();
    }

    distVal.textContent = Math.floor(distance) + 'm';
    nextDist.textContent = (mode === 'campaign' && curD === DISTRICTS.length - 1)
      ? 'BEACON ' + Math.max(0, Math.ceil(nextCaptainD - distance)) + 'm'
      : 'gate ' + Math.max(0, Math.ceil(nextCaptainD - distance)) + 'm';
    scoreVal.textContent = runScore();
    featherVal.textContent = feathers;
  }

  // End-of-run tally: line-item count-up (the retention beat) — rows reveal one by one with
  // ticks, TOTAL counts up, NEW BEST stinger last. Timers cancelled if the player restarts early.
  let tallyTimers = [];
  let tallyDone = false; // gates shop key input until the reveal finishes (variable line count)
  function clearTally() { for (const t of tallyTimers) clearTimeout(t); tallyTimers = []; tallyDone = false; }
  function updateMenuMeta() {
    metaLine.textContent = '◆ Light ' + save.light + ' · ' + RANKS[rankIdx(save.kills)].name +
      (save.streak > 1 ? ' · day ' + save.streak : '') +
      (burstUnlocked() ? ' · LIGHT BURST ready' : '');
  }
  // Campaign map (Law 8: where you're going is always visible): six lamps, lit as districts
  // are relit; tap a reached lamp to start the next run from that checkpoint
  function renderMap() {
    mapLine.innerHTML = '';
    startDistrict = Math.min(startDistrict, save.district);
    DISTRICTS.forEach((d, i) => {
      const s = document.createElement('span');
      const lit = i < save.district, reach = i <= save.district;
      s.className = 'lamp' + (lit ? ' lit' : reach ? ' reach' : '') + (i === startDistrict ? ' sel' : '');
      s.textContent = lit ? '◆' : '◇';
      s.title = d.name;
      if (reach) s.addEventListener('pointerdown', (e) => { e.preventDefault(); e.stopPropagation(); startDistrict = i; renderMap(); });
      mapLine.appendChild(s);
    });
    const n = document.createElement('div'); n.id = 'mapNext';
    n.textContent = save.campaignDone
      ? 'THE GREAT BEACON BURNS · start: ' + DISTRICTS[startDistrict].name
      : 'next: ' + DISTRICTS[save.district].name + (startDistrict !== save.district ? ' · start: ' + DISTRICTS[startDistrict].name : '');
    mapLine.appendChild(n);
    // Rank gates (Law 3): EMBER opens the Daily Trial; BEACON (or a campaign clear) opens Night Shift
    nightBtn.classList.toggle('hiddenBtn', !(save.campaignDone || rankIdx(save.kills) >= 3));
    dailyBtn.classList.toggle('hiddenBtn', rankIdx(save.kills) < 1);
  }
  // Buff chips: tap to buy (when empty) or equip/unequip (when owned) — one rides per run
  function renderBuffs() {
    buffRow.innerHTML = '';
    for (const b of BUFFS) {
      const owned = save.buffs[b.k] || 0;
      const c = document.createElement('div');
      c.className = 'chip' + (save.buffEq === b.k ? ' eq' : '') + (!owned && save.light < b.cost ? ' cant' : '');
      c.innerHTML = owned
        ? b.n + ' ×' + owned + '<span style="opacity:0.6">' + b.d + '</span>'
        : b.n + ' ◆' + b.cost + '<span style="opacity:0.6">' + b.d + '</span>';
      c.addEventListener('pointerdown', (e) => {
        e.preventDefault(); e.stopPropagation();
        if (owned) { save.buffEq = save.buffEq === b.k ? '' : b.k; }
        else if (save.light >= b.cost) { save.light -= b.cost; save.buffs[b.k] = 1; save.buffEq = b.k; Snd.sparkle(); }
        else return;
        saveNow(); renderBuffs(); updateMenuMeta();
      });
      buffRow.appendChild(c);
    }
  }
  // Cloak swatches: live on the runner at all times; buy once, equip any time
  function renderCloaks() {
    cloakRow.innerHTML = '';
    CLOAKS.forEach((cl, i) => {
      const owned = !!save.cloaks[i];
      const c = document.createElement('div');
      c.className = 'chip' + (save.cloak === i ? ' eq' : '') + (!owned && save.light < cl.cost ? ' cant' : '');
      c.innerHTML = '<span class="sw" style="background:' + cl.col + '"></span>' + (owned ? cl.n : cl.n + ' ◆' + cl.cost);
      c.addEventListener('pointerdown', (e) => {
        e.preventDefault(); e.stopPropagation();
        if (owned) { save.cloak = i; Snd.uiTick(2); }
        else if (save.light >= cl.cost) { save.light -= cl.cost; save.cloaks[i] = 1; save.cloak = i; Snd.newBest(); }
        else return;
        saveNow(); renderCloaks(); updateMenuMeta();
      });
      cloakRow.appendChild(c);
    });
  }
  // One-tap spend on the tally screen (Rogue Legacy flow rule: death → tally → tap → running again)
  function buyTrack(i) {
    const tr = TRACKS[i], tier = save[tr.key];
    if (tier >= tr.max || save.light < tr.costs[tier]) return;
    save.light -= tr.costs[tier]; save[tr.key] = tier + 1; saveNow();
    Snd.newBest();
    walletLine.textContent = '◆ Light banked: ' + save.light;
    renderShop(); updateMenuMeta();
  }
  function renderShop() {
    shopEl.innerHTML = '';
    let cheapest = -1, cheapestCost = Infinity, ownedAny = save.oil + save.arts + save.wick > 0;
    TRACKS.forEach((tr, i) => {
      const tier = save[tr.key], maxed = tier >= tr.max, cost = maxed ? 0 : tr.costs[tier];
      if (!maxed && save.light >= cost && cost < cheapestCost) { cheapest = i; cheapestCost = cost; }
      const d = document.createElement('div');
      d.className = 'shopRow show' + (!maxed && save.light >= cost ? '' : ' cant');
      d.innerHTML = '<span><span class="sname">' + (i+1) + '. ' + tr.name + '</span><br><span class="sdesc">' + tr.descs[Math.min(tier, tr.max - 1)] + '</span></span>' +
        '<span class="pips">' + '●'.repeat(tier) + '○'.repeat(tr.max - tier) + '</span>' +
        '<span class="scost">' + (maxed ? 'MAX' : '◆ ' + cost) + '</span>';
      d.addEventListener('pointerdown', (e) => { e.preventDefault(); e.stopPropagation(); buyTrack(i); });
      shopEl.appendChild(d);
    });
    // goal-gradient nudges: cheapest affordable pulses; first-buy callout when nothing owned yet
    if (cheapest >= 0 && shopEl.children[cheapest]) shopEl.children[cheapest].classList.add('pulse');
    firstBuyEl.classList.toggle('show', !ownedAny && cheapest >= 0);
  }
  function showTally(finalScore, isBest, lightEarned) {
    clearTally();
    const rows = [
      ['Distance ' + Math.floor(distance) + 'm', Math.floor(distance) * PTS_PER_M],
      cleanK  ? ['Clean kills ×' + cleanK,  cleanK * PTS_CLEAN]   : null,
      heavyK  ? ['Heavy blows ×' + heavyK,  heavyK * PTS_HEAVY]   : null,
      perfK   ? ['Perfect ×' + perfK,       perfK * PTS_PERFECT]  : null,
      captainK? ['Captains felled ×' + captainK, captainK * PTS_CAPTAIN] : null,
      dominoK ? ['Domino bonus ×' + dominoK, dominoBonus]         : null,
      ['Light ×' + feathers, feathers * PTS_LIGHT],
    ].filter(Boolean);
    tallyEl.innerHTML = '';
    newBestEl.classList.remove('show');
    const els = rows.map(([label, pts]) => {
      const d = document.createElement('div'); d.className = 'trow';
      d.innerHTML = '<span>' + label + '</span><span class="pts">+' + pts + '</span>';
      tallyEl.appendChild(d); return d;
    });
    const tot = document.createElement('div'); tot.className = 'trow total';
    tot.innerHTML = '<span>TOTAL</span><span class="pts" id="totVal">0</span>';
    tallyEl.appendChild(tot);
    rows.forEach((r, i) => tallyTimers.push(setTimeout(() => { els[i].classList.add('show'); Snd.uiTick(i); }, 200 + i * 220)));
    const totStart = 200 + rows.length * 220;
    tallyTimers.push(setTimeout(() => {
      tot.classList.add('show');
      const STEPS = 14, totEl = document.getElementById('totVal');
      for (let s = 1; s <= STEPS; s++) {
        tallyTimers.push(setTimeout(() => {
          totEl.textContent = Math.round(finalScore * s / STEPS);
          Snd.uiTick(s);
          if (s === STEPS && isBest) { newBestEl.classList.add('show'); Snd.newBest(); }
        }, s * 55));
      }
      // wallet count-up + shop reveal after the total lands
      tallyTimers.push(setTimeout(() => {
        walletLine.classList.add('show');
        const WSTEPS = 10, from = save.light - lightEarned;
        for (let s = 1; s <= WSTEPS; s++) {
          tallyTimers.push(setTimeout(() => {
            walletLine.textContent = '◆ Light banked: ' + Math.round(from + lightEarned * s / WSTEPS) +
              '  (+' + lightEarned + (dailyX2 ? ' ×2 daily' : '') + ')';
            Snd.uiTick(s + 3);
            if (s === WSTEPS) { renderShop(); tallyDone = true; }
          }, s * 50));
        }
      }, STEPS * 55 + 150));
    }, totStart));
    const lifeKills = save.kills, rI = rankIdx(lifeKills);
    statsLine.textContent = 'Kills ' + (cleanK + heavyK + perfK + dominoK + captainK) +
      (bestChain > 1 ? ' · Best chain ' + bestChain : '') +
      (rI < RANKS.length - 1 ? ' · ' + (RANKS[rI + 1].at - lifeKills) + ' wardens to ' + RANKS[rI + 1].name : '');
    tallyJokeEl.textContent = TALLY_JOKES[(rnd()*TALLY_JOKES.length)|0]; // silly seasoning — a fresh one-liner every run
  }

  // The ending (Law 1/10): the campaign is beatable, and beating it means something
  function win() {
    deathCause = 'beacon';
    state = 'won'; deathAtT = drawT;
    CG.gameplayStop();
    const firstClear = !save.campaignDone;
    save.campaignDone = true;
    const finalScore = runScore();
    const isBest = finalScore > best;
    if (isBest) {
      best = finalScore;
      try { Save.get().setItem('rooftopSprintBest', String(best)); } catch(e){}
    }
    const lightEarned = (feathers * (dailyX2 ? 2 : 1) + mileLight) * (runBuff === 'dbl' ? 2 : 1) + (firstClear ? 100 : 0);
    save.light += lightEarned;
    save.kills += cleanK + heavyK + perfK + dominoK + captainK;
    lastBank = { light: lightEarned, kills: 0 };
    saveNow();
    updateMenuMeta(); renderMap(); renderBuffs(); renderCloaks();
    adDoubleBtn.classList.toggle('hiddenBtn', adDoubleUsed || lightEarned <= 0);
    document.querySelector('#overlay h1').textContent = 'THE GREAT BEACON BURNS AGAIN';
    const ps = document.querySelectorAll('#overlay p');
    ps[0].textContent = firstClear
      ? 'Six districts glow behind you. The wardens scatter into the dark they made. The city keeps its light — and its Lamplighter. NIGHT SHIFT is open: run as long as the night lasts.'
      : 'The Beacon takes your flame again. The city sleeps safe another night.';
    ps[1].innerHTML = isTouch ? 'tap anywhere to run again' : '<span class="key">SPACE</span> / <span class="key">ENTER</span> / tap — run again';
    ps[1].style.display = '';
    scoreLine.textContent = '';
    showTally(finalScore, isBest, lightEarned);
    startBtn.textContent = 'Run Again';
    overlay.classList.remove('hidden');
    Snd.newBest();
  }

  let revived = false; // Wick & Flint T3 "Second Flame" — once per run
  let adReviveUsed = false, adDoubleUsed = false;
  let lastBank = { light: 0, kills: 0 }; // un-banked if an ad revive resumes the run
  function placeOnNextRoof() { // shared by Second Flame + ad revive: a gap death needs ground
    const next = segments.filter(s => s.active && s.x2 > player.x + 20).sort((a,b)=>a.x1-b.x1)[0];
    if (next) { player.x = Math.max(player.x, next.x1 + 12); player.y = next.y; player.vy = 0; player.onGround = true; }
    else { player.y = GROUND_Y - 40; player.vy = 0; }
  }
  function die(cause) {
    // Warding Charm buff: absorbs one hit before anything else is spent
    if (runBuff === 'ward' && !wardUsed && cause !== 'gap') {
      wardUsed = true;
      graceT = 50;
      spawnBurst(player.x + player.w/2, player.y - 16, 18, '#8fd8b4');
      spawnMessage(player.x + player.w/2, player.y - 56, 'WARDING CHARM', 60);
      Snd.newBest(); addShake(8); slowmoT = Math.max(slowmoT, 400);
      return;
    }
    // Light Burst (unlocked by relighting 2 districts, or at EMBER rank): the lamp absorbs a
    // fatal mistake for half its light. Doesn't work on falls — nothing catches you in a gap.
    if (cause !== 'gap' && burstUnlocked() && lampLight >= 0.5) {
      lampLight -= 0.5;
      graceT = 50;
      spawnBurst(player.x + player.w/2, player.y - 16, 22, '#ffffff');
      spawnBurst(player.x + player.w/2, player.y - 16, 12, '#ffe9b0');
      spawnMessage(player.x + player.w/2, player.y - 56, 'LIGHT BURST', 60);
      Snd.domino(); addShake(10); slowmoT = Math.max(slowmoT, 400);
      return;
    }
    if (save.wick >= 3 && !revived) { // Second Flame: one free return per run, any death
      revived = true;
      graceT = 60;
      if (cause === 'gap') placeOnNextRoof();
      spawnBurst(player.x + player.w/2, player.y - 16, 26, '#ffe9b0');
      spawnMessage(player.x + player.w/2, player.y - 56, 'SECOND FLAME', 70);
      Snd.newBest(); addShake(10); slowmoT = Math.max(slowmoT, 500);
      return;
    }
    deathCause = cause;
    state = 'dead'; player.dead = true; deathAtT = drawT;
    spawnBurst(player.x+player.w/2, player.y-10, 14, '#a44');
    Snd.death(); // the claimed layers collapse back to embers (tick gates on state)
    addShake(10);
    CG.gameplayStop();
    const finalScore = runScore();
    const isBest = finalScore > best;
    if (isBest) {
      best = finalScore;
      try { Save.get().setItem('rooftopSprintBest', String(best)); } catch(e){}
      CG.happytime();
    }
    // bank the run: Light collected (×2 on the first run of the day, ×2 again on a Double Light buff) + bounties
    const lightEarned = (feathers * (dailyX2 ? 2 : 1) + mileLight) * (runBuff === 'dbl' ? 2 : 1);
    const killsEarned = cleanK + heavyK + perfK + dominoK + captainK;
    save.light += lightEarned;
    save.kills += killsEarned;
    lastBank = { light: lightEarned, kills: killsEarned };
    saveNow();
    updateMenuMeta(); renderBuffs(); renderCloaks();
    // rewarded-ad offers (never gating, real value): one revive per run + one Light doubling
    adReviveBtn.classList.toggle('hiddenBtn', adReviveUsed);
    adDoubleBtn.classList.toggle('hiddenBtn', adDoubleUsed || lightEarned <= 0);
    scoreLine.textContent = '';
    showTally(finalScore, isBest, lightEarned);
    bestEl.textContent = `Best score: ${best}`;
    // daily trial keeps its own ladder — one seeded route per day
    if (mode === 'daily') {
      const dk = new Date().toDateString();
      if (save.dailyDate !== dk) { save.dailyDate = dk; save.dailyBest = 0; }
      if (finalScore > (save.dailyBest || 0)) { save.dailyBest = finalScore; scoreLine.textContent = '☀ DAILY BEST'; }
      else scoreLine.textContent = 'Daily best: ' + save.dailyBest;
      saveNow();
    }
    document.querySelector('#overlay h1').textContent =
      cause === 'gap' ? 'THE ROOF RAN OUT' : cause === 'low' ? 'KNOCKED FLAT'
      : cause === 'arrow' ? 'SHOT DOWN' : 'YOUR LAMP WENT OUT';
    // death identity (Law 2): where you fell is part of the story
    document.querySelectorAll('#overlay p')[0].textContent =
      'Felled in ' + DISTRICTS[curD].name + '. ' +
      (cause === 'gap' ? 'The dark streets swallowed you. Hold JUMP longer to leap higher and farther.'
      : cause === 'low' ? 'Slide under low hazards — tap STRIKE when no warden is near.'
      : cause === 'arrow' ? 'An archer found you. Deflect the arrow with a timed STRIKE — or slide beneath it.'
      : 'A warden reached you first. Strike when the gold mark shows — or leap clear and keep your light.');
    // replay in ≤1 input, and say so (CG §9)
    const p1 = document.querySelectorAll('#overlay p')[1];
    p1.innerHTML = isTouch ? 'tap anywhere to run again' : '<span class="key">SPACE</span> / <span class="key">ENTER</span> / tap — run again';
    p1.style.display = '';
    startBtn.textContent = 'Run Again';
    overlay.classList.remove('hidden');
    // interstitial cooldown (CG ad policy): at most one every 2.5 min, never on the first death
    if (Date.now() - lastAdT > AD_COOLDOWN_MS) { lastAdT = Date.now(); CG.interstitial(); }
  }

  // ---------- Drawing ----------
  function drawSkylineLayer(camX, par, spacing, hBase, hue, winAlpha, yBase) {
    const parX = camX * par;
    const first = Math.floor(parX / spacing) - 1;
    for (let i = first; i < first + Math.ceil(W/spacing) + 2; i++) {
      const bx = i*spacing - parX;
      const bh = hBase + ((i*53 + spacing*7) % 64);
      const bw = spacing - 7 - ((i*31) % 10);
      const by = yBase - bh;
      ctx.fillStyle = hue; ctx.fillRect(bx, by, bw, bh + 140);
      // lit windows — deterministic per building, warm and sparse
      ctx.fillStyle = 'rgba(255,186,100,' + winAlpha + ')';
      for (let wy = 0; wy < Math.min(bh - 8, 52); wy += 11) {
        for (let wx = 5; wx < bw - 5; wx += 9) {
          if ((i*7 + wy*13 + wx*5) % 17 < 3) ctx.fillRect(bx + wx, by + 6 + wy, 3, 4);
        }
      }
      if ((i % 4) === 1) { ctx.fillStyle = hue; ctx.fillRect(bx + bw - 8, by - 9, 5, 9); } // chimney
    }
  }
  function drawSkyline(camX) {
    drawSkylineLayer(camX, 0.18, 84, 40, 'rgba(26,17,40,0.85)', 0.12, GROUND_Y + 14);
    drawSkylineLayer(camX, 0.38, 62, 26, 'rgba(17,11,28,0.95)', 0.20, GROUND_Y + 26);
  }
  // Per-district roof trim (Law 9/read-variety): a consistent style, a different accent per
  // zone — the same read (gold edge = gap warning) stays legible everywhere.
  const DISTRICT_TRIM = ['#c9913f', '#e0824a', '#5fae7a', '#8a6ad8', '#5f9ad8', '#e0524a'];
  function drawSegments(camX) {
    for (const s of segments) {
      if (!s.active) continue;
      const sx1=s.x1-camX, sx2=s.x2-camX;
      if (sx2 < -60 || sx1 > W+60) continue;
      const wSeg = sx2 - sx1;
      // rope bridge over the wide gap just behind this roof — sagging rope + slats, birds land on it
      if (s.gapBefore > 0) {
        const bx1 = sx1 - s.gapBefore, bx2 = sx1;
        ctx.strokeStyle = '#4a3826'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(bx1, s.y - 2); ctx.quadraticCurveTo((bx1+bx2)/2, s.y + 10, bx2, s.y - 2); ctx.stroke();
        ctx.strokeStyle = '#5a4632'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(bx1, s.y + 4); ctx.quadraticCurveTo((bx1+bx2)/2, s.y + 15, bx2, s.y + 4); ctx.stroke();
        for (let sx = bx1 + 6; sx < bx2 - 4; sx += 9) {
          const sag = Math.sin(((sx - bx1) / s.gapBefore) * Math.PI) * 10;
          ctx.fillStyle = '#3a2c20'; ctx.fillRect(sx - 2, s.y + sag - 1, 5, 3);
        }
      }
      const dI = districtIdx(Math.max(0, s.dist));
      // building body below the roofline, with faint lit windows of its own
      ctx.fillStyle = '#3d2b47'; ctx.fillRect(sx1, s.y, wSeg, H - s.y + 30);
      // windows rekindle in the Lamplighter's wake: behind the player, more of them light
      // up and burn brighter as lampLight grows — the city answers the claimed light
      for (let wy = 14; wy < H - s.y; wy += 15) {
        for (let wx = 8; wx < wSeg - 8; wx += 13) {
          const wake = s.x1 + wx < player.x;
          const lit = ((s.x1|0)*3 + wy*7 + wx*5) % 19 < (wake ? 3 + lampLight*5 : 3);
          if (lit) {
            ctx.fillStyle = 'rgba(255,186,100,' + (wake ? 0.14 + lampLight*0.4 : 0.14) + ')';
            ctx.fillRect(sx1 + wx, s.y + wy, 4, 5);
          }
        }
      }
      // roof cap: highlight + shingle seams + under-shadow
      ctx.fillStyle = '#8a6274'; ctx.fillRect(sx1, s.y, wSeg, 5);
      ctx.fillStyle = 'rgba(0,0,0,0.22)';
      for (let tx = 10; tx < wSeg - 4; tx += 14) ctx.fillRect(sx1 + tx, s.y + 1, 1, 4);
      ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.fillRect(sx1, s.y + 5, wSeg, 3);
      // edge trim tinted per district (gap-warning read stays identical, just a different accent)
      ctx.fillStyle = DISTRICT_TRIM[dI]; ctx.fillRect(sx1, s.y, 4, 5); ctx.fillRect(sx2-4, s.y, 4, 5);
      // lantern on some roofs — the Alley forces one on every roof (its whole identity is light)
      if (s.alley || ((s.x1 | 0) % 5) < 2) {
        if (wSeg > 70) {
          const lx = sx1 + 14;
          ctx.drawImage(glowImg, lx - 24, s.y - 40, 48, 48);
          ctx.fillStyle = '#241a2e'; ctx.fillRect(lx - 1, s.y - 14, 2, 14);
          ctx.fillStyle = '#ffbe6e'; ctx.fillRect(lx - 2.5, s.y - 19, 5, 6);
        }
        if (s.alley && wSeg > 150) { // second lantern near the far end — the Alley reads dense
          const lx2 = sx2 - 20;
          ctx.drawImage(glowImg, lx2 - 24, s.y - 40, 48, 48);
          ctx.fillStyle = '#241a2e'; ctx.fillRect(lx2 - 1, s.y - 14, 2, 14);
          ctx.fillStyle = '#ffbe6e'; ctx.fillRect(lx2 - 2.5, s.y - 19, 5, 6);
        }
      }
    }
  }
  // District landmark: one unique silhouette per zone, fixed at its district's midpoint so it
  // scrolls into view on approach and passes overhead — "somewhere to go" made visible (Law 8/10).
  const LANDMARK_X = DISTRICTS.map((d, i) => i * DISTRICT_LEN * 10 + DISTRICT_LEN * 5); // world-x, district center
  function drawLandmark(i, lx, camX, glow) {
    const sx = lx - camX;
    if (sx < -140 || sx > W + 140) return;
    const base = GROUND_Y + 20;
    ctx.fillStyle = 'rgba(20,14,30,0.9)';
    if (i === 0) { // THE OLD QUARTER — a leaning clocktower
      ctx.save(); ctx.translate(sx, 0); ctx.rotate(0.03);
      ctx.fillRect(-9, base - 150, 18, 150);
      ctx.beginPath(); ctx.arc(0, base - 150, 13, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = 'rgba(255,210,140,0.5)'; ctx.beginPath(); ctx.arc(0, base - 150, 7, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    } else if (i === 1) { // LANTERN ROW — a market gate arch, hung with light
      ctx.fillRect(sx - 55, base - 90, 12, 90); ctx.fillRect(sx + 43, base - 90, 12, 90);
      ctx.beginPath(); ctx.arc(sx, base - 90, 55, Math.PI, 0); ctx.fill();
      ctx.drawImage(glowImg, sx - 16, base - 100, 32, 32);
    } else if (i === 2) { // THE MARKET SHAMBLES — a stack of stalls and awnings
      for (let k = 0; k < 4; k++) { ctx.fillStyle = 'rgba(20,14,30,'+(0.9-k*0.05)+')'; ctx.fillRect(sx - 60 + k*30, base - 40 - k*22, 26, 40 + k*22); }
    } else if (i === 3) { // TEMPLE STEPS — a tiered spire
      for (let k = 0; k < 5; k++) { const w = 70 - k*13; ctx.fillRect(sx - w/2, base - 40 - k*32, w, 34); }
      ctx.beginPath(); ctx.moveTo(sx - 12, base - 200); ctx.lineTo(sx, base - 232); ctx.lineTo(sx + 12, base - 200); ctx.fill();
    } else if (i === 4) { // THE HIGH TERRACES — an aqueduct of arches
      for (let k = -2; k <= 2; k++) {
        ctx.fillRect(sx + k*38 - 8, base - 120, 16, 120);
        ctx.beginPath(); ctx.arc(sx + k*38 + 19, base - 120, 19, Math.PI, 0); ctx.fill();
      }
    } else { // BEACON RISE — the Great Beacon itself, glowing brighter as the gate nears
      ctx.fillRect(sx - 14, base - 210, 28, 210);
      ctx.fillRect(sx - 24, base - 220, 48, 14);
      const gr = 34 + glow * 40;
      ctx.globalAlpha = 0.4 + glow * 0.6;
      ctx.drawImage(glowImg, sx - gr/2, base - 232 - gr/2, gr, gr);
      ctx.globalAlpha = 1;

  // ---------- Fit canvas to viewport; backing store renders at native resolution ----------
  function fitCanvas() {
    const cssScale = Math.min(window.innerWidth / W, window.innerHeight / H);
    canvas.style.width = (W*cssScale) + 'px';
    canvas.style.height = (H*cssScale) + 'px';
    const k = Math.max(1, Math.min(4, cssScale * (window.devicePixelRatio || 1)));
    if (!skyImg || Math.abs(k - RSCALE) > 0.01) {
      RSCALE = k;
      canvas.width = Math.ceil(W*k); canvas.height = Math.ceil(H*k);
      ctx.setTransform(k, 0, 0, k, 0, 0);
      buildSprites(); // re-render the sprite sheet at the new density so nothing is upscaled
    }
  }
  window.addEventListener('resize', fitCanvas);
  fitCanvas();

  // Fixed-timestep sim (60Hz) so physics are identical on 60/144/165Hz monitors.
  // slowmoT (real ms) = cinematic slow-mo: time feeds the sim scaled down, easing back to 1×.
  // Score is pure distance traveled (never wall-clock), so slow-mo can't cost the player anything.
  const STEP = 1000 / 60;
  const SLOWMO_MS = 620;
  let lastT = 0, acc = 0, slowmoT = 0;
  function loop(now) {
    if (!lastT) lastT = now;
    const dt = Math.min(now - lastT, 100); // cap dt: background-tab return can't fast-forward the sim
    lastT = now;
    const tsImpact = slowmoT > 0 ? Math.max(0.26, 1 - (slowmoT / SLOWMO_MS) * 0.74) : 1;
    // tutorial slow: steady 0.35× while the prompt is up, easing back over the last 400ms
    const tsTut = tutSlowT > 400 ? 0.35 : tutSlowT > 0 ? 0.35 + 0.65 * (1 - tutSlowT/400) : 1;
    const ts = Math.min(tsImpact, tsTut);
    slowmoT = Math.max(0, slowmoT - dt);
    tutSlowT = Math.max(0, tutSlowT - dt);
    Snd.setTs(ts); // slow-mo darkens the whole mix through a low-pass sweep
    if (state === 'resuming') { // 3-2-1 re-entry after a pause
      resumeMs -= dt;
      if (resumeMs <= 0) { state = 'playing'; CG.gameplayStart(); }
    }
    acc += dt * ts;
    while (acc >= STEP) { update(); acc -= STEP; }
    draw();
    requestAnimationFrame(loop);
  }

  // Start rendering IMMEDIATELY — never gate the game on the ad-SDK handshake (it can take
  // seconds off-platform and caused a visible background-only stall at boot).
  resetWorld();
  while (nextSpawnX < W + 500 && spawnSegment(false));
  bestEl.textContent = best > 0 ? `Best score: ${best}` : '';
  runRankShown = rankIdx(save.kills);
  updateMenuMeta();
  renderMap(); renderBuffs(); renderCloaks();
  // fantasy frame (Law 10): three lines on first boot, one line after
  document.querySelectorAll('#overlay p')[0].innerHTML = save.seenStory
    ? 'Run the rooftops. Take back the light.'
    : 'The wardens snuffed every lamp and hoard the light.<br>You carry the last living flame.<br>Relight six districts. Reach the Great Beacon.';
  requestAnimationFrame(loop);
  // SDK call order still matters: game.* calls only fire after init() resolves (sdkLive).
  CG.init(() => {
    CG.loadingStart(); CG.loadingStop();
    // platform mute setting (CG guideline) — API shape guarded, no-op off-platform
    try {
      const s = window.CrazyGames?.SDK?.game?.settings;
      const add = s && (s.addListener || s.addEventListener);
      if (add) add.call(s, 'muteAudio', (m) => { Snd.setMuted(!!m); syncMuteBtn(); });
    } catch(e){}
  });
})();
</script>
