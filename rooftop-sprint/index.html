<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Rooftop Sprint</title>
<!-- Verify against current CrazyGames SDK docs before submitting -->
<script src="https://sdk.crazygames.com/crazygames-sdk-v3.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #0d0d12;
    overflow: hidden;
    font-family: 'Georgia', serif;
    touch-action: none;
    user-select: none;
  }
  #wrap {
    position: relative;
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    background: #0d0d12;
  }
  canvas#game {
    background: linear-gradient(#1a1330 0%, #3a2150 45%, #6b3a4a 75%, #c97b4a 100%);
    display: block;
  }
  #hud {
    position: absolute; top: 10px; left: 0; right: 0;
    display: flex; justify-content: space-between; padding: 0 16px;
    color: #f1e3c6; pointer-events: none;
    text-shadow: 0 2px 6px rgba(0,0,0,0.8);
  }
  #hud .label { font-size: 10px; letter-spacing: 1.5px; opacity: 0.75; text-transform: uppercase; }
  #hud .value { font-size: 18px; font-weight: bold; }
  #overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: rgba(8,6,14,0.82);
    color: #f1e3c6; text-align: center; padding: 20px;
  }
  #overlay h1 {
    font-size: 30px; letter-spacing: 3px; margin-bottom: 8px;
    color: #e8c878; text-shadow: 0 0 18px rgba(232,200,120,0.5);
  }
  #overlay p { font-size: 12px; max-width: 340px; line-height: 1.55; opacity: 0.85; margin-bottom: 5px; }
  #overlay .key { color: #e8c878; font-weight: bold; }
  #overlay button {
    margin-top: 16px; padding: 12px 30px; font-size: 14px; letter-spacing: 2px;
    text-transform: uppercase; background: #c9913f; color: #1a1330;
    border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-family: inherit;
  }
  #overlay button:active { transform: scale(0.97); }
  #overlay.hidden { display: none; }
  #scoreLine { font-size: 15px; margin-top: 8px; color: #f1e3c6; }
  #best { font-size: 11px; opacity: 0.65; margin-top: 3px; }
  #touchControls {
    position: absolute; bottom: 0; left: 0; right: 0; height: 30%;
    display: flex; pointer-events: none;
  }
  .tbtn {
    flex: 1; display: flex; align-items: center; justify-content: center;
    pointer-events: auto;
    font-size: 12px; letter-spacing: 2px; text-transform: uppercase;
    color: rgba(241,227,198,0.55); text-shadow: 0 1px 4px rgba(0,0,0,0.8);
  }
  #btnJump { border-right: 1px solid rgba(241,227,198,0.08); }
  .tbtn:active { background: rgba(232,200,120,0.08); }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="480" height="270"></canvas>
  <div id="hud">
    <div><div class="label">Distance</div><div class="value" id="distVal">0m</div></div>
    <div style="text-align:right"><div class="label">Light</div><div class="value" id="featherVal">0</div></div>
  </div>
  <div id="overlay">
    <h1>ROOFTOP SPRINT</h1>
    <p>The city's lights are going out. You are the Lamplighter — run the rooftops, strike the wardens who hoard the light, and carry it home in your lamp.</p>
    <p><span class="key">SPACE / LEFT SIDE</span> hold to jump higher &nbsp;&middot;&nbsp; <span class="key">X / RIGHT SIDE</span> strike / slide</p>
    <div id="scoreLine"></div>
    <div id="best"></div>
    <button id="startBtn">Begin the Run</button>
  </div>
  <div id="touchControls">
    <div class="tbtn" id="btnJump">JUMP</div>
    <div class="tbtn" id="btnStrike">STRIKE</div>
  </div>
</div>
<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const GROUND_Y = H - 48;

  const overlay = document.getElementById('overlay');
  const startBtn = document.getElementById('startBtn');
  const distVal = document.getElementById('distVal');
  const featherVal = document.getElementById('featherVal');
  const scoreLine = document.getElementById('scoreLine');
  const bestEl = document.getElementById('best');
  const btnJump = document.getElementById('btnJump');
  const btnStrike = document.getElementById('btnStrike');

  /* ===== CrazyGames SDK (graceful no-op offline; verify call names vs current docs) ===== */
  // sdkLive = init() actually resolved (only true on the CrazyGames platform); every game/ad
  // call is gated on it — calling the SDK pre-init or off-platform just logs errors and is dropped.
  let sdkLive = false;
  const CG = {
    init(cb){ try{ if(window.CrazyGames?.SDK){ window.CrazyGames.SDK.init().then(()=>{ sdkLive = true; cb&&cb(); }).catch(()=>cb&&cb()); return; } }catch(e){} cb&&cb(); },
    loadingStart(){ try{ if(sdkLive) window.CrazyGames.SDK.game.loadingStart(); }catch(e){} },
    loadingStop(){ try{ if(sdkLive) window.CrazyGames.SDK.game.loadingStop(); }catch(e){} },
    gameplayStart(){ try{ if(sdkLive) window.CrazyGames.SDK.game.gameplayStart(); }catch(e){} },
    gameplayStop(){ try{ if(sdkLive) window.CrazyGames.SDK.game.gameplayStop(); }catch(e){} },
    happytime(){ try{ if(sdkLive) window.CrazyGames.SDK.game.happytime(); }catch(e){} },
    interstitial(){ try{ if(sdkLive) window.CrazyGames.SDK.ad.requestAd("midgame", {}); }catch(e){} },
    rewarded(onReward){
      try{ if(sdkLive && window.CrazyGames?.SDK?.ad?.requestAd){
        window.CrazyGames.SDK.ad.requestAd("rewarded", {
          adFinished(){ onReward&&onReward(); },
          adError(){ onReward&&onReward(); },
        }); return;
      } }catch(e){}
      onReward&&onReward();
    },
  };
  // SDK.data throws "not initialized" if touched before CG.init() resolves — only read/write it
  // after that point. Use localStorage directly for the initial read and as the always-safe fallback.
  const Save = {
    get(){ try{ return (sdkLive && window.CrazyGames?.SDK?.data) || localStorage; }catch(e){ return localStorage; } },
  };

  let best = parseInt(localStorage.getItem('rooftopSprintBest') || '0', 10) || 0;

  // ---------- Pre-rendered art (rebuilt when the render scale changes; per-frame cost is a drawImage) ----------
  // RSCALE = canvas device pixels per logical unit. All game logic stays in 480×270 logical space;
  // the canvas backing store renders at native resolution so vector art is crisp on any screen.
  let RSCALE = 1;
  function makeCanvas(w, h, fn) {
    const c = document.createElement('canvas');
    c.width = Math.ceil(w * RSCALE); c.height = Math.ceil(h * RSCALE);
    const g = c.getContext('2d'); g.setTransform(RSCALE, 0, 0, RSCALE, 0, 0);
    fn(g); return c;
  }
  let skyImg, moonImg, glowImg, cloudImg, vignImg;
  function buildSprites() {
  skyImg = makeCanvas(W, H, g => {
    const gr = g.createLinearGradient(0, 0, 0, H);
    gr.addColorStop(0, '#131022'); gr.addColorStop(0.42, '#3a2150');
    gr.addColorStop(0.72, '#7a3f52'); gr.addColorStop(1, '#c97b4a');
    g.fillStyle = gr; g.fillRect(0, 0, W, H);
  });
  moonImg = makeCanvas(120, 120, g => {
    for (let r = 54; r > 26; r -= 2) { g.globalAlpha = 0.028; g.fillStyle = '#ffe9c4'; g.beginPath(); g.arc(60, 60, r, 0, Math.PI*2); g.fill(); }
    g.globalAlpha = 1; g.fillStyle = '#f5e7c8'; g.beginPath(); g.arc(60, 60, 24, 0, Math.PI*2); g.fill();
    g.fillStyle = 'rgba(210,185,150,0.5)';
    g.beginPath(); g.arc(52, 54, 5, 0, Math.PI*2); g.fill();
    g.beginPath(); g.arc(66, 66, 3.4, 0, Math.PI*2); g.fill();
    g.beginPath(); g.arc(63, 48, 2.6, 0, Math.PI*2); g.fill();
  });
  glowImg = makeCanvas(48, 48, g => {
    const gr = g.createRadialGradient(24, 24, 2, 24, 24, 24);
    gr.addColorStop(0, 'rgba(255,190,110,0.5)'); gr.addColorStop(1, 'rgba(255,190,110,0)');
    g.fillStyle = gr; g.fillRect(0, 0, 48, 48);
  });
  cloudImg = makeCanvas(150, 40, g => {
    g.fillStyle = 'rgba(235,210,205,0.045)';
    for (let i = 0; i < 26; i++) { // many small overlapping puffs → soft mass, no bubble edges
      const cx = 18 + (i*127.3)%116, cy = 16 + ((i*67.7)%14) + Math.sin(i)*3, r = 9 + (i*43)%8;
      g.beginPath(); g.arc(cx, cy, r, 0, Math.PI*2); g.fill();
    }
  });
  vignImg = makeCanvas(W, H, g => {
    const gr = g.createRadialGradient(W/2, H*0.45, H*0.42, W/2, H*0.55, H*0.85);
    gr.addColorStop(0, 'rgba(0,0,0,0)'); gr.addColorStop(1, 'rgba(8,5,16,0.42)');
    g.fillStyle = gr; g.fillRect(0, 0, W, H);
  });
  } // end buildSprites
  // deterministic star field (twinkle is draw-side only)
  const stars = Array.from({length: 36}, (_, i) => ({ x: (i*97.3)%W, y: ((i*61.7)%86)+4, tw: (i*37)%100 }));
  let drawT = 0; // visual-only clock (advances every rendered frame, even on menus)

  // ---------- World state ----------
  let state = 'menu'; // menu | playing | dead
  let speed = 0, baseSpeed = 2.1;
  let distance = 0;
  let feathers = 0; // internal name kept; player-facing label is "Light"
  let shake = 0;
  // Lamplighter run-state: 0→1, fed by lamp-light streamed from killed wardens.
  // Drives the weapon glow radius + rekindled windows now; music layers key off it in Batch 3.
  let lampLight = 0;
  const LAMP_PER_KILL = 0.12;

  // ---------- Fixed-size pools (perf contract: no per-frame allocation) ----------
  const MAX_PARTICLES = 80;
  const particles = Array.from({length: MAX_PARTICLES}, () => ({active:false,x:0,y:0,vx:0,vy:0,life:0,color:'#fff'}));
  function spawnParticle(x,y,vx,vy,life,color){
    for(const p of particles){ if(!p.active){ p.active=true;p.x=x;p.y=y;p.vx=vx;p.vy=vy;p.life=life;p.color=color; return; } }
  }
  function spawnBurst(x,y,n,color){
    for(let i=0;i<n;i++) spawnParticle(x,y,(Math.random()-0.5)*3.2,(Math.random()-1.2)*3.2,18+Math.random()*12,color);
  }

  const MAX_MESSAGES = 6;
  const messages = Array.from({length: MAX_MESSAGES}, () => ({active:false,x:0,y:0,t:0,t0:26,text:''}));
  function spawnMessage(x,y,text,dur){
    for(const m of messages){ if(!m.active){ m.active=true;m.x=x;m.y=y;m.t=dur||26;m.t0=m.t;m.text=text; return; } }
  }

  const MAX_SEGMENTS = 14; // spawn window ÷ min roof length can hit ~11 live segments — 10 exhausted the pool and punched holes in the world
  const segments = Array.from({length: MAX_SEGMENTS}, () => ({active:false,x1:0,x2:0,y:0}));
  const MAX_GUARDS = 10;
  const guards = Array.from({length: MAX_GUARDS}, () => ({active:false,alive:false,x:0,y:0,w:16,h:26,patrolDir:1,patrolMin:0,patrolMax:0,alerted:false,deathT:0,vx:0,vy:0,spin:0,fly:0})); // fly: 0=fade, 1=tumble (mid hit), 2=missile (perfect hit)
  const MAX_FEATHERS = 14;
  const featherList = Array.from({length: MAX_FEATHERS}, () => ({active:false,taken:false,x:0,y:0,bob:0}));
  const MAX_LOWOBS = 8; // low hazards: slide under the hanging band, or clear the whole thing with a full leap
  const lowObs = Array.from({length: MAX_LOWOBS}, () => ({active:false,x:0,y:0,w:0,kind:0})); // kind: 0=clothesline 1=beam 2=sign
  // light-streams: motes that fly from a killed warden's lamp into the player's — arrival feeds lampLight
  const MAX_STREAMS = 24;
  const streams = Array.from({length: MAX_STREAMS}, () => ({active:false,x:0,y:0,vx:0,vy:0}));
  function spawnStream(x,y,n){
    let spawned = 0;
    for(const s of streams){ if(!s.active){ s.active=true;s.x=x+(Math.random()-0.5)*8;s.y=y+(Math.random()-0.5)*10;s.vx=0;s.vy=-1-Math.random(); if(++spawned>=n) break; } }
  }
  const MAX_BIRDS = 5;
  const birds = Array.from({length: MAX_BIRDS}, () => ({active:false,perched:true,x:0,y:0,vx:0,vy:0,flap:0}));
  // cloak verlet chain (world-space points; index 0 anchors at the shoulders)
  const cloak = Array.from({length: 6}, () => ({x:0,y:0}));
  let emberT = 0;

  // ---------- Player ----------
  const player = {
    x: 80, y: GROUND_Y, w: 18, h: 28,
    vy: 0, onGround: true,
    coyoteT: 0, jumpBufT: 0, jumpHeld: false,
    sliding: false, slideT: 0,
    strikeFlash: 0,
    dead: false, runT: 0,
  };
  const GRAVITY = 0.34;
  const JUMP_V = -7.2;
  const JUMP_CUT = -2.6;   // release early → rise is cut here: tap = short hop, hold = full leap
  const COYOTE_FRAMES = 5; // ~80ms forgiveness after running off a roof edge
  const BUFFER_FRAMES = 6; // ~100ms early jump press fires the instant you land
  const SLIDE_FRAMES = 32;
  const SLIDE_H = 14;      // sliding hitbox height (standing = player.h 28)
  const LOWBAR_BOT = 17, LOWBAR_TOP = 46; // hazard band above the roof (slide fits under 17; a full 76px leap clears 46)
  const STRIKE_RANGE_Y = 30;
  const GUARD_HIT_DX = 15, GUARD_CLEAR_DY = 22; // feet must be this far above guard.y to jump clear
  // Staff reach grows with run speed so the reaction window stays humanly possible (~300ms)
  // at any pace — at base range 36px and 4px/frame closing the window was only ~80ms.
  function strikeRangeX() { return 42 + speed * 14; }
  function alertRangeX() { return 60 + speed * 25; } // marker heads-up before the windows open
  // Timing windows (defined in TIME via closing speed, so they feel identical at any pace):
  // PERFECT = last ~7 frames before contact, MID = ~9 frames before that, FAR = rest of the reach.
  function strikeWindows() {
    const closing = speed + 0.55;
    return { perfect: GUARD_HIT_DX + closing * 7, mid: GUARD_HIT_DX + closing * 16 };
  }
  let graceT = 0;        // brief invulnerability after a lunge-kill so chained guards can't cheap-kill
  let taughtGuard = false, taughtGap = false, taughtSlide = false;
  let deathCause = '';   // 'gap' | 'guard' | 'low' — picks the death-screen tip (and feeds the bot harness)
  let tutSlowT = 0;      // real ms — tutorial slow-time so teach prompts can be read (see loop)

  let nextSpawnX = 0;
  let lastRoofHadLow = false; // no low hazards on consecutive roofs — a slide ends with no time to start the next one
  let lastGapEndX = 0;        // landing edge of the most recent gap — hazards must sit beyond any jump-arc landing

  function resetWorld() {
    for(const s of segments) s.active=false;
    for(const g of guards) g.active=false;
    for(const f of featherList) f.active=false;
    for(const o of lowObs) o.active=false;
    for(const p of particles) p.active=false;
    for(const m of messages) m.active=false;
    for(const b of birds) b.active=false;
    for(const st of streams) st.active=false;
    lampLight = 0; // the lamp starts cold every run (progression hooks may seed it later)
    for(const c of cloak){ c.x = 80 - 4; c.y = GROUND_Y - 22; }
    distance = 0; feathers = 0; speed = baseSpeed; shake = 0; graceT = 0;
    player.x = 80; player.y = GROUND_Y; player.vy = 0;
    player.onGround = true; player.coyoteT = 0; player.jumpBufT = 0; player.jumpHeld = false;
    player.sliding = false; player.slideT = 0; player.dead = false; player.strikeFlash=0;
    nextSpawnX = 0; lastRoofHadLow = false; lastGapEndX = 0;
    spawnSegment(true);
  }

  function spawnSegment(first) {
    let lastX2 = 0, lastY = GROUND_Y;
    for(const s of segments){ if(s.active) { lastX2 = Math.max(lastX2, s.x2); } }
    if (!first) {
      for(const s of segments){ if(s.active && s.x2===lastX2){ lastY = s.y; } }
    }
    const gapRoll = Math.random();
    // Single-jump rule: a full-hold jump gives ~39 frames of air even onto a +20 step-up, so cap
    // gap width at speed×26 frames of travel — late presses and step-ups still clear (re-simmed
    // with tools/rs_playtest.js after the double-jump removal).
    let gap = first ? 0 : (gapRoll < 0.32 ? Math.min(34 + Math.random()*26 + Math.min(distance/40, 26), speed * 26) : 0);
    let y = lastY;
    if (gap > 0) {
      const lvl = Math.random();
      if (lvl < 0.4) y = Math.max(GROUND_Y - 34, lastY - 20);
      else if (lvl < 0.7) y = Math.min(GROUND_Y, lastY + 20);
    }
    y = Math.max(GROUND_Y - 40, Math.min(GROUND_Y, y));
    const x1 = lastX2 + gap;
    const len = first ? 260 : 110 + Math.random()*130;
    const x2 = x1 + len;
    const slot = segments.find(s => !s.active);
    if (!slot) return false; // pool exhausted — NEVER advance nextSpawnX past a roof that doesn't exist
    slot.active=true; slot.x1=x1; slot.x2=x2; slot.y=y;
    if (gap > 0) lastGapEndX = x1;

    // One occupant per roof — a guard OR a low hazard, never both (a guard in strike range would
    // steal the context button right when the player needs it to slide).
    const occRoll = Math.random();
    let placedLow = false;
    if (!first && distance > 140 && len > 90 && occRoll < 0.5) {
      const gx = x1 + len * (0.4 + Math.random()*0.35);
      const gslot = guards.find(g => !g.active);
      if (gslot) {
        gslot.active=true; gslot.alive=true; gslot.x=gx; gslot.y=y;
        gslot.patrolDir = Math.random()<0.5?1:-1;
        gslot.patrolMin = x1+16; gslot.patrolMax = x2-16; gslot.alerted=false; gslot.deathT=0;
        gslot.fly=0; gslot.vx=0; gslot.vy=0; gslot.spin=0;
      }
    } else if (!first && gap === 0 && !lastRoofHadLow && distance > 220 && len > 110 && occRoll < 0.8) {
      // gap === 0: a hazard on the far side of a forced gap-jump would catch the player
      // mid-arc where sliding is impossible — low hazards only appear on contiguous roofs
      const oslot = lowObs.find(o => !o.active);
      const ow = 24 + Math.random()*14;
      const ox = x1 + len*(0.35 + Math.random()*0.3) - ow/2;
      // A full-hold gap jump lands up to ~42 frames of travel past the gap edge (it can overfly
      // a short roof entirely) — the bar needs to clear that arc plus reaction+slide room.
      if (oslot && ox - lastGapEndX > 46 * (speed + 0.6)) {
        oslot.active = true; oslot.kind = (Math.random()*3)|0;
        oslot.w = ow; oslot.x = ox; oslot.y = y;
        placedLow = true;
      }
    }
    lastRoofHadLow = placedLow;
    if (!placedLow && Math.random() < 0.5) { // no feathers on hazard roofs — a high feather would bait a jump into the band
      const fx = gap>0 ? lastX2+gap/2 : x1 + len*Math.random();
      const fy = y - 36 - Math.random()*30;
      const fslot = featherList.find(f => !f.active);
      if (fslot) { fslot.active=true; fslot.taken=false; fslot.x=fx; fslot.y=fy; fslot.bob=Math.random()*Math.PI*2; }
    }
    if (!first && Math.random() < 0.3) { // perched bird on the roof edge — flees as you close in
      const bslot = birds.find(b => !b.active);
      if (bslot) { bslot.active=true; bslot.perched=true; bslot.x=x1+8+Math.random()*(len-16); bslot.y=y; bslot.vx=0; bslot.vy=0; bslot.flap=Math.random()*6; }
    }
    nextSpawnX = x2;
    return true;
  }

  function segmentAt(x) {
    for (const s of segments) { if (s.active && x >= s.x1-6 && x <= s.x2+6) return s; }
    return null;
  }
  function groundYForPlayer() {
    // Check every segment with strict bounds — segmentAt's ±6px tolerance could match the
    // segment we just left and report "no ground" for one frame at a contiguous seam
    // (harmless with double jump, but it cancelled slides mid-hazard).
    const cx = player.x + player.w/2;
    for (const s of segments) { if (s.active && cx >= s.x1 && cx <= s.x2) return s.y; }
    return null;
  }

  // ---------- Input ----------
  function doJump() {
    player.vy = JUMP_V; player.onGround = false;
    player.coyoteT = 0; player.jumpBufT = 0;
    player.sliding = false; player.slideT = 0; // jump cancels a slide
    spawnBurst(player.x+player.w/2, player.y, 3, '#cfd6e6');
  }
  function jumpPress() {
    if (state !== 'playing') return;
    player.jumpHeld = true;
    if (player.onGround || player.coyoteT > 0) doJump();
    else player.jumpBufT = BUFFER_FRAMES; // pressed just before landing → fires on touchdown
  }
  function jumpRelease() { player.jumpHeld = false; }
  function startSlide() {
    if (!player.onGround || player.sliding) return;
    player.sliding = true; player.slideT = SLIDE_FRAMES;
    spawnBurst(player.x+player.w/2, player.y, 4, '#9a8f80');
  }
  // Context action button (2-button philosophy): a guard in staff reach always wins the press;
  // otherwise a low hazard coming up means slide; otherwise the staff just whiffs.
  function tryAction() {
    if (state !== 'playing') return;
    let nearest = null, nearestDist = Infinity;
    for (const g of guards) {
      if (!g.active || !g.alive) continue;
      const dx = g.x - (player.x + player.w/2), dy = g.y - player.y;
      if (dx > -14 && dx < strikeRangeX() && Math.abs(dy) < STRIKE_RANGE_Y) {
        const d = Math.hypot(dx,dy);
        if (d < nearestDist) { nearestDist = d; nearest = g; }
      }
    }
    if (!nearest) {
      const px = player.x + player.w/2;
      for (const o of lowObs) {
        if (!o.active) continue;
        // trigger window is capped so the 32-frame slide always outlasts the hazard:
        // 32×speed ≥ trigger + w + player margin holds at every speed obstacles spawn at
        if (o.x + o.w > px - 6 && o.x - px < 10 + speed*12) { startSlide(); return; }
      }
    }
    player.strikeFlash = 8;
    if (nearest) {
      // Lunge-dash: blink through the target — turns each kill into forward momentum
      const trailFrom = player.x;
      player.x = Math.max(player.x, nearest.x - player.w/2 + 8);
      for (let tx = trailFrom; tx < player.x; tx += 9) spawnParticle(tx, player.y - 14, -0.5, 0, 10, '#e8c878');
      graceT = 12;
      nearest.alive = false; nearest.deathT = 1;
      feathers += 1;
      spawnStream(nearest.x, nearest.y - 40, 6); // the warden's lamp-light streams into yours
      // Timing tiers by how close you let them get (closer = riskier = bigger payoff)
      const w = strikeWindows();
      const tierDx = nearest.x - (trailFrom + player.w/2); // range at the moment of the press (pre-lunge)
      if (tierDx <= w.perfect) {          // PERFECT — staff shot: guard rockets across the screen, dominoes others
        nearest.fly = 2; nearest.vx = 16; nearest.vy = -1.2; nearest.spin = 0.5;
        feathers += 1;
        spawnBurst(nearest.x, nearest.y-16, 16, '#ffffff');
        spawnBurst(nearest.x, nearest.y-16, 10, '#e8c878');
        spawnMessage(nearest.x, nearest.y-44, 'PERFECT', 40);
        shake = 12;
        slowmoT = Math.max(slowmoT, 300); // brief dip so the launch reads
      } else if (tierDx <= w.mid) {       // MID — heavy blow: launched half a screen, tumbling
        nearest.fly = 1; nearest.vx = 7; nearest.vy = -2.6; nearest.spin = 0.28;
        spawnBurst(nearest.x, nearest.y-16, 12, '#f0a04a');
        spawnMessage(nearest.x, nearest.y-42, 'HEAVY BLOW', 32);
        shake = 9;
        slowmoT = Math.max(slowmoT, 200);
      } else {                            // FAR — clean kill
        nearest.fly = 0;
        spawnBurst(nearest.x, nearest.y-16, 10, '#e8c878');
        spawnMessage(nearest.x, nearest.y-40, 'CLEAN');
        shake = 6;
      }
    }
  }

  window.addEventListener('keydown', (e) => {
    if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); if (!e.repeat) jumpPress(); }
    if (e.code === 'KeyX' || e.code === 'KeyF') { e.preventDefault(); if (!e.repeat) tryAction(); }
    if (e.code === 'Enter' && state !== 'playing') { beginGame(); }
  });
  window.addEventListener('keyup', (e) => {
    if (e.code === 'Space' || e.code === 'ArrowUp') jumpRelease();
  });
  btnJump.addEventListener('pointerdown', (e) => { e.preventDefault(); jumpPress(); });
  window.addEventListener('pointerup', () => jumpRelease());     // release anywhere ends the hold
  window.addEventListener('pointercancel', () => jumpRelease());
  btnStrike.addEventListener('pointerdown', (e) => { e.preventDefault(); tryAction(); });
  startBtn.addEventListener('click', () => beginGame());
  canvas.addEventListener('pointerdown', () => { if (state === 'dead') beginGame(); });

  function beginGame() {
    resetWorld();
    while (nextSpawnX < W + 500 && spawnSegment(false));
    state = 'playing';
    overlay.classList.add('hidden');
    CG.gameplayStart();
  }

  // ---------- Update ----------
  function update() {
    if (state !== 'playing') return;

    speed = baseSpeed + Math.sqrt(distance) * 0.09;
    distance += speed / 10;
    player.x += speed;

    while (nextSpawnX < player.x + W + 260 && spawnSegment(false)); // stops cleanly if the pool is momentarily full; retries next frame after culling
    for (const s of segments) if (s.active && s.x2 < player.x - 260) s.active = false;
    for (const g of guards) if (g.active && g.x < player.x - 260) g.active = false;
    for (const f of featherList) if (f.active && f.x < player.x - 260) f.active = false;
    for (const o of lowObs) if (o.active && o.x < player.x - 260) o.active = false;

    // first-gap teach: spot the first upcoming gap early, slow time, show the prompt
    if (!taughtGap) {
      const cx = player.x + player.w/2;
      const cur = segmentAt(cx);
      if (cur) {
        const next = segments.filter(s => s.active && s.x1 > cur.x2 - 6).sort((a,b)=>a.x1-b.x1)[0];
        if (next && next.x1 > cur.x2 + 4 && cur.x2 - cx < 170 && cur.x2 - cx > 0) {
          taughtGap = true;
          spawnMessage(cur.x2 + 8, cur.y - 46, 'HOLD JUMP TO CLEAR THE GAP', 150);
          tutSlowT = 2200;
        }
      }
    }

    const gY = groundYForPlayer();
    if (!player.jumpHeld && player.vy < JUMP_CUT) player.vy = JUMP_CUT; // variable height: release cuts the rise
    player.vy += GRAVITY;
    player.y += player.vy;
    if (gY !== null && player.y >= gY && player.vy >= 0) {
      player.y = gY; player.vy = 0;
      const justLanded = !player.onGround;
      player.onGround = true; player.coyoteT = COYOTE_FRAMES;
      if (justLanded) {
        spawnBurst(player.x+player.w/2, player.y, 2, '#cfd6e6');
        if (player.jumpBufT > 0) doJump(); // buffered press fires the moment we touch down
      }
    } else {
      player.onGround = false;
      if (player.coyoteT > 0) player.coyoteT--;
      if (player.sliding) { player.sliding = false; player.slideT = 0; } // slid off the edge
    }
    if (player.jumpBufT > 0) player.jumpBufT--;
    if (player.sliding) {
      player.slideT--;
      if (player.runT % 3 === 0) spawnParticle(player.x - 6, player.y - 2, -0.8 - speed*0.2, -0.4, 12, '#9a8f80');
      if (player.slideT <= 0) player.sliding = false;
    }
    if (player.y > H + 60) { die('gap'); return; }

    player.runT += 1;
    if (player.strikeFlash > 0) player.strikeFlash--;

    for (const g of guards) {
      if (!g.active) continue;
      if (!g.alive) {
        g.deathT += 1;
        if (g.fly > 0) { // launched corpse: tumble (mid) or flat missile (perfect)
          g.x += g.vx; g.y += g.vy;
          g.vy += g.fly === 2 ? 0.08 : 0.3;
          if (g.fly === 2) { // missile dominoes any guard it touches
            for (const o of guards) {
              if (!o.active || !o.alive || o === g) continue;
              if (Math.abs(o.x - g.x) < 15 && Math.abs(o.y - g.y) < 24) {
                o.alive = false; o.deathT = 1; o.fly = 1; o.vx = g.vx * 0.6; o.vy = -2.2; o.spin = 0.35;
                feathers += 1;
                spawnStream(o.x, o.y - 40, 6);
                spawnBurst(o.x, o.y-16, 12, '#ffffff');
                spawnMessage(o.x, o.y-42, 'FELLED', 32);
                shake = Math.max(shake, 8);
                slowmoT = Math.max(slowmoT, SLOWMO_MS); // the money shot — let the domino land in slow motion
              }
            }
          }
          if (g.y > H + 50 || g.x > player.x + W + 80) g.active = false;
        }
        continue;
      }
      g.x += g.patrolDir * 0.55;
      if (g.x < g.patrolMin || g.x > g.patrolMax) g.patrolDir *= -1;

      // No stealth here — guards never "see" you. The marker is player-facing: it lights up
      // the moment your strike can land, so the cue IS the attack window.
      const sdx = g.x - (player.x + player.w/2);
      g.alerted = sdx > -14 && sdx < strikeRangeX() && Math.abs(g.y - player.y) < STRIKE_RANGE_Y;
      if (!taughtGuard && sdx > 0 && sdx < alertRangeX() + 60) {
        taughtGuard = true;
        spawnMessage(g.x - 10, g.y - 58, 'STRIKE — OR LEAP OVER', 150);
        tutSlowT = 2400; // give the player time to orient, read, and get ready
      }
      const dx = Math.abs(sdx);
      if (graceT <= 0 && dx < GUARD_HIT_DX && player.y > g.y - GUARD_CLEAR_DY) { die('guard'); return; }
    }
    if (graceT > 0) graceT--;

    // Low hazards: the danger is the hanging band [y-46, y-17] — slide fits under it,
    // a full-hold leap from a neighboring roof sails clean over it.
    const pxc = player.x + player.w/2;
    for (const o of lowObs) {
      if (!o.active) continue;
      if (!taughtSlide && o.x - pxc > 0 && o.x - pxc < 150) { // first one ever: slow time, teach the button
        taughtSlide = true;
        spawnMessage(o.x + o.w/2, o.y - 58, 'TAP STRIKE TO SLIDE UNDER', 150);
        tutSlowT = 2400;
      }
      if (pxc + 6 > o.x && pxc - 6 < o.x + o.w) {
        const top = player.y - (player.sliding ? SLIDE_H : player.h);
        if (top < o.y - LOWBAR_BOT && player.y > o.y - LOWBAR_TOP) { die('low'); return; }
      }
    }

    for (const f of featherList) {
      if (!f.active || f.taken) continue;
      f.bob += 0.1;
      const dx = Math.abs(f.x - (player.x+player.w/2));
      const dy = Math.abs((f.y + Math.sin(f.bob)*4) - (player.y - 16));
      if (dx < 16 && dy < 18) { f.taken = true; f.active=false; feathers += 1; spawnBurst(f.x, f.y, 6, '#f1e3c6'); }
    }

    // cloak: each point eases toward a spot behind/below the previous one; speed streams it back
    const ax = player.x - 3, ay = player.y - (player.sliding ? SLIDE_H + 2 : player.h) + 8;
    cloak[0].x = ax; cloak[0].y = ay;
    for (let i = 1; i < cloak.length; i++) {
      const flut = Math.sin(player.runT*0.31 + i*1.2) * (player.onGround ? 1.3 : 2.4);
      const tx = cloak[i-1].x - 4.4 - speed*1.05;
      const ty = cloak[i-1].y + (player.onGround ? 2.6 : -1.2) + i*0.5 + flut;
      cloak[i].x += (tx - cloak[i].x) * 0.42;
      cloak[i].y += (ty - cloak[i].y) * 0.42;
    }

    for (const b of birds) {
      if (!b.active) continue;
      if (b.perched) {
        if (b.x - player.x < 88) { b.perched = false; b.vx = 1.4 + Math.random()*0.8; b.vy = -1.9; } // flee!
      } else {
        b.x += b.vx + speed*0.3; b.y += b.vy; b.vy -= 0.015; b.flap += 0.45;
        if (b.y < -30) b.active = false;
      }
      if (b.x < player.x - 260) b.active = false;
    }

    // light-streams home toward the lamp head; each arrival feeds lampLight (kills = power made visible)
    const lampX = player.x + 24, lampY = player.y - (player.sliding ? SLIDE_H : player.h) - 4;
    for (const st of streams) {
      if (!st.active) continue;
      const dx = lampX - st.x, dy = lampY - st.y;
      const d = Math.hypot(dx, dy) || 1;
      st.vx += (dx/d) * 0.9; st.vy += (dy/d) * 0.9;
      st.vx *= 0.86; st.vy *= 0.86;
      st.x += st.vx + speed; st.y += st.vy;
      if (d < 14) {
        st.active = false;
        lampLight = Math.min(1, lampLight + LAMP_PER_KILL / 6); // 6 motes per kill
        spawnParticle(lampX, lampY, (Math.random()-0.5)*1.2, -0.8, 12, '#ffe9b0');
      } else if (st.x < player.x - 200) st.active = false;
    }

    if (++emberT >= 9) { // ambient embers drifting up off the city
      emberT = 0;
      spawnParticle(player.x + Math.random()*W, GROUND_Y + 10 - Math.random()*90, -0.3 - Math.random()*0.4, -0.25 - Math.random()*0.3, 26, 'rgba(255,170,90,0.5)');
    }

    for (const p of particles) { if (!p.active) continue; p.x+=p.vx; p.y+=p.vy; p.vy+=0.12; p.life--; if (p.life<=0) p.active=false; }
    for (const m of messages) { if (!m.active) continue; m.t--; if (m.t<=0) m.active=false; }

    if (shake > 0) shake -= 0.5;

    distVal.textContent = Math.floor(distance) + 'm';
    featherVal.textContent = feathers;
  }

  function die(cause) {
    deathCause = cause;
    state = 'dead'; player.dead = true;
    spawnBurst(player.x+player.w/2, player.y-10, 14, '#a44');
    shake = 10;
    CG.gameplayStop();
    const finalScore = Math.floor(distance) + feathers*5;
    if (finalScore > best) {
      best = finalScore;
      try { Save.get().setItem('rooftopSprintBest', String(best)); } catch(e){}
      CG.happytime();
    }
    scoreLine.textContent = `Distance ${Math.floor(distance)}m  ·  Light ${feathers}  ·  Score ${finalScore}`;
    bestEl.textContent = `Best score: ${best}`;
    document.querySelector('#overlay h1').textContent =
      cause === 'gap' ? 'THE ROOF RAN OUT' : cause === 'low' ? 'KNOCKED FLAT' : 'YOUR LAMP WENT OUT';
    document.querySelectorAll('#overlay p')[0].textContent =
      cause === 'gap' ? 'The dark streets swallowed you. Hold JUMP longer to leap higher and farther.'
      : cause === 'low' ? 'Slide under low hazards — tap STRIKE when no warden is near.'
      : 'A warden reached you first. Strike when the gold mark shows — or leap clear and keep your light.';
    document.querySelectorAll('#overlay p')[1].style.display = 'none';
    startBtn.textContent = 'Run Again';
    overlay.classList.remove('hidden');
    CG.interstitial();
  }

  // ---------- Drawing ----------
  function drawSkylineLayer(camX, par, spacing, hBase, hue, winAlpha, yBase) {
    const parX = camX * par;
    const first = Math.floor(parX / spacing) - 1;
    for (let i = first; i < first + Math.ceil(W/spacing) + 2; i++) {
      const bx = i*spacing - parX;
      const bh = hBase + ((i*53 + spacing*7) % 64);
      const bw = spacing - 7 - ((i*31) % 10);
      const by = yBase - bh;
      ctx.fillStyle = hue; ctx.fillRect(bx, by, bw, bh + 140);
      // lit windows — deterministic per building, warm and sparse
      ctx.fillStyle = 'rgba(255,186,100,' + winAlpha + ')';
      for (let wy = 0; wy < Math.min(bh - 8, 52); wy += 11) {
        for (let wx = 5; wx < bw - 5; wx += 9) {
          if ((i*7 + wy*13 + wx*5) % 17 < 3) ctx.fillRect(bx + wx, by + 6 + wy, 3, 4);
        }
      }
      if ((i % 4) === 1) { ctx.fillStyle = hue; ctx.fillRect(bx + bw - 8, by - 9, 5, 9); } // chimney
    }
  }
  function drawSkyline(camX) {
    drawSkylineLayer(camX, 0.18, 84, 40, 'rgba(26,17,40,0.85)', 0.12, GROUND_Y + 14);
    drawSkylineLayer(camX, 0.38, 62, 26, 'rgba(17,11,28,0.95)', 0.20, GROUND_Y + 26);
  }
  function drawSegments(camX) {
    for (const s of segments) {
      if (!s.active) continue;
      const sx1=s.x1-camX, sx2=s.x2-camX;
      if (sx2 < -30 || sx1 > W+30) continue;
      const wSeg = sx2 - sx1;
      // building body below the roofline, with faint lit windows of its own
      ctx.fillStyle = '#3d2b47'; ctx.fillRect(sx1, s.y, wSeg, H - s.y + 30);
      // windows rekindle in the Lamplighter's wake: behind the player, more of them light
      // up and burn brighter as lampLight grows — the city answers the claimed light
      for (let wy = 14; wy < H - s.y; wy += 15) {
        for (let wx = 8; wx < wSeg - 8; wx += 13) {
          const wake = s.x1 + wx < player.x;
          const lit = ((s.x1|0)*3 + wy*7 + wx*5) % 19 < (wake ? 3 + lampLight*5 : 3);
          if (lit) {
            ctx.fillStyle = 'rgba(255,186,100,' + (wake ? 0.14 + lampLight*0.4 : 0.14) + ')';
            ctx.fillRect(sx1 + wx, s.y + wy, 4, 5);
          }
        }
      }
      // roof cap: highlight + shingle seams + under-shadow
      ctx.fillStyle = '#8a6274'; ctx.fillRect(sx1, s.y, wSeg, 5);
      ctx.fillStyle = 'rgba(0,0,0,0.22)';
      for (let tx = 10; tx < wSeg - 4; tx += 14) ctx.fillRect(sx1 + tx, s.y + 1, 1, 4);
      ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.fillRect(sx1, s.y + 5, wSeg, 3);
      // gold edge trim (gap warning stays)
      ctx.fillStyle = '#c9913f'; ctx.fillRect(sx1, s.y, 4, 5); ctx.fillRect(sx2-4, s.y, 4, 5);
      // lantern on some roofs (deterministic) — pole, flame, pooled warm glow
      if (((s.x1 | 0) % 5) < 2 && wSeg > 70) {
        const lx = sx1 + 14;
        ctx.drawImage(glowImg, lx - 24, s.y - 40, 48, 48);
        ctx.fillStyle = '#241a2e'; ctx.fillRect(lx - 1, s.y - 14, 2, 14);
        ctx.fillStyle = '#ffbe6e'; ctx.fillRect(lx - 2.5, s.y - 19, 5, 6);
      }
    }
  }
  function drawBird(b, camX) {
    const sx = b.x - camX; if (sx < -20 || sx > W + 20) return;
    ctx.fillStyle = '#1c1626';
    if (b.perched) {
      ctx.fillRect(sx - 2, b.y - 6, 5, 4); ctx.fillRect(sx + 2, b.y - 8, 2, 2); // body + head
    } else {
      const w = Math.sin(b.flap) * 5;
      ctx.fillRect(sx - 2, b.y - 4, 4, 3);
      ctx.strokeStyle = '#1c1626'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(sx, b.y - 3); ctx.lineTo(sx - 5, b.y - 3 - w); ctx.moveTo(sx, b.y - 3); ctx.lineTo(sx + 5, b.y - 3 - w); ctx.stroke();
    }
  }
  function drawGuard(g, camX) {
    if (!g.active) return;
    const sx = g.x - camX;
    if (sx < -30 || sx > W+30) return;
    ctx.save(); ctx.translate(sx, g.y);
    if (!g.alive) {
      if (g.fly > 0) { ctx.globalAlpha = Math.max(1 - g.deathT/80, 0); ctx.rotate(g.deathT * g.spin); } // airborne corpse spins as it flies
      else { const t=Math.min(g.deathT/12,1); ctx.globalAlpha=1-t; ctx.rotate(t*1.3); ctx.translate(0,t*20); }
    }
    const bob = g.alive ? Math.sin(g.x*0.4)*0.8 : 0;
    ctx.save(); ctx.translate(0, bob); ctx.scale(g.patrolDir >= 0 ? 1 : -1, 1);
    // warden's lamp-pole — every enemy carries the light you're here to take back
    ctx.fillStyle = '#5a4632'; ctx.fillRect(6,-44,2,40);
    ctx.fillStyle = '#3a3145'; ctx.fillRect(3,-52,8,9);          // lamp housing
    if (g.alive) {
      ctx.drawImage(glowImg, 7-14, -48-14, 28, 28);              // hoarded light
      ctx.fillStyle = '#ffbe6e'; ctx.fillRect(5,-50,4,5);        // flame
    } else {
      ctx.fillStyle = '#241a2e'; ctx.fillRect(5,-50,4,5);        // lamp goes dark — its light is yours now
    }
    // tunic + belt + trim
    ctx.fillStyle = '#8b5a3c'; ctx.fillRect(-8,-26,16,19);
    ctx.fillStyle = '#6e4530'; ctx.fillRect(-8,-26,16,4);
    ctx.fillStyle = '#3a2c20'; ctx.fillRect(-8,-14,16,3);
    ctx.fillStyle = '#caa07a'; ctx.beginPath(); ctx.arc(0,-30,6,0,Math.PI*2); ctx.fill();
    // helmet with a nose guard
    ctx.fillStyle = '#6b6b78'; ctx.fillRect(-7,-36,14,6); ctx.fillRect(-1,-33,2,5);
    ctx.fillStyle = '#4a3a2a'; ctx.fillRect(-6,-7,5,8); ctx.fillRect(1,-7,5,8);
    ctx.restore();
    if (g.alerted && g.alive) { // marker color = current timing window: gold FAR → orange MID → white PERFECT
      const w = strikeWindows();
      const dxNow = g.x - (player.x + player.w/2);
      const perfect = dxNow <= w.perfect, mid = !perfect && dxNow <= w.mid;
      const r = perfect ? 6 : mid ? 5 : 4;
      const pulse = 3 + Math.sin(player.runT*0.4)*1.5;
      ctx.fillStyle = perfect ? '#ffffff' : mid ? '#f0a04a' : '#e8c878';
      ctx.beginPath(); ctx.moveTo(0,-44-r+pulse); ctx.lineTo(r,-44+pulse); ctx.lineTo(0,-44+r+pulse); ctx.lineTo(-r,-44+pulse); ctx.fill();
      if (perfect) { ctx.strokeStyle='rgba(255,255,255,0.7)'; ctx.lineWidth=1.5; ctx.beginPath(); ctx.arc(0,-44+pulse,r+4,0,Math.PI*2); ctx.stroke(); }
    }
    ctx.restore();
  }
  function drawLowOb(o, camX) {
    if (!o.active) return;
    const sx = o.x - camX;
    if (sx < -50 || sx > W + 50) return;
    const gy = o.y, x2 = sx + o.w;
    ctx.fillStyle = '#2a2333';
    if (o.kind === 0) { // clothesline: poles, sagging rope, hung cloth filling the danger band
      ctx.fillRect(sx - 5, gy - 46, 3, 46); ctx.fillRect(x2 + 2, gy - 46, 3, 46);
      ctx.strokeStyle = '#3a3145'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(sx - 3, gy - 43); ctx.quadraticCurveTo(sx + o.w/2, gy - 37, x2 + 3, gy - 43); ctx.stroke();
      const cols = ['#7a4a56', '#4a5a72', '#6e6440'];
      for (let i = 0; i < 3; i++) {
        const cx = sx + o.w * (0.18 + i*0.32);
        ctx.fillStyle = cols[i];
        ctx.fillRect(cx - 4, gy - 41 + (i===1?2:0), 9, 20);
      }
    } else if (o.kind === 1) { // low beam on posts, coil of rope dangling
      ctx.fillRect(sx - 4, gy - 42, 4, 42); ctx.fillRect(x2, gy - 42, 4, 42);
      ctx.fillStyle = '#5a4632'; ctx.fillRect(sx - 6, gy - 42, o.w + 12, 8);
      ctx.fillStyle = '#3f3122'; ctx.fillRect(sx - 6, gy - 36, o.w + 12, 2);
      ctx.strokeStyle = '#4a3826'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(sx + o.w*0.5, gy - 34); ctx.lineTo(sx + o.w*0.5, gy - 22); ctx.stroke();
      ctx.beginPath(); ctx.arc(sx + o.w*0.5, gy - 20, 3, 0, Math.PI*2); ctx.stroke();
    } else { // hanging sign off an overhead arm
      ctx.fillRect(sx - 5, gy - 48, 3, 48);
      ctx.fillRect(sx - 5, gy - 48, o.w + 10, 3);
      ctx.strokeStyle = '#3a3145'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(sx + o.w/2, gy - 45); ctx.lineTo(sx + o.w/2, gy - 39); ctx.stroke();
      ctx.fillStyle = '#6e4530'; ctx.fillRect(sx + o.w/2 - 12, gy - 39, 24, 17);
      ctx.fillStyle = '#e8c878'; ctx.fillRect(sx + o.w/2 - 8, gy - 34, 16, 2); ctx.fillRect(sx + o.w/2 - 8, gy - 30, 11, 2);
    }
  }
  function drawFeather(f, camX) { // Light mote (internal name kept from the feather era)
    if (!f.active || f.taken) return;
    const sx = f.x - camX;
    if (sx < -20 || sx > W+20) return;
    const sy = f.y + Math.sin(f.bob)*4;
    ctx.drawImage(glowImg, sx - 11, sy - 11, 22, 22);
    ctx.fillStyle = '#ffe9b0';
    ctx.beginPath(); ctx.arc(sx, sy, 2.4 + Math.sin(f.bob*2)*0.5, 0, Math.PI*2); ctx.fill();
  }
  function drawStreams(camX) {
    for (const st of streams) {
      if (!st.active) continue;
      const sx = st.x - camX;
      ctx.drawImage(glowImg, sx - 8, st.y - 8, 16, 16);
      ctx.fillStyle = '#ffe9b0'; ctx.fillRect(sx - 1.5, st.y - 1.5, 3, 3);
    }
  }
  function drawPlayer(camX) {
    const sx = player.x - camX, sy = player.y;
    // cloak first (behind the body) — drawn in world space from the verlet chain
    ctx.fillStyle = '#7a2f3a';
    ctx.beginPath();
    ctx.moveTo(cloak[0].x - camX, cloak[0].y - 5);
    for (let i = 1; i < cloak.length; i++) ctx.lineTo(cloak[i].x - camX, cloak[i].y - 4 + i*0.8);
    for (let i = cloak.length - 1; i >= 0; i--) ctx.lineTo(cloak[i].x - camX, cloak[i].y + 4 + (cloak.length-i)*0.7);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = 'rgba(0,0,0,0.18)';
    ctx.beginPath();
    ctx.moveTo(cloak[0].x - camX, cloak[0].y + 2);
    for (let i = 1; i < cloak.length; i++) ctx.lineTo(cloak[i].x - camX, cloak[i].y + 2 + (cloak.length-i)*0.5);
    ctx.lineTo(cloak[cloak.length-1].x - camX, cloak[cloak.length-1].y + 5);
    ctx.closePath(); ctx.fill();

    ctx.save(); ctx.translate(sx, sy);
    if (player.dead) { ctx.rotate(0.6); ctx.translate(6,12); }
    const h = player.sliding ? 16 : player.h; // crouched silhouette while sliding
    // ground shadow
    if (player.onGround && !player.dead) { ctx.fillStyle = 'rgba(0,0,0,0.28)'; ctx.beginPath(); ctx.ellipse(0, 1.5, 9, 2.2, 0, 0, Math.PI*2); ctx.fill(); }
    // legs: two-joint run cycle (tucked in the air)
    const ph = player.runT * 0.35;
    ctx.strokeStyle = '#1a1922'; ctx.lineWidth = 4; ctx.lineCap = 'round';
    if (player.sliding) { // legs stretched out front, low to the shingles
      ctx.beginPath(); ctx.moveTo(0, -7); ctx.quadraticCurveTo(6, -4, 12, -2); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, -7); ctx.quadraticCurveTo(4, -2, 8, -1); ctx.stroke();
    } else for (const side of [0, Math.PI]) {
      let footX, footY, kneeX, kneeY;
      if (player.onGround) {
        const s1 = Math.sin(ph + side), c1 = Math.cos(ph + side);
        footX = s1 * 7; footY = -Math.max(0, c1) * 4;
        kneeX = s1 * 3.6 + 1.5; kneeY = -5 - Math.max(0, c1) * 2;
      } else {
        footX = side === 0 ? 5 : -3; footY = side === 0 ? -4 : -2;
        kneeX = side === 0 ? 4 : -1; kneeY = -6;
      }
      ctx.beginPath(); ctx.moveTo(0, -9); ctx.quadraticCurveTo(kneeX, kneeY, footX, footY); ctx.stroke();
    }
    // torso + hood
    ctx.fillStyle = '#23222b'; ctx.fillRect(-8,-h,16,h-8);
    ctx.fillStyle = 'rgba(255,255,255,0.05)'; ctx.fillRect(-8,-h,4,h-8);
    ctx.fillStyle = '#1a1922';
    ctx.beginPath(); ctx.moveTo(-9,-h); ctx.quadraticCurveTo(0,-h-12,9,-h); ctx.quadraticCurveTo(6,-h+6,0,-h+7); ctx.quadraticCurveTo(-6,-h+6,-9,-h); ctx.fill();
    // sash
    ctx.fillStyle = '#c9913f'; ctx.fillRect(-8,-h+13,16,2.5);
    // rear arm swings opposite the legs (tucked out of sight during a slide)
    if (!player.sliding) {
      ctx.strokeStyle = '#23222b'; ctx.lineWidth = 3.5;
      const armSw = player.onGround ? Math.sin(ph + Math.PI) * 4.5 : 3;
      ctx.beginPath(); ctx.moveTo(-3, -h+12); ctx.quadraticCurveTo(-5 + armSw*0.4, -h+17, -4 + armSw, -h+21); ctx.stroke();
    }
    // Lamp on a pole — always in hand, sweeps in a full arc on strike.
    // Same reach/hitbox/timing as the old staff render (strikeRangeX is unchanged); purely visual.
    const sf = player.strikeFlash;
    const ang = sf > 0 ? (-1.5 + (8-sf)*0.32) : player.sliding ? 0.35 : (-0.95 + Math.sin(player.runT*0.12)*0.05);
    const len = sf > 0 ? 42 : player.sliding ? 22 : 30; // pole tucked flat during a slide
    ctx.save(); ctx.translate(5,-h+11); ctx.rotate(ang);
    ctx.fillStyle = '#8a6a3f'; ctx.fillRect(0,-1.5,len,3);
    // lamp head: glow radius throbs on a steady clock and grows with claimed light (lampLight 0→1)
    const throb = 1 + Math.sin(drawT*0.12)*(0.06 + lampLight*0.1);
    const gr = (14 + lampLight*30) * throb;
    ctx.globalAlpha = 0.45 + lampLight*0.55;
    ctx.drawImage(glowImg, len-2-gr/2, -gr/2, gr, gr);
    ctx.globalAlpha = 1;
    ctx.fillStyle = '#3a3145'; ctx.fillRect(len-5,-4.5,7,9);   // housing
    ctx.fillStyle = lampLight > 0.01 ? '#ffd98c' : '#c9913f';
    ctx.fillRect(len-3.5,-2.5,4,5);                            // flame brightens as light is claimed
    ctx.restore();
    if (sf > 0) { // arc trail behind the sweep
      ctx.strokeStyle = 'rgba(232,200,120,'+(sf/8*0.8)+')'; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.arc(5,-h+11,len-3,ang-0.7,ang+0.1); ctx.stroke();
    }
    ctx.restore();
  }
  function drawParticles(camX) {
    for (const p of particles) { if (!p.active) continue; ctx.globalAlpha=Math.max(p.life/30,0); ctx.fillStyle=p.color; ctx.fillRect(p.x-camX-1.5,p.y-1.5,3,3); }
    ctx.globalAlpha = 1;
  }
  function drawMessages(camX) {
    ctx.font = 'bold 10px Georgia'; ctx.textAlign = 'center';
    for (const m of messages) { if (!m.active) continue; ctx.globalAlpha=Math.min(m.t/14,1); ctx.fillStyle='#e8c878'; ctx.fillText(m.text, m.x-camX, m.y-Math.min(m.t0-m.t, 20)*0.5); }
    ctx.globalAlpha = 1;
  }
  function draw() {
    drawT++;
    const camX = player.x - 80;
    ctx.drawImage(skyImg, 0, 0, W, H);
    // stars twinkle in the upper sky
    ctx.fillStyle = '#f5e7c8';
    for (const st of stars) {
      const a = 0.25 + 0.45 * (0.5 + 0.5*Math.sin(drawT*0.03 + st.tw));
      ctx.globalAlpha = a * Math.max(0, 1 - st.y/95);
      ctx.fillRect(st.x, st.y, 1.4, 1.4);
    }
    ctx.globalAlpha = 1;
    ctx.drawImage(moonImg, W - 148 - (camX*0.02)%20, 8, 110, 110);
    // clouds drift slowly, slight parallax
    for (let i = 0; i < 3; i++) {
      const cx = ((i*210 + 40 - drawT*0.08 - camX*0.05) % (W + 180)) - 140;
      ctx.drawImage(cloudImg, cx < -140 ? cx + W + 180 : cx, 22 + i*17, 150, 40);
    }
    let sx=0, sy=0;
    if (shake > 0) { sx=(Math.random()-0.5)*shake; sy=(Math.random()-0.5)*shake; }
    ctx.save(); ctx.translate(sx, sy);
    drawSkyline(camX);
    drawSegments(camX);
    for (const b of birds) drawBird(b, camX);
    for (const o of lowObs) drawLowOb(o, camX);
    for (const f of featherList) drawFeather(f, camX);
    for (const g of guards) drawGuard(g, camX);
    if (state !== 'menu') drawPlayer(camX);
    drawStreams(camX);
    drawParticles(camX);
    drawMessages(camX);
    ctx.restore();
    ctx.drawImage(vignImg, 0, 0, W, H);
  }

  // ---------- Fit canvas to viewport; backing store renders at native resolution ----------
  function fitCanvas() {
    const cssScale = Math.min(window.innerWidth / W, window.innerHeight / H);
    canvas.style.width = (W*cssScale) + 'px';
    canvas.style.height = (H*cssScale) + 'px';
    const k = Math.max(1, Math.min(4, cssScale * (window.devicePixelRatio || 1)));
    if (!skyImg || Math.abs(k - RSCALE) > 0.01) {
      RSCALE = k;
      canvas.width = Math.ceil(W*k); canvas.height = Math.ceil(H*k);
      ctx.setTransform(k, 0, 0, k, 0, 0);
      buildSprites(); // re-render the sprite sheet at the new density so nothing is upscaled
    }
  }
  window.addEventListener('resize', fitCanvas);
  fitCanvas();

  // Fixed-timestep sim (60Hz) so physics are identical on 60/144/165Hz monitors.
  // slowmoT (real ms) = cinematic slow-mo: time feeds the sim scaled down, easing back to 1×.
  // Score is pure distance traveled (never wall-clock), so slow-mo can't cost the player anything.
  const STEP = 1000 / 60;
  const SLOWMO_MS = 620;
  let lastT = 0, acc = 0, slowmoT = 0;
  function loop(now) {
    if (!lastT) lastT = now;
    const dt = Math.min(now - lastT, 100); // cap dt: background-tab return can't fast-forward the sim
    lastT = now;
    const tsImpact = slowmoT > 0 ? Math.max(0.26, 1 - (slowmoT / SLOWMO_MS) * 0.74) : 1;
    // tutorial slow: steady 0.35× while the prompt is up, easing back over the last 400ms
    const tsTut = tutSlowT > 400 ? 0.35 : tutSlowT > 0 ? 0.35 + 0.65 * (1 - tutSlowT/400) : 1;
    const ts = Math.min(tsImpact, tsTut);
    slowmoT = Math.max(0, slowmoT - dt);
    tutSlowT = Math.max(0, tutSlowT - dt);
    acc += dt * ts;
    while (acc >= STEP) { update(); acc -= STEP; }
    draw();
    requestAnimationFrame(loop);
  }

  // Start rendering IMMEDIATELY — never gate the game on the ad-SDK handshake (it can take
  // seconds off-platform and caused a visible background-only stall at boot).
  resetWorld();
  while (nextSpawnX < W + 500 && spawnSegment(false));
  bestEl.textContent = best > 0 ? `Best score: ${best}` : '';
  requestAnimationFrame(loop);
  // SDK call order still matters: game.* calls only fire after init() resolves (sdkLive).
  CG.init(() => { CG.loadingStart(); CG.loadingStop(); });
})();
</script>
</body>
</html>
