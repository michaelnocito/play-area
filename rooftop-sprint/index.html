<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Rooftop Sprint</title>
<!-- Verify against current CrazyGames SDK docs before submitting -->
<script src="https://sdk.crazygames.com/crazygames-sdk-v3.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #0d0d12;
    overflow: hidden;
    font-family: 'Georgia', serif;
    touch-action: none;
    user-select: none;
  }
  #wrap {
    position: relative;
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    background: #0d0d12;
  }
  canvas#game {
    background: linear-gradient(#1a1330 0%, #3a2150 45%, #6b3a4a 75%, #c97b4a 100%);
    display: block;
    image-rendering: pixelated;
  }
  #hud {
    position: absolute; top: 10px; left: 0; right: 0;
    display: flex; justify-content: space-between; padding: 0 16px;
    color: #f1e3c6; pointer-events: none;
    text-shadow: 0 2px 6px rgba(0,0,0,0.8);
  }
  #hud .label { font-size: 10px; letter-spacing: 1.5px; opacity: 0.75; text-transform: uppercase; }
  #hud .value { font-size: 18px; font-weight: bold; }
  #overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: rgba(8,6,14,0.82);
    color: #f1e3c6; text-align: center; padding: 20px;
  }
  #overlay h1 {
    font-size: 30px; letter-spacing: 3px; margin-bottom: 8px;
    color: #e8c878; text-shadow: 0 0 18px rgba(232,200,120,0.5);
  }
  #overlay p { font-size: 12px; max-width: 340px; line-height: 1.55; opacity: 0.85; margin-bottom: 5px; }
  #overlay .key { color: #e8c878; font-weight: bold; }
  #overlay button {
    margin-top: 16px; padding: 12px 30px; font-size: 14px; letter-spacing: 2px;
    text-transform: uppercase; background: #c9913f; color: #1a1330;
    border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-family: inherit;
  }
  #overlay button:active { transform: scale(0.97); }
  #overlay.hidden { display: none; }
  #scoreLine { font-size: 15px; margin-top: 8px; color: #f1e3c6; }
  #best { font-size: 11px; opacity: 0.65; margin-top: 3px; }
  #touchControls {
    position: absolute; bottom: 0; left: 0; right: 0; height: 30%;
    display: flex; pointer-events: none;
  }
  .tbtn {
    flex: 1; display: flex; align-items: center; justify-content: center;
    pointer-events: auto;
    font-size: 12px; letter-spacing: 2px; text-transform: uppercase;
    color: rgba(241,227,198,0.55); text-shadow: 0 1px 4px rgba(0,0,0,0.8);
  }
  #btnJump { border-right: 1px solid rgba(241,227,198,0.08); }
  .tbtn:active { background: rgba(232,200,120,0.08); }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="480" height="270"></canvas>
  <div id="hud">
    <div><div class="label">Distance</div><div class="value" id="distVal">0m</div></div>
    <div style="text-align:right"><div class="label">Feathers</div><div class="value" id="featherVal">0</div></div>
  </div>
  <div id="overlay">
    <h1>ROOFTOP SPRINT</h1>
    <p>The hooded blade runs the skyline on its own. Time your jumps over the gaps, and strike guards before they cut you down.</p>
    <p><span class="key">SPACE / LEFT SIDE</span> jump &nbsp;&middot;&nbsp; <span class="key">X / RIGHT SIDE</span> strike</p>
    <div id="scoreLine"></div>
    <div id="best"></div>
    <button id="startBtn">Begin the Run</button>
  </div>
  <div id="touchControls">
    <div class="tbtn" id="btnJump">JUMP</div>
    <div class="tbtn" id="btnStrike">STRIKE</div>
  </div>
</div>
<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const GROUND_Y = H - 48;

  const overlay = document.getElementById('overlay');
  const startBtn = document.getElementById('startBtn');
  const distVal = document.getElementById('distVal');
  const featherVal = document.getElementById('featherVal');
  const scoreLine = document.getElementById('scoreLine');
  const bestEl = document.getElementById('best');
  const btnJump = document.getElementById('btnJump');
  const btnStrike = document.getElementById('btnStrike');

  /* ===== CrazyGames SDK (graceful no-op offline; verify call names vs current docs) ===== */
  // sdkLive = init() actually resolved (only true on the CrazyGames platform); every game/ad
  // call is gated on it — calling the SDK pre-init or off-platform just logs errors and is dropped.
  let sdkLive = false;
  const CG = {
    init(cb){ try{ if(window.CrazyGames?.SDK){ window.CrazyGames.SDK.init().then(()=>{ sdkLive = true; cb&&cb(); }).catch(()=>cb&&cb()); return; } }catch(e){} cb&&cb(); },
    loadingStart(){ try{ if(sdkLive) window.CrazyGames.SDK.game.loadingStart(); }catch(e){} },
    loadingStop(){ try{ if(sdkLive) window.CrazyGames.SDK.game.loadingStop(); }catch(e){} },
    gameplayStart(){ try{ if(sdkLive) window.CrazyGames.SDK.game.gameplayStart(); }catch(e){} },
    gameplayStop(){ try{ if(sdkLive) window.CrazyGames.SDK.game.gameplayStop(); }catch(e){} },
    happytime(){ try{ if(sdkLive) window.CrazyGames.SDK.game.happytime(); }catch(e){} },
    interstitial(){ try{ if(sdkLive) window.CrazyGames.SDK.ad.requestAd("midgame", {}); }catch(e){} },
    rewarded(onReward){
      try{ if(sdkLive && window.CrazyGames?.SDK?.ad?.requestAd){
        window.CrazyGames.SDK.ad.requestAd("rewarded", {
          adFinished(){ onReward&&onReward(); },
          adError(){ onReward&&onReward(); },
        }); return;
      } }catch(e){}
      onReward&&onReward();
    },
  };
  // SDK.data throws "not initialized" if touched before CG.init() resolves — only read/write it
  // after that point. Use localStorage directly for the initial read and as the always-safe fallback.
  const Save = {
    get(){ try{ return (sdkLive && window.CrazyGames?.SDK?.data) || localStorage; }catch(e){ return localStorage; } },
  };

  let best = parseInt(localStorage.getItem('rooftopSprintBest') || '0', 10) || 0;

  // ---------- World state ----------
  let state = 'menu'; // menu | playing | dead
  let speed = 0, baseSpeed = 2.1;
  let distance = 0;
  let feathers = 0;
  let shake = 0;

  // ---------- Fixed-size pools (perf contract: no per-frame allocation) ----------
  const MAX_PARTICLES = 80;
  const particles = Array.from({length: MAX_PARTICLES}, () => ({active:false,x:0,y:0,vx:0,vy:0,life:0,color:'#fff'}));
  function spawnParticle(x,y,vx,vy,life,color){
    for(const p of particles){ if(!p.active){ p.active=true;p.x=x;p.y=y;p.vx=vx;p.vy=vy;p.life=life;p.color=color; return; } }
  }
  function spawnBurst(x,y,n,color){
    for(let i=0;i<n;i++) spawnParticle(x,y,(Math.random()-0.5)*3.2,(Math.random()-1.2)*3.2,18+Math.random()*12,color);
  }

  const MAX_MESSAGES = 6;
  const messages = Array.from({length: MAX_MESSAGES}, () => ({active:false,x:0,y:0,t:0,t0:26,text:''}));
  function spawnMessage(x,y,text,dur){
    for(const m of messages){ if(!m.active){ m.active=true;m.x=x;m.y=y;m.t=dur||26;m.t0=m.t;m.text=text; return; } }
  }

  const MAX_SEGMENTS = 10;
  const segments = Array.from({length: MAX_SEGMENTS}, () => ({active:false,x1:0,x2:0,y:0}));
  const MAX_GUARDS = 10;
  const guards = Array.from({length: MAX_GUARDS}, () => ({active:false,alive:false,x:0,y:0,w:16,h:26,patrolDir:1,patrolMin:0,patrolMax:0,alerted:false,deathT:0}));
  const MAX_FEATHERS = 14;
  const featherList = Array.from({length: MAX_FEATHERS}, () => ({active:false,taken:false,x:0,y:0,bob:0}));

  // ---------- Player ----------
  const player = {
    x: 80, y: GROUND_Y, w: 18, h: 28,
    vy: 0, onGround: true,
    jumpsLeft: 1, maxJumps: 2,
    strikeFlash: 0,
    dead: false, runT: 0,
  };
  const GRAVITY = 0.34;
  const JUMP_V = -7.2;
  const STRIKE_RANGE_Y = 30;
  const GUARD_HIT_DX = 15, GUARD_CLEAR_DY = 22; // feet must be this far above guard.y to jump clear
  // Strike reach grows with run speed so the reaction window stays humanly possible (~300ms)
  // at any pace — at base range 36px and 4px/frame closing the window was only ~80ms.
  function strikeRangeX() { return 36 + speed * 14; }
  function alertRangeX() { return 60 + speed * 25; } // telegraph before the strike window opens
  let graceT = 0;        // brief invulnerability after a lunge-kill so chained guards can't cheap-kill
  let taughtGuard = false;

  let nextSpawnX = 0;

  function resetWorld() {
    for(const s of segments) s.active=false;
    for(const g of guards) g.active=false;
    for(const f of featherList) f.active=false;
    for(const p of particles) p.active=false;
    for(const m of messages) m.active=false;
    distance = 0; feathers = 0; speed = baseSpeed; shake = 0; graceT = 0;
    player.x = 80; player.y = GROUND_Y; player.vy = 0;
    player.onGround = true; player.jumpsLeft = player.maxJumps; player.dead = false; player.strikeFlash=0;
    nextSpawnX = 0;
    spawnSegment(true);
  }

  function spawnSegment(first) {
    let lastX2 = 0, lastY = GROUND_Y;
    for(const s of segments){ if(s.active) { lastX2 = Math.max(lastX2, s.x2); } }
    if (!first) {
      for(const s of segments){ if(s.active && s.x2===lastX2){ lastY = s.y; } }
    }
    const gapRoll = Math.random();
    let gap = first ? 0 : (gapRoll < 0.32 ? 34 + Math.random()*26 + Math.min(distance/40, 26) : 0);
    let y = lastY;
    if (gap > 0) {
      const lvl = Math.random();
      if (lvl < 0.4) y = Math.max(GROUND_Y - 34, lastY - 20);
      else if (lvl < 0.7) y = Math.min(GROUND_Y, lastY + 20);
    }
    y = Math.max(GROUND_Y - 40, Math.min(GROUND_Y, y));
    const x1 = lastX2 + gap;
    const len = first ? 260 : 110 + Math.random()*130;
    const x2 = x1 + len;
    const slot = segments.find(s => !s.active);
    if (slot) { slot.active=true; slot.x1=x1; slot.x2=x2; slot.y=y; }

    if (!first && distance > 140 && len > 90 && Math.random() < 0.5) {
      const gx = x1 + len * (0.4 + Math.random()*0.35);
      const gslot = guards.find(g => !g.active);
      if (gslot) {
        gslot.active=true; gslot.alive=true; gslot.x=gx; gslot.y=y;
        gslot.patrolDir = Math.random()<0.5?1:-1;
        gslot.patrolMin = x1+16; gslot.patrolMax = x2-16; gslot.alerted=false; gslot.deathT=0;
      }
    }
    if (Math.random() < 0.5) {
      const fx = gap>0 ? lastX2+gap/2 : x1 + len*Math.random();
      const fy = y - 36 - Math.random()*30;
      const fslot = featherList.find(f => !f.active);
      if (fslot) { fslot.active=true; fslot.taken=false; fslot.x=fx; fslot.y=fy; fslot.bob=Math.random()*Math.PI*2; }
    }
    nextSpawnX = x2;
  }

  function segmentAt(x) {
    for (const s of segments) { if (s.active && x >= s.x1-6 && x <= s.x2+6) return s; }
    return null;
  }
  function groundYForPlayer() {
    const cx = player.x + player.w/2;
    const s = segmentAt(cx);
    if (!s || cx < s.x1 || cx > s.x2) return null;
    return s.y;
  }

  // ---------- Input ----------
  function tryJump() {
    if (state !== 'playing') return;
    if (player.jumpsLeft > 0) {
      player.vy = JUMP_V; player.onGround = false; player.jumpsLeft--;
      spawnBurst(player.x+player.w/2, player.y, 3, '#cfd6e6');
    }
  }
  function tryStrike() {
    if (state !== 'playing') return;
    let nearest = null, nearestDist = Infinity;
    for (const g of guards) {
      if (!g.active || !g.alive) continue;
      const dx = g.x - (player.x + player.w/2), dy = g.y - player.y;
      if (dx > -14 && dx < strikeRangeX() && Math.abs(dy) < STRIKE_RANGE_Y) {
        const d = Math.hypot(dx,dy);
        if (d < nearestDist) { nearestDist = d; nearest = g; }
      }
    }
    player.strikeFlash = 8;
    if (nearest) {
      // Lunge-dash: blink through the target — turns each kill into forward momentum
      const trailFrom = player.x;
      player.x = Math.max(player.x, nearest.x - player.w/2 + 8);
      for (let tx = trailFrom; tx < player.x; tx += 9) spawnParticle(tx, player.y - 14, -0.5, 0, 10, '#e8c878');
      graceT = 12;
      nearest.alive = false; nearest.deathT = 1;
      feathers += 1;
      spawnBurst(nearest.x, nearest.y-16, 10, '#e8c878');
      spawnMessage(nearest.x, nearest.y-40, 'STRUCK');
      shake = 6;
    }
  }

  window.addEventListener('keydown', (e) => {
    if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); tryJump(); }
    if (e.code === 'KeyX' || e.code === 'KeyF') { e.preventDefault(); tryStrike(); }
    if (e.code === 'Enter' && state !== 'playing') { beginGame(); }
  });
  btnJump.addEventListener('pointerdown', (e) => { e.preventDefault(); tryJump(); });
  btnStrike.addEventListener('pointerdown', (e) => { e.preventDefault(); tryStrike(); });
  startBtn.addEventListener('click', () => beginGame());
  canvas.addEventListener('pointerdown', () => { if (state === 'dead') beginGame(); });

  function beginGame() {
    resetWorld();
    while (nextSpawnX < W + 500) spawnSegment(false);
    state = 'playing';
    overlay.classList.add('hidden');
    CG.gameplayStart();
  }

  // ---------- Update ----------
  function update() {
    if (state !== 'playing') return;

    speed = baseSpeed + Math.sqrt(distance) * 0.09;
    distance += speed / 10;
    player.x += speed;

    while (nextSpawnX < player.x + W + 260) spawnSegment(false);
    for (const s of segments) if (s.active && s.x2 < player.x - 260) s.active = false;
    for (const g of guards) if (g.active && g.x < player.x - 260) g.active = false;
    for (const f of featherList) if (f.active && f.x < player.x - 260) f.active = false;

    const gY = groundYForPlayer();
    player.vy += GRAVITY;
    player.y += player.vy;
    if (gY !== null && player.y >= gY && player.vy >= 0) {
      player.y = gY; player.vy = 0;
      if (!player.onGround) spawnBurst(player.x+player.w/2, player.y, 2, '#cfd6e6');
      player.onGround = true; player.jumpsLeft = player.maxJumps;
    } else {
      player.onGround = false;
    }
    if (player.y > H + 60) { die(); return; }

    player.runT += 1;
    if (player.strikeFlash > 0) player.strikeFlash--;

    for (const g of guards) {
      if (!g.active) continue;
      if (!g.alive) { g.deathT += 1; continue; }
      g.x += g.patrolDir * 0.55;
      if (g.x < g.patrolMin || g.x > g.patrolMax) g.patrolDir *= -1;

      const dx = Math.abs(g.x - (player.x + player.w/2));
      g.alerted = dx < alertRangeX();
      if (g.alerted && !taughtGuard && g.x > player.x) {
        taughtGuard = true;
        spawnMessage(g.x - 10, g.y - 58, 'STRIKE — OR LEAP OVER', 90);
      }
      if (graceT <= 0 && dx < GUARD_HIT_DX && player.y > g.y - GUARD_CLEAR_DY) { die(); return; }
    }
    if (graceT > 0) graceT--;

    for (const f of featherList) {
      if (!f.active || f.taken) continue;
      f.bob += 0.1;
      const dx = Math.abs(f.x - (player.x+player.w/2));
      const dy = Math.abs((f.y + Math.sin(f.bob)*4) - (player.y - 16));
      if (dx < 16 && dy < 18) { f.taken = true; f.active=false; feathers += 1; spawnBurst(f.x, f.y, 6, '#f1e3c6'); }
    }

    for (const p of particles) { if (!p.active) continue; p.x+=p.vx; p.y+=p.vy; p.vy+=0.12; p.life--; if (p.life<=0) p.active=false; }
    for (const m of messages) { if (!m.active) continue; m.t--; if (m.t<=0) m.active=false; }

    if (shake > 0) shake -= 0.5;

    distVal.textContent = Math.floor(distance) + 'm';
    featherVal.textContent = feathers;
  }

  function die() {
    state = 'dead'; player.dead = true;
    spawnBurst(player.x+player.w/2, player.y-10, 14, '#a44');
    shake = 10;
    CG.gameplayStop();
    const finalScore = Math.floor(distance) + feathers*5;
    if (finalScore > best) {
      best = finalScore;
      try { Save.get().setItem('rooftopSprintBest', String(best)); } catch(e){}
      CG.happytime();
    }
    scoreLine.textContent = `Distance ${Math.floor(distance)}m  ·  Feathers ${feathers}  ·  Score ${finalScore}`;
    bestEl.textContent = `Best score: ${best}`;
    document.querySelector('#overlay h1').textContent = 'YOU WERE SEEN';
    document.querySelectorAll('#overlay p')[0].textContent = 'The guards raised the alarm. Time the jumps, strike before you are struck.';
    document.querySelectorAll('#overlay p')[1].style.display = 'none';
    startBtn.textContent = 'Run Again';
    overlay.classList.remove('hidden');
    CG.interstitial();
  }

  // ---------- Drawing ----------
  function drawSkyline(camX) {
    ctx.fillStyle = 'rgba(20,14,30,0.55)';
    const parX = camX * 0.25;
    for (let i = -1; i < 7; i++) { const bx=(i*72)-(parX%72), bh=32+((i*53)%64); ctx.fillRect(bx, GROUND_Y+22-bh, 46, bh+120); }
    ctx.fillStyle = 'rgba(20,14,30,0.8)';
    const parX2 = camX * 0.45;
    for (let i = -1; i < 9; i++) { const bx=(i*56)-(parX2%56), bh=20+((i*37)%48); ctx.fillRect(bx, GROUND_Y+32-bh, 30, bh+120); }
  }
  function drawSegments(camX) {
    for (const s of segments) {
      if (!s.active) continue;
      const sx1=s.x1-camX, sx2=s.x2-camX;
      if (sx2 < -30 || sx1 > W+30) continue;
      ctx.fillStyle = '#4a3450'; ctx.fillRect(sx1, s.y, sx2-sx1, H-s.y+30);
      ctx.fillStyle = '#7a5a68'; ctx.fillRect(sx1, s.y, sx2-sx1, 5);
      ctx.fillStyle = '#c9913f'; ctx.fillRect(sx1, s.y, 4, 5); ctx.fillRect(sx2-4, s.y, 4, 5);
    }
  }
  function drawGuard(g, camX) {
    if (!g.active) return;
    const sx = g.x - camX;
    if (sx < -30 || sx > W+30) return;
    ctx.save(); ctx.translate(sx, g.y);
    if (!g.alive) { const t=Math.min(g.deathT/12,1); ctx.globalAlpha=1-t; ctx.rotate(t*1.3); ctx.translate(0,t*20); }
    ctx.fillStyle = g.alerted ? '#b5443a' : '#8b5a3c'; ctx.fillRect(-8,-26,16,19);
    ctx.fillStyle = '#caa07a'; ctx.beginPath(); ctx.arc(0,-30,6,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#6b6b78'; ctx.fillRect(-7,-35,14,5);
    ctx.fillStyle = '#4a3a2a'; ctx.fillRect(-6,-7,5,8); ctx.fillRect(1,-7,5,8);
    if (g.alerted && g.alive) { ctx.fillStyle='#e8c878'; ctx.font='bold 10px Georgia'; ctx.textAlign='center'; ctx.fillText('!', 0, -42); }
    ctx.restore();
  }
  function drawFeather(f, camX) {
    if (!f.active || f.taken) return;
    const sx = f.x - camX;
    if (sx < -20 || sx > W+20) return;
    const sy = f.y + Math.sin(f.bob)*4;
    ctx.save(); ctx.translate(sx, sy); ctx.rotate(Math.sin(f.bob)*0.3);
    ctx.fillStyle = '#e8c878'; ctx.beginPath(); ctx.ellipse(0,0,3,8,0.3,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
  function drawPlayer(camX) {
    const sx = player.x - camX, sy = player.y;
    ctx.save(); ctx.translate(sx, sy);
    if (player.dead) { ctx.rotate(0.6); ctx.translate(6,12); }
    const h = player.h;
    ctx.fillStyle = '#7a2f3a';
    ctx.beginPath(); ctx.moveTo(-4,-h+4); ctx.lineTo(-13-Math.sin(player.runT*0.3)*3,-h*0.4); ctx.lineTo(-3,-3); ctx.fill();
    ctx.fillStyle = '#23222b'; ctx.fillRect(-8,-h,16,h-8);
    ctx.fillStyle = '#1a1922';
    ctx.beginPath(); ctx.moveTo(-9,-h); ctx.quadraticCurveTo(0,-h-12,9,-h); ctx.quadraticCurveTo(6,-h+6,0,-h+7); ctx.quadraticCurveTo(-6,-h+6,-9,-h); ctx.fill();
    const swing = player.onGround ? Math.sin(player.runT*0.35)*6 : 2;
    ctx.fillStyle = '#1a1922'; ctx.fillRect(-6+swing*0.2,-8,5,8); ctx.fillRect(1-swing*0.2,-8,5,8);
    if (player.strikeFlash > 0) {
      ctx.strokeStyle = 'rgba(232,200,120,'+(player.strikeFlash/8)+')'; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(10,-h+6); ctx.lineTo(28,-h-6); ctx.stroke();
    }
    ctx.restore();
  }
  function drawParticles(camX) {
    for (const p of particles) { if (!p.active) continue; ctx.globalAlpha=Math.max(p.life/30,0); ctx.fillStyle=p.color; ctx.fillRect(p.x-camX-1.5,p.y-1.5,3,3); }
    ctx.globalAlpha = 1;
  }
  function drawMessages(camX) {
    ctx.font = 'bold 10px Georgia'; ctx.textAlign = 'center';
    for (const m of messages) { if (!m.active) continue; ctx.globalAlpha=Math.min(m.t/14,1); ctx.fillStyle='#e8c878'; ctx.fillText(m.text, m.x-camX, m.y-Math.min(m.t0-m.t, 20)*0.5); }
    ctx.globalAlpha = 1;
  }
  function draw() {
    ctx.clearRect(0,0,W,H);
    const camX = player.x - 80;
    let sx=0, sy=0;
    if (shake > 0) { sx=(Math.random()-0.5)*shake; sy=(Math.random()-0.5)*shake; }
    ctx.save(); ctx.translate(sx, sy);
    drawSkyline(camX);
    drawSegments(camX);
    for (const f of featherList) drawFeather(f, camX);
    for (const g of guards) drawGuard(g, camX);
    if (state !== 'menu') drawPlayer(camX);
    drawParticles(camX);
    drawMessages(camX);
    ctx.restore();
  }

  // ---------- Fit canvas to viewport (letterboxed, integer-ish scale) ----------
  function fitCanvas() {
    const scale = Math.min(window.innerWidth / W, window.innerHeight / H);
    canvas.style.width = (W*scale) + 'px';
    canvas.style.height = (H*scale) + 'px';
  }
  window.addEventListener('resize', fitCanvas);
  fitCanvas();

  // Fixed-timestep sim (60Hz) so physics are identical on 60/144/165Hz monitors.
  const STEP = 1000 / 60;
  let lastT = 0, acc = 0;
  function loop(now) {
    if (!lastT) lastT = now;
    acc += Math.min(now - lastT, 100); // cap dt: background-tab return can't fast-forward the sim
    lastT = now;
    while (acc >= STEP) { update(); acc -= STEP; }
    draw();
    requestAnimationFrame(loop);
  }

  // SDK call order matters: init() must resolve before any game.* call, or the SDK drops it
  // (an unpaired loadingStop skews the platform's measured load time — see Flipline's QA history).
  CG.init(() => {
    CG.loadingStart();
    resetWorld();
    while (nextSpawnX < W + 500) spawnSegment(false);
    draw();
    bestEl.textContent = best > 0 ? `Best score: ${best}` : '';
    CG.loadingStop();
    requestAnimationFrame(loop);
  });
})();
</script>
</body>
</html>
