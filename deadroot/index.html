/* ===== Canvas / DPR ===== */
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
const W = CFG.cols*CFG.tile, H = CFG.rows*CFG.tile + 72; // +72 top HUD band
let viewScale = 1, offX = 0, offY = 0;
function resize(){
  const dpr = Math.min(window.devicePixelRatio||1, 2);
  const vw = window.innerWidth, vh = window.innerHeight;
  viewScale = Math.min(vw/W, vh/H);
  canvas.style.width = Math.floor(W*viewScale)+"px";
  canvas.style.height = Math.floor(H*viewScale)+"px";
  canvas.width = Math.floor(W*viewScale*dpr);
  canvas.height = Math.floor(H*viewScale*dpr);
  ctx.setTransform(viewScale*dpr,0,0,viewScale*dpr,0,0);
}
window.addEventListener("resize", resize); resize();
const TOP = 72; // gameplay area starts below HUD
function tileToXY(c,r){ return [c*CFG.tile+CFG.tile/2, TOP + r*CFG.tile+CFG.tile/2]; }
function xyToTile(x,y){ return [Math.floor(x/CFG.tile), Math.floor((y-TOP)/CFG.tile)]; }

/* ===== Audio (procedural WebAudio) ===== */
let AC=null, muted = !!save.muted;
function audio(){ if(!AC){ try{ AC = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } if(AC&&AC.state==="suspended") AC.resume(); }
function tone(f0,f1,dur,type,vol,delay){
  if(muted||!AC) return;
  try{
    const t = AC.currentTime + (delay||0);
    const o = AC.createOscillator(), g = AC.createGain();
    o.type = type||"sine"; o.frequency.setValueAtTime(f0,t);
    o.frequency.exponentialRampToValueAtTime(Math.max(f1,1),t+dur);
    g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.connect(g); g.connect(AC.destination); o.start(t); o.stop(t+dur+0.02);
  }catch(e){}
}
function noise(dur,vol,hp){
  if(muted||!AC) return;
  try{
    const n = AC.sampleRate*dur, buf = AC.createBuffer(1,n,AC.sampleRate), d = buf.getChannelData(0);
    for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*(1-i/n);
    const s = AC.createBufferSource(); s.buffer=buf;
    const f = AC.createBiquadFilter(); f.type = hp?"highpass":"lowpass"; f.frequency.value = hp?1800:600;
    const g = AC.createGain(); g.gain.value = vol;
    s.connect(f); f.connect(g); g.connect(AC.destination); s.start();
  }catch(e){}
}
const SFX = {
  shot(){ tone(520,180,0.08,"square",0.05); },
  hit(){ noise(0.05,0.12,true); },
  squelch(){ tone(140,60,0.18,"sawtooth",0.15); noise(0.12,0.2,false); },
  decay(){ tone(300,700,0.25,"sine",0.09); tone(450,900,0.3,"sine",0.06,0.05); },
  hiveHit(){ tone(120,50,0.3,"sawtooth",0.22); noise(0.2,0.25,false); },
  boom(){ tone(90,30,0.5,"sawtooth",0.3); noise(0.35,0.35,false); },
  sweep(){ tone(900,1400,0.12,"square",0.05); },
  wave(){ tone(200,400,0.35,"triangle",0.12); tone(300,600,0.35,"triangle",0.09,0.12); },
  ui(){ tone(600,800,0.06,"sine",0.07); },
  deny(){ tone(220,150,0.12,"square",0.09); }
};

/* ===== Drone (persistent bass, rises as Hive HP drops) ===== */
function stopDrone(){
  if(droneNode){ try{ droneNode.stop(); droneNode.disconnect(); }catch(e){} droneNode=null; droneGain=null; }
}
function updateDrone(){
  if(!AC || AC.state==="suspended") return;
  if(!droneNode){
    try{
      droneNode = AC.createOscillator(); droneGain = AC.createGain();
      droneNode.type = "sawtooth"; droneNode.frequency.value = 55;
      droneGain.gain.value = 0;
      droneNode.connect(droneGain); droneGain.connect(AC.destination);
      droneNode.start();
    }catch(e){ droneNode=null; droneGain=null; return; }
  }
  const hpRatio = hiveMax>0 ? Math.max(0, hiveHP/hiveMax) : 1;
  const target = muted ? 0 : (hpRatio>0.6 ? 0 : (0.6-hpRatio)/0.6*0.12);
  droneGain.gain.setTargetAtTime(target, AC.currentTime, 0.8);
}

/* ===== World state ===== */

let biomass = 0, hiveHP = 0, hiveMax = 100;

let prepT = 0, spawnQ = [], spawnT = 0;
let enemies = [], corpses = [], towers = [], projectiles = [], clouds = [], particles = [], popups = [];
let blocked = null, flow = null;
let shake = 0, menu = null; // menu = {corpse}
let firstMutateDone = false, onboardT = 0;
let dnaEarned = 0;
/* run-scoped modifiers (boons) + ability state */
let run = null;
let boonChoice = null; // [boon, boon] while a pick is pending

const DAILY_HOSTILE = [

function offerBoons(){

function showBanner(txt,sub){ banner = {txt, sub, t:2.6}; }

function inGrid(c,r){ return c>=0 && c<CFG.cols && r>=0 && r<CFG.rows; }
function isHive(c,r){ return c>=CFG.hive.c0 && c<=CFG.hive.c1 && r>=CFG.hive.r0 && r<=CFG.hive.r1; }

/* Flow field: BFS from hive across walkable tiles. flow[r][c] = [dc,dr] step or null. */
function computeFlow(blk){
  const dist = Array.from({length:CFG.rows},()=>new Array(CFG.cols).fill(Infinity));
  const fl = Array.from({length:CFG.rows},()=>new Array(CFG.cols).fill(null));
  const q = [];
  for(let r=CFG.hive.r0;r<=CFG.hive.r1;r++) for(let c=CFG.hive.c0;c<=CFG.hive.c1;c++){ dist[r][c]=0; q.push([c,r]); }
  const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
  let head=0;
  while(head<q.length){
    const [c,r] = q[head++];
    for(const [dc,dr] of dirs){
      const nc=c+dc, nr=r+dr;
      if(!inGrid(nc,nr) || blk[nr][nc] || dist[nr][nc]!==Infinity) continue;
      dist[nr][nc] = dist[r][c]+1;
      fl[nr][nc] = [-dc,-dr]; // step back toward source
      q.push([nc,nr]);
    }
  }
  return { flow: fl, dist };
}
function rebuildFlow(){
  const res = computeFlow(blocked);
  flow = res.flow; flowDist = res.dist;
}
let flowDist = null;

/* Anti-boxing: try to block tile; if any edge spawn tile loses its path, keep it walkable (trampled). */
function tryBlock(c,r){
  blocked[r][c] = true;
  const res = computeFlow(blocked);
  let ok = true;
  for(let i=0;i<CFG.cols;i++){ if(!blocked[0][i] && res.dist[0][i]===Infinity){ ok=false; break; } if(!blocked[CFG.rows-1][i] && res.dist[CFG.rows-1][i]===Infinity){ ok=false; break; } }
  if(ok) for(let i=0;i<CFG.rows;i++){ if(!blocked[i][0] && res.dist[i][0]===Infinity){ ok=false; break; } if(!blocked[i][CFG.cols-1] && res.dist[i][CFG.cols-1]===Infinity){ ok=false; break; } }
  if(!ok){ blocked[r][c] = false; return false; }
  flow = res.flow; flowDist = res.dist;
  return true;
}
function unblock(c,r){ blocked[r][c] = false; rebuildFlow(); }

/* ===== Entities ===== */
let nextId = 1;
function spawnEnemy(type){
  const e = CFG.enemies[type];
  // random edge tile that has a path
  let c,r,tries=0;
  // spawn sides open up as the campaign escalates: wave 1 right only,
  // waves 2-4 right+left, all four sides once THE PURGE begins (0=top 1=bottom 2=left 3=right)
  let sides = [0,1,2,3];
  if(!endless){
    if(waveIdx===0) sides = [3];
    else if(waveIdx<4) sides = [2,3];
  }
  do{
    const side = sides[Math.floor(Math.random()*sides.length)];
    if(side===0){ c=Math.floor(Math.random()*CFG.cols); r=0; }
    else if(side===1){ c=Math.floor(Math.random()*CFG.cols); r=CFG.rows-1; }
    else if(side===2){ c=0; r=Math.floor(Math.random()*CFG.rows); }
    else { c=CFG.cols-1; r=Math.floor(Math.random()*CFG.rows); }
    tries++;
  } while((blocked[r][c] || flowDist[r][c]===Infinity) && tries<40);
  const [x,y] = tileToXY(c,r);
  const eHp=e.hp*(run?run.enemyHp:1), eSpd=e.spd*(run?run.enemySpd:1);
  enemies.push({ id:nextId++, type, x, y, hp:eHp, max:eHp, spd:eSpd, dmg:e.dmg, armor:e.armor, r:e.r,
    col:e.col, flash:0, drench:0, coat:0, corroded:0, snared:false, state:"walk", chanT:0, target:null, atkT:0, burnT:0 });
}
function dropCorpse(x,y){
  const [c,r] = xyToTile(x,y);
  if(!inGrid(c,r) || isHive(c,r)) return;
  // stack onto existing corpse tile -> just refresh & bonus
  const rot = meta.rot + (run?run.rotBonus:0);
  const ex = corpses.find(k=>k.c===c&&k.r===r);
  if(ex){ ex.t = rot; ex.maxT = rot; ex.stack++; popup(x,y,"+STACKED","#9be07f"); return; }
  const walk = !blocked[r][c] ? tryBlock(c,r) : false;
  corpses.push({ c, r, t: rot, maxT: rot, trampled: !walk, stack:1 });
}
function mutate(k, type){
  const t = CFG.towers[type];
  if(biomass < t.cost){ SFX.deny(); popup(...tileToXY(k.c,k.r), "NEED BIOMASS", "#e07f7f"); return; }
  biomass -= t.cost;
  corpses.splice(corpses.indexOf(k),1);
  if(k.trampled){ if(!tryBlock(k.c,k.r)){ /* still trampled tower: allowed, stays walkable */ } }
  const [x,y] = tileToXY(k.c,k.r);
  const thp = 60 + run.towerHp;
  towers.push({ type, c:k.c, r:k.r, x, y, cd:0, hp:thp, max:thp, flash:0, pulse:Math.random()*6, tier:0 });
  SFX.squelch(); burst(x,y,"#9be07f",14); shakeIt(2);
  if(!firstMutateDone){ firstMutateDone = true; }
  menu = null;
}
function spawnWarden(c,r){
  if(!tryBlock(c,r)) return;
  const [x,y] = tileToXY(c,r);
  towers.push({ type:"warden", c, r, x, y, cd:0, hp:150, max:150, flash:0, pulse:Math.random()*6, swing:0, tier:0 });
}
function applyTier2(t){
  const t2 = CFG.tier2[t.type];
  if(!t2 || biomass<t2.cost){ SFX.deny(); popup(t.x,t.y,"NEED BIOMASS","#e07f7f"); menu=null; return; }
  biomass -= t2.cost;
  t.tier = 1;
  SFX.squelch(); burst(t.x,t.y,"#e0a0f0",16); shakeIt(2);
  popup(t.x,t.y,"→ "+t2.name,"#e0a0f0");
  menu = null;
}
function popup(x,y,txt,col){ popups.push({x,y,txt,col,t:1.2}); }
function burst(x,y,col,n){ for(let i=0;i<n;i++){ const a=Math.random()*6.283, s=30+Math.random()*90; particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,t:0.4+Math.random()*0.4,col}); } }
function bigBurst(x,y,col,n){ for(let i=0;i<n;i++){ const a=Math.random()*6.283, s=80+Math.random()*200; particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,t:0.7+Math.random()*0.5,col,big:true}); } }
function shakeIt(n){ shake = Math.max(shake,n); }

/* ===== Sweeper pathing (simple greedy A*-lite on small grid) ===== */
function pathStep(fc,fr,tc,tr){
  // BFS from target to walker (grid is small; called sparingly)
  const dist = Array.from({length:CFG.rows},()=>new Array(CFG.cols).fill(Infinity));
  const q=[[tc,tr]]; dist[tr][tc]=0; let head=0;
  const dirs=[[1,0],[-1,0],[0,1],[0,-1]];
  while(head<q.length){
    const [c,r]=q[head++];
    if(c===fc&&r===fr) break;
    for(const [dc,dr] of dirs){
      const nc=c+dc,nr=r+dr;
      if(!inGrid(nc,nr)||dist[nr][nc]!==Infinity) continue;
      if(blocked[nr][nc] && !(nc===tc&&nr===tr)) continue;
      if(isHive(nc,nr)) continue;
      dist[nr][nc]=dist[r][c]+1; q.push([nc,nr]);
    }
  }
  let best=null, bd=dist[fr]?dist[fr][fc]:Infinity;
  if(bd===Infinity) return null;
  for(const [dc,dr] of dirs){
    const nc=fc+dc,nr=fr+dr;
    if(inGrid(nc,nr)&&dist[nr][nc]<bd){ bd=dist[nr][nc]; best=[dc,dr]; }
  }
  return best;
}

/* ===== Game flow ===== */
function newRun(){
  meta = metaVals();
  biomass = meta.bio; hiveMax = meta.hp; hiveHP = hiveMax;
  waveIdx = 0; endless = false; endlessN = 0; dnaEarned = 0;
  enemies=[]; corpses=[]; towers=[]; projectiles=[]; clouds=[]; particles=[]; popups=[];
  blocked = Array.from({length:CFG.rows},()=>new Array(CFG.cols).fill(false));
  rebuildFlow();
  firstMutateDone = false; onboardT = 0; menu = null;
  run = newRunMods(); boonChoice = null; banner = null; overgrowthT = 0; pherT = 0;
  if(daily){ const [h,hp]=dailyMods(); h.apply(run); hp.apply(run); }
  gameSpeed = 1; hitStop=0; slowMoT=0; timeScale=1; edgePulseT=0;
  // onboarding: two starter corpses on the RIGHT lane, where wave 1 comes from
  dropCorpse(...tileToXY(CFG.hive.c1+3, 8));
  dropCorpse(...tileToXY(CFG.hive.c1+4, 10));
  // perimeter defense: a Flesh Warden at each cardinal direction — every lane has an answer
  for(const [wc,wr] of [[12,3],[12,14],[6,9],[19,9]]) spawnWarden(wc,wr);
  mode = "prep"; prepT = 12; // generous first prep; shortens once they mutate
  CG.gameplayStart();
}
function queueWave(){
  const def = endless ? endlessWave(endlessN) : WAVES[waveIdx];
  spawnQ = [];
  for(const [type,count,intv] of def){
    let t = 0.5;
    for(let i=0;i<count;i++){ spawnQ.push({type, at:t}); t += intv; }
  }
  spawnQ.sort((a,b)=>a.at-b.at);
  spawnT = 0;
  mode = "play";
  SFX.wave();
  // drama: name the moments
  if(!endless){
    if(waveIdx===0) showBanner("THE SCOUTS","they probe from the east");
    else if(waveIdx===1) showBanner("THEY FLANK","now from the west too");
    else if(waveIdx===4) showBanner("THE PURGE BEGINS","heavy squads, from every direction");
    else if(waveIdx===7) showBanner("THE BUTCHER","he burned a hundred hives");
    else if(waveIdx===8) showBanner("THE EXTERMINATION","everything they have left");
    else if(waveIdx===11){ showBanner("THE PURIFIER","kill it and the surface is yours"); tone(80,60,1.2,"sawtooth",0.2); tone(80,60,1.2,"sawtooth",0.2,1.3); }
  } else if(endlessN%3===2) showBanner("PURIFIER INBOUND","the long night deepens");
}
function waveCleared(){
  const wn = endless ? 12+endlessN+1 : waveIdx+1;
  const gain = daily ? Math.ceil(Math.max(3,wn)*1.5) : Math.max(3,wn);
  save.dna += gain; dnaEarned += gain;
  save.bestWave = Math.max(save.bestWave, wn);
  if(daily){ if(!save.dailyBest)save.dailyBest={}; save.dailyBest[dayIndex()]=Math.max(save.dailyBest[dayIndex()]||0,wn); }
  persist();
  popup(W/2, H/2-60, "WAVE "+wn+" REPELLED  +"+gain+" DNA", "#c9a0f0");
  CG.happytime(); slowMoT=0.45; timeScale=0.15;
  if(!endless && waveIdx>=WAVES.length-1){ mode="victory"; save.won=true; persist(); stopDrone(); CG.gameplayStop(); return; }
  if(endless){ endlessN++; save.endlessBest=Math.max(save.endlessBest,endlessN); persist(); }
  else waveIdx++;
  mode = "prep"; prepT = CFG.prepTime;
  // boon choice: the Hive adapts — every run differs
  if((!endless && CFG.boonWaves.includes(waveIdx)) || (endless && endlessN%3===1)) offerBoons();
}
function gameOver(){
  mode = "over"; menu = null; stopDrone();
  if(daily){ if(!save.dailyBest)save.dailyBest={}; save.dailyBest[dayIndex()]=Math.max(save.dailyBest[dayIndex()]||0,waveIdx+1); }
  persist();
  CG.gameplayStop();
  CG.interstitial();
}

/* ===== Update (fixed 60Hz) ===== */
const DT = 1/60;
function update(){
  if(mode==="title"||mode==="over"||mode==="victory") return;
  if(shake>0) shake = Math.max(0, shake-20*DT);
  if(banner) { banner.t -= DT; if(banner.t<=0) banner=null; }
  if(overgrowthT>0) overgrowthT -= DT;
  if(pherT>0) pherT -= DT;
  for(const a of run.abil) if(a.cd>0) a.cd -= DT;

  if(mode==="prep"){
    if((firstMutateDone || corpses.length===0) && !boonChoice) prepT -= DT;
    onboardT += DT;
    if(prepT<=0) queueWave();
  }
  if(mode==="play"){
    spawnT += DT;
    while(spawnQ.length && spawnQ[0].at<=spawnT){ spawnEnemy(spawnQ.shift().type); }
  }

  /* corpses rot */
  for(let i=corpses.length-1;i>=0;i--){
    const k = corpses[i];
    k.t -= DT;
    if(k.t<=0){
      const pay = meta.decay * k.stack;
      biomass += pay;
      const [x,y]=tileToXY(k.c,k.r);
      popup(x,y,"+"+pay,"#8fd9a8"); burst(x,y,"#8fd9a8",8); SFX.decay();
      corpses.splice(i,1);
      if(!k.trampled) unblock(k.c,k.r);
      if(menu && menu.corpse===k) menu=null;
    }
  }

  /* enemies */
  for(let i=enemies.length-1;i>=0;i--){
    const e = enemies[i];
    if(e.flash>0) e.flash-=DT;
    if(e.drench>0) e.drench-=DT;
    // spore coat DoT
    if(e.coat>0){ e.coat-=DT; e.hp -= 6*DT*meta.dmg; }
    if(e.corroded>0) e.corroded -= DT;
    e.snared = false;
    let strangled = false;
    for(const t of towers){ if(t.type==="rootmass" && dist2(e,t) < sq(CFG.towers.rootmass.range*(1+run.rootR)*CFG.tile)){ e.snared=true; if(t.tier===1) strangled=true; break; } }
    if(strangled) e.hp -= 8*DT*meta.dmg;
    let spd = e.spd * CFG.tile * (e.snared?1-CFG.towers.rootmass.slow:1);
    if(overgrowthT>0) spd *= 0.15;
    if(e.type==="sweeper") spd *= (1-run.sweepSlow);

    if(e.type==="sweeper"){
      // find nearest corpse
      if(!e.target || !corpses.includes(e.target)){
        e.target=null; e.chanT=0; let bd=Infinity;
        for(const k of corpses){ const [kx,ky]=tileToXY(k.c,k.r); const d=(kx-e.x)**2+(ky-e.y)**2; if(d<bd){bd=d;e.target=k;} }
      }
      if(e.target){
        const [tx,ty]=tileToXY(e.target.c,e.target.r);
        const d = Math.hypot(tx-e.x,ty-e.y);
        if(d < CFG.tile*0.8){
          e.chanT += DT; // sanitize channel
          if(e.chanT>=3){
            const k=e.target;
            corpses.splice(corpses.indexOf(k),1);
            if(!k.trampled) unblock(k.c,k.r);
            if(menu&&menu.corpse===k) menu=null;
            popup(tx,ty,"SANITIZED","#e3d34e"); SFX.sweep();
            e.target=null; e.chanT=0;
          }
        } else {
          e.chanT=0;
          const [ec,er]=xyToTile(e.x,e.y);
          const step = inGrid(ec,er) ? pathStep(ec,er,e.target.c,e.target.r) : null;
          let dx,dy;
          if(step){ const [nx,ny]=tileToXY(ec+step[0],er+step[1]); dx=nx-e.x; dy=ny-e.y; }
          else { dx=tx-e.x; dy=ty-e.y; }
          const m=Math.hypot(dx,dy)||1;
          e.x += dx/m*spd*DT; e.y += dy/m*spd*DT;
        }
      } else {
        // no corpses: drift toward nearest edge (retreat)
        e.y += (e.y<H/2?-1:1)*spd*DT*0.6;
        if(e.y<TOP-20||e.y>H+20){ enemies.splice(i,1); continue; }
      }
    } else {
      // walk flow field to hive
      const [ec,er]=xyToTile(e.x,e.y);
      if(isHive(ec,er) || nearHive(e)){
        e.atkT += DT;
        if(e.atkT>=1){
          e.atkT=0; hiveHP -= e.dmg;
          SFX.hiveHit(); shakeIt(5); burst(e.x,e.y,"#e07f7f",10); edgePulseT = 1.0;
          if(hiveHP<=0){ hiveHP=0; gameOver(); return; }
        }
      } else {
        let dx=0,dy=0;
        const f = inGrid(ec,er) ? flow[er][ec] : null;
        if(f){ const [nx,ny]=tileToXY(ec+f[0],er+f[1]); dx=nx-e.x; dy=ny-e.y; }
        else { const [hx,hy]=tileToXY(12.5,8.5); dx=hx-e.x; dy=hy-e.y; }
        const m=Math.hypot(dx,dy)||1;
        e.x += dx/m*spd*DT; e.y += dy/m*spd*DT;
      }
      // incinerator: burns adjacent towers; detonates spore clouds
      if(e.type==="incin"){
        e.burnT += DT;
        if(e.burnT>=0.5){
          e.burnT=0;
          for(const t of towers){ if(dist2(e,t)<sq(CFG.tile*1.4)){ t.hp-=6; t.flash=0.2; particles.push({x:t.x,y:t.y,vx:0,vy:-30,t:0.4,col:"#e0a04a"}); } }
          for(const cl of clouds){
            if((cl.x-e.x)**2+(cl.y-e.y)**2 < sq(cl.r)){
              // thermobaric: cloud ignites
              clouds.splice(clouds.indexOf(cl),1);
              SFX.boom(); shakeIt(8); hitStop=3; bigBurst(cl.x,cl.y,"#f0b050",30); bigBurst(cl.x,cl.y,"#e06040",20);
              popup(cl.x,cl.y,"THERMOBARIC!","#f0b050");
              for(const v of enemies){ if((v.x-cl.x)**2+(v.y-cl.y)**2 < sq(CFG.tile*2.2)) damage(v, 85, true); }
              break;
            }
          }
        }
      }
    }
    if(e.hp<=0){ kill(e); }
  }

  /* towers */
  for(let i=towers.length-1;i>=0;i--){
    const t = towers[i];
    t.pulse += DT;
    if(t.flash>0) t.flash-=DT;
    if(t.hp<=0){
      burst(t.x,t.y,"#7a8f6a",16); popup(t.x,t.y,"BURNED DOWN","#e0a04a");
      if(menu&&menu.tower===t) menu=null;
      towers.splice(i,1);
      const stillHere = corpses.some(k=>k.c===t.c&&k.r===t.r);
      if(!stillHere && blocked[t.r][t.c]) unblock(t.c,t.r);
      continue;
    }
    if(t.type==="rootmass"||t.type==="node") continue;
    const def = CFG.towers[t.type];
    let rate = def.rate * meta.rate * (pherT>0?1.4:1);
    let dmgMult = 1;
    for(const n of towers){ if(n.type==="node" && n!==t && dist2(n,t)<sq((n.tier===1?2.4:CFG.towers.node.range)*CFG.tile)){ rate*=1.5; if(n.tier===1) dmgMult=1.25; break; } }
    t.cd -= DT*rate;
    if(t.cd<=0){
      // find target in range (pheromone: hunt sweepers first)
      let tgt=null, bd=Infinity;
      if(pherT>0){ for(const e of enemies){ if(e.type!=="sweeper") continue; const d=dist2(t,e); if(d<sq(def.range*CFG.tile) && d<bd){ bd=d; tgt=e; } } }
      if(!tgt){ bd=Infinity; for(const e of enemies){ const d=dist2(t,e); if(d<sq(def.range*CFG.tile) && d<bd){ bd=d; tgt=e; } } }
      if(tgt){
        t.cd = 1;
        if(t.type==="warden"){
          // chain sweep: hits every human in the circle
          t.swing = 0.3;
          for(const e of enemies){ if(dist2(t,e)<sq(def.range*CFG.tile)) damage(e, def.dmg*meta.dmg*dmgMult, false); }
          SFX.hit(); noise(0.1,0.18,false);
          burst(t.x,t.y-6,"#c9ced4",6);
        } else if(t.type==="spitter"){
          projectiles.push({x:t.x,y:t.y,tgt,spd:340,dmg:def.dmg*meta.dmg*(1+run.spitDmg)*dmgMult,splash:t.tier===1});
          SFX.shot();
        } else if(t.type==="spore"){
          const cr=(t.tier===1?def.cloudR*1.5:def.cloudR)*CFG.tile;
          clouds.push({x:tgt.x,y:tgt.y,r:cr,t:def.cloudT+run.cloudT,coat:t.tier===1?3.0:1.5});
        }
      }
    }
  }

  /* clouds */
  for(let i=clouds.length-1;i>=0;i--){
    const cl = clouds[i]; cl.t-=DT;
    if(cl.t<=0){ clouds.splice(i,1); continue; }
    for(const e of enemies){ if((e.x-cl.x)**2+(e.y-cl.y)**2 < sq(cl.r)) e.coat = Math.max(e.coat, cl.coat||1.5); }
  }

  /* projectiles */
  for(let i=projectiles.length-1;i>=0;i--){
    const p = projectiles[i];
    if(!enemies.includes(p.tgt)){ projectiles.splice(i,1); continue; }
    const dx=p.tgt.x-p.x, dy=p.tgt.y-p.y, m=Math.hypot(dx,dy)||1;
    p.x += dx/m*p.spd*DT; p.y += dy/m*p.spd*DT;
    if(m < 10){
      let dmg = p.dmg;
      if(p.tgt.snared && p.tgt.drench>0){ dmg*=2; popup(p.tgt.x,p.tgt.y,"FERMENT x2","#b0e07f"); burst(p.tgt.x,p.tgt.y,"#b0e07f",8); }
      if(p.tgt.coat>0 && p.tgt.drench>0 && !p.tgt.corroded){ p.tgt.corroded=3; popup(p.tgt.x,p.tgt.y-16,"CORRODE!","#c8f050"); burst(p.tgt.x,p.tgt.y,"#c8f050",8); }
      p.tgt.drench = 4;
      damage(p.tgt, dmg, false);
      if(p.splash){ for(const v of enemies){ if(v!==p.tgt && dist2(v,p.tgt)<sq(CFG.tile*1.5)){ damage(v,p.dmg*0.5,false); v.drench=2; } } burst(p.tgt.x,p.tgt.y,"#c8f050",12); }
      SFX.hit();
      projectiles.splice(i,1);
    }
  }

  /* particles / popups */
  for(let i=particles.length-1;i>=0;i--){ const p=particles[i]; p.t-=DT; p.x+=p.vx*DT; p.y+=p.vy*DT; p.vx*=0.94; p.vy*=0.94; if(p.t<=0) particles.splice(i,1); }
  for(let i=popups.length-1;i>=0;i--){ const p=popups[i]; p.t-=DT; p.y-=24*DT; if(p.t<=0) popups.splice(i,1); }

  /* wave clear check */
  if(mode==="play" && spawnQ.length===0 && enemies.length===0) waveCleared();
}
function nearHive(e){
  const [hx0,hy0]=tileToXY(CFG.hive.c0,CFG.hive.r0), [hx1,hy1]=tileToXY(CFG.hive.c1,CFG.hive.r1);
  const cx=Math.max(hx0-20,Math.min(e.x,hx1+20)), cy=Math.max(hy0-20,Math.min(e.y,hy1+20));
  return (e.x-cx)**2+(e.y-cy)**2 < sq(6);
}
function damage(e, amt, pierce){
  const arm = Math.max(0, e.armor - (e.drench>0?0.15:0) - (e.corroded>0?e.armor:0));
  e.hp -= amt * (pierce?1:(1-arm));
  e.flash = 0.12;
}
function kill(e){
  const idx = enemies.indexOf(e); if(idx>=0) enemies.splice(idx,1);
  biomass += CFG.killBounty + run.killBonus;
  burst(e.x,e.y,e.col,10);
  if(e.type==="boss"){ SFX.boom(); shakeIt(10); hitStop=4; bigBurst(e.x,e.y,"#c9d3dd",32); bigBurst(e.x,e.y,"#e0c0ff",18); for(let i=0;i<3;i++) dropCorpse(e.x+(i-1)*CFG.tile, e.y); }
  else if(e.type==="butcher"){ SFX.boom(); shakeIt(7); hitStop=3; bigBurst(e.x,e.y,"#b04a4a",24); popup(e.x,e.y,"THE BUTCHER FALLS","#b04a4a"); for(let i=0;i<2;i++) dropCorpse(e.x+(i*2-1)*CFG.tile*0.5, e.y); }
  else dropCorpse(e.x,e.y);
  noise(0.08,0.15,false);
}
function dist2(a,b){ return (a.x-b.x)**2+(a.y-b.y)**2; }
function sq(n){ return n*n; }

/* ===== Input ===== */
let paused = false;
function canvasPos(ev){
  const rect = canvas.getBoundingClientRect();
  const px = (ev.touches?ev.touches[0].clientX:ev.clientX) - rect.left;
  const py = (ev.touches?ev.touches[0].clientY:ev.clientY) - rect.top;
  return [px/viewScale, py/viewScale];
}
function onTap(x,y){
  audio();
  if(mode==="title"){
    const db=dailyBtnRect();
    if(x>=db.x&&x<=db.x+db.w&&y>=db.y&&y<=db.y+db.h){ daily=true; newRun(); }
    else { daily=false; newRun(); }
    return;
  }
  if(mode==="over"||mode==="victory"){ handleEndScreen(x,y); return; }
  if(paused){ paused=false; CG.gameplayStart(); return; }

  // mute button (top-right)
  if(x>W-64 && x<W-8 && y>8 && y<64){ muted=!muted; save.muted=muted; persist(); SFX.ui(); return; }
  // pause button
  if(x>W-128 && x<W-72 && y>8 && y<64){ paused=true; CG.gameplayStop(); return; }
  // boon pick blocks everything else
  if(boonChoice){
    const cards = boonCards();
    for(let i=0;i<cards.length;i++){
      const o = cards[i];
      if(x>=o.x&&x<=o.x+o.w&&y>=o.y&&y<=o.y+o.h){
        boonChoice[i].apply(run);
        popup(W/2,H/2-90,boonChoice[i].txt,"#c9a0f0"); SFX.ui();
        boonChoice = null; return;
      }
    }
    return;
  }
  // speed toggle (bottom-right)
  if(x>W-78 && x<W-10 && y>H-78 && y<H-10){ gameSpeed = gameSpeed===1?2:1; SFX.ui(); return; }
  // prep skip button
  if(mode==="prep" && firstMutateDone && x>W/2-120 && x<W/2+120 && y>TOP+8 && y<TOP+66){
    biomass += 15; popup(W/2,TOP+90,"+15","#8fd9a8"); queueWave(); return;
  }
  // hive mind ability buttons (bottom-left)
  for(const b of abilBtns()){
    if(x>=b.x&&x<=b.x+b.w&&y>=b.y&&y<=b.y+b.h){ activateAbility(b.a); return; }
  }

  // mutate menu open?
  if(menu){
    const picked = menuHit(x,y);
    if(picked==='evolve'){ applyTier2(menu.tower); return; }
    if(picked && menu.corpse){ mutate(menu.corpse, picked); return; }
    menu = null;
  }
  // corpse tap
  const [c,r] = xyToTile(x,y);
  const k = corpses.find(k=>k.c===c&&k.r===r);
  if(k){ menu = {corpse:k}; SFX.ui(); return; }
  // tower tap for upgrade
  const tw = towers.find(t=>t.c===c&&t.r===r&&t.type!=="warden"&&t.tier===0);
  if(tw && CFG.tier2[tw.type]){ menu = {tower:tw}; SFX.ui(); return; }
}
function menuAnchor(){ if(menu.tower) return [menu.tower.x, menu.tower.y]; const s = menu.corpse; return tileToXY(s.c, s.r); }
function menuOpts(){
  if(!menu) return [];
  if(menu.tower){
    const [tx,ty]=[menu.tower.x,menu.tower.y];
    return [{type:'evolve', x:tx, y:Math.max(TOP+46,ty-80), r:40}];
  }
  const [kx,ky] = menuAnchor();
  const types = ["spitter","rootmass","spore","node"];
  const R = 92, br = 40;
  return types.map((t,i)=>{
    const a = -Math.PI/2 + i*(Math.PI/2);
    let x = kx + Math.cos(a)*R, y = ky + Math.sin(a)*R;
    x = Math.max(br+6, Math.min(W-br-6, x));
    y = Math.max(TOP+br+6, Math.min(H-br-6, y));
    return {type:t, x, y, r:br};
  });
}
function menuHit(x,y){
  for(const o of menuOpts()){ if((x-o.x)**2+(y-o.y)**2 <= sq(o.r)) return o.type; }
  return null;
}
/* draw a tower's art as an icon at (px,py), scale s — same silhouettes as the live towers */
function drawTowerIcon(type,px,py,s){
  ctx.save(); ctx.translate(px,py); ctx.scale(s,s);
  if(type==="spitter"){
    ctx.fillStyle="#6fae5e"; ctx.beginPath(); ctx.arc(0,2,13,0,6.283); ctx.fill();
    ctx.fillStyle="#3f7a34"; ctx.beginPath(); ctx.arc(0,-7,6,0,6.283); ctx.fill();
    ctx.fillStyle="#c8f050"; ctx.beginPath(); ctx.arc(0,-7,2.5,0,6.283); ctx.fill();
    // pictogram: shot arc
    ctx.fillStyle="#c8f050";
    ctx.beginPath(); ctx.arc(9,-13,2,0,6.283); ctx.fill();
    ctx.beginPath(); ctx.arc(14,-16,1.6,0,6.283); ctx.fill();
  } else if(type==="rootmass"){
    ctx.strokeStyle="#a8845a"; ctx.lineWidth=4;
    for(let i=0;i<5;i++){ const a=i*1.256+0.5; ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(Math.cos(a)*15,Math.sin(a)*15); ctx.stroke(); }
    ctx.fillStyle="#6a4f2e"; ctx.beginPath(); ctx.arc(0,0,9,0,6.283); ctx.fill();
  } else if(type==="spore"){
    ctx.fillStyle="#8fd980"; ctx.beginPath(); ctx.arc(0,4,11,0,6.283); ctx.fill();
    ctx.fillStyle="#bef0a0"; ctx.beginPath(); ctx.arc(0,-7,7,0,6.283); ctx.fill();
    // pictogram: drifting puffs
    ctx.fillStyle="rgba(190,240,160,0.7)";
    ctx.beginPath(); ctx.arc(11,-12,3,0,6.283); ctx.fill();
    ctx.beginPath(); ctx.arc(-12,-10,2.4,0,6.283); ctx.fill();
  } else { // node
    ctx.fillStyle="#c9a0f0"; ctx.beginPath();
    for(let i=0;i<6;i++){ const a=i*1.047; const rr=11; if(i===0) ctx.moveTo(Math.cos(a)*rr,Math.sin(a)*rr); else ctx.lineTo(Math.cos(a)*rr,Math.sin(a)*rr); }
    ctx.closePath(); ctx.fill();
    ctx.fillStyle="#efe0ff"; ctx.beginPath(); ctx.arc(0,0,3,0,6.283); ctx.fill();
    // pictogram: link sparks
    ctx.strokeStyle="#efe0ff"; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(11,-8); ctx.lineTo(16,-13); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-11,-8); ctx.lineTo(-16,-13); ctx.stroke();
  }
  ctx.restore();
}

function boonCards(){

function activateAbility(a){
  if(a.cd>0 || (mode!=="play" && mode!=="prep")){ SFX.deny(); return; }
  a.cd = CFG.abilityCD;
  if(a.id==="overgrowth"){
    overgrowthT = 4; SFX.squelch(); shakeIt(4);
    popup(W/2,H/2-40,"OVERGROWTH","#8a6a3f");
    for(const e of enemies) burst(e.x,e.y,"#8a6a3f",5);
  } else if(a.id==="bloom"){
    popup(W/2,H/2-40,"FUNGAL BLOOM","#8fd9a8"); SFX.decay();
    for(let i=corpses.length-1;i>=0;i--){
      const k = corpses[i];
      const pay = meta.decay * k.stack;
      biomass += pay;
      const [x,y]=tileToXY(k.c,k.r);
      popup(x,y,"+"+pay,"#8fd9a8"); burst(x,y,"#8fd9a8",8);
      corpses.splice(i,1);
      if(!k.trampled) unblock(k.c,k.r);
    }
    menu = null;
  } else if(a.id==="pheromone"){
    pherT = 6; SFX.sweep();
    popup(W/2,H/2-40,"PHEROMONE BURST","#e3d34e");
  }
}
function handleEndScreen(x,y){
  // meta buttons laid out by drawEnd(); recompute same layout
  const {bx,bw,rowH,by} = endLayout();
  for(let i=0;i<CFG.meta.length;i++){
    const m = CFG.meta[i];
    const ry = by + i*rowH;
    if(x>bx+bw-110 && x<bx+bw-10 && y>ry+6 && y<ry+rowH-8){
      if(tier(m.id)<m.max && save.dna>=metaCost(m)){
        save.dna -= metaCost(m); save.tiers[m.id]=tier(m.id)+1; persist(); SFX.ui();
      } else SFX.deny();
      return;
    }
  }
  // bottom buttons
  if(y > by + CFG.meta.length*rowH + 20){
    if(mode==="victory" || save.won){
      if(x<W/2){ newRun(); return; }
      else { // endless
        newRun(); endless = true; endlessN = 0; return;
      }
    }
    newRun();
  }
}

/* ===== Render ===== */
function draw(){
  ctx.save();
  if(shake>0){ ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake); }
  // ground
  ctx.fillStyle = "#0b0e10"; ctx.fillRect(0,0,W,H);
  // soil texture: sparse root veins
  ctx.strokeStyle = "rgba(90,120,90,0.06)"; ctx.lineWidth=2;
  for(let i=0;i<14;i++){
    ctx.beginPath();
    const sx=(i*173)%W, sy=TOP+((i*271)%(H-TOP));
    ctx.moveTo(sx,sy); ctx.quadraticCurveTo(sx+60,sy+40,sx+20,sy+110);
    ctx.stroke();
  }
  // grid whisper
  ctx.strokeStyle = "rgba(140,160,140,0.045)"; ctx.lineWidth=1;
  for(let c=0;c<=CFG.cols;c++){ ctx.beginPath(); ctx.moveTo(c*CFG.tile,TOP); ctx.lineTo(c*CFG.tile,H); ctx.stroke(); }
  for(let r=0;r<=CFG.rows;r++){ ctx.beginPath(); ctx.moveTo(0,TOP+r*CFG.tile); ctx.lineTo(W,TOP+r*CFG.tile); ctx.stroke(); }

  if(mode==="title"){ drawTitle(); ctx.restore(); return; }

  drawHive();
  // clouds
  for(const cl of clouds){
    ctx.fillStyle = "rgba(150,220,120,"+(0.10+0.08*Math.sin(cl.t*6))+")";
    ctx.beginPath(); ctx.arc(cl.x,cl.y,cl.r,0,6.283); ctx.fill();
    ctx.strokeStyle="rgba(150,220,120,0.25)"; ctx.stroke();
  }
  // corpses
  for(const k of corpses){
    const [x,y]=tileToXY(k.c,k.r);
    const fade = Math.min(1, k.t/3);
    ctx.save(); ctx.globalAlpha = 0.4+0.6*fade;
    ctx.fillStyle = "#5d6670";
    ctx.beginPath(); ctx.ellipse(x,y,15,9,0.5,0,6.283); ctx.fill();
    ctx.fillStyle="#454d55"; ctx.beginPath(); ctx.arc(x+9,y-4,5,0,6.283); ctx.fill();
    // rot ring
    ctx.strokeStyle = "rgba(143,217,168,0.8)"; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(x,y,18,-Math.PI/2,-Math.PI/2 + 6.283*(k.t/k.maxT)); ctx.stroke();
    if(k.stack>1){ ctx.fillStyle="#9be07f"; ctx.font="bold 11px monospace"; ctx.textAlign="center"; ctx.fillText("x"+k.stack,x,y-22); }
    ctx.restore();
  }
  // towers
  for(const t of towers){
    ctx.save(); ctx.translate(t.x,t.y);
    const p = 1+0.05*Math.sin(t.pulse*3);
    ctx.scale(p,p);
    if(t.flash>0){ ctx.globalAlpha=0.6; }
    if(t.type==="warden"){
      if(t.swing>0) t.swing -= DT;
      // big overweight chain brute: belly, stitched gut, hood, orbiting chain ball
      ctx.fillStyle="#8fa87a"; ctx.beginPath(); ctx.ellipse(0,2,15,13,0,0,6.283); ctx.fill(); // belly
      ctx.fillStyle="#7a936a"; ctx.beginPath(); ctx.arc(0,-12,7,0,6.283); ctx.fill(); // head
      ctx.strokeStyle="#4a5a40"; ctx.lineWidth=2; // gut stitches
      ctx.beginPath(); ctx.moveTo(-7,0); ctx.lineTo(7,3); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(-4,-3); ctx.lineTo(-4,6); ctx.stroke();
      // chain + ball, whips fast on swing
      const ca = t.pulse*(t.swing>0?14:1.5);
      const clen = 20 + (t.swing>0?7:0);
      ctx.strokeStyle="#b8bec6"; ctx.lineWidth=2.5;
      ctx.beginPath(); ctx.moveTo(0,-2); ctx.lineTo(Math.cos(ca)*clen, -2+Math.sin(ca)*clen*0.7); ctx.stroke();
      ctx.fillStyle="#c9ced4"; ctx.beginPath(); ctx.arc(Math.cos(ca)*clen, -2+Math.sin(ca)*clen*0.7, 5,0,6.283); ctx.fill();
      ctx.fillStyle="#d8e060"; ctx.beginPath(); ctx.arc(-2.5,-13,1.8,0,6.283); ctx.fill(); // eyes
      ctx.beginPath(); ctx.arc(2.5,-13,1.8,0,6.283); ctx.fill();
    } else if(t.type==="spitter"){
      ctx.fillStyle="#6fae5e"; ctx.beginPath(); ctx.arc(0,0,13,0,6.283); ctx.fill();
      ctx.fillStyle="#3f7a34"; ctx.beginPath(); ctx.arc(0,-8,6,0,6.283); ctx.fill();
      ctx.fillStyle="#c8f050"; ctx.beginPath(); ctx.arc(0,-8,2.5,0,6.283); ctx.fill();
    } else if(t.type==="rootmass"){
      ctx.strokeStyle="#8a6a3f"; ctx.lineWidth=4;
      for(let i=0;i<5;i++){ const a=i*1.256+t.pulse*0.4; ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(Math.cos(a)*16,Math.sin(a)*16); ctx.stroke(); }
      ctx.fillStyle="#6a4f2e"; ctx.beginPath(); ctx.arc(0,0,9,0,6.283); ctx.fill();
    } else if(t.type==="spore"){
      ctx.fillStyle="#8fd980"; ctx.beginPath(); ctx.arc(0,2,11,0,6.283); ctx.fill();
      ctx.fillStyle="#bef0a0"; ctx.beginPath(); ctx.arc(0,-9,7,0,6.283); ctx.fill();
      ctx.fillStyle="#e8ffd0"; ctx.beginPath(); ctx.arc(-2,-11,2,0,6.283); ctx.fill();
    } else { // node
      ctx.fillStyle="#c9a0f0"; ctx.beginPath();
      for(let i=0;i<6;i++){ const a=i*1.047+t.pulse; const rr=10+2*Math.sin(t.pulse*2+i); if(i===0) ctx.moveTo(Math.cos(a)*rr,Math.sin(a)*rr); else ctx.lineTo(Math.cos(a)*rr,Math.sin(a)*rr); }
      ctx.closePath(); ctx.fill();
      ctx.fillStyle="#efe0ff"; ctx.beginPath(); ctx.arc(0,0,3,0,6.283); ctx.fill();
    }
    if(t.tier===1){ ctx.globalAlpha=1; ctx.fillStyle="#e0a0f0"; ctx.beginPath(); ctx.arc(12,-12,5,0,6.283); ctx.fill(); ctx.fillStyle="#fff"; ctx.font="bold 7px monospace"; ctx.textAlign="center"; ctx.fillText("2",12,-9); }
    ctx.restore();
    // hp bar if hurt
    if(t.hp<t.max){ ctx.fillStyle="#333"; ctx.fillRect(t.x-14,t.y-24,28,4); ctx.fillStyle="#e0a04a"; ctx.fillRect(t.x-14,t.y-24,28*(t.hp/t.max),4); }
  }
  // enemies
  for(const e of enemies){
    ctx.save(); ctx.translate(e.x,e.y);
    ctx.fillStyle = e.flash>0 ? "#ffffff" : e.col;
    if(e.type==="sweeper"){
      ctx.fillRect(-e.r,-e.r,e.r*2,e.r*2);
      ctx.fillStyle="#2a2a1a"; ctx.fillRect(-e.r*0.5,-e.r*0.5,e.r,e.r*0.6); // visor
      if(e.chanT>0){ ctx.strokeStyle="#e3d34e"; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(0,0,e.r+6,-Math.PI/2,-Math.PI/2+6.283*(e.chanT/3)); ctx.stroke(); }
    } else if(e.type==="troop"){
      ctx.beginPath(); ctx.arc(0,0,e.r,0,6.283); ctx.fill();
      ctx.fillStyle="#2c4a63"; ctx.fillRect(-e.r,-e.r*0.9,e.r*0.7,e.r*1.8); // shield
    } else if(e.type==="incin"){
      ctx.beginPath(); ctx.arc(0,0,e.r,0,6.283); ctx.fill();
      ctx.fillStyle="#f0c060"; ctx.beginPath(); ctx.arc(0,-e.r*0.4,4,0,6.283); ctx.fill(); // pilot light
    } else if(e.type==="butcher"){
      ctx.beginPath(); ctx.arc(0,0,e.r,0,6.283); ctx.fill();
      ctx.strokeStyle="#5c1f1f"; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(0,0,e.r,0,6.283); ctx.stroke();
      ctx.fillStyle="#d0d4d8"; ctx.save(); ctx.rotate(perfNow*2);
      ctx.fillRect(e.r*0.4,-3,e.r*0.9,6); ctx.restore(); // swinging cleaver
      ctx.fillStyle="#2a0f0f"; ctx.beginPath(); ctx.arc(0,-3,4,0,6.283); ctx.fill();
    } else if(e.type==="boss"){
      ctx.beginPath(); ctx.arc(0,0,e.r,0,6.283); ctx.fill();
      ctx.strokeStyle="#8fa0b0"; ctx.lineWidth=4; ctx.beginPath(); ctx.arc(0,0,e.r+5,0,6.283); ctx.stroke();
      ctx.fillStyle="#e05050"; ctx.beginPath(); ctx.arc(0,0,5,0,6.283); ctx.fill();
    } else {
      ctx.beginPath(); ctx.arc(0,0,e.r,0,6.283); ctx.fill();
    }
    if(e.snared){ ctx.strokeStyle="#8a6a3f"; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(0,e.r*0.6,e.r*0.8,0,3.14); ctx.stroke(); }
    if(e.drench>0){ ctx.fillStyle="rgba(180,240,80,0.5)"; ctx.beginPath(); ctx.arc(e.r*0.5,-e.r*0.5,3,0,6.283); ctx.fill(); }
    if(e.corroded>0){ ctx.strokeStyle="rgba(200,240,80,0.85)"; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(0,0,e.r+4,0,6.283); ctx.stroke(); ctx.lineWidth=1; }
    ctx.restore();
    // hp bar
    if(e.hp<e.max){ ctx.fillStyle="#222"; ctx.fillRect(e.x-14,e.y-e.r-10,28,4); ctx.fillStyle="#e06060"; ctx.fillRect(e.x-14,e.y-e.r-10,28*Math.max(0,e.hp/e.max),4); }
  }
  // projectiles
  ctx.fillStyle="#c8f050";
  for(const p of projectiles){ ctx.beginPath(); ctx.arc(p.x,p.y,4,0,6.283); ctx.fill(); }
  // particles
  for(const p of particles){ ctx.globalAlpha=p.big?Math.min(1,p.t*1.4):Math.min(1,p.t*2.5); ctx.fillStyle=p.col; const ps=p.big?7:3; ctx.fillRect(p.x-ps/2,p.y-ps/2,ps,ps); }
  ctx.globalAlpha=1;
  // popups
  ctx.textAlign="center"; ctx.font="bold 18px monospace";
  for(const p of popups){ ctx.globalAlpha=Math.min(1,p.t); ctx.fillStyle=p.col; ctx.fillText(p.txt,p.x,p.y); }
  ctx.globalAlpha=1;

  drawHUD();
  drawAbilities();
  drawSpeedBtn();
  if(menu) drawMenu();
  if(mode==="prep") drawPrep();
  if(boonChoice) drawBoons();
  if(banner) drawBanner();
  if(paused) drawPaused();
  if(mode==="over") drawEnd(false);
  if(mode==="victory") drawEnd(true);
  ctx.restore();
  // vignette
  const g = ctx.createRadialGradient(W/2,H/2,H*0.35,W/2,H/2,H*0.75);
  g.addColorStop(0,"rgba(0,0,0,0)"); g.addColorStop(1,"rgba(10,4,14,0.45)");
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  // screen-edge red pulse: flash on hive hit + persistent breathing at low HP
  const hpPct = hiveMax>0 ? hiveHP/hiveMax : 1;
  const pulsePersist = (mode==="play"||mode==="prep") && hpPct<0.3 ? 0.18*(1+0.4*Math.sin(perfNow*6)) : 0;
  const edgeA = Math.max(edgePulseT*0.55, pulsePersist);
  if(edgeA>0.01){
    const eg = ctx.createRadialGradient(W/2,H/2,H*0.2,W/2,H/2,H*0.85);
    eg.addColorStop(0,"rgba(0,0,0,0)"); eg.addColorStop(1,"rgba(210,40,40,"+edgeA.toFixed(3)+")");
    ctx.fillStyle=eg; ctx.fillRect(0,0,W,H);
  }
}
function drawHive(){
  const [x0,y0]=tileToXY(CFG.hive.c0,CFG.hive.r0), [x1,y1]=tileToXY(CFG.hive.c1,CFG.hive.r1);
  const cx=(x0+x1)/2, cy=(y0+y1)/2;
  const pulse = 1+0.04*Math.sin(perfNow*2.2);
  // roots radiating
  ctx.strokeStyle="rgba(150,100,180,0.25)"; ctx.lineWidth=3;
  for(let i=0;i<8;i++){ const a=i*0.785+0.3; ctx.beginPath(); ctx.moveTo(cx,cy);
    ctx.quadraticCurveTo(cx+Math.cos(a)*60, cy+Math.sin(a)*60, cx+Math.cos(a+0.4)*95, cy+Math.sin(a+0.4)*95); ctx.stroke(); }
  ctx.save(); ctx.translate(cx,cy); ctx.scale(pulse,pulse);
  ctx.fillStyle="#5a3a78"; ctx.beginPath(); ctx.ellipse(0,0,52,42,0,0,6.283); ctx.fill();
  ctx.fillStyle="#7a4fa0"; ctx.beginPath(); ctx.ellipse(0,0,38,30,0,0,6.283); ctx.fill();
  ctx.fillStyle="#b088e0"; ctx.beginPath(); ctx.ellipse(0,0,18,14,0,0,6.283); ctx.fill();
  const hurt = hiveHP/hiveMax;
  if(hurt<0.5){ ctx.strokeStyle="rgba(224,80,80,"+(0.5-hurt)+")"; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(-30,-10); ctx.lineTo(-5,8); ctx.lineTo(15,-14); ctx.stroke(); }
  ctx.restore();
}

function drawPrep(){

    ctx.fillText("▶ SEND  +15◈", W/2, TOP+34);
    ctx.font="bold 15px monospace"; ctx.fillStyle="#8a94a0";
    ctx.fillText(Math.ceil(prepT)+"s", W/2, TOP+56);
    // goal gradient: how far to the next named moment
    if(!endless){
      let tease = "";
      if(waveIdx<4) tease = (4-waveIdx)+" ➜ THE PURGE";
      else if(waveIdx<7) tease = (7-waveIdx)+" ➜ THE BUTCHER";
      else if(waveIdx<11) tease = (11-waveIdx)+" ➜ THE PURIFIER";
      if(tease){ ctx.fillStyle="#c9a0f0"; ctx.font="bold 16px monospace"; ctx.fillText(tease, W/2, TOP+94); }
    }
  }
}
function drawAbilities(){
  const glyphs = { overgrowth:"Ψ", bloom:"✦", pheromone:"◎" };
  const names = { overgrowth:"OVERGROW", bloom:"BLOOM", pheromone:"PHEROMONE" };
  for(const b of abilBtns()){
    const ready = b.a.cd<=0;
    ctx.fillStyle = ready ? "rgba(30,45,30,0.9)" : "rgba(20,24,26,0.9)";
    ctx.fillRect(b.x,b.y,b.w,b.h);
    ctx.strokeStyle = ready ? "#8fd9a8" : "#444"; ctx.strokeRect(b.x,b.y,b.w,b.h);
    ctx.textAlign="center";
    ctx.fillStyle = ready ? "#c9f0a8" : "#555"; ctx.font="30px monospace";
    ctx.fillText(glyphs[b.a.id], b.x+b.w/2, b.y+36);
    ctx.font="bold 9px monospace"; ctx.fillStyle = ready ? "#8fd9a8" : "#555";
    ctx.fillText(names[b.a.id], b.x+b.w/2, b.y+56);
    if(!ready){
      ctx.strokeStyle="#e3d34e"; ctx.lineWidth=4;
      ctx.beginPath(); ctx.arc(b.x+b.w/2,b.y+b.h/2,28,-Math.PI/2,-Math.PI/2+6.283*(1-b.a.cd/CFG.abilityCD)); ctx.stroke();
      ctx.lineWidth=1;
    }
  }
}

function dailyBtnRect(){ return {x:W/2-140,y:398,w:280,h:80}; }

  ctx.textAlign="center";
  ctx.fillStyle="#b088e0"; ctx.font="bold 64px Georgia, serif";

  ctx.fillStyle="#8a94a0"; ctx.font="15px monospace";

  ctx.fillText(save.won ? "TAP TO DEFEND THE HIVE — again" : "TAP TO DEFEND THE HIVE", W/2, 340+6*Math.sin(perfNow*3));
  if(save.bestWave>0){ ctx.fillStyle="#c9a0f0"; ctx.font="13px monospace";

  // daily trial button

  ctx.strokeStyle="#c9a0f0"; ctx.lineWidth=2; ctx.beginPath(); if(ctx.roundRect)ctx.roundRect(db.x,db.y,db.w,db.h,10);else ctx.rect(db.x,db.y,db.w,db.h); ctx.stroke(); ctx.lineWidth=1;
  ctx.fillStyle="#c9a0f0"; ctx.textAlign="center"; ctx.font="bold 16px monospace";

  const [dh,dhp]=dailyMods();

function endLayout(){ return { bx: W/2-280, bw: 560, rowH: 48, by: 224 }; }
function drawEnd(won){
  ctx.fillStyle="rgba(5,7,9,0.88)"; ctx.fillRect(0,0,W,H);
  ctx.textAlign="center";
  if(won){
    ctx.fillStyle="#8fd9a8"; ctx.font="bold 40px Georgia, serif";
    ctx.fillText("THE SURFACE IS SILENT", W/2, 110);
    ctx.fillStyle="#dfe6ec"; ctx.font="15px monospace";
    ctx.fillText("The extermination squads are gone. The Hive endures.", W/2, 148);
    ctx.fillStyle="#c9a0f0"; ctx.fillText("ENDLESS MODE UNLOCKED — the long night awaits", W/2, 172);
  } else {
    const wn = endless ? 12+endlessN+1 : waveIdx+1;
    ctx.fillStyle="#e06060"; ctx.font="bold 40px Georgia, serif";
    ctx.fillText("THE HIVE HAS FALLEN", W/2, 110);
    ctx.fillStyle="#dfe6ec"; ctx.font="15px monospace";
    ctx.fillText("Overrun on wave "+wn+" — "+(endless?"THE LONG NIGHT":phaseOf(Math.min(waveIdx,11))), W/2, 148);
    ctx.fillStyle="#c9a0f0"; ctx.fillText("+"+dnaEarned+" DNA harvested this run", W/2, 172);
  }
  // Mycelial Network
  ctx.fillStyle="#b088e0"; ctx.font="bold 18px monospace";
  ctx.fillText("MYCELIAL NETWORK — DNA: "+save.dna, W/2, 206);
  const {bx,bw,rowH,by} = endLayout();
  ctx.font="12px monospace";
  for(let i=0;i<CFG.meta.length;i++){
    const m=CFG.meta[i], ry=by+i*rowH, tr=tier(m.id), maxed=tr>=m.max, cost=metaCost(m);
    ctx.fillStyle="rgba(26,19,48,0.9)"; ctx.fillRect(bx,ry,bw,rowH-8);
    ctx.strokeStyle="rgba(176,136,224,0.3)"; ctx.strokeRect(bx,ry,bw,rowH-8);
    ctx.textAlign="left";
    ctx.fillStyle="#dfe6ec"; ctx.font="bold 15px monospace";
    ctx.fillText(m.label+"  "+"◆".repeat(tr)+"◇".repeat(m.max-tr), bx+12, ry+20);
    ctx.fillStyle="#8a94a0"; ctx.font="12px monospace";
    ctx.fillText(m.fx, bx+12, ry+37);
    const ok = !maxed && save.dna>=cost;
    ctx.fillStyle = maxed ? "#2a3328" : ok ? "#1f3524" : "#2a2024";
    ctx.fillRect(bx+bw-110, ry+6, 100, rowH-22);
    ctx.strokeStyle = ok ? "#8fd9a8" : "#555"; ctx.strokeRect(bx+bw-110,ry+6,100,rowH-22);
    ctx.textAlign="center"; ctx.fillStyle = maxed ? "#7a8f6a" : ok ? "#8fd9a8" : "#777";
    ctx.font="bold 14px monospace";
    ctx.fillText(maxed?"MAX":cost+" DNA", bx+bw-60, ry+25);
  }
  const byBot = by + CFG.meta.length*rowH + 20;
  ctx.font="bold 16px monospace";
  if(won || save.won){
    ctx.fillStyle="#8fd9a8"; ctx.textAlign="center";
    ctx.fillText("[ NEW CAMPAIGN ]", W/4+60, byBot+30);
    ctx.fillStyle="#c9a0f0";
    ctx.fillText("[ ENDLESS ]", W*3/4-60, byBot+30);
  } else {
    ctx.fillStyle="#8fd9a8"; ctx.textAlign="center";
    ctx.fillText("[ RISE AGAIN ]", W/2, byBot+30);
  }
}

/* ===== Loop (fixed timestep) ===== */
let lastT = 0, acc = 0, perfNow = 0;
function frame(t){
  requestAnimationFrame(frame);
  if(!lastT){ lastT = t; return; }
  let dt = (t-lastT)/1000; lastT = t;
  if(dt>0.25) dt = 0.25;
  perfNow += dt;
  if(edgePulseT>0) edgePulseT = Math.max(0, edgePulseT - dt*2.5);
  if(slowMoT>0){ slowMoT -= dt; if(slowMoT<=0) timeScale=1; }
  if(hitStop>0){ hitStop--; draw(); return; }
  if(!paused){ acc += dt*timeScale; while(acc>=DT){ for(let i=0;i<gameSpeed;i++) update(); acc-=DT; } }
  if((mode==="play"||mode==="prep") && !paused) updateDrone();
  draw();
}
CG.init(()=>{});
requestAnimationFrame(frame);
