/* ===== CrazyGames SDK adapter (no-op offline) ===== */
let sdkLive = false;
let lastAdAt = -Infinity; // interstitial cooldown — avoid ad-spam on quick repeat deaths
const AD_COOLDOWN = 45; // seconds
const CG = {
  init(cb){
    try{ if(window.CrazyGames?.SDK){
      // race against a timeout so a hung/broken SDK init can't block first paint —
      // "fast load is a feature" (bible); the game must still be playable offline-ish
      let done=false;
      const finish=()=>{ if(done) return; done=true; cb&&cb(); };
      window.CrazyGames.SDK.init().then(()=>{ if(done) return; sdkLive=true; CG.loadingStart(); CG.loadingStop(); finish(); }).catch(finish);
      setTimeout(finish, 4000);
      return;
    } }catch(e){}
    cb&&cb();
  },
  loadingStart(){ try{ if(sdkLive) window.CrazyGames.SDK.game.loadingStart(); }catch(e){} },
  loadingStop(){ try{ if(sdkLive) window.CrazyGames.SDK.game.loadingStop(); }catch(e){} },
  gameplayStart(){ try{ if(sdkLive) window.CrazyGames.SDK.game.gameplayStart(); }catch(e){} },
  gameplayStop(){ try{ if(sdkLive) window.CrazyGames.SDK.game.gameplayStop(); }catch(e){} },
  happytime(){ try{ if(sdkLive) window.CrazyGames.SDK.game.happytime(); }catch(e){} },
  // SDK docs describe hasAdblock as a boolean property, but adapt defensively
  // in case a given SDK build exposes it as a method instead
  hasAdblock(){
    try{
      if(!sdkLive) return false;
      const v = window.CrazyGames.SDK.ad.hasAdblock;
      return !!(typeof v==="function" ? v() : v);
    }catch(e){ return false; }
  },
  interstitial(done){
    try{
      if(sdkLive){
        if(perfNow-lastAdAt < AD_COOLDOWN){ done&&done(); return; } // too soon since the last one — skip, don't spam
        lastAdAt = perfNow;
        window.CrazyGames.SDK.ad.requestAd("midgame",{adFinished:done,adError:done,adStarted:()=>{}});
        return;
      }
    }catch(e){}
    done&&done();
  },
  rewarded(done,fail){
    try{
      if(sdkLive){
        if(CG.hasAdblock()){ fail&&fail("adblock"); return; }
        window.CrazyGames.SDK.ad.requestAd("rewarded",{adFinished:()=>done&&done(),adError:()=>fail&&fail("error"),adStarted:()=>{}});
        return;
      }
    }catch(e){}
    done&&done();
  }
};

/* ===== Audio (procedural WebAudio) ===== */
let AC=null, muted = !!save.muted, masterBus=null;
function audio(){
  if(!AC){ try{
    AC = new (window.AudioContext||window.webkitAudioContext)();
    masterBus = AC.createDynamicsCompressor(); masterBus.connect(AC.destination);
  }catch(e){} }
  if(AC&&AC.state==="suspended") AC.resume();
}
function dest(){ return masterBus||AC.destination; }
function tone(f0,f1,dur,type,vol,delay){
  if(muted||!AC) return;
  try{
    const t = AC.currentTime + (delay||0);
    const o = AC.createOscillator(), g = AC.createGain();
    o.type = type||"sine"; o.frequency.setValueAtTime(f0,t);
    o.frequency.exponentialRampToValueAtTime(Math.max(f1,1),t+dur);
    g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.connect(g); g.connect(dest()); o.start(t); o.stop(t+dur+0.02);
  }catch(e){}
}
function noise(dur,vol,hp){
  if(muted||!AC) return;
  try{
    const n = AC.sampleRate*dur, buf = AC.createBuffer(1,n,AC.sampleRate), d = buf.getChannelData(0);
    for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*(1-i/n);
    const s = AC.createBufferSource(); s.buffer=buf;
    const f = AC.createBiquadFilter(); f.type = hp?"highpass":"lowpass"; f.frequency.value = hp?1800:600;
    const g = AC.createGain(); g.gain.value = vol;
    s.connect(f); f.connect(g); g.connect(dest()); s.start();
  }catch(e){}
}

/* ===== Drone (persistent bass, rises as Hive HP drops) ===== */
function stopDrone(){
  if(droneNode){ try{ droneNode.stop(); droneNode.disconnect(); }catch(e){} droneNode=null; droneGain=null; }
  if(droneNode2){ try{ droneNode2.stop(); droneNode2.disconnect(); }catch(e){} droneNode2=null; droneGain2=null; }
}
function updateDrone(){
  if(!AC || AC.state==="suspended") return;
  if(!droneNode){
    try{
      droneNode = AC.createOscillator(); droneGain = AC.createGain();
      droneNode.type = "sawtooth"; droneNode.frequency.value = 55;
      droneGain.gain.value = 0;
      droneNode.connect(droneGain); droneGain.connect(dest());
      droneNode.start();
      // tension layer: sine octave up, joins below 25% HP
      droneNode2 = AC.createOscillator(); droneGain2 = AC.createGain();
      droneNode2.type = "sine"; droneNode2.frequency.value = 110;
      droneGain2.gain.value = 0;
      droneNode2.connect(droneGain2); droneGain2.connect(dest());
      droneNode2.start();
    }catch(e){ droneNode=null; droneGain=null; return; }
  }
  const hpRatio = hiveMax>0 ? Math.max(0, hiveHP/hiveMax) : 1;
  const t = AC.currentTime;
  const target = muted ? 0 : (hpRatio>0.6 ? 0 : (0.6-hpRatio)/0.6*0.12);
  droneGain.gain.setTargetAtTime(target, t, 0.8);
  if(droneGain2){
    const t2 = muted ? 0 : (hpRatio<0.25 ? (0.25-hpRatio)/0.25*0.05 : 0);
    droneGain2.gain.setTargetAtTime(t2, t, 1.2);
  }
}

(function loadSprites(list){
  for(const [key,png,jsn] of list){ const s=SPR[key];
    fetch(jsn).then(r=>r.ok?r.json():null).then(meta=>{
      if(!meta) return;
      s.img.onload=()=>{ s.meta=meta; s.ready=true; };
      s.img.onerror=()=>{};
      s.img.src=png;
    }).catch(()=>{});
  }
})([
  ['zombie','assets/zombie_atlas.png','assets/zombie_atlas.json'],

]);
function pickFrame(s, ang, animSeed){
  const deg = (ang*180/Math.PI + 360) % 360;
  let dir = s.meta.dirs[0], best = 999;
  for(const d of s.meta.dirs){ const diff = Math.min(Math.abs(deg-d), 360-Math.abs(deg-d)); if(diff<best){ best=diff; dir=d; } }
  const frame = Math.floor(perfNow*8 + animSeed) % s.meta.framesPerDir;
  return s.meta.frames[dir+'_'+frame];
}
// blit a frame centered at the CURRENT origin (caller already translated) — used inside the enemy loop
function blitFrame(key, ang, animSeed, drawSize, flash){
  const s = SPR[key];
  if(!s || !s.ready) return false;
  const f = pickFrame(s, ang, animSeed);
  if(!f) return false;
  ctx.drawImage(s.img, f.x, f.y, f.w, f.h, -drawSize/2, -drawSize/2, drawSize, drawSize);
  if(flash>0){ ctx.save(); ctx.globalCompositeOperation='source-atop'; ctx.globalAlpha=0.6; ctx.fillStyle='#ffffff'; ctx.fillRect(-drawSize/2,-drawSize/2,drawSize,drawSize); ctx.restore(); }
  return true;
}
// world-space wrapper — used by stationary towers
function drawSpriteFrame(key, cx, cy, ang, animSeed, drawSize, flash){
  const s = SPR[key];
  if(!s || !s.ready) return false;
  ctx.save(); ctx.translate(cx,cy);
  const ok = blitFrame(key, ang, animSeed, drawSize, flash);
  ctx.restore();
  return ok;
}
// a stationary zombie tower "aims" at the nearest attacker (else faces the field)
function towerAimAngle(t){
  let bx=null, by=null, bd=Infinity;
  for(const e of enemies){ const d=(e.x-t.x)**2+(e.y-t.y)**2; if(d<bd){ bd=d; bx=e.x; by=e.y; } }
  if(bx===null) return Math.PI/2;
  return Math.atan2(by-t.y, bx-t.x);
}

function inGrid(c,r){ return c>=0 && c<CFG.cols && r>=0 && r<CFG.rows; }
function isHive(c,r){ return c>=CFG.hive.c0 && c<=CFG.hive.c1 && r>=CFG.hive.r0 && r<=CFG.hive.r1; }

/* Flow field: BFS from hive across walkable tiles. flow[r][c] = [dc,dr] step or null. */
function computeFlow(blk){
  const dist = Array.from({length:CFG.rows},()=>new Array(CFG.cols).fill(Infinity));
  const fl = Array.from({length:CFG.rows},()=>new Array(CFG.cols).fill(null));
  const q = [];
  for(let r=CFG.hive.r0;r<=CFG.hive.r1;r++) for(let c=CFG.hive.c0;c<=CFG.hive.c1;c++){ dist[r][c]=0; q.push([c,r]); }
  const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
  let head=0;
  while(head<q.length){
    const [c,r] = q[head++];
    for(const [dc,dr] of dirs){
      const nc=c+dc, nr=r+dr;
      if(!inGrid(nc,nr) || blk[nr][nc] || dist[nr][nc]!==Infinity) continue;
      dist[nr][nc] = dist[r][c]+1;
      fl[nr][nc] = [-dc,-dr]; // step back toward source
      q.push([nc,nr]);
    }
  }
  return { flow: fl, dist };
}
function rebuildFlow(){
  const res = computeFlow(blocked);
  flow = res.flow; flowDist = res.dist;
}
let flowDist = null;

/* DR-#021 maze rule: a placement is legal as long as EACH edge still keeps at least one
   open tile that can reach the Hive. This lets the player wall off lanes and force long
   serpentine routes (real mazing) while guaranteeing enemies can always path in from any
   side — no full seal, no trapped mobs. Replaces DR-#001's far stricter "every edge tile
   must keep its path", which is why building never created chokepoints (the "too free" feel). */
function sideHasPath(dist){
  const R=CFG.rows, C=CFG.cols;
  let top=false,bot=false,left=false,right=false;
  for(let c=0;c<C;c++){ if(!blocked[0][c]&&dist[0][c]!==Infinity)top=true; if(!blocked[R-1][c]&&dist[R-1][c]!==Infinity)bot=true; }
  for(let r=0;r<R;r++){ if(!blocked[r][0]&&dist[r][0]!==Infinity)left=true; if(!blocked[r][C-1]&&dist[r][C-1]!==Infinity)right=true; }
  return top&&bot&&left&&right;
}
function tryBlock(c,r){
  blocked[r][c] = true;
  const res = computeFlow(blocked);
  if(!sideHasPath(res.dist)){ blocked[r][c] = false; return false; }
  flow = res.flow; flowDist = res.dist;
  return true;
}
function unblock(c,r){ if(rock[r]&&rock[r][c]) return; blocked[r][c] = false; rebuildFlow(); } // DR-#034: castle walls never open

/* DR-#021 wall collision: keep a walking body from penetrating a blocked tile, resolved
   per-axis so it slides along a wall instead of squeezing diagonally through a 1-tile gap
   (Defense Grid "no corner-cutting"). Outside the grid + the Hive read as open. */
function solidAt(px,py){
  const c=Math.floor(px/CFG.tile), r=Math.floor((py-TOP)/CFG.tile);
  if(!inGrid(c,r)) return false;
  return blocked[r][c];
}
const WALL_MARG = 12; // body half-width for wall collision (< tile/2 so real 1-wide corridors stay passable)
function moveWithWalls(e, mx, my){
  if(mx!==0 && !solidAt(e.x + mx + (mx>0?WALL_MARG:-WALL_MARG), e.y)) e.x += mx;
  if(my!==0 && !solidAt(e.x, e.y + my + (my>0?WALL_MARG:-WALL_MARG))) e.y += my;
}

/* DR-#022 spiderweb webbing: your dead anchor a web. Any two blocking corpses/towers that
   line up (same row, same col, or a clean diagonal) with a 1-2 tile GAP between them auto-grow
   a strand that hard-blocks the intervening tiles — so scattered organic corpse-drops fuse into
   a real hedge/web wall. Each strand tile still passes the sideHasPath seal rule, so webbing can
   never fully trap enemies. Recomputed only when the structure changes (see update's sig check),
   never per-frame. Nearest pairs win first; each node caps at WEB_CAP strands for readability. */
/* DR-#023: which entrances are open this wave (they open E→W→N→S as the assault escalates). */
function openGates(){
  if(endless) return CFG.gates;
  const n = waveIdx===0 ? 1 : (waveIdx<4 ? 2 : 4);
  return CFG.gates.slice(0, n);
}
function gateAt(c,r){ return CFG.gates.some(g=>g.c===c&&g.r===r); }
/* every OPEN gate must still reach the Hive, else enemies can't path in */
function gatesReachable(dist){
  for(const g of openGates()){ if(dist[g.r][g.c]===Infinity) return false; }
  return true;
}
/* DR-#024: mark every tile that belongs to some fully-open 2x2 block — i.e. tiles a 2-enemy-wide
   corridor can pass through. Out-of-grid + Hive read as open so borders/gates count. */
function wideOpenGrid(){
  const R=CFG.rows, C=CFG.cols;
  const open=(r,c)=> (r<0||c<0||r>=R||c>=C) ? true : !blocked[r][c];
  const wide=Array.from({length:R},()=>new Array(C).fill(false));
  for(let r=-1;r<R;r++) for(let c=-1;c<C;c++){
    if(open(r,c)&&open(r+1,c)&&open(r,c+1)&&open(r+1,c+1)){
      for(const [rr,cc] of [[r,c],[r+1,c],[r,c+1],[r+1,c+1]]) if(rr>=0&&cc>=0&&rr<R&&cc<C) wide[rr][cc]=true;
    }
  }
  return wide;
}
/* DR-#024: every OPEN gate must reach the Hive along a 2-wide corridor (never a single-file pinch). */
function gatesWideReachable(){
  const wide=wideOpenGrid(), R=CFG.rows, C=CFG.cols;
  const seen=Array.from({length:R},()=>new Array(C).fill(false));
  const q=[]; let head=0; const dirs=[[1,0],[-1,0],[0,1],[0,-1]];
  for(let r=CFG.hive.r0;r<=CFG.hive.r1;r++) for(let c=CFG.hive.c0;c<=CFG.hive.c1;c++){ if(wide[r][c]){ seen[r][c]=true; q.push([c,r]); } }
  while(head<q.length){ const [c,r]=q[head++]; for(const [dc,dr] of dirs){ const nc=c+dc,nr=r+dr; if(nc<0||nr<0||nc>=C||nr>=R||seen[nr][nc]||!wide[nr][nc]) continue; seen[nr][nc]=true; q.push([nc,nr]); } }
  for(const g of openGates()){
    let ok=false;
    for(const [dc,dr] of [[0,0],[1,0],[-1,0],[0,1],[0,-1]]){ const nc=g.c+dc,nr=g.r+dr; if(nc>=0&&nr>=0&&nc<C&&nr<R&&seen[nr][nc]){ ok=true; break; } }
    if(!ok) return false;
  }
  return true;
}
/* DR-#023/#024 player placement: block a tile only if every open gate keeps a 2-WIDE route to the Hive. */
function tryPlaceBlock(c,r){
  if(!inGrid(c,r) || isHive(c,r) || gateAt(c,r) || blocked[r][c]) return false;
  blocked[r][c] = true;
  if(!gatesWideReachable()){ blocked[r][c] = false; return false; }
  const res = computeFlow(blocked);
  flow = res.flow; flowDist = res.dist;
  return true;
}

/* DR-#023 build actions — spend biomass to place a hedge wall or raise a Spitter unit. */
function hedgeCostNow(){ return Math.max(2, CFG.hedgeCost - (run?run.hedgeDisc:0)); } // DR-#026 C7: THORNED HEDGES boon
function placeHedge(c,r){
  const [x,y]=tileToXY(c,r);
  const hc = hedgeCostNow();
  if(biomass < hc){ SFX.deny(); popup(x,y-12,"NEED BIOMASS","#e07f7f"); return false; }
  if(!tryPlaceBlock(c,r)){ SFX.deny(); popup(x,y-12,"KEEP A 2-WIDE PATH","#e3d34e"); return false; }
  biomass -= hc; hedge[r][c]=true; hedgePaid[r][c]=true; firstMutateDone=true;
  burst(x,y,"#5f9e52",7); SFX.squelch();
  return true;
}
function placeUnit(c,r,type){
  type = type || "spitter";                            // DR-#025: brush picks spitter or grabber
  const [x,y]=tileToXY(c,r);
  // DR-#025 B2: the Hive can't raise a NEW zombie until it finishes reabsorbing a lost one.
  if(reabsorbCD>0){ SFX.deny(); popup(x,y-12,"REABSORBING "+Math.ceil(reabsorbCD)+"s","#c99bd8"); return false; }
  const full = CFG.towers[type].cost;
  const grow = !!(hedge[r] && hedge[r][c]);            // DR-#024: growing an existing hedge into a zombie
  const cost = grow ? full - (hedgePaid[r][c]?hedgeCostNow():0) : full; // discount only if the hedge was paid for
  if(biomass < cost){ SFX.deny(); popup(x,y-12,"NEED BIOMASS","#e07f7f"); return false; }
  if(grow){ hedge[r][c]=false; hedgePaid[r][c]=false; } // tile stays blocked; swap hedge → zombie
  else if(!tryPlaceBlock(c,r)){ SFX.deny(); popup(x,y-12,"KEEP A 2-WIDE PATH","#e3d34e"); return false; }
  biomass -= cost;
  const thp = 60 + (run?run.towerHp:0);
  towers.push({ type, c, r, x, y, cd:0, hp:thp, max:thp, flash:0, pulse:Math.random()*6, tier:0, level:1 });
  towersBuiltThisRun++; firstMutateDone=true;
  const acc=(TCOL[type]&&TCOL[type].acc)||"#9be07f";
  popup(x,y-28, grow?"GROWN":"-"+cost+"◈","#e07f7f"); burst(x,y,acc,14); SFX.squelch(); shakeIt(2);
  return true;
}

let nextId = 1;
function spawnEnemy(type){
  const e = CFG.enemies[type];
  // DR-#023: enter through a fixed labyrinth GATE (they open E→W→N→S as the assault escalates).
  // Pick a random open gate that can currently reach the Hive; fall back to the first gate.
  const gates = openGates();
  const reach = gates.filter(g=>flowDist[g.r][g.c]!==Infinity);
  const g = (reach.length?reach:gates)[Math.floor(Math.random()*(reach.length?reach.length:gates.length))];
  const c=g.c, r=g.r;
  const [x,y] = tileToXY(c,r);
  const eHp=e.hp*(run?run.enemyHp*(run.endlessHpMult||1):1), eSpd=e.spd*(run?run.enemySpd*(run.endlessSpdMult||1):1);
  enemies.push({ id:nextId++, type, x, y, hp:eHp, max:eHp, spd:eSpd, dmg:e.dmg, armor:e.armor, r:e.r,
    col:e.col, flash:0, drench:0, coat:0, corroded:0, snared:false, state:"walk", chanT:0, target:null, atkT:0, burnT:0, panicT:0, mazeT:0 }); // DR-#030 C4: mazeT = seconds spent walking the maze
  // spawn poof — the human shoves out through the treeline
  burst(x,y,"#4a5a3a",6); rings.push({x,y,r:0,maxR:e.r+10,maxT:0.3,t:0.3,col:"rgba(120,150,100,0.5)"});
  if(type==="sweeper" && !seenSweeper){ seenSweeper=true; showBanner("SWEEPERS SANITIZE CORPSES","kill them before they clear your biomass"); }
}
function dropCorpse(x,y){
  const [c,r] = xyToTile(x,y);
  if(!inGrid(c,r) || isHive(c,r) || (rock[r]&&rock[r][c])) return; // DR-#034: no corpses on the walls
  // stack onto existing corpse tile -> just refresh & bonus
  const rot = meta.rot + (run?run.rotBonus:0);
  const ex = corpses.find(k=>k.c===c&&k.r===r);
  if(ex){ ex.t = rot; ex.maxT = rot; ex.stack++; popup(x,y,ex.stack>=3?"MASS GRAVE x"+ex.stack:"+STACKED","#9be07f"); return; }
  // DR-#023: corpses are now decorative + passive income (they rot into biomass). They no longer
  // block or become buildable — the player raises units and grows hedges with biomass instead.
  const cName = HUMAN_NAMES[Math.floor(Math.random()*HUMAN_NAMES.length)];
  corpses.push({ c, r, t: rot, maxT: rot, trampled: true, stack:1, name:cName });
}
function mutate(k, type){
  const t = CFG.towers[type];
  if(biomass < t.cost){ SFX.deny(); popup(...tileToXY(k.c,k.r), "NEED BIOMASS", "#e07f7f"); return; }
  biomass -= t.cost;
  corpses.splice(corpses.indexOf(k),1);
  if(k.trampled){ if(!tryBlock(k.c,k.r)){ /* still trampled tower: allowed, stays walkable */ } }
  const [x,y] = tileToXY(k.c,k.r);
  popup(x,y-30,"-"+t.cost+"◈","#e07f7f");
  towersBuiltThisRun++;
  const thp = 60 + run.towerHp;
  towers.push({ type, c:k.c, r:k.r, x, y, cd:0, hp:thp, max:thp, flash:0, pulse:Math.random()*6, tier:0, level:1 });
  SFX.squelch(); burst(x,y,"#9be07f",14); shakeIt(2);
  if(!firstMutateDone){ firstMutateDone = true; }
  // one-time evolve nudge on first tower built
  if(!save.seenEvolveTip && CFG.tier2[type]){ evolveTipT = 6; evolveTipTower = {x, y}; save.seenEvolveTip = true; persist(); }
  menu = null;
}

/* ===== Feast mechanic: towers take damage + devour corpses to heal/upgrade ===== */
function damageTower(t, dmg){
  t.hp -= dmg; t.flash = 0.15;
  addParticle({x:t.x,y:t.y-4,vx:(Math.random()-0.5)*40,vy:-40,t:0.4,col:"#c86060"});
  if(t.hp<=0) destroyTower(t);
}
function destroyTower(t){
  const i=towers.indexOf(t); if(i<0) return;
  towers.splice(i,1);
  const stillCorpse = corpses.some(k=>k.c===t.c&&k.r===t.r);
  if(!stillCorpse && blocked[t.r][t.c]) unblock(t.c,t.r);
  burst(t.x,t.y,(TCOL[t.type]&&TCOL[t.type].acc)||"#9be07f",16);
  rings.push({x:t.x,y:t.y,r:0,maxR:34,maxT:0.35,t:0.35,col:"rgba(224,96,96,0.7)"});
  popup(t.x,t.y-10,"ZOMBIE SLAIN","#e06060"); SFX.squelch(); shakeIt(3);
  if(menu && menu.tower===t) menu=null;
  triggerReabsorb(); // DR-#025 B2
}
// DR-#025 B2: a lost zombie makes the Hive reabsorb the biomass — Hive-wide delay before raising a new one.
function triggerReabsorb(){ reabsorbCD = CFG.reabsorbTime; }
function corpseInRange(t){
  const R=(CFG.towers[t.type]?CFG.towers[t.type].range:2)*CFG.tile;
  let best=null, bd=Infinity;
  for(const k of corpses){ const [kx,ky]=tileToXY(k.c,k.r); const d=(kx-t.x)**2+(ky-t.y)**2; if(d<bd && d<R*R){ bd=d; best=k; } }
  return best;
}
function consumeCorpse(k){
  const i=corpses.indexOf(k); if(i>=0) corpses.splice(i,1);
  if(!k.trampled && !towers.some(t=>t.c===k.c&&t.r===k.r)) unblock(k.c,k.r);
  // little tendril of the corpse being dragged in
  const [kx,ky]=tileToXY(k.c,k.r); burst(kx,ky,"#7a8a5a",6);
}
function feastHeal(t){
  const k=corpseInRange(t);
  if(!k){ SFX.deny(); popup(t.x,t.y-20,"NO CORPSE IN RANGE","#e07f7f"); menu=null; return; }
  consumeCorpse(k);
  t.hp = Math.min(t.max, t.hp + Math.ceil(t.max*0.5));
  popup(t.x,t.y-22,"DEVOUR → HEAL","#9be07f"); burst(t.x,t.y,"#9be07f",14); SFX.squelch();
  menu=null;
}
function feastUpgrade(t){
  const k=corpseInRange(t);
  if(!k){ SFX.deny(); popup(t.x,t.y-20,"NO CORPSE IN RANGE","#e07f7f"); menu=null; return; }
  consumeCorpse(k);
  t.level=(t.level||1)+1;
  t.max += 20; t.hp += 20; // grows tougher as it grows stronger
  towersEvolvedThisRun++;
  popup(t.x,t.y-22,"DEVOUR → LVL "+t.level,"#e0a0f0"); bigBurst(t.x,t.y,"#e0a0f0",14); SFX.squelch(); shakeIt(2);
  menu=null;
}
function popup(x,y,txt,col){ popups.push({x,y,txt,col,t:1.2}); }
const MAX_PARTICLES = 500; // perf safety net so a chaotic moment (boss death + combo + hive hit) can't spike frame time
function addParticle(p){ if(particles.length<MAX_PARTICLES) particles.push(p); }
function burst(x,y,col,n){ for(let i=0;i<n;i++){ const a=Math.random()*6.283, s=30+Math.random()*90; addParticle({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,t:0.4+Math.random()*0.4,col}); } }
function bigBurst(x,y,col,n){ for(let i=0;i<n;i++){ const a=Math.random()*6.283, s=80+Math.random()*200; addParticle({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,t:0.7+Math.random()*0.5,col,big:true}); } }
function shakeIt(n){ shake = Math.max(shake, REDUCED_MOTION ? n*0.4 : n); }
function setHitStop(n){ if(!REDUCED_MOTION) hitStop = Math.max(hitStop,n); } // freeze-frames can be uncomfortable for motion-sensitive players

/* ===== Sweeper pathing (simple greedy A*-lite on small grid) ===== */
function pathStep(fc,fr,tc,tr){
  // BFS from target to walker (grid is small; called sparingly)
  const dist = Array.from({length:CFG.rows},()=>new Array(CFG.cols).fill(Infinity));
  const q=[[tc,tr]]; dist[tr][tc]=0; let head=0;
  const dirs=[[1,0],[-1,0],[0,1],[0,-1]];
  while(head<q.length){
    const [c,r]=q[head++];
    if(c===fc&&r===fr) break;
    for(const [dc,dr] of dirs){
      const nc=c+dc,nr=r+dr;
      if(!inGrid(nc,nr)||dist[nr][nc]!==Infinity) continue;
      if(blocked[nr][nc] && !(nc===tc&&nr===tr)) continue;
      if(isHive(nc,nr)) continue;
      dist[nr][nc]=dist[r][c]+1; q.push([nc,nr]);
    }
  }
  let best=null, bd=dist[fr]?dist[fr][fc]:Infinity;
  if(bd===Infinity) return null;
  for(const [dc,dr] of dirs){
    const nc=fc+dc,nr=fr+dr;
    if(inGrid(nc,nr)&&dist[nr][nc]<bd){ bd=dist[nr][nc]; best=[dc,dr]; }
  }
  return best;
}

/* DR-#023: seed a Cretan-style concentric labyrinth — square rings around the Hive, each with a
   one-side gap that rotates E→S→W so the open route corkscrews inward. Reads as a maze on load and
   gives the player a base to extend; the rotating gaps guarantee every gate can still reach center. */
/* DR-#033: LIGHT, RANDOM partial maze each run (playtest: two asks — "give the player just one hedge
   to start, draw their own maze, don't make them undo too much" + "random maze pattern each level for
   variety"). Reconciled: 1–2 short random wall stubs (different every run) so there's a seed of variety
   to build around, but almost the whole board is the player's to draw. Was: 2 full concentric rings. */
/* DR-#034 CASTLE WALLS (playtest blocker: "screen too busy, hard to decide where to build —
   do away with hedges, split the screen into 4 distinct paths, like fighting on top of castle
   walls, all 4 walls converging on the hive opening"). The whole field is now permanent rock
   EXCEPT four 4-wide lanes (one per gate) and a plaza around the Hive. The player defends the
   lanes; hedges are retired (seedLabyrinth removed, hedge brush pulled from the palette). */
const LANE = { rTop:7, rBot:10, cLeft:11, cRight:14, plazaC0:10, plazaC1:15, plazaR0:6, plazaR1:11 };
function onLane(c,r){
  return (r>=LANE.rTop && r<=LANE.rBot) || (c>=LANE.cLeft && c<=LANE.cRight) ||
         (c>=LANE.plazaC0 && c<=LANE.plazaC1 && r>=LANE.plazaR0 && r<=LANE.plazaR1);
}
function buildCastleWalls(){
  rock = Array.from({length:CFG.rows},(_,r)=>Array.from({length:CFG.cols},(_,c)=>!onLane(c,r)));
  for(let r=0;r<CFG.rows;r++) for(let c=0;c<CFG.cols;c++) if(rock[r][c]) blocked[r][c]=true;
  rebuildFlow();
}

/* ===== Game flow ===== */
function newRun(){
  meta = metaVals();
  biomass = meta.bio; hiveMax = meta.hp; hiveHP = hiveMax;
  waveIdx = 0; endless = false; endlessN = 0; dnaEarned = 0;
  enemies=[]; corpses=[]; towers=[]; projectiles=[]; clouds=[]; particles=[]; popups=[];
  blocked = Array.from({length:CFG.rows},()=>new Array(CFG.cols).fill(false));
  hedge = Array.from({length:CFG.rows},()=>new Array(CFG.cols).fill(false)); // DR-#023 placed maze walls
  hedgePaid = Array.from({length:CFG.rows},()=>new Array(CFG.cols).fill(false)); // DR-#025 C5
  buildMode = null;
  rebuildFlow();
  firstMutateDone = false; onboardT = 0; menu = null;
  run = newRunMods(); boonChoice = null; banner = null; overgrowthT = 0; pherT = 0; reabsorbCD = 0;
  gateOpenT = [0,0,0,0]; prevGateN = 0; // DR-#029 C9
  if(daily){ const [h,hp]=dailyMods(); h.apply(run); hp.apply(run); }
  gameSpeed = 1; hitStop=0; slowMoT=0; timeScale=1; edgePulseT=0;
  killsThisRun=0; towersBuiltThisRun=0; towersEvolvedThisRun=0; peakBiomass=0;
  comboT=0; comboN=0; noHitWaves=0; waveStartHP=0; waveT=0; waveFlashT=0;
  stains=[]; rings=[]; seenSweeper=false; lastSurvivorShown=false; secondWindUsed=false; adFailReason=null; awaitingAd=false;
  rotTipT=0; evolveTipT=0;
  save.plays=(save.plays|0)+1; persist();
  genDecor(); // fresh treeline + growing bone piles each run
  buildCastleWalls(); // DR-#034: 4 fixed lanes converge on the Hive
  showBanner("DEFEND THE FOUR WALLS","every path leads to the Hive · ZOMBIE bites · GRABBER slows");
  mode = "prep"; prepT = 16; // generous first prep to lay the first maze
  CG.gameplayStart();
}
function queueWave(){
  if(endless){ run.endlessHpMult = 1+endlessN*0.15; run.endlessSpdMult = 1+endlessN*0.05; }
  const def = endless ? endlessWave(endlessN) : WAVES[waveIdx];
  spawnQ = [];
  for(const [type,count,intv] of def){
    let t = 0.5;
    for(let i=0;i<count;i++){ spawnQ.push({type, at:t}); t += intv; }
  }
  spawnQ.sort((a,b)=>a.at-b.at);
  spawnT = 0; waveT = 0; waveStartHP = hiveHP; waveFlashT = 0.15; lastSurvivorShown = false;
  mode = "play";
  SFX.wave();
  // DR-#029 C9: flash any gate that just opened this wave (a visible field tell for the escalation)
  const curN = openGates().length; const opened = [];
  for(let i=prevGateN;i<curN;i++){ gateOpenT[i]=3.5; opened.push(GATE_DIR[i]); }
  prevGateN = Math.max(prevGateN, curN);
  // drama: name the moments (gate openings get a directional callout so the player knows where the new front is)
  if(!endless){
    if(waveIdx===0) showBanner("THE SCOUTS","they probe from the EAST gate");
    else if(waveIdx===1) showBanner("THE WEST GATE OPENS","they flank from a second front");
    else if(waveIdx===4) showBanner("THE PURGE BEGINS","NORTH & SOUTH gates open — every direction");
    else if(waveIdx===7) showBanner("THE BUTCHER","he burned a hundred hives");
    else if(waveIdx===8) showBanner("THE EXTERMINATION","everything they have left");
    else if(waveIdx===11){ showBanner("THE PURIFIER","kill it and the surface is yours"); tone(80,60,1.2,"sawtooth",0.2); tone(80,60,1.2,"sawtooth",0.2,1.3); }
    else if(opened.length) showBanner("THE "+opened.join(" & ")+(opened.length>1?" GATES OPEN":" GATE OPENS"),"a new way in");
  } else if(endlessN%3===2) showBanner("PURIFIER INBOUND","the long night deepens");
}
function waveCleared(){
  const wn = endless ? 12+endlessN+1 : waveIdx+1;
  const baseGain = endless ? Math.ceil(Math.max(3,wn)*1.2) : Math.max(3,wn);
  const gain = daily ? Math.ceil(baseGain*1.5*dailyStreakMult()) : baseGain;
  save.dna += gain; dnaEarned += gain;
  save.bestWave = Math.max(save.bestWave, wn);
  if(daily){ if(!save.dailyBest)save.dailyBest={}; save.dailyBest[dayIndex()]=Math.max(save.dailyBest[dayIndex()]||0,wn); }
  persist();
  popup(W/2, H/2-60, "WAVE "+wn+" REPELLED  +"+gain+" DNA  "+Math.floor(waveT)+"s", "#c9a0f0");
  // perfect wave bonus
  if(hiveHP >= waveStartHP){
    noHitWaves++;
    save.dna+=3; dnaEarned+=3; persist();
    popup(W/2, H/2-90, "UNSCATHED +3 DNA", "#c9f0c0");
    if(noHitWaves>=3) showBanner("UNBROKEN", noHitWaves+" waves without damage");
  } else { noHitWaves=0; }
  CG.happytime(); slowMoT=0.45; timeScale=0.15;
  if(!endless && waveIdx>=WAVES.length-1){ mode="victory"; save.won=true; persist(); stopDrone(); CG.gameplayStop(); return; }
  if(endless){ endlessN++; save.endlessBest=Math.max(save.endlessBest,endlessN); persist(); }
  else waveIdx++;
  mode = "prep"; prepT = CFG.prepTime;
  popup(W/2, H/2-40, '"'+HIVE_TALK[wn % HIVE_TALK.length]+'"', "#5a9068");
  // boon choice: the Hive adapts — every run differs
  if((!endless && CFG.boonWaves.includes(waveIdx)) || (endless && endlessN%3===1)) offerBoons();
}
function gameOver(){
  if(!secondWindUsed && !daily){ mode = "secondwind"; menu = null; CG.gameplayStop(); return; }
  mode = "over"; menu = null; stopDrone();
  if(daily){ if(!save.dailyBest)save.dailyBest={}; save.dailyBest[dayIndex()]=Math.max(save.dailyBest[dayIndex()]||0,waveIdx+1); }
  persist();
  CG.gameplayStop();
  CG.interstitial();
}
function declineSecondWind(){
  secondWindUsed = true;
  gameOver();
}
let awaitingAd = false; // guards against a mashed WATCH AD button double-requesting a rewarded ad
function takeSecondWind(){
  if(awaitingAd) return;
  awaitingAd = true;
  secondWindUsed = true;
  // callbacks run outside our stack once the (possibly real, async) SDK ad flow
  // resolves — try/catch so a callback-side error can't hang the SDK's own state
  CG.rewarded(()=>{
    try{
      awaitingAd = false;
      hiveHP = Math.ceil(hiveMax*0.25);
      mode = "play";
      popup(W/2, H/2-40, "SECOND WIND", "#8fd9a8");
      edgePulseT = 1.0;
      CG.gameplayStart();
    }catch(e){ awaitingAd=false; }
  }, (reason)=>{
    try{ awaitingAd=false; adFailReason = reason||"error"; gameOver(); }catch(e){ awaitingAd=false; }
  });
}

/* ===== Update (fixed 60Hz) ===== */
const DT = 1/60;
function update(){
  if(shake>0) shake = Math.max(0, shake-20*DT); // DR-#034: decay BEFORE the end-screen early return — the death-recap shake used to freeze on screen forever (playtest bug)
  if(mode==="title"||mode==="over"||mode==="victory"||mode==="secondwind") return;
  if(banner) { banner.t -= DT; if(banner.t<=0) banner=null; }
  if(overgrowthT>0) overgrowthT -= DT;
  if(pherT>0) pherT -= DT;
  if(reabsorbCD>0) reabsorbCD -= DT; // DR-#025 B2
  for(let i=0;i<gateOpenT.length;i++) if(gateOpenT[i]>0) gateOpenT[i]-=DT; // DR-#029 C9
  for(const a of run.abil) if(a.cd>0) a.cd -= DT;
  if(comboT>0){ comboT-=DT; if(comboT<=0) comboN=0; }
  if(mode==="play") waveT+=DT;
  peakBiomass = Math.max(peakBiomass, biomass);

  if(mode==="prep"){
    if((firstMutateDone || corpses.length===0) && !boonChoice) prepT -= DT;
    onboardT += DT;
    if(prepT<=0) queueWave();
  }
  if(mode==="play"){
    spawnT += DT;
    while(spawnQ.length && spawnQ[0].at<=spawnT){ spawnEnemy(spawnQ.shift().type); }
  }

  /* corpses rot */
  for(let i=corpses.length-1;i>=0;i--){
    const k = corpses[i];
    k.t -= DT;
    if(k.t<=0){
      const pay = meta.decay * k.stack;
      biomass += pay;
      const [x,y]=tileToXY(k.c,k.r);
      popup(x,y,"+"+pay,"#8fd9a8"); burst(x,y,"#8fd9a8",8); SFX.decay();
      corpses.splice(i,1);
      if(!k.trampled) unblock(k.c,k.r);
      if(menu && menu.corpse===k) menu=null;
    }
  }


  /* enemies */
  for(let i=enemies.length-1;i>=0;i--){
    const e = enemies[i];
    if(e.flash>0) e.flash-=DT;
    if(e.drench>0) e.drench-=DT;
    if(e.panicT>0) e.panicT-=DT;
    // spore coat DoT
    if(e.coat>0){ e.coat-=DT; e.hp -= 6*DT*meta.dmg; }
    if(e.corroded>0) e.corroded -= DT;
    e.snared = false;
    let strangled = false, slowMul = 1; // DR-#025 B1: grabber zombies contribute their own slow
    for(const t of towers){
      if(t.type==="rootmass" && dist2(e,t) < sq(CFG.towers.rootmass.range*(1+run.rootR)*CFG.tile)){ e.snared=true; slowMul=Math.min(slowMul,1-CFG.towers.rootmass.slow); if(t.tier===1) strangled=true; }
      else if(t.type==="grabber" && dist2(e,t) < sq(CFG.towers.grabber.range*(1+run.grabR)*CFG.tile)){ e.snared=true; slowMul=Math.min(slowMul, Math.max(0.15, 1-CFG.towers.grabber.slow-run.grabSlow)); }
    }
    if(strangled) e.hp -= 8*DT*meta.dmg;
    let spd = e.spd * CFG.tile * slowMul;
    if(overgrowthT>0) spd *= 0.15;
    if(e.type==="sweeper") spd *= (1-run.sweepSlow) * (e.panicT>0 ? 1.8 : 1);

    if(e.type==="sweeper"){
      // find nearest corpse
      if(!e.target || !corpses.includes(e.target)){
        e.target=null; e.chanT=0; let bd=Infinity;
        for(const k of corpses){ const [kx,ky]=tileToXY(k.c,k.r); const d=(kx-e.x)**2+(ky-e.y)**2; if(d<bd){bd=d;e.target=k;} }
      }
      if(e.target){
        const [tx,ty]=tileToXY(e.target.c,e.target.r);
        const d = Math.hypot(tx-e.x,ty-e.y);
        if(d < CFG.tile*0.8){
          e.chanT += DT; // sanitize channel
          if(e.chanT>=3){
            const k=e.target;
            corpses.splice(corpses.indexOf(k),1);
            if(!k.trampled) unblock(k.c,k.r);
            if(menu&&menu.corpse===k) menu=null;
            popup(tx,ty,"SANITIZED","#e3d34e"); SFX.sweep();
            e.target=null; e.chanT=0;
          }
        } else {
          e.chanT=0;
          const [ec,er]=xyToTile(e.x,e.y);
          const step = inGrid(ec,er) ? pathStep(ec,er,e.target.c,e.target.r) : null;
          let dx,dy;
          if(step){ const [nx,ny]=tileToXY(ec+step[0],er+step[1]); dx=nx-e.x; dy=ny-e.y; }
          else { dx=tx-e.x; dy=ty-e.y; }
          const m=Math.hypot(dx,dy)||1;
          e.x += dx/m*spd*DT; e.y += dy/m*spd*DT;
        }
      } else {
        // no corpses: drift toward nearest edge (retreat)
        e.y += (e.y<H/2?-1:1)*spd*DT*0.6;
        if(e.y<TOP-20||e.y>H+20){ enemies.splice(i,1); continue; }
      }
    } else {
      // walk flow field to hive
      const [ec,er]=xyToTile(e.x,e.y);
      // Feast combat: the living brawl any zombie tower within reach (towers have HP)
      let brawl=null, bbd=Infinity; const atkR=CFG.tile*1.25;
      for(const t of towers){ const d=dist2(e,t); if(d<bbd && d<atkR*atkR){ bbd=d; brawl=t; } }
      if(isHive(ec,er) || nearHive(e)){
        e.atkT += DT;
        if(e.atkT>=1){
          e.atkT=0; if(!godMode) hiveHP -= e.dmg;   /* DR-#019: dev god mode */
          SFX.hiveHit(); shakeIt(5); burst(e.x,e.y,"#e07f7f",10); edgePulseT = 1.0;
          if(hiveHP<=0){ hiveHP=0; gameOver(); return; }
        }
      } else if(brawl){
        // stop and hack at the zombie tower
        e.atkT += DT;
        if(e.atkT>=1){ e.atkT=0; damageTower(brawl, e.dmg); burst(brawl.x,brawl.y-4,"#c86060",4); }
      } else {
        let dx=0,dy=0;
        const f = inGrid(ec,er) ? flow[er][ec] : null;
        if(f){ const [nx,ny]=tileToXY(ec+f[0],er+f[1]); dx=nx-e.x; dy=ny-e.y; }
        else { const [hx,hy]=tileToXY(12.5,8.5); dx=hx-e.x; dy=hy-e.y; }
        const m=Math.hypot(dx,dy)||1;
        moveWithWalls(e, dx/m*spd*DT, dy/m*spd*DT); // DR-#021: slide along walls, no diagonal squeeze
        // DR-#030 C4: the longer they wind through your maze, the harder the creeping rot bites (rewards long routes)
        e.mazeT += DT;
        const rot = Math.min(CFG.mazeDoT*e.mazeT, CFG.mazeDoTCap)*meta.dmg;
        e.hp -= rot*DT;
        if(e.mazeT>4 && Math.sin(perfNow*7+e.id)>0.9) addParticle({x:e.x+(Math.random()-0.5)*e.r,y:e.y-e.r*0.4,vx:0,vy:-24,t:0.5,col:"#7cae5a"});
      }
      // incinerator: burns adjacent towers; detonates spore clouds
      if(e.type==="incin"){
        e.burnT += DT;
        if(e.burnT>=0.5){
          e.burnT=0;
          for(const t of towers){ if(dist2(e,t)<sq(CFG.tile*1.4)){ t.hp-=6; t.flash=0.2; addParticle({x:t.x,y:t.y,vx:0,vy:-30,t:0.4,col:"#e0a04a"}); } }
          for(const cl of clouds){
            if((cl.x-e.x)**2+(cl.y-e.y)**2 < sq(cl.r)){
              // thermobaric: cloud ignites
              clouds.splice(clouds.indexOf(cl),1);
              SFX.boom(); shakeIt(8); setHitStop(3); bigBurst(cl.x,cl.y,"#f0b050",30); bigBurst(cl.x,cl.y,"#e06040",20);
              popup(cl.x,cl.y,"THERMOBARIC!","#f0b050");
              for(const v of enemies){ if((v.x-cl.x)**2+(v.y-cl.y)**2 < sq(CFG.tile*2.2)) damage(v, 85, true); }
              break;
            }
          }
        }
      }
    }
    if(e.hp<=0){ kill(e); }
  }
  // last survivor drama — one banner per wave
  if(mode==="play" && spawnQ.length===0 && enemies.length===1 && !lastSurvivorShown){
    lastSurvivorShown = true;
    const sType = {scav:"THE LAST SCOUT",troop:"THE LAST TROOPER",incin:"THE LAST INCINERATOR",sweeper:"THE LAST SWEEPER",butcher:"THE BUTCHER STANDS ALONE",boss:"THE PURIFIER WILL NOT YIELD"};
    showBanner(sType[enemies[0].type]||"THE LAST ONE STANDING","finish it");
  }

  /* towers */
  for(let i=towers.length-1;i>=0;i--){
    const t = towers[i];
    t.pulse += DT;
    if(t.flash>0) t.flash-=DT;
    if(t.hp<=0){
      burst(t.x,t.y,"#7a8f6a",16); popup(t.x,t.y,"BURNED DOWN","#e0a04a");
      if(menu&&menu.tower===t) menu=null;
      towers.splice(i,1);
      const stillHere = corpses.some(k=>k.c===t.c&&k.r===t.r);
      if(!stillHere && blocked[t.r][t.c]) unblock(t.c,t.r);
      triggerReabsorb(); // DR-#025 B2: burned-down zombie also starts the reabsorb delay
      continue;
    }
    if(t.type==="rootmass"||t.type==="node"||t.type==="grabber") continue; // DR-#025: grabber is a slow aura, not a shooter
    const def = CFG.towers[t.type];
    // Feast level scaling: each devoured corpse makes the zombie hit harder + faster
    const lvl = t.level||1;
    let rate = def.rate * meta.rate * (pherT>0?1.4:1) * (1+(lvl-1)*0.10);
    let dmgMult = 1 + (lvl-1)*0.25;
    for(const n of towers){ if(n.type==="node" && n!==t && dist2(n,t)<sq((n.tier===1?2.4:CFG.towers.node.range)*CFG.tile)){ rate*=1.5; if(n.tier===1) dmgMult*=1.25; break; } }
    t.cd -= DT*rate;
    if(t.cd<=0){
      // find target in range (pheromone: hunt sweepers first)
      let tgt=null, bd=Infinity;
      if(pherT>0){ for(const e of enemies){ if(e.type!=="sweeper") continue; const d=dist2(t,e); if(d<sq(def.range*CFG.tile) && d<bd){ bd=d; tgt=e; } } }
      if(!tgt){ bd=Infinity; for(const e of enemies){ const d=dist2(t,e); if(d<sq(def.range*CFG.tile) && d<bd){ bd=d; tgt=e; } } }
      if(tgt){
        t.cd = 1;
        if(t.type==="warden"){
          // chain sweep: hits every human in the circle
          t.swing = 0.3;
          rings.push({x:t.x,y:t.y,r:0,maxR:def.range*CFG.tile*1.05,maxT:0.35,t:0.35,col:"rgba(220,210,80,0.55)"});
          for(const e of enemies){ if(dist2(t,e)<sq(def.range*CFG.tile)) damage(e, def.dmg*meta.dmg*dmgMult, false); }
          SFX.hit(); noise(0.1,0.18,false);
          burst(t.x,t.y-6,"#c9ced4",6);
          if(t.name && Math.random()<0.22) popup(t.x,t.y-26,t.name+"!",TCOL.warden.acc);
        } else if(t.type==="spitter"){
          t.shotN = (t.shotN||0) + 1;
          const charged = t.shotN % 8 === 0;
          projectiles.push({x:t.x,y:t.y,tgt,spd:charged?220:340,dmg:def.dmg*meta.dmg*(1+run.spitDmg)*dmgMult*(charged?2.5:1),splash:t.tier===1,charged});
          if(charged){ popup(t.x,t.y-18,"PTOOW!","#c8f050"); burst(t.x,t.y,"#c8f050",8); }
          SFX.shot();
        } else if(t.type==="spore"){
          const cr=(t.tier===1?def.cloudR*1.5:def.cloudR)*CFG.tile;
          clouds.push({x:tgt.x,y:tgt.y,r:cr,t:def.cloudT+run.cloudT,coat:t.tier===1?3.0:1.5});
        }
      }
    }
  }

  /* clouds */
  for(let i=clouds.length-1;i>=0;i--){
    const cl = clouds[i]; cl.t-=DT;
    if(cl.t<=0){ clouds.splice(i,1); continue; }
    for(const e of enemies){ if((e.x-cl.x)**2+(e.y-cl.y)**2 < sq(cl.r)) e.coat = Math.max(e.coat, cl.coat||1.5); }
  }

  /* projectiles */
  for(let i=projectiles.length-1;i>=0;i--){
    const p = projectiles[i];
    if(!enemies.includes(p.tgt)){ projectiles.splice(i,1); continue; }

}

  const py = (ev.touches?ev.touches[0].clientY:ev.clientY) - rect.top;

// pad a logical-space hit box so its ON-SCREEN size never drops below ~44 real px
function hitPad(size){ return Math.max(0, Math.min(80, (44/Math.max(viewScale,0.01) - size)/2)); }
function onTap(x,y){
  audio();

    const p=hitPad(56);
    if(x>W-64-p && x<W-8+p && y>8-p && y<64+p){ muted=!muted; save.muted=muted; persist(); SFX.ui(); return; }
    const db=dailyBtnRect();
    if(x>=db.x&&x<=db.x+db.w&&y>=db.y&&y<=db.y+db.h){ daily=true; bumpDailyStreak(); newRun(); }

    return;
  }
  if(mode==="over"||mode==="victory"){ handleEndScreen(x,y); return; }
  if(mode==="secondwind"){ handleSecondWind(x,y); return; }
  if(paused){
    const b=pauseBtns();

    // a big hitPad() can't make adjacent buttons swallow each other's taps
    const hit=(r,hcap,vcap)=>{
      const pv=vcap!=null?Math.min(hitPad(r.h),vcap):hitPad(r.h);
      const ph=hcap!=null?Math.min(hitPad(r.w),hcap):hitPad(r.w);
      return x>r.x-ph&&x<r.x+r.w+ph&&y>r.y-pv&&y<r.y+r.h+pv;
    };

    const vGapHalf = (b.restart.y-(b.resume.y+b.resume.h))/2;
    if(hit(b.restart,hGapHalf,vGapHalf)){ paused=false; SFX.ui(); newRun(); return; }
    if(hit(b.quit,hGapHalf,vGapHalf)){ paused=false; SFX.ui(); mode="title"; stopDrone(); CG.gameplayStop(); return; }
    if(hit(b.resume,null,vGapHalf)){ paused=false; CG.gameplayStart(); return; }
    return; // tap elsewhere on the pause overlay does nothing (no accidental resume)
  }

  // mute button (top-right) — 56px logical box, padded to a real 44px min tap target
  { const p=hitPad(56); if(x>W-64-p && x<W-8+p && y>8-p && y<64+p){ muted=!muted; save.muted=muted; persist(); SFX.ui(); return; } }
  // pause button
  { const p=hitPad(56); if(x>W-128-p && x<W-72+p && y>8-p && y<64+p){ paused=true; CG.gameplayStop(); return; } }
  // boon pick blocks everything else
  if(boonChoice){
    const cards = boonCards();

    for(let i=0;i<cards.length;i++){
      const o = cards[i];
      if(x>=o.x-pad&&x<=o.x+o.w+pad&&y>=o.y-pad&&y<=o.y+o.h+pad){ pickBoon(i); return; }
    }

  }
  // speed toggle (bottom-right) — 68px logical box, padded to a real 44px min tap target
  { const p=hitPad(68); if(x>W-78-p && x<W-10+p && y>H-78-p && y<H-10+p){ gameSpeed = gameSpeed===1?2:1; SFX.ui(); return; } }
  // DR-#023 build palette (bottom-center): toggle the hedge / spitter brush

  }

  { const [c,r]=xyToTile(x,y); if(inGrid(c,r) && hedge[r] && hedge[r][c]){ menu = {hedge:{c,r}}; SFX.ui(); return; } }
}
function hedgeRefund(c,r){ return hedgePaid[r] && hedgePaid[r][c] ? Math.max(1, Math.round(hedgeCostNow()*0.6)) : 0; } // DR-#027 C5

function menuAnchor(){ if(menu.tower) return [menu.tower.x, menu.tower.y]; if(menu.hedge) return tileToXY(menu.hedge.c, menu.hedge.r); const s = menu.corpse; return tileToXY(s.c, s.r); }
function menuOpts(){

// bake static ground decor (trees/structs/shrooms/bones) to an offscreen canvas ONCE,

let decorBaked = null;
function bakeDecor(){
  try{
    if(!decorBaked){ decorBaked = document.createElement("canvas"); decorBaked.width=W; decorBaked.height=H; }
    const g = decorBaked.getContext("2d");
    g.clearRect(0,0,W,H);
    const items=[];
    for(const b of DECOR.bones) items.push({y:b.y, d:()=>drawBone(b,g)});
    for(const m of DECOR.shrooms) items.push({y:m.y, d:()=>drawShroom(m,g)});
    for(const s of DECOR.structs) items.push({y:s.y, d:()=>drawStruct(s,g)});
    for(const t of DECOR.trees) items.push({y:t.y, d:()=>drawTree(t,g)});

    ctx.fillStyle="#9fd0b0"; ctx.beginPath(); ctx.ellipse(fx, f.y, f.r, f.r*0.4, 0, 0, 6.283); ctx.fill(); }

  const openSides = (!endless && waveIdx===0)?[3] : (!endless && waveIdx<4)?[2,3] : [0,1,2,3];
  const sideAnchor={0:[cx,TOP+4],1:[cx,H-4],2:[4,cy],3:[W-4,cy]};
  for(const sd of openSides){ const [sx,sy]=sideAnchor[sd];
    ctx.strokeStyle="rgba(70,55,40,0.22)"; ctx.lineWidth=26;

    for(const s of DECOR.structs) items.push({y:s.y, d:()=>drawStruct(s)});
    for(const t of DECOR.trees) items.push({y:t.y, d:()=>drawTree(t)});

/* DR-#021 route overlay: faint directional chevrons on every walkable tile so the player
   reads the lanes the maze funnels enemies through (research: persistent flow overlay). */
function drawFlowOverlay(){
  if(!flow || (mode!=="play" && mode!=="prep")) return;
  ctx.save();
  ctx.strokeStyle="rgba(143,217,168,0.12)"; ctx.lineWidth=1.4; ctx.lineCap="round";
  ctx.beginPath();
  const L=7, H2=4;
  for(let r=0;r<CFG.rows;r++)for(let c=0;c<CFG.cols;c++){
    if(blocked[r][c]||isHive(c,r)) continue;
    const f=flow[r][c]; if(!f) continue;
    const [x,y]=tileToXY(c,r); const ax=f[0], ay=f[1];
    const hx=x+ax*L, hy=y+ay*L;
    ctx.moveTo(x-ax*L, y-ay*L); ctx.lineTo(hx,hy);
    ctx.lineTo(hx-ax*H2-ay*H2, hy-ay*H2+ax*H2);
    ctx.moveTo(hx,hy); ctx.lineTo(hx-ax*H2+ay*H2, hy-ay*H2-ax*H2);
  }
  ctx.stroke();
  ctx.restore();
}
/* DR-#034: castle-wall rock — dark stone mass with a lit parapet edge wherever it borders a
   walkable lane, so the four paths read instantly. Deterministic per-tile detail (no flicker). */
function drawRocks(){
  const T=CFG.tile;
  for(let r=0;r<CFG.rows;r++) for(let c=0;c<CFG.cols;c++){
    if(!rock[r] || !rock[r][c]) continue;
    const x=c*T, y=TOP+r*T;
    ctx.fillStyle="#1c2026"; ctx.fillRect(x,y,T,T);                      // stone body
    const h1=hedgeHash(c*13+r, r*7-c);                                    // reuse deterministic hash
    if(h1<0.5){ ctx.fillStyle="rgba(60,70,84,0.25)";                      // block face variation
      ctx.fillRect(x+3+h1*10, y+3+hedgeHash(c-r,r+c)*10, 14, 9); }
    // mortar seams (brick whisper)
    ctx.strokeStyle="rgba(0,0,0,0.35)"; ctx.lineWidth=1;
    ctx.strokeRect(x+0.5,y+0.5,T-1,T-1);
    // parapet: lit edge + crenellation teeth on sides facing a lane
    const open=(rr,cc)=> inGrid(cc,rr) && !rock[rr][cc];
    ctx.fillStyle="#39424f";
    if(open(r-1,c)){ ctx.fillRect(x,y,T,3);       for(let k=0;k<2;k++) ctx.fillRect(x+5+k*20, y, 10, 7); }
    if(open(r+1,c)){ ctx.fillRect(x,y+T-3,T,3);   for(let k=0;k<2;k++) ctx.fillRect(x+5+k*20, y+T-7, 10, 7); }
    if(open(r,c-1)){ ctx.fillRect(x,y,3,T);       for(let k=0;k<2;k++) ctx.fillRect(x, y+5+k*20, 7, 10); }
    if(open(r,c+1)){ ctx.fillRect(x+T-3,y,3,T);   for(let k=0;k<2;k++) ctx.fillRect(x+T-7, y+5+k*20, 7, 10); }
  }
}

/* DR-#023: render placed hedges as merged topiary (autotile-lite: round only outer corners, extend
   1px over shared edges so contiguous tiles read as one continuous hedge wall). */
function hedgeRect(x,y,w,h,rad){ ctx.beginPath(); if(ctx.roundRect) ctx.roundRect(x,y,w,h,rad); else ctx.rect(x,y,w,h); }
function hedgeHash(c,r){ let n=(c*73856093)^(r*19349663); n=(n^(n>>13))*1274126177; return ((n^(n>>16))>>>0)/4294967296; } // deterministic 0..1
function drawHedges(){
  const T=CFG.tile, R=9;
  for(let r=0;r<CFG.rows;r++) for(let c=0;c<CFG.cols;c++){
    if(!hedge[r][c]) continue;
    const N=r>0&&hedge[r-1][c], S=r+1<CFG.rows&&hedge[r+1][c], Wl=c>0&&hedge[r][c-1], E=c+1<CFG.cols&&hedge[r][c+1];
    const x=c*T, y=TOP+r*T;
    const x0=x-(Wl?1:0), y0=y-(N?1:0), w=T+(Wl?1:0)+(E?1:0), h=T+(N?1:0)+(S?1:0);
    const rad=[ (!N&&!Wl)?R:0, (!N&&!E)?R:0, (!S&&!E)?R:0, (!S&&!Wl)?R:0 ];
    // DR-#033: rotting-wood walls (playtest 6:10 "more like rotting wood, grey and dark browns") — was leafy green topiary
    ctx.fillStyle="#140f0a"; hedgeRect(x0,y0+4,w,h,rad); ctx.fill();          // deeper base shadow (grounds it)
    ctx.fillStyle="#3a3128"; hedgeRect(x0,y0,w,h,rad); ctx.fill();            // grey-brown rotted body
    // weathered grain + knots — short strokes/knots in greys & dark browns (inset, no per-tile clip = cheap)
    for(let i=0;i<4;i++){
      const lx=x+7+hedgeHash(c*7+i, r*5-i)*(T-14), ly=y+6+hedgeHash(c*3-i, r*11+i)*(T-16);
      if(hedgeHash(c-i,r+i)<0.4){ // knot
        ctx.fillStyle = ((i+c+r)&1) ? "#241c14" : "#4a4034";
        ctx.beginPath(); ctx.arc(lx,ly,2+hedgeHash(c+i,r-i)*2,0,6.283); ctx.fill();
      } else { // vertical grain streak
        ctx.strokeStyle = ((i+c+r)&1) ? "rgba(30,24,18,0.6)" : "rgba(96,84,68,0.5)";
        ctx.lineWidth=1.4; ctx.beginPath(); ctx.moveTo(lx,ly-4); ctx.lineTo(lx+hedgeHash(c*2,r*3)*2-1,ly+5); ctx.stroke();
      }
    }
    // cool top-face highlight (weak grey light, damp wood)
    ctx.fillStyle="rgba(150,140,124,0.30)"; ctx.beginPath(); ctx.ellipse(x+T/2,y+T*0.30,T*0.34,T*0.16,0,0,6.283); ctx.fill();
  }
}
/* DR-#023: gate markers on the border — open gates glow (enemies enter here), closed are dim. */
function drawGates(){
  const hcx=(CFG.hive.c0+CFG.hive.c1+1)/2*CFG.tile, hcy=TOP+(CFG.hive.r0+CFG.hive.r1+1)/2*CFG.tile;
  const open=openGates();
  CFG.gates.forEach((g,gi)=>{
    const isOpen=open.includes(g), [x,y]=tileToXY(g.c,g.r);
    let dx=hcx-x, dy=hcy-y; const m=Math.hypot(dx,dy)||1; dx/=m; dy/=m;
    const ang=Math.atan2(dy,dx);
    // DR-#029 C9: just-opened gate flares — expanding ring + hot arch so the new front is unmissable
    const of = gateOpenT[gi]||0;
    if(of>0){
      const p = 1-(of/3.5); // 0→1 over the flash
      ctx.save();
      ctx.globalAlpha = Math.max(0, of/3.5)*0.8;
      ctx.strokeStyle="#ffb060"; ctx.lineWidth=3;
      ctx.beginPath(); ctx.arc(x,y,10+p*34,0,6.283); ctx.stroke();
      ctx.globalAlpha = 0.5+0.5*Math.sin(perfNow*10); ctx.strokeStyle="#ffd080"; ctx.lineWidth=4;
      ctx.beginPath(); ctx.arc(x,y,16,ang-1.3,ang+1.3); ctx.stroke();
      ctx.restore();
    }
    ctx.save();
    ctx.globalAlpha = isOpen ? 0.55+0.35*Math.sin(perfNow*3) : 0.2;
    ctx.strokeStyle = isOpen ? "#e0714a" : "#6a5048"; ctx.lineWidth=3; ctx.lineCap="round";
    ctx.beginPath(); ctx.arc(x,y,15,ang-1.15,ang+1.15); ctx.stroke();       // inward-facing arch
    const bx=x+dx*5, by=y+dy*5, px=-dy, py=dx;                              // inward chevron
    ctx.beginPath(); ctx.moveTo(bx+px*7,by+py*7); ctx.lineTo(bx+dx*10,by+dy*10); ctx.lineTo(bx-px*7,by-py*7); ctx.stroke();
    ctx.restore();

}
/* DR-#033: grabber gets its OWN body — NOT the green zombie sprite (playtest: "grabber looks like a

/* DR-#025 B1: grabber's grasping tendrils — clawed arms reaching outward, the distinct slow-tower tell. */
function drawGrabTendrils(t){
  const cx=t.x, cy=t.y-2, reach=17+(t.tier===1?3:0);
  ctx.save();
  ctx.lineCap="round"; ctx.lineJoin="round";
  for(let a=0;a<4;a++){
    const base = a*(Math.PI/2) + Math.PI/4;
    const wig = Math.sin(t.pulse*2.4 + a*1.7)*0.35;   // slow grasping wiggle
    const ang = base + wig;
    const ex = cx + Math.cos(ang)*reach, ey = cy + Math.sin(ang)*reach*0.7;
    const mx = cx + Math.cos(ang-0.3)*reach*0.55, my = cy + Math.sin(ang-0.3)*reach*0.4;
    // arm
    ctx.strokeStyle="#3a2410"; ctx.lineWidth=4.5;
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.quadraticCurveTo(mx,my,ex,ey); ctx.stroke();
    ctx.strokeStyle="#c8925a"; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.quadraticCurveTo(mx,my,ex,ey); ctx.stroke();
    // 3 grasping claw fingers at the tip
    const dx=Math.cos(ang), dy=Math.sin(ang)*0.7, px=-dy, py=dx;
    ctx.strokeStyle="#e6b072"; ctx.lineWidth=1.8;
    for(let f=-1;f<=1;f++){
      const fx=ex+px*f*3, fy=ey+py*f*3;
      ctx.beginPath(); ctx.moveTo(ex,ey); ctx.lineTo(fx+dx*4, fy+dy*4); ctx.stroke();
    }
  }
  ctx.restore();
}

      bg.addColorStop(0,"rgba("+bcol+","+(0.5+0.12*Math.sin(t.pulse*2.2))+")");
      bg.addColorStop(1,"rgba("+bcol+",0)");
      ctx.save(); ctx.fillStyle=bg; ctx.beginPath(); ctx.ellipse(t.x,t.y+8,baseR,baseR*0.55,0,0,6.283); ctx.fill(); ctx.restore();
      const ds = towerSpriteScale*lvlF;
      drawSpriteFrame('zombie', t.x, t.y-Math.round(ds*0.16), towerAimAngle(t), t.pulse*30, ds, t.flash);
      if(t.cd>0){ ctx.save(); ctx.globalAlpha=0.3; ctx.strokeStyle="#dfff70"; ctx.lineWidth=2.5; ctx.beginPath(); ctx.arc(t.x,t.y+6,24,-Math.PI/2,-Math.PI/2+6.283*(1-t.cd)); ctx.stroke(); ctx.restore(); }
    } else {
      ctx.save(); ctx.translate(t.x,t.y);
      const p = 1+0.05*Math.sin(t.pulse*3);
      ctx.scale(p,p);
      // tier-2 aura glow
      if(t.tier===1){ ctx.save(); ctx.globalAlpha=0.13+0.05*Math.sin(t.pulse*2.2); ctx.fillStyle=TCOL[t.type]?TCOL[t.type].acc:"#e0a0f0"; ctx.beginPath(); ctx.arc(0,0,23,0,6.283); ctx.fill(); ctx.restore(); }
      if(t.flash>0){ ctx.globalAlpha=0.6; }
      drawTowerArt(t.type, t.tier, t.pulse, false, t.swing||0);
      ctx.globalAlpha = 1;
      // cooldown reload arc (shooter towers only)
      if(t.cd>0 && t.type!=="rootmass" && t.type!=="node"){ ctx.save(); ctx.globalAlpha=0.28; ctx.strokeStyle="#fff"; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(0,0,17,-Math.PI/2,-Math.PI/2+6.283*(1-t.cd)); ctx.stroke(); ctx.restore(); }
      ctx.restore();
    }
    if(t.hp<t.max){ const tc=TCOL[t.type]; ctx.fillStyle="#333"; ctx.fillRect(t.x-14,t.y-24,28,4); ctx.fillStyle=tc?tc.acc:"#e0a04a"; ctx.fillRect(t.x-14,t.y-24,28*(t.hp/t.max),4); }
    // level pips (feast upgrades): small chevrons above a leveled-up zombie
    if(lvl>1){ ctx.fillStyle="#e0a0f0"; for(let p=0;p<Math.min(lvl-1,5);p++){ ctx.beginPath(); ctx.arc(t.x-8+p*4, t.y-30, 1.6, 0, 6.283); ctx.fill(); } }
  }
  // node link lines (purple dashes between Node and buffed towers)
  ctx.save(); ctx.setLineDash([4,7]);
  for(const n of towers){
    if(n.type!=="node") continue;
    const lr=(n.tier===1?2.4:CFG.towers.node.range)*CFG.tile;
    for(const tw of towers){
      if(tw===n||dist2(n,tw)>=sq(lr)) continue;
      ctx.globalAlpha=0.17+0.07*Math.sin(perfNow*2.5);
      ctx.strokeStyle="#c9a0f0"; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.moveTo(n.x,n.y); ctx.lineTo(tw.x,tw.y); ctx.stroke();
    }
  }
  ctx.setLineDash([]); ctx.globalAlpha=1; ctx.restore();
  // enemies
  const hxE=W/2, hyE=(TOP+H)/2;
  for(const e of enemies){
    // contact shadow grounds the enemy (drawn in world space, under the bob)
    contactShadow(e.x, e.y+e.r*0.72, e.r*0.85, e.r*0.34, 0.3);
    ctx.save(); ctx.translate(e.x,e.y);
    // goofy shamble: walk-bob + squash-stretch (calmer for the big bosses)
    if(!REDUCED_MOTION){
      const amp = (e.type==="boss"||e.type==="butcher") ? 0.5 : 1;
      const hop = Math.sin(perfNow*9 + e.id*1.7)*amp;
      ctx.translate(0, -Math.abs(hop)*e.r*0.13);
      ctx.scale(1+hop*0.05, 1-hop*0.05);
    }
    // speed streak for scavengers (drawn under everything, sprite or procedural)
    let scavFv = null;
    if(e.type==="scav" && flow){
      const [ec2,er2]=xyToTile(e.x,e.y);
      scavFv=(inGrid(ec2,er2)&&flow[er2]&&flow[er2][ec2])?flow[er2][ec2]:null;
      if(scavFv){ ctx.save(); ctx.globalAlpha=0.2; ctx.fillStyle=e.col;
        ctx.beginPath(); ctx.arc(-scavFv[0]*10,-scavFv[1]*10,e.r*0.65,0,6.283); ctx.fill();
        ctx.beginPath(); ctx.arc(-scavFv[0]*16,-scavFv[1]*16,e.r*0.35,0,6.283); ctx.fill();
        ctx.restore(); }
    }
    // SPR-#003: scav attacker = the Thief (fantasy human, pre-rendered-3D sprite),
    // facing its travel direction. Procedural block below is the fallback.
    let spriteDrawn = false;
    if(e.type==="scav" && useSprites && SPR.thief.ready){
      const ang = scavFv ? Math.atan2(-scavFv[1], -scavFv[0]) : Math.atan2(hyE-e.y, hxE-e.x);
      spriteDrawn = blitFrame('thief', ang, e.id*1.3, e.r*enemySpriteScale, e.flash);
    }
    if(!spriteDrawn){
    // cel outline silhouette (pops against the busier environment)
    ctx.strokeStyle="rgba(8,10,12,0.9)"; ctx.lineWidth=2.5;
    if(e.type==="sweeper"){ ctx.strokeRect(-e.r,-e.r,e.r*2,e.r*2); }
    else { ctx.beginPath(); ctx.arc(0,0,e.r,0,6.283); ctx.stroke(); }
    ctx.fillStyle = e.flash>0 ? "#ffffff" : e.col;
    if(e.type==="sweeper"){
      ctx.fillRect(-e.r,-e.r,e.r*2,e.r*2);
      ctx.fillStyle="#2a2a1a"; ctx.fillRect(-e.r*0.5,-e.r*0.5,e.r,e.r*0.6); // visor
      if(e.chanT>0){ ctx.strokeStyle="#e3d34e"; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(0,0,e.r+6,-Math.PI/2,-Math.PI/2+6.283*(e.chanT/3)); ctx.stroke(); }
    } else if(e.type==="troop"){
      ctx.beginPath(); ctx.arc(0,0,e.r,0,6.283); ctx.fill();
      ctx.fillStyle="#2c4a63"; ctx.fillRect(-e.r,-e.r*0.9,e.r*0.7,e.r*1.8); // shield
    } else if(e.type==="incin"){
      ctx.beginPath(); ctx.arc(0,0,e.r,0,6.283); ctx.fill();
      ctx.fillStyle="#f0c060"; ctx.beginPath(); ctx.arc(0,-e.r*0.4,4,0,6.283); ctx.fill(); // pilot light
    } else if(e.type==="butcher"){
      ctx.beginPath(); ctx.arc(0,0,e.r,0,6.283); ctx.fill();
      ctx.strokeStyle="#5c1f1f"; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(0,0,e.r,0,6.283); ctx.stroke();
      ctx.fillStyle="#d0d4d8"; ctx.save(); ctx.rotate(perfNow*2);
      ctx.fillRect(e.r*0.4,-3,e.r*0.9,6); ctx.restore(); // swinging cleaver
      ctx.fillStyle="#2a0f0f"; ctx.beginPath(); ctx.arc(0,-3,4,0,6.283); ctx.fill();
    } else if(e.type==="boss"){
      ctx.beginPath(); ctx.arc(0,0,e.r,0,6.283); ctx.fill();
      ctx.strokeStyle="#8fa0b0"; ctx.lineWidth=4; ctx.beginPath(); ctx.arc(0,0,e.r+5,0,6.283); ctx.stroke();
      ctx.fillStyle="#e05050"; ctx.beginPath(); ctx.arc(0,0,5,0,6.283); ctx.fill();
    } else {
      ctx.beginPath(); ctx.arc(0,0,e.r,0,6.283); ctx.fill();
    }
    // googly eyes on the humanoid grunts — pupils nervously eye the Hive they're marching at
    if(e.type==="scav"||e.type==="troop"||e.type==="incin"){
      const dx=hxE-e.x, dy=hyE-e.y, dm=Math.hypot(dx,dy)||1, px=dx/dm, py=dy/dm;
      const er=e.r, ex=er*0.34, ey=-er*0.12, ew=er*0.30, pr=er*0.14;
      ctx.fillStyle="#f4f2ea";
      ctx.beginPath(); ctx.arc(-ex,ey,ew,0,6.283); ctx.arc(ex,ey,ew,0,6.283); ctx.fill();
      ctx.strokeStyle="rgba(8,10,12,0.85)"; ctx.lineWidth=1.2;
      ctx.beginPath(); ctx.arc(-ex,ey,ew,0,6.283); ctx.stroke(); ctx.beginPath(); ctx.arc(ex,ey,ew,0,6.283); ctx.stroke();
      ctx.fillStyle="#15130f";
      ctx.beginPath(); ctx.arc(-ex+px*ew*0.5, ey+py*ew*0.5, pr, 0, 6.283); ctx.arc(ex+px*ew*0.5, ey+py*ew*0.5, pr, 0, 6.283); ctx.fill();
    }
    } // end !spriteDrawn procedural fallback
    // status tells: shape-coded (not color-only) for colorblind accessibility
    if(e.snared){ ctx.strokeStyle="#8a6a3f"; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(0,e.r*0.6,e.r*0.8,0,3.14); ctx.stroke(); }
    if(e.drench>0){ // droplet triangle, top-right
      ctx.fillStyle="rgba(180,240,80,0.85)";
      const dx=e.r*0.5, dy=-e.r*0.5;
      ctx.beginPath(); ctx.moveTo(dx,dy-4); ctx.lineTo(dx+3.5,dy+3); ctx.lineTo(dx-3.5,dy+3); ctx.closePath(); ctx.fill();
    }
    if(e.corroded>0){ // full ring + radiating crack ticks (distinct silhouette from a plain ring)
      ctx.strokeStyle="rgba(200,240,80,0.85)"; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(0,0,e.r+4,0,6.283); ctx.stroke();
      for(let ti=0;ti<5;ti++){ const ta=ti*(6.283/5)+perfNow*1.5; const rx=Math.cos(ta)*(e.r+4), ry=Math.sin(ta)*(e.r+4);
        ctx.beginPath(); ctx.moveTo(rx,ry); ctx.lineTo(rx+Math.cos(ta)*5,ry+Math.sin(ta)*5); ctx.stroke(); }
      ctx.lineWidth=1;
    }
    // HP tint: redden at low health
    if(e.hp/e.max<0.5 && e.flash<=0){ const dmgF=Math.min(1,(1-e.hp/e.max)*2); ctx.save(); ctx.globalAlpha=dmgF*0.38; ctx.fillStyle="#cc2020"; ctx.beginPath(); ctx.arc(0,0,e.r,0,6.283); ctx.fill(); ctx.restore(); }
    ctx.restore();
    // hp bar
    if(e.hp<e.max){ ctx.fillStyle="#222"; ctx.fillRect(e.x-14,e.y-e.r-10,28,4); ctx.fillStyle="#e06060"; ctx.fillRect(e.x-14,e.y-e.r-10,28*Math.max(0,e.hp/e.max),4); }
    // last enemy pulse ring
    if(mode==="play" && spawnQ.length===0 && enemies.length===1){
      const lp=0.5+0.5*Math.sin(perfNow*8);
      ctx.strokeStyle="rgba(255,80,80,"+(0.4+lp*0.5)+")"; ctx.lineWidth=2.5;
      ctx.beginPath(); ctx.arc(e.x,e.y,e.r+6+lp*3,0,6.283); ctx.stroke(); ctx.lineWidth=1;
    }
  }
  // projectiles: glowing acid globs with a comet trail
  for(const p of projectiles){
    const rad = p.charged?8:4;
    let dx=0,dy=0; if(p.tgt){ dx=p.tgt.x-p.x; dy=p.tgt.y-p.y; } const dm=Math.hypot(dx,dy)||1;
    ctx.save(); ctx.globalAlpha=0.35; ctx.fillStyle="#a8e030";
    ctx.beginPath(); ctx.arc(p.x-dx/dm*rad*1.4, p.y-dy/dm*rad*1.4, rad*0.7, 0, 6.283); ctx.fill(); ctx.restore();
    ctx.save(); ctx.shadowColor="#c8f050"; ctx.shadowBlur=p.charged?12:6;
    ctx.fillStyle="#dfff70"; ctx.beginPath(); ctx.arc(p.x,p.y,rad,0,6.283); ctx.fill();
    ctx.fillStyle="#8fbf20"; ctx.globalAlpha=0.7; ctx.beginPath(); ctx.arc(p.x+rad*0.3,p.y+rad*0.3,rad*0.45,0,6.283); ctx.fill();
    ctx.restore();
  }
  // particles
  for(const p of particles){ ctx.globalAlpha=p.big?Math.min(1,p.t*1.4):Math.min(1,p.t*2.5); ctx.fillStyle=p.col; const ps=p.big?7:3; ctx.fillRect(p.x-ps/2,p.y-ps/2,ps,ps); }
  ctx.globalAlpha=1;
  // ambient drifting spores (light foreground parallax layer)
  drawMotes();
  // popups
  ctx.textAlign="center"; ctx.font="bold 18px monospace";
  for(const p of popups){ ctx.globalAlpha=Math.min(1,p.t); ctx.fillStyle=p.col; ctx.fillText(p.txt,p.x,p.y); }
  ctx.globalAlpha=1;

  drawHUD();
  drawAbilities();
  drawSpeedBtn();
  drawPalette();     // DR-#023 build palette
  drawBossBar();
  if(menu) drawMenu();
  if(mode==="prep") drawPrep();
  if(boonChoice) drawBoons();
  if(banner) drawBanner();
  if(paused) drawPaused();
  if(mode==="over") drawEnd(false);
  if(mode==="victory") drawEnd(true);
  if(mode==="secondwind") drawSecondWind();
  if(rotateHintT>0){
    ctx.save(); ctx.globalAlpha=Math.min(1,rotateHintT);
    ctx.fillStyle="rgba(14,18,20,0.88)";
    ctx.beginPath(); if(ctx.roundRect)ctx.roundRect(W/2-140,H-40,280,32,8);else ctx.rect(W/2-140,H-40,280,32); ctx.fill();
    ctx.fillStyle="#dfe6ec"; ctx.textAlign="center"; ctx.font="12px monospace";
    ctx.fillText("↻ rotate for a bigger view", W/2, H-19);
    ctx.restore();
  }
  ctx.restore();
  // vignette
  const g = ctx.createRadialGradient(W/2,H/2,H*0.35,W/2,H/2,H*0.75);
  g.addColorStop(0,"rgba(0,0,0,0)"); g.addColorStop(1,"rgba(10,4,14,0.45)");
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  // screen-edge red pulse: flash on hive hit + persistent breathing at low HP
  const hpPct = hiveMax>0 ? hiveHP/hiveMax : 1;
  const pulsePersist = (!REDUCED_MOTION && (mode==="play"||mode==="prep") && hpPct<0.3) ? 0.18*(1+0.4*Math.sin(perfNow*6)) : 0;
  const edgeA = Math.max(edgePulseT*0.55, pulsePersist);
  if(edgeA>0.01){
    const eg = ctx.createRadialGradient(W/2,H/2,H*0.2,W/2,H/2,H*0.85);
    eg.addColorStop(0,"rgba(0,0,0,0)"); eg.addColorStop(1,"rgba(210,40,40,"+edgeA.toFixed(3)+")");
    ctx.fillStyle=eg; ctx.fillRect(0,0,W,H);
  }
  // wave-start flash
  if(waveFlashT>0){ ctx.fillStyle="rgba(255,255,255,"+(waveFlashT/0.15*0.13)+")"; ctx.fillRect(0,0,W,H); }
}
function drawHive(){
  const [x0,y0]=tileToXY(CFG.hive.c0,CFG.hive.r0), [x1,y1]=tileToXY(CFG.hive.c1,CFG.hive.r1);
  const cx=(x0+x1)/2, cy=(y0+y1)/2;
  const hurt = hiveHP/hiveMax;
  const beat = REDUCED_MOTION ? 2.2 : (hurt<0.25?7:2.2);
  const pulse = 1+0.04*Math.sin(perfNow*beat);
  // bioluminescent ground glow (soft, breathing)
  const glowR = 92*pulse;
  const gr = ctx.createRadialGradient(cx,cy,10, cx,cy,glowR);
  const gcol = hurt<0.35 ? "224,90,90" : "150,110,210";
  gr.addColorStop(0,"rgba("+gcol+","+(0.30+0.08*Math.sin(perfNow*beat))+")");
  gr.addColorStop(1,"rgba("+gcol+",0)");
  ctx.fillStyle=gr; ctx.beginPath(); ctx.arc(cx,cy,glowR,0,6.283); ctx.fill();
  // writhing tendrils radiating outward (animated)
  ctx.strokeStyle="rgba(150,100,180,0.30)"; ctx.lineWidth=3;
  for(let i=0;i<10;i++){ const a=i*0.628+0.3+Math.sin(perfNow*0.6+i)*0.08, w=Math.sin(perfNow*1.1+i)*10;
    ctx.beginPath(); ctx.moveTo(cx,cy);
    ctx.quadraticCurveTo(cx+Math.cos(a)*60+w, cy+Math.sin(a)*60, cx+Math.cos(a+0.4)*98, cy+Math.sin(a+0.4)*98); ctx.stroke(); }
  ctx.save(); ctx.translate(cx,cy); ctx.scale(pulse,pulse);
  // body with cel outline
  ctx.strokeStyle="rgba(20,10,30,0.85)"; ctx.lineWidth=3;
  ctx.fillStyle="#5a3a78"; ctx.beginPath(); ctx.ellipse(0,0,52,42,0,0,6.283); ctx.fill(); ctx.stroke();
  ctx.fillStyle="#7a4fa0"; ctx.beginPath(); ctx.ellipse(0,0,38,30,0,0,6.283); ctx.fill();
  // pulsing bioluminescent core sacs
  for(const [ox,oy,r] of [[-20,-8,6],[18,-12,5],[-8,16,5],[22,10,4]]){
    ctx.save(); ctx.globalAlpha=0.5+0.4*Math.sin(perfNow*2.2+ox); ctx.fillStyle="#c9f0a8";
    ctx.beginPath(); ctx.arc(ox,oy,r,0,6.283); ctx.fill(); ctx.restore();
  }
  // big cyclops eye — blinks, and glares at the nearest threat
  const eyeR=15;
  ctx.fillStyle="#e8dcf5"; ctx.beginPath(); ctx.ellipse(0,-2,eyeR,eyeR*0.82,0,0,6.283); ctx.fill();
  ctx.strokeStyle="rgba(20,10,30,0.7)"; ctx.lineWidth=2; ctx.stroke();
  // pupil tracks the nearest enemy
  let tgt=null, bd=Infinity;
  for(const e of enemies){ const d=(e.x-cx)**2+(e.y-cy)**2; if(d<bd){ bd=d; tgt=e; } }
  let lx=0, ly=0;
  if(tgt){ const dx=tgt.x-cx, dy=tgt.y-cy, dm=Math.hypot(dx,dy)||1; lx=dx/dm*6; ly=dy/dm*5; }
  const blink = (!REDUCED_MOTION && Math.sin(perfNow*0.9)>0.97) ? 0.12 : 1; // occasional blink
  ctx.save(); ctx.scale(1, blink);
  ctx.fillStyle = hurt<0.35 ? "#e05050" : "#3a1a5a";
  ctx.beginPath(); ctx.arc(lx,(-2+ly)/blink,7,0,6.283); ctx.fill();
  ctx.fillStyle="#fff"; ctx.globalAlpha=0.8; ctx.beginPath(); ctx.arc(lx-2,(-4+ly)/blink,2,0,6.283); ctx.fill();
  ctx.restore();
  if(hurt<0.5){ ctx.globalAlpha=1; ctx.strokeStyle="rgba(224,80,80,"+(0.5-hurt)+")"; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(-30,18); ctx.lineTo(-8,26); ctx.lineTo(6,18); ctx.stroke(); }
  ctx.restore();
}

    ctx.fillStyle="#c9a0f0";
    ctx.fillText("[ ENDLESS ]", W*3/4-60, byBot+30);
  } else {
    ctx.fillStyle="#8fd9a8"; ctx.textAlign="center";
    ctx.fillText("[ RISE AGAIN ]", W/2, byBot+30);
  }
}

/* ===== Loop (fixed timestep) ===== */
let lastT = 0, acc = 0, perfNow = 0;
function frame(t){
  requestAnimationFrame(frame);
  if(!lastT){ lastT = t; return; }
  let dt = (t-lastT)/1000; lastT = t;
  if(dt>0.25) dt = 0.25;
  perfNow += dt;
  if(edgePulseT>0) edgePulseT = Math.max(0, edgePulseT - dt*2.5);
  if(rotateHintT>0) rotateHintT = Math.max(0, rotateHintT - dt);
  if(rotTipT>0 && !paused && mode!=="over" && mode!=="victory") rotTipT = Math.max(0, rotTipT - dt);
  if(evolveTipT>0 && !paused) evolveTipT = Math.max(0, evolveTipT - dt);
  if(waveFlashT>0) waveFlashT = Math.max(0, waveFlashT - dt);
  if(slowMoT>0){ slowMoT -= dt; if(slowMoT<=0) timeScale=1; }
  if(hitStop>0){ hitStop--; draw(); return; }
  if(!paused){ acc += dt*timeScale; while(acc>=DT){ for(let i=0;i<gameSpeed;i++) update(); acc-=DT; } }
  if((mode==="play"||mode==="prep") && !paused) updateDrone();
  draw();
}
genDecor();
