/* ===== CrazyGames SDK adapter (no-op offline) ===== */
let sdkLive = false;
let lastAdAt = -Infinity; // interstitial cooldown — avoid ad-spam on quick repeat deaths
const AD_COOLDOWN = 45; // seconds
const CG = {
  init(cb){
    try{ if(window.CrazyGames?.SDK){
      // race against a timeout so a hung/broken SDK init can't block first paint —
      // "fast load is a feature" (bible); the game must still be playable offline-ish
      let done=false;
      const finish=()=>{ if(done) return; done=true; cb&&cb(); };
      window.CrazyGames.SDK.init().then(()=>{ if(done) return; sdkLive=true; CG.loadingStart(); CG.loadingStop(); finish(); }).catch(finish);
      setTimeout(finish, 4000);
      return;
    } }catch(e){}
    cb&&cb();
  },
  loadingStart(){ try{ if(sdkLive) window.CrazyGames.SDK.game.loadingStart(); }catch(e){} },
  loadingStop(){ try{ if(sdkLive) window.CrazyGames.SDK.game.loadingStop(); }catch(e){} },
  gameplayStart(){ try{ if(sdkLive) window.CrazyGames.SDK.game.gameplayStart(); }catch(e){} },
  gameplayStop(){ try{ if(sdkLive) window.CrazyGames.SDK.game.gameplayStop(); }catch(e){} },
  happytime(){ try{ if(sdkLive) window.CrazyGames.SDK.game.happytime(); }catch(e){} },
  // SDK docs describe hasAdblock as a boolean property, but adapt defensively
  // in case a given SDK build exposes it as a method instead
  hasAdblock(){
    try{
      if(!sdkLive) return false;
      const v = window.CrazyGames.SDK.ad.hasAdblock;
      return !!(typeof v==="function" ? v() : v);
    }catch(e){ return false; }
  },
  interstitial(done){
    try{
      if(sdkLive){
        if(perfNow-lastAdAt < AD_COOLDOWN){ done&&done(); return; } // too soon since the last one — skip, don't spam
        lastAdAt = perfNow;
        window.CrazyGames.SDK.ad.requestAd("midgame",{adFinished:done,adError:done,adStarted:()=>{}});
        return;
      }
    }catch(e){}
    done&&done();
  },
  rewarded(done,fail){
    try{
      if(sdkLive){
        if(CG.hasAdblock()){ fail&&fail("adblock"); return; }
        window.CrazyGames.SDK.ad.requestAd("rewarded",{adFinished:()=>done&&done(),adError:()=>fail&&fail("error"),adStarted:()=>{}});
        return;
      }
    }catch(e){}
    done&&done();
  }
};

  // count growth is capped (spawn-queue/perf safeguard); difficulty past the cap
  // keeps rising via run.endlessHpMult/endlessSpdMult (set in queueWave) instead

/* ===== Audio (procedural WebAudio) ===== */
let AC=null, muted = !!save.muted, masterBus=null;
function audio(){
  if(!AC){ try{
    AC = new (window.AudioContext||window.webkitAudioContext)();
    masterBus = AC.createDynamicsCompressor(); masterBus.connect(AC.destination);
  }catch(e){} }
  if(AC&&AC.state==="suspended") AC.resume();
}
function dest(){ return masterBus||AC.destination; }
function tone(f0,f1,dur,type,vol,delay){
  if(muted||!AC) return;
  try{
    const t = AC.currentTime + (delay||0);
    const o = AC.createOscillator(), g = AC.createGain();
    o.type = type||"sine"; o.frequency.setValueAtTime(f0,t);
    o.frequency.exponentialRampToValueAtTime(Math.max(f1,1),t+dur);
    g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.connect(g); g.connect(dest()); o.start(t); o.stop(t+dur+0.02);
  }catch(e){}
}
function noise(dur,vol,hp){
  if(muted||!AC) return;
  try{
    const n = AC.sampleRate*dur, buf = AC.createBuffer(1,n,AC.sampleRate), d = buf.getChannelData(0);
    for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*(1-i/n);
    const s = AC.createBufferSource(); s.buffer=buf;
    const f = AC.createBiquadFilter(); f.type = hp?"highpass":"lowpass"; f.frequency.value = hp?1800:600;
    const g = AC.createGain(); g.gain.value = vol;
    s.connect(f); f.connect(g); g.connect(dest()); s.start();
  }catch(e){}
}

/* ===== Drone (persistent bass, rises as Hive HP drops) ===== */
function stopDrone(){
  if(droneNode){ try{ droneNode.stop(); droneNode.disconnect(); }catch(e){} droneNode=null; droneGain=null; }
  if(droneNode2){ try{ droneNode2.stop(); droneNode2.disconnect(); }catch(e){} droneNode2=null; droneGain2=null; }
}
function updateDrone(){
  if(!AC || AC.state==="suspended") return;
  if(!droneNode){
    try{
      droneNode = AC.createOscillator(); droneGain = AC.createGain();
      droneNode.type = "sawtooth"; droneNode.frequency.value = 55;
      droneGain.gain.value = 0;
      droneNode.connect(droneGain); droneGain.connect(dest());
      droneNode.start();
      // tension layer: sine octave up, joins below 25% HP
      droneNode2 = AC.createOscillator(); droneGain2 = AC.createGain();
      droneNode2.type = "sine"; droneNode2.frequency.value = 110;
      droneGain2.gain.value = 0;
      droneNode2.connect(droneGain2); droneGain2.connect(dest());
      droneNode2.start();
    }catch(e){ droneNode=null; droneGain=null; return; }
  }
  const hpRatio = hiveMax>0 ? Math.max(0, hiveHP/hiveMax) : 1;
  const t = AC.currentTime;
  const target = muted ? 0 : (hpRatio>0.6 ? 0 : (0.6-hpRatio)/0.6*0.12);
  droneGain.gain.setTargetAtTime(target, t, 0.8);
  if(droneGain2){
    const t2 = muted ? 0 : (hpRatio<0.25 ? (0.25-hpRatio)/0.25*0.05 : 0);
    droneGain2.gain.setTargetAtTime(t2, t, 1.2);
  }
}

function inGrid(c,r){ return c>=0 && c<CFG.cols && r>=0 && r<CFG.rows; }
function isHive(c,r){ return c>=CFG.hive.c0 && c<=CFG.hive.c1 && r>=CFG.hive.r0 && r<=CFG.hive.r1; }

/* Flow field: BFS from hive across walkable tiles. flow[r][c] = [dc,dr] step or null. */
function computeFlow(blk){
  const dist = Array.from({length:CFG.rows},()=>new Array(CFG.cols).fill(Infinity));
  const fl = Array.from({length:CFG.rows},()=>new Array(CFG.cols).fill(null));
  const q = [];
  for(let r=CFG.hive.r0;r<=CFG.hive.r1;r++) for(let c=CFG.hive.c0;c<=CFG.hive.c1;c++){ dist[r][c]=0; q.push([c,r]); }
  const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
  let head=0;
  while(head<q.length){
    const [c,r] = q[head++];
    for(const [dc,dr] of dirs){
      const nc=c+dc, nr=r+dr;
      if(!inGrid(nc,nr) || blk[nr][nc] || dist[nr][nc]!==Infinity) continue;
      dist[nr][nc] = dist[r][c]+1;
      fl[nr][nc] = [-dc,-dr]; // step back toward source
      q.push([nc,nr]);

}
let flowDist = null;

   serpentine routes (real mazing) while guaranteeing enemies can always path in from any
   side — no full seal, no trapped mobs. Replaces DR-#001's far stricter "every edge tile
   must keep its path", which is why building never created chokepoints (the "too free" feel). */

function dropCorpse(x,y){

function corpseInRange(t){

/* ===== Sweeper pathing (simple greedy A*-lite on small grid) ===== */
function pathStep(fc,fr,tc,tr){
  // BFS from target to walker (grid is small; called sparingly)
  const dist = Array.from({length:CFG.rows},()=>new Array(CFG.cols).fill(Infinity));
  const q=[[tc,tr]]; dist[tr][tc]=0; let head=0;
  const dirs=[[1,0],[-1,0],[0,1],[0,-1]];
  while(head<q.length){
    const [c,r]=q[head++];
    if(c===fc&&r===fr) break;
    for(const [dc,dr] of dirs){
      const nc=c+dc,nr=r+dr;
      if(!inGrid(nc,nr)||dist[nr][nc]!==Infinity) continue;
      if(blocked[nr][nc] && !(nc===tc&&nr===tr)) continue;
      if(isHive(nc,nr)) continue;
      dist[nr][nc]=dist[r][c]+1; q.push([nc,nr]);
    }
  }
  let best=null, bd=dist[fr]?dist[fr][fc]:Infinity;
  if(bd===Infinity) return null;
  for(const [dc,dr] of dirs){
    const nc=fc+dc,nr=fr+dr;
    if(inGrid(nc,nr)&&dist[nr][nc]<bd){ bd=dist[nr][nc]; best=[dc,dr]; }
  }
  return best;
}

/* DR-#023: seed a Cretan-style concentric labyrinth — square rings around the Hive, each with a
   one-side gap that rotates E→S→W so the open route corkscrews inward. Reads as a maze on load and
   gives the player a base to extend; the rotating gaps guarantee every gate can still reach center. */
/* DR-#033: LIGHT, RANDOM partial maze each run (playtest: two asks — "give the player just one hedge
   to start, draw their own maze, don't make them undo too much" + "random maze pattern each level for
   variety"). Reconciled: 1–2 short random wall stubs (different every run) so there's a seed of variety
   to build around, but almost the whole board is the player's to draw. Was: 2 full concentric rings. */
/* DR-#035 DUNGEON pivot (Mike, 2026-07-06): the player builds an NES-D&D-style dungeon
   (monsters, doors, traps) during a free build phase, then clicks START RAID and the whole
   raiding party pours in at once through ONE west entrance. Fixed hand-authored floor plan:
   entrance → guard room → NORTH or SOUTH branch (rooms + corridors) → both converge on the
   east approach → Hive chamber. Supersedes DR-#034's four castle lanes (rock terrain kept). */
/* DR-#038 UNDERGROUND BURROW (Mike): "more of the play area playable; the setting is
   underground; the walls of the room are roots; the lore is Deadroot — the humans have come
   to our stronghold in the Deadroot forest and dared to enter our homes." Three big open
   chambers beneath the forest, split by thin root walls (~75% of the grid playable, was ~50%).
   Raiders breach the west root-gate, go around the Great Root, into the Hive chamber. */
/* DR-#042 LEVELS (Mike): "the point is to survive the waves until your Queen can open the next
   doorway — we get to build a dungeon with mobs for each level." Each level = a fixed root-burrow
   floor plan the player populates (zombies · grabbers · traps), a Queen spot (auto-placed — she

   doorway in the east wall that the Queen tears open once the last raid is repelled. */
const EDGE_WALLS = [ // shared burrow shell: edges + the breached west root-gate (rows 8-9)
  [0,0,25,0], [0,17,25,17],

    // DR-#049 teach-then-test: at the level's 3rd wave the raiders tunnel two flank gaps

    breach:{ atWave:2, tiles:[[17,1],[17,2],[17,15],[17,16]],

    splits:[ [[4,3],[10,8]], [[10,2],[22,3],[21,8]], [[10,15],[22,14],[21,9]] ],

let levelIdx = 0, levelTransT = 0; // levelTransT>0 = the Queen is opening the doorway
let breached = []; // DR-#049: wall tiles the raid has tunneled open this level (runtime — LEVELS stays pristine)
function curLevel(){ return LEVELS[Math.min(levelIdx, LEVELS.length-1)]; }
function onFloor(c,r){
  if(breached.some(t=>t[0]===c&&t[1]===r)) return true; // DR-#049: tunneled gaps are floor now

// DR-#049: once breached, flank routes join the split pool so the raid actually uses the gaps
function raidSplits(){ const L=curLevel(); return breached.length && L.breach ? L.splits.concat(L.breach.routes) : L.splits; }
/* DR-#039/#042 ROOTQUEEN: she occupies 2x2 (4 tiles) and is the boss of each level from the
   raiders' side. DR-#042: she AUTO-settles at each level's deep spot (Mike: "queen is auto

function settleQueen(){

  killsThisRun=0; towersBuiltThisRun=0; towersEvolvedThisRun=0; peakBiomass=0;
  comboT=0; comboN=0; noHitWaves=0; waveStartHP=0; waveT=0; waveFlashT=0;
  seenSweeper=false; seenTank=false; seenCleric=false; seenAmbush=false; seenAggro=false; seenEvolveTeach=false; lastSurvivorShown=false; secondWindUsed=false; adFailReason=null; awaitingAd=false;
  rotTipT=0; evolveTipT=0; firstMutateDone = false;

/* DR-#042: enter the current level — fresh dungeon to populate, Queen auto-settled at her spot.
   Called by newRun (level 1) and by the doorway transition (levels 2+). */
function startLevel(){
  hiveHP = hiveMax; // the Queen recovers as she moves deeper
  /* DR-#047 (research-first: Kingdom Rush / BTD6 / Dungeon Warfare all reset per-level cash
     and route long-term reward through a meta currency — which Deadroot already has in DNA).
     Full biomass carryover + full unit refunds let a rich player trivialize L3. Now each level
     grants a fixed budget that scales with depth; playing the previous level efficiently
     carries 25% of leftover biomass, hard-capped at half the new grant; anything the cap eats
     converts to a small DNA trickle so efficiency still pays SOMETHING. */
  if(levelIdx>0 && !endless){
    const grant = meta.bio + 30*levelIdx;
    const rawCarry = Math.round(biomass*0.25);
    const carry = Math.min(rawCarry, Math.round(grant*0.5));
    const trickle = Math.min(5, Math.floor((rawCarry-carry)/25));
    if(trickle>0){ save.dna += trickle; dnaEarned += trickle; persist(); }
    biomass = grant + carry;
    showBanner("THE HIVE BEGINS ANEW", grant+"◈ grant"+(carry>0?" · +"+carry+"◈ carried":"")+(trickle>0?" · +"+trickle+" DNA":""));
  }
  levelTransT = 0;
  enemies=[]; corpses=[]; towers=[]; projectiles=[]; clouds=[]; particles=[]; popups=[];
  stains=[]; rings=[]; doors=[]; traps=[]; souls=[]; exitPulseT=0; // DR-#046
  breached = []; // DR-#049: walls heal between levels/runs
  blocked = Array.from({length:CFG.rows},()=>new Array(CFG.cols).fill(false));
  hedge = Array.from({length:CFG.rows},()=>new Array(CFG.cols).fill(false));
  hedgePaid = Array.from({length:CFG.rows},()=>new Array(CFG.cols).fill(false));
  buildMode = null; menu = null; onboardT = 0; reabsorbCD = 0;
  genDecor();
  buildDungeon();
  settleQueen();
  const L = curLevel();
  showInfo("LEVEL "+(levelIdx+1)+" — "+L.name, L.lore+(levelIdx===0?" · fortify the burrow, then start the raid":"")); // DR-#043a: paused modal, not a banner
  mode = "prep"; prepT = 0; // no timer — the player clicks START RAID
}
/* DR-#042: last raid of the level repelled — the Queen tears open the east doorway, then the
   Hive descends to the next level (a fresh dungeon to build). */
function beginDoorway(){
  levelTransT = 3.4;
  mode = "prep";
  // the Hive reabsorbs its children — surviving units/traps come back as biomass for the next floor
  // DR-#047: reclaim at 60% (BTD6 sells at 70%) — a full refund let survivors double-dip
  // into the next level's budget and snowball the finale trivial.
  let reclaim = 0;
  for(const t of towers) reclaim += Math.round(CFG.towers[t.type].cost*0.6);
  for(const tp of traps) reclaim += Math.round(CFG.spikes.cost*0.6*tp.uses/CFG.spikes.uses);
  if(reclaim>0){ biomass += reclaim; showBanner("THE HIVE REABSORBS ITS CHILDREN","+"+reclaim+"◈ returned"); } // DR-#044: ticker, not center-screen
  const [ex,ey] = tileToXY(curLevel().exit.c, curLevel().exit.r);
  bigBurst(ex,ey,"#c9a0f0",26); bigBurst(ex,ey+CFG.tile,"#8fd9a8",18);
  SFX.boom(); shakeIt(6);
  showInfo("THE QUEEN OPENS THE WAY","the roots part — the Hive descends deeper"); // DR-#043a: paused modal
  CG.happytime();
}
function queueWave(){
  if(endless){ run.endlessHpMult = 1+endlessN*0.15; run.endlessSpdMult = 1+endlessN*0.05; }
  const def = endless ? endlessWave(endlessN) : WAVES[waveIdx];
  // DR-#049 teach-then-test: at the level's breach wave the raiders tunnel flank gaps through
  // the root walls — a plain center line no longer covers every approach (Mike 2026-07-13:
  // L1 beaten by a random zombie line with biomass to spare).
  const br = curLevel().breach;
  if(br && !endless && !breached.length && waveIdx >= curLevel().waves[br.atWave]){
    for(const [bc,brr] of br.tiles){ rock[brr][bc]=false; blocked[brr][bc]=false;
      const [bx,by]=tileToXY(bc,brr); bigBurst(bx+CFG.tile/2,by+CFG.tile/2,"#8a6a4a",14); }
    breached = br.tiles;
    rebuildFlow(); shakeIt(5); SFX.boom();
    showInfo("THEY TUNNEL THROUGH THE ROOTS","new flank gaps in the walls — one line won't hold them");
  }
  spawnQ = [];
  // DR-#035: the whole raiding party releases AT ONCE — a fast pour (0.1s apart), not a trickle
  let t = 0.3;
  for(const [type,count] of def){
    for(let i=0;i<count;i++){ spawnQ.push({type, at:t}); t += 0.1; }
  }
  spawnQ.sort((a,b)=>a.at-b.at);
  spawnT = 0; waveT = 0; waveStartHP = hiveHP; waveFlashT = 0.15; lastSurvivorShown = false;
  mode = "play";
  SFX.wave();
  gateOpenT[0]=3.5; // DR-#035: flare the entrance arch as the party breaches
  // DR-#043a: wave-start story beats are paused modals now — the raid doesn't pour in
  // until the player clears the text (playtest: banners overlapped the action)
  if(!endless){
    if(waveIdx===0) showInfo("THE SCOUTS","humans breach the west root-gate of the burrow");
    else if(waveIdx===4) showInfo("THE PURGE BEGINS","a bigger party, better armed");
    else if(waveIdx===7) showInfo("THE BUTCHER","he burned a hundred hives");
    else if(waveIdx===8) showInfo("THE EXTERMINATION","everything they have left");
    else if(waveIdx===11){ showInfo("THE PURIFIER","kill it and the surface is yours"); tone(80,60,1.2,"sawtooth",0.2); tone(80,60,1.2,"sawtooth",0.2,1.3); }
  } else if(endlessN%3===2) showInfo("PURIFIER INBOUND","the long night deepens");
}
function waveCleared(){
  const wn = endless ? 12+endlessN+1 : waveIdx+1;
  const baseGain = endless ? Math.ceil(Math.max(3,wn)*1.2) : Math.max(3,wn);
  const gain = daily ? Math.ceil(baseGain*1.5*dailyStreakMult()) : baseGain;
  save.dna += gain; dnaEarned += gain;
  save.bestWave = Math.max(save.bestWave, wn);
  if(daily){ if(!save.dailyBest)save.dailyBest={}; save.dailyBest[dayIndex()]=Math.max(save.dailyBest[dayIndex()]||0,wn); }
  persist();
  showBanner("WAVE "+wn+" REPELLED", "+"+gain+" DNA · "+Math.floor(waveT)+"s"); // DR-#044: ticker, not center-screen
  // perfect wave bonus
  if(hiveHP >= waveStartHP){
    noHitWaves++;
    save.dna+=3; dnaEarned+=3; persist();
    showBanner("UNSCATHED", "+3 DNA"+(noHitWaves>=3?" · "+noHitWaves+" waves without damage":""));
  } else { noHitWaves=0; }
  CG.happytime(); slowMoT=0.45; timeScale=0.15;
  if(!endless && waveIdx>=WAVES.length-1){ mode="victory"; save.won=true; persist(); stopDrone(); CG.gameplayStop(); return; }
  if(endless){ endlessN++; save.endlessBest=Math.max(save.endlessBest,endlessN); persist(); }
  else waveIdx++;
  // DR-#042: last raid of the LEVEL repelled → the Queen opens the next doorway
  const lw = curLevel().waves;
  if(!endless && waveIdx > lw[lw.length-1]){
    beginDoorway();
    if(CFG.boonWaves.includes(waveIdx)) offerBoons();
    return;
  }
  mode = "prep"; prepT = CFG.prepTime;
  showBanner('"'+HIVE_TALK[wn % HIVE_TALK.length]+'"'); // DR-#044: ticker, not center-screen
  // boon choice: the Hive adapts — every run differs
  if((!endless && CFG.boonWaves.includes(waveIdx)) || (endless && endlessN%3===1)) offerBoons();
}
function gameOver(){
  if(!secondWindUsed && !daily){ mode = "secondwind"; menu = null; CG.gameplayStop(); return; }
  mode = "over"; menu = null; stopDrone();
  if(daily){ if(!save.dailyBest)save.dailyBest={}; save.dailyBest[dayIndex()]=Math.max(save.dailyBest[dayIndex()]||0,waveIdx+1); }
  persist();
  CG.gameplayStop();
  CG.interstitial();
}
function declineSecondWind(){
  secondWindUsed = true;
  gameOver();
}
let awaitingAd = false; // guards against a mashed WATCH AD button double-requesting a rewarded ad
function takeSecondWind(){
  if(awaitingAd) return;
  awaitingAd = true;
  secondWindUsed = true;
  // callbacks run outside our stack once the (possibly real, async) SDK ad flow
  // resolves — try/catch so a callback-side error can't hang the SDK's own state
  CG.rewarded(()=>{
    try{
      awaitingAd = false;
      hiveHP = Math.ceil(hiveMax*0.25);
      mode = "play";
      showBanner("SECOND WIND","the Hive refuses to die"); // DR-#044
      edgePulseT = 1.0;
      CG.gameplayStart();
    }catch(e){ awaitingAd=false; }
  }, (reason)=>{
    try{ awaitingAd=false; adFailReason = reason||"error"; gameOver(); }catch(e){ awaitingAd=false; }
  });
}

/* ===== Update (fixed 60Hz) ===== */
const DT = 1/60;
function update(){
  if(shake>0) shake = Math.max(0, shake-20*DT); // DR-#034: decay BEFORE the end-screen early return — the death-recap shake used to freeze on screen forever (playtest bug)
  if(mode==="title"||mode==="over"||mode==="victory"||mode==="secondwind") return;
  if(infoModal) return; // DR-#043a: stage-info modal freezes the whole sim until dismissed
  if(!banner && bannerQ.length) banner = bannerQ.shift(); // DR-#044: ticker plays the queue one at a time
  if(banner) { banner.t -= DT; if(banner.t<=0) banner=null; }
  if(reabsorbCD>0) reabsorbCD -= DT; // DR-#025 B2
  for(let i=0;i<gateOpenT.length;i++) if(gateOpenT[i]>0) gateOpenT[i]-=DT; // DR-#029 C9
  if(comboT>0){ comboT-=DT; if(comboT<=0) comboN=0; }
  if(mode==="play") waveT+=DT;
  peakBiomass = Math.max(peakBiomass, biomass);

  if(mode==="prep"){
    onboardT += DT; // DR-#035: no countdown — the raid starts when the player clicks START RAID
    // DR-#042: the Queen is opening the doorway — hold the moment, then descend to the next level
    if(levelTransT>0 && !boonChoice){
      levelTransT -= DT;
      if(levelTransT<=0){ levelIdx++; startLevel(); }
    }
  }
  if(mode==="play"){
    spawnT += DT;
    while(spawnQ.length && spawnQ[0].at<=spawnT){ spawnEnemy(spawnQ.shift().type); }
  }

  /* corpses rot */
  for(let i=corpses.length-1;i>=0;i--){
    const k = corpses[i];
    k.t -= DT;
    if(k.t<=0){
      const pay = meta.decay * k.stack;
      biomass += pay;
      const [x,y]=tileToXY(k.c,k.r);
      popup(x,y,"+"+pay,"#8fd9a8"); burst(x,y,"#8fd9a8",8); SFX.decay();
      corpses.splice(i,1);
      if(!k.trampled) unblock(k.c,k.r);
      if(menu && menu.corpse===k) menu=null;
    }
  }


  /* enemies */
  for(let i=enemies.length-1;i>=0;i--){
    const e = enemies[i];
    if(e.flash>0) e.flash-=DT;
    if(e.drench>0) e.drench-=DT;
    if(e.panicT>0) e.panicT-=DT;
    // DR-#041: aggro decays; drop it if the target zombie is already destroyed
    if(e.aggroT>0){ e.aggroT-=DT; if(e.aggroT<=0 || !towers.includes(e.aggro)){ e.aggro=null; e.aggroT=0; } }
    // spore coat DoT
    if(e.coat>0){ e.coat-=DT; e.hp -= 6*DT*meta.dmg; }
    if(e.corroded>0) e.corroded -= DT;
    e.snared = false;
    let strangled = false, slowMul = 1; // DR-#025 B1: grabber zombies contribute their own slow
    for(const t of towers){
      if(t.stunT>0) continue; // DR-#036: a stunned zombie's aura is out too
      if(t.type==="rootmass" && dist2(e,t) < sq(CFG.towers.rootmass.range*(1+run.rootR)*CFG.tile)){ e.snared=true; slowMul=Math.min(slowMul,1-CFG.towers.rootmass.slow); if(t.tier===1) strangled=true; }
      else if(t.type==="grabber" && dist2(e,t) < sq(CFG.towers.grabber.range*(1+run.grabR)*CFG.tile)){ e.snared=true; slowMul=Math.min(slowMul, Math.max(0.15, 1-CFG.towers.grabber.slow-run.grabSlow)); e.hp -= CFG.towers.grabber.dot*DT*meta.dmg; } // DR-#043b: grasping rot — low DoT inside the aura
    }
    if(strangled) e.hp -= 8*DT*meta.dmg;
    let spd = e.spd * CFG.tile * slowMul;
    // DR-#036 STEALTH: a hidden thief creeping within reach of a zombie AMBUSHES it — stuns that
    // one unit for 1.5s and breaks stealth. Towers can't target it while hidden.
    if(e.hidden){
      let vt=null, vbd=sq(CFG.tile*1.5);
      for(const t of towers){ const d=dist2(e,t); if(d<vbd){ vbd=d; vt=t; } }
      if(vt){
        e.hidden=false; vt.stunT=1.5;
        popup(vt.x,vt.y-22,"AMBUSHED!","#e3d34e"); SFX.hit();
        rings.push({x:vt.x,y:vt.y,r:0,maxR:30,maxT:0.35,t:0.35,col:"rgba(240,225,140,0.8)"});
        if(!seenAmbush){ seenAmbush=true; showBanner("THIEVES STRIKE FROM THE SHADOWS","the ambush stuns a zombie for 1.5s"); }
      } else if(nearHive(e)) e.hidden=false; // no one to ambush — cover breaks at the Hive
    }
    // DR-#036 HEAL: the cleric mends the most-wounded raider in range while marching
    e.healTgt=null;
    if(e.role==="heal"){
      let worst=1;
      for(const a of enemies){
        if(a===e || a.hp>=a.max) continue;
        const fr=a.hp/a.max;
        if(fr<worst && dist2(e,a)<sq(CFG.enemies.cleric.healR*CFG.tile)){ worst=fr; e.healTgt=a; }
      }
      if(e.healTgt){
        e.healTgt.hp = Math.min(e.healTgt.max, e.healTgt.hp + CFG.enemies.cleric.healRate*DT);
        if(Math.random()<0.05) addParticle({x:e.healTgt.x+(Math.random()-0.5)*12, y:e.healTgt.y-e.healTgt.r, vx:0, vy:-28, t:0.6, col:"#9be07f"});
      }
    }
    if(e.type==="sweeper") spd *= (1-run.sweepSlow) * (e.panicT>0 ? 1.8 : 1);

    if(e.type==="sweeper"){
      // find nearest corpse
      if(!e.target || !corpses.includes(e.target)){
        e.target=null; e.chanT=0; let bd=Infinity;
        for(const k of corpses){ const [kx,ky]=tileToXY(k.c,k.r); const d=(kx-e.x)**2+(ky-e.y)**2; if(d<bd){bd=d;e.target=k;} }
      }
      if(e.target){
        const [tx,ty]=tileToXY(e.target.c,e.target.r);
        const d = Math.hypot(tx-e.x,ty-e.y);
        if(d < CFG.tile*0.8){
          e.chanT += DT; // sanitize channel
          if(e.chanT>=3){
            const k=e.target;
            corpses.splice(corpses.indexOf(k),1);
            if(!k.trampled) unblock(k.c,k.r);
            if(menu&&menu.corpse===k) menu=null;
            popup(tx,ty,"SANITIZED","#e3d34e"); SFX.sweep();
            e.target=null; e.chanT=0;
          }
        } else {
          e.chanT=0;
          const [ec,er]=xyToTile(e.x,e.y);
          const step = inGrid(ec,er) ? pathStep(ec,er,e.target.c,e.target.r) : null;
          let dx,dy;
          if(step){ const [nx,ny]=tileToXY(ec+step[0],er+step[1]); dx=nx-e.x; dy=ny-e.y; }
          else { dx=tx-e.x; dy=ty-e.y; }
          const m=Math.hypot(dx,dy)||1;
          e.x += dx/m*spd*DT; e.y += dy/m*spd*DT;
        }
      } else {
        // no corpses: drift toward nearest edge (retreat)
        e.y += (e.y<H/2?-1:1)*spd*DT*0.6;
        if(e.y<TOP-20||e.y>H+20){ enemies.splice(i,1); continue; }
      }
    } else {
      // walk flow field to hive
      const [ec,er]=xyToTile(e.x,e.y);
      // Feast combat: the living brawl any zombie tower within reach (towers have HP)
      let brawl=null, bbd=Infinity; const atkR=CFG.tile*1.25;
      for(const t of towers){ const d=dist2(e,t); if(d<bbd && d<atkR*atkR){ bbd=d; brawl=t; } }
      // DR-#035: a door in reach gets hacked down first (it physically blocks the way)
      let doorT=null, dbd=Infinity; const doorR=CFG.tile*0.95;
      for(const d of doors){ const [dx,dy]=tileToXY(d.c,d.r); const dd=(dx-e.x)**2+(dy-e.y)**2; if(dd<dbd && dd<doorR*doorR){ dbd=dd; doorT=d; } }
      if(doorT){
        e.atkT += DT;
        if(e.atkT>=1){
          e.atkT=0; doorT.hp -= Math.max(e.dmg, 8); // even dmg-0 sweepers chip doors, or they'd stall forever
          const [dx,dy]=tileToXY(doorT.c,doorT.r); burst(dx,dy-4,"#a07846",4); noise(0.05,0.1,false);
          if(doorT.hp<=0) breakDoor(doorT);
        }
      } else if(isHive(ec,er) || nearHive(e)){
        e.atkT += DT;
        if(e.atkT>=1){
          e.atkT=0; if(!godMode) hiveHP -= e.dmg;   /* DR-#019: dev god mode */
          SFX.hiveHit(); shakeIt(5); burst(e.x,e.y,"#e07f7f",10); edgePulseT = 1.0;
          if(hiveHP<=0){ hiveHP=0; gameOver(); return; }
        }
      } else if(brawl){
        // stop and hack at the zombie tower
        e.atkT += DT;
        if(e.atkT>=1){ e.atkT=0; damageTower(brawl, e.dmg); burst(brawl.x,brawl.y-4,"#c86060",4); }
      } else if(e.searchT>0){
        // DR-#041: pausing to search the chamber — delvers rummage, they don't march
        e.searchT -= DT;
      } else {
        let dx=0,dy=0;
        // DR-#041: a wounded raider HUNTS the zombie that hit it (party fights back like players)
        if(e.aggro && e.aggroT>0){ dx=e.aggro.x-e.x; dy=e.aggro.y-e.y; }
        else{
        // DR-#038: head for the chosen side of the Great Root first, then follow the flow.
        // DR-#051: raiders now ROUTE to each waypoint around obstacles using the existing BFS
        // (pathStep, the same grid pather sweepers use) instead of walking a straight line into
        // a root wall. This lets a flank route actually complete the circuit around every blocker
        // to the Queen, keeping the split/flank behaviour. The BFS is only recomputed when the
        // raider crosses into a new tile (or the target tile moves), so many raiders stay cheap.
        if(e.wp){
          if((e.wp.x-e.x)**2+(e.wp.y-e.y)**2 < sq(24)){ // arrived at this waypoint
            if(e.wp.search) e.searchT=0.6+Math.random()*0.7;
            e.wp=(e.wps&&e.wps.length)?e.wps.shift():null; e.wpStep=null; e.wpKey=null;
          }
          if(e.wp){
            const [wc,wr]=xyToTile(e.wp.x,e.wp.y);
            const key = ec+","+er+"|"+wc+","+wr;
            if(e.wpKey!==key){ e.wpKey=key; e.wpStep = (ec===wc&&er===wr) ? null : pathStep(ec,er,wc,wr); }
            if(e.wpStep){ const [nx,ny]=tileToXY(ec+e.wpStep[0],er+e.wpStep[1]); dx=nx-e.x; dy=ny-e.y; } // step toward waypoint, around walls
            else { dx=e.wp.x-e.x; dy=e.wp.y-e.y; } // same/adjacent tile, or no route: home straight in
          }
        }
        if(!e.wp && dx===0 && dy===0){
        const f = inGrid(ec,er) ? flow[er][ec] : null;
        if(f){ const [nx,ny]=tileToXY(ec+f[0],er+f[1]); dx=nx-e.x; dy=ny-e.y; }
        else { const [hx,hy]=tileToXY((CFG.hive.c0+CFG.hive.c1+1)/2-0.5,(CFG.hive.r0+CFG.hive.r1+1)/2-0.5); dx=hx-e.x; dy=hy-e.y; } // DR-#039 dynamic queen position
        }
        }
        const m=Math.hypot(dx,dy)||1;
        const ox=e.x, oy=e.y;
        moveWithWalls(e, dx/m*spd*DT, dy/m*spd*DT); // DR-#021: slide along walls, no diagonal squeeze
        // DR-#051: safety net kept from DR-#042. Raiders now BFS-route to waypoints (above), so
        // a search point behind a wall no longer pins them; but if a waypoint tile is truly
        // unreachable (pathStep returns null) or a raider wedges on a corpse pile, no progress
        // for ~0.8s still drops the whole route so it falls back to the flow field to the Queen.
        if(e.wp){
          const moved=Math.hypot(e.x-ox,e.y-oy);
          if(moved < spd*DT*0.25){ e.stuckT=(e.stuckT||0)+DT; if(e.stuckT>0.8){ e.wp=null; e.wps=[]; e.stuckT=0; e.wpStep=null; e.wpKey=null; } }

        }
        // DR-#037: the DR-#030 maze-rot DoT is REMOVED (playtest: it killed everything and was
        // overpowered — raiders melted before reaching a single zombie). A mob-applied DoT can
        // come back later as a specific tower/trap ability instead of free ambient damage.
      }
      // incinerator: burns adjacent towers; detonates spore clouds

        e.burnT += DT;
        if(e.burnT>=0.5){
          e.burnT=0;
          for(const t of towers){ if(dist2(e,t)<sq(CFG.tile*1.4)){ t.hp-=6; t.flash=0.2; addParticle({x:t.x,y:t.y,vx:0,vy:-30,t:0.4,col:"#e0a04a"}); } }
          for(const cl of clouds){
            if((cl.x-e.x)**2+(cl.y-e.y)**2 < sq(cl.r)){
              // thermobaric: cloud ignites
              clouds.splice(clouds.indexOf(cl),1);
              SFX.boom(); shakeIt(8); setHitStop(3); bigBurst(cl.x,cl.y,"#f0b050",30); bigBurst(cl.x,cl.y,"#e06040",20);
              popup(cl.x,cl.y,"THERMOBARIC!","#f0b050");
              for(const v of enemies){ if((v.x-cl.x)**2+(v.y-cl.y)**2 < sq(CFG.tile*2.2)) damage(v, 85, true); }
              break;
            }
          }
        }
      }
    }
    if(e.hp<=0){ kill(e); }
  }
  // last survivor drama — one banner per wave
  if(mode==="play" && spawnQ.length===0 && enemies.length===1 && !lastSurvivorShown){
    lastSurvivorShown = true;
    const sType = {scav:"THE LAST SCOUT",troop:"THE LAST TROOPER",incin:"THE LAST INCINERATOR",sweeper:"THE LAST SWEEPER",butcher:"THE BUTCHER STANDS ALONE",boss:"THE PURIFIER WILL NOT YIELD"};
    showBanner(sType[enemies[0].type]||"THE LAST ONE STANDING","finish it");
  }

  /* towers */
  for(let i=towers.length-1;i>=0;i--){
    const t = towers[i];
    t.pulse += DT;
    if(t.flash>0) t.flash-=DT;
    if(t.evolveT>0) t.evolveT-=DT; // DR-#043b: evolve morph timer
    if(t.hp<=0){
      burst(t.x,t.y,"#7a8f6a",16); popup(t.x,t.y,"BURNED DOWN","#e0a04a");
      if(menu&&menu.tower===t) menu=null;
      towers.splice(i,1);
      const stillHere = corpses.some(k=>k.c===t.c&&k.r===t.r);
      if(!stillHere && blocked[t.r][t.c]) unblock(t.c,t.r);
      triggerReabsorb(); // DR-#025 B2: burned-down zombie also starts the reabsorb delay
      continue;
    }
    if(t.stunT>0){ t.stunT-=DT; continue; } // DR-#036: ambush-stunned — can't act for 1.5s
    // DR-#042 ROAM (Mike: "zombies have a small roam radius"): idle zombies shamble around
    // their post — the dungeon feels stocked with restless mobs, not turrets. They hold
    // still the moment prey comes near their reach.
    if(t.hx!==undefined){
      const roamR = CFG.tile*0.9;
      let nearD = Infinity;
      for(const e of enemies){ const d=dist2(t,e); if(d<nearD) nearD=d; }
      if(nearD > sq(((CFG.towers[t.type].range||2)+1.2)*CFG.tile)){
        t.roamT = (t.roamT||0) - DT;
        if(t.roamT<=0 || t.rx===undefined){
          const a=Math.random()*6.283, rr2=Math.random()*roamR;
          t.rx = t.hx + Math.cos(a)*rr2; t.ry = t.hy + Math.sin(a)*rr2*0.8;
          t.roamT = 1.5 + Math.random()*2.5;
        }
        const rdx=t.rx-t.x, rdy=t.ry-t.y, rm=Math.hypot(rdx,rdy);
        if(rm>2){
          const sp=14*DT, nx=t.x+rdx/rm*sp, ny=t.y+rdy/rm*sp;
          if(!solidAt(nx,t.y)) t.x=nx;
          if(!solidAt(t.x,ny)) t.y=ny;
        }
      }
    }
    // DR-#048 MENDER: heals the most-wounded friendly zombie in range (mirror of the raid's
    // cleric) — it never attacks, and being a tower it can be brawled down like any zombie.
    if(t.type==="mender"){
      t.healTgt=null;
      let worst=1; const hr=CFG.towers.mender.range*CFG.tile;
      for(const o of towers){
        if(o===t || o.hp>=o.max) continue;
        const fr=o.hp/o.max;
        if(fr<worst && dist2(t,o)<sq(hr)){ worst=fr; t.healTgt=o; }
      }
      if(t.healTgt){
        const o=t.healTgt;
        o.hp = Math.min(o.max, o.hp + CFG.towers.mender.heal*DT);
        if(Math.random()<0.06) addParticle({x:o.x+(Math.random()-0.5)*12, y:o.y-14, vx:0, vy:-26, t:0.6, col:"#9be07f"});
      }
      continue;
    }
    if(t.type==="rootmass"||t.type==="node"||t.type==="grabber") continue; // DR-#025: grabber is a slow aura, not a shooter
    const def = CFG.towers[t.type];
    // Feast level scaling: each devoured corpse makes the zombie hit harder + faster

function nearHive(e){

function damage(e, amt, pierce){
  const arm = Math.max(0, e.armor - (e.drench>0?0.15:0) - (e.corroded>0?e.armor:0));
  const dealt = amt * (pierce?1:(1-arm));
  e.hp -= dealt; e.flash = 0.12;
  if(e.hidden){ e.hidden=false; popup(e.x,e.y-e.r-8,"REVEALED","#e3d34e"); } // DR-#036: taking a hit blows a thief's cover
  if(dealt >= 30) popup(e.x, e.y-e.r-4, Math.floor(dealt)+"", "#ffd080");
  // DR-#041 FIGHT BACK: a wounded raider (and nearby party members) turns on the nearest
  // zombie — adventurers hunt what hurts them instead of marching past it. dmg-0 units
  // (clerics, sweepers) keep to their jobs.
  if(e.hp>0 && e.dmg>0 && !e.aggro){
    let at=null, abd=sq(CFG.tile*3.5);
    for(const t of towers){ const d=dist2(e,t); if(d<abd){ abd=d; at=t; } }
    if(at){
      e.aggro=at; e.aggroT=4;
      for(const a of enemies){ if(a!==e && a.dmg>0 && !a.aggro && !a.hidden && dist2(a,e)<sq(CFG.tile*2)){ a.aggro=at; a.aggroT=4; } }
      if(!seenAggro){ seenAggro=true; showBanner("THE RAID FIGHTS BACK","wounded adventurers hunt your zombies"); }
    }
  }
}

function canvasPos(ev){

  const py = (ev.touches?ev.touches[0].clientY:ev.clientY) - rect.top;

    const hit=(r,hcap,vcap)=>{
      const pv=vcap!=null?Math.min(hitPad(r.h),vcap):hitPad(r.h);
      const ph=hcap!=null?Math.min(hitPad(r.w),hcap):hitPad(r.w);
      return x>r.x-ph&&x<r.x+r.w+ph&&y>r.y-pv&&y<r.y+r.h+pv;
    };

  }

/* DR-#012 unified tower art — distinct silhouettes, cel outlines, behavior tells */

    ctx.fillStyle = T.acc;

    ctx.beginPath(); ctx.arc( 2.5,-13,2.2,0,6.283); ctx.fill();

    ctx.beginPath(); ctx.arc( 0,-10,1.5,0,6.283); ctx.fill(); ctx.restore();
    if(!isIcon){
      for(let i=0; i<3; i++){

        const pa = Math.max(0, 0.6 - pt*0.11);

  }

// soft contact shadow (the 2D ambient-occlusion analog that grounds objects + adds pop)
function contactShadow(x,y,rx,ry,a,g){ g=g||ctx; g.save(); g.globalAlpha=a==null?0.28:a; g.fillStyle="#000"; g.beginPath(); g.ellipse(x,y,rx,ry,0,0,6.283); g.fill(); g.restore(); }
function drawTree(t,g){ g=g||ctx;
  const sway=0; // baked static (motes/fog/hive carry the live motion)
  const s=t.s;
  contactShadow(t.x, t.y+2, 15*s, 5*s, 0.32, g);
  // trunk
  g.fillStyle="#3a2b22"; g.fillRect(t.x-3*s, t.y-14*s, 6*s, 16*s);
  g.strokeStyle="#2a1e18"; g.lineWidth=1; g.strokeRect(t.x-3*s, t.y-14*s, 6*s, 16*s);
  // lumpy canopy (overlapping blobs) with cel outline + top highlight
  const bx=t.x+sway, by=t.y-24*s;
  const blobs=[[0,0,15],[-11,4,11],[11,4,11],[0,-9,11]];
  g.strokeStyle="rgba(15,25,15,0.9)"; g.lineWidth=2.5*s;
  g.fillStyle=t.col;
  for(const [dx,dy,r] of blobs){ g.beginPath(); g.arc(bx+dx*s, by+dy*s, r*s, 0, 6.283); g.fill(); g.stroke(); }
  // highlight + optional sickly fungal tint
  g.globalAlpha=0.5; g.fillStyle="#7fae6a"; g.beginPath(); g.arc(bx-5*s, by-8*s, 6*s, 0, 6.283); g.fill(); g.globalAlpha=1;
  if(t.tint){ g.globalAlpha=0.35; g.fillStyle="#8a6ab0"; g.beginPath(); g.arc(bx+6*s, by+4*s, 7*s, 0, 6.283); g.fill(); g.globalAlpha=1; }
}
function drawStruct(o,g){ g=g||ctx;
  g.save(); g.translate(o.x,o.y);
  contactShadow(0, 4, 24, 7, 0.3, g);
  g.lineWidth=2; g.strokeStyle="rgba(10,12,14,0.85)";
  if(o.kind==="tower"){ // leaning ruined watchtower
    g.strokeStyle="#4a3f33"; g.lineWidth=3;
    g.beginPath(); g.moveTo(-12,4); g.lineTo(-6,-34); g.moveTo(12,4); g.lineTo(6,-34); g.stroke();
    g.beginPath(); g.moveTo(-12,-8); g.lineTo(12,-14); g.stroke();
    g.fillStyle="#5a4d3d"; g.strokeStyle="rgba(10,12,14,0.85)"; g.lineWidth=2;
    g.beginPath(); g.rect(-14,-48,26,16); g.fill(); g.stroke();
    g.fillStyle="#7a3030"; g.beginPath(); g.arc(4,-40,2.5,0,6.283); g.fill(); // dead searchlight
  } else if(o.kind==="sign"){ // tilted biohazard/quarantine sign
    g.fillStyle="#3a3228"; g.fillRect(-2,-2,4,26);
    g.save(); g.rotate(-0.12);
    g.fillStyle="#c9a83f"; g.strokeStyle="rgba(10,12,14,0.85)"; g.lineWidth=2;
    g.beginPath(); g.rect(-16,-30,32,22); g.fill(); g.stroke();
    g.fillStyle="#1a1a14"; g.font="bold 13px monospace"; g.textAlign="center"; g.fillText("☣",0,-14);
    g.restore();
  } else if(o.kind==="barricade"){ // stacked sandbags
    g.fillStyle="#6a5c44"; g.strokeStyle="rgba(10,12,14,0.7)"; g.lineWidth=1.5;
    const bag=(x,y)=>{ g.beginPath(); g.ellipse(x,y,10,7,0,0,6.283); g.fill(); g.stroke(); };
    bag(-11,2); bag(0,3); bag(11,2); bag(-6,-8); bag(6,-8); bag(0,-17);
  } else if(o.kind==="truck"){ // wrecked army jeep
    g.fillStyle="#42513a"; g.strokeStyle="rgba(10,12,14,0.85)"; g.lineWidth=2;
    g.beginPath(); g.rect(-22,-16,44,18); g.fill(); g.stroke();
    g.beginPath(); g.rect(-22,-28,20,14); g.fill(); g.stroke(); // cab
    g.fillStyle="#1a1e18"; g.beginPath(); g.arc(-12,4,7,0,6.283); g.fill(); g.beginPath(); g.arc(13,4,7,0,6.283); g.fill();
    g.fillStyle="#8fd9a8"; g.globalAlpha=0.5; g.beginPath(); g.arc(6,-6,5,0,6.283); g.fill(); g.globalAlpha=1; // fungal takeover
  } else if(o.kind==="flood"){ // floodlight pole + faint cone (baked static)
    g.strokeStyle="#4a4438"; g.lineWidth=3; g.beginPath(); g.moveTo(0,4); g.lineTo(-4,-36); g.stroke();
    g.fillStyle="#5a5240"; g.strokeStyle="rgba(10,12,14,0.85)"; g.lineWidth=2;
    g.beginPath(); g.rect(-14,-46,20,10); g.fill(); g.stroke();
    g.save(); g.globalAlpha=0.07; g.fillStyle="#e8e0b0";
    g.beginPath(); g.moveTo(-4,-40); g.lineTo(-46,20); g.lineTo(24,20); g.closePath(); g.fill(); g.restore();
  }
  g.restore();
}
function drawShroom(m,g){ g=g||ctx;
  const s=m.s;
  contactShadow(m.x, m.y+2, 7*s, 2.5*s, 0.28, g);
  g.strokeStyle="rgba(15,20,20,0.8)"; g.lineWidth=1.5;
  g.fillStyle="#d8d0c0"; g.fillRect(m.x-2*s, m.y-6*s, 4*s, 8*s); // stem
  g.fillStyle=m.hue; g.beginPath(); g.ellipse(m.x, m.y-6*s, 8*s, 5*s, 0, Math.PI, 2*Math.PI); g.fill(); g.stroke();
  // glowing spots (baked)
  g.save(); g.globalAlpha=0.7; g.fillStyle="#f0ffe0";
  g.beginPath(); g.arc(m.x-3*s, m.y-8*s, 1.5*s, 0, 6.283); g.arc(m.x+3*s, m.y-7*s, 1.2*s, 0, 6.283); g.fill(); g.restore();
}
function drawBone(o,g){ g=g||ctx;
  g.save(); g.translate(o.x,o.y); g.rotate(o.rot); g.scale(o.s,o.s);
  g.fillStyle="#cfc7b4"; g.strokeStyle="rgba(20,20,16,0.6)"; g.lineWidth=1;
  if(o.skull){ g.beginPath(); g.arc(0,0,6,0,6.283); g.fill(); g.stroke();
    g.fillStyle="#2a2620"; g.beginPath(); g.arc(-2.2,-0.5,1.6,0,6.283); g.arc(2.2,-0.5,1.6,0,6.283); g.fill();
    g.fillStyle="#cfc7b4"; g.fillRect(-3,4,6,3);
  } else { // crossed bones
    g.fillRect(-8,-1.4,16,2.8); g.beginPath(); g.arc(-8,0,2.4,0,6.283); g.arc(8,0,2.4,0,6.283); g.fill();
    g.save(); g.rotate(1.05); g.fillRect(-8,-1.4,16,2.8); g.beginPath(); g.arc(-8,0,2.4,0,6.283); g.arc(8,0,2.4,0,6.283); g.fill(); g.restore();
  }
  g.restore();
}
// bake static ground decor (trees/structs/shrooms/bones) to an offscreen canvas ONCE,
// then blit it each frame — turns ~140 path-heavy items into a single drawImage (perf)
let decorBaked = null;
function bakeDecor(){
  try{
    if(!decorBaked){ decorBaked = document.createElement("canvas"); decorBaked.width=W; decorBaked.height=H; }
    const g = decorBaked.getContext("2d");
    g.clearRect(0,0,W,H);
    const items=[];
    for(const b of DECOR.bones) items.push({y:b.y, d:()=>drawBone(b,g)});
    for(const m of DECOR.shrooms) items.push({y:m.y, d:()=>drawShroom(m,g)});
    for(const s of DECOR.structs) items.push({y:s.y, d:()=>drawStruct(s,g)});
    for(const t of DECOR.trees) items.push({y:t.y, d:()=>drawTree(t,g)});
    items.sort((a,b)=>a.y-b.y);
    for(const it of items) it.d();
  }catch(e){ decorBaked=null; }
}
function drawEnvironment(){
  // back fog layer (parallax depth)
  ctx.save();
  for(const f of DECOR.fog){ const fx=(f.x+perfNow*f.spd)%(W+f.r*2)-f.r; ctx.globalAlpha=0.05+0.02*Math.sin(perfNow*0.4+f.ph);
    ctx.fillStyle="#9fd0b0"; ctx.beginPath(); ctx.ellipse(fx, f.y, f.r, f.r*0.4, 0, 0, 6.283); ctx.fill(); }
  ctx.restore();
  // invasion trails: worn dirt marching in from the open spawn sides toward the Hive
  const cx=W/2, cy=(TOP+H)/2;
  ctx.save(); ctx.lineCap="round";
  const openSides = (!endless && waveIdx===0)?[3] : (!endless && waveIdx<4)?[2,3] : [0,1,2,3];
  const sideAnchor={0:[cx,TOP+4],1:[cx,H-4],2:[4,cy],3:[W-4,cy]};
  for(const sd of openSides){ const [sx,sy]=sideAnchor[sd];
    ctx.strokeStyle="rgba(70,55,40,0.22)"; ctx.lineWidth=26;
    ctx.beginPath(); ctx.moveTo(sx,sy); ctx.quadraticCurveTo((sx+cx)/2,(sy+cy)/2+18,cx,cy); ctx.stroke();
    ctx.strokeStyle="rgba(50,38,28,0.18)"; ctx.lineWidth=13;
    ctx.beginPath(); ctx.moveTo(sx,sy); ctx.quadraticCurveTo((sx+cx)/2,(sy+cy)/2+18,cx,cy); ctx.stroke();
  }
  ctx.restore();
  // static ground decor: one blit of the pre-baked layer (perf)
  if(decorBaked) ctx.drawImage(decorBaked, 0, 0, W, H);
  else { const items=[];
    for(const b of DECOR.bones) items.push({y:b.y, d:()=>drawBone(b)});
    for(const m of DECOR.shrooms) items.push({y:m.y, d:()=>drawShroom(m)});
    for(const s of DECOR.structs) items.push({y:s.y, d:()=>drawStruct(s)});
    for(const t of DECOR.trees) items.push({y:t.y, d:()=>drawTree(t)});
    items.sort((a,b)=>a.y-b.y); for(const it of items) it.d();
  }
}
function drawMotes(){
  ctx.save();
  for(const m of DECOR.motes){
    const mx=m.x+Math.sin(perfNow*m.spd+m.ph)*m.amp, my=m.y+Math.cos(perfNow*m.spd*0.7+m.ph)*m.amp*0.6;
    ctx.globalAlpha=0.18+0.16*Math.sin(perfNow*1.5+m.ph);
    ctx.fillStyle="#bfe8a0"; ctx.beginPath(); ctx.arc(mx,my,m.r,0,6.283); ctx.fill();
  }
  ctx.restore();
}

/* ===== Render ===== */
/* DR-#021 route overlay: faint directional chevrons on every walkable tile so the player
   reads the lanes the maze funnels enemies through (research: persistent flow overlay). */
function drawFlowOverlay(){
  if(!flow || (mode!=="play" && mode!=="prep")) return;
  ctx.save();
  ctx.strokeStyle="rgba(143,217,168,0.12)"; ctx.lineWidth=1.4; ctx.lineCap="round";
  ctx.beginPath();
  const L=7, H2=4;
  for(let r=0;r<CFG.rows;r++)for(let c=0;c<CFG.cols;c++){
    if(blocked[r][c]||isHive(c,r)) continue;
    const f=flow[r][c]; if(!f) continue;
    const [x,y]=tileToXY(c,r); const ax=f[0], ay=f[1];
    const hx=x+ax*L, hy=y+ay*L;
    ctx.moveTo(x-ax*L, y-ay*L); ctx.lineTo(hx,hy);
    ctx.lineTo(hx-ax*H2-ay*H2, hy-ay*H2+ax*H2);
    ctx.moveTo(hx,hy); ctx.lineTo(hx-ax*H2+ay*H2, hy-ay*H2-ax*H2);
  }
  ctx.stroke();
  ctx.restore();
}
/* DR-#037 readability rework (research: strongest value contrast wins — darkest values on the
   walls, mid-value desaturated floor, bright saturated actors on top).
   Floor = mid-value slate slabs with per-tile variation + seams; walls = near-black mass with a
   BRIGHT lit parapet edge facing every lane, so the dungeon plan reads at a glance. */
function drawFloor(){ // DR-#038: packed burrow earth — warm mid-value soil so dark roots + bright actors both pop
  const T=CFG.tile;
  for(let r=0;r<CFG.rows;r++) for(let c=0;c<CFG.cols;c++){
    if(!rock[r] || rock[r][c]) continue;
    const x=c*T, y=TOP+r*T;
    const v = hedgeHash(c*11+r, r*13-c);                    // deterministic tint
    const base = 50 + Math.floor(v*12);                     // 50..62 warm earth
    ctx.fillStyle = "rgb("+(base+8)+","+base+","+(base-12)+")";
    ctx.fillRect(x,y,T,T);
    ctx.strokeStyle="rgba(18,13,8,0.45)"; ctx.lineWidth=1;  // packed-earth seams
    ctx.strokeRect(x+0.5,y+0.5,T-1,T-1);
    if(v<0.22){ ctx.fillStyle="rgba(140,180,110,0.10)";     // moss patch
      ctx.beginPath(); ctx.arc(x+8+v*60,y+10+v*50,5,0,6.283); ctx.fill(); }
    else if(v>0.8){ ctx.fillStyle="rgba(0,0,0,0.14)";       // pebble scuff
      ctx.fillRect(x+6+v*8,y+8+v*10,8,5); }
  }
}
/* DR-#038: walls are ROOTS — the living walls of the Hive's burrow. Dark woody mass, gnarled
   strands, and a bioluminescent moss edge wherever a root wall faces open floor (the Hive's
   glow marks its home; also the main chamber-read tell). */
function drawRocks(){
  const T=CFG.tile;
  for(let r=0;r<CFG.rows;r++) for(let c=0;c<CFG.cols;c++){
    if(!rock[r] || !rock[r][c]) continue;
    const x=c*T, y=TOP+r*T;
    ctx.fillStyle="#170f09"; ctx.fillRect(x,y,T,T);                        // dark heartwood mass
    // gnarled root strands (deterministic curves, woody browns)
    for(let i=0;i<3;i++){
      const h=hedgeHash(c*17+i, r*19-i);
      ctx.strokeStyle = i===0 ? "#31210f" : "#241708"; ctx.lineWidth=3+h*3;
      ctx.beginPath();
      ctx.moveTo(x+h*T, y);
      ctx.quadraticCurveTo(x+T*0.5+(h-0.5)*14, y+T*0.5, x+(1-h)*T, y+T);
      ctx.stroke();
    }
    // knot
    const h2=hedgeHash(c*7-r, r*5+c);
    if(h2<0.3){ ctx.fillStyle="#3a2a12"; ctx.beginPath(); ctx.arc(x+8+h2*60, y+10+h2*50, 3.5, 0, 6.283); ctx.fill(); }
    // bioluminescent moss edge facing open floor — the burrow's glow
    const open=(rr,cc)=> inGrid(cc,rr) && !rock[rr][cc];
    ctx.fillStyle="#6f9b5a";
    if(open(r-1,c)){ ctx.fillRect(x,y,T,3);     for(let k=0;k<2;k++) if(hedgeHash(c+k,r*3)>0.4) ctx.fillRect(x+4+k*20, y, 12, 6); }
    if(open(r+1,c)){ ctx.fillRect(x,y+T-3,T,3); for(let k=0;k<2;k++) if(hedgeHash(c-k,r*5)>0.4) ctx.fillRect(x+4+k*20, y+T-6, 12, 6); }
    if(open(r,c-1)){ ctx.fillRect(x,y,3,T);     for(let k=0;k<2;k++) if(hedgeHash(c*3,r+k)>0.4) ctx.fillRect(x, y+4+k*20, 6, 12); }
    if(open(r,c+1)){ ctx.fillRect(x+T-3,y,3,T); for(let k=0;k<2;k++) if(hedgeHash(c*5,r-k)>0.4) ctx.fillRect(x+T-6, y+4+k*20, 6, 12); }
  }
}

/* DR-#035: doors + spike traps (NES-dungeon furniture). */
function drawDoors(){
  const T=CFG.tile;
  for(const d of doors){
    const x=d.c*T, y=TOP+d.r*T;
    // orient with the corridor: solid rock left+right → vertical door slab, else horizontal
    const vert = (d.c>0&&rock[d.r][d.c-1]) && (d.c+1<CFG.cols&&rock[d.r][d.c+1]);
    const dx = vert? x+6 : x+3, dy = vert? y+3 : y+6, dw = vert? T-12 : T-6, dh = vert? T-6 : T-12;
    ctx.fillStyle="#131009"; ctx.fillRect(dx-2,dy-2,dw+4,dh+4);          // frame shadow
    ctx.fillStyle="#7a5a32"; ctx.fillRect(dx,dy,dw,dh);                   // planks
    ctx.strokeStyle="#4a3418"; ctx.lineWidth=1.5;                          // plank seams
    if(vert){ for(let k=1;k<3;k++){ ctx.beginPath(); ctx.moveTo(dx+dw*k/3,dy); ctx.lineTo(dx+dw*k/3,dy+dh); ctx.stroke(); } }
    else    { for(let k=1;k<3;k++){ ctx.beginPath(); ctx.moveTo(dx,dy+dh*k/3); ctx.lineTo(dx+dw,dy+dh*k/3); ctx.stroke(); } }
    ctx.fillStyle="#3d434c";                                               // iron bands
    if(vert){ ctx.fillRect(dx-1,dy+4,dw+2,4); ctx.fillRect(dx-1,dy+dh-8,dw+2,4); }
    else    { ctx.fillRect(dx+4,dy-1,4,dh+2); ctx.fillRect(dx+dw-8,dy-1,4,dh+2); }
    const frac=d.hp/d.max;
    if(frac<0.66){ ctx.strokeStyle="rgba(20,14,6,0.9)"; ctx.lineWidth=1.5; // battle damage cracks
      ctx.beginPath(); ctx.moveTo(dx+dw*0.3,dy+2); ctx.lineTo(dx+dw*0.5,dy+dh*0.5); ctx.lineTo(dx+dw*0.25,dy+dh-2); ctx.stroke();
      if(frac<0.33){ ctx.beginPath(); ctx.moveTo(dx+dw*0.75,dy+2); ctx.lineTo(dx+dw*0.6,dy+dh*0.6); ctx.lineTo(dx+dw*0.8,dy+dh-2); ctx.stroke(); } }
    if(frac<1){ ctx.fillStyle="rgba(0,0,0,0.5)"; ctx.fillRect(x+6,y-6,T-12,4); // hp bar when damaged
      ctx.fillStyle="#e0a060"; ctx.fillRect(x+6,y-6,(T-12)*frac,4); }
    ctx.lineWidth=1;
  }
}
function drawTraps(){
  const T=CFG.tile;
  for(const tp of traps){
    const [cx,cy]=tileToXY(tp.c,tp.r);
    ctx.fillStyle="#0c0e11"; ctx.beginPath(); ctx.arc(cx,cy,T*0.36,0,6.283); ctx.fill(); // pit
    ctx.strokeStyle="#3a4048"; ctx.lineWidth=1.5; ctx.stroke();
    ctx.fillStyle= tp.cd>0 ? "#6a7078" : "#aab4c0";                                      // spikes (dim on cooldown)
    for(let k=0;k<5;k++){ const a=k/5*6.283+0.4;
      const sx=cx+Math.cos(a)*T*0.16, sy=cy+Math.sin(a)*T*0.16;
      ctx.beginPath(); ctx.moveTo(sx-3,sy+3); ctx.lineTo(sx,sy-6); ctx.lineTo(sx+3,sy+3); ctx.closePath(); ctx.fill(); }
    for(let k=0;k<tp.uses;k++){ ctx.fillStyle="#c9d3dd"; ctx.fillRect(cx-9+k*7, cy+T*0.4, 4, 4); } // uses pips
    ctx.lineWidth=1;
  }
}

/* DR-#023: render placed hedges as merged topiary (autotile-lite: round only outer corners, extend
   1px over shared edges so contiguous tiles read as one continuous hedge wall). */
function hedgeRect(x,y,w,h,rad){ ctx.beginPath(); if(ctx.roundRect) ctx.roundRect(x,y,w,h,rad); else ctx.rect(x,y,w,h); }
function hedgeHash(c,r){ let n=(c*73856093)^(r*19349663); n=(n^(n>>13))*1274126177; return ((n^(n>>16))>>>0)/4294967296; } // deterministic 0..1
function drawHedges(){
  const T=CFG.tile, R=9;
  for(let r=0;r<CFG.rows;r++) for(let c=0;c<CFG.cols;c++){
    if(!hedge[r][c]) continue;
    const N=r>0&&hedge[r-1][c], S=r+1<CFG.rows&&hedge[r+1][c], Wl=c>0&&hedge[r][c-1], E=c+1<CFG.cols&&hedge[r][c+1];
    const x=c*T, y=TOP+r*T;
    const x0=x-(Wl?1:0), y0=y-(N?1:0), w=T+(Wl?1:0)+(E?1:0), h=T+(N?1:0)+(S?1:0);
    const rad=[ (!N&&!Wl)?R:0, (!N&&!E)?R:0, (!S&&!E)?R:0, (!S&&!Wl)?R:0 ];
    // DR-#033: rotting-wood walls (playtest 6:10 "more like rotting wood, grey and dark browns") — was leafy green topiary
    ctx.fillStyle="#140f0a"; hedgeRect(x0,y0+4,w,h,rad); ctx.fill();          // deeper base shadow (grounds it)
    ctx.fillStyle="#3a3128"; hedgeRect(x0,y0,w,h,rad); ctx.fill();            // grey-brown rotted body
    // weathered grain + knots — short strokes/knots in greys & dark browns (inset, no per-tile clip = cheap)
    for(let i=0;i<4;i++){
      const lx=x+7+hedgeHash(c*7+i, r*5-i)*(T-14), ly=y+6+hedgeHash(c*3-i, r*11+i)*(T-16);
      if(hedgeHash(c-i,r+i)<0.4){ // knot
        ctx.fillStyle = ((i+c+r)&1) ? "#241c14" : "#4a4034";
        ctx.beginPath(); ctx.arc(lx,ly,2+hedgeHash(c+i,r-i)*2,0,6.283); ctx.fill();
      } else { // vertical grain streak
        ctx.strokeStyle = ((i+c+r)&1) ? "rgba(30,24,18,0.6)" : "rgba(96,84,68,0.5)";
        ctx.lineWidth=1.4; ctx.beginPath(); ctx.moveTo(lx,ly-4); ctx.lineTo(lx+hedgeHash(c*2,r*3)*2-1,ly+5); ctx.stroke();
      }
    }
    // cool top-face highlight (weak grey light, damp wood)
    ctx.fillStyle="rgba(150,140,124,0.30)"; ctx.beginPath(); ctx.ellipse(x+T/2,y+T*0.30,T*0.34,T*0.16,0,0,6.283); ctx.fill();
  }
}
/* DR-#023: gate markers on the border — open gates glow (enemies enter here), closed are dim. */
function drawGates(){
  const hcx=(CFG.hive.c0+CFG.hive.c1+1)/2*CFG.tile, hcy=TOP+(CFG.hive.r0+CFG.hive.r1+1)/2*CFG.tile;
  const open=openGates();
  CFG.gates.forEach((g,gi)=>{
    const isOpen=open.includes(g), [x,y]=tileToXY(g.c,g.r);
    let dx=hcx-x, dy=hcy-y; const m=Math.hypot(dx,dy)||1; dx/=m; dy/=m;
    const ang=Math.atan2(dy,dx);
    // DR-#029 C9: just-opened gate flares — expanding ring + hot arch so the new front is unmissable
    const of = gateOpenT[gi]||0;
    if(of>0){
      const p = 1-(of/3.5); // 0→1 over the flash
      ctx.save();
      ctx.globalAlpha = Math.max(0, of/3.5)*0.8;
      ctx.strokeStyle="#ffb060"; ctx.lineWidth=3;
      ctx.beginPath(); ctx.arc(x,y,10+p*34,0,6.283); ctx.stroke();
      ctx.globalAlpha = 0.5+0.5*Math.sin(perfNow*10); ctx.strokeStyle="#ffd080"; ctx.lineWidth=4;
      ctx.beginPath(); ctx.arc(x,y,16,ang-1.3,ang+1.3); ctx.stroke();
      ctx.restore();
    }
    ctx.save();
    ctx.globalAlpha = isOpen ? 0.55+0.35*Math.sin(perfNow*3) : 0.2;
    ctx.strokeStyle = isOpen ? "#e0714a" : "#6a5048"; ctx.lineWidth=3; ctx.lineCap="round";

/* DR-#042: the sealed doorway to the next level — a faint arch in the east root wall so the

function drawExit(){

        ctx.restore();
        // fading green husk-glow of the zombie it was
        ctx.save(); ctx.globalAlpha=0.5*(1-p); ctx.strokeStyle="#7ed038"; ctx.lineWidth=3;
        ctx.beginPath(); ctx.arc(t.x,t.y,20+p*16,0,6.283); ctx.stroke(); ctx.restore();
      } else drawEvolved(t, lvl);
    } else if(useZombie){
      // stronger zombies are visibly bigger + glow more (mods change the look)
      const lvlF = 1 + (lvl-1)*0.10;
      const baseR = (26 + (t.tier===1?6:0)) * lvlF;
      const bg = ctx.createRadialGradient(t.x,t.y+8,2, t.x,t.y+8,baseR);
      const bcol = (lvl>=3 ? "224,160,240" : "120,220,120");
      bg.addColorStop(0,"rgba("+bcol+","+(0.5+0.12*Math.sin(t.pulse*2.2))+")");
      bg.addColorStop(1,"rgba("+bcol+",0)");
      ctx.save(); ctx.fillStyle=bg; ctx.beginPath(); ctx.ellipse(t.x,t.y+8,baseR,baseR*0.55,0,0,6.283); ctx.fill(); ctx.restore();
      const ds = towerSpriteScale*lvlF;
      drawSpriteFrame('zombie', t.x, t.y-Math.round(ds*0.16), towerAimAngle(t), t.pulse*30, ds, t.flash);
      if(t.cd>0){ ctx.save(); ctx.globalAlpha=0.3; ctx.strokeStyle="#dfff70"; ctx.lineWidth=2.5; ctx.beginPath(); ctx.arc(t.x,t.y+6,24,-Math.PI/2,-Math.PI/2+6.283*(1-t.cd)); ctx.stroke(); ctx.restore(); }
    } else {
      ctx.save(); ctx.translate(t.x,t.y);
      const p = 1+0.05*Math.sin(t.pulse*3);
      ctx.scale(p,p);
      // tier-2 aura glow
      if(t.tier===1){ ctx.save(); ctx.globalAlpha=0.13+0.05*Math.sin(t.pulse*2.2); ctx.fillStyle=TCOL[t.type]?TCOL[t.type].acc:"#e0a0f0"; ctx.beginPath(); ctx.arc(0,0,23,0,6.283); ctx.fill(); ctx.restore(); }
      if(t.flash>0){ ctx.globalAlpha=0.6; }
      drawTowerArt(t.type, t.tier, t.pulse, false, t.swing||0);
      ctx.globalAlpha = 1;
      // cooldown reload arc (shooter towers only)
      if(t.cd>0 && t.type!=="rootmass" && t.type!=="node"){ ctx.save(); ctx.globalAlpha=0.28; ctx.strokeStyle="#fff"; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(0,0,17,-Math.PI/2,-Math.PI/2+6.283*(1-t.cd)); ctx.stroke(); ctx.restore(); }
      ctx.restore();
    }
    if(t.hp<t.max){ const tc=TCOL[t.type]; ctx.fillStyle="#333"; ctx.fillRect(t.x-14,t.y-24,28,4); ctx.fillStyle=tc?tc.acc:"#e0a04a"; ctx.fillRect(t.x-14,t.y-24,28*(t.hp/t.max),4); }
    // DR-#036: ambush-stun tell — dizzy stars orbiting the zombie's head
    if(t.stunT>0){
      ctx.save(); ctx.fillStyle="#f0dc78"; ctx.font="bold 13px monospace"; ctx.textAlign="center";
      for(let k=0;k<3;k++){ const a=perfNow*5+k*2.09; ctx.fillText("★", t.x+Math.cos(a)*14, t.y-26+Math.sin(a)*5); }
      ctx.restore();
    }
    // level pips (feast upgrades): small chevrons above a leveled-up zombie
    if(lvl>1){ ctx.fillStyle="#e0a0f0"; for(let p=0;p<Math.min(lvl-1,5);p++){ ctx.beginPath(); ctx.arc(t.x-8+p*4, t.y-30, 1.6, 0, 6.283); ctx.fill(); } }
  }
  // node link lines (purple dashes between Node and buffed towers)
  ctx.save(); ctx.setLineDash([4,7]);
  for(const n of towers){
    if(n.type!=="node") continue;
    const lr=(n.tier===1?2.4:CFG.towers.node.range)*CFG.tile;
    for(const tw of towers){
      if(tw===n||dist2(n,tw)>=sq(lr)) continue;
      ctx.globalAlpha=0.17+0.07*Math.sin(perfNow*2.5);
      ctx.strokeStyle="#c9a0f0"; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.moveTo(n.x,n.y); ctx.lineTo(tw.x,tw.y); ctx.stroke();
    }
  }
  ctx.setLineDash([]); ctx.globalAlpha=1; ctx.restore();
  // enemies
  const hxE=W/2, hyE=(TOP+H)/2;
  for(const e of enemies){
    // contact shadow grounds the enemy (drawn in world space, under the bob)
    contactShadow(e.x, e.y+e.r*0.72, e.r*0.85, e.r*0.34, 0.3);
    // DR-#036: cleric heal beam (world space, under bodies)
    if(e.healTgt && enemies.includes(e.healTgt)){
      ctx.save(); ctx.globalAlpha=0.4+0.2*Math.sin(perfNow*8);
      ctx.strokeStyle="#9be07f"; ctx.lineWidth=2; ctx.setLineDash([4,4]);
      ctx.beginPath(); ctx.moveTo(e.x,e.y); ctx.lineTo(e.healTgt.x,e.healTgt.y); ctx.stroke();
      ctx.setLineDash([]); ctx.restore();
    }
    ctx.save(); ctx.translate(e.x,e.y);
    if(e.hidden) ctx.globalAlpha = 0.3; // DR-#036: stealthed thief — the PLAYER sees a ghost, zombies see nothing
    // goofy shamble: walk-bob + squash-stretch (calmer for the big bosses)
    if(!REDUCED_MOTION){
      const amp = (e.type==="boss"||e.type==="butcher") ? 0.5 : 1;
      const hop = Math.sin(perfNow*9 + e.id*1.7)*amp;
      ctx.translate(0, -Math.abs(hop)*e.r*0.13);
      ctx.scale(1+hop*0.05, 1-hop*0.05);
    }
    // travel direction from the flow field (facing + scav speed streak)
    let scavFv = null;
    if(flow){
      const [ec2,er2]=xyToTile(e.x,e.y);
      scavFv=(inGrid(ec2,er2)&&flow[er2]&&flow[er2][ec2])?flow[er2][ec2]:null;
      if(scavFv && e.type==="scav"){ ctx.save(); ctx.globalAlpha=0.2; ctx.fillStyle=e.col;
        ctx.beginPath(); ctx.arc(-scavFv[0]*10,-scavFv[1]*10,e.r*0.65,0,6.283); ctx.fill();
        ctx.beginPath(); ctx.arc(-scavFv[0]*16,-scavFv[1]*16,e.r*0.35,0,6.283); ctx.fill();
        ctx.restore(); }
    }
    // SPR-#003/DR-#046: EVERY raider role now renders from the same Engvee thief model —
    // one animation set + tint per role (Block=knight, Attack_Stance=incin, Run=sweeper,
    // Buff=cleric, Attack1=butcher, Attack3=boss). Procedural block below is the fallback.
    let spriteDrawn = false;
    const sprKey = ENEMY_SPR[e.type];
    if(sprKey && useSprites && SPR[sprKey].ready){
      const ang = scavFv ? Math.atan2(-scavFv[1], -scavFv[0]) : Math.atan2(hyE-e.y, hxE-e.x);
      spriteDrawn = blitFrame(sprKey, ang, e.id*1.3, e.r*enemySpriteScale, e.flash);
    }
    if(!spriteDrawn){
    // cel outline silhouette (DR-#037: thicker, fully dark — silhouettes must read on the lighter floor)
    ctx.strokeStyle="rgba(5,6,8,0.95)"; ctx.lineWidth=3.5;
    if(e.type==="sweeper"){ ctx.strokeRect(-e.r,-e.r,e.r*2,e.r*2); }
    else { ctx.beginPath(); ctx.arc(0,0,e.r,0,6.283); ctx.stroke(); }
    ctx.fillStyle = e.flash>0 ? "#ffffff" : e.col;
    if(e.type==="sweeper"){
      ctx.fillRect(-e.r,-e.r,e.r*2,e.r*2);
      ctx.fillStyle="#2a2a1a"; ctx.fillRect(-e.r*0.5,-e.r*0.5,e.r,e.r*0.6); // visor
      if(e.chanT>0){ ctx.strokeStyle="#e3d34e"; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(0,0,e.r+6,-Math.PI/2,-Math.PI/2+6.283*(e.chanT/3)); ctx.stroke(); }
    } else if(e.type==="cleric"){ // DR-#036: white-robed healer with a cross
      ctx.beginPath(); ctx.arc(0,0,e.r,0,6.283); ctx.fill();
      ctx.fillStyle="#c04848"; ctx.fillRect(-2,-e.r*0.55,4,e.r*1.1); ctx.fillRect(-e.r*0.55,-2,e.r*1.1,4);
    } else if(e.type==="troop"){
      // DR-#036 taunt tell: pulsing gold challenge ring
      ctx.save(); ctx.globalAlpha=0.25+0.15*Math.sin(perfNow*5); ctx.strokeStyle="#e0c060"; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(0,0,e.r+6,0,6.283); ctx.stroke(); ctx.restore();
      ctx.beginPath(); ctx.arc(0,0,e.r,0,6.283); ctx.fill();
      ctx.fillStyle="#2c4a63"; ctx.fillRect(-e.r,-e.r*0.9,e.r*0.7,e.r*1.8); // shield
    } else if(e.type==="incin"){
      ctx.beginPath(); ctx.arc(0,0,e.r,0,6.283); ctx.fill();
      ctx.fillStyle="#f0c060"; ctx.beginPath(); ctx.arc(0,-e.r*0.4,4,0,6.283); ctx.fill(); // pilot light
    } else if(e.type==="butcher"){
      ctx.beginPath(); ctx.arc(0,0,e.r,0,6.283); ctx.fill();
      ctx.strokeStyle="#5c1f1f"; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(0,0,e.r,0,6.283); ctx.stroke();
      ctx.fillStyle="#d0d4d8"; ctx.save(); ctx.rotate(perfNow*2);
      ctx.fillRect(e.r*0.4,-3,e.r*0.9,6); ctx.restore(); // swinging cleaver
      ctx.fillStyle="#2a0f0f"; ctx.beginPath(); ctx.arc(0,-3,4,0,6.283); ctx.fill();
    } else if(e.type==="boss"){
      ctx.beginPath(); ctx.arc(0,0,e.r,0,6.283); ctx.fill();
      ctx.strokeStyle="#8fa0b0"; ctx.lineWidth=4; ctx.beginPath(); ctx.arc(0,0,e.r+5,0,6.283); ctx.stroke();
      ctx.fillStyle="#e05050"; ctx.beginPath(); ctx.arc(0,0,5,0,6.283); ctx.fill();
    } else {
      ctx.beginPath(); ctx.arc(0,0,e.r,0,6.283); ctx.fill();
    }
    // googly eyes on the humanoid grunts — pupils nervously eye the Hive they're marching at
    if(e.type==="scav"||e.type==="troop"||e.type==="incin"||e.type==="cleric"){
      const dx=hxE-e.x, dy=hyE-e.y, dm=Math.hypot(dx,dy)||1, px=dx/dm, py=dy/dm;
      const er=e.r, ex=er*0.34, ey=-er*0.12, ew=er*0.30, pr=er*0.14;
      ctx.fillStyle="#f4f2ea";
      ctx.beginPath(); ctx.arc(-ex,ey,ew,0,6.283); ctx.arc(ex,ey,ew,0,6.283); ctx.fill();
      ctx.strokeStyle="rgba(8,10,12,0.85)"; ctx.lineWidth=1.2;
      ctx.beginPath(); ctx.arc(-ex,ey,ew,0,6.283); ctx.stroke(); ctx.beginPath(); ctx.arc(ex,ey,ew,0,6.283); ctx.stroke();
      ctx.fillStyle="#15130f";
      ctx.beginPath(); ctx.arc(-ex+px*ew*0.5, ey+py*ew*0.5, pr, 0, 6.283); ctx.arc(ex+px*ew*0.5, ey+py*ew*0.5, pr, 0, 6.283); ctx.fill();
    }
    } // end !spriteDrawn procedural fallback
    // DR-#046: behavior tells that must survive the sprite path (they lived inside the procedural branches)
    if(spriteDrawn){
      if(e.type==="sweeper" && e.chanT>0){ ctx.strokeStyle="#e3d34e"; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(0,0,e.r+6,-Math.PI/2,-Math.PI/2+6.283*(e.chanT/3)); ctx.stroke(); ctx.lineWidth=1; }
      if(e.role==="tank"){ ctx.save(); ctx.globalAlpha=0.25+0.15*Math.sin(perfNow*5); ctx.strokeStyle="#e0c060"; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(0,0,e.r+8,0,6.283); ctx.stroke(); ctx.restore(); }
    }
    // status tells: shape-coded (not color-only) for colorblind accessibility
    if(e.snared){ ctx.strokeStyle="#8a6a3f"; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(0,e.r*0.6,e.r*0.8,0,3.14); ctx.stroke(); }
    if(e.drench>0){ // droplet triangle, top-right
      ctx.fillStyle="rgba(180,240,80,0.85)";
      const dx=e.r*0.5, dy=-e.r*0.5;
      ctx.beginPath(); ctx.moveTo(dx,dy-4); ctx.lineTo(dx+3.5,dy+3); ctx.lineTo(dx-3.5,dy+3); ctx.closePath(); ctx.fill();
    }
    if(e.corroded>0){ // full ring + radiating crack ticks (distinct silhouette from a plain ring)
      ctx.strokeStyle="rgba(200,240,80,0.85)"; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(0,0,e.r+4,0,6.283); ctx.stroke();
      for(let ti=0;ti<5;ti++){ const ta=ti*(6.283/5)+perfNow*1.5; const rx=Math.cos(ta)*(e.r+4), ry=Math.sin(ta)*(e.r+4);
        ctx.beginPath(); ctx.moveTo(rx,ry); ctx.lineTo(rx+Math.cos(ta)*5,ry+Math.sin(ta)*5); ctx.stroke(); }
      ctx.lineWidth=1;
    }
    // HP tint: redden at low health
    if(e.hp/e.max<0.5 && e.flash<=0){ const dmgF=Math.min(1,(1-e.hp/e.max)*2); ctx.save(); ctx.globalAlpha=dmgF*0.38; ctx.fillStyle="#cc2020"; ctx.beginPath(); ctx.arc(0,0,e.r,0,6.283); ctx.fill(); ctx.restore(); }
    ctx.restore();
    // hp bar
    if(e.hp<e.max){ ctx.fillStyle="#222"; ctx.fillRect(e.x-14,e.y-e.r-10,28,4); ctx.fillStyle="#e06060"; ctx.fillRect(e.x-14,e.y-e.r-10,28*Math.max(0,e.hp/e.max),4); }
    // last enemy pulse ring
    if(mode==="play" && spawnQ.length===0 && enemies.length===1){
      const lp=0.5+0.5*Math.sin(perfNow*8);
      ctx.strokeStyle="rgba(255,80,80,"+(0.4+lp*0.5)+")"; ctx.lineWidth=2.5;
      ctx.beginPath(); ctx.arc(e.x,e.y,e.r+6+lp*3,0,6.283); ctx.stroke(); ctx.lineWidth=1;
    }
  }
  // projectiles: glowing acid globs with a comet trail
  for(const p of projectiles){
    const rad = p.charged?8:4;
    let dx=0,dy=0; if(p.tgt){ dx=p.tgt.x-p.x; dy=p.tgt.y-p.y; } const dm=Math.hypot(dx,dy)||1;
    ctx.save(); ctx.globalAlpha=0.35; ctx.fillStyle="#a8e030";
    ctx.beginPath(); ctx.arc(p.x-dx/dm*rad*1.4, p.y-dy/dm*rad*1.4, rad*0.7, 0, 6.283); ctx.fill(); ctx.restore();
    ctx.save(); ctx.shadowColor="#c8f050"; ctx.shadowBlur=p.charged?12:6;
    ctx.fillStyle="#dfff70"; ctx.beginPath(); ctx.arc(p.x,p.y,rad,0,6.283); ctx.fill();
    ctx.fillStyle="#8fbf20"; ctx.globalAlpha=0.7; ctx.beginPath(); ctx.arc(p.x+rad*0.3,p.y+rad*0.3,rad*0.45,0,6.283); ctx.fill();
    ctx.restore();
  }
  // particles
  for(const p of particles){ ctx.globalAlpha=p.big?Math.min(1,p.t*1.4):Math.min(1,p.t*2.5); ctx.fillStyle=p.col; const ps=p.big?7:3; ctx.fillRect(p.x-ps/2,p.y-ps/2,ps,ps); }
  ctx.globalAlpha=1;
  // DR-#046 souls: pale wisps streaking to the Queen (over bodies, under HUD)
  for(const s of souls){
    ctx.save(); ctx.globalAlpha=0.35;
    ctx.fillStyle="#c9f0a8"; ctx.beginPath(); ctx.arc(s.x-s.vx*0.03, s.y-s.vy*0.03, 3, 0, 6.283); ctx.fill();
    ctx.globalAlpha=0.85; ctx.shadowColor="#c9f0a8"; ctx.shadowBlur=8;
    ctx.fillStyle="#eafce0"; ctx.beginPath(); ctx.arc(s.x, s.y, 4, 0, 6.283); ctx.fill();
    ctx.restore();
  }
  // ambient drifting spores (light foreground parallax layer)
  drawMotes();
  // popups
  ctx.textAlign="center"; ctx.font="bold 21px monospace"; // DR-#046 desktop size pass
  for(const p of popups){ ctx.globalAlpha=Math.min(1,p.t); ctx.fillStyle=p.col; ctx.fillText(p.txt,p.x,p.y); }
  ctx.globalAlpha=1;

  drawHUD();
  drawSpeedBtn();
  drawPalette();     // DR-#023 build palette
  drawBossBar();
  if(menu) drawMenu();
  if(mode==="prep") drawPrep();
  if(boonChoice) drawBoons();
  if(banner) drawBanner();
  if(infoModal) drawInfoModal(); // DR-#043a
  if(paused) drawPaused();
  if(mode==="over") drawEnd(false);
  if(mode==="victory") drawEnd(true);
  if(mode==="secondwind") drawSecondWind();
  if(rotateHintT>0){
    ctx.save(); ctx.globalAlpha=Math.min(1,rotateHintT);
    ctx.fillStyle="rgba(14,18,20,0.88)";
    ctx.beginPath(); if(ctx.roundRect)ctx.roundRect(W/2-140,H-40,280,32,8);else ctx.rect(W/2-140,H-40,280,32); ctx.fill();
    ctx.fillStyle="#dfe6ec"; ctx.textAlign="center"; ctx.font="12px monospace";
    ctx.fillText("↻ rotate for a bigger view", W/2, H-19);
    ctx.restore();
  }
  ctx.restore();
  // vignette
  const g = ctx.createRadialGradient(W/2,H/2,H*0.35,W/2,H/2,H*0.75);
  g.addColorStop(0,"rgba(0,0,0,0)"); g.addColorStop(1,"rgba(10,4,14,0.45)");
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  // screen-edge red pulse: flash on hive hit + persistent breathing at low HP
  const hpPct = hiveMax>0 ? hiveHP/hiveMax : 1;
  const pulsePersist = (!REDUCED_MOTION && (mode==="play"||mode==="prep") && hpPct<0.3) ? 0.18*(1+0.4*Math.sin(perfNow*6)) : 0;
  const edgeA = Math.max(edgePulseT*0.55, pulsePersist);
  if(edgeA>0.01){
    const eg = ctx.createRadialGradient(W/2,H/2,H*0.2,W/2,H/2,H*0.85);
    eg.addColorStop(0,"rgba(0,0,0,0)"); eg.addColorStop(1,"rgba(210,40,40,"+edgeA.toFixed(3)+")");
    ctx.fillStyle=eg; ctx.fillRect(0,0,W,H);
  }
  // wave-start flash
  if(waveFlashT>0){ ctx.fillStyle="rgba(255,255,255,"+(waveFlashT/0.15*0.13)+")"; ctx.fillRect(0,0,W,H); }
}
/* DR-#039: the ROOTQUEEN — compact, regal, fits her 2x2 (4-tile) footprint. She replaces the
   old sprawling central eye; she is the boss of each level from the raiders' side. */
function drawHive(){
  const [x0,y0]=tileToXY(CFG.hive.c0,CFG.hive.r0), [x1,y1]=tileToXY(CFG.hive.c1,CFG.hive.r1);
  const cx=(x0+x1)/2, cy=(y0+y1)/2;
  const hurt = hiveHP/hiveMax;
  const beat = REDUCED_MOTION ? 2.2 : (hurt<0.25?7:2.2);
  const pulse = 1+0.04*Math.sin(perfNow*beat);
  // her glow stays inside her court (~1 tile past her body)
  const glowR = 54*pulse;
  const gr = ctx.createRadialGradient(cx,cy,8, cx,cy,glowR);
  const gcol = hurt<0.35 ? "224,90,90" : "150,110,210";
  gr.addColorStop(0,"rgba("+gcol+","+(0.30+0.08*Math.sin(perfNow*beat))+")");
  gr.addColorStop(1,"rgba("+gcol+",0)");
  ctx.fillStyle=gr; ctx.beginPath(); ctx.arc(cx,cy,glowR,0,6.283); ctx.fill();
  ctx.save(); ctx.translate(cx,cy); ctx.scale(pulse,pulse);
  // ROOT CROWN: dark root spikes rising behind her
  ctx.strokeStyle="#241708"; ctx.lineWidth=5; ctx.lineCap="round";
  for(let i=-2;i<=2;i++){
    const a=-Math.PI/2+i*0.42, len=26+ (i%2===0?8:0);
    ctx.beginPath(); ctx.moveTo(Math.cos(a)*18, Math.sin(a)*16);
    ctx.lineTo(Math.cos(a)*(18+len), Math.sin(a)*(16+len)); ctx.stroke();
  }
  ctx.lineCap="butt";
  // DR-#046: the RootQueen renders from the SAME Engvee pack — zombie Idle animation,
  // royal-purple tint, seated over her glow with the root crown behind her. She still
  // tracks the nearest raider. Procedural bulb below stays as the atlas-404 fallback.
  if(useSprites && SPR.queen.ready){
    ctx.restore(); // leave the pulse-scaled space; sprite scales itself
    let qt=null, qbd=Infinity;
    for(const e of enemies){ const d=(e.x-cx)**2+(e.y-cy)**2; if(d<qbd){ qbd=d; qt=e; } }
    const qa = qt ? Math.atan2(qt.y-cy, qt.x-cx) : Math.PI/2;
    drawSpriteFrame('queen', cx, cy-10, qa, 3, 116*pulse, 0);
    if(hurt<0.35){ // distress: red wash pulses over her while she's badly wounded
      ctx.save(); ctx.globalAlpha=0.22+0.12*Math.sin(perfNow*beat); ctx.fillStyle="#e05050";
      ctx.beginPath(); ctx.ellipse(cx,cy-6,40,44,0,0,6.283); ctx.fill(); ctx.restore();
    }
    return;
  }
  // body: royal bulb with cel outline (fits inside 80x80)
  ctx.strokeStyle="rgba(20,10,30,0.85)"; ctx.lineWidth=3;
  ctx.fillStyle="#5a3a78"; ctx.beginPath(); ctx.ellipse(0,4,32,28,0,0,6.283); ctx.fill(); ctx.stroke();
  ctx.fillStyle="#7a4fa0"; ctx.beginPath(); ctx.ellipse(0,2,23,20,0,0,6.283); ctx.fill();
  // bioluminescent jewels on her mantle
  for(const [ox,oy,r] of [[-13,-2,4],[12,-4,3.5],[0,13,3.5]]){
    ctx.save(); ctx.globalAlpha=0.5+0.4*Math.sin(perfNow*2.2+ox); ctx.fillStyle="#c9f0a8";
    ctx.beginPath(); ctx.arc(ox,oy,r,0,6.283); ctx.fill(); ctx.restore();
  }
  // her eye — small now, regal, tracks the nearest threat
  const eyeR=9;
  ctx.fillStyle="#e8dcf5"; ctx.beginPath(); ctx.ellipse(0,-4,eyeR,eyeR*0.8,0,0,6.283); ctx.fill();
  ctx.strokeStyle="rgba(20,10,30,0.7)"; ctx.lineWidth=2; ctx.stroke();
  let tgt=null, bd=Infinity;
  for(const e of enemies){ const d=(e.x-cx)**2+(e.y-cy)**2; if(d<bd){ bd=d; tgt=e; } }
  let lx=0, ly=0;
  if(tgt){ const dx=tgt.x-cx, dy=tgt.y-cy, dm=Math.hypot(dx,dy)||1; lx=dx/dm*3.5; ly=dy/dm*3; }
  const blink = (!REDUCED_MOTION && Math.sin(perfNow*0.9)>0.97) ? 0.12 : 1;
  ctx.save(); ctx.scale(1, blink);
  ctx.fillStyle = hurt<0.35 ? "#e05050" : "#3a1a5a";
  ctx.beginPath(); ctx.arc(lx,(-4+ly)/blink,4.5,0,6.283); ctx.fill();

}

/* ===== Loop (fixed timestep) ===== */
let lastT = 0, acc = 0, perfNow = 0;
function frame(t){
  requestAnimationFrame(frame);
  if(!lastT){ lastT = t; return; }
  let dt = (t-lastT)/1000; lastT = t;
  if(dt>0.25) dt = 0.25;
  perfNow += dt;
  if(edgePulseT>0) edgePulseT = Math.max(0, edgePulseT - dt*2.5);
  if(rotateHintT>0) rotateHintT = Math.max(0, rotateHintT - dt);
  if(rotTipT>0 && !paused && mode!=="over" && mode!=="victory") rotTipT = Math.max(0, rotTipT - dt);
  if(evolveTipT>0 && !paused) evolveTipT = Math.max(0, evolveTipT - dt);
  if(waveFlashT>0) waveFlashT = Math.max(0, waveFlashT - dt);
  if(slowMoT>0){ slowMoT -= dt; if(slowMoT<=0) timeScale=1; }
  if(hitStop>0){ hitStop--; draw(); return; }
  if(!paused){ acc += dt*timeScale; while(acc>=DT){ for(let i=0;i<gameSpeed;i++) update(); acc-=DT; } }
  if((mode==="play"||mode==="prep") && !paused) updateDrone();
  draw();
}
