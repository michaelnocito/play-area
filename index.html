<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>FLIPLINE</title>
<!-- Verify against current CrazyGames SDK docs before submitting -->
<script src="https://sdk.crazygames.com/crazygames-sdk-v3.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent;
      -webkit-user-select:none; user-select:none; -webkit-touch-callout:none; }
  html,body { position:fixed; inset:0; height:100%; width:100%; background:#0c0e14; overflow:hidden; touch-action:none;
              font-family:system-ui,sans-serif; }
  #wrap { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; }
  canvas { background:#0c0e14; image-rendering:pixelated; touch-action:none; }
  #mute { position:fixed; top:8px; right:10px; width:44px; height:44px; border-radius:10px;
          background:rgba(232,236,241,.10); border:1px solid rgba(232,236,241,.30);
          color:#e8ecf1; font-size:19px; cursor:pointer; z-index:5; }
  #fx { position:fixed; top:8px; right:60px; width:44px; height:44px; border-radius:10px;
        background:rgba(232,236,241,.10); border:1px solid rgba(232,236,241,.30);
        color:#e8ecf1; font-size:17px; cursor:pointer; z-index:5; }
  #rotate { position:fixed; inset:0; display:none; align-items:center; justify-content:center;
            background:#0c0e14; color:#e8ecf1; z-index:20; text-align:center;
            font-weight:700; font-size:17px; letter-spacing:.5px; }
  #rotate .ic { display:block; font-size:48px; margin-bottom:12px; animation:spin 2.4s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>
<div id="wrap"><canvas id="c"></canvas></div>
<button id="fx" aria-label="Reduce flashing">✦</button>
<button id="mute" aria-label="Mute">🔊</button>
<div id="rotate"><div><span class="ic">⟳</span>rotate to landscape</div></div>
<script>
"use strict";

/* ===== CrazyGames SDK (graceful no-op offline; verify call names vs current docs) ===== */
const Ads = {
  init(cb){ try{ if(window.CrazyGames?.SDK){ window.CrazyGames.SDK.init().then(()=>cb&&cb()).catch(()=>cb&&cb()); return; } }catch(e){} cb&&cb(); },
  loadingStart(){ try{ window.CrazyGames?.SDK?.game?.loadingStart?.(); }catch(e){} },  // v3 name (verified vs docs 2026-06; sdkGameLoadingStart was v2 → never fired on v3)
  loadingStop(){ try{ window.CrazyGames?.SDK?.game?.loadingStop?.(); }catch(e){} },
  gameplayStart(){ try{ window.CrazyGames?.SDK?.game?.gameplayStart?.(); }catch(e){} },
  gameplayStop(){ try{ window.CrazyGames?.SDK?.game?.gameplayStop?.(); }catch(e){} },
  happytime(){ try{ window.CrazyGames?.SDK?.game?.happytime?.(); }catch(e){} },   // v3: positive-moment signal (new best / Flow ignite) — platform may add flourishes; no gameplay impact
  interstitial(){ try{ window.CrazyGames?.SDK?.ad?.requestAd?.("midgame",
      { adStarted(){ Snd.duck(true); }, adFinished(){ Snd.duck(false); }, adError(){ Snd.duck(false); } }); }catch(e){} },  // mute during ad (policy)
  rewarded(onReward,onSkip){            // opt-in rewarded ad; mutes audio during play (policy); graceful offline
    try{ if(window.CrazyGames?.SDK?.ad?.requestAd){
      window.CrazyGames.SDK.ad.requestAd("rewarded",{
        adStarted(){ Snd.duck(true); },
        adFinished(){ Snd.duck(false); onReward&&onReward(); },
        adError(){ Snd.duck(false); onSkip&&onSkip(); } });   // adError → do NOT reward (policy)
      return; } }catch(e){}
    onReward&&onReward();               // no SDK (local/itch) → grant so the button never dead-ends
  }
};

/* ===== Procedural audio — persistent SFX voices (zero alloc) + a synth music bed (audio-thread only, never per render-frame) ===== */
const PENT=[440,523.25,587.33,659.25,783.99,880,1046.5,1174.66,1318.5];   // A-minor pentatonic (A C D E G…) — keeps SFX in-key with the bed
const Snd = {
  ctx:null, master:null, voices:[], vi:0, muted:false, adMuted:false, noise:null,
  duck(b){ this.adMuted=b; if(this.master&&this.ctx){ try{ this.master.gain.setTargetAtTime(b?0.0001:0.9,this.ctx.currentTime,0.02); }catch(e){} } },  // mute audio during ads
  ensure(){
    if(!this.ctx){ try{ this.ctx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){}
      if(this.ctx){
        this.master=this.ctx.createGain(); this.master.gain.value=0.9; this.master.connect(this.ctx.destination);
        // SFX bus: each voice osc -> gain -> shared lowpass -> master (warms the tone; kills the harsh square 'blip')
        for(let i=0;i<4;i++){ const o=this.ctx.createOscillator(), g=this.ctx.createGain(), lp=this.ctx.createBiquadFilter();
          lp.type="lowpass"; lp.frequency.value=3400; g.gain.value=0.0001; o.connect(g); g.connect(lp); lp.connect(this.master); o.start(); this.voices.push({o,g}); }
        const n=this.ctx.sampleRate*0.5|0, buf=this.ctx.createBuffer(1,n,this.ctx.sampleRate), d=buf.getChannelData(0);  // one reusable noise buffer
        for(let i=0;i<n;i++) d[i]=Math.random()*2-1; this.noise=buf;
        Music.start();
      } }
    if(this.ctx?.state==="suspended") this.ctx.resume();
  },
  play(f1,f2,dur,type,vol){ if(this.muted||this.adMuted)return; this.ensure(); if(!this.voices.length)return;
    const v=this.voices[this.vi]; this.vi=(this.vi+1)%this.voices.length; const t=this.ctx.currentTime;
    v.o.type=type||"square";
    v.o.frequency.cancelScheduledValues(t); v.o.frequency.setValueAtTime(f1,t);
    v.o.frequency.exponentialRampToValueAtTime(Math.max(1,f2),t+dur);
    v.g.gain.cancelScheduledValues(t); v.g.gain.setValueAtTime(0.0001,t);
    v.g.gain.exponentialRampToValueAtTime(vol||0.16,t+0.006);
    v.g.gain.exponentialRampToValueAtTime(0.0001,t+dur); },
  // a filtered noise burst (whoosh / impact texture) — short one-shot nodes on the audio thread, not the render loop
  burstN(f1,f2,dur,vol,type){ if(this.muted||this.adMuted||!this.ctx||!this.noise)return; const t=this.ctx.currentTime;
    const s=this.ctx.createBufferSource(); s.buffer=this.noise;
    const bp=this.ctx.createBiquadFilter(); bp.type=type||"bandpass"; bp.frequency.setValueAtTime(f1,t);
    bp.frequency.exponentialRampToValueAtTime(Math.max(40,f2),t+dur); bp.Q.value=0.8;
    const g=this.ctx.createGain(); g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(vol,t+0.008); g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    s.connect(bp); bp.connect(g); g.connect(this.master); s.start(t); s.stop(t+dur+0.03); },
  // a scheduled pitched one-shot at an ABSOLUTE time (for musical stings / the portal breakout) — audio-thread node, not per-frame
  tone(f,time,dur,vol,type){ if(this.muted||this.adMuted||!this.ctx)return; const o=this.ctx.createOscillator(), g=this.ctx.createGain();
    o.type=type||"triangle"; o.frequency.setValueAtTime(f,time);
    g.gain.setValueAtTime(0.0001,time); g.gain.exponentialRampToValueAtTime(vol||0.09,time+0.01); g.gain.exponentialRampToValueAtTime(0.0001,time+dur);
    o.connect(g); g.connect(this.master); o.start(time); o.stop(time+dur+0.03); },
  flip(up){ // action click + a whoosh that ASCENDS on an up-flip / DESCENDS on a down-flip — directional, smooth
    if(up){ this.play(300,540,0.12,"sawtooth",0.09); this.burstN(900,3200,0.12,0.05,"bandpass"); }
    else  { this.play(360,205,0.12,"sawtooth",0.10); this.burstN(2800,700,0.13,0.06,"bandpass"); } },
  point(){ this.play(740,980,0.06,"triangle",0.07); },                  // soft milestone tick
  coin(){ const f=PENT[6+(Math.random()*3|0)]; this.play(f,f*1.5,0.06,"triangle",0.10); },   // bright in-key sparkle (high pentatonic)
  clean(n){ const f=PENT[Math.min(PENT.length-1,(n||1)-1+3)];           // skim chains WALK UP the A-minor scale → melodic combos
    this.play(f,f*1.35,0.10,"triangle",0.10); this.burstN(1500,4200,0.10,0.05,"highpass"); },  // + a passing whoosh as the pillar flies by
  die(){ this.play(200,42,0.34,"sawtooth",0.17); this.burstN(1900,120,0.30,0.10,"lowpass"); },  // downward glitch + noise impact
  warp(){ if(this.muted||this.adMuted)return; this.ensure(); const t=this.ctx?this.ctx.currentTime:0;
    this.play(170,440,0.16,"sawtooth",0.10); this.burstN(400,2800,0.16,0.10,"bandpass");        // ENTER — intake whoomp + rising whoosh
    this.tone(659.25,t+0.18,0.5,0.09); this.tone(987.77,t+0.25,0.45,0.08); this.tone(1318.5,t+0.32,0.55,0.09); },  // BREAKOUT — bright ascending triad (the unexpected help)
  flow(){ if(this.muted||this.adMuted)return; this.ensure(); const t=this.ctx?this.ctx.currentTime:0;   // entering Flow — warm rising A-minor arpeggio
    this.tone(440,t,0.6,0.09); this.tone(523.25,t+0.07,0.6,0.09); this.tone(659.25,t+0.14,0.7,0.10); this.tone(880,t+0.22,0.8,0.10); }
};

/* ===== Music — a dark minor "Matrix techno" bed, synthesized live (no audio files → zero load latency).
   Runs on a setInterval lookahead scheduler off the render loop; a few short nodes per beat on the audio
   thread (NOT per-frame render allocation). Routes through Snd.master so the mute button + ad-duck silence it. */
const M_BASS=[55,55,65.41,82.41,55,55,82.41,65.41];                 // A A C E A A E C — low A-minor, hypnotic
const M_LEAD=[659.25,587.33,523.25,440,392.0,523.25,659.25,880.0];  // sparse minor-pentatonic "digital rain"
const Music = {
  on:true, flow:false, started:false, gain:null, bassLP:null, timer:null, next:0, step:0, lead:0, BPM:126,
  start(){ if(this.started||!Snd.ctx) return; this.started=true; const c=Snd.ctx;
    this.gain=c.createGain(); this.gain.gain.value=0.0001; this.gain.connect(Snd.master);
    this.bassLP=c.createBiquadFilter(); this.bassLP.type="lowpass"; this.bassLP.frequency.value=420; this.bassLP.Q.value=6; this.bassLP.connect(this.gain);
    this.next=c.currentTime+0.12; this.step=0; this.lead=0;
    this.timer=setInterval(()=>this.sched(),25); this.applyMute(); },
  applyMute(){ if(!this.gain||!Snd.ctx) return; const tgt=(this.on&&!Snd.muted)?(this.flow?0.22:0.16):0.0001; this.gain.gain.setTargetAtTime(tgt,Snd.ctx.currentTime,0.1); },  // swell in Flow State
  sched(){ const c=Snd.ctx; if(!c) return; const sp16=(60/this.BPM)/4;
    const sp=(typeof mode!=="undefined"&&mode==="play")?(speed-SPEED0)/(SPEEDMX-SPEED0):0;   // tension: bass filter opens as you speed up
    this.bassLP.frequency.setTargetAtTime(this.flow?1150:380+Math.max(0,Math.min(1,sp))*560,c.currentTime,0.15);   // Flow State opens it wide
    while(this.next < c.currentTime+0.14){ this.note(this.step,this.next); this.next+=sp16; this.step=(this.step+1)%32; } },
  note(s,t){ if(Snd.muted||Snd.adMuted) return;        // skip node creation when silenced (step still advances → stays in time)
    if(s%4===0) this.kick(t);                            // four-on-the-floor
    if(s%2===0) this.hat(t, s%4===2);                    // 8th-note hats; offbeat = open accent
    if(s%4===2) this.bass(M_BASS[((s-2)/4)%8],t);        // rolling offbeat bass — the techno pump
    if(s>=16 && (s===16||s===19||s===22||s===27)){ this.blip(M_LEAD[this.lead%M_LEAD.length],t); this.lead++; } },  // sparse rain in bar 2
  kick(t){ const c=Snd.ctx, o=c.createOscillator(), g=c.createGain(); o.type="sine";
    o.frequency.setValueAtTime(160,t); o.frequency.exponentialRampToValueAtTime(48,t+0.11);
    g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.9,t+0.006); g.gain.exponentialRampToValueAtTime(0.0001,t+0.20);
    o.connect(g); g.connect(this.gain); o.start(t); o.stop(t+0.22); },
  hat(t,open){ const c=Snd.ctx, s=c.createBufferSource(); s.buffer=Snd.noise;
    const hp=c.createBiquadFilter(); hp.type="highpass"; hp.frequency.value=7200;
    const g=c.createGain(), dur=open?0.09:0.032, vol=open?0.16:0.09;
    g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(vol,t+0.002); g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    s.connect(hp); hp.connect(g); g.connect(this.gain); s.start(t); s.stop(t+dur+0.02); },
  bass(f,t){ const c=Snd.ctx, o=c.createOscillator(), g=c.createGain(); o.type="sawtooth"; o.frequency.setValueAtTime(f,t);
    g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.5,t+0.012); g.gain.exponentialRampToValueAtTime(0.0001,t+0.17);
    o.connect(g); g.connect(this.bassLP); o.start(t); o.stop(t+0.2); },
  blip(f,t){ const c=Snd.ctx, o=c.createOscillator(), g=c.createGain(); o.type="triangle";
    o.frequency.setValueAtTime(f,t); o.frequency.exponentialRampToValueAtTime(f*0.82,t+0.18);
    g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.06,t+0.005); g.gain.exponentialRampToValueAtTime(0.0001,t+0.22);
    o.connect(g); g.connect(this.gain); o.start(t); o.stop(t+0.24); }
};
document.getElementById("mute").addEventListener("click",e=>{
  Snd.muted=!Snd.muted; e.currentTarget.textContent=Snd.muted?"🔇":"🔊"; Music.applyMute(); });   // one mute kills music + SFX
document.getElementById("fx").addEventListener("click",e=>{
  lowFx=!lowFx; e.currentTarget.textContent=lowFx?"✧":"✦"; persist(); });

/* ===== Canvas (DPR-aware, authored in 480x270 logical space) ===== */
const VW=480, VH=270;
const cv=document.getElementById("c"), ctx=cv.getContext("2d");
let scale=1, needRotate=false, rotatePaused=false, baseW=0, baseH=0;
const rotateEl=document.getElementById("rotate");
function resize(){
  const w=innerWidth||1, h=innerHeight||1;
  const coarse = !!(window.matchMedia?.("(pointer:coarse)")?.matches);
  needRotate = coarse && h>w;
  rotateEl.style.display = needRotate ? "flex" : "none";
  const landscape = w>=h;
  // desktop: ALWAYS fill the current window (so maximising/resizing scales up). mobile: lock per orientation (ignore URL-bar jitter).
  if(!coarse || baseW===0 || landscape!==(baseW>=baseH)){ baseW=w; baseH=h; }
  scale=Math.min(baseW/VW, baseH/VH);
  const dpr=devicePixelRatio||1;
  cv.width=VW*dpr*scale|0; cv.height=VH*dpr*scale|0;
  cv.style.width=VW*scale+"px"; cv.style.height=VH*scale+"px";
  ctx.setTransform(dpr*scale,0,0,dpr*scale,0,0); ctx.imageSmoothingEnabled=false;
}
addEventListener("resize",resize); addEventListener("orientationchange",resize); resize();

/* ===== Tunables — all framerate-independent. Change ONE number to tune feel. ===== */
const WALL   = 22;            // top/bottom wall thickness
const TOPY   = WALL;          // ceiling inner surface
const BOTY   = VH-WALL;       // floor inner surface
const PX     = 96;            // player fixed x
const PS     = 16;            // player size
const GRAV   = 4200;          // gravity px/s^2
const FLIPKICK = 240;         // instant velocity on flip (crisp snap off the surface)
const MAXVY  = 1300;          // terminal vertical speed
const SPEED0 = 170;           // starting scroll speed px/s
const SPEEDMX= 360;           // max scroll speed px/s
const RAMP   = 0.15;          // ⚠️ speed gained per meter — DROPPED from 0.35 (Mike: "really drop the speed increase" for the calmer two-line journey; overrides the old locked-feel value)
const GAP0   = 200;           // starting world spacing between obstacles
const GAPMIN = 120;           // tightest spacing
const HMIN   = 66, HMAX=118;  // obstacle jut height range
const WMIN   = 26, WMAX=46;   // obstacle width range

/* ===== Mode B — SKY platformer (its OWN constant set; the LOCKED flip block above is never touched) =====
   Every SEG_LEN metres the world switches flip<->sky. Sky = down-only gravity, one-button FIXED-ARC jump,
   short red floor-juts you hop. Tuned so a single fixed jump ALWAYS clears one jut (apex 96px >> tallest jut)
   AND always lands in a gap (jump reach < tightest spacing) — fair by construction. */
const SEG_LEN  = 250;         // metres per segment before the world flips mode
const SKY_GRAV = 2900;        // FALL gravity once a glide is canceled (2nd tap) → a deliberate drop to land precisely
const SKY_JUMP = 880;         // (parked — upline now glides, not hops)
// UPLINE glide: 1st tap launches a floaty glide; weak gravity + capped descent = a long gentle float; 2nd tap cancels → drop
const GLIDE_LIFT = 375;       // gentle launch into the glide (apex ~100px — reaches the top platform without bonking the ceiling from it)
const GLIDE_GRAV = 700;       // weak gravity WHILE gliding — floatier rise + fall (lower = floatier)
const GLIDE_VMAX = 200;       // capped descent speed while gliding (lower = slower, floatier drift-down)
const SKY_GAP0 = 270, SKY_GAPMIN=230;   // jut spacing — GAPMIN > max jump reach (~219px@cap) so you never land ON a jut
const SKY_HMIN = 28, SKY_HMAX=56;       // floor-jut height range (all clearable by the fixed arc)
const SKY_WMIN = 20, SKY_WMAX=40;
const XFADE    = 1.5;         // portal-transition duration (s): colour sweep + settle, field cleared (non-lethal) — calmer, gives prep time
const SPEED_DROP = 0.25;      // on entering a new level, scroll speed drops to 75% so the player can acclimate...
const ACCLIM_DUR = 3.0;       // ...then eases linearly back to full over this many seconds

/* ===== Mode C — LOWER mine (segType 2): underground stomp-runner ===== */
// Same ground physics + fixed-arc jump as sky, but hazards include CRAWLING ENEMIES you can defeat by stomping
// their head (Goomba logic). Enemies are RED (pillar: danger is always red) — side/below contact kills; a top-stomp
// pops them for coins + a bounce. Red spikes are jump-only. Tuned so spacing absorbs the crawl + stays jump-fair.
const MINE_GAP0=270, MINE_GAPMIN=240;   // > sky's, to absorb enemy closing speed and stay land-in-gap fair (with the bigger jump)
const ENEMY_VX=16;                      // critters crawl toward you (subtle — keeps the jump-over escapable)
const ENEMY_HMIN=22, ENEMY_HMAX=32;     // critter height (short → the fixed arc can land on the head)
const SPIKE_H=44;                       // lethal red floor-spike (jump-only; apex 90 clears it)
const STOMP_BOUNCE=560;                 // hop imparted by a successful stomp (smaller than a full jump)
const STOMP_TOL=9;                      // grace px for the "landed on the head" window
const ENEMY_COIN=2;                     // coins for a clean stomp
// Two-line flow: start DOWNLINE/mid(0) ⇄ UPLINE/upper(1). (Lower mine = PARKED; removed from rotation.)
const SEG_SEQ=[1,0];

/* ===== Collectible tunables (coins + earned power-orbs) ===== */
const COL_FROM=60;            // metres before any loot appears (gentle early game)
const LURE_GAP_MIN=30, LURE_GAP_RND=24;        // metres between lures (cadence breathes 30–54m)
const STEPX=24, DIP_STEPX=60, SCAT_STEPX=90;   // horizontal spacing within a lure
const COIN_VAL=1, COIN_VAL_RISK=3;             // base vs danger-lane risk-premium payout
const COIN_R=14, ORB_R=22;                     // GENEROUS grab radii (>> the ~8/11px visuals)
const WEAVE_MAX=175;                           // TUNNEL only: below this distance coins appear ONLY hugging a pipe's wall in the
                                               // open gap just past it (tempts a quick weave up/down into the empty space + back);
                                               // at/above 175m speed is too high to weave safely → revert to the normal lures
const WEAVE_COIN_DX=44;                         // how far into the trailing opening the weave coin sits (clearLootNear prunes unsafe ones)
const MAG_R=150;                               // MAGNET buff pull radius — coins within this glide to the player
/* Warp tubes — optional HIGH-SKILL forward skip (teal/friendly, never red, never kills; miss = no penalty) */
const WARP_FROM=120, WARP_GAP=100, WARP_M=28;  // first ~120m then ~every 100m; +28m skip (leaderboard-safe)
const WARP_HITX=PS, WARP_HITY=18;              // TIGHT catch window — must flip THROUGH the ring; harder to time than a dodge
const ORB_FROM=150, ORB_GAP=170;              // orbs unlock at the old gate distance, now EARNED
const KEEPX=78, KEEPY=24;                      // keep-out from any red edge — large enough that even the LATEST-grabbed dip coin is escapable from a max-height same-surface jut at top speed (~37ms margin)
const ORB_DUR=4;                               // orb buff seconds (was GATE_DUR)

/* ===== Premium obstacle look (precomputed strings — zero per-frame allocation) ===== */
const OBGLOW=[]; for(let i=0;i<8;i++) OBGLOW.push("rgba(255,84,104,"+(0.10+0.16*(i/7)).toFixed(3)+")"); // tension-glow LUT
const OBSEAM="rgba(255,154,162,0.55)";   // animated energy-seam color, reused forever
const OBSEAM2="rgba(255,110,130,0.28)"; // reverse-direction counterpoint seam
const OBPANEL="rgba(0,0,0,0.20)";       // internal tech-panel separator line

/* ===== Precomputed art + lighting (built once at boot, then only blitted) =====
   Long Way Home is told wordlessly with light: a player-centred spotlight that breathes,
   a warm home-beacon on the horizon, and zones re-themed as lands. */
let RIDGE=null, RIDGEBUF=null, RIDGECTX=null, ridgeOff=0, LIGHTSPR=null, LIGHTGOLD=null, DARK=null, DARKCTX=null, ORBSPR=[null,null,null];
function mkCanvas(w,h){ const c=document.createElement("canvas"); c.width=w; c.height=h; return c; }
function radialSprite(size,r,g,b){   // soft radial glow, baked ONCE; reused for spotlight + beacon
  const c=mkCanvas(size,size), x=c.getContext("2d");
  const gr=x.createRadialGradient(size/2,size/2,0,size/2,size/2,size/2);
  gr.addColorStop(0,   "rgba("+r+","+g+","+b+",1)");
  gr.addColorStop(0.45,"rgba("+r+","+g+","+b+",0.92)");
  gr.addColorStop(0.75,"rgba("+r+","+g+","+b+",0.32)");
  gr.addColorStop(1,   "rgba("+r+","+g+","+b+",0)");
  x.fillStyle=gr; x.fillRect(0,0,size,size); return c;
}
function buildArt(){
  // mid-parallax ridge — silhouettes baked as a WHITE MASK; tinted per-land each frame on RIDGEBUF
  // (cool->warm with the zone) then wrap-blitted. Recedes behind the danger layer; never red.
  RIDGE=mkCanvas(VW,VH); { const g=RIDGE.getContext("2d"); g.fillStyle="#fff";
    let x=0; while(x<VW){ const w=20+((x*131)%18), hh=14+((x*97)%26);

/* lighting tunables (logical-px radius) + cached darkness strings (no per-frame alloc).
   Darkness is kept moderate so incoming RED obstacles stay readable through the gloom. */

const OBN=20, obs=[]; for(let i=0;i<OBN;i++) obs.push({on:false,x:0,w:0,h:0,side:0,style:0,k:0});  // k: 0 obstacle/spike · 1 stompable enemy (mine)
// UPLINE platforms — floating ledges you jump onto/across (one-way landing); pooled, alloc-free

function spawnWarp(){ for(const w of warps){ if(!w.on){ w.on=true; w.used=false; w.x=VW+20; w.y=(Math.random()<0.5?108:162); return; } } }  // mid-lane → must time a flip

/* ===== Collectible pool (coins + earned power-orbs) — no per-frame allocation =====
   kind: 0 coin · 1 MAGNET · 2 SHIELD · 3 2×  (orb kind k → buff timer BT[k-1]) */
const COLN=28, col=[]; for(let i=0;i<COLN;i++) col.push({on:false,x:0,y:0,kind:0,val:1,bob:0});
let colHead=0;
function colAlloc(){ const c=col[colHead]; colHead=(colHead+1)%COLN; return c; }
function placeCoin(x,y,val){ const c=colAlloc(); c.on=true; c.x=x; c.y=y; c.kind=0; c.val=val; c.bob=Math.random()*6.283; }
function placeOrb(x,y,kind){ const c=colAlloc(); c.on=true; c.x=x; c.y=y; c.kind=kind; c.val=0; c.bob=Math.random()*6.283; }
const PN=120, par=[]; for(let i=0;i<PN;i++) par.push({life:0,x:0,y:0,vx:0,vy:0,r:2,c:"#ffcf5c"});
let parHead=0;
function emit(x,y,vx,vy,life,r,c){ const p=par[parHead]; parHead=(parHead+1)%PN;
  p.life=life; p.x=x; p.y=y; p.vx=vx; p.vy=vy; p.r=r; p.c=c; }
function burst(x,y){ for(let i=0;i<22;i++){ const a=Math.random()*6.283, s=40+Math.random()*220;
  emit(x,y,Math.cos(a)*s,Math.sin(a)*s,0.5+Math.random()*0.4,1+(Math.random()*2|0),"#ff6478"); } }
function spark(x,y){ for(let i=0;i<8;i++){ const a=Math.random()*6.283, s=30+Math.random()*120;
  emit(x,y,Math.cos(a)*s,Math.sin(a)*s,0.30+Math.random()*0.25,1+(Math.random()*2|0),"#bff5e2"); } }
function coinFx(x,y){ for(let i=0;i<9;i++){ const a=Math.random()*6.283, s=30+Math.random()*110;   // gold burst on coin grab
  emit(x,y,Math.cos(a)*s,Math.sin(a)*s-50,0.4+Math.random()*0.3,1+(Math.random()*2|0),"#ffcf5c"); } }

/* ===== Glowing "surfing" trail (fixed ring buffer, zero alloc) ===== */

/* ===== Dynamic zone palette (evolving "worlds", cheap) — danger stays red for fairness ===== */

const ACCENTS=[[120,160,255],[170,150,255],[120,225,210],[255,180,110],[255,212,120]]; // cool blue -> violet -> teal -> amber -> gold
// UPPER (above-ground) palette — a calm OUTDOOR sky, deliberately muted/mid-brightness so it's easy on the eyes
// (replaces the harsh colour-invert). Danger reds are hardcoded → still pop against it.
const UPPER_ZONES=[[58,92,128],[84,118,150],[110,134,158],[92,116,150]];   // dawn-blue -> daytime -> haze -> dusk sky (soft)
const UPPER_ACC  =[[150,196,150],[206,194,150],[168,204,222],[196,208,168]]; // foliage green / warm sun / pale sky / meadow

const LOWER_ACC  =[[214,150,70],[234,182,92],[182,128,78],[240,200,112]];   // lantern amber / ore glint / copper / gold-dust
function palZ(s){ return s===1?UPPER_ZONES:s===2?LOWER_ZONES:ZONES; }        // zone palette per level
function palA(s){ return s===1?UPPER_ACC:s===2?LOWER_ACC:ACCENTS; }          // accent palette per level
function lerpi(a,b,k){ return (a+(b-a)*k)|0; }
function zoneRGB(arr,d){ const f=d/ZONELEN, i=((f|0)%arr.length+arr.length)%arr.length, j=(i+1)%arr.length, k=f-(f|0);
  const A=arr[i],B=arr[j]; return [lerpi(A[0],B[0],k),lerpi(A[1],B[1],k),lerpi(A[2],B[2],k)]; }
let accCss="#ffcf5c", accGlow="rgba(255,207,92,0.30)";

/* ===== Run-modifier buffs (MAGNET / SHIELD / 2×) — EARNED from power-orbs, not free gates ===== */
const GATECOL=[[90,220,255],[255,212,90],[255,120,220]];  // 0 MAGNET (cyan), 1 SHIELD (gold), 2 DOUBLE (magenta) — the buff colour language
const GATELABEL=["MAGNET","SHIELD","2× SCORE"];
const ORBCSS=["rgb(90,220,255)","rgb(255,212,90)","rgb(255,120,220)"];  // precomputed orb-core strings (no per-frame alloc)
const BUFFSEL=["rgba(90,220,255,0.30)","rgba(255,212,90,0.30)","rgba(255,120,220,0.30)"];  // selected pre-run chip fill

/* ===== Cosmetics + coin economy (cosmetic only — never touches physics) =====
   THREE independent axes: SHAPE (body silhouette), TRAIL (how the surf-trail renders),

const SKINS=[

];
const TRAILS=[
  {name:"Classic", cost:0,   r:0},                 // tapered squares (default)
  {name:"Comet",   cost:45,  r:1},                 // bright core + soft wide ghost
  {name:"Spark",   cost:65,  r:2},                 // twinkling motes

];
const AURAS=[
  {name:"Match",    cost:0,   col:null},           // glow/trail match the skin (default)
  {name:"Aqua",     cost:30,  col:"#5ef2c2"},

  {name:"Amber",    cost:75,  col:"#ffcf5c"},
  {name:"Violet",   cost:110, col:"#c97bff"},
  {name:"Spectrum", cost:160, col:null, reactive:true}  // zone-reactive glow/trail
];
const SAVE="flipline.v1";
let coins=0, owned=[0], equipped=0, ownedTrail=[0], equippedTrail=0, ownedAura=[0], equippedAura=0;
let runCoinBonus=0, shopCat=0, sel=[0,0,0], lastEarned=0, lowFx=false, pickBuff=1, startAll=false;   // default pickBuff=SHIELD so a first-timer FEELS a buff in run 1 without choosing
function loadSave(){ try{ const d=JSON.parse(localStorage.getItem(SAVE)); if(d){
    coins=d.coins|0; owned=Array.isArray(d.owned)?d.owned:[0]; equipped=d.equipped|0; best=d.best|0; lowFx=!!d.lowFx;
    if(typeof d.pickBuff==="number") pickBuff=d.pickBuff;
    if(Array.isArray(d.ownedTrail)) ownedTrail=d.ownedTrail; equippedTrail=d.equippedTrail|0;
    if(Array.isArray(d.ownedAura))  ownedAura=d.ownedAura;   equippedAura=d.equippedAura|0; } }catch(e){}
  if(!owned.includes(0)) owned.push(0); if(!owned.includes(equipped)) equipped=0;
  if(!ownedTrail.includes(0)) ownedTrail.push(0); if(!ownedTrail.includes(equippedTrail)) equippedTrail=0;
  if(!ownedAura.includes(0)) ownedAura.push(0); if(!ownedAura.includes(equippedAura)) equippedAura=0; }
function persist(){ try{ localStorage.setItem(SAVE, JSON.stringify(
    {coins,owned,equipped,ownedTrail,equippedTrail,ownedAura,equippedAura,best,lowFx,pickBuff})); }catch(e){} }
function skinCol(){ return SKINS[equipped].col; }   // null → zone-reactive
function hexA(h,a){ const n=parseInt(h.slice(1),16); return "rgba("+(n>>16&255)+","+(n>>8&255)+","+(n&255)+","+a+")"; }
// cosmetic-category accessors (0 SHAPE, 1 TRAIL, 2 AURA)
function catList(c){ return c===0?SKINS:c===1?TRAILS:AURAS; }
function catOwned(c){ return c===0?owned:c===1?ownedTrail:ownedAura; }
function catEquipped(c){ return c===0?equipped:c===1?equippedTrail:equippedAura; }
function catSetEquipped(c,i){ if(c===0)equipped=i; else if(c===1)equippedTrail=i; else equippedAura=i; }
function nextUnlock(){ let bestIt=null;   // cheapest still-unowned cosmetic across all axes (dead-screen carrot)
  for(let c=0;c<3;c++){ const L=catList(c), O=catOwned(c);
    for(let i=0;i<L.length;i++){ const it=L[i]; if(it.cost>0 && !O.includes(i) && (!bestIt||it.cost<bestIt.cost)) bestIt=it; } }
  return bestIt; }

// UI hit-regions (virtual 480x270 space)
const R_SHOPBTN={x:VW/2-54,y:VH/2+72,w:108,h:26};
const BCW=66, BCH=24, BCY=42, BCGAP=8, BCX0=VW/2-(BCW*3+BCGAP*2)/2;   // pre-run "start boost" chips

const R_PREV={x:52,y:112,w:36,h:44}, R_NEXT={x:392,y:112,w:36,h:44};
const R_ACT={x:VW/2-72,y:196,w:144,h:30}, R_BACK={x:16,y:236,w:80,h:24};
// revive "CONTINUE?" offer — two EQUAL-weight buttons (policy: skip/continue must match in size/font/colour)
const R_CONT={x:VW/2-94,y:VH/2+4,w:188,h:30}, R_END={x:VW/2-94,y:VH/2+40,w:188,h:28};
// dead screen: explicit retry pill (so the rest of the screen is inert) + optional rewarded-ad coin doubler
const R_RETRY={x:VW/2-72,y:VH/2+52,w:144,h:24};
const R_DOUBLE={x:VW/2-94,y:VH/2+78,w:188,h:22};
// in-run pause: corner toggle that maps to the same icon area people already use, just bigger so a deliberate tap is unambiguous
const R_PAUSE={x:VW-44,y:VH-44,w:36,h:36};
// dev menu — pick the starting line (downline/mid · upline/upper); top row, clear of other UI, on ready + dead
const DEVW=104, DEVG=8, DEVY=5, DEVH=17, DEVX0=VW/2-(DEVW*2+DEVG)/2;
const R_DEV=[{x:DEVX0,y:DEVY,w:DEVW,h:DEVH},{x:DEVX0+DEVW+DEVG,y:DEVY,w:DEVW,h:DEVH}];
function inR(p,r){ return p.x>=r.x&&p.x<=r.x+r.w&&p.y>=r.y&&p.y<=r.y+r.h; }
function score(){ return dist; }
function vpos(e){ const r=cv.getBoundingClientRect(); return {x:(e.clientX-r.left)/scale, y:(e.clientY-r.top)/scale}; }
function shopAction(){ const c=shopCat, i=sel[c], list=catList(c), own=catOwned(c), it=list[i];
  if(own.includes(i)){ catSetEquipped(c,i); persist(); }
  else if(coins>=it.cost){ coins-=it.cost; own.push(i); catSetEquipped(c,i); persist(); Snd.clean(6); } }

/* ===== State ===== */
let mode="ready";            // ready | play | dead
let py, vy, gdir, sq;        // player y, vel, gravity dir(1 down/-1 up), squash
let speed, worldX, dist, best=0, spawnCd, nextAd, adPending=false;
let shake=0, flash=0, flashCol="#ff5468", freeze=0, t=0, lastMile=0;
let paused=false, pausedAtMode="ready", doubledFlag=false;
let fmId=0, fmStep=0, fmSide=0, fmLen=0, hardCount=0;
let segType=0, prevSegType=0, nextSeg=SEG_LEN, xfade=0, segStep=0, acclimT=0;   // 0 downline/mid / 1 upline/upper; segStep walks SEG_SEQ; acclimT=post-transition speed ease-in
let onGround=true, gliding=false;   // upline: onGround gates launch (no double-glide); gliding = currently in a glide
let devSeg=0;   // dev menu: which level a run starts in (0 tunnel/mid, 1 above/upper, 2 mine/lower)
let bgPulse=0, landT=0;              // background reacts; landT drives the landing grin
let coinPopT=0, coinPopV=0;          // coin-grab feedback: floating "+N" + counter pulse
let lightR=LR_BASE, lightTarget=LR_BASE, beaconPulse=0;   // Long Way Home: emotional light + home-beacon
let lastZone=0, zoneSweep=0, zonesRun=0;   // X3 lore: land tracking — crossing fires a "new land" sweep + steps the beacon closer
let reviveT=0, reviveUsedFree=false, reviveUsedAd=false;   // revive: 1 free + 1 ad per run (precision, never every death)
let nextWarp=WARP_FROM, warpFx=0;                          // warp tubes: next spawn distance + nail-it flourish timer
let nextLure=COL_FROM, lastObsSide=0, orbArmed=false, lastOrbDist=-999, lureSeq=0;   // collectible lures
let earlyOrb=true;   // free onboarding SHIELD dropped in the opening metres so new players FEEL a buff

function reset(){
  py=BOTY-PS; vy=0; gdir=1; sq=1;
  speed=SPEED0; worldX=0; dist=0; spawnCd=GAP0; nextAd=1; runCoinBonus=0;
  for(const o of obs) o.on=false;
  for(const pl of plat) pl.on=false; onGround=true; gliding=false;
  for(const p of trail) p.on=false; trHead=0;
  for(const c of col) c.on=false; colHead=0; BT[0]=BT[1]=BT[2]=0;
  shake=0; flash=0; freeze=0; lastMile=0; bgPulse=0; landT=0; doubledFlag=false;
  fmId=0; fmStep=0; fmLen=0; hardCount=0;
  segType=0; prevSegType=0; nextSeg=SEG_LEN; xfade=0; segStep=0; acclimT=0;
  lightR=LR_BASE; lightTarget=LR_BASE; beaconPulse=0; lastZone=0; zoneSweep=0; zonesRun=0;
  reviveT=0; reviveUsedFree=false; reviveUsedAd=false;
  for(const w of warps) w.on=false; nextWarp=WARP_FROM; warpFx=0;
  Music.flow=false; Music.applyMute();
  nextLure=COL_FROM; lastObsSide=0; orbArmed=false; lastOrbDist=-999; lureSeq=0; coinPopT=0; coinPopV=0; earlyOrb=true;
}
function start(){ Snd.ensure();
  let gift=false; try{ const d=new Date().toDateString(); if(localStorage.getItem("flipline.day")!==d){ localStorage.setItem("flipline.day",d); gift=true; } }catch(e){}  // daily: first run of the day = all 3 free
  reset(); lightR=74;                                  // re-bloom from small
  segType=devSeg; prevSegType=devSeg;                  // dev: start in the chosen level (no transition sweep)
  if(segType>=1){ py=BOTY-PS; vy=0; gdir=1; }          // above-ground / mine start grounded
  if(startAll||gift){ BT[0]=BT[1]=BT[2]=START_BUFF; }  // rewarded ad OR daily gift → start with ALL 3
  else if(pickBuff>=0){ BT[pickBuff]=START_BUFF; }     // everyday free pick-1
  startAll=false; mode="play"; Ads.gameplayStart();
}
function flip(){ gdir=-gdir; vy=gdir*FLIPKICK; sq=0.6; Snd.flip(gdir<0); }   // gdir<0 → rising to the ceiling = "up" whoosh
function skyJump(){   // UPLINE glide: 1st tap (grounded) launches a floaty glide; 2nd tap (airborne) cancels it → drop to land precisely
  if(onGround){ vy=-GLIDE_LIFT; onGround=false; gliding=true; sq=0.78; Snd.flip(true); }
  else if(gliding){ gliding=false; Snd.flip(false); }
}
// A crash: juice always; then branch — free revive (1st) → ad-revive offer (2nd) → real death.
function onCrash(){
  shake=10; flash=0.5; flashCol="#ff5468"; freeze=0.05; burst(PX+PS/2,py+PS/2); Snd.die();
  Music.flow=false; Music.applyMute();
  lightR=26; lightTarget=26;   // snuff the light to a spark
  if(!reviveUsedFree){ reviveUsedFree=true; beginRevive(false); }      // death #1 → FREE revive, no ad
  else if(!reviveUsedAd){ mode="offer"; Ads.gameplayStop(); }          // death #2 → optional 1-ad continue (offered once)
  else finalDeath();                                                    // death #3+ → run ends
}
// Resume the SAME run: clear the field so you don't instantly re-die, reset to a safe surface, shield grace, 3s countdown.
function beginRevive(withBuffs){
  for(const o of obs){ if(o.on){ burst(o.x+o.w/2,(o.side===0?BOTY-o.h:TOPY)+o.h/2); o.on=false; } }   // clear + juice the field
  for(const c of col){ if(c.kind===0) c.on=false; }   // clear loose coins (orbs are harmless, leave them)
  py=BOTY-PS; vy=0; gdir=1; sq=1; spawnCd=GAP0;        // stable on the start surface; first new jut isn't instant
  BT[1]=Math.max(BT[1],GRACE);                          // shield grace so the first new obstacle is survivable
  if(withBuffs){ BT[0]=BT[1]=BT[2]=START_BUFF; }        // ad reward → revive WITH all 3 buffs
  reviveT=REVIVE_CD; mode="reviving"; lightR=70;        // bloom the light back up during the countdown
  beaconPulse=Math.max(beaconPulse,0.8); Snd.clean(5); Ads.gameplayStart();
}
function finalDeath(){
  mode="dead"; Ads.gameplayStop();
  if(adPending){ adPending=false; Ads.interstitial(); }   // midgame ONLY when the run truly ends (never with a revive — policy)
  const sc=score(); if(sc>best){ best=sc; Ads.happytime(); }   // new personal best = a genuine happy moment
  lastEarned=(sc/14|0)+runCoinBonus; coins+=lastEarned; persist();
  lightR=26; lightTarget=26;
}

/* ===== Input ===== */
function togglePause(){ if(paused){ paused=false; if(pausedAtMode==="play") Ads.gameplayStart(); }   // resume first — mode is still "play" while paused
  else if(mode==="play"){ paused=true; pausedAtMode="play"; Ads.gameplayStop(); } }
function tap(){ if(mode==="play"){ segType>=1?skyJump():flip(); } else if(mode==="ready") start(); }   // one button: flip (tunnel) OR jump (sky/mine); ready taps-to-start
addEventListener("pointerdown",e=>{ if(e.target.id==="mute"||e.target.id==="fx"||needRotate)return; e.preventDefault(); const p=vpos(e);
  if(paused){ if(inR(p,R_PAUSE)) togglePause(); else if(pausedAtMode==="play") togglePause(); return; }   // any tap resumes from play-pause
  if(mode==="shop"){ shopTap(p); return; }
  if(mode==="reviving") return;                      // countdown is automatic — taps ignored
  if(mode==="offer"){                                // the once-per-run "CONTINUE? watch ad" choice
    if(inR(p,R_CONT)){ Ads.rewarded(()=>{ reviveUsedAd=true; beginRevive(true); }, ()=>{ reviveUsedAd=true; finalDeath(); }); return; }
    if(inR(p,R_END)){ reviveUsedAd=true; finalDeath(); return; }
    return; }
  if(mode==="play" && inR(p,R_PAUSE)){ togglePause(); return; }   // pause from in-run via corner tap
  if(mode==="ready"||mode==="dead"){   // DEV: top-row pills launch straight into a chosen line (works from menu AND dead screen)
    for(let i=0;i<2;i++) if(inR(p,R_DEV[i])){ devSeg=i; start(); return; } }
  if(mode==="ready"||mode==="dead"){
    if(inR(p,R_SHOPBTN)){ mode="shop"; shopCat=0; sel[0]=equipped; sel[1]=equippedTrail; sel[2]=equippedAura; return; }
    for(let i=0;i<3;i++) if(inR(p,R_BUFF[i])){ pickBuff=(pickBuff===i?-1:i); persist(); return; }   // toggle the free pick-1
    if(inR(p,R_BUFFALL)){ Ads.rewarded(()=>{ startAll=true; start(); }, ()=>{ start(); }); return; } // watch ad → all 3
  }
  if(mode==="dead"){
    if(inR(p,R_RETRY)){ start(); return; }

  }

addEventListener("visibilitychange",()=>{ if(document.hidden && mode==="play" && !paused) togglePause(); });   // phone-call / tab-switch recovery

  if(mode==="shop"){ const c=shopCat, n=catList(c).length;
    if(e.key==="ArrowLeft") sel[c]=(sel[c]-1+n)%n;

function shopTap(p){
  for(let c=0;c<3;c++) if(inR(p,R_TAB[c])){ shopCat=c; return; }   // switch axis
  const c=shopCat, n=catList(c).length;

  else if(inR(p,R_NEXT)){ sel[c]=(sel[c]+1)%n; }
