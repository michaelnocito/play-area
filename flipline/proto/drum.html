/* ============================================================================
   ODD SOCK — "INSIDE THE DRYER" prototype (🔷 Mike 2026-07-11)
   3rd-person tube-dodger: camera looks INTO the drum, the sock rides the rim,
   you steer around the circumference to dodge red heat; STATIC CLING charges
   as you slide and spends on a leap. Goal: reach THE LOST SOCK VORTEX.
   Feel-lock prototype — if it's fun, it becomes campaign Level 1 and the
   existing flip-runner becomes the later under-floor/garden/attic levels.
   Controls: ← →/A D steer · SPACE/↑ leap (when charged) · touch: hold left/
   right half to steer, quick tap to leap.
   ============================================================================ */

/* C3/P3 — Jetpack Joyride 3-slot missions + named rank ladder (localStorage only) */
const RANKS=["LOOSE THREAD","LINT BALL","TUMBLED SOCK","BRAVE SOCK","STATIC SOCK","DRUM RUNNER","VORTEX VETERAN","LEGEND OF LAUNDRY"];
const MISSIONS=[

/* ===== Audio (tiny) ===== */
const PENT=[220,261.63,293.66,329.63,392,440,523.25,587.33];   // A-minor pentatonic (same ladder as the main game's Snd)
const Snd={ctx:null,g:null,
  ensure(){ if(this.ctx)return; try{ this.ctx=new (window.AudioContext||window.webkitAudioContext)();
    this.g=this.ctx.createGain(); this.g.gain.value=0.8; this.g.connect(this.ctx.destination);
    const n=this.ctx.sampleRate/2|0, b=this.ctx.createBuffer(1,n,this.ctx.sampleRate), d=b.getChannelData(0);
    for(let i=0;i<n;i++)d[i]=Math.random()*2-1;
    const s=this.ctx.createBufferSource(); s.buffer=b; s.loop=true;                       // dryer rumble
    const lp=this.ctx.createBiquadFilter(); lp.type="lowpass"; lp.frequency.value=95;
    const g2=this.ctx.createGain(); g2.gain.value=0.08; s.connect(lp); lp.connect(g2); g2.connect(this.g); s.start();
  }catch(e){} },
  b(f1,f2,dur,type,vol){ if(!this.ctx)return; const t=this.ctx.currentTime,o=this.ctx.createOscillator(),g=this.ctx.createGain();
    o.type=type||"triangle"; o.frequency.setValueAtTime(f1,t); o.frequency.exponentialRampToValueAtTime(Math.max(1,f2),t+dur);
    g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(vol||0.12,t+0.01); g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.connect(g); g.connect(this.g); o.start(t); o.stop(t+dur+0.03); },
  leap(){ this.b(240,620,0.22,"triangle",0.14); }, land(){ this.b(200,120,0.1,"triangle",0.1); },
  die(){ this.b(220,40,0.4,"sawtooth",0.18); }, charge(){ this.b(880,1320,0.08,"triangle",0.07); },
  win(){ this.b(440,660,0.4,"triangle",0.12); this.b(660,990,0.5,"triangle",0.1); },
  coin(){ const f=2000+Math.random()*400;                     // metallic CLINK — loose change, not a sparkle
    this.b(f,f*0.92,0.035,"square",0.05); this.b(f*1.35,f*1.25,0.05,"triangle",0.07); },
  orb(){ this.b(520,780,0.18,"triangle",0.11); this.b(780,1170,0.22,"triangle",0.09); },
  shieldPop(){ this.b(300,90,0.22,"sawtooth",0.14); },
  graze(){ this.b(1500,2100,0.05,"triangle",0.055); },
  pulse(){ this.b(700,1800,0.12,"triangle",0.12); this.b(350,900,0.16,"square",0.05); },   // static discharge crack
  thump(v){ this.b(85,42,0.11,"sine",v||0.1); },                      // the dryer's heartbeat
  grind(){ this.b(140,70,0.7,"sawtooth",0.09); this.b(70,55,0.7,"square",0.06); },   // jam telegraph
  hat(v){ if(!this.ctx)return; const t=this.ctx.currentTime,          // tiny noise tick for the hot layer
    n=this.ctx.sampleRate*0.03|0, b2=this.ctx.createBuffer(1,n,this.ctx.sampleRate), d=b2.getChannelData(0);
    for(let i=0;i<n;i++)d[i]=(Math.random()*2-1)*(1-i/n);
    const s=this.ctx.createBufferSource(); s.buffer=b2;
    const hp=this.ctx.createBiquadFilter(); hp.type="highpass"; hp.frequency.value=5500;
    const g=this.ctx.createGain(); g.gain.value=v||0.05;
    s.connect(hp); hp.connect(g); g.connect(this.g); s.start(t); }
};

/* ===== Sock sprite (trimmed from the main game) ===== */
function mkCanvas(w,h){ const c=document.createElement("canvas"); c.width=w; c.height=h; return c; }
let SOCK=null;
{ const W=128, r=48, c=mkCanvas(W,W), x=c.getContext("2d");
  x.translate(W/2,W/2);
  const path=()=>{ x.beginPath();
    x.moveTo(-1.05*r,-1.0*r); x.lineTo(-0.05*r,-1.0*r);
    x.lineTo(-0.05*r,0.02*r); x.quadraticCurveTo(-0.05*r,0.2*r,0.18*r,0.2*r);
    x.lineTo(0.72*r,0.2*r); x.quadraticCurveTo(1.14*r,0.24*r,1.08*r,0.64*r);
    x.lineTo(0.96*r,1.0*r); x.lineTo(-0.72*r,1.0*r);
    x.quadraticCurveTo(-1.1*r,1.0*r,-1.05*r,0.5*r); x.closePath(); };
  path(); x.fillStyle="#efe9db"; x.fill();
  x.save(); path(); x.clip();
  x.fillStyle="rgba(0,0,0,0.05)"; for(let yy=-r;yy<r;yy+=7) x.fillRect(-1.2*r,yy,2.4*r,2);
  x.fillStyle="rgba(0,0,0,0.18)";
  x.beginPath(); x.arc(-0.72*r,0.78*r,0.42*r,0,TAU); x.fill();
  x.beginPath(); x.arc(1.0*r,0.75*r,0.42*r,0,TAU); x.fill();
  x.fillStyle="rgba(255,255,255,0.45)"; x.fillRect(-1.05*r,-1.0*r,1.0*r,0.2*r);
  x.restore(); SOCK=c; }
function glowSprite(sz,r,g,b){ const c=mkCanvas(sz,sz),x=c.getContext("2d");
  const gr=x.createRadialGradient(sz/2,sz/2,0,sz/2,sz/2,sz/2);
  gr.addColorStop(0,"rgba("+r+","+g+","+b+",1)"); gr.addColorStop(0.5,"rgba("+r+","+g+","+b+",0.55)");
  gr.addColorStop(1,"rgba("+r+","+g+","+b+",0)"); x.fillStyle=gr; x.fillRect(0,0,sz,sz); return c; }
const VORTEX=glowSprite(160,190,150,255), WARM=glowSprite(128,255,190,110);
const ORBSPR=[null,glowSprite(64,255,212,90),glowSprite(64,90,220,255),glowSprite(64,191,240,255)];   // SHIELD gold · MAGNET cyan · BOLT static-blue (main game's buff colour language)
const MEND=glowSprite(64,155,240,208);                                                                // health patch glow (mint — never red)
/* garment sprites — the barriers ARE clothes (big, outlined, unmistakable), plus muted bg ones.

/* hot palettes — all unmistakably "burning danger", varied hues; muted palettes for the safe bg clothes */
const PAL_HOT=[

  {body:"#ff7a3c",rim:"#ffe0c2",dark:"#8a2c08",fold:"#d4531f"},   // ember orange
  {body:"#ff4a8c",rim:"#ffd0e4",dark:"#7d0f3f",fold:"#c21f5e"},   // hot pink
  {body:"#f23030",rim:"#ffd6c8",dark:"#761010",fold:"#bf1d1d"}    // scarlet
];
const PAL_BG=[

  {body:"#4d5240",rim:"#5f6450",dark:"#30342a",fold:"#3d4234"},   // olive

function mkGarment(kind,pal){ const W=72,c=mkCanvas(W,W),x=c.getContext("2d"); x.translate(W/2,W/2);
  const body=pal.body, rim=pal.rim, dark=pal.dark, fold=pal.fold;
  function outline(fn){ x.save(); x.strokeStyle=dark; x.lineWidth=5; x.lineJoin="round"; fn(true); x.restore(); fn(false); }
  if(kind===0){ outline(o=>{ x.beginPath();                                   // T-SHIRT
      x.moveTo(-13,-26); x.lineTo(13,-26);                                    // shoulders
      x.lineTo(30,-14); x.lineTo(22,0); x.lineTo(13,-6); x.lineTo(13,28);     // right sleeve + side
      x.lineTo(-13,28); x.lineTo(-13,-6); x.lineTo(-22,0); x.lineTo(-30,-14); // left side + sleeve
      x.closePath(); if(o){x.stroke();return;} x.fillStyle=body; x.fill(); });
    x.fillStyle=dark; x.beginPath(); x.arc(0,-26,8,0,Math.PI); x.fill();      // collar
    x.fillStyle=fold; x.fillRect(-13,8,26,3); x.fillRect(-13,18,26,3);        // folds
    x.fillStyle=rim; x.fillRect(-13,25,26,3); }                               // hot hem
  else if(kind===1){ outline(o=>{ x.beginPath();                              // PANTS
      x.moveTo(-16,-28); x.lineTo(16,-28); x.lineTo(16,-12);                  // waistband
      x.lineTo(14,30); x.lineTo(3,30); x.lineTo(0,-2); x.lineTo(-3,30); x.lineTo(-14,30); x.lineTo(-16,-12);
      x.closePath(); if(o){x.stroke();return;} x.fillStyle=body; x.fill(); });
    x.fillStyle=dark; x.fillRect(-16,-28,32,5);                               // waistband
    x.fillStyle=fold; x.fillRect(-11,0,5,24); x.fillRect(6,0,5,24);           // leg creases
    x.fillStyle=rim; x.fillRect(-14,27,11,3); x.fillRect(3,27,11,3); }        // hot cuffs
  else { outline(o=>{ x.beginPath();                                          // TOWEL (waving)
      x.moveTo(-15,-28); x.lineTo(15,-24); x.lineTo(13,28); x.lineTo(-17,24);
      x.closePath(); if(o){x.stroke();return;} x.fillStyle=body; x.fill(); });
    x.fillStyle=fold; x.fillRect(-14,-12,28,4); x.fillRect(-15,4,28,4);       // stripes
    x.fillStyle=rim; x.fillRect(-16,21,28,3); x.fillRect(-15,-28,30,3); }     // hot edges
  return c; }
const GARM_HOT=[]; for(let k=0;k<3;k++) for(let p=0;p<PAL_HOT.length;p++) GARM_HOT.push(mkGarment(k,PAL_HOT[p]));   // kind*4+palette

let M={};                                  // run counters: grazeRun/coinRun/pulseRun/rideRun/jamRun/qtrRun/hotRun/cleanRun/stageRun/pairRun
let TOT={coinAll:0,pairAll:0,jamAll:0};    // lifetime counters (persisted)
let mSlots=[0,1,2], mNext=3, mDone=0;      // 3 visible missions + drip-feed pointer + completed count
let mBannerT=0, mBannerTxt="";             // "MISSION DONE" banner
let bestPts=0, tallyT=0, tallyN=0;         // points best + dead-screen tally reveal
let teachT=0, teachKind=0;                 // GQ-8 one-time slow-time teach beats
let taught1=false, taught2=false;
function resetM(){ M={grazeRun:0,coinRun:0,pulseRun:0,rideRun:0,jamRun:0,qtrRun:0,hotRun:0,cleanRun:0,stageRun:1,pairRun:0}; }
resetM();
/* mission engine: called after any counter moves; completes at most one per call (breathing room) */
function mCheck(){
  for(let s2=0;s2<3;s2++){ const mi=mSlots[s2]; if(mi>=MISSIONS.length) continue;
    const m2=MISSIONS[mi];
    const v=(m2.k in M)?M[m2.k]:TOT[m2.k]||0;
    if(v>=m2.n){ buttons+=m2.r; mDone++; mSlots[s2]=mNext++; saveLS();
      mBannerT=2.2; mBannerTxt="MISSION DONE  +¢"+m2.r; Snd.orb(); return; } }
}
function mProg(mi){ if(mi>=MISSIONS.length) return null; const m2=MISSIONS[mi];
  return Math.min(m2.n,(m2.k in M)?M[m2.k]:TOT[m2.k]||0); }
function rank(){ return RANKS[Math.min(RANKS.length-1,(mDone/4)|0)]; }
/* steering direction: SCREEN (default — right key moves the sock right when it's at the bottom;
   angle DECREASES) vs WHEEL (right = clockwise drum rotation — intuitive for some). 🔷 Mike. */
let ctrlWheel=false;
try{ const d=JSON.parse(localStorage.getItem("flipline.drum.proto")); if(d){ best=d.best|0; buttons=(d.change!=null?d.change:d.buttons)|0; ctrlWheel=!!d.ctrlWheel;   // old "buttons" banks migrate to change
  seenIntro=!!d.seenIntro; reunited=!!d.reunited; mutedFlag=!!d.muted; bestPts=d.bestPts|0;
  if(d.tot) TOT=d.tot; if(d.mSlots) mSlots=d.mSlots; mNext=d.mNext!=null?d.mNext:3; mDone=d.mDone|0;
  taught1=!!d.t1; taught2=!!d.t2; } }catch(e){}
let lastHaul=0;
function bank(){ lastHaul=runBtns; buttons+=runBtns; runBtns=0;
  newBest = dist>best && best>0;                                   // GQ-7: earn the fanfare
  if(dist>best)best=dist; saveLS(); }
function saveLS(){ try{ localStorage.setItem("flipline.drum.proto",JSON.stringify({best:best|0,change:buttons,ctrlWheel:ctrlWheel,
  seenIntro:seenIntro?1:0,reunited:reunited?1:0,muted:mutedFlag?1:0,bestPts:bestPts|0,
  tot:TOT,mSlots:mSlots,mNext:mNext,mDone:mDone,t1:taught1?1:0,t2:taught2?1:0})); }catch(e){} }
/* C1: platform adapter SEAM — the CrazyGames SDK wires in here at C4 (ship wave); every call
   site already routes through this object, so swapping in the real SDK touches ONE block.
   Proto behavior: rewarded grants instantly, midgame is a no-op with the cooldown clock kept
   honest so the pacing is testable now. */
const SDKA={
  gameplayStart(){}, gameplayStop(){}, happytime(){},
  midgame(done){ done&&done(); },
  rewarded(grant){ grant&&grant(); }
};
function tryMidgame(){ const now=performance.now()/1000;
  if(now-adClock<180) return;                                      // CG: max one midgame per 3 min, never chained
  adClock=now; SDKA.midgame(null); }
if(!seenIntro) mode="intro";               // P2 cold-open, first launch only
const CN=16, col=[]; for(let i=0;i<CN;i++) col.push({on:false,ang:0,z:0,kind:0,val:1});
function colAlloc(){ for(const c of col) if(!c.on) return c; return null; }
// angular clearance vs heat arcs that will arrive at the rim around the same time
function colClear(ang,z){ for(const o of obs){ if(!o.on) continue;
    if(Math.abs(o.z-z)<0.3 && Math.abs(angDiff(ang,o.ang))<o.hw+0.4) return false; } return true; }
function placeCol(ang,z,kind,val){ const c=colAlloc(); if(!c)return; c.on=true; c.ang=ang; c.z=z; c.kind=kind; c.val=val||1; }
const OBN=14, obs=[]; for(let i=0;i<OBN;i++) obs.push({on:false,ang:0,hw:0,z:0,kind:0,gi:0,grz:false});
const zOrder=new Array(OBN); for(let i=0;i<OBN;i++) zOrder[i]=i;
const PN=60, par=[]; for(let i=0;i<PN;i++) par.push({life:0,x:0,y:0,vx:0,vy:0,c:"#ffcf5c"}); let ph=0;
function emit(x,y,vx,vy,life,c){ const p=par[ph]; ph=(ph+1)%PN; p.x=x;p.y=y;p.vx=vx;p.vy=vy;p.life=life;p.c=c; }

function angDiff(x,y){ let d=(x-y)%TAU; if(d>Math.PI)d-=TAU; if(d<-Math.PI)d+=TAU; return d; }
function zBase(){ return ZSPD0*(1+0.08*(stage-1)); }   // each stage tumbles faster
function reset(){ a=Math.PI/2; steer=0; cling=0; rideT=0; zspd=zBase(); dist=0; spawnCd=1.4; patCd=0;
  for(const o of obs)o.on=false; for(const c of col)c.on=false; shake=0; flash=0;
  shieldUp=false; magnetT=0; graceT=0; coinPopT=0; coinPopV=0; orbCd=5.0; orbSeq=0; patchCd=12;
  steerV=0; lastMove=0; revCd=0; hitStop=0; zoomP=0;
  chase=0; pairDist=PAIR_HEAD; gained=false;
  spinNow=DRUMSPIN; jamCd=JAM_CD_FIRST+Math.random()*3; jamTele=0; jamT=0; jamRelief=0;   // first jam lands early
  beatT=BEAT; beatP=0; musStep=0; wantSpawn=false; hotPopT=0; chaseGrace=0; pulseT=0; deadT=0;
  winT=0; teaseT=0; teaseDone=false; bannerT=2.4; spinBanner=false; dmgThisStage=false; }
function start(){ Snd.ensure(); stage=1; hp=HP_MAX; runBtns=0; reset(); resetM();
  runStages=0; newBest=false; tallyT=0; tallyN=0; mode="play"; SDKA.gameplayStart(); }      // fresh journey
function startStage(){ stage++; M.stageRun=Math.max(M.stageRun,stage); mCheck();
  reset(); mode="play"; SDKA.gameplayStart(); }                                             // hp + buttons carry over

/* ===== Spawning — individual GARMENTS with threadable gaps between them (no connecting line).
   Fairness: intra-cluster gaps ≥0.5rad edge-to-edge (player ±0.16 threads with margin);
   rings of 5 leave ~0.78rad gaps; AV covers π in ~1s. ===== */
function alloc(){ for(const o of obs) if(!o.on) return o; return null; }
function garment(ang,dz){ const o=alloc(); if(!o)return; o.on=true; o.ang=ang; o.hw=GHW; o.z=Z0+(dz||0); o.kind=0; o.grz=false;
  o.gi=((Math.random()*3)|0)*PAL_HOT.length+((Math.random()*PAL_HOT.length)|0);   // random garment kind × hot hue
  o.zm=1;                                                                          // per-obstacle approach multiplier (zippers override)
  // GQ-6 DRIFTING TOWEL (stage 2+): some laundry slides sideways as it comes — a re-read,
  // still fair (0.12rad/s vs the sock's 3.0; the GQ-5 arc tracks it live)
  o.drift = stageHas(stage,"drift")&&Math.random()<0.35 ? (Math.random()<0.5?-1:1)*0.12 : 0; }
/* LOOT LIVES IN THE DANGER now (Mario-coin rule: currency = reward for going out of your way;
   the old colClear() placement made change decorative — safe loot is dead loot).
   Pennies (1¢) thread the pattern's gaps; a QUARTER (3¢) sits tucked right beside a garment. */
function pennies(gapAng,z){ for(let k=0;k<3;k++) placeCol(gapAng, (z||Z0)+0.05+k*0.055, 0, 1); }   // a run of change through the gap
function quarter(edgeAng,z){ placeCol(edgeAng, (z||Z0)+0.06, 0, 3); }               // tucked beside the hot hem — worth the lean
/* HEM-HUG trail (coin choreography — Jetpack Joyride shapes coins into the line it wants you
   to fly): a run of pennies laid ALONG the graze edge of a garment, so the greedy line IS the
   graze line. Same angle as the hem edge, stacked in depth. */
function hemTrail(edgeAng,z){ for(let k=0;k<3;k++) placeCol(edgeAng, (z||Z0)+0.04+k*0.06, 0, 1); }
function spawnPattern(){
  const r=Math.random(), pa=Math.random()*TAU, D=2*GHW+0.5;   // D = centre spacing leaving a 0.5rad threadable gap
  const side=Math.random()<0.5?1:-1, EDGE=GHW+0.14;           // quarter offset: just past the hem, inside graze range
  if(dist<60 || r<0.3){ garment(pa);                                               // solo — dodge around
    if(Math.random()<0.5) quarter(pa+side*EDGE);
    else hemTrail(pa+side*EDGE); }                                                 // or a hem-hug run — ride the graze line
  else if(r<0.55){ garment(pa-D/2); garment(pa+D/2);                               // pair — thread the gap or go around
    if(Math.random()<0.5) pennies(pa);
    else hemTrail(pa-D/2+side*EDGE); }                                             // hug the inner hem through the gap
  else if(r<0.75){ garment(pa-D); garment(pa); garment(pa+D);                      // wall of 3 — two seams + the long way
    pennies(pa+side*D/2); if(Math.random()<0.5) quarter(pa-side*(D+EDGE)); }
  else if(r<0.9){ const n=5; for(let k=0;k<n;k++) garment(pa+k*TAU/n);             // ring of 5 — five ~0.78rad gaps
    const g=(Math.random()*n)|0; pennies(pa+(g+0.5)*TAU/n); }
  else { for(let k=0;k<3;k++) garment(pa+k*1.5,k*0.10);                            // spiral triplet
    quarter(pa+1.5+side*EDGE,0.10); }
  // GQ-6 ZIPPER WHIP (stage 4+): a thin silver streak half again as fast — the read is speed,
  // telegraphed by its own metallic tick + the GQ-5 landing arc. Rare, never in the teach zone.
  if(stageHas(stage,"zipper") && dist>60 && Math.random()<0.22){
    const o=alloc(); if(o){ o.on=true; o.ang=Math.random()*TAU; o.hw=ZIP_HW; o.z=Z0; o.kind=1;
      o.grz=false; o.gi=0; o.zm=ZIP_ZM; o.drift=0; Snd.b(1400,700,0.12,"square",0.06); } }
}

/* ===== Input ===== */
const keys={};
addEventListener("keydown",e=>{
  // C1 AZERTY: Q mirrors A (left), Z mirrors W-row (tap) — resolved by character, layout-safe
  if(["ArrowLeft","ArrowRight","a","A","d","D","q","Q","z","Z"," ","ArrowUp"].includes(e.key)) e.preventDefault();
  if(e.repeat) return; keys[e.key]=true;
  if(e.key==="p"||e.key==="P"){ if(mode==="play"||paused){ paused=!paused; } return; }   // C1 pause
  if(e.key==="m"||e.key==="M"){ mutedFlag=!mutedFlag; if(Snd.g) Snd.g.gain.value=mutedFlag?0:0.8; saveLS(); return; }   // C1 mute, persisted
  if(paused){ paused=false; return; }                                                    // any input resumes
  /* DEV:BEGIN (strip before ship — GAME_BIBLE Part 5) */
  if(DEVON && mode==="play"){
    if(e.key==="g"||e.key==="G"){ devGod=!devGod; return; }
    if(e.key==="n"||e.key==="N"){ dist=LEVEL_LEN-1; return; }
  }
  /* DEV:END */
  if(e.key===" "||e.key==="ArrowUp"||e.key==="z"||e.key==="Z"){ if(mode==="play") tryTap(); else if(mode!=="dead"||deadT>0.4) advance(); }
  // instant restart (Crossy Road rule: death → playing in <1s, any input) — steering keys retry too
  else if(mode==="dead" && deadT>0.4) advance();
});
/* DEV:BEGIN (strip before ship) */
const DEVON=/[?&]dev=1/.test(location.search); let devGod=false;
/* DEV:END */
addEventListener("keyup",e=>{ keys[e.key]=false; });
const touches={};   // id -> {x, t0, moved}
const R_CTRL={x:VW/2-92,y:216,w:184,h:22};   // ready-screen controls toggle
const R_MEND={x:VW/2-80,y:168,w:160,h:24};   // stage-screen mend purchase
const R_ADMEND={x:VW/2-80,y:196,w:160,h:22}; // C1: rewarded-ad mend (seam), shown only when broke
function inRect(p,r){ return p.x>=r.x&&p.x<=r.x+r.w&&p.y>=r.y&&p.y<=r.y+r.h; }
function vpos(e){ const r=cv.getBoundingClientRect(); return {x:(e.clientX-r.left)/scale, y:(e.clientY-r.top)/scale}; }
function tryMend(){ if(hp<HP_MAX && buttons>=MEND_COST){ buttons-=MEND_COST; hp++; saveLS(); Snd.orb(); } }
addEventListener("pointerdown",e=>{ e.preventDefault(); Snd.ensure();
  if(Snd.g) Snd.g.gain.value=mutedFlag?0:0.8;          // C1: persisted mute applies once audio exists
  if(paused){ paused=false; return; }                  // C1: tap resumes
  if(mode!=="play"){
    const p=vpos(e);
    if(mode==="ready" && inRect(p,R_CTRL)){ ctrlWheel=!ctrlWheel; saveLS(); return; }
    if(mode==="stage" && inRect(p,R_MEND)){ tryMend(); return; }
    if(mode==="stage" && hp<HP_MAX && buttons<MEND_COST && inRect(p,R_ADMEND)){   // C1: rewarded mend via the SDK seam
      SDKA.rewarded(()=>{ if(hp<HP_MAX){ hp++; Snd.orb(); } }); return; }
    if(mode==="dead" && deadT<=0.4) return;   // brief lockout so a panic tap doesn't skip the haul
    advance(); return; }
  touches[e.pointerId]={x:e.clientX,t0:performance.now(),moved:false}; },{passive:false});
addEventListener("pointerup",e=>{ const tc=touches[e.pointerId]; delete touches[e.pointerId];
  if(mode==='play' && tc && performance.now()-tc.t0<170 && !tc.moved) tryTap(); });
addEventListener("pointercancel",e=>{ delete touches[e.pointerId]; });
addEventListener("pointermove",e=>{ const tc=touches[e.pointerId]; if(tc && Math.abs(e.clientX-tc.x)>14) tc.moved=true; });
function advance(){
  if(mode==="intro"){ mode="ready"; seenIntro=true; saveLS(); return; }         // cold-open is skippable
  if(mode==="reunion"){ if(reunionT>1.4){ mode="stage"; } return; }             // linger on the payoff, then the loop goes on
  if(mode==="ready"||mode==="dead") start(); else if(mode==="stage") startStage(); }
function tryLeap(){ if(cling>=1 && rideT<=0){ cling=0; rideT=RIDE_T; Snd.leap();
  M.rideRun++; mCheck();
  if(teachT>0&&teachKind===2){ teachT=0; taught2=true; saveLS(); } } }   // spend static → ride the centre current
function tryPulse(){ if(cling>=PULSE_COST && rideT<=0 && pulseT<=0){                    // partial bar → PULSE in place
  cling-=PULSE_COST; pulseT=PULSE_T; Snd.pulse();
  M.pulseRun++; mCheck();
  const px=CX+Math.cos(a)*RIM*0.93, py=CY+Math.sin(a)*RIM*0.93;
  for(let i=0;i<10;i++) emit(px,py,(Math.random()-0.5)*180,(Math.random()-0.5)*180,0.25,"#bff0ff"); } }
function tryTap(){ if(cling>=1) tryLeap(); else tryPulse(); }                           // full = RIDE (locked), partial = PULSE

/* ===== Update ===== */
function runPts(){ return (dist|0)*10 + M.coinRun*25 + runStages*250; }   // C3: Batch-B point model ported
let newBestP=false;
function update(dt){
  /* GQ-8: one-time teach beats run the world at 35% — the read is taught by TIME, not text */
  if(teachT>0 && mode==="play") dt*=0.35;
  t+=dt;
  /* P2 cold-open: two socks, one torn away — 2.6s, zero exposition, skippable */
  if(mode==="intro"){ introT+=dt; if(introT>2.6){ mode="ready"; seenIntro=true; saveLS(); } }
  /* GQ-7 ceremony: the vortex drinks the sock — slow spiral in + button confetti, then the stage screen */
  if(mode==="clear"){ winT-=dt;
    if(Math.random()<0.55){ const an=Math.random()*TAU, rr=RIM*(0.35+Math.random()*0.55);
      emit(CX+Math.cos(an)*rr, CY+Math.sin(an)*rr, -Math.cos(an)*70, -Math.sin(an)*70, 0.55,
           Math.random()<0.5?"#ffcf5c":"#e0995c"); }
    if(winT<=0){ winT=0;
      if(stage>=STAGES.length && !(stage>STAGES.length)){                       // stage 9 cleared → THE REUNION
        mode="reunion"; reunionT=0; Snd.win();
        if(!reunited){ reunited=true; saveLS(); } }
      else mode="stage"; } }
  if(mode==="reunion") reunionT+=dt;
  /* THE DRUM IS ALIVE — spin ramps with CHASE + stage; DRUM JAM surges spike it.
     Everything on the drum (sock, laundry, change) rides spinNow together — fair. */
  if(mode==="play"){
    let spin=DRUMSPIN*(1+chase*SPIN_CHASE+(stage-1)*SPIN_STAGE);
    // GQ-6 UNBALANCED LOAD (stage 5+): the whole drum wobbles — world motion, never the player
    if(stageHas(stage,"wobble")) spin*=1+WOB_AMP*Math.sin(t*1.15);
    // GQ-6 SPIN CYCLE (stage 7+): finale gauntlet — the last stretch before every vortex runs hot
    const finale=stageHas(stage,"spincycle") && dist>LEVEL_LEN-SPIN_FINALE;
    if(finale){ spin*=SPINCYC_X; if(!spinBanner){ spinBanner=true; Snd.grind(); shake=Math.max(shake,4); } }
    if(jamTele>0){ jamTele-=dt; spin+=Math.sin(t*34)*0.10;             // the grind — drum shudders before it slips
      if(jamTele<=0){ jamTele=0; jamT=JAM_LEN; shake=Math.max(shake,5); } }
    else if(jamT>0){ jamT-=dt; const k=Math.min(1,(JAM_LEN-jamT)*3,jamT*2);
      spin*=1+(JAM_SPIN-1)*k;                                          // eased surge in and out
      if(jamT<=0){ jamT=0; jamRelief=JAM_RELIEF;                       // the jam SHAKES CHANGE LOOSE — survive it, get paid
        const sa=Math.random()*TAU;
        for(let k2=0;k2<5;k2++) placeCol(sa+k2*TAU/5, Z0+0.04*k2, 0, 1);
        M.jamRun++; TOT.jamAll++; mCheck();                            // C3 missions: jams survived
        Snd.coin(); } }
    else if(jamRelief>0){ jamRelief-=dt; if(jamRelief<0)jamRelief=0; }
    else { jamCd-=dt;
      if(jamCd<=0 && dist>35 && dist<LEVEL_LEN-80){                    // never in the teach zone or the vortex approach
        jamCd=JAM_CD_MIN+Math.random()*(JAM_CD_MAX-JAM_CD_MIN); jamTele=JAM_TELE; Snd.grind(); } }
    spinNow=spin;
  } else spinNow=DRUMSPIN;
  drumRot+=spinNow*dt;
  /* the dryer THUMP — metronome for spawns + music (beat-locked reads) */
  if(beatP>0){ beatP-=dt*4; if(beatP<0)beatP=0; }
  if(mode==="dead"){ deadT+=dt; tallyT+=dt;                    // instant restart arms shortly after the sock unravels
    const shown=Math.min(4,(tallyT/0.45)|0);                   // C3: tally lines land one per beat w/ a tick
    if(shown>tallyN){ tallyN=shown; Snd.b(880,880,0.05,"square",0.05); } }
  if(hotPopT>0){ hotPopT-=dt; if(hotPopT<0)hotPopT=0; }
  if(mode==="play"){
    beatT-=dt;
    if(beatT<=0){ beatT+=BEAT/2; musStep++;
      const inten=Math.max(chase, Math.min(1,dist/LEVEL_LEN)*0.5, jamT>0?0.85:0);
      if(musStep%2===0){                                               // FULL BEAT
        beatP=1; Snd.thump(0.07+0.06*inten);
        if(wantSpawn && dist<LEVEL_LEN-40 && jamRelief<=0){ wantSpawn=false; spawnPattern(); }
        if(musStep%4===0) Snd.b(110,110,0.32,"triangle",0.05+0.05*inten);            // bass root on the 1
        else if(inten>0.3 && musStep%8===6) Snd.b(164.81,164.81,0.3,"triangle",0.04+0.04*inten); // fifth answers
        if(dist>LEVEL_LEN-60){ const pr2=(dist-(LEVEL_LEN-60))/60;                   // vortex riser — the ending is audible
          Snd.b(220+330*pr2,260+390*pr2,0.2,"triangle",0.03+0.06*pr2); }
      } else {                                                         // OFF-BEAT — the hot layer opens with CHASE
        if(inten>0.15){ const n=PENT[(musStep>>1)%8];
          Snd.b(n,n,0.13,"triangle",0.02+0.08*inten); }
        if(inten>0.5) Snd.hat(0.03+0.04*inten);
      } } }
  if(shake>0){ shake-=dt*60; if(shake<0)shake=0; }
  if(flash>0){ flash-=dt*2.2; if(flash<0)flash=0; }
  for(const p of par){ if(p.life>0){ p.life-=dt; p.x+=p.vx*dt; p.y+=p.vy*dt; } }
  if(mode!=="play") return;

  // steer: keys + held touch halves
  steer=0;
  if(keys["ArrowLeft"]||keys["a"]||keys["A"]||keys["q"]||keys["Q"]) steer-=1;   // C1 AZERTY: Q = A position
  if(keys["ArrowRight"]||keys["d"]||keys["D"]) steer+=1;
  for(const id in touches){ const tc=touches[id]; if(performance.now()-tc.t0>140||tc.moved) steer+=(tc.x<innerWidth/2?-1:1); }
  if(steer<-1)steer=-1; if(steer>1)steer=1;
  // GQ-1: ~80ms ease-in/out — steerV chases the input; reversal at speed kicks dust
  if(revCd>0) revCd-=dt;
  if(steer!==0 && steerV*steer<0 && Math.abs(steerV)>0.4 && revCd<=0){ revCd=0.25;
    const px=CX+Math.cos(a)*RIM*0.93, py=CY+Math.sin(a)*RIM*0.93;
    for(let i=0;i<5;i++) emit(px,py,(Math.random()-0.5)*90,(Math.random()-0.5)*90,0.25,"#c8b89a"); }
  steerV+=(steer-steerV)*Math.min(1,dt/STEER_EASE);
  if(Math.abs(steerV)<0.02 && steer===0) steerV=0;
  a+=steerV*AV*dt*(ctrlWheel?1:-1); a=((a%TAU)+TAU)%TAU;   // SCREEN mode: right = sock moves right at the bottom
  lastMove=steerV*(ctrlWheel?1:-1);
  if(rideT<=0) a+=spinNow*dt;   // static cling: the drum CARRIES the sock — gaps stay where you put yourself (fair)

  // static cling charges while sliding on the drum (never while riding the current)
  if(steer!==0 && rideT<=0 && cling<1){ const was=cling; cling=Math.min(1,cling+CLING_RATE*dt);
    if(was<1&&cling>=1) Snd.charge(); }
  if(rideT>0){ rideT-=dt; if(rideT<=0){ rideT=0; graceT=Math.max(graceT,0.5); Snd.land();   // drop back to the rim w/ landing grace
    const px=CX+Math.cos(a)*RIM*0.93, py=CY+Math.sin(a)*RIM*0.93;
    for(let i=0;i<6;i++) emit(px,py,(Math.random()-0.5)*70,(Math.random()-0.5)*70,0.3,"#bff0ff"); } }

  // THE CHASE — risk fills it, safe play bleeds it; it IS your speed toward the pair
  if(chaseGrace>0){ chaseGrace-=dt; if(chaseGrace<0)chaseGrace=0; }
  else if(chase>0){ chase-=CHASE_DECAY*dt; if(chase<0)chase=0; }
  pairDist+=PAIR_MPS*(1+0.08*(stage-1))*dt;                          // the pair tumbles ahead at its own pace

  if(bannerT>0){ bannerT-=dt; if(bannerT<0)bannerT=0; }
  if(mBannerT>0){ mBannerT-=dt; if(mBannerT<0)mBannerT=0; }
  /* P2 NEAR-REUNION TEASE (stages 3/6/9): mid-stage, your pair swings OUT of the vortex,
     hovers almost within reach, then is snatched back. Near-miss effect (Clark 2009, Neuron):
     almost-wins drive retries harder than wins. Draw-only — it never collides. */
  if(stageTease(stage) && !teaseDone && dist>LEVEL_LEN*0.5){
    teaseDone=true; teaseT=TEASE_LEN; teaseAng=a; Snd.orb(); }
  if(teaseT>0){ teaseT-=dt;
    if(teaseT<=0){ teaseT=0; Snd.b(520,180,0.5,"triangle",0.1); } }   // the yank — a falling note
  /* GQ-8 teach beat 1: the first hot garment EVER approaching — slow the world, glyph the steer */
  if(!taught1 && teachT<=0){ for(const o of obs){ if(o.on && o.z>0.5){ teachT=1.6; teachKind=1; break; } } }
  if(teachT>0){ teachT-=dt;
    if(teachKind===1 && steer!==0){ teachT=0; }                       // steering = lesson learned
    if(teachT<=0){ teachT=0; if(teachKind===1){taught1=true;} else {taught2=true;} saveLS(); } }
  /* GQ-8 teach beat 2: the first FULL static bar ever */
  if(taught1 && !taught2 && teachT<=0 && cling>=1){ teachT=1.6; teachKind=2; }

  // progress + ramp (riding the current = slight speed boost; CHASE = up to +50% pace)
  const spd=zspd/ZSPD0*(rideT>0?RIDE_BOOST:1)*(1+chase*CHASE_SPD);
  dist+=MPS*spd*dt*0.55;
  zspd=Math.min(ZSPDMX*(1+0.05*(stage-1)), zBase()+dist*0.0007);
  const zeff=zspd*(1+chase*CHASE_Z);                                 // hot play also runs hotter — opt-in intensity
  if(dist>=LEVEL_LEN){ gained=pairDist<LEVEL_LEN;                    // beat your pair to the vortex?
    if(gained){ runBtns+=GAIN_BONUS; M.pairRun=1; TOT.pairAll++; SDKA.happytime(); }
    runStages++;
    if(!dmgThisStage) M.cleanRun++;                                  // C3 missions: untouched stage
    mCheck();
    mode="clear"; winT=1.5; bank(); Snd.win(); SDKA.gameplayStop();  // GQ-7: the vortex drinks you first
    if(runStages%3===0) tryMidgame();                                // C1: stage-break interstitial, 3-min cooldown
    return; }

  // spawn cadence arms the gate; the actual spawn lands ON the next dryer thump (beat-locked reads)
  spawnCd-=dt; if(spawnCd<=0 && dist<LEVEL_LEN-40){ wantSpawn=true;
    spawnCd=(0.9+Math.random()*0.5-Math.min(0.35,dist*0.0009))*(jamT>0?0.7:1); }   // jams run a little denser

  // buff orbs / patches keep the safe placement — utility shouldn't gamble; CHANGE spawns with the laundry now
  orbCd-=dt; if(orbCd<=0 && dist<LEVEL_LEN-30){ orbCd=8;
    let oa=Math.random()*TAU, tries=6; while(tries-->0 && !colClear(oa,Z0)) oa=Math.random()*TAU;
    if(tries>0) placeCol(oa, Z0, 1+(orbSeq++%3), 0); }                       // SHIELD → MAGNET → BOLT, cycling
  patchCd-=dt; if(patchCd<=0 && hp<HP_MAX && dist<LEVEL_LEN-30){ patchCd=12; // health PATCH — only offered when hurt
    let pa2=Math.random()*TAU, tries=6; while(tries-->0 && !colClear(pa2,Z0)) pa2=Math.random()*TAU;
    if(tries>0) placeCol(pa2, Z0, 4, 0); }

  // buffs tick
  if(magnetT>0){ magnetT-=dt; if(magnetT<0)magnetT=0; }
  if(graceT>0){ graceT-=dt; if(graceT<0)graceT=0; }
  if(pulseT>0){ pulseT-=dt; if(pulseT<0)pulseT=0; }
  if(coinPopT>0){ coinPopT-=dt; if(coinPopT<=0){coinPopT=0;coinPopV=0;} }
  if(zoomP>0){ zoomP-=dt*5; if(zoomP<0)zoomP=0; }

  // collectibles approach + collect at the rim (generous window; magnet pulls buttons in)
  for(const c of col){ if(!c.on) continue;
    c.z+=zeff*dt; c.ang+=spinNow*dt;
    if(c.z>1.12){ c.on=false; continue; }
    if(magnetT>0 && c.kind===0 && c.z>0.8){ const d2=angDiff(a,c.ang);
      if(Math.abs(d2)<1.3) c.ang+=d2*Math.min(1,dt*7); }
    if(c.z>0.9 && rideT<=0 && Math.abs(angDiff(a,c.ang))<0.30){   // can't grab rim loot while riding the centre
      c.on=false;
      if(c.kind===0){ const hot=chase>HOTX, pay=c.val*(hot?2:1);           // HOT streak: risk pays DOUBLE, right now
        runBtns+=pay; coinPopV+=pay; coinPopT=0.8; if(hot)hotPopT=0.8; Snd.coin();
        M.coinRun+=pay; TOT.coinAll+=pay; if(c.val>1)M.qtrRun++; mCheck();   // C3 missions: change snatched
        chase=Math.min(1,chase+(c.val>1?CHASE_QTR:CHASE_COIN)); chaseGrace=CHASE_GRACE;   // change grabbed in the laundry feeds THE CHASE
        if(chase>HOTX && !M.hotRun){ M.hotRun=1; mCheck(); }
        const px=CX+Math.cos(a)*RIM*0.93, py=CY+Math.sin(a)*RIM*0.93;
        for(let i=0;i<6;i++) emit(px,py,(Math.random()-0.5)*110,(Math.random()-0.5)*110,0.35,c.val>1?"#dfe6ee":"#e0995c"); }
      else { Snd.orb();
        if(c.kind===1) shieldUp=true;                                        // SHIELD — absorb one hit
        else if(c.kind===2) magnetT=7;                                       // MAGNET — buttons glide in
        else if(c.kind===4){ if(hp<HP_MAX) hp++; }                           // PATCH — mend one hit of damage
        else { cling=1; Snd.charge(); } } }                                  // STATIC BOLT — leap instantly ready
  }

  // obstacles approach the camera
  for(const o of obs){ if(!o.on) continue;
    o.z+=zeff*dt*(o.zm||1); o.ang+=(spinNow+(o.drift||0))*dt;   // they ride the tumbling drum (+GQ-6 drift/zipper)
    if(o.z>1.16){ o.on=false; continue; }
    if(o.z>HITLO && o.z<HITHI && rideT<=0 && graceT<=0 && pulseT<=0){   // PULSE = intangible in place — hot cloth passes through
      const dA=Math.abs(angDiff(a,o.ang));
      if(dA>=o.hw*0.8+PHW && dA<o.hw*0.8+PHW+GRAZE_ARC && !o.grz){  // GQ-4: GRAZE — skimming hot laundry pays static + CHASE
        o.grz=true; chase=Math.min(1,chase+CHASE_GRAZE); chaseGrace=CHASE_GRACE;
        M.grazeRun++; mCheck();                                       // C3 missions: grazes
        if(chase>HOTX && !M.hotRun){ M.hotRun=1; mCheck(); }
        const was=cling; cling=Math.min(1,cling+GRAZE_CLING);
        if(was<1&&cling>=1) Snd.charge(); else Snd.graze();
        const px=CX+Math.cos(a)*RIM*0.93, py=CY+Math.sin(a)*RIM*0.93;
        for(let i=0;i<5;i++) emit(px,py,(Math.random()-0.5)*120,(Math.random()-0.5)*120,0.22,"#ffb056"); }
      if(dA<o.hw*0.8+PHW){          // clipped by hot cloth (hitbox tighter than the visual — fair)
        const px=CX+Math.cos(a)*RIM*0.93, py=CY+Math.sin(a)*RIM*0.93;
        /* DEV:BEGIN (strip before ship) */ if(DEVON&&devGod){ o.on=false; continue; } /* DEV:END */
        if(shieldUp){ shieldUp=false; graceT=0.8; o.on=false; shake=6; hitStop=HITSTOP_SHIELD; zoomP=1; Snd.shieldPop();   // SHIELD absorbs the hit + brief grace
          for(let i=0;i<12;i++) emit(px,py,(Math.random()-0.5)*200,(Math.random()-0.5)*200,0.4,"#ffd45a");
          continue; }
        hp--; dmgThisStage=true; graceT=1.0; shake=8; flash=0.35; hitStop=HITSTOP_DMG; zoomP=1; Snd.shieldPop();  // take damage — the sock frays (GQ-2: hit-stop + zoom punch)
        for(let i=0;i<10;i++) emit(px,py,(Math.random()-0.5)*200,(Math.random()-0.5)*200,0.4,"#efe9db");  // loose threads fly
        if(hp<=0){ mode="dead"; deaths++; bank(); shake=12; flash=0.5; Snd.die();          // 3rd hit — DISINTEGRATE into pieces
          SDKA.gameplayStop(); tryMidgame();                                               // C1: final-death interstitial (cooldown-gated)
          const pts=runPts(); newBestP=pts>bestPts&&bestPts>0; if(pts>bestPts){bestPts=pts;saveLS();}
          tallyT=0; tallyN=0;                                                              // C3: tally count-up starts
          if(newBest||newBestP) Snd.win();                                                 // GQ-7: NEW BEST fanfare
          for(let i=0;i<26;i++) emit(px,py,(Math.random()-0.5)*300,(Math.random()-0.5)*300,0.5+Math.random()*0.4,"#efe9db");
          for(let i=0;i<10;i++) emit(px,py,(Math.random()-0.5)*220,(Math.random()-0.5)*220,0.5,"#ff6478");
          return; }
        continue; } }
  }
}

/* ===== Draw ===== */
function txt(s,x,y,size,col,w){ ctx.fillStyle=col; ctx.textAlign="center"; ctx.font=(w||700)+" "+size+"px system-ui"; ctx.fillText(s,x,y); }
function draw(){
  let ox=0,oy=0; if(shake>0){ ox=(Math.random()-.5)*shake; oy=(Math.random()-.5)*shake; }
  ctx.save(); ctx.translate(ox,oy);
  if(zoomP>0){ const zf=1+0.035*zoomP;                     // GQ-2: camera micro-zoom punch, centred on the drum
    ctx.translate(CX,CY); ctx.scale(zf,zf); ctx.translate(-CX,-CY); }
  ctx.fillStyle="#171210"; ctx.fillRect(-12,-12,VW+24,VH+24);

  const prog=Math.min(1,dist/LEVEL_LEN);
  // drum wall — concentric depth rings w/ perforations + lifter vanes, all rotating (the tumble)
  for(let ring=5;ring>=1;ring--){ const z=ring/5.6, r=RIM*Math.pow(z,PERSP);
    ctx.strokeStyle="rgba(120,86,54,"+(0.10+z*0.22)+")"; ctx.lineWidth=1.5+z*2;
    ctx.beginPath(); ctx.arc(CX,CY,r,0,TAU); ctx.stroke();
    const sf=Math.min(1.8,spinNow/DRUMSPIN);                            // faster tumble = the wall visibly wakes up
    ctx.fillStyle="rgba(255,190,110,"+((0.05+z*0.10)*(0.55+0.45*sf))+")";
    const n=10+ring*4;
    for(let k=0;k<n;k++){ const an=drumRot*(0.4+z)+k*TAU/n;
      ctx.fillRect(CX+Math.cos(an)*r-1,CY+Math.sin(an)*r-1,2,2); } }
  for(let v=0;v<3;v++){ const an=drumRot+v*TAU/3;                       // lifter vanes, radial
    ctx.strokeStyle="rgba(140,100,60,0.28)"; ctx.lineWidth=5;
    ctx.beginPath(); ctx.moveTo(CX+Math.cos(an)*RIM*0.18,CY+Math.sin(an)*RIM*0.18);
    ctx.lineTo(CX+Math.cos(an)*RIM*0.97,CY+Math.sin(an)*RIM*0.97); ctx.stroke(); }
  // rim of the opening (where the sock rides) — breathes on the dryer thump
  ctx.strokeStyle="rgba(200,150,90,"+(0.6+0.25*beatP)+")"; ctx.lineWidth=5+2*beatP;
  ctx.beginPath(); ctx.arc(CX,CY,RIM,0,TAU); ctx.stroke();
  ctx.strokeStyle="rgba(60,40,24,0.9)"; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(CX,CY,RIM+4,0,TAU); ctx.stroke();

  // THE LOST SOCK VORTEX — grows as you near it; swirl arms rotate
  { const vs=26+prog*74+Math.sin(t*2.2)*3;
    ctx.globalAlpha=0.5+prog*0.5; ctx.drawImage(VORTEX,CX-vs,CY-vs,vs*2,vs*2); ctx.globalAlpha=1;
    ctx.strokeStyle="rgba(210,180,255,"+(0.35+prog*0.4)+")"; ctx.lineWidth=2;
    for(let s2=0;s2<3;s2++){ ctx.beginPath();
      ctx.arc(CX,CY,6+s2*7+prog*10, -t*2.4+s2*2.1, -t*2.4+s2*2.1+2.4); ctx.stroke(); } }
  // YOUR PAIR — glimpsed spiralling in the vortex ahead (the whole reason for the chase);
  // grows as you close the distance, always slightly out of reach
  { const pa2=-t*1.7, prr=9+prog*7, ps2=5+prog*6;
    const ppx=CX+Math.cos(pa2)*prr, ppy=CY+Math.sin(pa2)*prr;
    ctx.globalAlpha=0.5+0.25*Math.sin(t*3);
    ctx.drawImage(WARM,ppx-ps2,ppy-ps2,ps2*2,ps2*2);
    ctx.imageSmoothingEnabled=true; ctx.save(); ctx.translate(ppx,ppy); ctx.rotate(pa2+t*2.2);
    ctx.drawImage(SOCK,-ps2/2,-ps2/2,ps2,ps2); ctx.restore(); ctx.imageSmoothingEnabled=false;
    ctx.globalAlpha=1; }

  // neutral clothes tumbling mid-drum (life + depth; never red, never collide)
  { const bz=0.34, br2=RIM*Math.pow(bz,PERSP); ctx.imageSmoothingEnabled=true;
    for(let k=0;k<3;k++){ const an=drumRot*1.3+k*TAU/3+1.1, gs=13+k*3;
      const gx=CX+Math.cos(an)*br2, gy=CY+Math.sin(an)*br2;
      ctx.globalAlpha=0.5; ctx.save(); ctx.translate(gx,gy); ctx.rotate(an+t*0.7+k);
      ctx.drawImage(GARM_BG[k%3],-gs/2,-gs/2,gs,gs); ctx.restore(); ctx.globalAlpha=1; }
    ctx.imageSmoothingEnabled=false; }

  // obstacles far→near (painter's order) — HOT LAUNDRY: bright cloth band + garment shapes riding it,
  // deliberately more saturated than the muted drum so danger owns the eye
  for(let i=1;i<OBN;i++){ let j=i; const v=zOrder[i];
    while(j>0 && obs[zOrder[j-1]].z>obs[v].z){ zOrder[j]=zOrder[j-1]; j--; } zOrder[j]=v; }
  /* GQ-5: landing-arc telegraphs — once the effective approach speed crosses TELE_Z, every
     incoming read marks the rim stretch it will land on (Tunnel Rush forewarning). The arc is
     drawn at the obstacle's LIVE angle, so drum spin and towel drift stay truthful. */
  if(mode==="play" && zspd*(1+chase*CHASE_Z)>TELE_Z){
    for(const o of obs){ if(!o.on || o.z>0.72) continue;
      ctx.strokeStyle=o.kind===1?"rgba(223,230,238,0.20)":"rgba(255,84,104,0.16)"; ctx.lineWidth=4;
      ctx.beginPath(); ctx.arc(CX,CY,RIM,o.ang-o.hw,o.ang+o.hw); ctx.stroke(); } }
  ctx.imageSmoothingEnabled=true;
  for(let i=0;i<OBN;i++){ const o=obs[zOrder[i]]; if(!o.on) continue;
    const zz=Math.min(1,o.z), r=RIM*Math.pow(zz,PERSP), th=4+13*zz*zz, fade=o.z>1?Math.max(0,1-(o.z-1)/0.16):1;
    const near=o.z>0.8?(o.z-0.8)/0.2:0;
    ctx.globalAlpha=(0.35+0.65*zz)*fade;
    if(o.kind===1){                                                   // GQ-6 ZIPPER WHIP — thin silver streak w/ teeth
      ctx.strokeStyle="#dfe6ee"; ctx.lineWidth=Math.max(2,th*0.5);
      ctx.beginPath(); ctx.arc(CX,CY,r,o.ang-o.hw,o.ang+o.hw); ctx.stroke();
      ctx.strokeStyle="#8f9aa8"; ctx.lineWidth=1;
      ctx.setLineDash([2,2]); ctx.beginPath(); ctx.arc(CX,CY,r,o.ang-o.hw,o.ang+o.hw); ctx.stroke(); ctx.setLineDash([]);
      const zx=CX+Math.cos(o.ang)*r, zy=CY+Math.sin(o.ang)*r;         // the pull-tab glints
      ctx.fillStyle="#f2f6fa"; ctx.fillRect(zx-1.5,zy-3,3,6);
      ctx.globalAlpha=1; continue; }
    const gs=Math.max(9,2*o.hw*r*1.05), gx=CX+Math.cos(o.ang)*r, gy=CY+Math.sin(o.ang)*r;
    if(near>0){ ctx.strokeStyle="rgba(255,84,104,0.32)"; ctx.lineWidth=th+8;      // heat haze under the garment at the rim
      ctx.beginPath(); ctx.arc(CX,CY,r,o.ang-o.hw,o.ang+o.hw); ctx.stroke(); }
    ctx.save(); ctx.translate(gx,gy); ctx.rotate(o.ang+Math.PI/2+Math.sin(t*3+o.gi*2.1)*(0.12+0.06*beatP));   // laundry flaps ON the thump
    ctx.drawImage(GARM_HOT[o.gi],-gs/2,-gs/2,gs,gs); ctx.restore();
    ctx.globalAlpha=1; }
  ctx.imageSmoothingEnabled=false;
  /* GQ-6 LINT VEIL (stage 8+): soft grey lint drifting across the opening — pressure on the
     eye, never on the hitbox */
  if(stageHas(stage,"lint") && (mode==="play"||mode==="clear")){
    for(let k=0;k<5;k++){ const an=t*0.25+k*TAU/5, rr=RIM*(0.35+0.28*Math.sin(t*0.6+k*2.2));
      const lx=CX+Math.cos(an)*rr, ly=CY+Math.sin(an)*rr, ls=10+5*Math.sin(t+k);
      ctx.globalAlpha=0.10+0.05*Math.sin(t*1.7+k);
      ctx.fillStyle="#b8b4ac"; ctx.beginPath(); ctx.arc(lx,ly,ls,0,TAU); ctx.fill(); }
    ctx.globalAlpha=1; }
  /* P2 NEAR-REUNION TEASE — the pair swings out of the vortex toward you, hovers almost in
     reach, then is snatched back in. Pure theatre: never collidable. */
  if(teaseT>0){
    const k=1-teaseT/TEASE_LEN;                                       // 0→1 over the timeline
    const out = k<0.3 ? k/0.3 : k<0.72 ? 1 : Math.max(0,1-(k-0.72)/0.2);   // out → hover → yank
    const tz=0.06+0.56*out, tr=RIM*Math.pow(tz,PERSP);
    const tAng=teaseAng+0.5+Math.sin(t*2.2)*0.06*out;
    const tx2=CX+Math.cos(tAng)*tr, ty2=CY+Math.sin(tAng)*tr, ps3=6+9*out;
    if(k>=0.72 && k<0.8){ ctx.strokeStyle="rgba(201,176,255,0.5)"; ctx.lineWidth=2;   // yank speed-lines
      ctx.beginPath(); ctx.moveTo(tx2,ty2); ctx.lineTo(CX+(tx2-CX)*0.4,CY+(ty2-CY)*0.4); ctx.stroke(); }
    ctx.globalAlpha=0.75+0.25*Math.sin(t*4);
    ctx.drawImage(WARM,tx2-ps3,ty2-ps3,ps3*2,ps3*2);
    ctx.imageSmoothingEnabled=true; ctx.save(); ctx.translate(tx2,ty2);
    ctx.rotate(Math.sin(t*3)*0.3); ctx.drawImage(SOCK,-ps3*0.6,-ps3*0.6,ps3*1.2,ps3*1.2); ctx.restore();
    ctx.imageSmoothingEnabled=false; ctx.globalAlpha=1; }

  // collectibles — buttons (gold, 4 thread holes) + buff orbs, scaling with depth; drawn over the drum
  for(const c of col){ if(!c.on) continue;
    const zz=Math.min(1,c.z), r=RIM*Math.pow(zz,PERSP)*0.93;
    const px=CX+Math.cos(c.ang)*r, py=CY+Math.sin(c.ang)*r;
    ctx.globalAlpha=0.35+0.65*zz;
    if(c.kind===0){ const q=c.val>1, br=(2+4.5*zz)*(q?1.3:1);
      // LOOSE CHANGE — pennies (copper) & quarters (silver), tumbling end-over-end like real dryer change
      const tum=Math.abs(Math.sin(t*5+c.ang*7));            // fake 3D coin spin: width collapses and returns
      ctx.fillStyle=q?"rgba(223,230,238,0.3)":"rgba(224,153,92,0.28)";
      ctx.beginPath(); ctx.arc(px,py,br+2,0,TAU); ctx.fill();
      ctx.save(); ctx.translate(px,py); ctx.rotate(c.ang+t*1.5); ctx.scale(Math.max(0.18,tum),1);
      ctx.fillStyle=q?"#dfe6ee":"#e0995c"; ctx.beginPath(); ctx.arc(0,0,br,0,TAU); ctx.fill();
      ctx.strokeStyle=q?"#8f9aa8":"#9c6234"; ctx.lineWidth=1; ctx.beginPath(); ctx.arc(0,0,br-0.8,0,TAU); ctx.stroke();
      if(q&&zz>0.45){ ctx.setLineDash([1,1.5]); ctx.beginPath(); ctx.arc(0,0,br,0,TAU); ctx.stroke(); ctx.setLineDash([]); }  // milled quarter edge
      ctx.restore();
    } else { const os=(6+12*zz)*(1+0.12*Math.sin(t*6));
      ctx.drawImage(c.kind===4?MEND:ORBSPR[c.kind],px-os,py-os,os*2,os*2);
      if(c.kind===4){                                                               // health PATCH — mint square w/ stitches
        const ps=2.5+4*zz; ctx.fillStyle="#9bf0d0"; ctx.fillRect(px-ps,py-ps,ps*2,ps*2);
        ctx.strokeStyle="rgba(20,30,26,0.7)"; ctx.lineWidth=1; ctx.setLineDash([2,2]);
        ctx.strokeRect(px-ps+1,py-ps+1,ps*2-2,ps*2-2); ctx.setLineDash([]); }
      else { ctx.fillStyle=c.kind===1?"#ffd45a":c.kind===2?"#5adcff":"#e6f7ff";
        ctx.beginPath(); ctx.arc(px,py,2+2*zz,0,TAU); ctx.fill();
        if(c.kind===3&&zz>0.5) txt("⚡",px,py+3,8+6*zz,"#e6f7ff",700); } }
    ctx.globalAlpha=1; }

  // the sock on the rim (or riding the centre current) — hidden once it has disintegrated
  if(mode!=="dead"){
    const rk=rideT>0?Math.min(1,(RIDE_T-rideT)*4,rideT*4):0;        // ease in/out of the current
    /* GQ-7: during the clear ceremony the sock spirals into the vortex — drawn angle + radius
       run their own timeline; gameplay is already over so nothing here can be unfair */
    const ck=mode==="clear"?1-winT/1.5:0;
    const da2=a+ck*4.2;
    const pr=(RIM*0.93*(1-rk)+26*rk)*(1-0.94*ck),
          px=CX+Math.cos(ck>0?da2:a)*pr, py=CY+Math.sin(ck>0?da2:a)*pr, sc2=(1-0.3*rk)*(1-0.45*ck);
    if(rk>0){ ctx.strokeStyle="rgba(191,240,255,"+(0.35*rk)+")"; ctx.lineWidth=2;  // static tether crackles back to the rim
      ctx.beginPath(); ctx.moveTo(px,py); ctx.lineTo(CX+Math.cos(a)*RIM*0.93,CY+Math.sin(a)*RIM*0.93); ctx.stroke();
      if(Math.random()<0.6) emit(px+(Math.random()-0.5)*10,py+(Math.random()-0.5)*10,(Math.random()-0.5)*60,(Math.random()-0.5)*60,0.2,"#bff0ff"); }
    ctx.globalAlpha=0.5; ctx.drawImage(WARM,px-20*sc2,py-20*sc2,40*sc2,40*sc2); ctx.globalAlpha=1;
    if(pulseT>0){ const pk=1-pulseT/PULSE_T;                                                     // STATIC PULSE — discharge ring + white-hot sock
      ctx.strokeStyle="rgba(191,240,255,"+(0.7*(1-pk))+")"; ctx.lineWidth=2.5;
      ctx.beginPath(); ctx.arc(px,py,8+pk*22,0,TAU); ctx.stroke();
      if(Math.random()<0.8) emit(px+(Math.random()-0.5)*14,py+(Math.random()-0.5)*14,(Math.random()-0.5)*80,(Math.random()-0.5)*80,0.15,"#e6f7ff"); }
    if(shieldUp||graceT>0){ ctx.strokeStyle="rgba(255,212,90,"+(shieldUp?0.55:0.3*graceT)+")";   // gold shield ring
      ctx.lineWidth=2.5; ctx.beginPath(); ctx.arc(px,py,14+2*Math.sin(t*9),0,TAU); ctx.stroke(); }
    if(magnetT>0){ ctx.strokeStyle="rgba(90,220,255,"+(0.1+0.12*Math.sin(t*4))+")";               // magnet field arc along the rim
      ctx.lineWidth=3; ctx.beginPath(); ctx.arc(CX,CY,RIM*0.93,a-1.3,a+1.3); ctx.stroke(); }
    const gflk=graceT>0 && (t*14|0)%2===0;   // damage-grace flicker
    ctx.save(); ctx.translate(px,py); ctx.rotate(a-Math.PI/2+(rk>0?t*5*rk:0)+(ck>0?t*6*ck:0)); ctx.scale(sc2,sc2);
    if(rk<=0){ const sv=Math.abs(steerV);                  // GQ-1: lean + stretch into travel (local +x = decreasing angle)
      ctx.rotate(-lastMove*0.28); ctx.scale(1+sv*0.14,1-sv*0.09); }
    if(gflk) ctx.globalAlpha=0.35;
    ctx.imageSmoothingEnabled=true; ctx.drawImage(SOCK,-11,-11,22,22); ctx.imageSmoothingEnabled=false;
    const dmg=HP_MAX-hp;                     // the sock LOOKS more damaged with every hit
    if(dmg>=1){ ctx.fillStyle="#171210";     // frayed notches + a scorch
      ctx.fillRect(6.5,3,3,2.4); ctx.fillRect(-9.5,-8,2.4,3);
      ctx.fillStyle="rgba(90,40,20,0.55)"; ctx.fillRect(2,4,4,3); }
    if(dmg>=2){ ctx.fillStyle="#171210";     // threadbare holes + hanging thread
      ctx.fillRect(-2,2,3,3); ctx.fillRect(-7.5,4.5,2.6,2.6); ctx.fillRect(3,-4,2.2,2.2);
      ctx.fillStyle="#cfc9bd"; ctx.fillRect(8,6,1,4.5); ctx.fillRect(-10,1,1,3.5); }
    /* P2 EXPRESSIVE SOCK: the eyes TRACK — the vortex normally, the pair during a tease
       (googly pupils aimed in local space; the whole face is theatre, zero mechanics) */
    const teaseHover=teaseT>0 && teaseT<TEASE_LEN*0.7;
    let lx2=0,ly2=0;
    { let tx3=CX,ty3=CY;                                              // default look target: the vortex
      if(teaseHover){ const k3=1-teaseT/TEASE_LEN;
        const out3=k3<0.3?k3/0.3:1, tz3=0.06+0.56*out3, tr3=RIM*Math.pow(tz3,PERSP);
        const tA3=teaseAng+0.5; tx3=CX+Math.cos(tA3)*tr3; ty3=CY+Math.sin(tA3)*tr3; }
      const ddx=tx3-px, ddy=ty3-py, dm2=Math.hypot(ddx,ddy)||1;
      const th2=a-Math.PI/2, cs=Math.cos(th2), sn=Math.sin(th2);
      lx2=( ddx*cs+ddy*sn)/dm2*1.1; ly2=(-ddx*sn+ddy*cs)/dm2*1.1; }
    const er2=teaseHover?2.4:1.9;                                     // wide-eyed at the near-reunion
    ctx.fillStyle="#fff"; ctx.beginPath(); ctx.arc(-3.4,-2.2,er2,0,TAU); ctx.arc(0.2,-2.2,er2,0,TAU); ctx.fill();
    ctx.fillStyle="#14100c";
    ctx.fillRect(-3.4+lx2,-2.8+ly2,1.3,1.3); ctx.fillRect(0.2+lx2,-2.8+ly2,1.3,1.3);
    if(teaseHover){ ctx.beginPath(); ctx.arc(-1.4,1.4,1.2,0,TAU); ctx.fill(); }   // little "oh!" mouth — so close
    else if(dmg>=2){ ctx.fillRect(-4,1,4,1.2); }  // worried stitch-mouth when one hit from unravelling
    else ctx.fillRect(-2.6,0.6,2.8,1);
    ctx.globalAlpha=1; ctx.restore();
    // static-cling sparks crawl on the sock while charged / charging
    if(cling>0.25 && rideT<=0 && Math.random()<cling*0.5){
      emit(px+(Math.random()-0.5)*12,py+(Math.random()-0.5)*12,(Math.random()-0.5)*30,(Math.random()-0.5)*30,0.18,"#bff0ff"); }
    // HOT streak — the sock runs hot: embers stream off it while the ¢×2 line is crossed
    if(chase>HOTX && rideT<=0 && mode==="play"){
      if(Math.random()<0.7) emit(px-lastMove*8+(Math.random()-0.5)*8,py+(Math.random()-0.5)*8,
        -lastMove*60+(Math.random()-0.5)*40,(Math.random()-0.5)*40,0.3,Math.random()<0.5?"#ff9a3c":"#ffcf5c"); } }

  for(const p of par){ if(p.life>0){ ctx.globalAlpha=Math.min(1,p.life*2.4); ctx.fillStyle=p.c; ctx.fillRect(p.x,p.y,2,2); } }
  ctx.globalAlpha=1;

  // stage-name banner (C2): each drum announces itself, then gets out of the way
  if(mode==="play" && bannerT>0){ const ba=Math.min(1,bannerT);
    ctx.globalAlpha=ba; txt(stageName(stage),CX,86,17,"#ffcf5c",800);
    if(stage<=STAGES.length) txt("STAGE "+stage+" of "+STAGES.length,CX,102,9,"#c9b0ff",700);
    ctx.globalAlpha=1; }
  // C3 mission-done banner
  if(mBannerT>0){ ctx.globalAlpha=Math.min(1,mBannerT);
    txt(mBannerTxt,CX,VH-40,11,"#9bf0d0",800); ctx.globalAlpha=1; }
  // GQ-8 teach glyphs — world runs at 35% while these show; pictures, not paragraphs
  if(teachT>0 && mode==="play"){ const fl2=0.6+0.4*Math.sin(t*6);
    ctx.globalAlpha=fl2;
    if(teachKind===1){ txt("◀",CX-40,CY+4,26,"#9bf0d0",800); txt("▶",CX+40,CY+4,26,"#9bf0d0",800); }
    else { txt("⊙",CX,CY-6,26,"#bff0ff",800); txt("TAP",CX,CY+14,11,"#bff0ff",800); }
    ctx.globalAlpha=1; }
  // GQ-6 spin-cycle callout, once per stage
  if(mode==="play" && spinBanner && dist>LEVEL_LEN-SPIN_FINALE && dist<LEVEL_LEN-SPIN_FINALE+40){
    ctx.globalAlpha=0.7+0.3*Math.sin(t*10); txt("SPIN CYCLE!",CX,52,14,"#ff7a3c",800); ctx.globalAlpha=1; }
  // HUD — progress to the vortex + static meter
  if(mode==="play"||mode==="dead"||mode==="clear"){
    ctx.fillStyle="rgba(0,0,0,0.35)"; ctx.fillRect(90,8,300,10);
    ctx.fillStyle="#c9b0ff"; ctx.fillRect(90,8,300*prog,10);
    // your pair on the same bar — the race you're actually running
    { const pp=Math.min(1,pairDist/LEVEL_LEN), pmx=90+300*pp;
      ctx.fillStyle="#ffcf9a"; ctx.fillRect(pmx-1,6,2,14);
      txt("PAIR",pmx,4,7,"#ffcf9a",700); }
    txt("THE LOST SOCK VORTEX",CX,28,9,"#c9b0ff",700);
    // CHASE meter — thin hot bar under the progress bar; this is your speed
    ctx.fillStyle="rgba(0,0,0,0.3)"; ctx.fillRect(90,20,300,4);
    ctx.fillStyle=chase>HOTX?"#ff9a3c":"#c76f35"; ctx.fillRect(90,20,300*chase,4);
    if(chase>HOTX){ const fl=0.6+0.4*Math.sin(t*8);                     // over the line = HOT: change pays double
      ctx.globalAlpha=fl; txt("HOT ¢×2",406,27,8,"#ffcf5c",800); ctx.globalAlpha=1; }
    else if(chase>0.05) txt("CHASE",406,26,7,"#ff9a3c",700);
    if(hotPopT>0){ ctx.globalAlpha=Math.min(1,hotPopT*1.6);
      txt("×2!",60,47-(0.8-hotPopT)*10,10,"#ffcf5c",800); ctx.globalAlpha=1; }
    // DRUM JAM drama — grind warning, then the surge banner
    if(jamTele>0){ ctx.globalAlpha=0.7+0.3*Math.sin(t*20);
      txt("THE DRUM GRINDS…",CX,64,12,"#ffb056",800); ctx.globalAlpha=1; }
    else if(jamT>0){ ctx.globalAlpha=0.8;
      txt("DRUM JAM!",CX,64,15,"#ff7a3c",800); ctx.globalAlpha=1; }
    txt((dist|0)+"m",60,17,10,"#e8dcc8",700);
    if(mode==="play") txt(runPts().toLocaleString()+" pts",60,58,8,"#c9b0ff",700);   // C3: run points, quiet under the coin pop
    txt("¢ "+(mode==="play"?buttons+runBtns:buttons),34,33,coinPopT>0?12:10,coinPopT>0?"#ffe9a8":"#e0995c",700);   // bank() folds runBtns in on death/win
    if(coinPopT>0){ ctx.globalAlpha=Math.min(1,coinPopT*1.6);
      txt("+"+coinPopV+" ¢",34,47-(0.8-coinPopT)*10,9,"#ffe08a",700); ctx.globalAlpha=1; }
    if(magnetT>0) txt("MAGNET "+Math.ceil(magnetT),34,VH-10,8,"#5adcff",700);
    if(shieldUp) txt("SHIELD",VW-38,VH-10,8,"#ffd45a",700);
    for(let k=0;k<HP_MAX;k++){ const on=k<hp;                                  // condition pips: little stitched patches, not hearts
      ctx.fillStyle=on?"#9bf0d0":"rgba(255,255,255,0.12)"; ctx.fillRect(VW-58+k*16,10,10,10);
      if(on){ ctx.strokeStyle="rgba(20,30,26,0.6)"; ctx.lineWidth=1; ctx.setLineDash([2,2]);
        ctx.strokeRect(VW-57+k*16,11,8,8); ctx.setLineDash([]); } }
    txt("STAGE "+(stage<=STAGES.length?stage+"/"+STAGES.length:stage),VW-40,33,9,"#c9b0ff",700);
    // static meter — notch marks the PULSE threshold (⅓); full bar = the ride
    ctx.fillStyle="rgba(0,0,0,0.35)"; ctx.fillRect(CX-70,VH-18,140,8);
    ctx.fillStyle=cling>=1?"#bff0ff":"#5b8fa8"; ctx.fillRect(CX-70,VH-18,140*cling,8);
    ctx.fillStyle="rgba(255,255,255,0.5)"; ctx.fillRect(CX-70+140*PULSE_COST-1,VH-19,2,10);
    txt(cling>=1?"⚡ STATIC READY — tap to RIDE THE CURRENT":
        cling>=PULSE_COST?"tap = PULSE (phase a hit) · full bar = RIDE":"slide to build STATIC",
        CX,VH-24,8,cling>=1?"#bff0ff":cling>=PULSE_COST?"#9fd8ef":"#8b95a8",700);
  }
  ctx.restore();
  if(flash>0){ ctx.fillStyle="#ff5468"; ctx.globalAlpha=flash; ctx.fillRect(0,0,VW,VH); ctx.globalAlpha=1; }

  if(mode==="intro"){
    /* P2 COLD-OPEN (Canabalt iceberg): two socks together, one torn into the vortex.
       2.6s, zero exposition, any tap skips. */
    ctx.fillStyle="#0d0a08"; ctx.fillRect(0,0,VW,VH);
    const k=Math.min(1,introT/2.2), pull=k<0.35?0:(k-0.35)/0.65;
    const vs2=20+60*k;                                                 // the vortex wakes
    ctx.globalAlpha=0.4+0.6*k; ctx.drawImage(VORTEX,VW-150-vs2,CY-vs2,vs2*2,vs2*2); ctx.globalAlpha=1;
    ctx.imageSmoothingEnabled=true;
    const hx2=150, hy2=CY+16;                                          // our sock, planted
    const ppx2=hx2+26+(VW-150-hx2-26)*pull, ppy2=hy2-8*(1-pull)+ (CY-hy2+8)*pull;  // the pair, torn away
    ctx.save(); ctx.translate(ppx2,ppy2); ctx.rotate(pull*7);
    ctx.scale(1+pull*0.5,1-pull*0.25);                                 // stretched by the pull
    ctx.drawImage(SOCK,-11,-11,22,22); ctx.restore();
    ctx.save(); ctx.translate(hx2,hy2); ctx.rotate(Math.sin(t*3)*0.06);
    ctx.drawImage(SOCK,-13,-13,26,26);
    ctx.fillStyle="#fff"; ctx.beginPath(); ctx.arc(-3.4,-2.2,pull>0?2.6:1.9,0,TAU); ctx.arc(0.6,-2.2,pull>0?2.6:1.9,0,TAU); ctx.fill();
    ctx.fillStyle="#14100c"; ctx.fillRect(-2.6+pull*1.4,-2.8,1.4,1.4); ctx.fillRect(1.4+pull*1.4,-2.8,1.4,1.4);
    if(pull>0.3){ ctx.beginPath(); ctx.arc(-1,2,1.5,0,TAU); ctx.fill(); }   // mouth falls open
    ctx.restore(); ctx.imageSmoothingEnabled=false;
    if(pull>0.2 && Math.random()<0.5) emit(ppx2,ppy2,(Math.random()-0.5)*60,(Math.random()-0.5)*60,0.3,"#c9b0ff");
  } else if(mode==="ready"){
    ctx.fillStyle="rgba(10,8,6,0.55)"; ctx.fillRect(0,0,VW,VH);
    txt("INSIDE THE DRYER",CX,66,26,"#ffcf5c",800);
    txt("your PAIR just got sucked into THE LOST SOCK VORTEX — catch up before it's gone",CX,86,10,"#ffd9a8",600);
    txt("← → steer   ·   slide charges STATIC   ·   tap = PULSE (phase a hit)   ·   full bar = RIDE the current",CX,100,10,"#aeb8cc",600);
    txt(STAGES.length+" tumbles between you and your pair"+(reunited?"   ·   ENDLESS TUMBLE unlocked":""),CX,114,10,"#c9b0ff",600);
    ctx.globalAlpha=0.6+0.4*Math.sin(t*5); txt("tap to tumble",CX,136,13,"#9bf0d0",700); ctx.globalAlpha=1;
    if(best>0) txt("best "+(best|0)+"m   ·   best "+bestPts.toLocaleString()+" pts   ·   ¢ "+buttons,CX,154,10,"#aeb8cc",600);
    /* C3/P3: the 3 mission slots + rank — the reason for the NEXT run, visible before it starts */
    txt("— "+rank()+" —",CX,172,9,"#ffcf9a",800);
    for(let s2=0;s2<3;s2++){ const mi=mSlots[s2];
      if(mi>=MISSIONS.length){ txt("· all missions complete ·",CX,184+s2*11,8,"#6f7a92",600); break; }
      const m2=MISSIONS[mi], pv=mProg(mi);
      txt(m2.txt+"   ("+pv+"/"+m2.n+")   +¢"+m2.r,CX,184+s2*11,8,pv>0?"#9bf0d0":"#8b95a8",600); }
    ctx.fillStyle="rgba(255,255,255,0.07)"; ctx.fillRect(R_CTRL.x,R_CTRL.y,R_CTRL.w,R_CTRL.h);
    txt("CONTROLS: "+(ctrlWheel?"WHEEL (→ spins drum)":"SCREEN (→ moves right)"),CX,R_CTRL.y+15,9,"#9bf0d0",700);
  } else if(mode==="dead"){
    ctx.fillStyle="rgba(10,8,6,0.45)"; ctx.fillRect(0,0,VW,VH);
    txt("UNRAVELLED",CX,78,26,"#ff5468",800);
    txt("in "+stageName(stage),CX,96,10,"#c9b0ff",600);
    /* C3: Batch-B tally port — line items count up one per beat, tap skips (deadT lockout covers it) */
    const lines=[["tumbled",(dist|0)+"m × 10",(dist|0)*10],
                 ["change snatched",M.coinRun+"¢ × 25",M.coinRun*25],
                 ["stages cleared",runStages+" × 250",runStages*250]];
    const shown=tallyN;
    for(let i2=0;i2<Math.min(shown,3);i2++){ const y2=118+i2*15;
      ctx.textAlign="right"; ctx.fillStyle="#aeb8cc"; ctx.font="600 10px system-ui"; ctx.fillText(lines[i2][0]+"  "+lines[i2][1],CX+40,y2);
      ctx.textAlign="left"; ctx.fillStyle="#e8dcc8"; ctx.font="700 10px system-ui"; ctx.fillText(""+lines[i2][2].toLocaleString(),CX+52,y2); }
    if(shown>=4){ txt("TOTAL   "+runPts().toLocaleString()+" pts",CX,170,14,"#ffcf5c",800);
      if(newBest||newBestP){ ctx.globalAlpha=0.7+0.3*Math.sin(t*6); txt("NEW BEST",CX,188,12,"#ffd45a",800); ctx.globalAlpha=1; }
      txt("+¢ "+lastHaul+"   (¢ "+buttons+")",CX,204,10,"#e0995c",700); }
    ctx.globalAlpha=0.6+0.4*Math.sin(t*5); txt("tap to tumble again",CX,228,12,"#9bf0d0",700); ctx.globalAlpha=1;
  } else if(mode==="reunion"){
    /* C2/P1 THE REUNION — the payoff scene, then "laundry day happens again" */
    ctx.fillStyle="rgba(16,10,26,0.72)"; ctx.fillRect(0,0,VW,VH);
    const rk2=Math.min(1,reunionT/1.6);
    const sep=60*(1-rk2), wob=Math.sin(t*3)*3*rk2;
    ctx.globalAlpha=0.85; ctx.drawImage(WARM,CX-40,CY-40,80,80); ctx.globalAlpha=1;
    ctx.imageSmoothingEnabled=true;
    for(const s3 of [-1,1]){ ctx.save(); ctx.translate(CX+s3*(10+sep),CY+wob*s3);
      ctx.rotate(s3*0.25+rk2*Math.sin(t*2)*0.2);
      ctx.drawImage(SOCK,-13,-13,26,26);
      ctx.fillStyle="#fff"; ctx.beginPath(); ctx.arc(-3.4,-2.2,2.1,0,TAU); ctx.arc(0.6,-2.2,2.1,0,TAU); ctx.fill();
      ctx.fillStyle="#14100c"; ctx.fillRect(-3.2-s3*1,-2.8,1.3,1.3); ctx.fillRect(0.8-s3*1,-2.8,1.3,1.3);
      ctx.beginPath(); ctx.arc(-1.2,1.6,1.6,0,Math.PI); ctx.fill();    // the biggest smile a sock can make
      ctx.restore(); }
    ctx.imageSmoothingEnabled=false;
    if(rk2>=1 && Math.random()<0.4){ const an=Math.random()*TAU;
      emit(CX+Math.cos(an)*30,CY+Math.sin(an)*30,Math.cos(an)*80,Math.sin(an)*80,0.6,Math.random()<0.5?"#ffcf5c":"#c9b0ff"); }
    if(reunionT>1.4){
      txt("REUNITED",CX,74,24,"#ffcf5c",800);
      txt("…but laundry day happens again.",CX,94,11,"#c9b0ff",600);
      ctx.globalAlpha=0.6+0.4*Math.sin(t*5); txt("tap — the tumble goes on (ENDLESS)",CX,212,12,"#9bf0d0",700); ctx.globalAlpha=1; }
  } else if(mode==="stage"){
    ctx.fillStyle="rgba(20,12,30,0.55)"; ctx.fillRect(0,0,VW,VH);
    if(gained){ txt("STAGE "+stage+" CLEAR — YOU'RE GAINING ON YOUR PAIR!",CX,92,15,"#ffcf9a",800);
      txt("beat your pair to the vortex  +¢ "+GAIN_BONUS,CX,108,9,"#ff9a3c",700); }
    else txt("STAGE "+stage+" CLEAR — YOUR PAIR SLIPPED DEEPER…",CX,92,15,"#c9b0ff",800);
    txt("+¢ "+lastHaul+"   (¢ "+buttons+")",CX,120,11,"#e0995c",700);
    // condition + mend shop between stages
    for(let k=0;k<HP_MAX;k++){ const on=k<hp;
      ctx.fillStyle=on?"#9bf0d0":"rgba(255,255,255,0.12)"; ctx.fillRect(CX-26+k*18,126,12,12); }
    if(hp<HP_MAX){ const can=buttons>=MEND_COST;
      ctx.fillStyle=can?"rgba(155,240,208,0.16)":"rgba(255,255,255,0.05)";
      ctx.fillRect(R_MEND.x,R_MEND.y,R_MEND.w,R_MEND.h);
      txt("MEND +1   ¢ "+MEND_COST,CX,R_MEND.y+16,11,can?"#9bf0d0":"#6f7a92",700);
      if(!can){                                                     // C1: rewarded-ad mend SEAM — only offered when broke
        ctx.fillStyle="rgba(255,212,90,0.14)"; ctx.fillRect(R_ADMEND.x,R_ADMEND.y,R_ADMEND.w,R_ADMEND.h);
        txt("▶ FREE MEND (watch)",CX,R_ADMEND.y+15,10,"#ffd45a",700); } }
    else txt("fully mended",CX,R_MEND.y+16,10,"#6f7a92",600);
    txt("next: "+stageName(stage+1),CX,196,10,"#ffcf9a",700);       // C2: the journey names where you're going
    ctx.globalAlpha=0.6+0.4*Math.sin(t*5); txt("tap → STAGE "+(stage+1)+" (faster)",CX,224,12,"#9bf0d0",700); ctx.globalAlpha=1;
  }
  /* C1 pause veil — drawn over everything, resumes on any input */
  if(paused){ ctx.fillStyle="rgba(8,6,5,0.72)"; ctx.fillRect(0,0,VW,VH);
    txt("PAUSED",CX,CY-6,24,"#ffcf5c",800);
    txt("tap or P to keep tumbling   ·   M mutes",CX,CY+18,10,"#aeb8cc",600); }
  if(mutedFlag){ txt("MUTED",VW-30,VH-24,7,"#8b95a8",700); }
}

let lastT=0;
function frame(now){ if(!lastT)lastT=now; let dt=(now-lastT)/1000; lastT=now;
  if(dt>0.033)dt=0.033;
  if(Snd.g) Snd.g.gain.value=(mutedFlag||paused)?0:0.8;                         // C1: pause + persisted mute silence everything (incl. the rumble loop)
  if(paused){ draw(); requestAnimationFrame(frame); return; }                   // C1: frozen under the pause veil
  if(hitStop>0){ hitStop-=dt; draw(); requestAnimationFrame(frame); return; }   // GQ-2: 60-90ms freeze-frame on shield pop/damage
  update(dt); draw(); requestAnimationFrame(frame); }
requestAnimationFrame(frame);
/* C1: auto-pause when the tab hides OR the game's iframe loses focus (CG hosts in an iframe —
   clicking the page around the game blurs the window without hiding the tab) */
document.addEventListener("visibilitychange",()=>{ if(document.hidden){ lastT=0; if(mode==="play")paused=true; } });
addEventListener("blur",()=>{ lastT=0; if(mode==="play")paused=true; });
</script>
</body>
