// JF-#062: tutorial helpers -------------------------------------------------
function tutMaintain(dt){
  // keep exactly ONE slow, strike-only sparring dummy alive; no other spawns
  const live = enemies.some(e => e.tut && e.st !== E_DOWN && e.st !== E_THROWN);
  if (live){ spawnT = 20; return; }
  spawnT -= dt;
  if (spawnT <= 0){
    spawnEnemy(Math.random() < 0.5 ? -1 : 1);
    const e = enemies[enemies.length - 1];
    e.tut = 1; e.type = T_NORM; e.guard = 0; e.guardLine = undefined;
    e.canEvade = false; e.feint = false; e.willThrow = false; e.elite = undefined;
    e.hp = 2; e.hpMax = 2; e.speed *= 0.85;
    spawnT = 26;
  }
}
function tutOnCounter(){
  tut.counters++;
  if (tut.step === 1 && tut.counters >= TUT_GOAL) tut.done = true;   // graduate (finalized safely in update)
}
function finalizeTut(){
  tut.active = false; tut.done = false;
  save.tut = 1; persist();
  enemies.length = 0; darts.length = 0;
  banner('YOU ARE READY  ·  THE DISTRICT AWAITS', '#7ce8a8', 150);
  slowMo = Math.max(slowMo, 24);
  difficulty = 0; waveT = 0; INTRO = Math.max(240, 720 - beltOf(save.kills) * 120);
  beginWave(1);   // start the real wave clean
}
function skipTut(){ if (tut.active){ Snd.tick(); finalizeTut(); } }

// ---------------------------------------------------------------- update ----
function update(){
  if (state === S_PAUSE) return;   // JF-#014: world fully frozen
  // JF-#062: graduate the tutorial at a SAFE point (never mid enemy-loop)
  if (tut.done) finalizeTut();
  // JF-#062: first dodge arms readyT -> advance from the DODGE beat to the COUNTER beat
  if (tut.active && tut.step === 0 && readyT > 0){
    tut.step = 1; popup(P.x, P.y - 150, 'DODGED — YOU ARE ARMED', '#7ce8a8', true); Snd.tick();
  }
  t++;
  if (BOT) botFrame();             // JF-#022: the bot drives every state
  // JF-#061: cap total shake. Nijman's "Art of Screenshake" point is that shake
  // makes reactions PHYSICAL — but we fight waves, so simultaneous hits used to
  // stack into unreadable noise. Cap first, then the 0.85 per-frame falloff runs
  // the authored decay (Skullgirls replicated 3rd Strike's falloff exactly).
  if (shake > SHAKE_CAP) shake = SHAKE_CAP;
  if (shake > 0) shake *= 0.85;
  if (hurtFlash > 0) hurtFlash--;
  if (msgT > 0) msgT--;
  if (bannerT > 0) bannerT--;
  if (clashT > 0) clashT--;   // JF-#043
  if (P.punchT > 0) P.punchT--;
  // JF-#044: flourish pose beats (whooshes on the arm sweeps)
  if (P.flourishT > 0){
    P.flourishT--;
    if (P.flourishT === 28 || P.flourishT === 14) Snd.whoosh();
  }
  if (moonWakeT > 0) moonWakeT--;      // JF-#031
  if (propHitT > 0) propHitT--;
  if (restGag){ restGag.x += restGag.dir * restGag.spd; if (restGag.x < -60 || restGag.x > W + 60) restGag = null; }

  popups = popups.filter(p => (p.life--, p.y -= 0.7, p.life > 0));
  parts = parts.filter(p => {
    p.x += p.vx; p.y += p.vy; if (!p.noGrav) p.vy += 0.25; p.life--;   // JF-#061: imploding counter sparks ignore gravity so the converge stays a clean shape
    return p.life > 0 && p.y < 470;
  });

  if (state !== S_PLAY){ if (state === S_DEAD) tallyT++; return; }
  if (hitStop > 0){ hitStop--; return; }
  if (whiffT > 0) whiffT--;
  if (bufT > 0){ bufT--; if (bufDir){ const d = bufDir, l = bufLine; bufDir = 0; bufLine = null; bufT = 0; strike(d, l); } }   // JF-#061: replay with its original line
  const dt = slowMo > 0 ? 0.35 : 1;
  if (slowMo > 0) slowMo--;
  // JF-#044: grapple clock — mash out before it hits zero or get slammed
  if (grapple){
    grapple.t -= dt;
    if (grapple.t <= 0){
      const ge = grapple.e;
      ge.grappled = false; ge.st = E_RECOVER; ge.stT = 0;
      grapple = null;
      popup(P.x, P.y - 110, 'SLAMMED', '#e86a6a', true);
      hurtPlayer();
    }
  }
  // JF-#059: dodge timers (world-time so it slows with hit-stop/slow-mo). Rise
  // is grounded now — no arc, no jump() — so P.y just stays put.
  if (P.riseT > 0){ P.riseT -= dt; if (P.riseT < 0) P.riseT = 0; }
  if (P.duckT > 0){ P.duckT -= dt; if (P.duckT < 0) P.duckT = 0; }
  // JF-#047: NES held crouch — while ▼ is held (key or pad button) the duck never
  // expires; release and the last sliver of duckT runs out and you stand.
  if ((duckHeld || padDuckActive) && P.riseT <= 0 && !grapple && !scrollOffer)
    P.duckT = Math.max(P.duckT, 1.5);
  P.duckAge = P.duckT > 0 ? P.duckAge + dt : 0;   // frames spent in this crouch
  P.y = GROUND_Y;
  if (P.backT > 0){ P.backT -= dt; if (P.backT < 0) P.backT = 0; }   // JF-#042
  // JF-#059: thrown projectiles fly flat at their telegraphed height; each
  // height has its own answer now (matches the melee mapping): HIGH -> rise
  // (spin-catch, thrown back), LOW -> duck (kicked back), MID -> back-step
  // (sidestepped only — no reflection, per Mike's "sidestepped and dodged").
  for (const d of darts){
    d.x += d.vx * dt; d.spin += 0.5 * dt;
    if (!d.hit && !d.returned && Math.abs(d.x - P.x) < 30){
      const dodged = d.line === 'high' ? P.riseT > 0 : d.line === 'low' ? P.duckT > 0 : P.backT > 0;
      if (dodged){
        // JF-#047: duckAge-based timing (a held crouch lets a low dart sail
        // over for free — only a FRESH read pays, a last-instant one reflects
        // it). Rise/back-step are timed presses like the old jump was.
        const age = d.line === 'high' ? RISE_DUR - P.riseT
                  : d.line === 'low'  ? P.duckAge
                  : BACK_DUR - P.backT;
        if (age <= 7 && d.line !== 'mid'){   // JF-#059: mid has no reflect tier
          combo++; comboT = CW;
          if (combo > bestCombo) bestCombo = combo;
          d.returned = true; d.vx *= -1.15; d.life = 120;
          score += 100; jadeRun++;
          popup(P.x, d.y0 - 20, d.line === 'high' ? 'CAUGHT!' : 'KICKED!', '#e8c76a', true);
          Snd.counter(); slowMo = Math.max(slowMo, 22);
          burst(P.x, d.y0, '#e8c76a', 12, 4, 'implode');   // JF-#061: catch/kick-back = a counter, so it converges
        } else if (age <= 20){
          combo++; comboT = CW;            // JF-#043: defense feeds FLOW
          if (combo > bestCombo) bestCombo = combo;
          d.hit = true; d.dead = true;
          readyT = READY_DUR;              // JF-#053: a projectile dodge arms the counter too
          score += 150; jadeRun++; bumpTrial('dodge');
          slowMo = Math.max(slowMo, 18);   // JF-#041: bullet-time beat as it sails past
          popup(P.x, GROUND_Y - (d.line === 'high' ? 60 : 96),
                d.line === 'mid' ? 'SIDESTEPPED +150' : 'DODGED +150', '#7ce8a8');
          burst(P.x, d.y0, '#7ce8a8', 10, 3, 'x');         // JF-#061: clean read = X
        } else {
          d.hit = true; d.dead = true;     // lazy read: it just sails over
          bumpTrial('dodge');
          popup(P.x, GROUND_Y - (d.line === 'high' ? 60 : 96),
                d.line === 'high' ? 'under it' : d.line === 'low' ? 'over it' : 'past it', '#9aa2b0');
        }
      } else {
        d.hit = true; d.dead = true;
        // JF-#028: log dart hits for the fairness suite
        if (BOT && BOT.cur) BOT.cur.hits.push({ wave, type: 'dart', windup: d.line, pincer: false, fast: false });
        hurtPlayer();
      }
    }
    // JF-#044: a returned projectile fells the first foe it meets
    if (d.returned && !d.dead){
      for (const e of enemies){
        if (e.st === E_DOWN || e.st === E_THROWN || e.st === E_EVADE || e.type === T_BOSS) continue;
        if (Math.abs(e.x - d.x) < 34){
          d.dead = true;
          e.st = E_DOWN; e.stT = 0; e.vx = Math.sign(d.vx) * 5; e.vy = -4.5; e.hp = 0;
          score += 300; kills++; jadeRun++;
          popup(e.x, e.y - 90, 'RETURN TO SENDER +300', '#e8c76a', true); yelp(e.x, e.y - 114);
          burst(e.x, e.y - 45, '#e8c76a', 12, 4);
          Snd.hit(6); shake = Math.max(shake, 6);
          break;
        }
      }
    }
  }
  darts = darts.filter(d => !d.dead && d.x > -40 && d.x < W + 40 && d.life-- > 0);

  if (comboT > 0){ comboT -= dt; if (comboT <= 0) combo = 0; }
  if (readyT > 0) readyT -= dt;            // JF-#053: counter window drains
  if (P.ctrFlashT > 0) P.ctrFlashT -= dt;  // JF-#053: counter flourish timer

  // JF-#008: wave machine — difficulty comes from wave number, not a treadmill
  waveT += dt;
  if (waveT >= 5400) award('endure');
  difficulty = Math.max(0, Math.min(15, dBase + TUNE.diffD + (wave - 1) * 1.3 + Math.min(beltOf(save.kills), 6) * 0.3));   // JF-#028: steeper; JF-#049 knob
  if (wavePhase === 1){                                // rest beat between waves
    if (scrollOffer) return;                           // JF-#025: world waits on the choice
    restT -= dt;
    if (restT <= 0){
      if (won) endRun(true);                           // district cleared — run ends in victory
      else beginWave(wave + 1);
    }
  } else if (tut.active){
    tutMaintain(dt);   // JF-#062: the guided teach owns spawning until the player graduates
  } else {
    spawnT -= dt;
    // JF-#039: Punch-Out pacing — duelists enter ONE AT A TIME. The next
    // challenger only walks in once the ring is empty (late game: a second
    // may join, so pincers and throw payoffs still exist past difficulty 6).
    const ringCap = difficulty > 6 ? 2 : 1;
    const live = enemies.reduce((n, e) => n + (e.st !== E_DOWN && e.st !== E_THROWN ? 1 : 0), 0);
    if (spawnT <= 0 && toSpawn > 0 && live < ringCap){
      toSpawn--; spawnEnemy();
      spawnT = 40 + Math.random() * 30;
    }
    if (toSpawn <= 0 && enemies.length === 0) onWaveClear();
  }

  for (const e of enemies){
    if (e.grappled) continue;             // JF-#044: held in the grapple, frozen
    e.stT += dt;
    // JF-#057: FACING — was drawn from e.side, which is set ONCE at spawn and
    // never updated, so every foe was mirrored: the swing tracked the player
    // (live Math.sign(P.x - e.x) in the aim lines + hit resolve) while the BODY
    // pointed wherever it spawned. Facing is now live and toward the player,
    // and LOCKED once the swing commits (E_STRIKE onward) so a whiff that
    // carries past you doesn't spin the body around mid-follow-through.
    if (e.st === E_WALK || e.st === E_WINDUP || e.st === E_AIM || e.st === E_FEINT)
      e.face = Math.sign(P.x - e.x) || e.face || 1;
    if (e.evadeCd > 0) e.evadeCd -= dt;   // JF-#041
    if (e.leanT > 0) e.leanT -= dt;       // JF-#043: hit-reaction decay
    // JF-#034/#059: THE BUTCHER lobs a cleaver from range at one of the three
    // heights (reuses the dart system, boss keeps fighting). This one has no
    // multi-frame wind-up pose to read (it's a single instant spawn), so it
    // keeps a one-word cue — everything else lost captions, this didn't earn one.
    if (e.type === T_BOSS && e.flavor && e.flavor.cleaver && e.st !== E_DOWN && e.st !== E_THROWN){
      e.throwCd -= dt;
      if (e.throwCd <= 0 && Math.abs(e.x - P.x) > 150){
        const dir = Math.sign(P.x - e.x) || 1, line = pickProjLine();
        darts.push({ x: e.x + dir * 24, vx: dir * 8, line, y0: projY(line), life: 120, cleaver: true });
        popup(e.x, e.y - 150, line.toUpperCase() + '!', PROJ_COL[line]);
        Snd.hurt(); e.throwCd = 200 + Math.random() * 90;
      }
    }
    switch (e.st){
      case E_WALK: {
        const d = Math.abs(e.x - P.x);
        // JF-#060: STARE-DOWN REMOVED (Mike: "remove the taunt animations before
        // we battle, they are just distracting"). The 40f face-off froze the foe
        // at ~280px, fired an elite name card + the hero's flourish pose, then a
        // FIGHT! popup — a pre-fight ceremony that stalled the loop every duel.
        // Enemies now walk straight in and engage. Kept: the wave-clear victory
        // flourish (that's a reward AFTER the fight, not a delay before it).
        // JF-#043: STANCE SWITCH — a guarded foe slides his bracer to a new line
        // every few seconds, so reading guards is ongoing, never solved once
        if (e.guard > 0){
          e.guardShiftT = (e.guardShiftT === undefined ? 160 + Math.random() * 80 : e.guardShiftT) - dt;
          if (e.guardShiftT <= 0){
            e.guardShiftT = 160 + Math.random() * 80;
            const lines = ['mid', 'low', 'high'].filter(l => l !== e.guardLine);
            e.guardLine = lines[(Math.random() * 2) | 0];
          }
        }
        // fairness guard: never open a windup while the OTHER side is already
        // threatening — hold just outside reach instead of pincering.
        // JF-#006: guard lifts past difficulty 6 — late game allows true pincers.
        const otherThreat = e.type !== T_BOSS && difficulty <= 5 && enemies.some(o => o !== e &&   // JF-#028: earlier pincers
          (o.st === E_WINDUP || o.st === E_STRIKE) &&
          Math.sign(o.x - P.x) !== Math.sign(e.x - P.x));
        // JF-#028: a spearman still holding its spear aims from range first
        if (e.willThrow && d < 340 && d > e.reach + 20){
          e.st = E_AIM; e.stT = 0; e.aimDur = Math.max(34, 52 - difficulty * 1.5);
          Snd.windup(e.aimDur);
          break;
        }
        if (d < e.reach - 8){
          if (otherThreat){ e.x = P.x + Math.sign(e.x - P.x) * (e.reach + 4); break; }
          if (e.feint){ e.st = E_FEINT; e.stT = 0; break; }   // fake-out: no windup audio
          e.st = E_WINDUP; e.stT = 0;
          // JF-#040: pick this swing's attack + keep non-red swings reactable.
          // High/low/grab must clear the reaction+dodge budget (~react 12 + 30f
          // dodge), so they floor higher than a countered strike can.
          e.atk = e.tut ? 'strike' : chooseAtk(e);   // JF-#062: the sparring dummy only ever throws the core RED strike
          e.converted = false;
          if (e.atk === 'grab') e.windup = Math.max(e.windup, 36);
          else if (e.atk !== 'strike') e.windup = Math.max(e.windup, 32);
          if (e.tut) e.windup = TUT_WINDUP;   // JF-#062: long, unmissable telegraph while learning
          // JF-#040: combo strings — a rank-and-file strike sometimes chains into
          // a second, mixed-up swing, so blocking the first doesn't end the
          // exchange (research: combos with a defender break-out window).
          e.followed = false;
          e.follow = (e.type === T_NORM || e.type === T_FAST) && difficulty > 4 &&
                     e.atk === 'strike' && Math.random() < 0.3;
          // JF-#043: THE ECHO always chains — every strike has a follow-up swing
          if (e.elite && e.elite.habit === 'chain' && e.atk === 'strike') e.follow = true;
          e.followAtk = Math.random() < 0.4 ? 'grab' : Math.random() < 0.5 ? 'high' : 'low';
          Snd.windup(e.windup);
          // JF-#043: TEAM-UP — late game, a partner on the far side fakes a rush
          // as this one commits, with a shared "!!" cue. Scary, but the feint
          // itself can't hit: the pressure is psychological, the fairness real.
          if (difficulty > 6 && Math.random() < 0.3){
            const partner = enemies.find(o => o !== e && o.st === E_WALK && o.type !== T_BOSS &&
              Math.sign(o.x - P.x) !== Math.sign(e.x - P.x) && Math.abs(o.x - P.x) < 420);
            if (partner){
              partner.st = E_FEINT; partner.stT = 0;
              popup(W/2, 250, '!!', '#e8a06a', true);
            }
          }
        } else e.x += (Math.sign(P.x - e.x) || e.side) * e.speed * dt;   // JF-#057: walk TOWARD the player (was a fixed spawn-direction march that could stroll straight past him)
        break;
      }
      case E_AIM:
        // JF-#028: release the spear at the telegraphed height, then close to melee
        if (e.stT >= e.aimDur){
          const dir = Math.sign(P.x - e.x) || 1;
          darts.push({ x: e.x + dir * 20, vx: dir * 8.5, line: e.projLine,
            y0: projY(e.projLine), life: 120, spin: 0 });
          Snd.hurt();
          e.willThrow = false; e.st = E_WALK; e.stT = 0;
        }
        break;
      case E_WINDUP:
        if (e.stT >= e.windup){
          e.st = E_STRIKE; e.stT = 0; e.didHit = false;
          if (e.type === T_SPEAR) e.x -= Math.sign(e.x - P.x) * 58;   // lunge in
        }
        break;
      case E_STRIKE:
        // JF-#010: IRON CATCH grace — with the technique, the blow lands 3 frames
        // later, leaving a last-instant counter window on the falling strike
        if (!e.didHit && e.stT >= (hasTech(1) ? 3 : 0)){
          e.didHit = true;
          resolveEnemyHit(e);   // JF-#040: block / parry / dodge / land
        }
        if (e.st === E_STRIKE && e.stT >= 10){   // (parry/block may have changed st)
          if (e.follow && !e.followed && e.type !== T_BOSS){
            // JF-#040: combo second hit — a mixed-up swing, faster than the first
            e.followed = true; e.st = E_WINDUP; e.stT = 0; e.didHit = false;
            e.atk = e.followAtk; e.converted = true;
            e.windup = Math.max(e.atk === 'strike' ? 20 : 30, e.windup * 0.8);
            popup(e.x, e.y - 108, 'AGAIN!', '#e8a06a');
            Snd.windup(e.windup);
          } else { e.st = E_RECOVER; e.stT = 0; }
        }
        break;
      case E_RECOVER:
        // JF-#040: a whiffed grab leaves the foe wide open far longer (punish it)
        if (e.stT >= (e.recoverLong ? 62 : e.type === T_SPEAR ? 44 : 30)){
          e.st = E_WALK; e.stT = 0; e.recoverLong = false;
        }
        break;
      // (JF-#050 follow-through drift applied below the switch — E_STRIKE and
      // E_RECOVER both carry it so the whiff slides through the player's spot)
      case E_STAGGER:
        e.x += e.vx * dt; e.vx *= run.grease ? 0.95 : 0.86;   // JF-#032: GREASE = long comic slide
        // a shoved body stumbles whoever it slides into
        if (!e.chained && Math.abs(e.vx) > 1.5){
          for (const o of enemies){
            if (o === e || o.st === E_DOWN || o.st === E_THROWN || o.st === E_STAGGER || o.type === T_BOSS) continue;
            if (Math.abs(o.x - e.x) < 34){
              o.st = E_STAGGER; o.stT = 0; o.vx = e.vx * 0.8; o.guard = 0;
              score += 100; popup(o.x, o.y - 80, 'STUMBLE +100', '#c8bfa8');
              bumpTrial('stumble');
              burst(o.x, o.y - 45, '#c8bfa8', 6, 2);
              e.chained = true;
              break;
            }
          }
        }
        if (e.stT >= 25){
          e.st = E_WALK; e.stT = 0; e.chained = false;
          // JF-#039: the back-and-forth — a wounded duelist comes back MEANER.
          // Telegraphs tighten as hp drops (still floored reactable), vipers
          // start throwing desperate feints, spearmen re-arm if range opens.
          // Boss excluded: his phases already tune windup per counter taken.
          if (e.type !== T_BOSS && e.hpMax > 1 && e.hp < e.hpMax){
            e.windup = Math.max(20, e.windup0 * (0.7 + 0.3 * e.hp / e.hpMax));
            if (e.type === T_FAST) e.feint = Math.random() < 0.4;
            if (e.type === T_SPEAR && !e.willThrow && Math.random() < 0.45){
              e.willThrow = true; e.projLine = pickProjLine();   // JF-#059
            }
          }
        }
        break;
      case E_FEINT:
        // JF-#007: pale flash while springing back out of reach, then resume (next approach is real)
        e.x += Math.sign(e.x - P.x) * 5 * dt;
        if (e.stT >= 16){ e.st = E_WALK; e.stT = 0; e.feint = false; }
        break;
      case E_EVADE:
        // JF-#041: backflip away from your strike — unhittable in the air, then
        // LANDS into a long recover. The Punch-Out lesson: their dodge is your window.
        e.x += e.vx * dt; e.vx *= 0.94;
        if (e.stT >= 22){ e.st = E_RECOVER; e.stT = 0; e.recoverLong = true; }
        break;
      case E_DOWN: case E_THROWN:
        e.x += e.vx * dt; e.y += e.vy * dt; e.vy += 0.5 * dt;
        e.rot += e.vx * (e.bigSend ? 0.09 : 0.05) * dt;
        // JF-#020: airborne bodies bonk off the screen edge once and rebound
        if (e.st === E_THROWN && !e.bonked && e.y < 440 && (e.x < 26 || e.x > W - 26)){
          e.bonked = true; e.vx *= -0.55; e.vy = Math.min(e.vy, -3.5);
          popup(e.x < W/2 ? 40 : W - 40, e.y - 90, 'BONK', '#c8bfa8', true);
          Snd.block(); shake = Math.max(shake, 6);
        }
        // JF-#007: an airborne thrown body is a projectile — fells anyone it passes through
        if (e.st === E_THROWN && e.y < 440){
          for (const o of enemies){
            if (o === e || o.st === E_DOWN || o.st === E_THROWN || o.type === T_BOSS) continue;
            if (Math.abs(o.x - e.x) < 40){
              o.st = E_DOWN; o.stT = 0; o.vx = e.vx * 0.6; o.vy = -4;
              score += 250; kills++; jadeRun++;
              popup(o.x, o.y - 80, 'FELLED +250', '#e8c76a'); yelp(o.x, o.y - 104);
              burst(o.x, o.y - 40, '#e8c76a', 10, 3);
            }
          }
        }
        // JF-#031: a thrown body sailing through the district prop = a payoff crash
        if (e.st === E_THROWN && !e.propCrashed && e.y < 430 && e.y > 360 && Math.abs(e.x - PROP_X) < 32){
          e.propCrashed = true; propHitT = 14; e.vx *= 0.4;
          const P0 = PROPS[sel];
          popup(PROP_X, 372, P0.cry, P0.col, true);
          burst(PROP_X, 400, P0.col, 16, 5);
          Snd.block(); shake = Math.max(shake, 8); moonWake(70);
        }
        // JF-#030: record the farthest yeet (thrown bodies only)
        if (e.st === E_THROWN && e.sendX0 !== undefined){
          const d = Math.abs(e.x - e.sendX0);
          if (d > longestSend) longestSend = d;
        }
        if (e.y > 470) e.dead = true;
        break;
    }
    // JF-#050: follow-through — the committed swing's momentum slides the
    // attacker through and past the dodged spot, decaying over ~14 frames.
    if (e.thruV && (e.st === E_STRIKE || e.st === E_RECOVER)){
      e.x += e.thruV * dt; e.thruV *= 0.88;
      if (Math.abs(e.thruV) < 0.4) e.thruV = 0;
    } else if (e.thruV && e.st !== E_STRIKE && e.st !== E_RECOVER) e.thruV = 0;
  }
  enemies = enemies.filter(e => !e.dead && e.x > -120 && e.x < W + 120);
}

// ------------------------------------------------------------------ draw ----
// JF-#027: cartoon pass — chunky cel-outlined fighters, big heads, live faces,
// squash & stretch. Pop and quirk over clean and clinical (top-20 research:
// bright cartoon characters dominate; the comedy of #020 needs a body that sells it).
const OUT = '#181220';                 // cel outline everywhere
const COMIC = '"Comic Sans MS","Segoe Print","Chalkboard SE",cursive';
function fighter(x, y, face, opts){
  const o = opts || {};
  cx.save();
  cx.translate(x, y);
  if (o.rot) cx.rotate(o.rot);
  const sz = o.size || 1, sq = o.squash || 0;
  cx.scale(face * sz * (1 + 0.16 * sq), sz * (1 - 0.16 * sq));
  const punch = o.punch || 0;
  const c = o.col || '#e8dcc0';
  // JF-#029: explicit dodge poses — duck = deep wide crouch (head drops low, feet
  // splay), air = tucked knees (feet up) — instead of a uniform squash that only
  // read as "short". torsoDrop shifts the whole upper body so the crouch is obvious.
  const pose = o.pose || '';
  // JF-#058: the POSE carries the attack line now, not just the overlays. `phase`
  // splits windup from strike explicitly (before, windup was just "the strike pose
  // with a shorter arm" — punch>0 was the only difference, which is why heights
  // never read). Windup silhouettes are deliberately opposite shapes:
  //   HIGH = rise tall, elbow cocked ABOVE the shoulder
  //   LOW  = drop low, body sinks, arm loads at ankle height
  //   MID  = coil back, fist chambered at the waist, weight on the back leg
  const line = o.line || '', phase = o.phase || '';
  const winding = phase === 'wind', striking = phase === 'strike';
  cx.lineJoin = 'round'; cx.lineCap = 'round';
  const legStroke = segs => {
    cx.strokeStyle = OUT; cx.lineWidth = 9; cx.beginPath(); segs(); cx.stroke();
    cx.strokeStyle = c;   cx.lineWidth = 5.5; cx.beginPath(); segs(); cx.stroke();
  };
  const foot = (fx, fy) => { cx.fillStyle = OUT; cx.beginPath(); cx.ellipse(fx, fy, 6, 4, 0, 0, 7); cx.fill(); };
  let torsoDrop = 0;
  if (pose === 'duck'){                 // deep horse-stance crouch
    legStroke(() => { cx.moveTo(-3, -13); cx.lineTo(-19, -11); cx.lineTo(-25, 0);
                      cx.moveTo(3, -13);  cx.lineTo(19, -11);  cx.lineTo(25, -1); });
    foot(-26, 1); foot(26, 0);
    torsoDrop = 30;                     // head + body sink toward the ground
  } else if (pose === 'air'){           // knees tucked up under the body
    legStroke(() => { cx.moveTo(-4, -30); cx.lineTo(-14, -20); cx.lineTo(-5, -13);
                      cx.moveTo(4, -30);  cx.lineTo(14, -22);  cx.lineTo(6, -15); });
    foot(-6, -13); foot(7, -15);
    torsoDrop = -3;
  } else if ((winding || striking) && line === 'high'){
    // JF-#058: HIGH = RISE. Back heel lifts, legs straighten, the whole body
    // grows taller — the opposite silhouette to the low sweep's drop.
    legStroke(() => { cx.moveTo(0, -32); cx.lineTo(-13, -1); cx.moveTo(0, -32); cx.lineTo(15, -9); });
    foot(-14, 1); foot(17, -10);        // front heel off the ground
    torsoDrop = -8;
  } else if (winding && line === 'mid'){
    // JF-#058: MID = COIL. Weight sinks back onto the rear leg, front foot light —
    // the body loads like a spring, so the straight punch reads before it fires.
    legStroke(() => { cx.moveTo(0, -30); cx.lineTo(-19, -9); cx.lineTo(-22, 0);
                      cx.moveTo(0, -30); cx.lineTo(16, -2); });
    foot(-23, 1); foot(17, -1);
    torsoDrop = 6;
  } else {                              // planted stance
    legStroke(() => { cx.moveTo(0, -30); cx.lineTo(-15, 0); cx.moveTo(0, -30); cx.lineTo(17, -3); });
    foot(-16, 1); foot(18, -2);
  }
  // ---- upper body (torso, head, arms) rides torsoDrop so the crouch reads ----
  cx.save();
  cx.translate(0, torsoDrop);
  // robe: plump rounded wedge with a swishy hem
  cx.beginPath();
  cx.moveTo(-16, -28);
  cx.quadraticCurveTo(0, -20 + Math.sin(t * 0.12) * 1.5, 16, -28);
  cx.quadraticCurveTo(13, -52, 9, -66);
  cx.quadraticCurveTo(0, -73, -9, -66);
  cx.quadraticCurveTo(-13, -52, -16, -28);
  cx.closePath();
  cx.fillStyle = c; cx.fill();
  cx.strokeStyle = OUT; cx.lineWidth = 3; cx.stroke();
  // sash
  cx.strokeStyle = o.sash || '#3fae7c'; cx.lineWidth = 5;
  cx.beginPath(); cx.moveTo(-12, -44); cx.quadraticCurveTo(0, -40, 12, -48); cx.stroke();
  // head + face group — JF-#032: BIG-HEAD scroll inflates it around the neck
  cx.save();
  if (run.bighead){ cx.translate(0, -70); cx.scale(1.65, 1.65); cx.translate(0, 70); }
  // head: BIG (cartoon proportion), outlined
  cx.fillStyle = c;
  cx.beginPath(); cx.arc(0, -84, 15, 0, 7); cx.fill();
  cx.strokeStyle = OUT; cx.lineWidth = 3; cx.stroke();
  // headband + flapping tail
  cx.strokeStyle = o.sash || '#3fae7c'; cx.lineWidth = 4;
  cx.beginPath(); cx.moveTo(-14, -89); cx.lineTo(14, -89); cx.stroke();
  cx.beginPath(); cx.moveTo(-13, -89); cx.quadraticCurveTo(-27, -87 + Math.sin(t * 0.15) * 4, -33, -78); cx.stroke();
  // face: eyes carry the state (idle / angry / x / dizzy)
  const eyes = o.eyes || 'idle';
  if (eyes === 'x'){                              // felled: X eyes
    cx.strokeStyle = OUT; cx.lineWidth = 2.5;
    for (const ex of [4.5, 11]){
      cx.beginPath();
      cx.moveTo(ex - 2.5, -87); cx.lineTo(ex + 2.5, -81.5);
      cx.moveTo(ex + 2.5, -87); cx.lineTo(ex - 2.5, -81.5);
      cx.stroke();
    }
  } else {
    cx.fillStyle = '#fff';
    cx.beginPath(); cx.arc(5, -84, 4, 0, 7); cx.fill();
    cx.beginPath(); cx.arc(11.5, -84, 4, 0, 7); cx.fill();
    cx.fillStyle = OUT;
    const pp = eyes === 'dizzy' ? Math.sin(t * 0.35) * 2 : 1.6;   // dizzy pupils wander
    cx.beginPath(); cx.arc(5 + pp, -84, 1.9, 0, 7); cx.fill();
    cx.beginPath(); cx.arc(11.5 + pp, -84, 1.9, 0, 7); cx.fill();
    if (eyes === 'angry'){                        // V brows
      cx.strokeStyle = OUT; cx.lineWidth = 2.5;
      cx.beginPath(); cx.moveTo(0.5, -90.5); cx.lineTo(8, -87.5); cx.moveTo(15.5, -90.5); cx.lineTo(9, -87.5); cx.stroke();
    }
  }
  // JF-#033: worn accessory (player only) — sits in the head group so BIG-HEAD scales it
  if (o.acc === 'panda'){
    cx.fillStyle = '#22201e';
    cx.beginPath(); cx.arc(-10, -96, 6.5, 0, 7); cx.arc(10, -96, 6.5, 0, 7); cx.fill();   // ears
    cx.beginPath(); cx.ellipse(4, -84, 4.5, 5.5, 0.3, 0, 7); cx.ellipse(12, -84, 4.5, 5.5, -0.3, 0, 7); cx.fill();   // eye patches
  } else if (o.acc === 'mustache'){
    cx.fillStyle = '#2a2622'; cx.strokeStyle = '#2a2622'; cx.lineWidth = 3; cx.lineCap = 'round';
    cx.beginPath(); cx.moveTo(8, -78); cx.quadraticCurveTo(2, -82, -2, -76); cx.moveTo(8, -78); cx.quadraticCurveTo(15, -82, 19, -76); cx.stroke();
  } else if (o.acc === 'chicken'){
    cx.fillStyle = '#e0503a';                                   // red comb
    cx.beginPath(); cx.moveTo(-4, -97); cx.quadraticCurveTo(0, -104, 4, -97); cx.quadraticCurveTo(8, -104, 12, -97); cx.fill();
    cx.fillStyle = '#f0a83a';                                   // beak
    cx.beginPath(); cx.moveTo(16, -82); cx.lineTo(26, -80); cx.lineTo(16, -77); cx.closePath(); cx.fill();
  } else if (o.acc === 'dragon'){
    cx.save(); cx.translate(-18, -92 + Math.sin(t * 0.2) * 3);   // a li'l dragon familiar bobbing at the shoulder
    cx.fillStyle = '#4fbf82'; cx.strokeStyle = OUT; cx.lineWidth = 2;
    cx.beginPath(); cx.arc(0, 0, 7, 0, 7); cx.fill(); cx.stroke();
    cx.beginPath(); cx.moveTo(-4, -6); cx.lineTo(-6, -12); cx.lineTo(-1, -8); cx.fill();   // horn
    cx.fillStyle = '#ffec9a'; cx.beginPath(); cx.arc(3, -1, 1.5, 0, 7); cx.fill();          // eye
    cx.restore();
  }
  cx.restore();   // JF-#032: end big-head group
  // arms: chunky, with round fists; lead arm extends on punch
  const arm = (x1, y1, x2, y2) => {
    cx.strokeStyle = OUT; cx.lineWidth = 9;
    cx.beginPath(); cx.moveTo(x1, y1); cx.lineTo(x2, y2); cx.stroke();
    cx.strokeStyle = c; cx.lineWidth = 5.5;
    cx.beginPath(); cx.moveTo(x1, y1); cx.lineTo(x2, y2); cx.stroke();
    cx.fillStyle = c;
    cx.beginPath(); cx.arc(x2, y2, 6, 0, 7); cx.fill();
    cx.strokeStyle = OUT; cx.lineWidth = 2.5; cx.stroke();
  };
  let ext = punch > 0 ? 34 + punch * 3 : 15;
  if (run.tiny) ext *= 0.5;             // JF-#032: TINY-FISTS — itty-bitty arms
  if (pose === 'duck'){                 // arms tuck in tight to the crouch
    arm(-8, -58, -15, -46);
    if (o.line === 'low' && winding){
      // JF-#058: LOW windup — the sweeping arm WINDS BACK behind the hip first,
      // so the sweep has somewhere to come from (and reads as "something is
      // loading down there" rather than "arm already out").
      arm(8, -58, -10, -32);
    } else {
      // JF-#041: a crouched LOW attack sweeps at ankle height — the leg-line read
      arm(8, -58, 8 + ext * (o.line === 'low' ? 1.15 : 0.8),
          o.line === 'low' ? -34 - (punch > 0 ? 0 : 6) : -52 - (punch > 0 ? 2 : -4));
    }
  } else if (pose === 'air'){           // trailing + leading (flying-kick read)
    arm(-8, -64, -20, -58);
    arm(8, -64, 8 + ext, -66 - (punch > 0 ? 6 : 0));
  } else if (o.line === 'grab' && winding){
    // JF-#058: GRAB windup — BOTH arms reach out open-handed. Unmistakable
    // silhouette: wide, two-armed, nothing cocked back.
    arm(-6, -62, 14, -56);
    arm(6, -64, 22, -62);
  } else if (o.line === 'high'){
    // JF-#041/#045: HIGH-line attack — swings at HEAD height so a duck slips under.
    arm(-7, -62, -18, -50);
    if (winding){
      // JF-#058: elbow cocks ABOVE the shoulder, fist back over the head — the
      // classic overhead tell, readable in one frame from the silhouette alone.
      arm(5, -66, 12, -94);             // upper arm: shoulder → elbow up high
      arm(12, -94, -4, -106);           // forearm: fist chambered behind the head
    } else {
      arm(5, -66, 5 + ext * 1.35, -84); // strike: lashes out at head height
    }
  } else if (o.line === 'mid' && winding){
    // JF-#058: MID windup — fist CHAMBERS at the waist and the shoulder twists
    // back. The lead arm pulls AWAY from you before it fires, which is the tell
    // the red flash alone never gave.
    arm(-7, -62, -16, -52);
    arm(7, -60, -8, -44);
  } else {
    arm(-7, -62, -18, -50);
    arm(7, -62, 7 + ext, -60 - (punch > 0 ? 4 : -7));
  }
  if (punch > 8){                       // starburst on the fist
    const fx = pose === 'duck' ? 8 + ext * 0.8 + 6 : 7 + ext + 7, fy = pose === 'air' ? -66 : pose === 'duck' ? -52 : -62;
    drawStar(fx, fy, 10 + (12 - punch) * 2, '#ffe9a8', t * 0.3);
  }
  if (o.spear){                         // spearman: pole past the lead hand
    cx.strokeStyle = OUT; cx.lineWidth = 5;
    cx.beginPath(); cx.moveTo(-8, -50); cx.lineTo(7 + ext + 44, -66); cx.stroke();
    cx.strokeStyle = '#a8906a'; cx.lineWidth = 3;
    cx.beginPath(); cx.moveTo(-8, -50); cx.lineTo(7 + ext + 44, -66); cx.stroke();
    cx.fillStyle = '#d8d0b8';
    cx.beginPath(); cx.moveTo(7 + ext + 44, -66); cx.lineTo(7 + ext + 58, -68); cx.lineTo(7 + ext + 44, -73); cx.closePath(); cx.fill();
    cx.strokeStyle = OUT; cx.lineWidth = 2; cx.stroke();
  }
  if (o.guard){                         // raised-guard bracer arc in front
    // JF-#041: the bracer sits at the LINE it covers — high (head), mid, or low
    // (shins) — so you can read which of your attack heights will bounce.
    const gy = o.guardLine === 'high' ? -86 : o.guardLine === 'low' ? -30 : -62;
    cx.strokeStyle = OUT; cx.lineWidth = 7;
    cx.beginPath(); cx.arc(23, gy, 14, -1.1, 1.1); cx.stroke();
    cx.strokeStyle = '#cfe0f8'; cx.lineWidth = 4;
    cx.beginPath(); cx.arc(23, gy, 14, -1.1, 1.1); cx.stroke();
  }
  cx.restore();   // end torsoDrop group
  cx.restore();   // end fighter transform
}
// JF-#031: district gag props — simple cartoon silhouettes that wobble on impact
function drawProp(p, x, base){
  cx.save();
  cx.translate(x, base);
  const wob = propHitT > 0 ? Math.sin(propHitT * 0.9) * (propHitT / 14) * 0.22 : 0;
  cx.rotate(wob);
  cx.lineJoin = 'round'; cx.lineCap = 'round';
  const out = (fill, path) => { cx.beginPath(); path(); cx.closePath(); cx.fillStyle = fill; cx.fill(); cx.strokeStyle = OUT; cx.lineWidth = 3; cx.stroke(); };
  if (p.kind === 'dummy'){                 // training dummy: post + straw head
    cx.strokeStyle = OUT; cx.lineWidth = 8; cx.beginPath(); cx.moveTo(0, 0); cx.lineTo(0, -46); cx.stroke();
    out('#c9b27a', () => { cx.arc(0, -56, 12, 0, 7); });
    cx.strokeStyle = OUT; cx.lineWidth = 6; cx.beginPath(); cx.moveTo(-16, -40); cx.lineTo(16, -40); cx.stroke();
  } else if (p.kind === 'cart'){           // noodle cart: box, wheels, steaming bowl
    out('#a5713e', () => { cx.rect(-30, -34, 60, 26); });
    cx.fillStyle = OUT; cx.beginPath(); cx.arc(-18, -6, 8, 0, 7); cx.arc(18, -6, 8, 0, 7); cx.fill();
    out('#e8dcc0', () => { cx.ellipse(0, -40, 15, 6, 0, 0, 7); });   // bowl
    cx.strokeStyle = 'rgba(240,234,210,0.5)'; cx.lineWidth = 2;
    cx.beginPath(); cx.moveTo(-4, -44); cx.quadraticCurveTo(-9, -52, -3, -58); cx.moveTo(6, -44); cx.quadraticCurveTo(11, -52, 5, -58); cx.stroke();
  } else if (p.kind === 'gong'){           // temple gong on a frame
    cx.strokeStyle = OUT; cx.lineWidth = 6;
    cx.beginPath(); cx.moveTo(-26, 0); cx.lineTo(-22, -60); cx.lineTo(22, -60); cx.lineTo(26, 0); cx.stroke();
    out(p.col, () => { cx.arc(0, -40, 22, 0, 7); });
    out('#b8923a', () => { cx.arc(0, -40, 8, 0, 7); });
  } else if (p.kind === 'laundry'){        // laundry line with hanging clothes
    cx.strokeStyle = OUT; cx.lineWidth = 6;
    cx.beginPath(); cx.moveTo(-30, 0); cx.lineTo(-30, -56); cx.moveTo(34, 0); cx.lineTo(34, -56); cx.stroke();
    cx.strokeStyle = '#8a7a5a'; cx.lineWidth = 2;
    cx.beginPath(); cx.moveTo(-30, -52); cx.quadraticCurveTo(2, -44, 34, -52); cx.stroke();
    for (const [cx0, cc] of [[-16, '#cfe0f8'], [4, '#e8b0b0'], [22, '#b0e8c0']]){
      out(cc, () => { cx.rect(cx0 - 7, -50, 14, 18); });
    }
  } else {                                 // urn / jade pot
    out(p.col, () => { cx.moveTo(-14, -4); cx.quadraticCurveTo(-24, -30, -12, -50);
      cx.lineTo(12, -50); cx.quadraticCurveTo(24, -30, 14, -4); });
    out('#5fae88', () => { cx.ellipse(0, -50, 14, 5, 0, 0, 7); });
  }
  cx.restore();
}

    cx.moveTo(24, -60); cx.lineTo(38 + Math.sin(t * 0.4) * 3, -57); cx.lineTo(24, -50); cx.closePath(); cx.fill();

    cx.strokeStyle = '#2a2530'; cx.lineWidth = 3;
    cx.beginPath(); cx.moveTo(-15, -6); cx.quadraticCurveTo(-26, -14 + Math.sin(t * 0.3) * 4, -24, -22); cx.stroke();  // tail

// 4-spike cartoon star
function drawStar(x, y, r, col, rot){
  cx.save(); cx.translate(x, y); cx.rotate(rot || 0);
  cx.fillStyle = col;
  cx.beginPath();
  for (let i = 0; i < 8; i++){
    const rr = i % 2 === 0 ? r : r * 0.42, a = i * Math.PI / 4;
    cx.lineTo(Math.cos(a) * rr, Math.sin(a) * rr);
  }
  cx.closePath(); cx.fill();
  cx.restore();
}

// JF-#040: on-screen control pad — makes Jade Fist a proper click-or-tap desktop
// game. Keyboard stays primary; these buttons mirror it and read as a live
// legend. Dodge/strike fire on press; BLOCK holds while pressed. Built fresh
// each frame into padRects for the pointer handlers.
function drawControlPad(){
  padRects = [];
  const y = 486, h = 44, r = 9;
  const btn = (id, x, w, label, sub, hot) => {
    padRects.push({ id, x, y, w, h });
    cx.save();
    cx.beginPath();
    cx.moveTo(x + r, y); cx.arcTo(x + w, y, x + w, y + h, r); cx.arcTo(x + w, y + h, x, y + h, r);
    cx.arcTo(x, y + h, x, y, r); cx.arcTo(x, y, x + w, y, r); cx.closePath();
    cx.fillStyle = hot ? 'rgba(138,216,255,0.28)' : 'rgba(16,20,26,0.5)';
    cx.fill();
    cx.strokeStyle = hot ? '#8ad8ff' : 'rgba(232,220,192,0.28)'; cx.lineWidth = hot ? 2.5 : 1.5; cx.stroke();
    cx.textAlign = 'center';
    cx.fillStyle = hot ? '#dff2ff' : '#d8d0c0'; cx.font = 'bold 15px Georgia';
    cx.fillText(label, x + w/2, y + (sub ? 20 : 28));
    if (sub){ cx.fillStyle = 'rgba(200,191,168,0.6)'; cx.font = '11px Georgia'; cx.fillText(sub, x + w/2, y + 35); }
    cx.restore();
  };
  // left cluster: strike + dodge
  btn('strikeL', 24, 60, '◀', 'A', false);
  btn('duck',    90, 78, 'DUCK', 'hold ▼', P.duckT > 0);   // JF-#047: held stance
  btn('jump',   172, 78, 'HIGH', '▲ / W', P.riseT > 0);    // JF-#059: was JUMP
  btn('strikeR',254, 60, '▶', 'D', false);
  // JF-#046: right cluster removed — the four arrows are the whole fight
  btn('duck2',  794, 68, 'DUCK', 'hold', P.duckT > 0);
  btn('jump2',  868, 68, 'HIGH', '▲', P.riseT > 0);        // JF-#059: was JUMP
}

function drawWorld(){
  // JF-#009: each district paints its own night — sky, skyline density, lantern hue
  const D = DISTRICTS[sel];
  const g = cx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, D.sky[0]); g.addColorStop(0.7, D.sky[1]); g.addColorStop(1, D.sky[2]);
  cx.fillStyle = g; cx.fillRect(0, 0, W, H);
  // moon — JF-#027: sleepy cartoon face, snoozing over the brawl
  cx.fillStyle = 'rgba(232,226,204,0.08)';
  cx.beginPath(); cx.arc(780, 90, 60, 0, 7); cx.fill();
  cx.fillStyle = '#f0ead2';
  cx.beginPath(); cx.arc(780, 90, 34, 0, 7); cx.fill();
  cx.strokeStyle = 'rgba(24,18,32,0.55)'; cx.lineWidth = 2.5; cx.lineCap = 'round';
  if (moonWakeT > 0){                               // JF-#031: startled awake, watching
    cx.fillStyle = '#fff';
    cx.beginPath(); cx.arc(771, 86, 5.5, 0, 7); cx.fill();
    cx.beginPath(); cx.arc(789, 86, 5.5, 0, 7); cx.fill();
    cx.fillStyle = 'rgba(24,18,32,0.7)';
    cx.beginPath(); cx.arc(772, 87, 2.4, 0, 7); cx.fill();
    cx.beginPath(); cx.arc(790, 87, 2.4, 0, 7); cx.fill();
    cx.strokeStyle = 'rgba(24,18,32,0.55)'; cx.lineWidth = 2;
    cx.beginPath(); cx.moveTo(765, 79); cx.lineTo(776, 81); cx.moveTo(795, 79); cx.lineTo(784, 81); cx.stroke();   // raised brows
    cx.fillStyle = 'rgba(24,18,32,0.6)';                         // little 'o' of surprise
    cx.beginPath(); cx.arc(780, 98, 4, 0, 7); cx.fill();
    cx.fillStyle = '#ffd98a'; cx.font = 'bold 22px ' + COMIC; cx.textAlign = 'center';
    cx.fillText('!', 824, 74);
    cx.textAlign = 'left';
  } else {
    cx.beginPath();                                 // two closed sleeping eyes
    cx.arc(771, 86, 6, 0.2, Math.PI - 0.2); cx.moveTo(795, 86); cx.arc(789, 86, 6, 0.2, Math.PI - 0.2);
    cx.stroke();
    cx.beginPath(); cx.arc(781, 96, 7, 0.15, Math.PI - 0.15); cx.stroke();   // little smile
    // drifting "z z z" that resets slowly
    cx.fillStyle = 'rgba(240,234,210,0.5)'; cx.textAlign = 'left';
    cx.font = 'italic 14px ' + COMIC;
    for (let i = 0; i < 3; i++){
      const zt = (t * 0.4 + i * 40) % 120;
      cx.globalAlpha = Math.max(0, 0.6 - zt / 200);
      cx.fillText('z', 812 + i * 9 + zt * 0.15, 66 - zt * 0.35);
    }
    cx.globalAlpha = 1;
  }
  // pagoda silhouettes (count/height vary by district)
  cx.fillStyle = 'rgba(8,11,17,0.85)';
  for (let i = 0; i < D.pag; i++){
    const bx = 60 + i * (900 / D.pag), bw = 120 - D.pag * 6, by = 300 - (i % 2) * 40 - (sel === 3 ? 60 : 0);
    cx.fillRect(bx, by, bw, 300);
    for (let r = 0; r < 3; r++){
      const rw = bw + 44 - r * 14, ry = by - r * 42;
      cx.beginPath();
      cx.moveTo(bx + bw/2 - rw/2 - 12, ry);
      cx.quadraticCurveTo(bx + bw/2, ry - 34, bx + bw/2 + rw/2 + 12, ry);
      cx.closePath(); cx.fill();
    }
  }
  // hanging lanterns in the district's hue
  const [lr, lg, lb] = D.lant;
  for (let i = 0; i < 6; i++){
    const lx = 80 + i * 160, ly = 150 + Math.sin(t * 0.02 + i) * 4;
    const glow = 0.5 + 0.15 * Math.sin(t * 0.05 + i * 2);
    cx.strokeStyle = 'rgba(120,100,80,0.5)';
    cx.beginPath(); cx.moveTo(lx, 0); cx.lineTo(lx, ly - 14); cx.stroke();
    cx.fillStyle = `rgba(${lr},${lg-40},${lb},${glow * 0.25})`;
    cx.beginPath(); cx.arc(lx, ly, 26, 0, 7); cx.fill();
    cx.fillStyle = `rgba(${lr},${lg},${lb},${glow})`;
    cx.beginPath(); cx.ellipse(lx, ly, 10, 13, 0, 0, 7); cx.fill();
  }
  // ground
  cx.fillStyle = D.ground; cx.fillRect(0, 428, W, H - 428);
  cx.strokeStyle = 'rgba(232,220,192,0.12)'; cx.lineWidth = 2;
  cx.beginPath(); cx.moveTo(0, 428); cx.lineTo(W, 428); cx.stroke();
  // JF-#031: the district's gag prop, wobbling if it was just crashed into
  drawProp(PROPS[sel], PROP_X, 428);
  // JF-#031: between-wave background cameo
  if (restGag) drawRestGag();
  // JF-#017: district ambience — deterministic drift from t, no particle state
  if (sel === 0){                       // COURTYARD: falling blossom petals
    cx.fillStyle = 'rgba(232,168,184,0.55)';
    for (let i = 0; i < 12; i++){
      const py = (i * 97 + t * 0.5) % 560 - 10;
      const px = (i * 173 % W) + Math.sin(t * 0.02 + i) * 34;
      cx.save(); cx.translate(px, py); cx.rotate(t * 0.03 + i);
      cx.beginPath(); cx.ellipse(0, 0, 4, 2.2, 0, 0, 7); cx.fill(); cx.restore();
    }
  } else if (sel === 1){                // MARKET: embers rising off the braziers
    for (let i = 0; i < 10; i++){
      const ey = 470 - ((i * 83 + t * 0.9) % 480);
      const ex = (i * 199 % W) + Math.sin(t * 0.05 + i * 3) * 12;
      cx.fillStyle = `rgba(240,150,70,${0.15 + 0.4 * (ey / 470)})`;
      cx.fillRect(ex, ey, 3, 3);
    }
  } else if (sel === 2){                // TEMPLE: low incense mist banks
    for (let i = 0; i < 3; i++){
      const mx = ((t * (0.3 + i * 0.15) + i * 400) % (W + 500)) - 250;
      cx.fillStyle = `rgba(180,200,210,${0.05 + 0.02 * Math.sin(t * 0.01 + i)})`;
      cx.beginPath(); cx.ellipse(mx, 415 - i * 16, 220, 22, 0, 0, 7); cx.fill();
    }
  } else if (sel === 3){                // ROOFTOP: wind streaks tearing past
    cx.strokeStyle = 'rgba(220,230,240,0.18)'; cx.lineWidth = 1.5;
    for (let i = 0; i < 7; i++){
      const wy = i * 61 % 400 + 30, wx = W - ((i * 137 + t * 7) % (W + 200));
      cx.beginPath(); cx.moveTo(wx, wy); cx.lineTo(wx + 60 + i * 8, wy - 3); cx.stroke();
    }
  } else if (sel === 4){                // LEGEND: jade motes drifting upward
    for (let i = 0; i < 10; i++){
      const my = 540 - ((i * 89 + t * 0.4) % 560);
      const mx2 = (i * 211 % W) + Math.sin(t * 0.03 + i * 2) * 20;
      cx.fillStyle = `rgba(124,232,168,${0.12 + 0.25 * Math.abs(Math.sin(t * 0.04 + i))})`;
      cx.beginPath(); cx.arc(mx2, my, 2.5, 0, 7); cx.fill();
    }
  }
}

function draw(){
  padRects = [];   // JF-#040: cleared each frame; only S_PLAY repopulates it
  // JF-#036: portrait on a touch device — the canvas would otherwise letterbox
  // to a sliver (measured 375x211 in an 812-tall viewport). Game is already
  // auto-paused by the resize hook; just show why instead of a tiny fight.
  if (portraitBlock){
    cx.fillStyle = '#0a0d12'; cx.fillRect(0, 0, W, H);
    cx.textAlign = 'center'; cx.fillStyle = '#e8dcc0'; cx.font = 'bold 30px Georgia';
    cx.fillText('🔄', W/2, H/2 - 30);
    cx.font = 'bold 22px Georgia';
    cx.fillText('Rotate your device to play', W/2, H/2 + 16);
    cx.fillStyle = '#8a94a6'; cx.font = '15px Georgia';
    cx.fillText('Jade Fist plays in landscape', W/2, H/2 + 44);
    return;
  }
  cx.save();
  if (shake > 0.5) cx.translate((Math.random()-0.5) * shake, (Math.random()-0.5) * shake);
  drawWorld();

  // enemies
  for (const e of enemies){
    // type silhouette: viper pale+slim, iron monk grey+broad, spearman tall+pole
    // JF-#027: brighter cartoon palette (telegraph still overrides to red)
    let col = e.type === T_BOSS ? '#e0b050' : e.type === T_FAST ? '#5fd0e0' : e.type === T_BRUTE ? '#9a7fd0' : e.type === T_SPEAR ? '#5fc98a' : '#7f9cd8';
    if (e.type === T_BRUTE && (e.rage || 0) >= 2) col = '#e0705a';   // enraged tint (JF-#007)
    let punch = 0, rot = e.rot || 0, eyes = 'idle';
    const size = e.type === T_BOSS ? 1.6 : e.type === T_BRUTE ? 1.28 : e.type === T_FAST ? 0.88 : e.type === T_SPEAR ? 1.08 : 1;
    if (e.st === E_WINDUP && e.atk && e.atk !== 'strike'){
      // JF-#040: armored swing telegraph — amber DUCK / cyan JUMP / purple DODGE.
      // Never red: red is reserved for the counter/block window.
      const [tcol] = atkTell(e.atk);   // JF-#058: caption text no longer drawn
      eyes = 'angry'; col = tcol;
      const prog = Math.min(1, e.stT / e.windup), pulse = 0.5 + 0.4 * Math.sin(e.stT * 0.5);
      cx.fillStyle = tcol; cx.globalAlpha = (0.18 + prog * 0.28) * (0.7 + 0.3 * pulse);
      cx.beginPath(); cx.arc(e.x, e.y - 55, (38 + prog * 16) * size, 0, 7); cx.fill();
      cx.globalAlpha = 1;
      // JF-#058: the POSE is the telegraph now (rise for high, drop for low, both
      // arms out for grab). What's left is a SILENT target ring at the threatened
      // height — no dashed line, no words. Removed: the aim line + DUCK!/JUMP!/
      // DODGE! captions (they were compensating for windup poses that all looked
      // the same, and they were exactly the "text all over the place" problem).
      if (e.atk === 'high' || e.atk === 'low'){
        const ty = e.atk === 'high' ? GROUND_Y - 84 : GROUND_Y - 12;   // head / ankles
        const rr = (e.atk === 'high' ? 19 : 13) - prog * 5;            // tightens as it ripens
        cx.strokeStyle = tcol; cx.lineWidth = 3; cx.globalAlpha = 0.5 + 0.5 * pulse;
        cx.beginPath(); cx.arc(P.x, ty, rr, 0, 7); cx.stroke();
        cx.beginPath(); cx.moveTo(P.x - rr - 5, ty); cx.lineTo(P.x - rr + 2, ty);
        cx.moveTo(P.x + rr - 2, ty); cx.lineTo(P.x + rr + 5, ty); cx.stroke();
        cx.globalAlpha = 1;
      }
    } else if (e.st === E_WINDUP){
      const late = e.stT / e.windup > perfTh();   // final third: solid bright = NOW (JF-#025: CRANE widens)
      const flash = late || Math.sin(e.stT * 0.6) > 0;
      col = flash ? (late ? '#ff4a4a' : '#e85a5a') : '#b06a6a';   // RED telegraph = counter window
      eyes = 'angry';
      cx.fillStyle = late ? 'rgba(255,74,74,0.4)' : 'rgba(232,90,90,0.25)';
      cx.beginPath(); cx.arc(e.x, e.y - 55, ((late ? 50 : 40) + Math.sin(e.stT*0.5)*5) * size, 0, 7); cx.fill();
      // JF-#058: mid keeps a silent torso ring — the COIL pose (weight back, fist
      // chambered at the waist) is the real tell now. Dashed line + AWAY!/COUNTER!
      // captions removed.
      if (e.type !== T_BOSS){
        const ty = GROUND_Y - 48;                                    // torso line
        const prog = Math.min(1, e.stT / e.windup);
        const rr = 16 - prog * 5;
        cx.strokeStyle = '#ff4a4a'; cx.lineWidth = 3;
        cx.globalAlpha = 0.45 + 0.5 * (0.5 + 0.4 * Math.sin(e.stT * 0.5));
        cx.beginPath(); cx.arc(P.x, ty, rr, 0, 7); cx.stroke();
        cx.globalAlpha = 1;
      }
    } else if (e.st === E_FEINT){
      // feint tell: PALE flash, no red, no audio — only real telegraphs go red
      col = Math.sin(e.stT * 0.8) > 0 ? '#c8a8a0' : '#b8c8d8';
    } else if (e.st === E_STRIKE){
      col = '#e8b06a'; punch = 10; eyes = 'angry';
      // JF-#045: the swing itself sweeps THROUGH the head/ankle plane — a fading
      // swipe streak from the fist across the player's position, so a ducked
      // high swing visibly whooshes over where your head just was
      if (e.atk === 'high' || e.atk === 'low'){
        const high = e.atk === 'high';
        const ty = high ? GROUND_Y - 84 : GROUND_Y - 12;
        const dirP = Math.sign(P.x - e.x) || 1;
        const [tcol] = atkTell(e.atk);
        const sw = Math.max(0, 1 - e.stT / 10);
        // JF-#050: streak carries PAST the player (was +26 — stopped at the body,
        // which read as the swing pulling its punch when dodged)
        cx.strokeStyle = tcol; cx.globalAlpha = 0.75 * sw; cx.lineWidth = 7; cx.lineCap = 'round';
        cx.beginPath(); cx.moveTo(e.x + dirP * 20, ty); cx.lineTo(P.x + dirP * 64, ty); cx.stroke();
        cx.globalAlpha = 0.3 * sw; cx.lineWidth = 14;
        cx.beginPath(); cx.moveTo(e.x + dirP * 20, ty); cx.lineTo(P.x + dirP * 64, ty); cx.stroke();
        cx.globalAlpha = 1; cx.lineWidth = 1;
      }
    }
    else if (e.st === E_RECOVER){ col = '#7a6a9a'; rot += 0.12 * Math.sign(e.x - P.x); eyes = 'dizzy'; }  // slumped = punishable
    else if (e.st === E_STAGGER){ col = '#9a90b0'; rot += 0.2 * Math.sign(e.vx || 1); eyes = 'dizzy'; }
    else if (e.st === E_AIM){
      // JF-#059: throw wind-up — amber high / orange mid / cyan low. Wordless
      // (JF-#058 text purge): the dashed line + pulsing dot at the telegraphed
      // height IS the read now, no caption.
      eyes = 'angry';
      const tcol = PROJ_COL[e.projLine];
      const ty = projY(e.projLine);
      const prog = Math.min(1, e.stT / e.aimDur), pulse = 0.4 + 0.4 * Math.sin(e.stT * 0.5);
      cx.strokeStyle = tcol; cx.globalAlpha = 0.35 + prog * 0.4; cx.lineWidth = 2;
      cx.setLineDash([8, 8]); cx.lineDashOffset = -e.stT * 2;
      cx.beginPath(); cx.moveTo(e.x, ty); cx.lineTo(P.x + Math.sign(P.x - e.x) * 20, ty); cx.stroke();
      cx.setLineDash([]); cx.globalAlpha = 1;
      cx.fillStyle = tcol; cx.globalAlpha = pulse;
      cx.beginPath(); cx.arc(e.x, ty, 6 + prog * 4, 0, 7); cx.fill(); cx.globalAlpha = 1;
    }
    else if (e.st === E_DOWN || e.st === E_THROWN){
      eyes = 'x';
      // JF-#044: KO tumble variety — flat spin / cartwheel / sit-down slump
      if (e.koStyle === undefined) e.koStyle = (Math.random() * 3) | 0;
      if (e.koStyle === 1 && e.st === E_THROWN) rot += e.stT * 0.1;
    }
    // JF-#041: evade — a pale backflip away from your fist, unhittable till it lands
    let evY = 0;
    if (e.st === E_EVADE){
      const p = Math.min(1, e.stT / 22);
      evY = Math.sin(p * Math.PI) * 36;
      rot += -Math.sign(e.vx || 1) * p * 5.2;   // full flip in the hop direction
      col = '#c8d4e0'; eyes = 'idle';
    }
    // JF-#043: directional hit reaction — the body snaps away from the blow, decays fast
    if (e.leanT > 0) rot += e.leanDir * 0.32 * (e.leanT / 12);
    // JF-#043: stamina wobble — below half hp they visibly pant and sweat, so the
    // pips aren't the only wounded read and the finish feels earned
    const winded = e.hpMax > 1 && e.hp <= e.hpMax / 2 &&
      (e.st === E_WALK || e.st === E_STAGGER || e.st === E_RECOVER);
    if (winded){
      rot += Math.sin(t * 0.18 + e.x * 0.05) * 0.045;
      if (t % 46 === 0) parts.push({ x: e.x + 10, y: e.y - 96, vx: 1.2, vy: -1.5,
        life: 22, col: '#9ad8f0', sz: 2.4 });
    }
    // JF-#041: attack POSES sell the line — a low sweep crouches to ankle height
    // (jump clears it), a high swing cocks and lashes at head height (duck slips it)
    const atkActive = e.st === E_WINDUP || e.st === E_STRIKE;
    const epose = atkActive && e.atk === 'low' ? 'duck' : '';
    // squash: pop on spawn-walk and squish when knocked down
    let squash = (e.st === E_DOWN || e.st === E_THROWN) ? -0.5 : 0;
    if (squash < 0 && e.koStyle === 2){ squash = -0.75; rot *= 0.3; }   // JF-#044: sit-down slump
    fighter(e.x, e.y - evY, e.face || -e.side, {   // JF-#057: live facing (was -e.side, stale from spawn)
      col, punch, rot, size, eyes, squash,
      pose: epose,
      // ('strike' is the internal name for the mid line — normalize so the pose reads)
      line: atkActive ? ((!e.atk || e.atk === 'strike') ? 'mid' : e.atk) : null,
      // JF-#058: explicit windup/strike phase — the pose branches key off this
      // instead of inferring "am I striking?" from arm length (punch > 0)
      phase: e.st === E_WINDUP ? 'wind' : e.st === E_STRIKE ? 'strike' : '',
      sash: e.elite ? '#e8c76a' : e.type === T_BOSS ? '#a02828' : e.type === T_BRUTE ? '#3a3050' : e.type === T_SPEAR ? '#2a6a48' : '#a04848',   // JF-#043: elites wear gold
      spear: e.type === T_SPEAR,
      guard: e.guard > 0 && (e.st === E_WALK || e.st === E_STAGGER),
      guardLine: e.guardLine
    });
    // hp pips: one dot per good read still owed — JF-#039: every multi-hit
    // duelist shows them (Punch-Out reads need visible progress), boss biggest
    if (e.hpMax > 1 && e.st !== E_THROWN && e.st !== E_DOWN){
      const pr = e.type === T_BOSS ? 5 : 3.5, ps = pr * 3.2;
      const py = e.y - (e.type === T_BOSS ? 160 : 112 + (size - 1) * 44);
      for (let i = 0; i < e.hpMax; i++){
        cx.fillStyle = i < e.hp ? '#e86a6a' : 'rgba(140,148,166,0.35)';
        cx.beginPath(); cx.arc(e.x - (e.hpMax - 1) * ps / 2 + i * ps, py, pr, 0, 7); cx.fill();
      }
    }
  }

  // JF-#028: thrown spears in flight — colored by the height they demand
  for (const d of darts){
    const dir = Math.sign(d.vx) || 1, tip = d.x + dir * 22, tc = PROJ_COL[d.line];   // JF-#059
    cx.strokeStyle = 'rgba(200,190,170,0.3)'; cx.lineWidth = 2;   // motion streak
    cx.beginPath(); cx.moveTo(d.x - dir * 26, d.y0); cx.lineTo(d.x, d.y0); cx.stroke();
    if (d.cleaver){                    // JF-#034: the Butcher's spinning cleaver
      cx.save(); cx.translate(d.x, d.y0); cx.rotate(d.spin || 0);
      cx.fillStyle = '#cdd4dc'; cx.strokeStyle = OUT; cx.lineWidth = 2;
      cx.beginPath(); cx.rect(-9, -8, 18, 13); cx.fill(); cx.stroke();
      cx.strokeStyle = OUT; cx.lineWidth = 4; cx.beginPath(); cx.moveTo(9, 5); cx.lineTo(16, 9); cx.stroke();
      cx.strokeStyle = tc; cx.lineWidth = 2; cx.beginPath(); cx.moveTo(-9, 6); cx.lineTo(9, 6); cx.stroke();
      cx.restore();
    } else {                           // spearman's thrown spear
      cx.strokeStyle = OUT; cx.lineWidth = 6; cx.lineCap = 'round';
      cx.beginPath(); cx.moveTo(d.x - dir * 16, d.y0); cx.lineTo(tip, d.y0); cx.stroke();
      cx.strokeStyle = '#a8906a'; cx.lineWidth = 3;
      cx.beginPath(); cx.moveTo(d.x - dir * 16, d.y0); cx.lineTo(tip, d.y0); cx.stroke();
      cx.fillStyle = tc;
      cx.beginPath(); cx.moveTo(tip, d.y0 - 5); cx.lineTo(tip + dir * 12, d.y0); cx.lineTo(tip, d.y0 + 5); cx.closePath(); cx.fill();
      cx.strokeStyle = OUT; cx.lineWidth = 1.5; cx.stroke();
    }
  }

  // player
  const pcol = hurtFlash > 0 && (hurtFlash & 2) ? '#e86a6a' : wearCol();   // JF-#023
  // JF-#059: no more jump arc — player stays grounded, so the shadow is just
  // the plain-vs-crouch width swap (was also shrinking/fading with jump height).
  const pPose = P.duckT > 0 ? 'duck' : '';
  cx.fillStyle = 'rgba(8,10,14,0.32)';
  cx.beginPath();
  cx.ellipse(P.x, GROUND_Y + 4, pPose === 'duck' ? 34 : 22, 6, 0, 0, 7);
  cx.fill();
  // JF-#042: back-step evade — a quick lean-and-slide away, then spring back
  const backP = P.backT > 0 ? Math.sin((P.backT / BACK_DUR) * Math.PI) : 0;
  // JF-#044: the hero FLOURISH — three quick beats: arm sweep, snap punches, settle.
  // White motion arcs swing around the body like a wire-fu frame.
  let flPunch = 0, flRot = 0;
  if (P.flourishT > 0){
    const fp = 1 - P.flourishT / 40;
    flPunch = Math.abs(Math.sin(fp * Math.PI * 3)) * 11;
    flRot = Math.sin(fp * Math.PI * 2) * 0.14;
    cx.strokeStyle = `rgba(240,234,210,${0.45 * (1 - fp)})`; cx.lineWidth = 3; cx.lineCap = 'round';
    const a0 = fp * Math.PI * 4;
    cx.beginPath(); cx.arc(P.x, P.y - 56, 46, a0, a0 + 1.4); cx.stroke();
    cx.beginPath(); cx.arc(P.x, P.y - 56, 34, -a0, -a0 + 1.1); cx.stroke();
  }
  fighter(P.x + P.backDir * backP * 26 + (grapple ? Math.sin(t * 1.2) * 3 : 0), P.y, P.face, { col: pcol, sash: BELTS[beltOf(save.kills + kills)].col,   // JF-#044: grapple tremble
    punch: Math.max(P.punchT, flPunch), pose: pPose,
    rot: (run.drunken ? Math.sin(t * 0.14) * 0.1 : 0) + P.backDir * backP * 0.22 + flRot,   // JF-#032 sway + JF-#042 lean + JF-#044 flourish
    // JF-#041/#059: crouch = low-line read; risen = the same high-line rise
    // pose the enemies use for their own high attack (highAction/UP).
    line: P.duckT > 0 && P.punchT > 0 ? 'low' : P.riseT > 0 ? 'high' : null,
    phase: P.riseT > 0 ? 'strike' : '',
    acc: wornAcc(),   // JF-#033
    eyes: P.punchT > 0 || hurtFlash > 0 ? 'angry' : 'idle' });

  // particles
  for (const p of parts){
    cx.globalAlpha = Math.min(1, p.life / 15);
    if (p.star){ drawStar(p.x, p.y, (p.sz || 2) + 2, p.col, (p.rot || 0) + p.life * 0.2); }
    else { cx.fillStyle = p.col; cx.beginPath(); cx.arc(p.x, p.y, p.sz || 2.4, 0, 7); cx.fill(); }
  }
  cx.globalAlpha = 1;

  // JF-#053: counter flourish — expanding double ring + radial speed lines at
  // the impact point, riding the bullet time. Pure motion, zero words.
  if (P.ctrFlashT > 0){
    const p = P.ctrFlashT / 16, r0 = (1 - p) * 90 + 18;
    cx.strokeStyle = '#e8c76a'; cx.globalAlpha = p * 0.9; cx.lineWidth = 4;
    cx.beginPath(); cx.arc(P.ctrX, P.ctrY, r0, 0, 7); cx.stroke();
    cx.globalAlpha = p * 0.5; cx.lineWidth = 2;
    cx.beginPath(); cx.arc(P.ctrX, P.ctrY, r0 * 0.62, 0, 7); cx.stroke();
    for (let i = 0; i < 8; i++){
      const a = i * Math.PI / 4 + 0.35;
      cx.beginPath(); cx.moveTo(P.ctrX + Math.cos(a) * (r0 + 8), P.ctrY + Math.sin(a) * (r0 + 8));
      cx.lineTo(P.ctrX + Math.cos(a) * (r0 + 26 + p * 14), P.ctrY + Math.sin(a) * (r0 + 26 + p * 14)); cx.stroke();
    }
    cx.globalAlpha = 1; cx.lineWidth = 1;
  }
  // JF-#053: while the counter window is armed, the player glows jade — the
  // visual "NOW you may counter" cue (replaces any text prompt)
  if (readyT > 0 && state === S_PLAY){
    const g = 0.25 + 0.2 * Math.sin(t * 0.4) + 0.35 * (readyT / READY_DUR);
    cx.strokeStyle = '#7ce8a8'; cx.globalAlpha = Math.min(0.8, g); cx.lineWidth = 3;
    cx.beginPath(); cx.arc(P.x, P.y - 55, 46, 0, 7); cx.stroke();
    cx.globalAlpha = 1; cx.lineWidth = 1;
  }

  // popups — JF-#027: comic pop-in (springy scale), jaunty tilt, cel outline
  cx.textAlign = 'center';
  for (const p of popups){
    const age = 46 - p.life;
    const sc = age < 5 ? 0.4 + age * 0.16 : Math.max(1, 1.2 - (age - 5) * 0.04);
    const tilt = Math.sin(p.x * 0.7) * 0.07;
    cx.save();
    cx.globalAlpha = Math.min(1, p.life / 16);
    cx.translate(p.x, p.y); cx.rotate(tilt); cx.scale(sc, sc);
    cx.font = (p.big ? 'bold 26px ' : 'bold 18px ') + COMIC;
    cx.lineJoin = 'round'; cx.strokeStyle = OUT; cx.lineWidth = p.big ? 5 : 4;
    cx.strokeText(p.txt, 0, 0);
    cx.fillStyle = p.col; cx.fillText(p.txt, 0, 0);
    cx.restore();
  }
  cx.globalAlpha = 1;
  cx.restore();

  // JF-#043: counter CLASH — a perfect counter freezes the moment: the screen
  // drops dark, a white burst spikes at the point of contact. hitStop holds the
  // world still underneath, so it reads as a freeze-frame, not an effect.
  if (clashT > 0){
    const cp = clashT / 10;
    cx.fillStyle = `rgba(6,8,12,${0.5 * cp})`;
    cx.fillRect(0, 0, W, H);
    cx.globalAlpha = cp;
    drawStar(clashX, clashY, 60 + (1 - cp) * 50, '#ffffff', clashT * 0.25);
    drawStar(clashX, clashY, 30 + (1 - cp) * 24, '#e8c76a', -clashT * 0.35);
    cx.strokeStyle = `rgba(255,255,255,${0.7 * cp})`; cx.lineWidth = 3;
    cx.beginPath(); cx.arc(clashX, clashY, 40 + (1 - cp) * 90, 0, 7); cx.stroke();
    cx.globalAlpha = 1;
  }

  // ------------------------------------------------------------- HUD ----
  cx.textAlign = 'center'; cx.fillStyle = '#e8dcc0';
  if (state === S_PLAY){
    // JF-#044: DESPERATION — one heart left pulses the screen edges red
    if (hearts === 1){
      const dp = 0.22 + 0.12 * Math.sin(t * 0.1);
      const vg2 = cx.createRadialGradient(W/2, H/2, H * 0.32, W/2, H/2, H * 0.78);
      vg2.addColorStop(0, 'rgba(200,40,40,0)'); vg2.addColorStop(1, `rgba(200,40,40,${dp})`);
      cx.fillStyle = vg2; cx.fillRect(0, 0, W, H);
    }
    cx.font = 'bold 30px Georgia';
    cx.fillText(score, W/2, 46);
    // wave counter, top right under the mute button
    cx.fillStyle = '#c8bfa8'; cx.font = 'bold 16px Georgia'; cx.textAlign = 'right';
    cx.fillText('WAVE ' + wave, W - 18, 60);
    cx.textAlign = 'center';
    // big center banner (wave open/clear, boss beats)
    if (bannerT > 0){
      cx.globalAlpha = Math.min(1, bannerT / 30);
      cx.save(); cx.translate(W/2, 170); cx.rotate(-0.02);
      cx.font = 'bold 34px ' + COMIC; cx.lineJoin = 'round';
      cx.strokeStyle = OUT; cx.lineWidth = 7; cx.strokeText(bannerTxt, 0, 0);
      cx.fillStyle = bannerCol; cx.fillText(bannerTxt, 0, 0);
      cx.restore();
      cx.globalAlpha = 1;
    }
    cx.fillStyle = '#e8dcc0';
    if (combo > 1){
      // JF-#043: FLOW — counters, hits, AND dodges/parries all feed one chain
      cx.fillStyle = '#7ce8a8'; cx.font = 'bold 20px Georgia';
      cx.fillText('×' + Math.min(combo, 5) + ' FLOW', W/2, 72);
      const bw = 120 * (comboT / CW);                // visible combo-decay bar
      cx.fillStyle = 'rgba(124,232,168,0.6)';
      cx.fillRect(W/2 - bw/2, 80, bw, 4);
    }
    // hearts
    const maxH = Math.max(1, 3 + save.up.body + omen.heart + TUNE.heartsD + (run.ox ? 1 : 0));   // JF-#025; JF-#049 knob
    cx.font = '22px Georgia'; cx.textAlign = 'left'; cx.fillStyle = '#e86a6a';
    cx.fillText('♥ '.repeat(Math.max(0, hearts)) + '♡ '.repeat(Math.max(0, maxH - hearts)), 20, 40);
    if (windAvail){ cx.fillStyle = '#7ce8a8'; cx.font = '15px Georgia'; cx.fillText('second wind ready', 20, 62); }
    // JF-#010: palm-wave fuel — one gold pip per consecutive perfect
    if (hasTech(2)){
      for (let i = 0; i < 3; i++){
        cx.fillStyle = i < perfChain ? '#e8c76a' : 'rgba(140,148,166,0.3)';
        cx.beginPath(); cx.arc(W/2 - 16 + i * 16, 94, 5, 0, 7); cx.fill();
      }
    }
    cx.fillStyle = '#7ce8a8'; cx.font = '17px Georgia';
    cx.fillText('◆ ' + jadeRun, 20, windAvail ? 84 : 62);
    if (msgT > 0){
      cx.globalAlpha = Math.min(1, msgT / 40);
      cx.fillStyle = '#c8bfa8'; cx.font = '17px Georgia'; cx.textAlign = 'center';
      cx.fillText(msg, W/2, 120);
      cx.globalAlpha = 1;
    }
    // JF-#062: guided-teach coach overlay (captions + ripe-windup nudge + SKIP)
    if (tut.active){
      const dummy = enemies.find(e => e.tut);
      const ripe = dummy && dummy.st === E_WINDUP && dummy.stT > dummy.windup * 0.45;
      cx.textAlign = 'center';
      // teach the LOOP: unarmed -> DODGE to arm, armed -> COUNTER. The prompt
      // always names the correct next action, so the player never stalls.
      const wantDodge = tut.step === 0 || readyT <= 0;
      cx.font = 'bold 14px Georgia'; cx.fillStyle = '#8a94a6';
      cx.fillText('TRAINING', W/2, 150);
      cx.font = 'bold 23px Georgia'; cx.fillStyle = '#e8dcc0';
      cx.fillText(wantDodge
        ? (TOUCH ? 'When he flashes RED — tap AWAY to DODGE' : 'When he flashes RED — press ◀ or ▶ AWAY to DODGE')
        : (TOUCH ? 'ARMED! Now tap INTO his RED to COUNTER' : 'ARMED! Now STRIKE ◀ / ▶ into his RED to COUNTER'),
        W/2, 178);
      if (tut.step === 1){
        cx.font = '15px Georgia'; cx.fillStyle = '#7ce8a8';
        cx.fillText('counters  ' + tut.counters + ' / ' + TUT_GOAL, W/2, 200);
      }
      if (ripe){
        cx.globalAlpha = 0.6 + 0.4 * Math.sin(t * 0.3);
        cx.font = 'bold 22px ' + COMIC; cx.fillStyle = wantDodge ? '#f0b24a' : '#7ce8a8';
        cx.fillText(wantDodge ? 'DODGE!' : 'COUNTER!', W/2, 232);
        cx.globalAlpha = 1;
      }
      const bw = 96, bh = 34, bx = W - bw - 16, by = H - bh - 16;

    const gl = 0.7 + 0.3 * Math.sin(t * 0.06);
    cx.fillStyle = `rgba(124,232,168,${gl * 0.25})`;
    cx.beginPath(); cx.arc(W/2, 190, 70, 0, 7); cx.fill();
    cx.fillStyle = '#7ce8a8'; cx.font = 'bold 54px Georgia';
    cx.fillText('◆', W/2, 210);
    cx.fillStyle = '#e8c76a'; cx.font = 'bold 38px Georgia';
    cx.fillText('THE JADE IS RECLAIMED', W/2, 290);
    cx.fillStyle = '#e8dcc0'; cx.font = '19px Georgia';
    cx.fillText('The thief is felled. The school stands. Your name is spoken in four districts.', W/2, 334);
    cx.fillStyle = '#c8a8e8';
    cx.fillText('LEGEND unlocked — the tale retold, without end.', W/2, 366);
    if ((t / 30 | 0) % 2 === 0){
      cx.fillStyle = '#e8dcc0'; cx.font = 'bold 20px Georgia';
      cx.fillText('— continue —', W/2, 430);
    }
  }
  // JF-#022: bot banner so a fairness pass is never mistaken for play
  if (BOT){
    cx.fillStyle = '#c8a8e8'; cx.font = 'bold 14px Georgia'; cx.textAlign = 'left';
    cx.fillText(BOT.done ? 'FAIRNESS SUITE DONE — see console' :
      'BOT ' + (BOT.run + 1) + '/' + (BOT.runs * 4) + ' · react ' + BOT.react + 'f', 20, H - 14);
  }
  // JF-#037: QA-only SDK readout (?debug=1)
  if (DEBUG){
    cx.fillStyle = '#8a94a6'; cx.font = 'bold 13px Georgia'; cx.textAlign = 'left';
    cx.fillText('sdkLive:' + sdkLive + '  adblock:' + CG.adblockDetected + '  portrait:' + portraitBlock, 20, H - 30);
  }
  // JF-#014: pause overlay on top of the frozen world
  if (state === S_PAUSE){
    cx.fillStyle = 'rgba(10,13,18,0.72)'; cx.fillRect(0, 0, W, H);
    cx.textAlign = 'center';
    cx.fillStyle = '#e8c76a'; cx.font = 'bold 42px Georgia';
    cx.fillText('PAUSED', W/2, H/2 - 10);
    cx.fillStyle = '#e8dcc0'; cx.font = '19px Georgia';
    cx.fillText(TOUCH ? 'Tap to resume' : 'P or any key to resume', W/2, H/2 + 34);
  }
  // JF-#037: mute button drawn AFTER the pause overlay (was before — the
  // overlay hid it while its click hitbox stayed live, so a tap in that
  // corner during pause silently muted instead of resuming as promised)
  cx.fillStyle = 'rgba(232,220,192,0.6)'; cx.font = '20px Georgia'; cx.textAlign = 'right';
  cx.fillText(Snd.muted ? '🔇' : '🔊', W - 18, 34);
}

// ------------------------------------------------------------------ loop ----
let last = 0, acc = 0;
const STEP = 1000 / 60;
function loop(ts){
  requestAnimationFrame(loop);
  if (!last) last = ts;
  acc += Math.min(ts - last, 100); last = ts;
  while (acc >= STEP){ update(); acc -= STEP; }
  // JF-#021: one intensity knob feeds the music every frame
  const bossUp = enemies.some(e => e.type === T_BOSS && e.st !== E_DOWN && e.st !== E_THROWN);
  const inten =
    state === S_PLAY ? Math.min(1, 0.32 + difficulty * 0.045 + Math.min(combo, 8) * 0.025 + (bossUp ? 0.18 : 0) + (hearts === 1 ? 0.15 : 0)) :   // JF-#044: desperation kick
    state === S_MENU || state === S_STORY ? 0.15 :
    state === S_DEAD ? (won ? 0.3 : 0.1) :
    state === S_END ? 0.35 : 0;      // S_PAUSE fades to silence
  Snd.music(document.hidden ? 0 : inten, bossUp && state === S_PLAY);
  draw();
}
requestAnimationFrame(loop);
document.addEventListener('visibilitychange', () => {
  last = 0; acc = 0;
  if (document.hidden) pauseGame();   // JF-#014: CG requires auto-pause on blur
});
// JF-#037: CG hosts games inside an iframe. A player clicking elsewhere on the
// CG page (comments, related games) blurs this window WITHOUT the tab itself
// becoming hidden, so visibilitychange alone misses it — window.blur catches
// the iframe-focus case visibilitychange can't see.
addEventListener('blur', () => { last = 0; acc = 0; pauseGame(); });
</script>
</body>
