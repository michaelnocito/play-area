<script>
'use strict';
// ============================================================================
// JADE FIST — kung fu counter-brawler prototype (JF-#001)
// Single file, canvas + vanilla JS, procedural art + WebAudio. No assets.
// Verbs: STRIKE (tap toward an enemy) / COUNTER (strike during their red
// telegraph flash -> throw, knocks down neighbors) / combo chain multiplier.
// ============================================================================

const W = 960, H = 540;
const cv = document.getElementById('c'), cx = cv.getContext('2d');
let scale = 1;
// JF-#015: back the canvas at devicePixelRatio so it stays crisp on hi-dpi
// displays (CG requirement). All game code keeps drawing in 960x540 logical
// coords — the base transform maps them to physical pixels.
// JF-#036: on a touch device held portrait, fit() pins to width and the
// canvas shrinks to a thin strip (measured: 375x211 inside an 812-tall
// viewport — ~74% of the screen is unused black bars) with no way to tell
// the player why. portraitBlock freezes the run and draw() shows a rotate
// prompt instead until the device is turned; matchMedia is used directly
// here since TOUCH isn't defined until later in the file.
// (state/pauseGame don't exist yet at this point in the file — the actual
// auto-pause-on-portrait wiring lives further down, once they're declared.)
let portraitBlock = false;
function fit(){
  const ww = innerWidth, wh = innerHeight;
  const dpr = window.devicePixelRatio || 1;
  portraitBlock = matchMedia('(pointer:coarse)').matches && wh > ww;
  scale = Math.min(ww / W, wh / H);
  cv.width = Math.round(W * scale * dpr);
  cv.height = Math.round(H * scale * dpr);
  cv.style.width = (W * scale) + 'px';
  cv.style.height = (H * scale) + 'px';
  cx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);
}
addEventListener('resize', fit); fit();

// ---------------------------------------------------------------- audio ----
// Layered voices per the speaker-scaling architecture: transient click
// 2-5kHz + mid body 200-500Hz + harmonic bass; sub sine as parallel garnish.
const Snd = (() => {
  let ac = null, master = null, muted = localStorage.getItem('jf_mute') === '1';
  function ensure(){
    if (!ac){
      ac = new (window.AudioContext || window.webkitAudioContext)();
      master = ac.createGain(); master.gain.value = muted ? 0 : 0.8;
      master.connect(ac.destination);
    }
    if (ac.state === 'suspended') ac.resume();
  }
  function env(g, t0, a, peak, dur){
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(peak, t0 + a);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  }
  function tone(freq, dur, type, peak, when, bend){
    const t0 = ac.currentTime + (when || 0);
    const o = ac.createOscillator(), g = ac.createGain();
    o.type = type || 'sine'; o.frequency.setValueAtTime(freq, t0);
    if (bend) o.frequency.exponentialRampToValueAtTime(bend, t0 + dur);
    env(g, t0, 0.004, peak, dur);
    o.connect(g); g.connect(master); o.start(t0); o.stop(t0 + dur + 0.02);
  }
  function noise(dur, peak, hp, when){
    const t0 = ac.currentTime + (when || 0);
    const n = Math.floor(ac.sampleRate * dur);
    const buf = ac.createBuffer(1, n, ac.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / n);
    const s = ac.createBufferSource(); s.buffer = buf;
    const f = ac.createBiquadFilter(); f.type = 'highpass'; f.frequency.value = hp || 1000;
    const g = ac.createGain(); env(g, t0, 0.003, peak, dur);
    s.connect(f); f.connect(g); g.connect(master); s.start(t0);
  }
  // JF-#021: reactive music — an A-pentatonic pluck bed over a two-voice drone.
  // One knob (intensity 0..1) drives tempo, note density, register, and drone
  // swell; a boss on screen adds a low taiko pulse. Runs off the same master
  // gain so mute covers it; intensity 0 = silence (pause/blur fade out).
  let mGain = null, droneGain = null, mNext = 0, mBeat = 0;
  const PENT = [220, 261.6, 293.7, 329.6, 392, 440, 523.3, 587.3, 659.3];
  function mEnsure(){
    if (mGain) return;
    mGain = ac.createGain(); mGain.gain.value = 0; mGain.connect(master);
    droneGain = ac.createGain(); droneGain.gain.value = 0; droneGain.connect(mGain);
    const d1 = ac.createOscillator(); d1.type = 'sine'; d1.frequency.value = 55;
    const d2 = ac.createOscillator(); d2.type = 'triangle'; d2.frequency.value = 110.4;
    d1.connect(droneGain); d2.connect(droneGain); d1.start(); d2.start();
    mNext = ac.currentTime + 0.1;
  }
  function pluck(freq, when, vel){
    const o = ac.createOscillator(), g = ac.createGain(), f = ac.createBiquadFilter();
    o.type = 'triangle'; o.frequency.value = freq;
    f.type = 'lowpass';
    f.frequency.setValueAtTime(freq * 4, when);
    f.frequency.exponentialRampToValueAtTime(freq * 1.5, when + 0.3);
    g.gain.setValueAtTime(0.0001, when);
    g.gain.exponentialRampToValueAtTime(vel, when + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, when + 0.55);
    o.connect(f); f.connect(g); g.connect(mGain);
    o.start(when); o.stop(when + 0.6);
  }
  function thump(when){
    const o = ac.createOscillator(), g = ac.createGain();
    o.type = 'sine'; o.frequency.setValueAtTime(70, when);
    o.frequency.exponentialRampToValueAtTime(42, when + 0.18);
    g.gain.setValueAtTime(0.0001, when);
    g.gain.exponentialRampToValueAtTime(0.9, when + 0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, when + 0.28);
    o.connect(g); g.connect(mGain); o.start(when); o.stop(when + 0.3);
  }
  return {
    get muted(){ return muted; },
    toggleMute(){
      muted = !muted; localStorage.setItem('jf_mute', muted ? '1' : '0');
      if (master) master.gain.value = muted ? 0 : 0.8;
    },
    unlock(){ ensure(); },
    music(intensity, boss){
      if (!ac) return;              // no context until the first user gesture
      mEnsure();
      mGain.gain.setTargetAtTime(intensity * 0.14, ac.currentTime, 0.6);
      droneGain.gain.setTargetAtTime(intensity * 0.5, ac.currentTime, 1.4);
      const spb = 60 / (64 + intensity * 76);        // eighth-note interval
      while (mNext < ac.currentTime + 0.2){
        mBeat++;
        if (intensity > 0.02 && Math.random() < intensity * 0.85){
          const span = 3 + Math.round(intensity * (PENT.length - 3));
          pluck(PENT[(Math.random() * span) | 0], mNext, 0.4 + Math.random() * 0.3);
        }
        if (boss && mBeat % 4 === 0) thump(mNext);
        mNext += spb;
      }
    },
    whoosh(){ ensure(); noise(0.09, 0.25, 2200); },
    // JF-#061: COMPOUND HIT, tiered to match the hit-stop. Capcom bundles hit
    // effects, sounds, and damage motion into one strength tier (SF Seminar
    // Hour 11), so `strength` here is the same 8/12/16 tier the freeze uses.
    // Three envelopes: transient (noise click) + body (pitch-dropping tone —
    // the part that reads as WEIGHT) + sub. The envelope must roughly SPAN the
    // freeze: a 16F (267ms) hit-stop behind a 60ms tick leaves 200ms of silent
    // frozen frames and the freeze reads as a bug, not as impact.
    hit(combo, strength){
      ensure();
      const p = Math.min(combo, 8);
      const s = strength || HS_MED;
      const dur = s / 60;                              // envelope spans the freeze
      const heavy = s >= HS_HEAVY, light = s <= HS_LIGHT;
      noise(light ? 0.04 : 0.06, light ? 0.38 : 0.55, heavy ? 1800 : 2500);   // transient: heavier = darker
      tone(220 * Math.pow(1.06, p), Math.max(0.09, dur * 0.6), 'square', light ? 0.16 : 0.22);
      // body: bigger pitch drop + lower floor as strength climbs = more weight
      tone(heavy ? 110 : 90, Math.max(0.12, dur), 'sine', heavy ? 0.5 : 0.4, 0, heavy ? 38 : 55);
      tone(heavy ? 44 : 52, Math.max(0.14, dur * 1.1), 'sine', heavy ? 0.38 : 0.3);
    },
    counter(){
      ensure();
      noise(0.06, 0.6, 3000);
      tone(660, 0.5, 'sine', 0.28);                    // gong shimmer
      tone(662.5, 0.5, 'sine', 0.2);                   // beat frequency = gong wobble
      tone(110, 0.3, 'triangle', 0.35, 0, 70);
      tone(48, 0.3, 'sine', 0.35);
      tone(392, 0.26, 'sine', 0.2, 0.02, 784);         // JF-#061: RISING octave — the counter's audio signature, nothing else rises
    },
    hurt(){
      ensure();
      noise(0.12, 0.5, 800);
      tone(140, 0.25, 'sawtooth', 0.25, 0, 60);
      tone(45, 0.3, 'sine', 0.4);
    },
    ko(){
      ensure();
      tone(180, 0.7, 'triangle', 0.3, 0, 40);
      tone(44, 0.8, 'sine', 0.45);
      noise(0.3, 0.3, 400, 0.05);
    },
    windup(frames){ ensure(); tone(320, frames / 60, 'sine', 0.12, 0, 520); },
    // JF-#061: block is DULL on purpose — the outcome should be identifiable
    // with your eyes shut (the audio half of SF6's X-vs-O logic). Block = no
    // pitch drop, filtered, muted. Hit = full spectrum + pitch drop. Counter =
    // adds a rising pitched interval nothing else has.
    block(){
      ensure();
      noise(0.045, 0.32, 1400);                        // duller thud, not a bright clank
      tone(300, 0.07, 'triangle', 0.14);               // flat: deliberately no bend
      tone(150, 0.09, 'sine', 0.16);
    },
    tick(){ ensure(); tone(880, 0.05, 'sine', 0.15); },
    best(){ ensure(); [523,659,784].forEach((f,i)=>tone(f, 0.25, 'sine', 0.2, i*0.09)); }
  };
})();

// SDK:ADAPTER:BEGIN (JF-#024: make-alt-builds.ps1 swaps this block per platform)
// -------------------------------------------------- CrazyGames SDK (JF-#013) --
// Adapter copied from rooftop-sprint: graceful no-op offline. sdkLive = init()
// actually resolved (only true on the CG platform); every game/ad call is gated
// on it — calling the SDK pre-init or off-platform just logs errors and is dropped.
let sdkLive = false;
// JF-#037: CG's own SDK throttles gameplayStart/Stop/happytime to 1/sec and
// logs a console error past that. JF-#036 gated all three behind ONE shared
// timestamp — proven live to be wrong: gameplayStop() and happytime() fire
// back-to-back in the same tick on every victory (see line ~990), so the
// shared gate silently ate happytime() on 100% of wins, and a fast player
// restarting within 1.1s of a run ending could just as easily have their
// next gameplayStart() dropped too. Each call now gets its own timestamp —
// still throttles repeats of ITSELF, no longer cross-blocks a different call.
const gpLast = { start: 0, stop: 0, happy: 0 };
function gpGate(key, fn){ const now = Date.now(); if (now - gpLast[key] < 1100) return; gpLast[key] = now; fn(); }
// JF-#037: a hung SDK.init() promise (network/CDN issue) must not blank the
// whole game forever — JF-#036 hid the canvas until this callback fires, so
// give it a hard timeout and reveal regardless if the SDK never answers.
let cgReady = false;
function cgReadyOnce(cb){ if (cgReady) return; cgReady = true; cb(); }
const CG = {
  init(cb){
    const done = () => cgReadyOnce(cb);
    setTimeout(done, 6000);   // JF-#037: safety net — see cgReadyOnce above
    try{ if(window.CrazyGames?.SDK){ window.CrazyGames.SDK.init().then(()=>{ sdkLive = true; done(); }).catch(done); return; } }catch(e){}
    done();
  },
  loadingStart(){ try{ if(sdkLive) window.CrazyGames.SDK.game.loadingStart(); }catch(e){} },
  loadingStop(){ try{ if(sdkLive) window.CrazyGames.SDK.game.loadingStop(); }catch(e){} },
  gameplayStart(){ gpGate('start', () => { try{ if(sdkLive) window.CrazyGames.SDK.game.gameplayStart(); }catch(e){} }); },
  gameplayStop(){ gpGate('stop', () => { try{ if(sdkLive) window.CrazyGames.SDK.game.gameplayStop(); }catch(e){} }); },
  happytime(){ gpGate('happy', () => { try{ if(sdkLive) window.CrazyGames.SDK.game.happytime(); }catch(e){} }); },
  // JF-#026: CG leaderboards are INVITE-ONLY (one board/game, weekly seasons).
  // Local Hall of Legends ships now; when invited, wire the score submit here.
  submitScore(s){},
  // JF-#036: never resolve until the ad module actually reports done/errored —
  // callers must NOT call gameplayStart() until this fires, so an ad never
  // overlaps a run the SDK thinks is already "playing". JF-#037: a hung ad
  // module (adStarted fires, then nothing) must not soft-lock the menu
  // forever either — same timeout-and-continue pattern as CG.init.
  interstitial(cb){
    this.checkAdblock();   // JF-#038: re-check right before the first real ad request —
    let done = false;      // adblock detectors can populate late, so the one-shot check
    const fire = () => { if (done) return; done = true; cb&&cb(); };
    setTimeout(fire, 8000);
    try{ if(sdkLive && window.CrazyGames?.SDK?.ad?.requestAd){
      window.CrazyGames.SDK.ad.requestAd("midgame", {
        adStarted(){}, adFinished: fire, adError: fire,
      }); return;
    } }catch(e){}
    fire();
  },
  rewarded(onReward){
    this.checkAdblock();   // JF-#038: see interstitial() above
    let done = false;
    const fire = () => { if (done) return; done = true; onReward&&onReward(); };
    setTimeout(fire, 8000);   // JF-#037: same hang guard as interstitial
    try{ if(sdkLive && window.CrazyGames?.SDK?.ad?.requestAd){
      window.CrazyGames.SDK.ad.requestAd("rewarded", {
        adStarted(){}, adFinished: fire, adError: fire,
      }); return;
    } }catch(e){}
    fire();
  },
  // JF-#036: QA-only adblock visibility (debug=1) — silent try/catch swallowed
  // this before, so there was no way to tell "adblocked" from "ad just didn't fire".
  adblockDetected: false,
  checkAdblock(){ try{ if(sdkLive && window.CrazyGames?.SDK?.ad?.hasAdblock !== undefined) this.adblockDetected = !!window.CrazyGames.SDK.ad.hasAdblock; }catch(e){} },
};
// Single-file game: everything is already parsed by init time, so loading
// start/stop bracket only the SDK handshake itself. Canvas stays hidden until
// this fires so the CG loading bracket matches what the player can actually
// see/touch (JF-#036 — previously the game was rendering/interactive before
// loadingStart/Stop ever ran, since the script's synchronous parse finishes
// long before the async SDK.init() promise resolves).
CG.init(() => { CG.loadingStart(); CG.loadingStop(); CG.checkAdblock(); cv.style.opacity = 1; });
// SDK:ADAPTER:END

// ----------------------------------------------------------------- state ----
// ------------------------------------------------------- progression save ---
// localStorage save = free cloud sync on CrazyGames (Automatic Progress Save
// backs up localStorage for HTML5 games; Data Module syncs for logged-in users).
// Design rule (Rooftop §4 research): upgrades compress the warm-up / add options,
// never raise the skill ceiling; ~×2 cost per tier; first buy within 1-2 runs.
const SAVE_KEY = 'jf_save_v1';
let save = { jade: 0, up: { body: 0, palm: 0, focus: 0, wind: 0 },
             kills: 0, ach: {}, day: '', streak: 0, dist: 0, tday: '', tdone: [0,0,0], intro: 0, tut: 0,
             cos: { own: [1,0,0,0,0], wear: 0 }, hall: [[],[],[],[],[]] };
try {
  const s = JSON.parse(localStorage.getItem(SAVE_KEY));
  if (s && s.up) save = {
    jade: s.jade | 0, up: Object.assign(save.up, s.up),
    kills: s.kills | 0, ach: s.ach || {}, day: s.day || '', streak: s.streak | 0,
    dist: s.dist | 0, tday: s.tday || '', tdone: s.tdone || [0,0,0], intro: s.intro | 0, tut: s.tut | 0,
    cos: (s.cos && s.cos.own) ? { own: s.cos.own, wear: s.cos.wear | 0 } : save.cos,
    hall: Array.isArray(s.hall) && s.hall.length === 5 ? s.hall : save.hall
  };
} catch (e) {}
// JF-#023: cosmetic shop — robe dyes, a pure jade sink. Cosmetics only: no
// stats, so the shop can never bend balance. Hues stay far from enemy greys
// and telegraph reds so readability holds.
const STYLES = [
  { name: 'TRAVELER',     col: '#e8dcc0', cost: 0   },
  { name: 'MOON WHITE',   col: '#f8f2e0', cost: 40  },
  { name: 'JADE ROBE',    col: '#aee8c6', cost: 60  },
  { name: 'GOLD SILK',    col: '#e8cf88', cost: 90  },
  { name: 'NIGHT ORCHID', col: '#c8aee6', cost: 120 },
  // JF-#033: silly accessories — pure jade sinks, cosmetic only
  { name: 'PANDA HOOD',    col: '#f0ead2', acc: 'panda',    cost: 80  },
  { name: 'FAKE MUSTACHE', col: '#e8dcc0', acc: 'mustache', cost: 50  },
  { name: 'CHICKEN SUIT',  col: '#f4dd7a', acc: 'chicken',  cost: 160 },
  { name: "LI'L DRAGON",   col: '#aee8c6', acc: 'dragon',   cost: 220 }
];
let styleSel = save.cos.wear;      // wardrobe cursor (menu)
function wearCol(){ return STYLES[save.cos.wear].col; }
function wornAcc(){ return STYLES[save.cos.wear].acc || null; }
function styleNext(){
  styleSel = (styleSel + 1) % STYLES.length;
  if (save.cos.own[styleSel]){ save.cos.wear = styleSel; persist(); }
  Snd.tick();
}
function styleBuy(){
  if (save.cos.own[styleSel]) return;
  const c = STYLES[styleSel].cost;
  if (save.jade < c){ Snd.tick(); return; }
  save.jade -= c; save.cos.own[styleSel] = 1; save.cos.wear = styleSel; persist();
  Snd.best();
}
let styleRect = null, styleBuyRect = null, omenRect = null;   // menu hitboxes (rebuilt each draw; JF-#051 adds omen)
function persist(){ localStorage.setItem(SAVE_KEY, JSON.stringify(save)); }
// JF-#022: bot fairness suite — open index.html?bot=3 (&react=12) and a bot with
// a fixed human reaction time (frames, 12 ≈ 200ms) plays N runs in each of the
// four campaign districts, classifying every hit it takes: PINCER (opposite-side
// threat overlapped), FAST (telegraph shorter than the reaction time), or clean.
// Results go to the console as a per-run table + aggregate verdict. Bot mode
// never touches the real save or best score.
const BOTQ = new URLSearchParams(location.search);
const BOT = BOTQ.has('bot')
  ? { runs: Math.max(1, +BOTQ.get('bot') || 3), react: +BOTQ.get('react') || 12,
      run: 0, stats: [], cur: null, done: false }
  : null;
if (BOT){ save.dist = 4; save.intro = 1; persist = () => {}; }
// JF-#037: QA-only SDK/adblock visibility — CG.adblockDetected was computed
// (JF-#036) but never displayed anywhere. ?debug=1 shows it plus sdkLive
// state in a corner readout so Mike can verify on the CG preview environment
// without opening devtools.
const DEBUG = BOTQ.has('debug');
// JF-#049: ?dev=1 — Deadroot-style live tuning panel. DOM sliders over the
// canvas so numbers can be retuned mid-run without code edits. Neutral by
// default; QA-only (never reachable from normal play, CG-safe).
const DEVMODE = BOTQ.has('dev');
const TUNE = { spd: 1, wind: 1, hpD: 0, heartsD: 0, diffD: 0 };
if (DEVMODE) addEventListener('DOMContentLoaded', () => {
  const KNOBS = [
    ['spd',     'enemy speed ×',          0.4, 2.2, 0.05],
    ['wind',    'telegraph time ×',       0.4, 2.2, 0.05],
    ['hpD',     'enemy hp +',             -2,  4,   1],
    ['heartsD', 'player hearts +',        -2,  6,   1],
    ['diffD',   'difficulty +',           -4,  8,   0.5]
  ];
  const wrap = document.createElement('div');
  wrap.style.cssText = 'position:fixed;right:8px;top:8px;z-index:99;background:rgba(10,13,18,0.92);' +
    'border:1px solid #2a3242;border-radius:10px;padding:10px 12px;font:12px monospace;color:#c8bfa8;width:212px';
  wrap.innerHTML = '<b style="color:#7ce8a8">DEV TUNING</b>' +
    '<span id="devReset" style="float:right;cursor:pointer;color:#e8c76a">reset</span>' +
    KNOBS.map(([k, lab]) =>
      `<label style="display:block;margin-top:7px">${lab} <span id="devV_${k}" style="color:#e8dcc0">${TUNE[k]}</span><br>` +
      `<input id="dev_${k}" type="range" style="width:100%"></label>`).join('') +
    '<div style="margin-top:6px;color:#8a94a6">speed / telegraph / hp apply to new spawns · hearts &amp; difficulty at next run</div>';
  document.body.appendChild(wrap);
  KNOBS.forEach(([k, _lab, mn, mx, st]) => {
    const el = document.getElementById('dev_' + k);
    el.min = mn; el.max = mx; el.step = st; el.value = TUNE[k];
    el.oninput = () => { TUNE[k] = +el.value; document.getElementById('devV_' + k).textContent = el.value; };
  });
  document.getElementById('devReset').onclick = () => KNOBS.forEach(([k]) => {
    TUNE[k] = (k === 'spd' || k === 'wind') ? 1 : 0;
    const el = document.getElementById('dev_' + k);
    el.value = TUNE[k]; document.getElementById('devV_' + k).textContent = TUNE[k];
  });
});
function botThink(){
  // JF-#059: survival first — answer an incoming projectile by its height.
  // low -> duck (kick back), mid -> back-step (sidestep), high -> rise (catch).
  if (P.riseT <= 0 && P.duckT <= 0 && P.backT <= 0){
    for (const d of darts){
      if (d.hit) continue;
      const closing = (d.x - P.x) * Math.sign(d.vx) < 0;   // heading toward us
      if (!closing || Math.abs(d.x - P.x) >= 90) continue;
      if (d.line === 'low') duck();
      else if (d.line === 'mid') press(Math.sign(P.x - d.x) || 1);   // step away from its line
      else armRise();
      return;
    }
  }

  if (state !== S_PLAY || scrollOffer) return;
  if (P.riseT > 0 || P.duckT > 0 || P.backT > 0 || grapple) return;
  P.duckT = DUCK_DUR; P.duckAge = 0; Snd.whoosh();   // JF-#047: fresh crouch
}
// JF-#059: UP is dual-purpose — arms the rise-block window AND throws a high
// attack at the nearest reachable foe (either side), same press. If nothing's
// in reach it just whiffs like any other strike; if an enemy is genuinely
// winding a HIGH attack, being armed turns the strike into a block (see
// strike()'s highBlock). This is what "up does a high attack that if done at
// the right time does a high block" means as one mechanic, not two.
function highAction(){
  // JF-#061 FIX: if the rise can't arm (already ducking / back-stepping /
  // grappled / mid-rise), UP does NOTHING. It used to fall through and throw an
  // unarmed high strike anyway. That was a real bug with a nasty tail: the bot's
  // "have I risen yet?" gate is `P.riseT <= 0`, which never closed when the arm
  // was refused, so it re-fired highAction EVERY frame. Each strike re-armed
  // hit-stop before update()'s freeze guard was reached, so the world could
  // never advance — a hard infinite stall (caught by the bot suite hanging at
  // 50k frames with zero state change).
  if (!armRise()) return;
  const target = nearestInReach(0);
  const dir = target ? (Math.sign(target.x - P.x) || P.face) : P.face;
  strike(dir, 'high');
}
// JF-#059: BACK-STEP — the mid-line evade, still kept alongside the new
// forward-block (Mike didn't ask to remove it, and it costs nothing to keep
// as a second valid answer to a mid attack):
//   HIGH -> UP (rise-block, doubles as your own high attack)
//   MID  -> press AWAY to lean out of it (or counter/block it head-on)
//   GRAB -> DUCK
// Pressing away from a foe mid-RED-windup is an evade, not a whiffed punch.
// Pressing away at any other time still strikes that direction (two-sided
// offense is untouched — the evade only claims the press when a mid threat
// is live on the other side).
const BACK_DUR = 20;
function tryBackstep(dir){
  if (grapple) return false;   // JF-#044: pinned — presses go to the mash-out
  if (P.riseT > 0 || P.duckT > 0 || P.backT > 0) return false;
  for (const e of enemies){
    if (e.st !== E_WINDUP && !(e.st === E_STRIKE && !e.didHit)) continue;
    if (e.atk && e.atk !== 'strike') continue;              // high/low/grab keep their own answers
    if (Math.abs(e.x - P.x) > Math.max(e.reach, PR) + 30) continue;
    const s = Math.sign(e.x - P.x) || 1;
    if (dir === -s){
      P.backT = BACK_DUR; P.backDir = dir;
      Snd.whoosh();
      return true;
    }
  }
  return false;
}
// JF-#046: BLOCK/PARRY and HEAVY removed — everything lives on the arrows now.

// ---------------------------------------------------------------- enemies ---
// Enemy lifecycle: walk in -> windup (RED TELEGRAPH = counter window) ->
// strike (hits you if still standing there) -> recover -> walk again.
const E_WALK = 0, E_WINDUP = 1, E_STRIKE = 2, E_RECOVER = 3, E_DOWN = 4, E_THROWN = 5, E_STAGGER = 6, E_FEINT = 7, E_AIM = 8, E_EVADE = 9;   // JF-#028: E_AIM = spearman throw wind-up · JF-#041: E_EVADE = hopping back from YOUR strike
// types: 0 initiate · 1 viper (fast, short telegraph) · 2 iron monk (brute — strikes
// only SHOVE him, counter to fell) · 3 spearman (attacks from long range — counter at range)
const T_NORM = 0, T_FAST = 1, T_BRUTE = 2, T_SPEAR = 3, T_BOSS = 4;
function spawnEnemy(forceSide){
  // first ~15s: strictly alternate sides so the player is never pincered while learning
  const side = forceSide || (waveT < INTRO ? -lastSpawnSide : (Math.random() < 0.5 ? -1 : 1));
  lastSpawnSide = side;
  // JF-#009: district quirks skew the enemy mix — each district is its own fight
  const q = DISTRICTS[sel].quirk;
  let type = T_NORM;
  const r = Math.random();
  const spearTh = q === 'spear' ? 0.34 : 0.24, spearDiff = q === 'spear' ? 1.5 : 3;   // JF-#028: throwers in every district
  const bruteTh = q === 'guard' ? 0.52 : 0.38, bruteDiff = q === 'guard' ? 1.5 : 2.5;
  const fastTh  = q === 'crowd' ? 0.78 : 0.6;
  if (difficulty > spearDiff && r < spearTh) type = T_SPEAR;
  else if (difficulty > bruteDiff && r < bruteTh) type = T_BRUTE;
  else if (difficulty > 1 && r < fastTh) type = T_FAST;
  const base = (1.1 + Math.random() * 0.5 + difficulty * 0.12) * TUNE.spd;          // JF-#049: dev knob
  // JF-#061: telegraph floor raised 14 -> 18. Capcom's SF Seminar (Hour 1) puts
  // raw human reaction at "at least 10 frames" even for a screen flash, so a
  // sub-10F telegraph isn't a read at all — it's a memory test. 18F leaves ~8F
  // of actual decision time after reaction. T_FAST still floors lower (16) as
  // its identity; the ?dev=1 wind knob can still go below this for tuning.
  const wind = Math.max(18, (46 - difficulty * 2.4) * TUNE.wind);   // telegraph shrinks as waves rise (JF-#006; JF-#049 knob)
  enemies.push({
    x: W/2 + side * (W/2 + 40 + Math.random() * 70), side: -side,   // walks toward center
    face: -side,                   // JF-#057: live facing, kept separate from movement
    st: E_WALK, stT: 0, type,
    speed: (type === T_FAST ? base * 1.5 : type === T_BRUTE ? base * 0.7 : base) * omen.spdScale,
    windup: (type === T_FAST ? Math.max(16, wind * 0.6) : type === T_BRUTE ? wind * 1.3 : wind) * omen.windScale,
    reach: type === T_SPEAR ? REACH + 70 : REACH,
    // JF-#007: vipers can guard too (diff>5); combo 8+ = the crowd wises up (+20% guard)
    // JF-#009: TEMPLE district = every hand is guarded (+18%)
    guard: ((type === T_NORM || (type === T_FAST && difficulty > 5)) &&
      Math.random() < Math.min(0.15 + difficulty * 0.04 + (combo >= 8 ? 0.2 : 0) +
        (q === 'guard' ? 0.18 : 0), 0.65)) ? 1 : 0,
    // JF-#007: some vipers open with a FEINT — pale flash, no audio, hops back out of reach
    feint: type === T_FAST && difficulty > 4 && Math.random() < 0.35,
    vx: 0, vy: 0, y: 420, rot: 0,
    // JF-#028: a spearman hurls ONE spear from range before closing to melee.
    // high throw -> DUCK, low throw -> JUMP. After it throws, it fights normally.
    willThrow: type === T_SPEAR, projLine: pickProjLine(),   // JF-#059: 3-way (was 2-way projHigh)
    // JF-#039: DUEL toughness — far fewer bodies, so every foe is a real
    // back-and-forth: 2-4 good reads to fell, more as waves climb.
    hp: Math.max(1, TUNE.hpD + (type === T_BRUTE ? 2      // JF-#049: dev knob delta
      : type === T_FAST  ? (2 + (difficulty > 7 ? 1 : 0))
      : type === T_SPEAR ? (3 + (difficulty > 9 ? 1 : 0))
      : (3 + (difficulty > 6 ? 1 : 0))))   // T_NORM
  });
  const ne = enemies[enemies.length - 1];
  ne.hpMax = ne.hp;                           // JF-#039: pips + wounded-pressure scale off this
  ne.windup0 = ne.windup;                     // base windup (brute rage floors off this)
  // JF-#041: enemy DEFENSE — a raised guard now covers ONE line (high/mid/low,
  // shown by where the bracer sits) and PERSISTS: matching-line strikes bounce,
  // any other line lands (an OPENING). Adapts toward your favorite line.
  if (ne.guard) ne.guardLine = pickGuardLine();
  // JF-#041: evaders (Punch-Out dodge) — vipers early, rank-and-file late. They
  // hop back from your strike, then land in a long punishable recover: bait them.
  ne.canEvade = (type === T_FAST && difficulty > 2) || (type === T_NORM && difficulty > 6);
  ne.evadeCd = 0;
  // JF-#043: the district's named elite — one per cycle, first foe of wave 3
  if (eliteQueued && type !== T_BOSS){
    eliteQueued = false;
    const EL = ELITES[sel];
    ne.elite = EL;
    ne.hp += 1; ne.hpMax = ne.hp;
    if (EL.habit === 'feintfirst') ne.feint = true;
    if (EL.habit === 'evadefirst'){ ne.canEvade = true; ne.evadeCd = 0; ne.eliteEvade = true; }
    if (EL.habit === 'guardshift'){ ne.guard = 1; ne.guardLine = pickGuardLine(); }
    banner(EL.name, '#e8c76a', 100);
  }
  mutter(ne);                                 // JF-#030: the odd approach one-liner
  if (ne.guard && combo >= 8 && !adaptShown){
    adaptShown = true;
    popup(W/2, 220, 'THE CROWD WISES UP', '#a8b4c8', true);
  }
}

// JF-#008: boss — the Master. Counters are the ONLY damage; each counter taken
// drops a phase: faster telegraphs + he calls two students to the fight.
function spawnBoss(hp){
  const side = Math.random() < 0.5 ? -1 : 1;
  enemies.push({
    x: W/2 + side * (W/2 + 60), side: -side, face: -side, y: 420,   // JF-#057
    st: E_WALK, stT: 0, type: T_BOSS,
    speed: 0.9, windup: 52, windup0: 52,
    reach: REACH + 24, guard: 0, feint: false,
    hp, hpMax: hp, vx: 0, vy: 0, rot: 0
  });
}

// JF-#040/#046: enemy ATTACK VARIETY. When a foe commits to a windup it picks
// one of four attacks, each with its own telegraph color and ONE correct answer
// — all of it on the arrow keys:
//   strike (RED)   -> COUNTER (strike into the flash) or BACK-STEP (press away)
//   high  (AMBER)  -> DUCK  (jump fails)
//   low   (CYAN)   -> JUMP  (duck fails)
//   grab  (PURPLE) -> DODGE (jump or duck) — ARMORED: can't be counter-struck
// Bosses stay pure-red counter fights; the Butcher's cleaver is separate.
function chooseAtk(e){
  if (e.type === T_BOSS) return 'strike';
  if (e.type === T_BRUTE){
    const r = Math.random();
    return r < 0.4 ? 'strike' : r < 0.72 ? 'grab' : 'high';
  }
  // spearmen keep their identity: a thrown spear (E_AIM) at range, a plain
  // counterable jab at melee — no long-reach grabs/sweeps, which read wrong from
  // 150px away and can't be fairly dodged.
  if (e.type === T_SPEAR) return 'strike';
  if (difficulty <= 2) return 'strike';           // early game teaches the counter first
  const r = Math.random();
  // JF-#059: LOW melee removed — jump was its only dodge, and jump is gone.
  // Low threats are projectile-only now (kicked back, see darts). Freed
  // probability folds into 'high'.
  if (e.type === T_FAST) return r < 0.58 ? 'strike' : 'high';   // vipers: quick strikes + snap high
  // T_NORM at melee: strike / high / grab
  if (r < 0.48) return 'strike';
  if (r < 0.75) return 'high';
  return difficulty > 4 ? 'grab' : 'strike';
}
// JF-#040: color + duck/jump/dodge caption for a non-red attack telegraph
function atkTell(atk){
  return atk === 'high' ? ['#f0b24a', 'DUCK!']
       : atk === 'low'  ? ['#5fd0e0', 'JUMP!']
       : ['#c86ae8', 'DODGE!'];   // grab
}

// ---- JF-#043: combat batch — feel/juice + enemy behavior + structure ----
// Counter CLASH: a perfect counter freezes the moment — dark flash, white burst.
let clashT = 0, clashX = 0, clashY = 0;

// Duel stare-down name cards (structure #11): each type announces itself once.
const TYPE_NAMES = { [T_NORM]: 'INITIATE', [T_FAST]: 'VIPER', [T_BRUTE]: 'IRON MONK', [T_SPEAR]: 'SPEARMAN' };
// JF-#056: STARE_QUIPS / ELITE_QUIPS removed — the stare-down keeps its beat
// (name card + 40f face-off + hero flourish), just without the trash talk.

  restGag = Math.random() < 0.5
    ? { kind: 'flag', x: -50, dir: 1, spd: 1.1 }
    : { kind: 'cat',  x: W + 50, dir: -1, spd: 2.4 };
  if (!won) offerScrolls();   // JF-#025: the rest beat becomes a choice

let hitsWave = 0;

const REACH = 92;   // strike range from player center
function nearestInReach(dir){
  let bestE = null, bd = 1e9;
  for (const e of enemies){
    if (e.st === E_DOWN || e.st === E_THROWN || e.st === E_FEINT || e.st === E_EVADE) continue;   // feint/evade = springing away, unhittable
    const dx = e.x - P.x;
    if (dir && Math.sign(dx) !== dir) continue;
    const d = Math.abs(dx);
    // a winding-up spearman can be countered at HIS reach, not just yours
    const range = (e.st === E_WINDUP ? Math.max(e.reach, PR) : PR) + 18;
    if (d < range && d < bd){ bd = d; bestE = e; }
  }
  return bestE;
}

function popup(x, y, txt, col, big){
  popups.push({ x, y, txt, col: col || '#e8dcc0', life: 46, big: !!big });
}
// JF-#061: SHAPE LANGUAGE. Capcom's SF6 VFX team on Drive Parry: "we actually
// even made the light form an X, as opposed to the hit effect forming an O to
// subtly push the visual clarity further." Different OUTCOMES get different
// SHAPES, not just different colors — which is the wordless way to say what the
// captions used to (JF-#058 purge). Our vocabulary:
//   'ring'    (default) = a hit landed          -> radial, the O
//   'x'       = your read was right (dodge/block/armored bounce) -> crossing diagonals
//   'implode' = a counter fired                 -> particles converge inward
function burst(x, y, col, n, pow, shape){
  const star = (pow || 3) >= 5;   // JF-#027: heavy hits throw comic stars
  for (let i = 0; i < n; i++){
    let a, s = (0.5 + Math.random()) * (pow || 3), px = x, py = y, vx, vy;
    if (shape === 'x'){
      // four diagonal arms — reads as a struck-through X even mid-flight
      const arm = (i % 4) * (Math.PI / 2) + Math.PI / 4;
      a = arm + (Math.random() - 0.5) * 0.25;
      vx = Math.cos(a) * s; vy = Math.sin(a) * s;          // no upward bias: keep the X square
    } else if (shape === 'implode'){
      // spawn on a ring and fly INWARD — the converge that says "countered"
      a = (i / n) * Math.PI * 2;
      const r = 34 + Math.random() * 10;
      px = x + Math.cos(a) * r; py = y + Math.sin(a) * r;
      vx = -Math.cos(a) * s * 0.9; vy = -Math.sin(a) * s * 0.9;
    } else {
      a = Math.random() * Math.PI * 2;
      vx = Math.cos(a) * s; vy = Math.sin(a) * s - 1;
    }
    parts.push({ x: px, y: py, vx, vy, life: 20 + Math.random()*16, col,
      star: star && i % 3 === 0 && shape !== 'implode', sz: 2 + Math.random() * 2, rot: Math.random() * 7,
      noGrav: shape === 'implode' });
  }
}

// ----------------------------------------------------------------- verbs ----
// JF-#059: forceLine tags WHICH input threw this strike ('high' from
// highAction()/UP; omitted for a normal FORWARD press). Only the high-tagged
// strike can turn a HIGH windup into a block+counter — a plain forward strike
// into a high windup still just bounces off (see the armored-chip check below).
function strike(dir, forceLine){
  if (state !== S_PLAY) return;
  // JF-#044: grabbed = every strike press is a mash-out attempt
  if (grapple){
    grapple.hits--;
    burst(P.x, P.y - 60, '#c86ae8', 5, 2); Snd.hit(2); shake = 4;
    if (grapple.hits <= 0){
      const ge = grapple.e, gd = Math.sign(ge.x - P.x) || 1;
      ge.grappled = false; ge.st = E_STAGGER; ge.stT = 0; ge.vx = gd * 7;
      ge.leanT = 12; ge.leanDir = gd;
      popup(P.x, P.y - 110, 'BROKE FREE!', '#7ce8a8', true);
      Snd.counter(); hitStop = 4; shake = 8;
      grapple = null;
    }
    return;
  }
  if (whiffT > 0) return;                               // still recovering from a whiff
  if (hitStop > 0){ bufDir = dir; bufLine = forceLine || null; bufT = BUF_WIN; return; }   // JF-#061: buffer through hit-stop, keeping the line
  P.flourishT = 0;                                      // JF-#044: fists cancel the pose
  P.face = dir; P.punchT = 12; P.punchSide = dir;
  const atkLine = forceLine || atkLineNow();   // JF-#059: UP forces 'high'
  lineUse[atkLine]++;
  const e = nearestInReach(dir);
  if (!e){ Snd.whoosh(); whiffT = run.monkey ? 7 : 14; return; }   // JF-#006 whiff recovery (JF-#025: MONKEY halves it)

  // JF-#059: HIGH BLOCK — pressing UP (forceLine==='high') while armed (rise
  // active) against a live HIGH windup answers it exactly like the mid counter
  // below: damage + stagger/fell + bullet time, not just a bounce. Only the
  // dedicated high input can do this — a forward strike into a high windup
  // still just bounces (the armored-chip branch right after this).
  const highBlock = e.st === E_WINDUP && e.atk === 'high' && forceLine === 'high' && P.riseT > 0;
  // JF-#040: only a RED windup (a plain strike) — or now a rise-armed HIGH one
  // — can be countered. Grab stays ARMORED during its windup: the answer is a
  // dodge (duck), not a punch. Poking it costs you a beat and teaches the rule.
  if (e.st === E_WINDUP && e.atk && e.atk !== 'strike' && !highBlock){
    // JF-#058: wordless — the armored clang + the bounce say "that won't work"
    // JF-#061: X = deflected (SF6's parry-X vs hit-O language), light tier.
    burst(e.x, e.y - 56, '#a8b4c8', 8, 2, 'x');
    Snd.block(); hitStop = HS_LIGHT; whiffT = 10;
    return;
  }
  // JF-#010: IRON CATCH — with the technique, an unlanded strike can still be
  // countered. JF-#040: only a plain strike is catchable; armored swings aren't.
  const ironCatch = e.st === E_STRIKE && !e.didHit && hasTech(1) && (!e.atk || e.atk === 'strike');
  // JF-#053: the counter is EARNED — only armed by a fresh dodge (readyT), an
  // IRON CATCH read, or (JF-#059) a rise-armed high block. Unarmed strike into
  // a windup = weak chip: 1 hp, but it does NOT interrupt the swing. Dodge first.
  const armed = readyT > 0 || ironCatch || highBlock;
  if ((e.st === E_WINDUP || ironCatch) && !armed && e.type !== T_BOSS){   // ---- UNARMED CHIP ----
    e.hp = (e.hp === undefined ? 1 : e.hp) - 1;
    P.punchT = 12; whiffT = 12;
    // JF-#061: LIGHT tier — a chip is Capcom's jab. It gets the 8F freeze so the
    // 16F counter lands like a truck by contrast. Still joyless: no shape, no shake.
    Snd.block(); hitStop = HS_LIGHT;
    burst(e.x, e.y - 46, '#9aa2b0', 5, 2);      // grey thud, no words (JF-#054)
    if (e.hp <= 0){                              // chipping CAN fell — slow and joyless
      e.st = E_DOWN; e.stT = 0; e.vx = dir * 3; e.vy = -4;
      kills++; jadeRun++; score += 100;
    }
    return;
  }
  if ((e.st === E_WINDUP || ironCatch) && !armed && e.type === T_BOSS){   // boss shrugs chips
    P.punchT = 12; whiffT = 12; Snd.block(); hitStop = HS_LIGHT;   // JF-#061
    burst(e.x, e.y - 46, '#9aa2b0', 5, 2);
    return;
  }
  if ((e.st === E_WINDUP || ironCatch) && e.type === T_BOSS && e.hp > 1){   // ---- BOSS PHASE ----
    // JF-#008: counters are the only damage; each one staggers him a phase
    e.hp--; e.st = E_STAGGER; e.stT = 0; e.vx = dir * 7;
    e.windup = Math.max(30, e.windup - 8);       // each phase: faster telegraphs
    counters++; jadeRun += 3; combo++; comboT = CW;
    score += 1000;
    popup(e.x, e.y - 110, 'MASTER STAGGERED +1000', '#7ce8a8', true);
    // JF-#056: boss stagger jab removed — the MASTER STAGGERED read stands alone
    clash(e.x, e.y - 60);   // JF-#043: the clash freeze — boss counters always earn it
    Snd.counter(); hitStop = HS_HEAVY; shake = 14; slowMo = 30;   // JF-#061: heavy tier
    burst(e.x, e.y - 50, '#e86a6a', 26, 6, 'implode');            // JF-#061: converge = countered
    banner('HE CALLS HIS STUDENTS', '#e8b06a', 80);
    spawnEnemy(-1); spawnEnemy(1);               // phase adds, both sides
    if (combo > bestCombo) bestCombo = combo;
    return;
  }
  if (e.st === E_WINDUP || ironCatch){          // ---- COUNTER (armed by a dodge, JF-#053) ----
    const wasRisen = P.riseT > 0;                // JF-#059: snapshot before clearing — THROW AIMING below still needs it
    readyT = 0; P.riseT = 0;                     // one counter per dodge/rise
    P.ctrFlashT = 16; P.ctrX = e.x; P.ctrY = e.y - 55;   // flourish: rings + speed lines
    // JF-#007: final-third ("NOW" bright flash) = PERFECT counter
    // JF-#010: an IRON CATCH always counts as perfect
    const perfect = ironCatch || e.stT / e.windup > perfTh();   // JF-#025: CRANE widens
    if (e.type === T_FAST) bumpTrial('vip');
    if (perfect) bumpTrial('perf');
    counters++; jadeRun += perfect ? 5 : 3;
    if (tut.active) tutOnCounter();   // JF-#062: advance the guided teach
    award('counter');
    if (e.type === T_BRUTE) award('monk');
    if (e.type === T_SPEAR) award('spear');

    // JF-#038: multi-hit toughness + combo-gated finisher. A counter always damages;
    // it only FELLS once hp hits 0, and only becomes the big wide throw once the
    // player has strung together FINISH_AT good hits in a row.
    e.hp = (e.hp === undefined ? 1 : e.hp) - 1;
    // JF-#044: CORNERED — a counter against a foe pinned near the screen edge
    // hits double. Your throws push them there; the arena space finally matters.
    if (e.hp > 0 && e.type !== T_BOSS && (e.x < 100 || e.x > W - 100)){
      e.hp--;
      popup(e.x, e.y - 122, 'CORNERED!', '#e8b06a');
    }
    const lethal = e.hp <= 0;
    const empowered = lethal && (combo + 1 >= FINISH_AT);

    if (!lethal){                              // ---- STAGGER: foe is hurt, not felled ----
      e.st = E_STAGGER; e.stT = 0; e.vx = dir * 5; e.guard = 0;
      e.leanT = 12; e.leanDir = dir;           // JF-#043: head snaps away from the hit
      combo++; comboT = CW;
      const pts = (perfect ? 150 : 100) * Math.min(combo, 5);
      score += pts;
      popup(e.x, e.y - 90, (perfect ? 'PERFECT +' : 'COUNTER +') + pts, perfect ? '#e8c76a' : '#7ce8a8');
      if (perfect) clash(e.x, e.y - 55);       // JF-#043: perfect = the freeze-frame moment
      // JF-#053: every earned counter gets the full dodge-grade bullet time.
      // JF-#061: a perfect read is the HEAVY tier, an ordinary counter MEDIUM —
      // Capcom's 12F/16F split, so the perfect one is felt, not just scored.
      Snd.counter(); hitStop = perfect ? HS_HEAVY : HS_MED;
      shake = perfect ? 8 : 6; slowMo = Math.max(slowMo, 26);
      burst(e.x, e.y - 40, perfect ? '#e8c76a' : '#7ce8a8', 14, 4, 'implode');
      if (perfect && hasTech(2)){ perfChain++; } else if (!perfect) perfChain = 0;
      if (combo > bestCombo) bestCombo = combo;
      if (combo === FINISH_AT - 1 && !finisherCue){
        finisherCue = true;
        popup(W/2, 190, 'ONE MORE — THROW READY', '#e8c76a', true);
      }
      return;
    }

    e.st = E_THROWN; e.stT = 0;
    e.sendX0 = e.x;                    // JF-#030: launch point, for the longest-yeet stat
    // JF-#010: DRAGON SWEEP — perfect throws fly farther and pierce deeper
    const sweep = hasTech(0);
    e.vx = slip(dir * (perfect ? (sweep ? 15 : 12) : 9) * (run.tiger ? 1.3 : 1));   // JF-#025 TIGER, JF-#032 slip
    e.vy = perfect ? -8 : -7;
    // JF-#044: THROW AIMING — counter from a stance to shape the throw. Ducking
    // = a LOW SKID that trips everyone at floor level; a risen high-block =
    // a HIGH ARC that sails long (JF-#059: was airborne/jump).
    if (P.duckT > 0){ e.vy = -3.5; e.vx *= 1.4; popup(e.x, e.y - 122, 'LOW SKID', '#c8bfa8'); }
    else if (wasRisen){ e.vy = -12; popup(e.x, e.y - 122, 'SKY THROW', '#c8bfa8'); }
    // JF-#020: ~1 in 6 perfect EMPOWERED counters is a comedy send — twice the arc, wild spin
    if (empowered && perfect && e.type !== T_BOSS && Math.random() < 0.18){
      e.vx *= 1.7; e.vy = -11; e.bigSend = true;
      popup(e.x, e.y - 130, SENDS[(Math.random() * SENDS.length) | 0], '#e8c76a', true);
    }
    combo++; comboT = CW;
    if (!empowered && combo === FINISH_AT - 1 && !finisherCue){
      finisherCue = true;
      popup(W/2, 190, 'ONE MORE — THROW READY', '#e8c76a', true);
    }
    const baseC = e.type === T_BOSS ? 2000 : e.type === T_BRUTE ? 750 : e.type === T_SPEAR ? 600 : 500;
    const pts = Math.round(baseC * (perfect ? 1.5 : 1)) * Math.min(combo, 5);
    score += pts;
    popup(e.x, e.y - 90, (ironCatch ? 'IRON CATCH +' : perfect ? 'PERFECT +' : 'COUNTER +') + pts, perfect ? '#e8c76a' : '#7ce8a8', true);
    if (perfect) clash(e.x, e.y - 55);   // JF-#043
    // JF-#044: BOSS FINALE — the felling counter on a boss is the run's biggest
    // frame: long slow-mo, clash, the moon sits up to watch
    if (e.type === T_BOSS){
      clash(e.x, e.y - 60); slowMo = Math.max(slowMo, 60);
      shake = Math.max(shake, 18); moonWake(220);
    }
    // JF-#061: the felling throw is the game's heaviest blow — always HEAVY tier.
    Snd.counter(); hitStop = Math.max(hitStop, HS_HEAVY); shake = Math.max(shake, empowered ? (perfect ? 13 : 10) : 6);
    slowMo = Math.max(slowMo, 26);   // JF-#053: throw counters get full bullet time (JF-#044: don't clobber boss finale)
    burst(e.x, e.y - 40, perfect ? '#e8c76a' : '#7ce8a8', empowered ? (perfect ? 30 : 22) : 14, empowered ? (perfect ? 6 : 5) : 4, 'implode');
    if (empowered){
      // ---- EMPOWERED THROW: the payoff — thrown body knocks down neighbors in its path ----
      let felled = 0;
      for (const o of enemies){
        if (o === e || o.st === E_DOWN || o.st === E_THROWN) continue;
        if (o.type !== T_BOSS && Math.sign(o.x - e.x) === dir && Math.abs(o.x - e.x) < (perfect ? (sweep ? 260 : 220) : 150) + (run.tiger ? 50 : 0)){
          o.st = E_DOWN; o.stT = 0; o.vx = dir * 5; o.vy = -4; o.hp = 0;
          score += 250; kills++; jadeRun++; felled++;
          popup(o.x, o.y - 80, 'FELLED +250', '#e8c76a'); yelp(o.x, o.y - 104);
          burst(o.x, o.y - 40, '#e8c76a', 10, 3);
        }
      }
      // JF-#007: SWEEP — one throw felling 2+ pays a bonus
      if (felled >= 2){
        score += 500; jadeRun += 2;
        popup(W/2, 220, 'SWEEP +500', '#e8c76a', true);
        bumpTrial('sweep');
      }
      // JF-#030: BOWLING — one throw toppling 3+ is a STRIKE, with the pins to prove it
      if (felled >= 3){
        score += 500 * (felled - 2);
        banner('☗ STRIKE!! ' + felled + ' PINS', '#ffd98a', 100);
        Snd.block(); Snd.best(); shake = Math.max(shake, 14); slowMo = Math.max(slowMo, 24); moonWake(90);
      }
    }
    // JF-#010: PALM WAVE — 3 consecutive perfects release a wave that fells both sides
    if (perfect && hasTech(2)){
      perfChain++;
      if (perfChain >= 3){
        perfChain = 0;
        banner('PALM WAVE', '#e8c76a', 90);
        Snd.counter(); shake = 16; slowMo = Math.max(slowMo, 30);
        burst(P.x, P.y - 55, '#e8c76a', 40, 8);
        for (const o of enemies){
          if (o === e || o.st === E_DOWN || o.st === E_THROWN || o.type === T_BOSS) continue;
          if (Math.abs(o.x - P.x) < 260){
            o.st = E_DOWN; o.stT = 0; o.vx = Math.sign(o.x - P.x) * 6; o.vy = -5; o.hp = 0;
            score += 250; kills++; jadeRun++;
            popup(o.x, o.y - 80, 'FELLED +250', '#e8c76a'); yelp(o.x, o.y - 104);
            burst(o.x, o.y - 40, '#e8c76a', 10, 3);
          }
        }
      }
    } else if (!perfect) perfChain = 0;
    kills++;
  } else if (e.st === E_WALK && e.canEvade && e.evadeCd <= 0 &&
             (e.eliteEvade || Math.random() < 0.55)){
    if (e.eliteEvade) e.eliteEvade = false;   // JF-#043: TWO STEPS always dodges the FIRST one
    // ---- JF-#041 EVADE: they hop back from your strike (Punch-Out dodge) ----
    // The whiff stings, but they LAND in a long recover — bait it, then punish.
    e.st = E_EVADE; e.stT = 0; e.evadeCd = 210;
    e.vx = Math.sign(e.x - P.x || 1) * 4.5;
    popup(e.x, e.y - 100, 'DODGED!', '#c8d4e0');
    Snd.whoosh(); whiffT = 10;
  } else if (e.guard > 0 && (e.st === E_WALK || e.st === E_STAGGER) &&
             atkLine === (e.guardLine || 'mid')){
    // ---- JF-#041 BLOCKED: their guard covers this line and HOLDS ----
    e.blockedN = (e.blockedN || 0) + 1;
    popup(e.x, e.y - 80, 'BLOCKED ' + (e.guardLine || 'mid').toUpperCase(), '#a8b4c8');
    Snd.block(); hitStop = 2; shake = 2;
    burst(e.x, e.y - 58, '#a8b4c8', 6, 2);
    if (!guardTaught){
      guardTaught = true;
      popup(W/2, 220, 'THEY GUARD ' + (e.guardLine || 'mid').toUpperCase() + ' — STRIKE ANOTHER LINE', '#a8b4c8', true);
    }
    // JF-#043: elite habits fire off a block — IRON ELBOW answers with a grab,
    // BRASS PALM slides his guard to a new line (keep reading, keep varying)
    if (e.elite && e.elite.habit === 'grabnext' && e.st === E_WALK){
      e.blockedN = 0;
      e.st = E_WINDUP; e.stT = 0; e.atk = 'grab'; e.converted = true; e.follow = false;
      e.windup = Math.max(34, e.windup0);
      popup(e.x, e.y - 104, 'GRAB!', '#c86ae8');
      Snd.windup(e.windup);
    } else if (e.elite && e.elite.habit === 'guardshift'){
      const lines = ['mid', 'low', 'high'].filter(l => l !== e.guardLine);
      e.guardLine = lines[(Math.random() * 2) | 0];
    } else if (e.blockedN >= 2 && e.st === E_WALK){   // keep hammering the guard = they punish you
      e.blockedN = 0;
      e.st = E_WINDUP; e.stT = 0; e.atk = 'strike'; e.converted = true; e.follow = false;
      e.windup = Math.max(22, e.windup0 * 0.7);
      popup(e.x, e.y - 104, 'RETALIATES!', '#e8a06a');
      Snd.windup(e.windup);
    }
  } else if (e.type === T_BOSS){                 // ---- the Master shrugs strikes off ----
    e.x += dir * 8;
    popup(e.x, e.y - 110, 'SHRUGGED OFF', '#a8b4c8');
    Snd.block(); hitStop = 2; shake = 2;
  } else if (e.type === T_BRUTE){                // ---- SHOVE (brute won't fall) ----
    e.st = E_STAGGER; e.stT = 0; e.vx = dir * 6;
    score += 50;
    // JF-#007: each shove ENRAGES him — next windup 15% faster (floor 55% of base)
    e.rage = (e.rage || 0) + 1;
    e.windup = Math.max(e.windup * 0.85, e.windup0 * 0.55);
    popup(e.x, e.y - 80, e.rage === 2 ? 'ENRAGED' : 'SHOVED +50', e.rage === 2 ? '#e86a6a' : '#c8bfa8');
    Snd.hit(1); hitStop = 2; shake = 3;
    burst(e.x, e.y - 45, e.rage >= 2 ? '#e86a6a' : '#9aa2b0', 8, 3);
  } else if (e.st === E_RECOVER){                // ---- HEAVY (punish the whiff) ----
    e.st = E_DOWN; e.stT = 0;
    e.vx = dir * 6; e.vy = -5.5;
    combo++; comboT = CW;
    const pts = 250 * Math.min(combo, 5);
    score += pts; kills++; jadeRun++;
    popup(e.x, e.y - 80, 'HEAVY +' + pts, '#e8c76a');
    bumpTrial('heavy');
    Snd.hit(combo + 3); hitStop = 5; shake = 6;
    burst(e.x, e.y - 45, '#e8c76a', 14, 4);
  } else {                                       // ---- CLEAN STRIKE ----
    // JF-#041: hitting AROUND a raised guard (a different line) is an OPENING —
    // it strips the guard and pays extra. The reward for varying your line.
    const opening = e.guard > 0;
    // JF-#038: also multi-hit — a strike that doesn't finish the foe just staggers it
    e.hp = (e.hp === undefined ? 1 : e.hp) - 1;
    if (e.hp > 0){
      e.st = E_STAGGER; e.stT = 0; e.vx = dir * 3; e.guard = 0;
      e.leanT = 10; e.leanDir = dir;   // JF-#043
      combo++; comboT = CW;
      const pts = Math.round((opening ? 90 : 60) * Math.min(combo, 5));
      score += pts;
      popup(e.x, e.y - 80, (opening ? 'OPENING! +' : 'HIT +') + pts, opening ? '#e8c76a' : '#d8d0c0');
      Snd.hit(combo); hitStop = 2; shake = 2;
      burst(e.x, e.y - 40, '#d8d0c0', 6, 2);
      if (combo > bestCombo) bestCombo = combo;
      if (combo === FINISH_AT - 1 && !finisherCue){
        finisherCue = true;
        popup(W/2, 190, 'ONE MORE — THROW READY', '#e8c76a', true);
      }
      return;
    }
    e.st = E_DOWN; e.stT = 0;
    e.vx = dir * 4.5; e.vy = -4.5;
    combo++; comboT = CW;
    if (combo === FINISH_AT - 1 && !finisherCue){
      finisherCue = true;
      popup(W/2, 190, 'ONE MORE — THROW READY', '#e8c76a', true);
    }
    const pts = Math.round((opening ? 150 : 100) * Math.min(combo, 5));
    score += pts; kills++; jadeRun++;
    popup(e.x, e.y - 80, (opening ? 'OPENING! ' : combo > 1 ? '×' + Math.min(combo,5) + ' ' : '') + '+' + pts, opening ? '#e8c76a' : '#e8dcc0');
    Snd.hit(combo); hitStop = 3; shake = 4;
    burst(e.x, e.y - 45, '#d8d0c0', 10, 3);
  }
  if (combo > bestCombo) bestCombo = combo;
  hype(combo);                           // JF-#030: cheeky announcer as the chain climbs
  if (combo >= 5) award('chain5');
  // live belt promotion: banner the moment lifetime kills cross a threshold
  const nb = beltOf(save.kills + kills);
  if (nb > beltOf(save.kills) && nb > promoted){
    promoted = nb;
    popup(W/2, 190, BELTS[nb].name + ' BELT', BELTS[nb].col === '#3a3f48' ? '#e8dcc0' : BELTS[nb].col, true);
    // JF-#010: a promotion that teaches a technique says so, right now
    const tec = TECH.find(T => T.belt === nb);
    if (tec) banner('TECHNIQUE LEARNED: ' + tec.name, '#e8c76a', 160);
    Snd.best(); shake = 6;
  }
}

// JF-#059: resolve a landing enemy blow against the player's defense.
// SIMPLIFIED, height-matched inputs (Mike: "no jumping... up = high, forward =
// mid" — see highAction()/strike() for the offense side of this same mapping):
//   HIGH -> UP (armed rise, P.riseT)      MID -> back-step / forward-block
//   GRAB -> DOWN (duck)                   LOW melee no longer exists — jump was
// its only dodge, so low threats are projectile-only now (kicked back, below).
function resolveEnemyHit(e){
  // JF-#053: range uses the ATTACKER's reach (was fixed REACH+14, so a boss or
  // spearman swinging from his longer reach never resolved — the dodge neither
  // paid nor armed the counter window)
  if (Math.abs(e.x - P.x) >= Math.max(REACH, e.reach || 0) + 14) return;
  const atk = e.atk || 'strike';
  const risen = P.riseT > 0, ducked = P.duckT > 0;
  let avoided = false;
  if (atk === 'high')      avoided = risen;                  // JF-#059: press UP (was duck)
  else if (atk === 'low')  avoided = ducked;                 // shouldn't occur (chooseAtk no longer picks it); safety net
  else if (atk === 'grab') avoided = ducked;                 // JF-#059: duck only (jump removed)
  else                     avoided = P.backT > 0;            // mid: press away
  if (avoided){                                    // ---- clean dodge ----
    // JF-#050: FOLLOW-THROUGH — a dodged swing carries the attacker's body
    // through and past the space you left (Mike: "mob attacks still don't
    // follow through past you if you dodge"). Decaying drift, ~45px total.
    e.thruV = (Math.sign(P.x - e.x) || 1) * 6;
    if (atk === 'grab'){ e.recoverLong = true; e.st = E_STRIKE; }   // whiffed grab = long punish window
    // JF-#047: duckAge counts frames in the crouch (held ducks never expire, so
    // DUCK_DUR - duckT stopped measuring age). FRESH (≤20f) = a read: pays points,
    // FLOW, and bullet time. A lazy held crouch just makes them whiff — the NES
    // paid you nothing for sitting down either. JF-#059: rise is a timed press
    // like the old jump was, so RISE_DUR - P.riseT measures its age the same way.
    const dodgeAge = atk === 'high' ? RISE_DUR - P.riseT
                   : ducked ? P.duckAge
                   : P.backT > 0 ? BACK_DUR - P.backT : 99;
    // JF-#044: PERFECT READ — a dodge input within 8f of the blow landing leaves
    // the foe hanging in a LONG recover. The last-instant read, paid like one.
    if (dodgeAge <= 8 && e.type !== T_BOSS){
      e.st = E_RECOVER; e.stT = 0; e.recoverLong = true;
      score += 160;
      popup(e.x, e.y - 108, 'PERFECT READ +160', '#e8c76a', true);
    }
    if (dodgeAge <= 20){                           // fresh read: full reward
      readyT = READY_DUR;                          // JF-#053: dodge arms the counter
      score += 80; jadeRun++;
      combo++; comboT = CW;                        // JF-#043: defense feeds FLOW too
      if (combo > bestCombo) bestCombo = combo;
      if (combo === FINISH_AT - 1 && !finisherCue){
        finisherCue = true;
        popup(W/2, 190, 'ONE MORE — THROW READY', '#e8c76a', true);
      }
      // JF-#041: BULLET TIME — the swing sails past in slow motion; punish it.
      slowMo = Math.max(slowMo, 26); hitStop = Math.max(hitStop, 3);
      shake = Math.max(shake, 3);
      popup(P.x, P.y - (ducked ? 58 : 100),
        atk === 'grab' ? 'SLIPPED +80' : atk === 'strike' ? 'EVADED +80' : 'DODGE +80', '#7ce8a8');
    } else {
      popup(P.x, P.y - (ducked ? 58 : 100), ducked ? 'under it' : 'over it', '#9aa2b0');
    }
    // JF-#061: X = your read was RIGHT (Capcom's parry-X vs hit-O shape language)
    burst(P.x + (Math.sign(e.x - P.x) || 1) * 30,
      ducked ? P.y - 88 : atk === 'strike' ? P.y - 58 : P.y - 16, '#7ce8a8', 10, 3, 'x');
    return;
  }
  if (BOT) botHit(e);                              // JF-#022: classify before it lands
  // JF-#045: say WHERE it landed — the high swing hits the head, the sweep takes
  // the legs — so the miss teaches the dodge you should have used
  if (atk === 'high'){
    popup(P.x, P.y - 120, 'RIGHT IN THE HEAD', '#e86a6a', true);
    burst(P.x, P.y - 84, '#e86a6a', 12, 4);
  } else if (atk === 'low'){
    popup(P.x, P.y - 120, 'SWEPT THE LEGS', '#e86a6a', true);
    burst(P.x, P.y - 8, '#e86a6a', 12, 4);
  }
  // JF-#044: a landed GRAB opens the mash-out grapple instead of instant damage
  // (bots keep the instant path so fairness numbers stay comparable)
  if (atk === 'grab' && !BOT){
    grapple = { e, t: 30, hits: 2 };
    e.grappled = true;
    popup(P.x, P.y - 112, 'GRABBED — MASH!', '#c86ae8', true);
    Snd.hurt(); shake = 8;
    return;
  }
  hurtPlayer();
}

function hurtPlayer(){
  if (tut.active){ hurtFlash = 8; shake = Math.max(shake, 4); return; }   // JF-#062: no damage while learning — a whiffed dodge just costs the exchange
  hearts--; hurtFlash = 18; combo = 0; perfChain = 0; hitsWave++;
  shake = 12; Snd.hurt();
  burst(P.x, P.y - 50, '#e86a6a', 16, 4);
  if (hearts <= 0){
    if (windAvail){                              // SECOND WIND: rise once per fight
      windAvail = false; hearts = 1; slowMo = 40;
      popup(P.x, P.y - 110, 'SECOND WIND', '#7ce8a8', true);
      burst(P.x, P.y - 50, '#7ce8a8', 24, 5);
      Snd.counter();
      return;
    }
    endRun(false);
  }
}

// JF-#009: one exit for both endings — felled, or district cleared
function endRun(victory){
  state = S_DEAD; tallyStep = 0; tallyT = 0; tallyDone = false;
  CG.gameplayStop();    // JF-#013
  if (victory) CG.happytime();
  ranOnce = true; rewardUsed = false; adPending = false;   // JF-#016/#037: fresh DOUBLE JADE offer each tally
  walletShown = save.jade;   // wallet animates up from pre-run balance as jade banks
  newBest = !BOT && score > best;
  if (newBest){ best = score; localStorage.setItem('jf_best', best); }
  // JF-#022: bank the run's fairness numbers
  if (BOT && BOT.cur) BOT.stats.push({
    district: DISTRICTS[fought].name, wave, won: victory, kills, counters,
    hits: BOT.cur.hits.length,
    pincer: BOT.cur.hits.filter(h => h.pincer).length,
    fast: BOT.cur.hits.filter(h => h.fast).length,
    hitList: BOT.cur.hits
  });
  if (run.dragon) jadeRun = Math.round(jadeRun * 1.5);   // JF-#025: DRAGON
  jadeRun = Math.round(jadeRun * omen.jadeScale);   // omen boon (JF-#011)
  if (dailyBonus) jadeRun *= 2;                // return bonus pays out at the tally
  save.jade += jadeRun;
  save.kills += kills;                         // lifetime kills drive belt rank
  if (victory && sel === save.dist && save.dist < DISTRICTS.length - 1){
    save.dist++;                               // the next district opens
    sel = save.dist;
  }
  // JF-#026: Hall of Legends — per-district top 5 (local; CG board when invited)
  hallRank = 0;
  if (!BOT){
    const H = save.hall[fought];
    H.push({ s: score, w: wave });
    H.sort((a, b) => b.s - a.s);
    if (H.length > 5) H.length = 5;
    const r = H.findIndex(h => h.s === score && h.w === wave);
    if (r >= 0) hallRank = r + 1;
    CG.submitScore(score);
  }
  persist();                                   // every run banks progress
  // JF-#012: reclaiming the jade on the ROOFTOP plays the ending first
  if (victory && fought === 3) state = S_END;
  if (victory) Snd.best(); else Snd.ko();
}

function pauseGame(){ if (state !== S_PLAY) return; state = S_PAUSE; CG.gameplayStop(); }
function resumeGame(){ if (state !== S_PAUSE) return; state = S_PLAY; CG.gameplayStart(); }

function press(dir){

  if (state === S_END){ state = S_DEAD; Snd.tick(); return; }   // ending → tally
  if (state === S_MENU){ startRun(); return; }

  if (state === S_PLAY && scrollOffer){ pickScroll(dir < 0 ? scrollOffer.a : scrollOffer.b); return; }

// JF-#016: rewarded ad = bank the run's jade twice (once per tally)

// permanently disabled the offer without ever granting it. adPending now
// blocks re-clicks while a request is in flight; rewardUsed (the permanent
// one-per-tally lock) only sets once CG.rewarded's callback actually fires.
let adPending = false;
function doubleJade(){
  if (rewardUsed || adPending || jadeRun <= 0) return;

  CG.rewarded(() => { adPending = false; rewardUsed = true; save.jade += jadeRun; persist(); Snd.best(); });

function buyUp(i){
  const u = UPS[i], tier = save.up[u.k];
  if (tier >= u.max) return;
  const cost = u.cost(tier);
  if (save.jade < cost){ Snd.tick(); return; }
  save.jade -= cost; save.up[u.k] = tier + 1; persist();
  Snd.best();
}
addEventListener('keydown', e => {

function startRun(){
  // JF-#036: request the midgame ad BEFORE gameplayStart fires, and don't
  // start the run until the ad module actually resolves — previously
  // gameplayStart() fired in the same tick as the ad request, so the SDK
  // briefly thought gameplay was "active" while an ad was also in flight.
  // We're still in the menu (SDK gameplay already reported stopped from the
  // previous run's end) so it's safe to sit here until the ad callback fires.
  // JF-#037: adPendingRun guards a real race — the menu stays fully
  // interactive during the ad-wait window, and adT is already updated the
  // instant the ad is requested, so a second tap/press while waiting used to
  // skip the (already-consumed) cooldown check and call beginRun()
  // immediately; then the first ad's callback would fire later and call
  // beginRun() AGAIN, clobbering the run already in progress.
  if (adPendingRun) return;
  if (ranOnce && Date.now() - adT > 180000){
    adT = Date.now(); adPendingRun = true;
    CG.interstitial(() => { adPendingRun = false; beginRun(); });
  } else beginRun();
}
function beginRun(){

  score = 0; combo = 0; comboT = 0; kills = 0; counters = 0; bestCombo = 0;
  jadeRun = 0;
  PR = REACH + save.up.palm * 8;
  CW = 120 + save.up.focus * 40;   // JF-#006: tighter base window (was 150) — FOCUS earns its cost
  windAvail = save.up.wind > 0;
  // warm-up compression: higher belts start hotter via the belt term in the
  // difficulty formula; the alternating-spawn learning window still shrinks
  const belt = beltOf(save.kills);
  waveT = 0;
  INTRO = Math.max(240, 720 - belt * 120);   // JF-#028: shorter safe-learning window
  promoted = -1;
  // JF-#011: trial-day rollover + run counters + omen application
  const today0 = new Date().toDateString();
  if (save.tday !== today0){ save.tday = today0; save.tdone = [0,0,0]; persist(); }
  trialCt = {};
  const O = todayOmen();
  omen = omenOn
    ? { heart: O.heart || 0, windScale: O.windScale || 1, jadeScale: O.jadeScale || 1,
        perfTh: O.perfTh || 0.66, spdScale: O.spdScale || 1 }
    : { heart: 0, windScale: 1, jadeScale: 1, perfTh: 0.66, spdScale: 1 };
  // return bonus: first fight of a new day = double jade (streak tracked)
  const today = new Date().toDateString();
  dailyBonus = save.day !== today;
  if (dailyBonus){
    const yest = new Date(); yest.setDate(yest.getDate() - 1);
    save.streak = save.day === yest.toDateString() ? save.streak + 1 : 1;
    save.day = today; persist();
  }
  hearts = Math.max(1, 3 + save.up.body + omen.heart + TUNE.heartsD); hurtFlash = 0; difficulty = 0; spawnT = 50; whiffT = 0; adaptShown = false; finisherCue = false;   // JF-#049 knob
  readyT = 0; P.ctrFlashT = 0;   // JF-#053
  if (omenOn) popup(W/2, 200, 'OMEN ACCEPTED: ' + O.b.toUpperCase() + ' / ' + O.c.toUpperCase(), '#c8a8e8', true);
  enemies.length = 0; popups.length = 0; parts.length = 0; darts.length = 0;
  P.riseT = 0; P.duckT = 0; P.y = GROUND_Y;   // JF-#028; JF-#059 rename
  lineUse = { mid: 0, low: 0, high: 0 }; guardTaught = false;   // JF-#041
  grapple = null; P.flourishT = 0; clashT = 0;   // JF-#044
  P.duckAge = 0; padDuckActive = false;          // JF-#047 (duckHeld follows the physical key)
  bannerT = 0; won = false; fought = sel; perfChain = 0;
  run = {}; scrollOffer = null;   // JF-#025: scrolls die with the run
  hypeShown = -1; longestSend = 0;   // JF-#030: reset silly-run trackers
  moonWakeT = 0; propHitT = 0; restGag = null;   // JF-#031
  dBase = DISTRICTS[sel].dBase;
  beginWave(1);
  // JF-#062: on first launch, run the guided teach in place of the normal wave.
  // BOT excluded — the fairness suite tests real combat, not onboarding.
  tut.active = ((!save.tut) || TUT_FORCE) && !BOT;
  tut.step = 0; tut.counters = 0; tut.done = false;
  if (tut.active){
    enemies.length = 0; toSpawn = 0; difficulty = 0; INTRO = 1e9; spawnT = 24;
    hearts = Math.max(3, hearts);
  }
  // JF-#012: veterans get the district's line instead of the controls lesson
  if (!tut.active){
    msg = save.kills > 50
      ? DISTRICTS[sel].name + ' — ' + DISTRICTS[sel].line
      // JF-#059: no jumping — AMBER (high) answered by ▲, GRAB by ▼
      : (TOUCH ? 'RED: tap INTO it to counter, or tap AWAY to evade · AMBER ▲ · GRAB duck ▼'
