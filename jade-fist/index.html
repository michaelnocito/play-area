'use strict';
// ============================================================================
// JADE FIST — kung fu counter-brawler prototype (JF-#001)
// Single file, canvas + vanilla JS, procedural art + WebAudio. No assets.
// Verbs: STRIKE (tap toward an enemy) / COUNTER (strike during their red
// telegraph flash -> throw, knocks down neighbors) / combo chain multiplier.
// ============================================================================

const W = 960, H = 540;
const cv = document.getElementById('c'), cx = cv.getContext('2d');
let scale = 1;
// JF-#015: back the canvas at devicePixelRatio so it stays crisp on hi-dpi
// displays (CG requirement). All game code keeps drawing in 960x540 logical
// coords — the base transform maps them to physical pixels.
function fit(){
  const ww = innerWidth, wh = innerHeight;
  const dpr = window.devicePixelRatio || 1;
  scale = Math.min(ww / W, wh / H);
  cv.width = Math.round(W * scale * dpr);
  cv.height = Math.round(H * scale * dpr);
  cv.style.width = (W * scale) + 'px';
  cv.style.height = (H * scale) + 'px';
  cx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);
}
addEventListener('resize', fit); fit();

// ---------------------------------------------------------------- audio ----
// Layered voices per the speaker-scaling architecture: transient click
// 2-5kHz + mid body 200-500Hz + harmonic bass; sub sine as parallel garnish.
const Snd = (() => {
  let ac = null, master = null, muted = localStorage.getItem('jf_mute') === '1';
  function ensure(){
    if (!ac){
      ac = new (window.AudioContext || window.webkitAudioContext)();
      master = ac.createGain(); master.gain.value = muted ? 0 : 0.8;
      master.connect(ac.destination);
    }
    if (ac.state === 'suspended') ac.resume();
  }
  function env(g, t0, a, peak, dur){
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(peak, t0 + a);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  }
  function tone(freq, dur, type, peak, when, bend){
    const t0 = ac.currentTime + (when || 0);
    const o = ac.createOscillator(), g = ac.createGain();
    o.type = type || 'sine'; o.frequency.setValueAtTime(freq, t0);
    if (bend) o.frequency.exponentialRampToValueAtTime(bend, t0 + dur);
    env(g, t0, 0.004, peak, dur);
    o.connect(g); g.connect(master); o.start(t0); o.stop(t0 + dur + 0.02);
  }
  function noise(dur, peak, hp, when){
    const t0 = ac.currentTime + (when || 0);
    const n = Math.floor(ac.sampleRate * dur);
    const buf = ac.createBuffer(1, n, ac.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / n);
    const s = ac.createBufferSource(); s.buffer = buf;
    const f = ac.createBiquadFilter(); f.type = 'highpass'; f.frequency.value = hp || 1000;
    const g = ac.createGain(); env(g, t0, 0.003, peak, dur);
    s.connect(f); f.connect(g); g.connect(master); s.start(t0);
  }
  // JF-#021: reactive music — an A-pentatonic pluck bed over a two-voice drone.
  // One knob (intensity 0..1) drives tempo, note density, register, and drone
  // swell; a boss on screen adds a low taiko pulse. Runs off the same master
  // gain so mute covers it; intensity 0 = silence (pause/blur fade out).
  let mGain = null, droneGain = null, mNext = 0, mBeat = 0;
  const PENT = [220, 261.6, 293.7, 329.6, 392, 440, 523.3, 587.3, 659.3];
  function mEnsure(){
    if (mGain) return;
    mGain = ac.createGain(); mGain.gain.value = 0; mGain.connect(master);
    droneGain = ac.createGain(); droneGain.gain.value = 0; droneGain.connect(mGain);
    const d1 = ac.createOscillator(); d1.type = 'sine'; d1.frequency.value = 55;
    const d2 = ac.createOscillator(); d2.type = 'triangle'; d2.frequency.value = 110.4;
    d1.connect(droneGain); d2.connect(droneGain); d1.start(); d2.start();
    mNext = ac.currentTime + 0.1;
  }
  function pluck(freq, when, vel){
    const o = ac.createOscillator(), g = ac.createGain(), f = ac.createBiquadFilter();
    o.type = 'triangle'; o.frequency.value = freq;
    f.type = 'lowpass';
    f.frequency.setValueAtTime(freq * 4, when);
    f.frequency.exponentialRampToValueAtTime(freq * 1.5, when + 0.3);
    g.gain.setValueAtTime(0.0001, when);
    g.gain.exponentialRampToValueAtTime(vel, when + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, when + 0.55);
    o.connect(f); f.connect(g); g.connect(mGain);
    o.start(when); o.stop(when + 0.6);
  }
  function thump(when){
    const o = ac.createOscillator(), g = ac.createGain();
    o.type = 'sine'; o.frequency.setValueAtTime(70, when);
    o.frequency.exponentialRampToValueAtTime(42, when + 0.18);
    g.gain.setValueAtTime(0.0001, when);
    g.gain.exponentialRampToValueAtTime(0.9, when + 0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, when + 0.28);
    o.connect(g); g.connect(mGain); o.start(when); o.stop(when + 0.3);
  }
  return {
    get muted(){ return muted; },
    toggleMute(){
      muted = !muted; localStorage.setItem('jf_mute', muted ? '1' : '0');
      if (master) master.gain.value = muted ? 0 : 0.8;
    },
    unlock(){ ensure(); },
    music(intensity, boss){
      if (!ac) return;              // no context until the first user gesture
      mEnsure();
      mGain.gain.setTargetAtTime(intensity * 0.14, ac.currentTime, 0.6);
      droneGain.gain.setTargetAtTime(intensity * 0.5, ac.currentTime, 1.4);
      const spb = 60 / (64 + intensity * 76);        // eighth-note interval
      while (mNext < ac.currentTime + 0.2){
        mBeat++;
        if (intensity > 0.02 && Math.random() < intensity * 0.85){
          const span = 3 + Math.round(intensity * (PENT.length - 3));
          pluck(PENT[(Math.random() * span) | 0], mNext, 0.4 + Math.random() * 0.3);
        }
        if (boss && mBeat % 4 === 0) thump(mNext);
        mNext += spb;
      }
    },
    whoosh(){ ensure(); noise(0.09, 0.25, 2200); },
    hit(combo){
      ensure();
      const p = Math.min(combo, 8);
      noise(0.05, 0.5, 2500);                          // transient click
      tone(220 * Math.pow(1.06, p), 0.09, 'square', 0.22);  // mid body, pitch rises w/ combo
      tone(90, 0.12, 'sine', 0.4, 0, 55);              // harmonic bass thump
      tone(52, 0.14, 'sine', 0.3);                     // sub garnish
    },
    counter(){
      ensure();
      noise(0.06, 0.6, 3000);
      tone(660, 0.5, 'sine', 0.28);                    // gong shimmer
      tone(662.5, 0.5, 'sine', 0.2);                   // beat frequency = gong wobble
      tone(110, 0.3, 'triangle', 0.35, 0, 70);
      tone(48, 0.3, 'sine', 0.35);
    },
    hurt(){
      ensure();
      noise(0.12, 0.5, 800);
      tone(140, 0.25, 'sawtooth', 0.25, 0, 60);
      tone(45, 0.3, 'sine', 0.4);
    },
    ko(){
      ensure();
      tone(180, 0.7, 'triangle', 0.3, 0, 40);
      tone(44, 0.8, 'sine', 0.45);
      noise(0.3, 0.3, 400, 0.05);
    },
    windup(frames){ ensure(); tone(320, frames / 60, 'sine', 0.12, 0, 520); },
    block(){
      ensure();
      noise(0.05, 0.5, 4000);                          // metallic clank
      tone(1200, 0.08, 'square', 0.12);
      tone(300, 0.1, 'triangle', 0.2, 0, 200);
    },
    tick(){ ensure(); tone(880, 0.05, 'sine', 0.15); },
    best(){ ensure(); [523,659,784].forEach((f,i)=>tone(f, 0.25, 'sine', 0.2, i*0.09)); }
  };
})();

// SDK:ADAPTER:BEGIN (JF-#024: make-alt-builds.ps1 swaps this block per platform)
// -------------------------------------------------- CrazyGames SDK (JF-#013) --
// Adapter copied from rooftop-sprint: graceful no-op offline. sdkLive = init()
// actually resolved (only true on the CG platform); every game/ad call is gated
// on it — calling the SDK pre-init or off-platform just logs errors and is dropped.
let sdkLive = false;
const CG = {
  init(cb){ try{ if(window.CrazyGames?.SDK){ window.CrazyGames.SDK.init().then(()=>{ sdkLive = true; cb&&cb(); }).catch(()=>cb&&cb()); return; } }catch(e){} cb&&cb(); },
  loadingStart(){ try{ if(sdkLive) window.CrazyGames.SDK.game.loadingStart(); }catch(e){} },
  loadingStop(){ try{ if(sdkLive) window.CrazyGames.SDK.game.loadingStop(); }catch(e){} },
  gameplayStart(){ try{ if(sdkLive) window.CrazyGames.SDK.game.gameplayStart(); }catch(e){} },
  gameplayStop(){ try{ if(sdkLive) window.CrazyGames.SDK.game.gameplayStop(); }catch(e){} },
  happytime(){ try{ if(sdkLive) window.CrazyGames.SDK.game.happytime(); }catch(e){} },
  // JF-#026: CG leaderboards are INVITE-ONLY (one board/game, weekly seasons).
  // Local Hall of Legends ships now; when invited, wire the score submit here.
  submitScore(s){},
  interstitial(){ try{ if(sdkLive) window.CrazyGames.SDK.ad.requestAd("midgame", {
    adStarted(){}, adFinished(){}, adError(){},
  }); }catch(e){} },
  rewarded(onReward){
    try{ if(sdkLive && window.CrazyGames?.SDK?.ad?.requestAd){
      window.CrazyGames.SDK.ad.requestAd("rewarded", {
        adStarted(){}, adFinished(){ onReward&&onReward(); }, adError(){ onReward&&onReward(); },
      }); return;
    } }catch(e){}
    onReward&&onReward();
  },
};
// Single-file game: everything is already parsed by init time, so loading
// start/stop bracket only the SDK handshake itself.
CG.init(() => { CG.loadingStart(); CG.loadingStop(); });
// SDK:ADAPTER:END

// ----------------------------------------------------------------- state ----
// ------------------------------------------------------- progression save ---
// localStorage save = free cloud sync on CrazyGames (Automatic Progress Save
// backs up localStorage for HTML5 games; Data Module syncs for logged-in users).
// Design rule (Rooftop §4 research): upgrades compress the warm-up / add options,
// never raise the skill ceiling; ~×2 cost per tier; first buy within 1-2 runs.
const SAVE_KEY = 'jf_save_v1';
let save = { jade: 0, up: { body: 0, palm: 0, focus: 0, wind: 0 },
             kills: 0, ach: {}, day: '', streak: 0, dist: 0, tday: '', tdone: [0,0,0], intro: 0,
             cos: { own: [1,0,0,0,0], wear: 0 }, hall: [[],[],[],[],[]] };
try {
  const s = JSON.parse(localStorage.getItem(SAVE_KEY));
  if (s && s.up) save = {
    jade: s.jade | 0, up: Object.assign(save.up, s.up),
    kills: s.kills | 0, ach: s.ach || {}, day: s.day || '', streak: s.streak | 0,
    dist: s.dist | 0, tday: s.tday || '', tdone: s.tdone || [0,0,0], intro: s.intro | 0,
    cos: (s.cos && s.cos.own) ? { own: s.cos.own, wear: s.cos.wear | 0 } : save.cos,
    hall: Array.isArray(s.hall) && s.hall.length === 5 ? s.hall : save.hall
  };
} catch (e) {}
// JF-#023: cosmetic shop — robe dyes, a pure jade sink. Cosmetics only: no
// stats, so the shop can never bend balance. Hues stay far from enemy greys
// and telegraph reds so readability holds.
const STYLES = [
  { name: 'TRAVELER',     col: '#e8dcc0', cost: 0   },
  { name: 'MOON WHITE',   col: '#f8f2e0', cost: 40  },
  { name: 'JADE ROBE',    col: '#aee8c6', cost: 60  },
  { name: 'GOLD SILK',    col: '#e8cf88', cost: 90  },
  { name: 'NIGHT ORCHID', col: '#c8aee6', cost: 120 }
];
let styleSel = save.cos.wear;      // wardrobe cursor (menu)
function wearCol(){ return STYLES[save.cos.wear].col; }
function styleNext(){
  styleSel = (styleSel + 1) % STYLES.length;
  if (save.cos.own[styleSel]){ save.cos.wear = styleSel; persist(); }
  Snd.tick();
}
function styleBuy(){
  if (save.cos.own[styleSel]) return;
  const c = STYLES[styleSel].cost;
  if (save.jade < c){ Snd.tick(); return; }
  save.jade -= c; save.cos.own[styleSel] = 1; save.cos.wear = styleSel; persist();
  Snd.best();
}
let styleRect = null, styleBuyRect = null;   // menu hitboxes (rebuilt each draw)
function persist(){ localStorage.setItem(SAVE_KEY, JSON.stringify(save)); }
// JF-#022: bot fairness suite — open index.html?bot=3 (&react=12) and a bot with
// a fixed human reaction time (frames, 12 ≈ 200ms) plays N runs in each of the
// four campaign districts, classifying every hit it takes: PINCER (opposite-side
// threat overlapped), FAST (telegraph shorter than the reaction time), or clean.
// Results go to the console as a per-run table + aggregate verdict. Bot mode
// never touches the real save or best score.
const BOTQ = new URLSearchParams(location.search);
const BOT = BOTQ.has('bot')
  ? { runs: Math.max(1, +BOTQ.get('bot') || 3), react: +BOTQ.get('react') || 12,
      run: 0, stats: [], cur: null, done: false }
  : null;
if (BOT){ save.dist = 4; save.intro = 1; persist = () => {}; }
function botThink(){
  // counter first: the ripest windup that has been visible >= reaction frames
  let tgt = null, ripest = -1;
  for (const e of enemies){
    if (e.st !== E_WINDUP || e.stT < BOT.react) continue;
    const range = Math.max(e.reach, PR) + 18;
    if (Math.abs(e.x - P.x) > range) continue;
    const r = e.stT / e.windup;
    if (r > ripest){ ripest = r; tgt = e; }
  }
  if (tgt){ strike(Math.sign(tgt.x - P.x) || 1); return; }
  // otherwise thin the crowd at a human-ish cadence
  if (t % 10 === 0){
    const e = nearestInReach(0);
    if (e && e.st !== E_WINDUP) strike(Math.sign(e.x - P.x) || 1);
  }
}
function botHit(e){
  if (!BOT.cur) return;
  const pincer = enemies.some(o => o !== e && (o.st === E_WINDUP || o.st === E_STRIKE) &&
    Math.sign(o.x - P.x) !== Math.sign(e.x - P.x));
  BOT.cur.hits.push({ wave, type: e.type, windup: Math.round(e.windup0 || e.windup),
    pincer, fast: (e.windup0 || e.windup) < BOT.react });
}
function botFrame(){
  if (BOT.done) return;
  if (state === S_STORY || state === S_MENU){
    sel = Math.min(3, Math.floor(BOT.run / BOT.runs));
    BOT.cur = { hits: [] };
    startRun();
    return;
  }
  if (state === S_PLAY){
    // JF-#025: bot takes a scroll at random so runs keep moving
    if (scrollOffer){ pickScroll(Math.random() < 0.5 || scrollOffer.b < 0 ? scrollOffer.a : scrollOffer.b); return; }
    botThink(); return;
  }
  if (state === S_DEAD && tallyT > 100){
    BOT.run++;
    if (BOT.run >= BOT.runs * 4){
      BOT.done = true;
      console.table(BOT.stats);
      const all = BOT.stats.flatMap(s => s.hitList);
      const agg = {
        runs: BOT.stats.length,
        avgWave: +(BOT.stats.reduce((n, s) => n + s.wave, 0) / BOT.stats.length).toFixed(1),
        wins: BOT.stats.filter(s => s.won).length,
        hitsPerRun: +(all.length / BOT.stats.length).toFixed(1),
        pctPincer: all.length ? Math.round(100 * all.filter(h => h.pincer).length / all.length) : 0,
        pctFast: all.length ? Math.round(100 * all.filter(h => h.fast).length / all.length) : 0
      };
      console.log('JADE FIST FAIRNESS VERDICT', agg);
      console.log(agg.pctFast > 15 ? '⚠ >15% of hits came from telegraphs shorter than the reaction time — unreactable, tune windups up.'
        : agg.pctPincer > 35 ? '⚠ >35% of hits were pincers — fairness guard may lift too early.'
        : '✓ fair: most damage was reactable and single-sided.');
      return;
    }
    state = S_MENU;   // next run
  }
}
// belts = lifetime-kill milestones (CG "achievable objectives"); sash shows your rank
const BELTS = [
  { name: 'WHITE',  need: 0,   col: '#e8e8e8' },
  { name: 'YELLOW', need: 25,  col: '#e8d05a' },
  { name: 'ORANGE', need: 75,  col: '#e89a4a' },
  { name: 'GREEN',  need: 150, col: '#3fae7c' },
  { name: 'BLUE',   need: 300, col: '#4a8ae8' },
  { name: 'BROWN',  need: 500, col: '#a8794a' },
  { name: 'BLACK',  need: 800, col: '#3a3f48' }
];
function beltOf(k){ let b = 0; BELTS.forEach((B, i) => { if (k >= B.need) b = i; }); return b; }
// JF-#010: techniques — belt promotions teach new play, not just a sash color.
// All three live inside the two verbs: better throws, a later counter window,
// and a chain reward for perfect timing.
const TECH = [
  { belt: 1, name: 'DRAGON SWEEP', desc: 'perfect throws fly farther and pierce' },
  { belt: 3, name: 'IRON CATCH',   desc: 'counter even as their strike falls' },
  { belt: 4, name: 'PALM WAVE',    desc: '3 perfect counters in a row fell BOTH sides' }
];
function hasTech(i){ return beltOf(save.kills + kills) >= TECH[i].belt; }
// JF-#011: daily trials — three rotating objectives, 15◆ each, once per day.
// Rotation is date-seeded so every player sees the same trio on the same day.
const TRIALS = [
  { k: 'vip',     name: 'Counter 5 vipers',           n: 5 },
  { k: 'perf',    name: 'Land 4 perfect counters',    n: 4 },
  { k: 'sweep',   name: 'Sweep 3 crowds',             n: 3 },
  { k: 'nohit',   name: 'Clear a wave untouched',     n: 1 },
  { k: 'heavy',   name: 'Punish 6 recovering foes',   n: 6 },
  { k: 'stumble', name: 'Cause 4 stumbles',           n: 4 }
];
const dayNum = () => Math.floor(Date.now() / 86400000);
function todayTrio(){ const d = dayNum(); return [d % 6, (d + 2) % 6, (d + 4) % 6]; }
let trialCt = {};
function bumpTrial(k, amt){
  trialCt[k] = (trialCt[k] || 0) + (amt || 1);
  const trio = todayTrio();
  for (let i = 0; i < 3; i++){
    const T = TRIALS[trio[i]];
    if (T.k === k && !save.tdone[i] && trialCt[k] >= T.n){
      save.tdone[i] = 1; jadeRun += 15; persist();
      popup(W/2, 250, 'TRIAL: ' + T.name.toUpperCase() + '  +15◆', '#7ce8a8', true);
      Snd.best();
    }
  }
}
// JF-#011: the daily OMEN — a paired boon and curse you may accept before a run
const OMENS = [
  { b: '+1 heart',              c: 'telegraphs 20% faster', heart: 1, windScale: 0.8 },
  { b: 'jade ×1.5',             c: 'one fewer heart',       heart: -1, jadeScale: 1.5 },
  { b: 'wider perfect window',  c: 'enemies 15% faster',    perfTh: 0.55, spdScale: 1.15 }
];
let omenOn = false;
let omen = { heart: 0, windScale: 1, jadeScale: 1, perfTh: 0.66, spdScale: 1 };
const todayOmen = () => OMENS[dayNum() % OMENS.length];
// one-time jade bounties = session goals beyond score
const ACH = [
  { k: 'counter', name: 'First Counter',       jade: 10 },
  { k: 'chain5',  name: 'Five-Fold Chain',     jade: 15 },
  { k: 'monk',    name: 'Iron Monk Felled',    jade: 15 },
  { k: 'spear',   name: 'Spear Turned Aside',  jade: 15 },
  { k: 'endure',  name: 'Endure 90 Seconds',   jade: 20 }
];
function award(key){
  if (save.ach[key]) return;
  save.ach[key] = 1;
  const a = ACH.find(a => a.k === key);
  save.jade += a.jade; persist();
  popup(W/2, 150, a.name.toUpperCase() + '  +' + a.jade + '◆', '#7ce8a8', true);
  Snd.best();
}
const UPS = [
  { k: 'body',  name: 'IRON BODY',   max: 2, cost: t => 20 * (1 << t), desc: '+1 heart' },
  { k: 'palm',  name: 'JADE PALM',   max: 3, cost: t => 12 * (1 << t), desc: 'longer reach' },
  { k: 'focus', name: 'INNER FOCUS', max: 3, cost: t => 12 * (1 << t), desc: 'combo lasts longer' },
  { k: 'wind',  name: 'SECOND WIND', max: 1, cost: () => 60,           desc: 'rise once per fight' }
];

const S_MENU = 0, S_PLAY = 1, S_DEAD = 2, S_STORY = 3, S_END = 4, S_PAUSE = 5;   // JF-#014
let state = save.intro ? S_MENU : S_STORY;   // JF-#012: first launch opens on the tale
let t = 0;                       // global frame clock
let shake = 0, hitStop = 0, slowMo = 0;
let score = 0, best = +(localStorage.getItem('jf_best') || 0);
let combo = 0, comboT = 0;       // combo count + decay timer
let kills = 0, counters = 0, bestCombo = 0;
let hearts = 3, hurtFlash = 0;
let popups = [], parts = [], enemies = [];
let waveT = 0, spawnT = 60, difficulty = 0;
// JF-#008: wave machine — quota waves with rest beats; every 5th wave = boss
const WAVES_PER_DISTRICT = 5;
let wave = 1, wavePhase = 0, restT = 0, toSpawn = 0;   // phase 0=fight 1=rest
let dBase = 0;                        // district base difficulty (district table)
let won = false;                      // district boss felled this run
// JF-#009: districts are levels — each with its own fight, palette, and boss.
// Beat a district's master to unlock the next.
const DISTRICTS = [
  { name: 'COURTYARD', line: 'Where the jade was taken.', boss: 'THE IRON MASTER',
    dBase: 0, quirk: '', bossHp: 3,
    sky: ['#0b1020','#131a26','#0e1218'], ground: '#1a1f26', lant: [240,150,90], pag: 4 },
  { name: 'MARKET', line: 'They crowd like locusts.', boss: 'THE BUTCHER',
    dBase: 2, quirk: 'crowd', bossHp: 3,
    sky: ['#180f0c','#2a1a10','#170f0a'], ground: '#241a12', lant: [250,190,90], pag: 6 },
  { name: 'TEMPLE', line: 'Every hand is guarded.', boss: 'THE ABBOT',
    dBase: 4, quirk: 'guard', bossHp: 4,
    sky: ['#0c1410','#14231a','#0c1410'], ground: '#16211a', lant: [140,230,160], pag: 3 },
  { name: 'ROOFTOP', line: 'The thief waits above.', boss: 'THE JADE THIEF',

let bannerCol = '#e8dcc0';
let bufDir = 0, bufT = 0;        // input buffer across hit-stop

let adaptShown = false;          // "crowd wises up" banner shown once per run (JF-#007)
let perfChain = 0;               // consecutive perfect counters (PALM WAVE fuel, JF-#010)

// JF-#025: scrolls — within-run escalation (top-100 gap G1). Clearing a wave
// offers a choice of two run-only scrolls; powers stack for THIS run and die
// with it, so the permanent shop stays the only lasting progression. Every
// scroll amplifies the two existing verbs — none adds a new input.
const SCROLLS = [
  { k: 'tiger',  name: 'TIGER SCROLL',   desc: 'throws fly harder, fell wider' },
  { k: 'crane',  name: 'CRANE SCROLL',   desc: 'the perfect window opens sooner' },
  { k: 'ox',     name: 'OX SCROLL',      desc: '+1 heart, now and for this run' },
  { k: 'serpent',name: 'SERPENT SCROLL', desc: 'combos linger far longer' },
  { k: 'dragon', name: 'DRAGON SCROLL',  desc: 'jade ×1.5 at the tally' },
  { k: 'monkey', name: 'MONKEY SCROLL',  desc: 'whiffs recover twice as fast' }
];
let run = {};                         // run-scoped scroll flags (k: 1)
let scrollOffer = null;               // {a, b} SCROLLS indices while choosing
function offerScrolls(){
  const left = SCROLLS.map((s, i) => i).filter(i => !run[SCROLLS[i].k]);
  if (!left.length) return;
  for (let i = left.length - 1; i > 0; i--){
    const j = (Math.random() * (i + 1)) | 0; [left[i], left[j]] = [left[j], left[i]];
  }
  scrollOffer = { a: left[0], b: left.length > 1 ? left[1] : -1 };
  Snd.tick();
}
function pickScroll(i){
  if (i < 0){ scrollOffer = null; return; }
  const s = SCROLLS[i];
  run[s.k] = 1; scrollOffer = null;
  if (s.k === 'ox') hearts++;
  if (s.k === 'serpent') CW += 70;
  banner(s.name, '#e8c76a', 90);
  burst(P.x, P.y - 55, '#e8c76a', 20, 4);
  Snd.best();
}
// effective perfect-counter threshold: CRANE opens the window earlier
function perfTh(){ return run.crane ? Math.min(omen.perfTh, 0.55) : omen.perfTh; }
let jadeRun = 0, windAvail = false;   // jade earned this run; Second Wind charge
let dailyBonus = false;               // first fight of the day = double jade
let promoted = -1;                    // belt reached mid-run (-1 = none)
let walletShown = 0;                  // animated wallet display on tally
let INTRO = 900;                      // alternating-spawn learning window (shrinks w/ belt)
let PR = 92, CW = 150;                // player reach / combo window (upgraded at startRun)
let btnRects = [];                    // tally upgrade-button hitboxes (rebuilt each draw)
let tallyDone = false;                // all tally lines revealed (drawn at least once)
// JF-#016: ad state — interstitial between runs on a 3-min cooldown (CG guidance),
// rewarded DOUBLE JADE offer once per tally
let adT = 0, ranOnce = false, rewardUsed = false, adRect = null;
const TOUCH = matchMedia('(pointer:coarse)').matches;
let tallyStep = 0, tallyT = 0, newBest = false;
let hallRank = 0;                     // JF-#026: rank earned by the last run (0 = none)
let msg = null, msgT = 0;

const P = { x: W/2, y: 420, face: 1, punchT: 0, punchSide: 1, stance: 0 };

// ---------------------------------------------------------------- enemies ---
// Enemy lifecycle: walk in -> windup (RED TELEGRAPH = counter window) ->
// strike (hits you if still standing there) -> recover -> walk again.
const E_WALK = 0, E_WINDUP = 1, E_STRIKE = 2, E_RECOVER = 3, E_DOWN = 4, E_THROWN = 5, E_STAGGER = 6, E_FEINT = 7;
// types: 0 initiate · 1 viper (fast, short telegraph) · 2 iron monk (brute — strikes
// only SHOVE him, counter to fell) · 3 spearman (attacks from long range — counter at range)
const T_NORM = 0, T_FAST = 1, T_BRUTE = 2, T_SPEAR = 3, T_BOSS = 4;
function spawnEnemy(forceSide){
  // first ~15s: strictly alternate sides so the player is never pincered while learning
  const side = forceSide || (waveT < INTRO ? -lastSpawnSide : (Math.random() < 0.5 ? -1 : 1));
  lastSpawnSide = side;
  // JF-#009: district quirks skew the enemy mix — each district is its own fight
  const q = DISTRICTS[sel].quirk;
  let type = T_NORM;
  const r = Math.random();
  const spearTh = q === 'spear' ? 0.34 : 0.18, spearDiff = q === 'spear' ? 1.5 : 4;
  const bruteTh = q === 'guard' ? 0.52 : 0.38, bruteDiff = q === 'guard' ? 1.5 : 2.5;
  const fastTh  = q === 'crowd' ? 0.78 : 0.6;
  if (difficulty > spearDiff && r < spearTh) type = T_SPEAR;
  else if (difficulty > bruteDiff && r < bruteTh) type = T_BRUTE;
  else if (difficulty > 1 && r < fastTh) type = T_FAST;
  const base = 1.1 + Math.random() * 0.5 + difficulty * 0.12;
  const wind = Math.max(20, 46 - difficulty * 2.4);   // telegraph shrinks as waves rise (JF-#006: tighter late)
  enemies.push({
    x: W/2 + side * (W/2 + 40 + Math.random() * 70), side: -side,   // walks toward center
    st: E_WALK, stT: 0, type,
    speed: (type === T_FAST ? base * 1.5 : type === T_BRUTE ? base * 0.7 : base) * omen.spdScale,
    windup: (type === T_FAST ? Math.max(16, wind * 0.6) : type === T_BRUTE ? wind * 1.3 : wind) * omen.windScale,
    reach: type === T_SPEAR ? REACH + 70 : REACH,
    // JF-#007: vipers can guard too (diff>5); combo 8+ = the crowd wises up (+20% guard)
    // JF-#009: TEMPLE district = every hand is guarded (+18%)
    guard: ((type === T_NORM || (type === T_FAST && difficulty > 5)) &&
      Math.random() < Math.min(0.15 + difficulty * 0.04 + (combo >= 8 ? 0.2 : 0) +
        (q === 'guard' ? 0.18 : 0), 0.65)) ? 1 : 0,
    // JF-#007: some vipers open with a FEINT — pale flash, no audio, hops back out of reach
    feint: type === T_FAST && difficulty > 4 && Math.random() < 0.35,
    vx: 0, vy: 0, y: 420, rot: 0
  });
  const ne = enemies[enemies.length - 1];
  ne.windup0 = ne.windup;                     // base windup (brute rage floors off this)
  if (ne.guard && combo >= 8 && !adaptShown){
    adaptShown = true;
    popup(W/2, 220, 'THE CROWD WISES UP', '#a8b4c8', true);
  }
}

// JF-#008: boss — the Master. Counters are the ONLY damage; each counter taken
// drops a phase: faster telegraphs + he calls two students to the fight.
function spawnBoss(hp){
  const side = Math.random() < 0.5 ? -1 : 1;
  enemies.push({
    x: W/2 + side * (W/2 + 60), side: -side, y: 420,
    st: E_WALK, stT: 0, type: T_BOSS,
    speed: 0.9, windup: 52, windup0: 52,
    reach: REACH + 24, guard: 0, feint: false,
    hp, hpMax: hp, vx: 0, vy: 0, rot: 0
  });
}

// wave lifecycle
function beginWave(n){
  wave = n; wavePhase = 0;
  const D = DISTRICTS[sel];
  hitsWave = 0;                       // untouched-wave trial tracking (JF-#011)
  const bossWave = wave % WAVES_PER_DISTRICT === 0;
  if (bossWave){
    toSpawn = 0;
    spawnBoss(D.bossHp + Math.floor(wave / WAVES_PER_DISTRICT) - 1);  // +1 hp per extra cycle (Legend)
    banner(D.boss, '#e86a6a', 140);
    Snd.windup(60);
  } else {
    toSpawn = 5 + wave * 2;
    banner('WAVE ' + wave, '#e8dcc0', 90);
  }
  spawnT = 40;
}
function onWaveClear(){
  wavePhase = 1;
  const D = DISTRICTS[sel];
  const bossWave = wave % WAVES_PER_DISTRICT === 0;
  if (bossWave){
    jadeRun += 25;
    if (D.legend){       // JF-#012: LEGEND never ends — the master returns, stronger
      banner('THE TALE CONTINUES  ·  +25◆', '#e8c76a', 190);
    } else {
      won = true;
      banner(D.boss + ' FALLS  ·  +25◆', '#7ce8a8', 190);
    }
    restT = 210; slowMo = Math.max(slowMo, 30); Snd.best();
  } else {
    banner('WAVE ' + wave + ' CLEARED', '#7ce8a8', 100);
    restT = 140; Snd.tick();
  }
  if (hitsWave === 0) bumpTrial('nohit');
  if (!won) offerScrolls();   // JF-#025: the rest beat becomes a choice
}
let hitsWave = 0;

const REACH = 92;   // strike range from player center
function nearestInReach(dir){
  let bestE = null, bd = 1e9;
  for (const e of enemies){
    if (e.st === E_DOWN || e.st === E_THROWN || e.st === E_FEINT) continue;   // feint = springing away, unhittable
    const dx = e.x - P.x;
    if (dir && Math.sign(dx) !== dir) continue;
    const d = Math.abs(dx);
    // a winding-up spearman can be countered at HIS reach, not just yours
    const range = (e.st === E_WINDUP ? Math.max(e.reach, PR) : PR) + 18;
    if (d < range && d < bd){ bd = d; bestE = e; }
  }
  return bestE;
}

function popup(x, y, txt, col, big){
  popups.push({ x, y, txt, col: col || '#e8dcc0', life: 46, big: !!big });
}
function burst(x, y, col, n, pow){
  for (let i = 0; i < n; i++){
    const a = Math.random() * Math.PI * 2, s = (0.5 + Math.random()) * (pow || 3);
    parts.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s - 1, life: 20 + Math.random()*16, col });
  }
}

// JF-#020: a touch of absurdity — occasional comedy send on perfect counters,
// wall bonks, and the odd felled-foe yelp. Rare on purpose: seasoning, not a tone change.
const SENDS = ['SEE YOU NEXT SPRING', "HE'LL WALK THAT OFF", 'STRAIGHT TO THE HEALER',
               'OVER THE NOODLE CART', 'TELL THE OTHERS'];
const YELPS = ['my sandals…', 'not the face', 'I quit', 'who hired him?', 'ow.'];
function yelp(x, y){
  if (Math.random() < 0.12) popup(x, y, YELPS[(Math.random() * YELPS.length) | 0], '#c8bfa8');
}

// ----------------------------------------------------------------- verbs ----
function strike(dir){
  if (state !== S_PLAY) return;
  if (whiffT > 0) return;                               // still recovering from a whiff
  if (hitStop > 0){ bufDir = dir; bufT = 8; return; }   // buffer through hit-stop
  P.face = dir; P.punchT = 12; P.punchSide = dir;
  const e = nearestInReach(dir);
  if (!e){ Snd.whoosh(); whiffT = run.monkey ? 7 : 14; return; }   // JF-#006 whiff recovery (JF-#025: MONKEY halves it)

  // JF-#010: IRON CATCH — with the technique, an unlanded strike can still be countered
  const ironCatch = e.st === E_STRIKE && !e.didHit && hasTech(1);
  if ((e.st === E_WINDUP || ironCatch) && e.type === T_BOSS && e.hp > 1){   // ---- BOSS PHASE ----
    // JF-#008: counters are the only damage; each one staggers him a phase
    e.hp--; e.st = E_STAGGER; e.stT = 0; e.vx = dir * 7;
    e.windup = Math.max(30, e.windup - 8);       // each phase: faster telegraphs
    counters++; jadeRun += 3; combo++; comboT = CW;
    score += 1000;
    popup(e.x, e.y - 110, 'MASTER STAGGERED +1000', '#7ce8a8', true);
    Snd.counter(); hitStop = 8; shake = 14; slowMo = 30;
    burst(e.x, e.y - 50, '#e86a6a', 26, 6);
    banner('HE CALLS HIS STUDENTS', '#e8b06a', 80);
    spawnEnemy(-1); spawnEnemy(1);               // phase adds, both sides
    if (combo > bestCombo) bestCombo = combo;
    return;
  }
  if (e.st === E_WINDUP || ironCatch){          // ---- COUNTER ----
    // JF-#007: final-third ("NOW" bright flash) = PERFECT counter
    // JF-#010: an IRON CATCH always counts as perfect
    const perfect = ironCatch || e.stT / e.windup > perfTh();   // JF-#025: CRANE widens
    if (e.type === T_FAST) bumpTrial('vip');
    if (perfect) bumpTrial('perf');
    counters++; jadeRun += perfect ? 5 : 3;
    award('counter');
    if (e.type === T_BRUTE) award('monk');
    if (e.type === T_SPEAR) award('spear');
    e.st = E_THROWN; e.stT = 0;
    // JF-#010: DRAGON SWEEP — perfect throws fly farther and pierce deeper
    const sweep = hasTech(0);
    e.vx = dir * (perfect ? (sweep ? 15 : 12) : 9) * (run.tiger ? 1.3 : 1);   // JF-#025: TIGER
    e.vy = perfect ? -8 : -7;
    // JF-#020: ~1 in 6 perfect counters is a comedy send — twice the arc, wild spin
    if (perfect && e.type !== T_BOSS && Math.random() < 0.18){
      e.vx *= 1.7; e.vy = -11; e.bigSend = true;
      popup(e.x, e.y - 130, SENDS[(Math.random() * SENDS.length) | 0], '#e8c76a', true);
    }
    combo++; comboT = CW;
    const baseC = e.type === T_BOSS ? 2000 : e.type === T_BRUTE ? 750 : e.type === T_SPEAR ? 600 : 500;
    const pts = Math.round(baseC * (perfect ? 1.5 : 1)) * Math.min(combo, 5);
    score += pts;
    popup(e.x, e.y - 90, (ironCatch ? 'IRON CATCH +' : perfect ? 'PERFECT +' : 'COUNTER +') + pts, perfect ? '#e8c76a' : '#7ce8a8', true);
    Snd.counter(); hitStop = 7; shake = perfect ? 13 : 10; slowMo = 26;
    burst(e.x, e.y - 40, perfect ? '#e8c76a' : '#7ce8a8', perfect ? 30 : 22, perfect ? 6 : 5);
    // thrown body knocks down neighbors in its path (more mid-flight — see E_THROWN)
    let felled = 0;
    for (const o of enemies){
      if (o === e || o.st === E_DOWN || o.st === E_THROWN) continue;
      if (o.type !== T_BOSS && Math.sign(o.x - e.x) === dir && Math.abs(o.x - e.x) < (perfect ? (sweep ? 260 : 220) : 150) + (run.tiger ? 50 : 0)){
        o.st = E_DOWN; o.stT = 0; o.vx = dir * 5; o.vy = -4;
        score += 250; kills++; jadeRun++; felled++;
        popup(o.x, o.y - 80, 'FELLED +250', '#e8c76a'); yelp(o.x, o.y - 104);
        burst(o.x, o.y - 40, '#e8c76a', 10, 3);
      }
    }
    // JF-#007: SWEEP — one throw felling 2+ pays a bonus
    if (felled >= 2){
      score += 500; jadeRun += 2;
      popup(W/2, 220, 'SWEEP +500', '#e8c76a', true);
      bumpTrial('sweep');
    }
    // JF-#010: PALM WAVE — 3 consecutive perfects release a wave that fells both sides
    if (perfect && hasTech(2)){
      perfChain++;
      if (perfChain >= 3){
        perfChain = 0;
        banner('PALM WAVE', '#e8c76a', 90);
        Snd.counter(); shake = 16; slowMo = Math.max(slowMo, 30);
        burst(P.x, P.y - 55, '#e8c76a', 40, 8);
        for (const o of enemies){
          if (o === e || o.st === E_DOWN || o.st === E_THROWN || o.type === T_BOSS) continue;
          if (Math.abs(o.x - P.x) < 260){
            o.st = E_DOWN; o.stT = 0; o.vx = Math.sign(o.x - P.x) * 6; o.vy = -5;
            score += 250; kills++; jadeRun++;
            popup(o.x, o.y - 80, 'FELLED +250', '#e8c76a'); yelp(o.x, o.y - 104);
            burst(o.x, o.y - 40, '#e8c76a', 10, 3);
          }
        }
      }
    } else if (!perfect) perfChain = 0;
    kills++;
  } else if (e.guard > 0){                       // ---- BLOCKED (guard break) ----
    e.guard = 0; e.st = E_STAGGER; e.stT = 0; e.vx = dir * 2.5;
    popup(e.x, e.y - 80, 'BLOCKED', '#a8b4c8');
    Snd.block(); hitStop = 2; shake = 2;
    burst(e.x, e.y - 58, '#a8b4c8', 6, 2);
  } else if (e.type === T_BOSS){                 // ---- the Master shrugs strikes off ----
    e.x += dir * 8;
    popup(e.x, e.y - 110, 'SHRUGGED OFF', '#a8b4c8');
    Snd.block(); hitStop = 2; shake = 2;
  } else if (e.type === T_BRUTE){                // ---- SHOVE (brute won't fall) ----
    e.st = E_STAGGER; e.stT = 0; e.vx = dir * 6;
    score += 50;
    // JF-#007: each shove ENRAGES him — next windup 15% faster (floor 55% of base)
    e.rage = (e.rage || 0) + 1;
    e.windup = Math.max(e.windup * 0.85, e.windup0 * 0.55);
    popup(e.x, e.y - 80, e.rage === 2 ? 'ENRAGED' : 'SHOVED +50', e.rage === 2 ? '#e86a6a' : '#c8bfa8');
    Snd.hit(1); hitStop = 2; shake = 3;
    burst(e.x, e.y - 45, e.rage >= 2 ? '#e86a6a' : '#9aa2b0', 8, 3);
  } else if (e.st === E_RECOVER){                // ---- HEAVY (punish the whiff) ----
    e.st = E_DOWN; e.stT = 0;
    e.vx = dir * 6; e.vy = -5.5;
    combo++; comboT = CW;
    const pts = 250 * Math.min(combo, 5);
    score += pts; kills++; jadeRun++;
    popup(e.x, e.y - 80, 'HEAVY +' + pts, '#e8c76a');
    bumpTrial('heavy');
    Snd.hit(combo + 3); hitStop = 5; shake = 6;
    burst(e.x, e.y - 45, '#e8c76a', 14, 4);
  } else {                                       // ---- CLEAN STRIKE ----
    e.st = E_DOWN; e.stT = 0;
    e.vx = dir * 4.5; e.vy = -4.5;
    combo++; comboT = CW;
    const pts = 100 * Math.min(combo, 5);
    score += pts; kills++; jadeRun++;
    popup(e.x, e.y - 80, (combo > 1 ? '×' + Math.min(combo,5) + ' ' : '') + '+' + pts, '#e8dcc0');
    Snd.hit(combo); hitStop = 3; shake = 4;
    burst(e.x, e.y - 45, '#d8d0c0', 10, 3);
  }
  if (combo > bestCombo) bestCombo = combo;
  if (combo >= 5) award('chain5');
  // live belt promotion: banner the moment lifetime kills cross a threshold
  const nb = beltOf(save.kills + kills);
  if (nb > beltOf(save.kills) && nb > promoted){
    promoted = nb;
    popup(W/2, 190, BELTS[nb].name + ' BELT', BELTS[nb].col === '#3a3f48' ? '#e8dcc0' : BELTS[nb].col, true);
    // JF-#010: a promotion that teaches a technique says so, right now
    const tec = TECH.find(T => T.belt === nb);
    if (tec) banner('TECHNIQUE LEARNED: ' + tec.name, '#e8c76a', 160);
    Snd.best(); shake = 6;
  }
}

function hurtPlayer(){
  hearts--; hurtFlash = 18; combo = 0; perfChain = 0; hitsWave++;
  shake = 12; Snd.hurt();
  burst(P.x, P.y - 50, '#e86a6a', 16, 4);
  if (hearts <= 0){
    if (windAvail){                              // SECOND WIND: rise once per fight
      windAvail = false; hearts = 1; slowMo = 40;
      popup(P.x, P.y - 110, 'SECOND WIND', '#7ce8a8', true);
      burst(P.x, P.y - 50, '#7ce8a8', 24, 5);
      Snd.counter();
      return;
    }
    endRun(false);
  }
}

// JF-#009: one exit for both endings — felled, or district cleared
function endRun(victory){
  state = S_DEAD; tallyStep = 0; tallyT = 0; tallyDone = false;
  CG.gameplayStop();    // JF-#013
  if (victory) CG.happytime();
  ranOnce = true; rewardUsed = false;   // JF-#016: fresh DOUBLE JADE offer each tally
  walletShown = save.jade;   // wallet animates up from pre-run balance as jade banks
  newBest = !BOT && score > best;
  if (newBest){ best = score; localStorage.setItem('jf_best', best); }
  // JF-#022: bank the run's fairness numbers
  if (BOT && BOT.cur) BOT.stats.push({
    district: DISTRICTS[fought].name, wave, won: victory, kills, counters,
    hits: BOT.cur.hits.length,
    pincer: BOT.cur.hits.filter(h => h.pincer).length,
    fast: BOT.cur.hits.filter(h => h.fast).length,
    hitList: BOT.cur.hits
  });
  if (run.dragon) jadeRun = Math.round(jadeRun * 1.5);   // JF-#025: DRAGON
  jadeRun = Math.round(jadeRun * omen.jadeScale);   // omen boon (JF-#011)
  if (dailyBonus) jadeRun *= 2;                // return bonus pays out at the tally
  save.jade += jadeRun;
  save.kills += kills;                         // lifetime kills drive belt rank
  if (victory && sel === save.dist && save.dist < DISTRICTS.length - 1){
    save.dist++;                               // the next district opens
    sel = save.dist;
  }
  // JF-#026: Hall of Legends — per-district top 5 (local; CG board when invited)
  hallRank = 0;
  if (!BOT){
    const H = save.hall[fought];
    H.push({ s: score, w: wave });
    H.sort((a, b) => b.s - a.s);
    if (H.length > 5) H.length = 5;
    const r = H.findIndex(h => h.s === score && h.w === wave);
    if (r >= 0) hallRank = r + 1;
    CG.submitScore(score);
  }
  persist();                                   // every run banks progress
  // JF-#012: reclaiming the jade on the ROOFTOP plays the ending first
  if (victory && fought === 3) state = S_END;
  if (victory) Snd.best(); else Snd.ko();
}

// JF-#014: pause (P key / auto on tab blur). SDK gameplayStart/Stop bracket
// the pause per CG guidelines; any input resumes.
function pauseGame(){ if (state !== S_PLAY) return; state = S_PAUSE; CG.gameplayStop(); }
function resumeGame(){ if (state !== S_PAUSE) return; state = S_PLAY; CG.gameplayStart(); }

// ----------------------------------------------------------------- input ----
function press(dir){
  Snd.unlock();
  if (state === S_PAUSE){ resumeGame(); return; }
  if (state === S_STORY){ save.intro = 1; persist(); state = S_MENU; Snd.tick(); return; }
  if (state === S_END){ state = S_DEAD; Snd.tick(); return; }   // ending → tally
  if (state === S_MENU){ startRun(); return; }
  // JF-#025: while a scroll offer is up, left/right = choose (no enemies exist)
  if (state === S_PLAY && scrollOffer){ pickScroll(dir < 0 ? scrollOffer.a : scrollOffer.b); return; }
  if (state === S_DEAD){
    if (!tallyDone) tallyT = 24 * 7;   // first tap: reveal full tally instantly
    else startRun();                   // next tap: restart (tallyDone flips on next draw)
    return;
  }
  strike(dir);
}
// JF-#016: rewarded ad = bank the run's jade twice (once per tally)
function doubleJade(){
  if (rewardUsed || jadeRun <= 0) return;
  rewardUsed = true;
  CG.rewarded(() => { save.jade += jadeRun; persist(); Snd.best(); });
}
function buyUp(i){
  const u = UPS[i], tier = save.up[u.k];
  if (tier >= u.max) return;
  const cost = u.cost(tier);
  if (save.jade < cost){ Snd.tick(); return; }
  save.jade -= cost; save.up[u.k] = tier + 1; persist();
  Snd.best();
}
addEventListener('keydown', e => {

  if (e.code === 'KeyO' && state === S_MENU){ omenOn = !omenOn; Snd.tick(); return; }

  }

  // JF-#009: on the menu, ◀ ▶ browse unlocked districts; Space/Enter fights
  if (state === S_MENU && (e.code === 'ArrowLeft' || e.code === 'KeyA' || e.code === 'KeyQ')){

    if (x > W/2 + 130 && x < W/2 + 220){ sel = (sel + 1) % (save.dist + 1); Snd.tick(); return; }
  }

    for (const b of btnRects){
      if (x >= b.x && x <= b.x + b.w && y >= b.y && y <= b.y + b.h){ buyUp(b.i); return; }

function startRun(){
  state = S_PLAY;
  // JF-#016: midgame ad between runs, never before the first, 3-min cooldown
  if (ranOnce && Date.now() - adT > 180000){ adT = Date.now(); CG.interstitial(); }
  CG.gameplayStart();   // JF-#013: SDK brackets every run
  score = 0; combo = 0; comboT = 0; kills = 0; counters = 0; bestCombo = 0;
  jadeRun = 0;
  PR = REACH + save.up.palm * 8;
  CW = 120 + save.up.focus * 40;   // JF-#006: tighter base window (was 150) — FOCUS earns its cost
  windAvail = save.up.wind > 0;
  // warm-up compression: higher belts start hotter via the belt term in the
  // difficulty formula; the alternating-spawn learning window still shrinks
  const belt = beltOf(save.kills);
  waveT = 0;
  INTRO = Math.max(300, 900 - belt * 120);
  promoted = -1;
  // JF-#011: trial-day rollover + run counters + omen application
  const today0 = new Date().toDateString();
  if (save.tday !== today0){ save.tday = today0; save.tdone = [0,0,0]; persist(); }
  trialCt = {};
  const O = todayOmen();
  omen = omenOn
    ? { heart: O.heart || 0, windScale: O.windScale || 1, jadeScale: O.jadeScale || 1,
        perfTh: O.perfTh || 0.66, spdScale: O.spdScale || 1 }
    : { heart: 0, windScale: 1, jadeScale: 1, perfTh: 0.66, spdScale: 1 };
  // return bonus: first fight of a new day = double jade (streak tracked)
  const today = new Date().toDateString();
  dailyBonus = save.day !== today;
  if (dailyBonus){
    const yest = new Date(); yest.setDate(yest.getDate() - 1);
    save.streak = save.day === yest.toDateString() ? save.streak + 1 : 1;
    save.day = today; persist();
  }
  hearts = Math.max(1, 3 + save.up.body + omen.heart); hurtFlash = 0; difficulty = 0; spawnT = 50; whiffT = 0; adaptShown = false;
  if (omenOn) popup(W/2, 200, 'OMEN ACCEPTED: ' + O.b.toUpperCase() + ' / ' + O.c.toUpperCase(), '#c8a8e8', true);
  enemies.length = 0; popups.length = 0; parts.length = 0;
  bannerT = 0; won = false; fought = sel; perfChain = 0;
  run = {}; scrollOffer = null;   // JF-#025: scrolls die with the run
  dBase = DISTRICTS[sel].dBase;
  beginWave(1);
  // JF-#012: veterans get the district's line instead of the controls lesson
  msg = save.kills > 50
    ? DISTRICTS[sel].name + ' — ' + DISTRICTS[sel].line
    : (TOUCH ? 'Tap toward them.  Tap' : 'Strike toward them.  Strike') +
      ' the RED flash to counter.';
  msgT = 240;
  if (dailyBonus) popup(W/2, 160, 'RETURN BONUS — DOUBLE JADE' +
    (save.streak > 1 ? '  ·  DAY ' + save.streak : ''), '#7ce8a8', true);
}

// ---------------------------------------------------------------- update ----
function update(){
  if (state === S_PAUSE) return;   // JF-#014: world fully frozen
  t++;
  if (BOT) botFrame();             // JF-#022: the bot drives every state
  if (shake > 0) shake *= 0.85;
  if (hurtFlash > 0) hurtFlash--;
  if (msgT > 0) msgT--;
  if (bannerT > 0) bannerT--;
  if (P.punchT > 0) P.punchT--;

  popups = popups.filter(p => (p.life--, p.y -= 0.7, p.life > 0));
  parts = parts.filter(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.25; p.life--;
    return p.life > 0 && p.y < 470;
  });

  if (state !== S_PLAY){ if (state === S_DEAD) tallyT++; return; }
  if (hitStop > 0){ hitStop--; return; }
  if (whiffT > 0) whiffT--;
  if (bufT > 0){ bufT--; if (bufDir){ const d = bufDir; bufDir = 0; bufT = 0; strike(d); } }
  const dt = slowMo > 0 ? 0.35 : 1;
  if (slowMo > 0) slowMo--;

  if (comboT > 0){ comboT -= dt; if (comboT <= 0) combo = 0; }

  // JF-#008: wave machine — difficulty comes from wave number, not a treadmill
  waveT += dt;
  if (waveT >= 5400) award('endure');
  difficulty = Math.min(12, dBase + (wave - 1) * 1.1 + Math.min(beltOf(save.kills), 6) * 0.3);
  if (wavePhase === 1){                                // rest beat between waves
    if (scrollOffer) return;                           // JF-#025: world waits on the choice
    restT -= dt;
    if (restT <= 0){
      if (won) endRun(true);                           // district cleared — run ends in victory
      else beginWave(wave + 1);
    }
  } else {
    spawnT -= dt;
    if (spawnT <= 0 && toSpawn > 0){
      toSpawn--; spawnEnemy();
      // duo rush scales with difficulty; late duos may split to opposite sides
      if (toSpawn > 0 && difficulty > 3 && Math.random() < Math.min(0.2 + difficulty * 0.05, 0.55)){
        toSpawn--;
        spawnEnemy(difficulty > 7 && Math.random() < 0.4 ? -lastSpawnSide : lastSpawnSide);
      }
      spawnT = Math.max(26, 90 - difficulty * 7) * (0.7 + Math.random() * 0.6) *
               (DISTRICTS[sel].quirk === 'crowd' ? 0.78 : 1);   // MARKET: they crowd
    }
    if (toSpawn <= 0 && enemies.length === 0) onWaveClear();
  }

  for (const e of enemies){
    e.stT += dt;
    switch (e.st){
      case E_WALK: {
        const d = Math.abs(e.x - P.x);
        // fairness guard: never open a windup while the OTHER side is already
        // threatening — hold just outside reach instead of pincering.
        // JF-#006: guard lifts past difficulty 6 — late game allows true pincers.
        const otherThreat = e.type !== T_BOSS && difficulty <= 6 && enemies.some(o => o !== e &&
          (o.st === E_WINDUP || o.st === E_STRIKE) &&
          Math.sign(o.x - P.x) !== Math.sign(e.x - P.x));
        if (d < e.reach - 8){
          if (otherThreat){ e.x = P.x + Math.sign(e.x - P.x) * (e.reach + 4); break; }
          if (e.feint){ e.st = E_FEINT; e.stT = 0; break; }   // fake-out: no windup audio
          e.st = E_WINDUP; e.stT = 0;
          Snd.windup(e.windup);
        } else e.x += e.side * e.speed * dt;
        break;
      }
      case E_WINDUP:
        if (e.stT >= e.windup){
          e.st = E_STRIKE; e.stT = 0; e.didHit = false;
          if (e.type === T_SPEAR) e.x -= Math.sign(e.x - P.x) * 58;   // lunge in
        }
        break;
      case E_STRIKE:
        // JF-#010: IRON CATCH grace — with the technique, the blow lands 3 frames
        // later, leaving a last-instant counter window on the falling strike
        if (!e.didHit && e.stT >= (hasTech(1) ? 3 : 0)){
          e.didHit = true;
          if (Math.abs(e.x - P.x) < REACH + 12){
            if (BOT) botHit(e);   // JF-#022: classify the hit before it lands
            hurtPlayer();
          }
        }
        if (e.stT >= 10){ e.st = E_RECOVER; e.stT = 0; }
        break;
      case E_RECOVER:
        if (e.stT >= (e.type === T_SPEAR ? 44 : 30)){ e.st = E_WALK; e.stT = 0; }
        break;
      case E_STAGGER:
        e.x += e.vx * dt; e.vx *= 0.86;
        // a shoved body stumbles whoever it slides into
        if (!e.chained && Math.abs(e.vx) > 1.5){
          for (const o of enemies){
            if (o === e || o.st === E_DOWN || o.st === E_THROWN || o.st === E_STAGGER || o.type === T_BOSS) continue;
            if (Math.abs(o.x - e.x) < 34){
              o.st = E_STAGGER; o.stT = 0; o.vx = e.vx * 0.8; o.guard = 0;
              score += 100; popup(o.x, o.y - 80, 'STUMBLE +100', '#c8bfa8');
              bumpTrial('stumble');
              burst(o.x, o.y - 45, '#c8bfa8', 6, 2);
              e.chained = true;
              break;
            }
          }
        }
        if (e.stT >= 25){ e.st = E_WALK; e.stT = 0; e.chained = false; }
        break;
      case E_FEINT:
        // JF-#007: pale flash while springing back out of reach, then resume (next approach is real)
        e.x += Math.sign(e.x - P.x) * 5 * dt;
        if (e.stT >= 16){ e.st = E_WALK; e.stT = 0; e.feint = false; }
        break;
      case E_DOWN: case E_THROWN:
        e.x += e.vx * dt; e.y += e.vy * dt; e.vy += 0.5 * dt;
        e.rot += e.vx * (e.bigSend ? 0.09 : 0.05) * dt;
        // JF-#020: airborne bodies bonk off the screen edge once and rebound
        if (e.st === E_THROWN && !e.bonked && e.y < 440 && (e.x < 26 || e.x > W - 26)){
          e.bonked = true; e.vx *= -0.55; e.vy = Math.min(e.vy, -3.5);
          popup(e.x < W/2 ? 40 : W - 40, e.y - 90, 'BONK', '#c8bfa8', true);
          Snd.block(); shake = Math.max(shake, 6);
        }
        // JF-#007: an airborne thrown body is a projectile — fells anyone it passes through
        if (e.st === E_THROWN && e.y < 440){
          for (const o of enemies){
            if (o === e || o.st === E_DOWN || o.st === E_THROWN || o.type === T_BOSS) continue;
            if (Math.abs(o.x - e.x) < 40){
              o.st = E_DOWN; o.stT = 0; o.vx = e.vx * 0.6; o.vy = -4;
              score += 250; kills++; jadeRun++;
              popup(o.x, o.y - 80, 'FELLED +250', '#e8c76a'); yelp(o.x, o.y - 104);
              burst(o.x, o.y - 40, '#e8c76a', 10, 3);
            }
          }
        }
        if (e.y > 470) e.dead = true;
        break;
    }
  }
  enemies = enemies.filter(e => !e.dead && e.x > -120 && e.x < W + 120);
}

// ------------------------------------------------------------------ draw ----
function fighter(x, y, face, opts){
  // simple articulated kung-fu figure: robe wedge + head + limbs
  const o = opts || {};
  cx.save();
  cx.translate(x, y);
  if (o.rot) cx.rotate(o.rot);
  const sz = o.size || 1;
  cx.scale(face * sz, sz);
  const punch = o.punch || 0;
  const c = o.col || '#e8dcc0';
  cx.strokeStyle = c; cx.fillStyle = c; cx.lineWidth = 5; cx.lineCap = 'round';
  // legs (stance)
  cx.beginPath();
  cx.moveTo(0, -34); cx.lineTo(-14, 0);
  cx.moveTo(0, -34); cx.lineTo(16, -4);
  cx.stroke();
  // robe
  cx.beginPath();
  cx.moveTo(-13, -34); cx.lineTo(13, -34); cx.lineTo(8, -70); cx.lineTo(-8, -70);
  cx.closePath(); cx.fill();
  // sash
  cx.strokeStyle = o.sash || '#3fae7c'; cx.lineWidth = 4;
  cx.beginPath(); cx.moveTo(-11, -46); cx.lineTo(11, -50); cx.stroke();
  // head + headband tail
  cx.fillStyle = c;
  cx.beginPath(); cx.arc(0, -82, 10, 0, 7); cx.fill();
  cx.strokeStyle = o.sash || '#3fae7c'; cx.lineWidth = 3;
  cx.beginPath(); cx.moveTo(-8, -84); cx.quadraticCurveTo(-20, -84 + Math.sin(t*0.15)*3, -26, -78); cx.stroke();
  // arms: rear guard + lead arm (extends on punch)
  cx.strokeStyle = c; cx.lineWidth = 5;
  cx.beginPath(); cx.moveTo(-6, -64); cx.lineTo(-16, -52); cx.stroke();
  const ext = punch > 0 ? 30 + punch * 3 : 14;
  cx.beginPath(); cx.moveTo(6, -64); cx.lineTo(6 + ext, -60 - (punch > 0 ? 4 : -6)); cx.stroke();
  if (punch > 8){                       // strike flash on fist
    cx.fillStyle = 'rgba(232,220,192,0.9)';
    cx.beginPath(); cx.arc(6 + ext + 6, -62, 7 + (12 - punch) * 2, 0, 7); cx.fill();
  }
  if (o.spear){                         // spearman: long pole past the lead hand
    cx.strokeStyle = '#8a7a5a'; cx.lineWidth = 3;
    cx.beginPath(); cx.moveTo(-8, -50); cx.lineTo(6 + ext + 44, -66); cx.stroke();
    cx.fillStyle = '#c8c0a8';
    cx.beginPath(); cx.moveTo(6 + ext + 44, -66); cx.lineTo(6 + ext + 56, -68); cx.lineTo(6 + ext + 44, -72); cx.closePath(); cx.fill();
  }
  if (o.guard){                         // raised-guard bracer arc in front
    cx.strokeStyle = 'rgba(200,212,232,0.85)'; cx.lineWidth = 4;
    cx.beginPath(); cx.arc(22, -62, 14, -1.1, 1.1); cx.stroke();
  }
  cx.restore();
}

function drawWorld(){
  // JF-#009: each district paints its own night — sky, skyline density, lantern hue
  const D = DISTRICTS[sel];
  const g = cx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, D.sky[0]); g.addColorStop(0.7, D.sky[1]); g.addColorStop(1, D.sky[2]);
  cx.fillStyle = g; cx.fillRect(0, 0, W, H);
  // moon
  cx.fillStyle = '#e8e2cc';
  cx.beginPath(); cx.arc(780, 90, 34, 0, 7); cx.fill();
  cx.fillStyle = 'rgba(232,226,204,0.08)';
  cx.beginPath(); cx.arc(780, 90, 60, 0, 7); cx.fill();
  // pagoda silhouettes (count/height vary by district)
  cx.fillStyle = 'rgba(8,11,17,0.85)';
  for (let i = 0; i < D.pag; i++){
    const bx = 60 + i * (900 / D.pag), bw = 120 - D.pag * 6, by = 300 - (i % 2) * 40 - (sel === 3 ? 60 : 0);
    cx.fillRect(bx, by, bw, 300);
    for (let r = 0; r < 3; r++){
      const rw = bw + 44 - r * 14, ry = by - r * 42;
      cx.beginPath();
      cx.moveTo(bx + bw/2 - rw/2 - 12, ry);
      cx.quadraticCurveTo(bx + bw/2, ry - 34, bx + bw/2 + rw/2 + 12, ry);
      cx.closePath(); cx.fill();
    }
  }
  // hanging lanterns in the district's hue
  const [lr, lg, lb] = D.lant;
  for (let i = 0; i < 6; i++){
    const lx = 80 + i * 160, ly = 150 + Math.sin(t * 0.02 + i) * 4;
    const glow = 0.5 + 0.15 * Math.sin(t * 0.05 + i * 2);
    cx.strokeStyle = 'rgba(120,100,80,0.5)';
    cx.beginPath(); cx.moveTo(lx, 0); cx.lineTo(lx, ly - 14); cx.stroke();
    cx.fillStyle = `rgba(${lr},${lg-40},${lb},${glow * 0.25})`;
    cx.beginPath(); cx.arc(lx, ly, 26, 0, 7); cx.fill();
    cx.fillStyle = `rgba(${lr},${lg},${lb},${glow})`;
    cx.beginPath(); cx.ellipse(lx, ly, 10, 13, 0, 0, 7); cx.fill();
  }
  // ground
  cx.fillStyle = D.ground; cx.fillRect(0, 428, W, H - 428);
  cx.strokeStyle = 'rgba(232,220,192,0.12)'; cx.lineWidth = 2;
  cx.beginPath(); cx.moveTo(0, 428); cx.lineTo(W, 428); cx.stroke();
  // JF-#017: district ambience — deterministic drift from t, no particle state
  if (sel === 0){                       // COURTYARD: falling blossom petals
    cx.fillStyle = 'rgba(232,168,184,0.55)';
    for (let i = 0; i < 12; i++){
      const py = (i * 97 + t * 0.5) % 560 - 10;
      const px = (i * 173 % W) + Math.sin(t * 0.02 + i) * 34;
      cx.save(); cx.translate(px, py); cx.rotate(t * 0.03 + i);
      cx.beginPath(); cx.ellipse(0, 0, 4, 2.2, 0, 0, 7); cx.fill(); cx.restore();
    }
  } else if (sel === 1){                // MARKET: embers rising off the braziers
    for (let i = 0; i < 10; i++){
      const ey = 470 - ((i * 83 + t * 0.9) % 480);
      const ex = (i * 199 % W) + Math.sin(t * 0.05 + i * 3) * 12;
      cx.fillStyle = `rgba(240,150,70,${0.15 + 0.4 * (ey / 470)})`;
      cx.fillRect(ex, ey, 3, 3);
    }
  } else if (sel === 2){                // TEMPLE: low incense mist banks
    for (let i = 0; i < 3; i++){
      const mx = ((t * (0.3 + i * 0.15) + i * 400) % (W + 500)) - 250;
      cx.fillStyle = `rgba(180,200,210,${0.05 + 0.02 * Math.sin(t * 0.01 + i)})`;
      cx.beginPath(); cx.ellipse(mx, 415 - i * 16, 220, 22, 0, 0, 7); cx.fill();
    }
  } else if (sel === 3){                // ROOFTOP: wind streaks tearing past
    cx.strokeStyle = 'rgba(220,230,240,0.18)'; cx.lineWidth = 1.5;
    for (let i = 0; i < 7; i++){
      const wy = i * 61 % 400 + 30, wx = W - ((i * 137 + t * 7) % (W + 200));
      cx.beginPath(); cx.moveTo(wx, wy); cx.lineTo(wx + 60 + i * 8, wy - 3); cx.stroke();
    }
  } else if (sel === 4){                // LEGEND: jade motes drifting upward
    for (let i = 0; i < 10; i++){
      const my = 540 - ((i * 89 + t * 0.4) % 560);
      const mx2 = (i * 211 % W) + Math.sin(t * 0.03 + i * 2) * 20;
      cx.fillStyle = `rgba(124,232,168,${0.12 + 0.25 * Math.abs(Math.sin(t * 0.04 + i))})`;
      cx.beginPath(); cx.arc(mx2, my, 2.5, 0, 7); cx.fill();
    }
  }
}

function draw(){
  cx.save();
  if (shake > 0.5) cx.translate((Math.random()-0.5) * shake, (Math.random()-0.5) * shake);
  drawWorld();

  // enemies
  for (const e of enemies){
    // type silhouette: viper pale+slim, iron monk grey+broad, spearman tall+pole
    let col = e.type === T_BOSS ? '#c8a878' : e.type === T_FAST ? '#b8c8d8' : e.type === T_BRUTE ? '#8a929e' : '#8a94a6';
    if (e.type === T_BRUTE && (e.rage || 0) >= 2) col = '#a8807a';   // enraged tint (JF-#007)
    let punch = 0, rot = e.rot || 0;
    const size = e.type === T_BOSS ? 1.6 : e.type === T_BRUTE ? 1.28 : e.type === T_FAST ? 0.88 : e.type === T_SPEAR ? 1.08 : 1;
    if (e.st === E_WINDUP){
      const late = e.stT / e.windup > perfTh();   // final third: solid bright = NOW (JF-#025: CRANE widens)
      const flash = late || Math.sin(e.stT * 0.6) > 0;
      col = flash ? (late ? '#ff4a4a' : '#e85a5a') : '#b06a6a';   // RED telegraph = counter window
      cx.fillStyle = late ? 'rgba(255,74,74,0.4)' : 'rgba(232,90,90,0.25)';
      cx.beginPath(); cx.arc(e.x, e.y - 55, ((late ? 50 : 40) + Math.sin(e.stT*0.5)*5) * size, 0, 7); cx.fill();
    } else if (e.st === E_FEINT){
      // feint tell: PALE flash, no red, no audio — only real telegraphs go red
      col = Math.sin(e.stT * 0.8) > 0 ? '#c8a8a0' : '#b8c8d8';
    } else if (e.st === E_STRIKE){ col = '#e8b06a'; punch = 10; }
    else if (e.st === E_RECOVER){ col = '#5e6878'; rot += 0.12 * Math.sign(e.x - P.x); }  // slumped = punishable
    else if (e.st === E_STAGGER){ col = '#7a8494'; rot += 0.2 * Math.sign(e.vx || 1); }
    fighter(e.x, e.y, -e.side, {
      col, punch, rot, size,
      sash: e.type === T_BOSS ? '#7a2020' : e.type === T_BRUTE ? '#4a4f58' : '#7a4040',
      spear: e.type === T_SPEAR,
      guard: e.guard > 0 && (e.st === E_WALK || e.st === E_STAGGER)
    });
    // boss hp pips: one jade dot per counter still owed
    if (e.type === T_BOSS && e.st !== E_THROWN && e.st !== E_DOWN){
      for (let i = 0; i < e.hpMax; i++){
        cx.fillStyle = i < e.hp ? '#e86a6a' : 'rgba(140,148,166,0.35)';
        cx.beginPath(); cx.arc(e.x - (e.hpMax - 1) * 8 + i * 16, e.y - 160, 5, 0, 7); cx.fill();
      }
    }
  }

  // player
  const pcol = hurtFlash > 0 && (hurtFlash & 2) ? '#e86a6a' : wearCol();   // JF-#023
  fighter(P.x, P.y, P.face, { col: pcol, sash: BELTS[beltOf(save.kills + kills)].col, punch: P.punchT });

  // particles
  for (const p of parts){
    cx.fillStyle = p.col; cx.globalAlpha = Math.min(1, p.life / 15);
    cx.fillRect(p.x - 2, p.y - 2, 4, 4);
  }
  cx.globalAlpha = 1;

  // popups
  for (const p of popups){
    cx.globalAlpha = Math.min(1, p.life / 20);
    cx.fillStyle = p.col;
    cx.font = (p.big ? 'bold 26px' : 'bold 18px') + ' Georgia';
    cx.textAlign = 'center';
    cx.fillText(p.txt, p.x, p.y);
  }
  cx.globalAlpha = 1;
  cx.restore();

  // ------------------------------------------------------------- HUD ----
  cx.textAlign = 'center'; cx.fillStyle = '#e8dcc0';
  if (state === S_PLAY){
    cx.font = 'bold 30px Georgia';
    cx.fillText(score, W/2, 46);
    // wave counter, top right under the mute button
    cx.fillStyle = '#c8bfa8'; cx.font = 'bold 16px Georgia'; cx.textAlign = 'right';
    cx.fillText('WAVE ' + wave, W - 18, 60);
    cx.textAlign = 'center';
    // big center banner (wave open/clear, boss beats)
    if (bannerT > 0){
      cx.globalAlpha = Math.min(1, bannerT / 30);
      cx.fillStyle = bannerCol; cx.font = 'bold 34px Georgia';
      cx.fillText(bannerTxt, W/2, 170);
      cx.globalAlpha = 1;
    }
    cx.fillStyle = '#e8dcc0';
    if (combo > 1){
      cx.fillStyle = '#7ce8a8'; cx.font = 'bold 20px Georgia';
      cx.fillText('×' + Math.min(combo, 5) + ' COMBO', W/2, 72);
      const bw = 120 * (comboT / CW);                // visible combo-decay bar
      cx.fillStyle = 'rgba(124,232,168,0.6)';
      cx.fillRect(W/2 - bw/2, 80, bw, 4);
    }
    // hearts
    const maxH = Math.max(1, 3 + save.up.body + omen.heart + (run.ox ? 1 : 0));   // JF-#025
    cx.font = '22px Georgia'; cx.textAlign = 'left'; cx.fillStyle = '#e86a6a';
    cx.fillText('♥ '.repeat(Math.max(0, hearts)) + '♡ '.repeat(Math.max(0, maxH - hearts)), 20, 40);
    if (windAvail){ cx.fillStyle = '#7ce8a8'; cx.font = '15px Georgia'; cx.fillText('second wind ready', 20, 62); }
    // JF-#010: palm-wave fuel — one gold pip per consecutive perfect
    if (hasTech(2)){
      for (let i = 0; i < 3; i++){
        cx.fillStyle = i < perfChain ? '#e8c76a' : 'rgba(140,148,166,0.3)';
        cx.beginPath(); cx.arc(W/2 - 16 + i * 16, 94, 5, 0, 7); cx.fill();
      }
    }
    cx.fillStyle = '#7ce8a8'; cx.font = '17px Georgia';
    cx.fillText('◆ ' + jadeRun, 20, windAvail ? 84 : 62);
    if (msgT > 0){
      cx.globalAlpha = Math.min(1, msgT / 40);
      cx.fillStyle = '#c8bfa8'; cx.font = '17px Georgia'; cx.textAlign = 'center';
      cx.fillText(msg, W/2, 120);
      cx.globalAlpha = 1;
    }
    // JF-#025: scrolls held this run — small gold glyph row under the hearts
    {
      const held = SCROLLS.filter(s => run[s.k]);
      if (held.length){
        cx.font = '13px Georgia'; cx.textAlign = 'left'; cx.fillStyle = '#e8c76a';
        cx.fillText(held.map(s => '◈ ' + s.name.split(' ')[0]).join('  '), 20, windAvail ? 106 : 84);
      }
    }
    // JF-#025: the scroll choice — two cards over the rest beat
    if (scrollOffer){
      cx.fillStyle = 'rgba(8,10,14,0.55)'; cx.fillRect(0, 130, W, 220);
      cx.textAlign = 'center'; cx.fillStyle = '#e8c76a'; cx.font = 'bold 26px Georgia';
      cx.fillText('A SCROLL IS FOUND', W/2, 172);
      const cards = [[scrollOffer.a, W/2 - 230], [scrollOffer.b, W/2 + 10]];
      for (const [si, cxx] of cards){
        if (si < 0) continue;
        const S = SCROLLS[si], hot = (t / 25 | 0) % 2 === 0;
        cx.fillStyle = 'rgba(232,199,106,0.13)'; cx.fillRect(cxx, 192, 220, 92);
        cx.strokeStyle = hot ? '#ffe9a8' : '#e8c76a'; cx.lineWidth = 2;
        cx.strokeRect(cxx, 192, 220, 92);
        cx.fillStyle = '#e8c76a'; cx.font = 'bold 17px Georgia';
        cx.fillText(S.name, cxx + 110, 224);
        cx.fillStyle = '#e8dcc0'; cx.font = '14px Georgia';
        cx.fillText(S.desc, cxx + 110, 250);
      }
      cx.fillStyle = '#c8bfa8'; cx.font = '16px Georgia';
      cx.fillText(TOUCH ? 'tap LEFT or RIGHT to take one' : 'strike LEFT or RIGHT to take one', W/2, 316);
    }
  } else if (state === S_MENU){
    cx.fillStyle = 'rgba(8,10,14,0.55)'; cx.fillRect(0, 0, W, H);
    cx.fillStyle = '#7ce8a8'; cx.font = 'bold 64px Georgia'; cx.textAlign = 'center';
    cx.fillText('JADE FIST', W/2, 200);
    // JF-#018: visual onboarding — a looping counter demo instead of two text lines
    // (CG: teach visually, minimal text). 240-frame script: approach → red flash →
    // counter throw → reset. Captions change per phase.
    {
      const dT = t % 240, gy = 312;
      let ex2 = 0, ecol = '#8a94a6', erot = 0, ppunch = 0, cap, capCol = '#e8dcc0';
      if (dT < 80){                                   // approach from the right
        ex2 = W/2 + 220 - dT * 1.6;
        cap = 'they come at you — strike toward them';
      } else if (dT < 140){                           // windup: the red flash
        ex2 = W/2 + 92;
        const late = (dT - 80) / 60 > 0.66;
        ecol = (late || Math.sin(dT * 0.6) > 0) ? (late ? '#ff4a4a' : '#e85a5a') : '#b06a6a';
        cx.fillStyle = late ? 'rgba(255,74,74,0.4)' : 'rgba(232,90,90,0.25)';
        cx.beginPath(); cx.arc(ex2, gy - 44, 34 + Math.sin(dT * 0.5) * 4, 0, 7); cx.fill();
        cap = 'RED flash = strike NOW to counter'; capCol = '#e85a5a';
      } else if (dT < 200){                           // the throw
        const ft = dT - 140;
        ex2 = W/2 + 92 + ft * 6; erot = ft * 0.12; ecol = '#e8c76a';
        ppunch = Math.max(0, 12 - ft);
        cap = 'COUNTER — throw them into the rest'; capCol = '#e8c76a';
      } else { ex2 = -999; cap = 'they come at you — strike toward them'; }
      fighter(W/2 - 40, gy, 1, { col: wearCol(), sash: '#3fae7c', punch: ppunch, size: 0.72 });   // JF-#023
      if (ex2 > -200 && ex2 < W + 200)
        fighter(ex2, gy - (erot ? erot * 30 : 0), -1, { col: ecol, sash: '#7a4040', rot: erot, size: 0.72 });
      cx.fillStyle = capCol; cx.font = '19px Georgia'; cx.textAlign = 'center';
      cx.fillText(cap, W/2, 236);
    }
    cx.fillStyle = '#c8bfa8'; cx.font = '17px Georgia';
    cx.fillText(TOUCH ? 'tap the LEFT or RIGHT half of the screen' : '◀ ▶  arrows  ·  A / D  ·  Space = strike where you face', W/2, 332);
    // JF-#009: district selector — the campaign map in one line
    const MD = DISTRICTS[sel];
    cx.font = 'bold 24px Georgia'; cx.fillStyle = '#e8dcc0';
    cx.fillText((save.dist > 0 ? '◀   ' : '') + MD.name + '  ' + (sel + 1) + '/' + DISTRICTS.length +
      (save.dist > 0 ? '   ▶' : ''), W/2, 378);
    cx.font = 'italic 16px Georgia'; cx.fillStyle = '#8a94a6';
    cx.fillText(MD.line + '   ·   ' + (sel < save.dist ? 'CLEARED' : sel === 3 && save.dist === 3 ? 'the last district' : 'boss: ' + MD.boss), W/2, 400);
    if ((t / 30 | 0) % 2 === 0){
      cx.fillStyle = '#e8dcc0'; cx.font = 'bold 20px Georgia';
      cx.fillText(TOUCH ? '— tap to fight —' : '— Space to fight —', W/2, 426);
    }
    const mb = beltOf(save.kills);
    cx.fillStyle = BELTS[mb].col === '#3a3f48' ? '#e8dcc0' : BELTS[mb].col;
    cx.font = 'bold 18px Georgia';
    cx.fillText(BELTS[mb].name + ' BELT' + (save.streak > 1 ? '   ·   day ' + save.streak : ''), W/2, 458);
    cx.fillStyle = '#8a94a6'; cx.font = '15px Georgia';
    const trained = UPS.reduce((n, u) => n + save.up[u.k], 0);
    cx.fillText((best > 0 ? 'BEST ' + best + '   ·   ' : '') + '◆ ' + save.jade +
      (trained ? '   ·   training ' + trained + '/' + UPS.reduce((n,u)=>n+u.max,0) : '') +
      (mb < BELTS.length - 1 ? '   ·   ' + (BELTS[mb+1].need - save.kills) + ' foes to ' + BELTS[mb+1].name : ''), W/2, 482);
    // JF-#011: today's trials (left) and the omen offer (right)
    cx.textAlign = 'left'; cx.font = 'bold 15px Georgia'; cx.fillStyle = '#c8bfa8';
    cx.fillText("TODAY'S TRIALS", 24, 96);
    cx.font = '14px Georgia';
    todayTrio().forEach((ti, i) => {
      cx.fillStyle = save.tdone[i] ? '#7ce8a8' : '#8a94a6';
      cx.fillText((save.tdone[i] ? '✓ ' : '· ') + TRIALS[ti].name + '  +15◆', 24, 118 + i * 20);
    });
    // JF-#023: wardrobe (left, under the trials)
    {
      const S = STYLES[styleSel], owned = !!save.cos.own[styleSel];
      styleRect = { x: 16, y: 184, w: 240, h: 58 };
      cx.textAlign = 'left'; cx.font = 'bold 15px Georgia'; cx.fillStyle = '#c8bfa8';
      cx.fillText('WARDROBE  ' + (TOUCH ? '(tap)' : '(C)'), 24, 200);
      cx.fillStyle = S.col; cx.font = 'bold 14px Georgia';
      cx.fillText(S.name + (save.cos.wear === styleSel ? '  — worn' : owned ? '  — owned' : ''), 24, 220);
      styleBuyRect = null;
      if (!owned){
        const can = save.jade >= S.cost;
        styleBuyRect = { x: 24, y: 226, w: 130, h: 20 };
        cx.fillStyle = can ? 'rgba(124,232,168,0.22)' : 'rgba(140,148,166,0.12)';
        cx.fillRect(styleBuyRect.x, styleBuyRect.y, styleBuyRect.w, styleBuyRect.h);
        cx.strokeStyle = can ? '#7ce8a8' : 'rgba(140,148,166,0.4)'; cx.lineWidth = 1.5;
        cx.strokeRect(styleBuyRect.x, styleBuyRect.y, styleBuyRect.w, styleBuyRect.h);
        cx.fillStyle = can ? '#e8dcc0' : '#8a94a6'; cx.font = '13px Georgia';
        cx.fillText((TOUCH ? 'BUY' : 'B — buy') + '  ◆ ' + S.cost, 32, 240);
      }
    }
    const OM = todayOmen();
    cx.textAlign = 'right'; cx.font = 'bold 15px Georgia';
    cx.fillStyle = omenOn ? '#c8a8e8' : '#c8bfa8';
    cx.fillText("TODAY'S OMEN  " + (omenOn ? '— ACCEPTED' : (TOUCH ? '(tap)' : '(O)')), W - 24, 96);
    cx.font = '14px Georgia'; cx.fillStyle = omenOn ? '#c8a8e8' : '#8a94a6';
    cx.fillText('boon: ' + OM.b, W - 24, 118);
    cx.fillText('curse: ' + OM.c, W - 24, 138);
    // JF-#026: Hall of Legends — selected district's top 3 (right, under the omen)
    {
      const H = save.hall[sel];
      if (H && H.length){
        cx.textAlign = 'right'; cx.font = 'bold 15px Georgia'; cx.fillStyle = '#c8bfa8';
        cx.fillText('HALL OF LEGENDS — ' + DISTRICTS[sel].name, W - 24, 172);
        cx.font = '14px Georgia';
        H.slice(0, 3).forEach((h, i) => {
          cx.fillStyle = i === 0 ? '#e8c76a' : '#8a94a6';
          cx.fillText('#' + (i + 1) + '  ' + h.s + '  · wave ' + h.w, W - 24, 192 + i * 18);
        });
      }
    }
    cx.textAlign = 'center';
    // JF-#010: techniques known + the next one your belt will teach
    const known = TECH.filter(T => mb >= T.belt).map(T => T.name).join(' · ');
    const next = TECH.find(T => mb < T.belt);
    cx.fillStyle = '#7a8494'; cx.font = '14px Georgia';
    cx.fillText((known ? 'techniques: ' + known + (next ? '   ·   ' : '') : '') +
      (next ? BELTS[next.belt].name + ' belt teaches ' + next.name : ''), W/2, 504);
  } else if (state === S_DEAD){
    cx.fillStyle = 'rgba(8,10,14,0.7)'; cx.fillRect(0, 0, W, H);
    cx.fillStyle = won ? '#7ce8a8' : '#e86a6a'; cx.font = 'bold 44px Georgia'; cx.textAlign = 'center';
    cx.fillText(won ? 'DISTRICT CLEARED' : 'FELLED', W/2, 150);
    // line-item tally reveal
    const lines = [
      won ? ['Cleared', DISTRICTS[fought].name] : ['Felled on', 'WAVE ' + wave + '  ·  ' + DISTRICTS[fought].name],
      ['Foes dropped', kills + ''],
      ['Counters', counters + ''],
      ['Best combo', '×' + bestCombo],
      ['Jade earned', '◆ ' + jadeRun + (dailyBonus ? '  (×2 return bonus)' : '')],
      ['SCORE', score + '']
    ];
    if (won && fought < DISTRICTS.length - 1)
      lines.splice(1, 0, ['Next', DISTRICTS[fought + 1].name]);
    if (promoted >= 0) lines.splice(4, 0,
      ['Promoted', BELTS[promoted].name + ' BELT']);
    if (hallRank) lines.splice(lines.length - 1, 0,
      ['Hall of Legends', '#' + hallRank + ' · ' + DISTRICTS[fought].name]);   // JF-#026
    const shown = Math.min(lines.length, Math.floor(tallyT / 24));
    if (shown > tallyStep){ tallyStep = shown; Snd.tick(); if (shown === lines.length && newBest) Snd.best(); }
    cx.font = '20px Georgia';
    for (let i = 0; i < shown; i++){
      const y = 190 + i * 32;
      cx.fillStyle = i === lines.length - 1 || lines[i][0] === 'Jade earned' ? '#7ce8a8' : '#e8dcc0';
      cx.textAlign = 'right'; cx.fillText(lines[i][0], W/2 - 20, y);
      cx.textAlign = 'left';  cx.fillText(lines[i][1], W/2 + 20, y);
    }
    btnRects = [];
    tallyDone = shown === lines.length;
    if (tallyDone){
      if (newBest){
        cx.fillStyle = '#e8c76a'; cx.font = 'bold 22px Georgia'; cx.textAlign = 'center';
        cx.fillText('NEW BEST', W/2, 348);
      }
      // one-tap upgrade spend, right on the tally (Rogue Legacy flow)
      walletShown += (save.jade - walletShown) * 0.12;   // count-up: watch the jade bank
      if (Math.abs(save.jade - walletShown) < 0.6) walletShown = save.jade;
      cx.textAlign = 'center'; cx.fillStyle = '#7ce8a8'; cx.font = 'bold 19px Georgia';
      cx.fillText('JADE  ◆ ' + Math.round(walletShown) + '   — train:', W/2, 382);
      // goal-gradient: pulse the cheapest upgrade you can afford right now
      let pulseI = -1, pc = 1e9;
      for (let i = 0; i < UPS.length; i++){
        const tier = save.up[UPS[i].k];
        if (tier < UPS[i].max){
          const c = UPS[i].cost(tier);
          if (c <= save.jade && c < pc){ pc = c; pulseI = i; }
        }
      }
      const nothingOwned = UPS.every(u => save.up[u.k] === 0);
      if (nothingOwned && pulseI >= 0 && (t / 25 | 0) % 2 === 0){
        cx.fillStyle = '#7ce8a8'; cx.font = 'bold 16px Georgia';
        cx.fillText('▼ you can afford your first training ▼', W/2, 394);
      }
      const bw2 = 218, bh = 44, gap = 10;   // 2×2 upgrade grid
      for (let i = 0; i < UPS.length; i++){
        const u = UPS[i], tier = save.up[u.k], maxed = tier >= u.max;
        const cost = maxed ? 0 : u.cost(tier);
        const bx = W/2 + (i % 2 === 0 ? -bw2 - gap/2 : gap/2), by = 398 + Math.floor(i / 2) * (bh + gap);
        const can = !maxed && save.jade >= cost;
        btnRects.push({ x: bx, y: by, w: bw2, h: bh, i });
        cx.fillStyle = maxed ? 'rgba(124,232,168,0.10)' : can ? 'rgba(124,232,168,0.22)' : 'rgba(140,148,166,0.10)';
        cx.fillRect(bx, by, bw2, bh);
        const isPulse = i === pulseI && (t / 20 | 0) % 2 === 0;
        cx.strokeStyle = can ? (isPulse ? '#b8ffd8' : '#7ce8a8') : 'rgba(140,148,166,0.4)';
        cx.lineWidth = isPulse ? 3 : 1.5;
        cx.strokeRect(bx, by, bw2, bh);
        cx.fillStyle = can ? '#e8dcc0' : '#8a94a6'; cx.font = 'bold 15px Georgia'; cx.textAlign = 'left';
        cx.fillText((i + 1) + '. ' + u.name + ' ' + '●'.repeat(tier) + '○'.repeat(u.max - tier), bx + 10, by + 18);
        cx.font = '13px Georgia';
        cx.fillText(u.desc + (maxed ? '  · MAX' : '  · ◆ ' + cost), bx + 10, by + 35);
      }
      // JF-#016: rewarded DOUBLE JADE offer, right of the upgrade grid
      adRect = null;
      if (!rewardUsed && jadeRun > 0){
        const ax = 724, ay = 398, aw = 216, ah = 44;
        adRect = { x: ax, y: ay, w: aw, h: ah };
        const glow = (t / 22 | 0) % 2 === 0;
        cx.fillStyle = 'rgba(232,199,106,0.16)'; cx.fillRect(ax, ay, aw, ah);
        cx.strokeStyle = glow ? '#ffe9a8' : '#e8c76a'; cx.lineWidth = glow ? 3 : 1.5;
        cx.strokeRect(ax, ay, aw, ah);
        cx.fillStyle = '#e8c76a'; cx.font = 'bold 15px Georgia'; cx.textAlign = 'left';
        cx.fillText('▶ DOUBLE JADE  +' + jadeRun + '◆', ax + 10, ay + 18);
        cx.font = '13px Georgia'; cx.fillStyle = '#c8bfa8';
        cx.fillText(TOUCH ? 'watch an ad · tap here' : 'watch an ad · press R', ax + 10, ay + 35);
      }
      cx.fillStyle = '#8a94a6'; cx.font = '15px Georgia'; cx.textAlign = 'center';
      cx.fillText((newBest ? '' : 'BEST ' + best + '   ·   ') + (TOUCH ? 'tap the top half to rise again' : '1-4 to train  ·  arrows to rise again'), W/2, 522);
    }
  }
  else if (state === S_STORY){
    // JF-#012: the opening tale — three lines, then the courtyard
    cx.fillStyle = 'rgba(8,10,14,0.82)'; cx.fillRect(0, 0, W, H);
    cx.textAlign = 'center';
    cx.fillStyle = '#7ce8a8'; cx.font = 'bold 40px Georgia';
    cx.fillText('JADE FIST', W/2, 150);
    const SL = [
      "Your master's jade — the heart of the school — was stolen in the night.",
      'Four districts stand between you and the thief.',
      'Take it back. One counter at a time.'
    ];
    cx.font = '20px Georgia';
    SL.forEach((s, i) => {
      cx.globalAlpha = Math.min(1, Math.max(0, (t - 40 - i * 55) / 40));
      cx.fillStyle = i === 2 ? '#e8c76a' : '#e8dcc0';
      cx.fillText(s, W/2, 240 + i * 44);
    });
    cx.globalAlpha = 1;
    if (t > 220 && (t / 30 | 0) % 2 === 0){
      cx.fillStyle = '#e8dcc0'; cx.font = 'bold 20px Georgia';
      cx.fillText(TOUCH ? '— tap to begin —' : '— press any key —', W/2, 430);
    }
  } else if (state === S_END){
    // JF-#012: the ending — the jade reclaimed
    cx.fillStyle = 'rgba(8,10,14,0.82)'; cx.fillRect(0, 0, W, H);
    cx.textAlign = 'center';
    const gl = 0.7 + 0.3 * Math.sin(t * 0.06);
    cx.fillStyle = `rgba(124,232,168,${gl * 0.25})`;
    cx.beginPath(); cx.arc(W/2, 190, 70, 0, 7); cx.fill();
    cx.fillStyle = '#7ce8a8'; cx.font = 'bold 54px Georgia';
    cx.fillText('◆', W/2, 210);
    cx.fillStyle = '#e8c76a'; cx.font = 'bold 38px Georgia';
    cx.fillText('THE JADE IS RECLAIMED', W/2, 290);
    cx.fillStyle = '#e8dcc0'; cx.font = '19px Georgia';
    cx.fillText('The thief is felled. The school stands. Your name is spoken in four districts.', W/2, 334);
    cx.fillStyle = '#c8a8e8';
    cx.fillText('LEGEND unlocked — the tale retold, without end.', W/2, 366);
    if ((t / 30 | 0) % 2 === 0){
      cx.fillStyle = '#e8dcc0'; cx.font = 'bold 20px Georgia';
      cx.fillText('— continue —', W/2, 430);
    }
  }
  // JF-#022: bot banner so a fairness pass is never mistaken for play
  if (BOT){
    cx.fillStyle = '#c8a8e8'; cx.font = 'bold 14px Georgia'; cx.textAlign = 'left';
    cx.fillText(BOT.done ? 'FAIRNESS SUITE DONE — see console' :
      'BOT ' + (BOT.run + 1) + '/' + (BOT.runs * 4) + ' · react ' + BOT.react + 'f', 20, H - 14);
  }
  // mute button
  cx.fillStyle = 'rgba(232,220,192,0.6)'; cx.font = '20px Georgia'; cx.textAlign = 'right';
  cx.fillText(Snd.muted ? '🔇' : '🔊', W - 18, 34);
  // JF-#014: pause overlay on top of the frozen world
  if (state === S_PAUSE){
    cx.fillStyle = 'rgba(10,13,18,0.72)'; cx.fillRect(0, 0, W, H);
    cx.textAlign = 'center';
    cx.fillStyle = '#e8c76a'; cx.font = 'bold 42px Georgia';
    cx.fillText('PAUSED', W/2, H/2 - 10);
    cx.fillStyle = '#e8dcc0'; cx.font = '19px Georgia';
    cx.fillText(TOUCH ? 'Tap to resume' : 'P or any key to resume', W/2, H/2 + 34);
  }
}

// ------------------------------------------------------------------ loop ----
let last = 0, acc = 0;
const STEP = 1000 / 60;
function loop(ts){
  requestAnimationFrame(loop);
  if (!last) last = ts;
  acc += Math.min(ts - last, 100); last = ts;
  while (acc >= STEP){ update(); acc -= STEP; }
  // JF-#021: one intensity knob feeds the music every frame
  const bossUp = enemies.some(e => e.type === T_BOSS && e.st !== E_DOWN && e.st !== E_THROWN);
  const inten =
    state === S_PLAY ? Math.min(1, 0.32 + difficulty * 0.045 + Math.min(combo, 8) * 0.025 + (bossUp ? 0.18 : 0)) :
    state === S_MENU || state === S_STORY ? 0.15 :
    state === S_DEAD ? (won ? 0.3 : 0.1) :
    state === S_END ? 0.35 : 0;      // S_PAUSE fades to silence
  Snd.music(document.hidden ? 0 : inten, bossUp && state === S_PLAY);
  draw();
}
requestAnimationFrame(loop);
document.addEventListener('visibilitychange', () => {
  last = 0; acc = 0;
  if (document.hidden) pauseGame();   // JF-#014: CG requires auto-pause on blur
});
</script>
</body>
