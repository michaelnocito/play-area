<script>
'use strict';
// ============================================================================
// JADE FIST â€” kung fu counter-brawler prototype (JF-#001)
// Single file, canvas + vanilla JS, procedural art + WebAudio. No assets.
// Verbs: STRIKE (tap toward an enemy) / COUNTER (strike during their red
// telegraph flash -> throw, knocks down neighbors) / combo chain multiplier.
// ============================================================================

const W = 960, H = 540;
const cv = document.getElementById('c'), cx = cv.getContext('2d');
let scale = 1;
// JF-#015: back the canvas at devicePixelRatio so it stays crisp on hi-dpi
// displays (CG requirement). All game code keeps drawing in 960x540 logical
// coords â€” the base transform maps them to physical pixels.
// JF-#036: on a touch device held portrait, fit() pins to width and the
// canvas shrinks to a thin strip (measured: 375x211 inside an 812-tall
// viewport â€” ~74% of the screen is unused black bars) with no way to tell
// the player why. portraitBlock freezes the run and draw() shows a rotate
// prompt instead until the device is turned; matchMedia is used directly
// here since TOUCH isn't defined until later in the file.
// (state/pauseGame don't exist yet at this point in the file â€” the actual
// auto-pause-on-portrait wiring lives further down, once they're declared.)
let portraitBlock = false;
function fit(){
  const ww = innerWidth, wh = innerHeight;
  const dpr = window.devicePixelRatio || 1;
  portraitBlock = matchMedia('(pointer:coarse)').matches && wh > ww;
  scale = Math.min(ww / W, wh / H);
  cv.width = Math.round(W * scale * dpr);
  cv.height = Math.round(H * scale * dpr);
  cv.style.width = (W * scale) + 'px';
  cv.style.height = (H * scale) + 'px';
  cx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);
}
addEventListener('resize', fit); fit();

// ---------------------------------------------------------------- audio ----
// Layered voices per the speaker-scaling architecture: transient click
// 2-5kHz + mid body 200-500Hz + harmonic bass; sub sine as parallel garnish.
const Snd = (() => {
  let ac = null, master = null, muted = localStorage.getItem('jf_mute') === '1';
  function ensure(){
    if (!ac){
      ac = new (window.AudioContext || window.webkitAudioContext)();
      master = ac.createGain(); master.gain.value = muted ? 0 : 0.8;
      master.connect(ac.destination);
    }
    if (ac.state === 'suspended') ac.resume();
  }
  function env(g, t0, a, peak, dur){
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(peak, t0 + a);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  }
  function tone(freq, dur, type, peak, when, bend){
    const t0 = ac.currentTime + (when || 0);
    const o = ac.createOscillator(), g = ac.createGain();
    o.type = type || 'sine'; o.frequency.setValueAtTime(freq, t0);
    if (bend) o.frequency.exponentialRampToValueAtTime(bend, t0 + dur);
    env(g, t0, 0.004, peak, dur);
    o.connect(g); g.connect(master); o.start(t0); o.stop(t0 + dur + 0.02);
  }
  function noise(dur, peak, hp, when){
    const t0 = ac.currentTime + (when || 0);
    const n = Math.floor(ac.sampleRate * dur);
    const buf = ac.createBuffer(1, n, ac.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / n);
    const s = ac.createBufferSource(); s.buffer = buf;
    const f = ac.createBiquadFilter(); f.type = 'highpass'; f.frequency.value = hp || 1000;
    const g = ac.createGain(); env(g, t0, 0.003, peak, dur);
    s.connect(f); f.connect(g); g.connect(master); s.start(t0);
  }
  // JF-#021: reactive music â€” an A-pentatonic pluck bed over a two-voice drone.
  // One knob (intensity 0..1) drives tempo, note density, register, and drone
  // swell; a boss on screen adds a low taiko pulse. Runs off the same master
  // gain so mute covers it; intensity 0 = silence (pause/blur fade out).
  let mGain = null, droneGain = null, mNext = 0, mBeat = 0;
  const PENT = [220, 261.6, 293.7, 329.6, 392, 440, 523.3, 587.3, 659.3];
  function mEnsure(){
    if (mGain) return;
    mGain = ac.createGain(); mGain.gain.value = 0; mGain.connect(master);
    droneGain = ac.createGain(); droneGain.gain.value = 0; droneGain.connect(mGain);
    const d1 = ac.createOscillator(); d1.type = 'sine'; d1.frequency.value = 55;
    const d2 = ac.createOscillator(); d2.type = 'triangle'; d2.frequency.value = 110.4;
    d1.connect(droneGain); d2.connect(droneGain); d1.start(); d2.start();
    mNext = ac.currentTime + 0.1;
  }
  function pluck(freq, when, vel){
    const o = ac.createOscillator(), g = ac.createGain(), f = ac.createBiquadFilter();
    o.type = 'triangle'; o.frequency.value = freq;
    f.type = 'lowpass';
    f.frequency.setValueAtTime(freq * 4, when);
    f.frequency.exponentialRampToValueAtTime(freq * 1.5, when + 0.3);
    g.gain.setValueAtTime(0.0001, when);
    g.gain.exponentialRampToValueAtTime(vel, when + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, when + 0.55);
    o.connect(f); f.connect(g); g.connect(mGain);
    o.start(when); o.stop(when + 0.6);
  }
  function thump(when){
    const o = ac.createOscillator(), g = ac.createGain();
    o.type = 'sine'; o.frequency.setValueAtTime(70, when);
    o.frequency.exponentialRampToValueAtTime(42, when + 0.18);
    g.gain.setValueAtTime(0.0001, when);
    g.gain.exponentialRampToValueAtTime(0.9, when + 0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, when + 0.28);
    o.connect(g); g.connect(mGain); o.start(when); o.stop(when + 0.3);
  }
  return {
    get muted(){ return muted; },
    toggleMute(){
      muted = !muted; localStorage.setItem('jf_mute', muted ? '1' : '0');
      if (master) master.gain.value = muted ? 0 : 0.8;
    },
    unlock(){ ensure(); },
    music(intensity, boss){
      if (!ac) return;              // no context until the first user gesture
      mEnsure();
      mGain.gain.setTargetAtTime(intensity * 0.14, ac.currentTime, 0.6);
      droneGain.gain.setTargetAtTime(intensity * 0.5, ac.currentTime, 1.4);
      const spb = 60 / (64 + intensity * 76);        // eighth-note interval
      while (mNext < ac.currentTime + 0.2){
        mBeat++;
        if (intensity > 0.02 && Math.random() < intensity * 0.85){
          const span = 3 + Math.round(intensity * (PENT.length - 3));
          pluck(PENT[(Math.random() * span) | 0], mNext, 0.4 + Math.random() * 0.3);
        }
        if (boss && mBeat % 4 === 0) thump(mNext);
        mNext += spb;
      }
    },
    whoosh(){ ensure(); noise(0.09, 0.25, 2200); },
    hit(combo){
      ensure();
      const p = Math.min(combo, 8);
      noise(0.05, 0.5, 2500);                          // transient click
      tone(220 * Math.pow(1.06, p), 0.09, 'square', 0.22);  // mid body, pitch rises w/ combo
      tone(90, 0.12, 'sine', 0.4, 0, 55);              // harmonic bass thump
      tone(52, 0.14, 'sine', 0.3);                     // sub garnish
    },
    counter(){
      ensure();
      noise(0.06, 0.6, 3000);
      tone(660, 0.5, 'sine', 0.28);                    // gong shimmer
      tone(662.5, 0.5, 'sine', 0.2);                   // beat frequency = gong wobble
      tone(110, 0.3, 'triangle', 0.35, 0, 70);
      tone(48, 0.3, 'sine', 0.35);
    },
    hurt(){
      ensure();
      noise(0.12, 0.5, 800);
      tone(140, 0.25, 'sawtooth', 0.25, 0, 60);
      tone(45, 0.3, 'sine', 0.4);
    },
    ko(){
      ensure();
      tone(180, 0.7, 'triangle', 0.3, 0, 40);
      tone(44, 0.8, 'sine', 0.45);
      noise(0.3, 0.3, 400, 0.05);
    },
    windup(frames){ ensure(); tone(320, frames / 60, 'sine', 0.12, 0, 520); },
    block(){
      ensure();
      noise(0.05, 0.5, 4000);                          // metallic clank
      tone(1200, 0.08, 'square', 0.12);
      tone(300, 0.1, 'triangle', 0.2, 0, 200);
    },
    tick(){ ensure(); tone(880, 0.05, 'sine', 0.15); },
    best(){ ensure(); [523,659,784].forEach((f,i)=>tone(f, 0.25, 'sine', 0.2, i*0.09)); }
  };
})();

// SDK:ADAPTER:BEGIN
// ------------------------------------------ GameMonetize adapter (JF-#024) --
// Same CG facade the game calls everywhere; graceful no-op off-platform.
// JF-#037: interstitial(cb) MUST invoke cb once the ad resolves â€” the master
// game's startRun() now waits on this callback before starting the run
// (CG.interstitial(beginRun)). This stub used to take no callback at all,
// which would have permanently soft-locked the menu on this platform the
// first time an ad was due, since beginRun() would never be called.
let sdkLive = false;
const CG = {
  init(cb){ sdkLive = !!window.sdk; cb && cb(); },
  loadingStart(){}, loadingStop(){}, gameplayStart(){}, gameplayStop(){}, happytime(){}, submitScore(s){},
  interstitial(cb){ try{ if (window.sdk && window.sdk.showBanner) window.sdk.showBanner(); }catch(e){} cb && cb(); },
  rewarded(onReward){
    try{ if (window.sdk && window.sdk.showRewardedBanner){
      window.__gmReward = onReward; window.sdk.showRewardedBanner(); return;
    } }catch(e){}
    onReward && onReward();
  },
};
CG.init(() => {});
// SDK:ADAPTER:END

// ----------------------------------------------------------------- state ----
// ------------------------------------------------------- progression save ---
// localStorage save = free cloud sync on CrazyGames (Automatic Progress Save
// backs up localStorage for HTML5 games; Data Module syncs for logged-in users).
// Design rule (Rooftop Â§4 research): upgrades compress the warm-up / add options,
// never raise the skill ceiling; ~Ã—2 cost per tier; first buy within 1-2 runs.
const SAVE_KEY = 'jf_save_v1';
let save = { jade: 0, up: { body: 0, palm: 0, focus: 0, wind: 0 },
             kills: 0, ach: {}, day: '', streak: 0, dist: 0, tday: '', tdone: [0,0,0], intro: 0,
             cos: { own: [1,0,0,0,0], wear: 0 }, hall: [[],[],[],[],[]] };
try {
  const s = JSON.parse(localStorage.getItem(SAVE_KEY));
  if (s && s.up) save = {
    jade: s.jade | 0, up: Object.assign(save.up, s.up),
    kills: s.kills | 0, ach: s.ach || {}, day: s.day || '', streak: s.streak | 0,
    dist: s.dist | 0, tday: s.tday || '', tdone: s.tdone || [0,0,0], intro: s.intro | 0,
    cos: (s.cos && s.cos.own) ? { own: s.cos.own, wear: s.cos.wear | 0 } : save.cos,
    hall: Array.isArray(s.hall) && s.hall.length === 5 ? s.hall : save.hall
  };
} catch (e) {}
// JF-#023: cosmetic shop â€” robe dyes, a pure jade sink. Cosmetics only: no
// stats, so the shop can never bend balance. Hues stay far from enemy greys
// and telegraph reds so readability holds.
const STYLES = [
  { name: 'TRAVELER',     col: '#e8dcc0', cost: 0   },
  { name: 'MOON WHITE',   col: '#f8f2e0', cost: 40  },
  { name: 'JADE ROBE',    col: '#aee8c6', cost: 60  },
  { name: 'GOLD SILK',    col: '#e8cf88', cost: 90  },
  { name: 'NIGHT ORCHID', col: '#c8aee6', cost: 120 },
  // JF-#033: silly accessories â€” pure jade sinks, cosmetic only
  { name: 'PANDA HOOD',    col: '#f0ead2', acc: 'panda',    cost: 80  },
  { name: 'FAKE MUSTACHE', col: '#e8dcc0', acc: 'mustache', cost: 50  },
  { name: 'CHICKEN SUIT',  col: '#f4dd7a', acc: 'chicken',  cost: 160 },
  { name: "LI'L DRAGON",   col: '#aee8c6', acc: 'dragon',   cost: 220 }
];
let styleSel = save.cos.wear;      // wardrobe cursor (menu)
function wearCol(){ return STYLES[save.cos.wear].col; }
function wornAcc(){ return STYLES[save.cos.wear].acc || null; }
function styleNext(){
  styleSel = (styleSel + 1) % STYLES.length;
  if (save.cos.own[styleSel]){ save.cos.wear = styleSel; persist(); }
  Snd.tick();
}
function styleBuy(){
  if (save.cos.own[styleSel]) return;
  const c = STYLES[styleSel].cost;
  if (save.jade < c){ Snd.tick(); return; }
  save.jade -= c; save.cos.own[styleSel] = 1; save.cos.wear = styleSel; persist();
  Snd.best();
}
let styleRect = null, styleBuyRect = null;   // menu hitboxes (rebuilt each draw)
function persist(){ localStorage.setItem(SAVE_KEY, JSON.stringify(save)); }
// JF-#022: bot fairness suite â€” open index.html?bot=3 (&react=12) and a bot with
// a fixed human reaction time (frames, 12 â‰ˆ 200ms) plays N runs in each of the
// four campaign districts, classifying every hit it takes: PINCER (opposite-side
// threat overlapped), FAST (telegraph shorter than the reaction time), or clean.
// Results go to the console as a per-run table + aggregate verdict. Bot mode
// never touches the real save or best score.
const BOTQ = new URLSearchParams(location.search);
const BOT = BOTQ.has('bot')
  ? { runs: Math.max(1, +BOTQ.get('bot') || 3), react: +BOTQ.get('react') || 12,
      run: 0, stats: [], cur: null, done: false }
  : null;
if (BOT){ save.dist = 4; save.intro = 1; persist = () => {}; }
// JF-#037: QA-only SDK/adblock visibility â€” CG.adblockDetected was computed
// (JF-#036) but never displayed anywhere. ?debug=1 shows it plus sdkLive
// state in a corner readout so Mike can verify on the CG preview environment
// without opening devtools.
const DEBUG = BOTQ.has('debug');
function botThink(){
  // JF-#028: survival first â€” dodge an incoming spear before anything else
  if (P.jumpT <= 0 && P.duckT <= 0){
    for (const d of darts){
      if (d.hit) continue;
      const closing = (d.x - P.x) * Math.sign(d.vx) < 0;   // heading toward us
      if (closing && Math.abs(d.x - P.x) < 90){ d.high ? duck() : jump(); return; }
    }
  }
  // JF-#040: dodge an armored melee swing (high/low/grab) just before it lands â€”
  // block/counter don't answer these, only the right dodge does
  if (P.jumpT <= 0 && P.duckT <= 0){
    for (const e of enemies){
      if (e.st !== E_WINDUP || !e.atk || e.atk === 'strike') continue;
      if (Math.abs(e.x - P.x) > Math.max(e.reach, PR) + 24) continue;
      if (e.stT < e.windup - 12) continue;                 // react late so the dodge covers the hit
      if (e.atk === 'high') duck(); else jump();           // low & grab â†’ jump
      return;
    }
  }
  // counter next: the ripest RED windup that has been visible >= reaction frames
  let tgt = null, ripest = -1;
  for (const e of enemies){
    if (e.st !== E_WINDUP || e.stT < BOT.react) continue;
    if (e.atk && e.atk !== 'strike') continue;             // JF-#040: armored â€” handled above
    const range = Math.max(e.reach, PR) + 18;
    if (Math.abs(e.x - P.x) > range) continue;
    const r = e.stT / e.windup;
    if (r > ripest){ ripest = r; tgt = e; }
  }
  if (tgt){
    // don't punch into a brute/boss body-blocking the lane â€” the strike would
    // hit HIM (shove/shrug), not the windup behind him; wait like a human would
    const dir = Math.sign(tgt.x - P.x) || 1;
    const nr = nearestInReach(dir);
    if (nr && nr !== tgt && (nr.type === T_BRUTE || nr.type === T_BOSS) && nr.st !== E_WINDUP) return;
    strike(dir); return;
  }
  // otherwise thin the crowd at a human-ish cadence â€” but never poke brutes or
  // bosses (strikes only shove/annoy them; correct play is to await the windup,
  // and spamming them re-staggers forever and stalls the wave)
  if (t % 10 === 0){
    const e = nearestInReach(0);
    if (e && e.st !== E_WINDUP && e.type !== T_BRUTE && e.type !== T_BOSS)
      // JF-#046: guarded foes included â€” poking the guard twice baits a
      // counterable retaliation windup, which the counter loop above handles
      strike(Math.sign(e.x - P.x) || 1);
  }
}
function botHit(e){
  if (!BOT.cur) return;
  const pincer = enemies.some(o => o !== e && (o.st === E_WINDUP || o.st === E_STRIKE) &&
    Math.sign(o.x - P.x) !== Math.sign(e.x - P.x));
  BOT.cur.hits.push({ wave, type: e.type, windup: Math.round(e.windup0 || e.windup),
    pincer, fast: (e.windup0 || e.windup) < BOT.react });
}
function botFrame(){
  if (BOT.done) return;
  if (state === S_END){ press(1); return; }   // dismiss the ending â†’ tally
  if (state === S_STORY || state === S_MENU){
    sel = Math.min(3, Math.floor(BOT.run / BOT.runs));
    BOT.cur = { hits: [] };
    startRun();
    return;
  }
  if (state === S_PLAY){
    // JF-#025: bot takes a scroll at random so runs keep moving
    if (scrollOffer){ pickScroll(Math.random() < 0.5 || scrollOffer.b < 0 ? scrollOffer.a : scrollOffer.b); return; }
    botThink(); return;
  }
  if (state === S_DEAD && tallyT > 100){
    BOT.run++;
    if (BOT.run >= BOT.runs * 4){
      BOT.done = true;
      console.table(BOT.stats);
      const all = BOT.stats.flatMap(s => s.hitList);
      const agg = {
        runs: BOT.stats.length,
        avgWave: +(BOT.stats.reduce((n, s) => n + s.wave, 0) / BOT.stats.length).toFixed(1),
        wins: BOT.stats.filter(s => s.won).length,
        hitsPerRun: +(all.length / BOT.stats.length).toFixed(1),
        pctPincer: all.length ? Math.round(100 * all.filter(h => h.pincer).length / all.length) : 0,
        pctFast: all.length ? Math.round(100 * all.filter(h => h.fast).length / all.length) : 0
      };
      console.log('JADE FIST FAIRNESS VERDICT', agg);
      console.log(agg.pctFast > 15 ? 'âš  >15% of hits came from telegraphs shorter than the reaction time â€” unreactable, tune windups up.'
        : agg.pctPincer > 35 ? 'âš  >35% of hits were pincers â€” fairness guard may lift too early.'
        : 'âœ“ fair: most damage was reactable and single-sided.');
      return;
    }
    state = S_MENU;   // next run
  }
}
// belts = lifetime-kill milestones (CG "achievable objectives"); sash shows your rank
const BELTS = [
  // JF-#039: thresholds halved-ish â€” duels mean ~8-12 fells a run, not 30+
  { name: 'WHITE',  need: 0,   col: '#e8e8e8' },
  { name: 'YELLOW', need: 12,  col: '#e8d05a' },
  { name: 'ORANGE', need: 40,  col: '#e89a4a' },
  { name: 'GREEN',  need: 80,  col: '#3fae7c' },
  { name: 'BLUE',   need: 150, col: '#4a8ae8' },
  { name: 'BROWN',  need: 250, col: '#a8794a' },
  { name: 'BLACK',  need: 400, col: '#3a3f48' }
];
function beltOf(k){ let b = 0; BELTS.forEach((B, i) => { if (k >= B.need) b = i; }); return b; }
// JF-#010: techniques â€” belt promotions teach new play, not just a sash color.
// All three live inside the two verbs: better throws, a later counter window,
// and a chain reward for perfect timing.
const TECH = [
  { belt: 1, name: 'DRAGON SWEEP', desc: 'perfect throws fly farther and pierce' },
  { belt: 3, name: 'IRON CATCH',   desc: 'counter even as their strike falls' },
  { belt: 4, name: 'PALM WAVE',    desc: '3 perfect counters in a row fell BOTH sides' }
];
function hasTech(i){ return beltOf(save.kills + kills) >= TECH[i].belt; }
// JF-#011: daily trials â€” three rotating objectives, 15â—† each, once per day.
// Rotation is date-seeded so every player sees the same trio on the same day.
const TRIALS = [
  { k: 'vip',     name: 'Counter 5 vipers',           n: 5 },
  { k: 'perf',    name: 'Land 4 perfect counters',    n: 4 },
  { k: 'sweep',   name: 'Sweep 3 crowds',             n: 3 },
  { k: 'nohit',   name: 'Clear a wave untouched',     n: 1 },
  { k: 'heavy',   name: 'Punish 6 recovering foes',   n: 6 },
  { k: 'stumble', name: 'Cause 4 stumbles',           n: 4 },
  { k: 'dodge',   name: 'Dodge 5 thrown spears',      n: 5 }   // JF-#028
];
const dayNum = () => Math.floor(Date.now() / 86400000);
function todayTrio(){ const n = TRIALS.length, d = dayNum(); return [d % n, (d + 2) % n, (d + 4) % n]; }
let trialCt = {};
function bumpTrial(k, amt){
  trialCt[k] = (trialCt[k] || 0) + (amt || 1);
  const trio = todayTrio();
  for (let i = 0; i < 3; i++){
    const T = TRIALS[trio[i]];
    if (T.k === k && !save.tdone[i] && trialCt[k] >= T.n){
      save.tdone[i] = 1; jadeRun += 15; persist();
      popup(W/2, 250, 'TRIAL: ' + T.name.toUpperCase() + '  +15â—†', '#7ce8a8', true);
      Snd.best();
    }
  }
}

function tryBackstep(dir){
  if (grapple) return false;   // JF-#044: pinned â€” presses go to the mash-out

}

// Enemy lifecycle: walk in -> windup (RED TELEGRAPH = counter window) ->
// strike (hits you if still standing there) -> recover -> walk again.
const E_WALK = 0, E_WINDUP = 1, E_STRIKE = 2, E_RECOVER = 3, E_DOWN = 4, E_THROWN = 5, E_STAGGER = 6, E_FEINT = 7, E_AIM = 8, E_EVADE = 9;   // JF-#028: E_AIM = spearman throw wind-up Â· JF-#041: E_EVADE = hopping back from YOUR strike
// types: 0 initiate Â· 1 viper (fast, short telegraph) Â· 2 iron monk (brute â€” strikes
// only SHOVE him, counter to fell) Â· 3 spearman (attacks from long range â€” counter at range)
const T_NORM = 0, T_FAST = 1, T_BRUTE = 2, T_SPEAR = 3, T_BOSS = 4;
function spawnEnemy(forceSide){
  // first ~15s: strictly alternate sides so the player is never pincered while learning
  const side = forceSide || (waveT < INTRO ? -lastSpawnSide : (Math.random() < 0.5 ? -1 : 1));
  lastSpawnSide = side;
  // JF-#009: district quirks skew the enemy mix â€” each district is its own fight
  const q = DISTRICTS[sel].quirk;
  let type = T_NORM;
  const r = Math.random();
  const spearTh = q === 'spear' ? 0.34 : 0.24, spearDiff = q === 'spear' ? 1.5 : 3;   // JF-#028: throwers in every district
  const bruteTh = q === 'guard' ? 0.52 : 0.38, bruteDiff = q === 'guard' ? 1.5 : 2.5;
  const fastTh  = q === 'crowd' ? 0.78 : 0.6;
  if (difficulty > spearDiff && r < spearTh) type = T_SPEAR;
  else if (difficulty > bruteDiff && r < bruteTh) type = T_BRUTE;
  else if (difficulty > 1 && r < fastTh) type = T_FAST;
  const base = 1.1 + Math.random() * 0.5 + difficulty * 0.12;
  const wind = Math.max(20, 46 - difficulty * 2.4);   // telegraph shrinks as waves rise (JF-#006: tighter late)
  enemies.push({
    x: W/2 + side * (W/2 + 40 + Math.random() * 70), side: -side,   // walks toward center
    st: E_WALK, stT: 0, type,
    speed: (type === T_FAST ? base * 1.5 : type === T_BRUTE ? base * 0.7 : base) * omen.spdScale,
    windup: (type === T_FAST ? Math.max(16, wind * 0.6) : type === T_BRUTE ? wind * 1.3 : wind) * omen.windScale,
    reach: type === T_SPEAR ? REACH + 70 : REACH,
    // JF-#007: vipers can guard too (diff>5); combo 8+ = the crowd wises up (+20% guard)
    // JF-#009: TEMPLE district = every hand is guarded (+18%)
    guard: ((type === T_NORM || (type === T_FAST && difficulty > 5)) &&
      Math.random() < Math.min(0.15 + difficulty * 0.04 + (combo >= 8 ? 0.2 : 0) +
        (q === 'guard' ? 0.18 : 0), 0.65)) ? 1 : 0,
    // JF-#007: some vipers open with a FEINT â€” pale flash, no audio, hops back out of reach
    feint: type === T_FAST && difficulty > 4 && Math.random() < 0.35,
    vx: 0, vy: 0, y: 420, rot: 0,
    // JF-#028: a spearman hurls ONE spear from range before closing to melee.
    // high throw -> DUCK, low throw -> JUMP. After it throws, it fights normally.
    willThrow: type === T_SPEAR, projHigh: Math.random() < 0.5,
    // JF-#039: DUEL toughness â€” far fewer bodies, so every foe is a real
    // back-and-forth: 2-4 good reads to fell, more as waves climb.
    hp: type === T_BRUTE ? 2
      : type === T_FAST  ? (2 + (difficulty > 7 ? 1 : 0))
      : type === T_SPEAR ? (3 + (difficulty > 9 ? 1 : 0))
      : (3 + (difficulty > 6 ? 1 : 0))   // T_NORM
  });
  const ne = enemies[enemies.length - 1];
  ne.hpMax = ne.hp;                           // JF-#039: pips + wounded-pressure scale off this
  ne.windup0 = ne.windup;                     // base windup (brute rage floors off this)
  // JF-#041: enemy DEFENSE â€” a raised guard now covers ONE line (high/mid/low,
  // shown by where the bracer sits) and PERSISTS: matching-line strikes bounce,
  // any other line lands (an OPENING). Adapts toward your favorite line.
  if (ne.guard) ne.guardLine = pickGuardLine();
  // JF-#041: evaders (Punch-Out dodge) â€” vipers early, rank-and-file late. They
  // hop back from your strike, then land in a long punishable recover: bait them.
  ne.canEvade = (type === T_FAST && difficulty > 2) || (type === T_NORM && difficulty > 6);
  ne.evadeCd = 0;
  // JF-#043: the district's named elite â€” one per cycle, first foe of wave 3
  if (eliteQueued && type !== T_BOSS){
    eliteQueued = false;
    const EL = ELITES[sel];
    ne.elite = EL;
    ne.hp += 1; ne.hpMax = ne.hp;
    if (EL.habit === 'feintfirst') ne.feint = true;
    if (EL.habit === 'evadefirst'){ ne.canEvade = true; ne.evadeCd = 0; ne.eliteEvade = true; }
    if (EL.habit === 'guardshift'){ ne.guard = 1; ne.guardLine = pickGuardLine(); }
    banner(EL.name, '#e8c76a', 100);
  }
  mutter(ne);                                 // JF-#030: the odd approach one-liner
  if (ne.guard && combo >= 8 && !adaptShown){
    adaptShown = true;
    popup(W/2, 220, 'THE CROWD WISES UP', '#a8b4c8', true);
  }
}

// JF-#040/#046: enemy ATTACK VARIETY. When a foe commits to a windup it picks
// one of four attacks, each with its own telegraph color and ONE correct answer
// â€” all of it on the arrow keys:
//   strike (RED)   -> COUNTER (strike into the flash) or BACK-STEP (press away)
//   high  (AMBER)  -> DUCK  (jump fails)
//   low   (CYAN)   -> JUMP  (duck fails)
//   grab  (PURPLE) -> DODGE (jump or duck) â€” ARMORED: can't be counter-struck
// Bosses stay pure-red counter fights; the Butcher's cleaver is separate.
function chooseAtk(e){
  if (e.type === T_BOSS) return 'strike';
  if (e.type === T_BRUTE){
    const r = Math.random();
    return r < 0.4 ? 'strike' : r < 0.72 ? 'grab' : 'high';
  }
  // spearmen keep their identity: a thrown spear (E_AIM) at range, a plain
  // counterable jab at melee â€” no long-reach grabs/sweeps, which read wrong from
  // 150px away and can't be fairly dodged.
  if (e.type === T_SPEAR) return 'strike';
  if (difficulty <= 2) return 'strike';           // early game teaches the counter first
  const r = Math.random();
  if (e.type === T_FAST){                          // vipers: quick strikes + snap high/low
    return r < 0.58 ? 'strike' : r < 0.79 ? 'high' : 'low';
  }
  // T_NORM at melee: the full mixup
  if (r < 0.48) return 'strike';
  if (r < 0.66) return 'high';
  if (r < 0.84) return 'low';
  return difficulty > 4 ? 'grab' : 'strike';
}

const REACH = 92;   // strike range from player center
function nearestInReach(dir){
  let bestE = null, bd = 1e9;
  for (const e of enemies){
    if (e.st === E_DOWN || e.st === E_THROWN || e.st === E_FEINT || e.st === E_EVADE) continue;   // feint/evade = springing away, unhittable
    const dx = e.x - P.x;
    if (dir && Math.sign(dx) !== dir) continue;
    const d = Math.abs(dx);
    // a winding-up spearman can be countered at HIS reach, not just yours
    const range = (e.st === E_WINDUP ? Math.max(e.reach, PR) : PR) + 18;
    if (d < range && d < bd){ bd = d; bestE = e; }
  }
  return bestE;
}

function popup(x, y, txt, col, big){

function burst(x, y, col, n, pow){
  const star = (pow || 3) >= 5;   // JF-#027: heavy hits throw comic stars
  for (let i = 0; i < n; i++){
    const a = Math.random() * Math.PI * 2, s = (0.5 + Math.random()) * (pow || 3);
    parts.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s - 1, life: 20 + Math.random()*16, col,
      star: star && i % 3 === 0, sz: 2 + Math.random() * 2, rot: Math.random() * 7 });
  }
}

// ----------------------------------------------------------------- verbs ----
function strike(dir){
  if (state !== S_PLAY) return;
  // JF-#044: grabbed = every strike press is a mash-out attempt
  if (grapple){
    grapple.hits--;
    burst(P.x, P.y - 60, '#c86ae8', 5, 2); Snd.hit(2); shake = 4;
    if (grapple.hits <= 0){
      const ge = grapple.e, gd = Math.sign(ge.x - P.x) || 1;
      ge.grappled = false; ge.st = E_STAGGER; ge.stT = 0; ge.vx = gd * 7;
      ge.leanT = 12; ge.leanDir = gd;
      popup(P.x, P.y - 110, 'BROKE FREE!', '#7ce8a8', true);
      Snd.counter(); hitStop = 4; shake = 8;
      grapple = null;
    }
    return;
  }
  if (whiffT > 0) return;                               // still recovering from a whiff
  if (hitStop > 0){ bufDir = dir; bufT = 8; return; }   // buffer through hit-stop
  P.flourishT = 0;                                      // JF-#044: fists cancel the pose
  P.face = dir; P.punchT = 12; P.punchSide = dir;
  const atkLine = atkLineNow();   // JF-#041: mid, or low (ducking) / high (airborne)
  lineUse[atkLine]++;
  const e = nearestInReach(dir);
  if (!e){ Snd.whoosh(); whiffT = run.monkey ? 7 : 14; return; }   // JF-#006 whiff recovery (JF-#025: MONKEY halves it)

  // JF-#040: only a RED windup (a plain strike) can be countered. High/low
  // swings and grabs are ARMORED during their windup â€” the answer is a dodge,
  // not a punch. Poking one costs you a beat and teaches the rule in place.
  if (e.st === E_WINDUP && e.atk && e.atk !== 'strike'){
    popup(e.x, e.y - 100, e.atk === 'grab' ? 'ARMORED â€” DODGE!' : e.atk === 'high' ? 'DUCK IT!' : 'JUMP IT!', '#a8b4c8');
    Snd.block(); hitStop = 2; whiffT = 10;
    return;
  }
  // JF-#010: IRON CATCH â€” with the technique, an unlanded strike can still be
  // countered. JF-#040: only a plain strike is catchable; armored swings aren't.
  const ironCatch = e.st === E_STRIKE && !e.didHit && hasTech(1) && (!e.atk || e.atk === 'strike');
  if ((e.st === E_WINDUP || ironCatch) && e.type === T_BOSS && e.hp > 1){   // ---- BOSS PHASE ----
    // JF-#008: counters are the only damage; each one staggers him a phase
    e.hp--; e.st = E_STAGGER; e.stT = 0; e.vx = dir * 7;
    e.windup = Math.max(30, e.windup - 8);       // each phase: faster telegraphs
    counters++; jadeRun += 3; combo++; comboT = CW;
    score += 1000;
    popup(e.x, e.y - 110, 'MASTER STAGGERED +1000', '#7ce8a8', true);
    if (e.flavor) popup(e.x, e.y - 140, 'â€œ' + e.flavor.jab + 'â€', '#e8b06a');   // JF-#034: boss grumbles
    clash(e.x, e.y - 60);   // JF-#043: the clash freeze â€” boss counters always earn it
    Snd.counter(); hitStop = 8; shake = 14; slowMo = 30;
    burst(e.x, e.y - 50, '#e86a6a', 26, 6);
    banner('HE CALLS HIS STUDENTS', '#e8b06a', 80);
    spawnEnemy(-1); spawnEnemy(1);               // phase adds, both sides
    if (combo > bestCombo) bestCombo = combo;
    return;
  }
  if (e.st === E_WINDUP || ironCatch){          // ---- COUNTER ----
    // JF-#007: final-third ("NOW" bright flash) = PERFECT counter
    // JF-#010: an IRON CATCH always counts as perfect
    const perfect = ironCatch || e.stT / e.windup > perfTh();   // JF-#025: CRANE widens
    if (e.type === T_FAST) bumpTrial('vip');
    if (perfect) bumpTrial('perf');
    counters++; jadeRun += perfect ? 5 : 3;
    award('counter');
    if (e.type === T_BRUTE) award('monk');
    if (e.type === T_SPEAR) award('spear');

    // JF-#038: multi-hit toughness + combo-gated finisher. A counter always damages;
    // it only FELLS once hp hits 0, and only becomes the big wide throw once the
    // player has strung together FINISH_AT good hits in a row.
    e.hp = (e.hp === undefined ? 1 : e.hp) - 1;
    // JF-#044: CORNERED â€” a counter against a foe pinned near the screen edge
    // hits double. Your throws push them there; the arena space finally matters.
    if (e.hp > 0 && e.type !== T_BOSS && (e.x < 100 || e.x > W - 100)){
      e.hp--;
      popup(e.x, e.y - 122, 'CORNERED!', '#e8b06a');
    }
    const lethal = e.hp <= 0;
    const empowered = lethal && (combo + 1 >= FINISH_AT);

    if (!lethal){                              // ---- STAGGER: foe is hurt, not felled ----
      e.st = E_STAGGER; e.stT = 0; e.vx = dir * 5; e.guard = 0;
      e.leanT = 12; e.leanDir = dir;           // JF-#043: head snaps away from the hit
      combo++; comboT = CW;
      const pts = (perfect ? 150 : 100) * Math.min(combo, 5);
      score += pts;
      popup(e.x, e.y - 90, (perfect ? 'PERFECT +' : 'COUNTER +') + pts, perfect ? '#e8c76a' : '#7ce8a8');
      if (perfect) clash(e.x, e.y - 55);       // JF-#043: perfect = the freeze-frame moment
      Snd.counter(); hitStop = 5; shake = perfect ? 8 : 6; slowMo = 18;
      burst(e.x, e.y - 40, perfect ? '#e8c76a' : '#7ce8a8', 14, 4);
      if (perfect && hasTech(2)){ perfChain++; } else if (!perfect) perfChain = 0;
      if (combo > bestCombo) bestCombo = combo;
      if (combo === FINISH_AT - 1 && !finisherCue){
        finisherCue = true;
        popup(W/2, 190, 'ONE MORE â€” THROW READY', '#e8c76a', true);
      }
      return;
    }

    e.st = E_THROWN; e.stT = 0;
    e.sendX0 = e.x;                    // JF-#030: launch point, for the longest-yeet stat
    // JF-#010: DRAGON SWEEP â€” perfect throws fly farther and pierce deeper
    const sweep = hasTech(0);
    e.vx = slip(dir * (perfect ? (sweep ? 15 : 12) : 9) * (run.tiger ? 1.3 : 1));   // JF-#025 TIGER, JF-#032 slip
    e.vy = perfect ? -8 : -7;
    // JF-#044: THROW AIMING â€” counter from a stance to shape the throw. Ducking
    // = a LOW SKID that trips everyone at floor level; airborne = a HIGH ARC
    // that sails long. Same stance keys, third use.
    if (P.duckT > 0){ e.vy = -3.5; e.vx *= 1.4; popup(e.x, e.y - 122, 'LOW SKID', '#c8bfa8'); }
    else if (P.jumpT > 0){ e.vy = -12; popup(e.x, e.y - 122, 'SKY THROW', '#c8bfa8'); }
    // JF-#020: ~1 in 6 perfect EMPOWERED counters is a comedy send â€” twice the arc, wild spin
    if (empowered && perfect && e.type !== T_BOSS && Math.random() < 0.18){
      e.vx *= 1.7; e.vy = -11; e.bigSend = true;
      popup(e.x, e.y - 130, SENDS[(Math.random() * SENDS.length) | 0], '#e8c76a', true);
    }
    combo++; comboT = CW;
    if (!empowered && combo === FINISH_AT - 1 && !finisherCue){
      finisherCue = true;
      popup(W/2, 190, 'ONE MORE â€” THROW READY', '#e8c76a', true);
    }
    const baseC = e.type === T_BOSS ? 2000 : e.type === T_BRUTE ? 750 : e.type === T_SPEAR ? 600 : 500;
    const pts = Math.round(baseC * (perfect ? 1.5 : 1)) * Math.min(combo, 5);
    score += pts;
    popup(e.x, e.y - 90, (ironCatch ? 'IRON CATCH +' : perfect ? 'PERFECT +' : 'COUNTER +') + pts, perfect ? '#e8c76a' : '#7ce8a8', true);
    if (perfect) clash(e.x, e.y - 55);   // JF-#043
    // JF-#044: BOSS FINALE â€” the felling counter on a boss is the run's biggest
    // frame: long slow-mo, clash, the moon sits up to watch
    if (e.type === T_BOSS){
      clash(e.x, e.y - 60); slowMo = Math.max(slowMo, 60);
      shake = Math.max(shake, 18); moonWake(220);
    }
    Snd.counter(); hitStop = Math.max(hitStop, empowered ? 7 : 5); shake = Math.max(shake, empowered ? (perfect ? 13 : 10) : 6);
    slowMo = Math.max(slowMo, empowered ? 26 : 18);   // JF-#044: don't clobber the boss-finale slow-mo
    burst(e.x, e.y - 40, perfect ? '#e8c76a' : '#7ce8a8', empowered ? (perfect ? 30 : 22) : 14, empowered ? (perfect ? 6 : 5) : 4);
    if (empowered){
      // ---- EMPOWERED THROW: the payoff â€” thrown body knocks down neighbors in its path ----
      let felled = 0;
      for (const o of enemies){
        if (o === e || o.st === E_DOWN || o.st === E_THROWN) continue;
        if (o.type !== T_BOSS && Math.sign(o.x - e.x) === dir && Math.abs(o.x - e.x) < (perfect ? (sweep ? 260 : 220) : 150) + (run.tiger ? 50 : 0)){
          o.st = E_DOWN; o.stT = 0; o.vx = dir * 5; o.vy = -4; o.hp = 0;
          score += 250; kills++; jadeRun++; felled++;
          popup(o.x, o.y - 80, 'FELLED +250', '#e8c76a'); yelp(o.x, o.y - 104);
          burst(o.x, o.y - 40, '#e8c76a', 10, 3);
        }
      }
      // JF-#007: SWEEP â€” one throw felling 2+ pays a bonus
      if (felled >= 2){
        score += 500; jadeRun += 2;
        popup(W/2, 220, 'SWEEP +500', '#e8c76a', true);
        bumpTrial('sweep');
      }
      // JF-#030: BOWLING â€” one throw toppling 3+ is a STRIKE, with the pins to prove it
      if (felled >= 3){
        score += 500 * (felled - 2);
        banner('â˜— STRIKE!! ' + felled + ' PINS', '#ffd98a', 100);
        Snd.block(); Snd.best(); shake = Math.max(shake, 14); slowMo = Math.max(slowMo, 24); moonWake(90);
      }
    }
    // JF-#010: PALM WAVE â€” 3 consecutive perfects release a wave that fells both sides
    if (perfect && hasTech(2)){
      perfChain++;
      if (perfChain >= 3){
        perfChain = 0;
        banner('PALM WAVE', '#e8c76a', 90);
        Snd.counter(); shake = 16; slowMo = Math.max(slowMo, 30);
        burst(P.x, P.y - 55, '#e8c76a', 40, 8);
        for (const o of enemies){
          if (o === e || o.st === E_DOWN || o.st === E_THROWN || o.type === T_BOSS) continue;
          if (Math.abs(o.x - P.x) < 260){
            o.st = E_DOWN; o.stT = 0; o.vx = Math.sign(o.x - P.x) * 6; o.vy = -5; o.hp = 0;
            score += 250; kills++; jadeRun++;
            popup(o.x, o.y - 80, 'FELLED +250', '#e8c76a'); yelp(o.x, o.y - 104);
            burst(o.x, o.y - 40, '#e8c76a', 10, 3);
          }
        }
      }
    } else if (!perfect) perfChain = 0;
    kills++;
  } else if (e.st === E_WALK && e.canEvade && e.evadeCd <= 0 &&
             (e.eliteEvade || Math.random() < 0.55)){
    if (e.eliteEvade) e.eliteEvade = false;   // JF-#043: TWO STEPS always dodges the FIRST one
    // ---- JF-#041 EVADE: they hop back from your strike (Punch-Out dodge) ----
    // The whiff stings, but they LAND in a long recover â€” bait it, then punish.
    e.st = E_EVADE; e.stT = 0; e.evadeCd = 210;
    e.vx = Math.sign(e.x - P.x || 1) * 4.5;
    popup(e.x, e.y - 100, 'DODGED!', '#c8d4e0');
    Snd.whoosh(); whiffT = 10;
  } else if (e.guard > 0 && (e.st === E_WALK || e.st === E_STAGGER) &&
             atkLine === (e.guardLine || 'mid')){
    // ---- JF-#041 BLOCKED: their guard covers this line and HOLDS ----
    e.blockedN = (e.blockedN || 0) + 1;
    popup(e.x, e.y - 80, 'BLOCKED ' + (e.guardLine || 'mid').toUpperCase(), '#a8b4c8');
    Snd.block(); hitStop = 2; shake = 2;
    burst(e.x, e.y - 58, '#a8b4c8', 6, 2);
    if (!guardTaught){
      guardTaught = true;
      popup(W/2, 220, 'THEY GUARD ' + (e.guardLine || 'mid').toUpperCase() + ' â€” STRIKE ANOTHER LINE', '#a8b4c8', true);
    }
    // JF-#043: elite habits fire off a block â€” IRON ELBOW answers with a grab,
    // BRASS PALM slides his guard to a new line (keep reading, keep varying)
    if (e.elite && e.elite.habit === 'grabnext' && e.st === E_WALK){
      e.blockedN = 0;
      e.st = E_WINDUP; e.stT = 0; e.atk = 'grab'; e.converted = true; e.follow = false;
      e.windup = Math.max(34, e.windup0);
      popup(e.x, e.y - 104, 'GRAB!', '#c86ae8');
      Snd.windup(e.windup);
    } else if (e.elite && e.elite.habit === 'guardshift'){
      const lines = ['mid', 'low', 'high'].filter(l => l !== e.guardLine);
      e.guardLine = lines[(Math.random() * 2) | 0];
    } else if (e.blockedN >= 2 && e.st === E_WALK){   // keep hammering the guard = they punish you
      e.blockedN = 0;
      e.st = E_WINDUP; e.stT = 0; e.atk = 'strike'; e.converted = true; e.follow = false;
      e.windup = Math.max(22, e.windup0 * 0.7);
      popup(e.x, e.y - 104, 'RETALIATES!', '#e8a06a');
      Snd.windup(e.windup);
    }
  } else if (e.type === T_BOSS){                 // ---- the Master shrugs strikes off ----
    e.x += dir * 8;
    popup(e.x, e.y - 110, 'SHRUGGED OFF', '#a8b4c8');
    Snd.block(); hitStop = 2; shake = 2;
  } else if (e.type === T_BRUTE){                // ---- SHOVE (brute won't fall) ----
    e.st = E_STAGGER; e.stT = 0; e.vx = dir * 6;
    score += 50;
    // JF-#007: each shove ENRAGES him â€” next windup 15% faster (floor 55% of base)
    e.rage = (e.rage || 0) + 1;
    e.windup = Math.max(e.windup * 0.85, e.windup0 * 0.55);
    popup(e.x, e.y - 80, e.rage === 2 ? 'ENRAGED' : 'SHOVED +50', e.rage === 2 ? '#e86a6a' : '#c8bfa8');
    Snd.hit(1); hitStop = 2; shake = 3;
    burst(e.x, e.y - 45, e.rage >= 2 ? '#e86a6a' : '#9aa2b0', 8, 3);
  } else if (e.st === E_RECOVER){                // ---- HEAVY (punish the whiff) ----
    e.st = E_DOWN; e.stT = 0;
    e.vx = dir * 6; e.vy = -5.5;
    combo++; comboT = CW;
    const pts = 250 * Math.min(combo, 5);
    score += pts; kills++; jadeRun++;
    popup(e.x, e.y - 80, 'HEAVY +' + pts, '#e8c76a');
    bumpTrial('heavy');
    Snd.hit(combo + 3); hitStop = 5; shake = 6;
    burst(e.x, e.y - 45, '#e8c76a', 14, 4);
  } else {                                       // ---- CLEAN STRIKE ----
    // JF-#041: hitting AROUND a raised guard (a different line) is an OPENING â€”
    // it strips the guard and pays extra. The reward for varying your line.
    const opening = e.guard > 0;
    // JF-#038: also multi-hit â€” a strike that doesn't finish the foe just staggers it
    e.hp = (e.hp === undefined ? 1 : e.hp) - 1;
    if (e.hp > 0){
      e.st = E_STAGGER; e.stT = 0; e.vx = dir * 3; e.guard = 0;
      e.leanT = 10; e.leanDir = dir;   // JF-#043
      combo++; comboT = CW;
      const pts = Math.round((opening ? 90 : 60) * Math.min(combo, 5));
      score += pts;
      popup(e.x, e.y - 80, (opening ? 'OPENING! +' : 'HIT +') + pts, opening ? '#e8c76a' : '#d8d0c0');
      Snd.hit(combo); hitStop = 2; shake = 2;
      burst(e.x, e.y - 40, '#d8d0c0', 6, 2);
      if (combo > bestCombo) bestCombo = combo;
      if (combo === FINISH_AT - 1 && !finisherCue){
        finisherCue = true;
        popup(W/2, 190, 'ONE MORE â€” THROW READY', '#e8c76a', true);
      }
      return;
    }
    e.st = E_DOWN; e.stT = 0;
    e.vx = dir * 4.5; e.vy = -4.5;
    combo++; comboT = CW;
    if (combo === FINISH_AT - 1 && !finisherCue){
      finisherCue = true;
      popup(W/2, 190, 'ONE MORE â€” THROW READY', '#e8c76a', true);
    }
    const pts = Math.round((opening ? 150 : 100) * Math.min(combo, 5));
    score += pts; kills++; jadeRun++;
    popup(e.x, e.y - 80, (opening ? 'OPENING! ' : combo > 1 ? 'Ã—' + Math.min(combo,5) + ' ' : '') + '+' + pts, opening ? '#e8c76a' : '#e8dcc0');
    Snd.hit(combo); hitStop = 3; shake = 4;
    burst(e.x, e.y - 45, '#d8d0c0', 10, 3);
  }
  if (combo > bestCombo) bestCombo = combo;
  hype(combo);                           // JF-#030: cheeky announcer as the chain climbs
  if (combo >= 5) award('chain5');
  // live belt promotion: banner the moment lifetime kills cross a threshold
  const nb = beltOf(save.kills + kills);
  if (nb > beltOf(save.kills) && nb > promoted){
    promoted = nb;
    popup(W/2, 190, BELTS[nb].name + ' BELT', BELTS[nb].col === '#3a3f48' ? '#e8dcc0' : BELTS[nb].col, true);
    // JF-#010: a promotion that teaches a technique says so, right now
    const tec = TECH.find(T => T.belt === nb);
    if (tec) banner('TECHNIQUE LEARNED: ' + tec.name, '#e8c76a', 160);
    Snd.best(); shake = 6;
  }
}

// JF-#040/#046: resolve a landing enemy blow against the player's defense.
// Arrows only: each attack has exactly ONE dodge â€” duck the high, jump the low,
// back-step the mid (or counter it before it lands), jump-or-duck the grab.
function resolveEnemyHit(e){
  if (Math.abs(e.x - P.x) >= REACH + 14) return;   // drifted out of range â€” no hit
  const atk = e.atk || 'strike';
  const airborne = P.jumpT > 0, ducked = P.duckT > 0;
  let avoided = false;
  if (atk === 'high')      avoided = ducked;                 // duck the high swing
  else if (atk === 'low')  avoided = airborne;               // jump the low sweep
  else if (atk === 'grab') avoided = airborne || ducked;     // dodge only
  else                     avoided = P.backT > 0;            // mid: press away
  if (avoided){                                    // ---- clean dodge ----
    if (atk === 'grab'){ e.recoverLong = true; e.st = E_STRIKE; }   // whiffed grab = long punish window
    // JF-#047: duckAge counts frames in the crouch (held ducks never expire, so
    // DUCK_DUR - duckT stopped measuring age). FRESH (â‰¤20f) = a read: pays points,
    // FLOW, and bullet time. A lazy held crouch just makes them whiff â€” the NES
    // paid you nothing for sitting down either.
    const dodgeAge = ducked ? P.duckAge : airborne ? JUMP_DUR - P.jumpT
                   : P.backT > 0 ? BACK_DUR - P.backT : 99;
    // JF-#044: PERFECT READ â€” a dodge input within 8f of the blow landing leaves
    // the foe hanging in a LONG recover. The last-instant read, paid like one.
    if (dodgeAge <= 8 && e.type !== T_BOSS){
      e.st = E_RECOVER; e.stT = 0; e.recoverLong = true;
      score += 160;
      popup(e.x, e.y - 108, 'PERFECT READ +160', '#e8c76a', true);
    }
    if (dodgeAge <= 20){                           // fresh read: full reward
      score += 80; jadeRun++;
      combo++; comboT = CW;                        // JF-#043: defense feeds FLOW too
      if (combo > bestCombo) bestCombo = combo;
      if (combo === FINISH_AT - 1 && !finisherCue){
        finisherCue = true;
        popup(W/2, 190, 'ONE MORE â€” THROW READY', '#e8c76a', true);
      }
      // JF-#041: BULLET TIME â€” the swing sails past in slow motion; punish it.
      slowMo = Math.max(slowMo, 26); hitStop = Math.max(hitStop, 3);
      shake = Math.max(shake, 3);
      popup(P.x, P.y - (ducked ? 58 : 100),
        atk === 'grab' ? 'SLIPPED +80' : atk === 'strike' ? 'EVADED +80' : 'DODGE +80', '#7ce8a8');
    } else {
      popup(P.x, P.y - (ducked ? 58 : 100), ducked ? 'under it' : 'over it', '#9aa2b0');
    }
    burst(P.x + (Math.sign(e.x - P.x) || 1) * 30,
      ducked ? P.y - 88 : atk === 'strike' ? P.y - 58 : P.y - 16, '#7ce8a8', 8, 3);
    return;
  }
  if (BOT) botHit(e);                              // JF-#022: classify before it lands
  // JF-#045: say WHERE it landed â€” the high swing hits the head, the sweep takes
  // the legs â€” so the miss teaches the dodge you should have used
  if (atk === 'high'){
    popup(P.x, P.y - 120, 'RIGHT IN THE HEAD', '#e86a6a', true);
    burst(P.x, P.y - 84, '#e86a6a', 12, 4);
  } else if (atk === 'low'){
    popup(P.x, P.y - 120, 'SWEPT THE LEGS', '#e86a6a', true);
    burst(P.x, P.y - 8, '#e86a6a', 12, 4);
  }
  // JF-#044: a landed GRAB opens the mash-out grapple instead of instant damage
  // (bots keep the instant path so fairness numbers stay comparable)
  if (atk === 'grab' && !BOT){
    grapple = { e, t: 30, hits: 2 };
    e.grappled = true;
    popup(P.x, P.y - 112, 'GRABBED â€” MASH!', '#c86ae8', true);
    Snd.hurt(); shake = 8;
    return;
  }
  hurtPlayer();
}

function hurtPlayer(){
  hearts--; hurtFlash = 18; combo = 0; perfChain = 0; hitsWave++;
  shake = 12; Snd.hurt();
  burst(P.x, P.y - 50, '#e86a6a', 16, 4);
  if (hearts <= 0){
    if (windAvail){                              // SECOND WIND: rise once per fight
      windAvail = false; hearts = 1; slowMo = 40;
      popup(P.x, P.y - 110, 'SECOND WIND', '#7ce8a8', true);
      burst(P.x, P.y - 50, '#7ce8a8', 24, 5);
      Snd.counter();
      return;
    }
    endRun(false);
  }
}

// JF-#009: one exit for both endings â€” felled, or district cleared
function endRun(victory){
  state = S_DEAD; tallyStep = 0; tallyT = 0; tallyDone = false;
  CG.gameplayStop();    // JF-#013
  if (victory) CG.happytime();
  ranOnce = true; rewardUsed = false; adPending = false;   // JF-#016/#037: fresh DOUBLE JADE offer each tally
  walletShown = save.jade;   // wallet animates up from pre-run balance as jade banks
  newBest = !BOT && score > best;
  if (newBest){ best = score; localStorage.setItem('jf_best', best); }
  // JF-#022: bank the run's fairness numbers
  if (BOT && BOT.cur) BOT.stats.push({
    district: DISTRICTS[fought].name, wave, won: victory, kills, counters,
    hits: BOT.cur.hits.length,
    pincer: BOT.cur.hits.filter(h => h.pincer).length,
    fast: BOT.cur.hits.filter(h => h.fast).length,
    hitList: BOT.cur.hits
  });
  if (run.dragon) jadeRun = Math.round(jadeRun * 1.5);   // JF-#025: DRAGON
  jadeRun = Math.round(jadeRun * omen.jadeScale);   // omen boon (JF-#011)
  if (dailyBonus) jadeRun *= 2;                // return bonus pays out at the tally
  save.jade += jadeRun;
  save.kills += kills;                         // lifetime kills drive belt rank
  if (victory && sel === save.dist && save.dist < DISTRICTS.length - 1){
    save.dist++;                               // the next district opens
    sel = save.dist;
  }
  // JF-#026: Hall of Legends â€” per-district top 5 (local; CG board when invited)
  hallRank = 0;
  if (!BOT){
    const H = save.hall[fought];
    H.push({ s: score, w: wave });
    H.sort((a, b) => b.s - a.s);
    if (H.length > 5) H.length = 5;
    const r = H.findIndex(h => h.s === score && h.w === wave);
    if (r >= 0) hallRank = r + 1;
    CG.submitScore(score);
  }
  persist();                                   // every run banks progress
  // JF-#012: reclaiming the jade on the ROOFTOP plays the ending first
  if (victory && fought === 3) state = S_END;
  if (victory) Snd.best(); else Snd.ko();
}

// JF-#014: pause (P key / auto on tab blur). SDK gameplayStart/Stop bracket
// the pause per CG guidelines; any input resumes.
function pauseGame(){ if (state !== S_PLAY) return; state = S_PAUSE; CG.gameplayStop(); }
function resumeGame(){ if (state !== S_PAUSE) return; state = S_PLAY; CG.gameplayStart(); }
// JF-#036: fit() (defined near the top, before state/pauseGame exist) only

addEventListener('resize', () => { if (portraitBlock && state === S_PLAY) pauseGame(); });

// ----------------------------------------------------------------- input ----
function press(dir){
  Snd.unlock();
  if (state === S_PAUSE){ resumeGame(); return; }
  if (state === S_STORY){ save.intro = 1; persist(); state = S_MENU; Snd.tick(); return; }
  if (state === S_END){ state = S_DEAD; Snd.tick(); return; }   // ending â†’ tally
  if (state === S_MENU){ startRun(); return; }
  // JF-#025: while a scroll offer is up, left/right = choose (no enemies exist)
  if (state === S_PLAY && scrollOffer){ pickScroll(dir < 0 ? scrollOffer.a : scrollOffer.b); return; }
  if (state === S_DEAD){
    if (!tallyDone) tallyT = 24 * 7;   // first tap: reveal full tally instantly
    else startRun();                   // next tap: restart (tallyDone flips on next draw)
    return;
  }
  if (tryBackstep(dir)) return;   // JF-#042: away-press during a mid threat = evade
  strike(dir);
}
// JF-#016: rewarded ad = bank the run's jade twice (once per tally)
// JF-#037: rewardUsed used to flip true BEFORE the ad confirmed anything â€” a
// hung ad module (adStarted fires, then nothing ever does) would have
// permanently disabled the offer without ever granting it. adPending now
// blocks re-clicks while a request is in flight; rewardUsed (the permanent
// one-per-tally lock) only sets once CG.rewarded's callback actually fires.
let adPending = false;
function doubleJade(){
  if (rewardUsed || adPending || jadeRun <= 0) return;
  adPending = true;
  CG.rewarded(() => { adPending = false; rewardUsed = true; save.jade += jadeRun; persist(); Snd.best(); });
}
function buyUp(i){
  const u = UPS[i], tier = save.up[u.k];
  if (tier >= u.max) return;
  const cost = u.cost(tier);
  if (save.jade < cost){ Snd.tick(); return; }
  save.jade -= cost; save.up[u.k] = tier + 1; persist();
  Snd.best();
}
addEventListener('keydown', e => {
  if (e.code === 'Space') e.preventDefault();
  if (e.code === 'KeyM'){ Snd.toggleMute(); return; }
  if (e.code === 'KeyP'){ state === S_PAUSE ? resumeGame() : pauseGame(); return; }   // JF-#014
  if (e.code === 'KeyO' && state === S_MENU){ omenOn = !omenOn; Snd.tick(); return; }
  // JF-#023: wardrobe â€” C browses styles, B buys the one under the cursor
  if (e.code === 'KeyC' && state === S_MENU){ styleNext(); return; }
  if (e.code === 'KeyB' && state === S_MENU){ styleBuy(); return; }
  if (state === S_DEAD && /^Digit[1-4]$/.test(e.code) && tallyDone){
    buyUp(+e.code.slice(5) - 1); return;
  }
  if (e.code === 'KeyR' && state === S_DEAD && tallyDone){ doubleJade(); return; }   // JF-#016
  // JF-#009: on the menu, â—€ â–¶ browse unlocked districts; Space/Enter fights
  if (state === S_MENU && (e.code === 'ArrowLeft' || e.code === 'KeyA' || e.code === 'KeyQ')){
    sel = (sel + save.dist) % (save.dist + 1); Snd.tick(); return;
  }
  if (state === S_MENU && (e.code === 'ArrowRight' || e.code === 'KeyD')){
    sel = (sel + 1) % (save.dist + 1); Snd.tick(); return;
  }
  // JF-#046: block/heavy/taunt keys removed â€” the arrows carry the whole fight
  // JF-#028: vertical dodge â€” up/W jump, down/S duck (KeyW/KeyS are physical
  // positions, so they land on AZERTY's Z/S up-down keys too)
  if (e.code === 'ArrowUp' || e.code === 'KeyW'){ Snd.unlock(); jump(); return; }
  // JF-#047: NES crouch â€” holding â–¼ keeps you down (duckHeld tops duckT up each frame)
  if (e.code === 'ArrowDown' || e.code === 'KeyS'){ Snd.unlock(); duckHeld = true; duck(); return; }
  if (e.code === 'ArrowLeft'  || e.code === 'KeyA' || e.code === 'KeyQ') press(-1);
  else if (e.code === 'ArrowRight' || e.code === 'KeyD') press(1);
  else if (e.code === 'Space' || e.code === 'Enter') press(P.face);
});
// JF-#047: release â–¼ = stand back up
addEventListener('keyup', e => {
  if (e.code === 'ArrowDown' || e.code === 'KeyS') duckHeld = false;
});
cv.addEventListener('pointerdown', e => {
  const r = cv.getBoundingClientRect();
  const x = (e.clientX - r.left) / scale, y = (e.clientY - r.top) / scale;
  if (x > W - 60 && y < 50){ Snd.toggleMute(); return; }   // mute button hitbox
  // JF-#011/#036: omen toggle hitbox (top-right offer card) â€” matches the
  // JF-#035 panel bounds (y 76-136); the old y<148 spilled into the Hall of
  // Legends panel just below it, wrongly toggling Omen on a tap there.
  if (state === S_MENU && x > W - 266 && y > 76 && y < 136){ omenOn = !omenOn; Snd.tick(); return; }
  // JF-#023: wardrobe hitboxes â€” tap the block to browse, tap BUY to purchase
  if (state === S_MENU && styleBuyRect && x >= styleBuyRect.x && x <= styleBuyRect.x + styleBuyRect.w &&
      y >= styleBuyRect.y && y <= styleBuyRect.y + styleBuyRect.h){ styleBuy(); return; }
  if (state === S_MENU && styleRect && x >= styleRect.x && x <= styleRect.x + styleRect.w &&
      y >= styleRect.y && y <= styleRect.y + styleRect.h){ styleNext(); return; }
  // JF-#009: menu district arrows (â—€ â–¶ flank the district name)
  if (state === S_MENU && save.dist > 0 && y > 355 && y < 395){
    if (x > W/2 - 220 && x < W/2 - 130){ sel = (sel + save.dist) % (save.dist + 1); Snd.tick(); return; }
    if (x > W/2 + 130 && x < W/2 + 220){ sel = (sel + 1) % (save.dist + 1); Snd.tick(); return; }
  }
  if (state === S_DEAD && tallyDone){
    if (adRect && x >= adRect.x && x <= adRect.x + adRect.w &&
        y >= adRect.y && y <= adRect.y + adRect.h){ doubleJade(); return; }   // JF-#016
    for (const b of btnRects){
      if (x >= b.x && x <= b.x + b.w && y >= b.y && y <= b.y + b.h){ buyUp(b.i); return; }
    }
    if (y > 370) return;    // dead zone around the shop â€” no accidental restarts
  }
  // JF-#040: on-screen control pad takes priority over tap-to-strike
  if (state === S_PLAY && !scrollOffer){
    for (const b of padRects){
      if (x >= b.x && x <= b.x + b.w && y >= b.y && y <= b.y + b.h){
        Snd.unlock();
        if (b.id === 'strikeL') press(-1);
        else if (b.id === 'strikeR') press(1);
        else if (b.id === 'jump' || b.id === 'jump2') jump();
        else if (b.id === 'duck' || b.id === 'duck2'){ padDuckActive = true; duck(); }   // JF-#047: hold to stay down
        return;
      }
    }
  }
  // JF-#028: remember where this touch began so a drag can become a dodge
  touchStartY = e.clientY; touchSwiped = false;

});
// JF-#047: releasing the pointer stands you back up from a pad-held crouch
function padRelease(){ padDuckActive = false; }
cv.addEventListener('pointerup', padRelease);
cv.addEventListener('pointercancel', padRelease);
addEventListener('pointerup', padRelease);
